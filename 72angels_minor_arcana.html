const mapByN={};
map.forEach(m=>mapByN[m.n]=m);

function render(){
  const sv=document.getElementById('suitFilter').value;
  const kw=document.getElementById('search').value.toLowerCase();
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  angels.forEach(([num,heb,yomi,angel,angelKana,domain])=>{
    const m=mapByN[num];
    if(!m)return;
    if(sv&&m.suit!==sv)return;
    const searchStr=`${num}${yomi}${angel}${angelKana}${domain}${m.suit}${m.card}${m.planet}${m.sign}`.toLowerCase();
    if(kw&&!searchStr.includes(kw))return;
    const sc=suitClass[m.suit]||'';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="num">${num}</td>
      <td class="heb">${heb}</td>
      <td><span style="font-weight:500;font-size:12px;">${yomi}</span></td>
      <td>
        <span style="font-weight:500;font-size:12px;">${angel}</span><br>
        <span class="sub">${angelKana}</span>
      </td>
      <td>
        <span class="card-badge ${sc}">${m.suit}${m.card}</span><br>
        <span class="sub">${m.sign}</span>
      </td>
      <td><span class="planet-badge">${m.planet}</span></td>
      <td style="font-size:11px;color:var(--color-text-secondary);">${domain}</td>
    `;
    tbody.appendChild(tr);
  });
}
