外のものを切り離していきます。魚座はその成長の過程において、本当に大切なものが何であるのかを再確認し、それを継承するための方法もいろいろと模索してきました。ここではいよいよ、その大切にしたい価値そのものと、自分自身とが一体化していきます。"],["晴れた秋の空を照らす収穫の月","運命的に人生が変遷する人","わたしたちの目に見える現実は、内側にある意志が作り出した結果として、地上に映し出されています。何も変わらない平凡な日々も、嵐のような激しい生き方も、その人が望んでいるからこそ起こっているのでしょう。"],["満月の下で明らかにされた肥沃な庭のさまざまな成熟した野菜","宇宙の創造サイクルに触れる人","宇宙を創造し続けている、その源に触れるような体験をするかもしれない度数です。"],["プリズムを通り抜けさまざまな色の屈曲した光","シンプルな自分自身の感性で生きる人","プリズムは日本語では「三稜鏡」という名のガラスや水晶で作られた多面体。光を通すと屈折が生じて、七色の光と変化して外へ放たれます。元はひとつであるものが七つに分かれて、またそのそれぞれが七つに分かれて......という、果てしない分裂によって物事の創造が生じ、広がっていくのでしょう。"],["少年の偉大な理想によって構成され彼が成長するにつれて似始める岩の表面","無意識の内に自身の本質と共に生きる人","12星座360度の旅路の最終度数です。12星座の旅は直線ではなく螺旋状に循環していますから、この次は牡羊座の始まりへとジャンプします。この時、決して前周期と同じ牡羊座の1度に辿り着くのではなく、1周分の経験を経た上での、一階分、上の新しい牡羊座の1度に辿り着くでしょう。"]];

function toRad(d){ return d*Math.PI/180; }
function norm360(x){ return ((x%360)+360)%360; }

function dateToJD(date){
  const Y=date.getUTCFullYear(), M=date.getUTCMonth()+1;
  const D=date.getUTCDate()+(date.getUTCHours()+date.getUTCMinutes()/60)/24;
  let y=Y,m=M; if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100), B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+D+B-1524.5;
}
function jdToT(jd){ return (jd-2451545.0)/36525; }

function solveKepler(M_deg, e){
  let M=toRad(norm360(M_deg));
  let E=M;
  for(let i=0;i<50;i++){
    const dE=(M-E+e*Math.sin(E))/(1-e*Math.cos(E));
    E+=dE;
    if(Math.abs(dE)<1e-12) break;
  }
  return E;
}

function helioRect(L, wbar, Om, inc, a, e){
  const M=norm360(L-wbar);
  const E=solveKepler(M,e);
  const nu=2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2), Math.sqrt(1-e)*Math.cos(E/2));
  const r=a*(1-e*Math.cos(E));
  const w=toRad(norm360(wbar-Om));
  const Or=toRad(Om), ir=toRad(inc);
  const u=nu+w;
  const X=r*(Math.cos(Or)*Math.cos(u)-Math.sin(Or)*Math.sin(u)*Math.cos(ir));
  const Y=r*(Math.sin(Or)*Math.cos(u)+Math.cos(Or)*Math.sin(u)*Math.cos(ir));
  const Z=r*(Math.sin(ir)*Math.sin(u));
  return [X,Y,Z];
}

function geoLon(body, T){
  const ep=getEl(body,T), ee=getEl('Earth',T);
  const [Xp,Yp]=helioRect(ep.L,ep.wbar,ep.Om,ep.inc,ep.a,ep.e);
  const [Xe,Ye]=helioRect(ee.L,ee.wbar,ee.Om,ee.inc,ee.a,ee.e);
  return norm360(Math.atan2(Yp-Ye,Xp-Xe)*180/Math.PI);
}

function sunLon(T){
  const ee=getEl('Earth',T);
  const [Xe,Ye]=helioRect(ee.L,ee.wbar,ee.Om,ee.inc,ee.a,ee.e);
  const lon0=norm360(Math.atan2(-Ye,-Xe)*180/Math.PI);
  const omega=norm360(125.04-1934.136*T);
  return norm360(lon0-0.00569-0.00478*Math.sin(toRad(omega)));
}

function moonLon(T){
  const T2=T*T,T3=T2*T,T4=T3*T;
  const L=norm360(218.3164477+481267.88123421*T-0.0015786*T2+T3/538841-T4/65194000);

  const D=norm360(297.8501921+445267.1114034*T-0.001861*T2+T3/545868);
  const Mr=toRad(Mm),Msr=toRad(Ms),Fr=toRad(F),Dr=toRad(D);
  let dL=6288774*Math.sin(Mr)+1274027*Math.sin(2*Dr-Mr)+658314*Math.sin(2*Dr)
    +213618*Math.sin(2*Mr)-185116*Math.sin(Msr)-114332*Math.sin(2*Fr)
    +58793*Math.sin(2*Dr-2*Mr)+57066*Math.sin(2*Dr-Msr-Mr)+53322*Math.sin(2*Dr+Mr)
    +45758*Math.sin(2*Dr-Msr)-40923*Math.sin(Msr-Mr)-34720*Math.sin(Dr)
    -30383*Math.sin(Msr+Mr)+15327*Math.sin(2*Dr-2*Fr)-12528*Math.sin(Mr+2*Fr)
    +10980*Math.sin(Mr-2*Fr)+10675*Math.sin(4*Dr-Mr)+10034*Math.sin(3*Mr)
    +8548*Math.sin(4*Dr-2*Mr)-7888*Math.sin(2*Dr+Msr-Mr)-6766*Math.sin(2*Dr+Msr)
    -5163*Math.sin(Dr-Mr)+4987*Math.sin(Dr+Msr)+4036*Math.sin(2*Dr-Msr+Mr)
    +3994*Math.sin(2*Dr+2*Mr)+3861*Math.sin(4*Dr)+3665*Math.sin(2*Dr-3*Mr)
    -2689*Math.sin(Msr-2*Mr)+2390*Math.sin(2*Dr-Msr-2*Mr)
    -2348*Math.sin(Dr+Mr)+2236*Math.sin(2*Dr-2*Msr)-2120*Math.sin(Msr+2*Mr)
    -2069*Math.sin(2*Msr)+2048*Math.sin(2*Dr-2*Msr-Mr)-1773*Math.sin(2*Dr+Mr-2*Fr)
    -1595*Math.sin(2*Dr+2*Fr)+1215*Math.sin(4*Dr-Msr-Mr)-1110*Math.sin(2*Mr+2*Fr);
  dL/=1000000;
  const omega=norm360(125.04452-1934.136261*T);
  return norm360(L+dL-0.00478*Math.sin(toRad(omega)));

function geoLonVSOP87(Ls,Bs,Rs,tau,T){
  const L=_m2p(_vs(tau,Ls)), B=_vs(tau,Bs), R=_vs(tau,Rs);
  const Xp=R*Math.cos(B)*Math.cos(L), Yp=R*Math.cos(B)*Math.sin(L);
  const ee=getEl('Earth',T);
  const [Xe,Ye]=helioRect(ee.L,ee.wbar,ee.Om,ee.inc,ee.a,ee.e);
  return norm360(Math.atan2(Yp-Ye,Xp-Xe)*180/Math.PI);
}

function getLon(id, T){
  if(id==='sun') return sunLon(T);
  if(id==='moon') return moonLon(T);
  if(id==='pluto'){
    const chk=document.getElementById('plutoOverrideChk');
    if(chk && chk.checked){
      const val=parseFloat(document.getElementById('plutoLonInput').value);
      if(!isNaN(val)) return ((val%360)+360)%360;
    }
  }
  if(id==='uranus')  return geoLonVSOP87(_UL,_UB,_UR,T/10,T);
  if(id==='neptune') return geoLonVSOP87(_NL,_NB,_NR,T/10,T);
  const map={mercury:'Mercury',venus:'Venus',mars:'Mars',jupiter:'Jupiter',saturn:'Saturn',pluto:'Pluto'};
  return geoLon(map[id], T);
}

function isRetro(id, T){
  if(id==='sun'||id==='moon') return false;
  const dt=1/36525;
  const l1=getLon(id,T-dt), l2=getLon(id,T+dt);
  let diff=l2-l1; if(diff>180) diff-=360; if(diff<-180) diff+=360;
  return diff<0;
}

function sabianFrom(lon){
  const norm=((lon%360)+360)%360;
  const si=Math.floor(norm/30), di=Math.floor(norm%30);
  const mi=Math.floor(((norm%30)-di)*60);
  const num=si*30+di+1;
  const meta=signMeta(si);
  return {sign:SIGNS[si], glyph:GLYPHS[si], deg:di, min:mi, num, si, data:SABIAN[num-1], ...meta};
}

function calculate(){
  const dv=document.getElementById('dateInput').value;
  const tv=document.getElementById('timeInput').value||'12:00';
  if(!dv){alert('日付を入力してください');return;}
  const [y,m,d]=dv.split('-').map(Number);
  const [h,mi]=tv.split(':').map(Number);
  // 入力時刻 → UTC変換（JSTなら−9時間）
  const enteredMs=Date.UTC(y,m-1,d,h,mi,0);
  const utcMs=enteredMs-_tzOffset*3600000;
  const date=new Date(utcMs);
  const T=jdToT(dateToJD(date));
  const tzLabel=_tzOffset===9?'JST':'UTC';
  const dateStr=`${y}年${m}月${d}日  ${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')} ${tzLabel}`;
  let html=`<div class="result-date">✦ ${dateStr} ✦</div>`;
  for(const pl of PLANETS){
    const lon=getLon(pl.id, T);
    const ret=isRetro(pl.id, T);
    const s=sabianFrom(lon);
    const retH=ret?'<span class="retro">逆行</span>':'';
    const degStr=`<span class="sign-col">${s.glyph} ${s.sign}</span> ${s.deg}°${String(s.min).padStart(2,'0')}'`;
    const numStr=`第${s.num}度（${s.deg}〜${s.deg+1}度）`;
    const preview=s.data?(s.data[0].length>22?s.data[0].slice(0,22)+'…':s.data[0]):'';
    html+=`
    <div class="planet-card ${pl.cls}" id="c-${pl.id}">
      <div class="planet-header" data-pid="${pl.id}">
        <div class="planet-icon">${pl.icon}</div>
        <div class="planet-info">
          <div class="planet-name">${pl.name}${retH}</div>
          <div class="planet-degree">${degStr}</div>
        </div>
        <div class="sabian-preview">
          <div class="sabian-num">${numStr}</div>
          <div class="sabian-title">${preview}</div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="planet-detail" id="d-${pl.id}">
        ${(()=>{
          const dg=getDignity(pl.id, s.si);
          const di3=Math.floor(s.deg/10);
          const decanRuler=DECAN_RULERS[s.si][di3];
          const suit=TAROT_SUIT[s.si%4];
          const minorNum=TAROT_BASE[s.si%3]+di3;
          const major=MAJOR_ARCANA[s.si];
          const decanLabel=['第1デカン（0〜9°）','第2デカン（10〜19°）','第3デカン（20〜29°）'][di3];
          return `
          <div class="sign-meta">
            <span class="meta-badge meta-${s.elemKey}">${s.elemJa}</span>
            <span class="meta-badge meta-modal">${s.modalJa}</span>
            <span class="meta-badge meta-ruler">支配星：${s.ruler}</span>
            ${dg?`<span class="meta-badge ${dg.cls}">${dg.label}</span>`:''}
          </div>
          <div class="decan-box">
            <div class="decan-box-title">◈ デカン ／ タロット</div>
            <div class="decan-row">
              <div class="decan-item">🌗 <strong>${decanLabel}</strong>　支配星：${decanRuler}</div>
              <div class="decan-item tarot-minor">🃏 小アルカナ：<strong>${suit}の${minorNum}</strong></div>
              <div class="decan-item tarot-major">✦ 大アルカナ：<strong>${major}</strong></div>
            </div>
          </div>`;
        })()}
        <div class="full-title">${s.data?s.data[0]:''}</div>
        <div class="keyword-badge">${s.data?s.data[1]:''}</div>
        <div class="desc-text">${s.data?s.data[2]:''}</div>
      </div>
    </div>`;
  }
  document.getElementById('results').innerHTML=html;
}

// ── 月の流れ タイムゾーン切替 ──
function setMfTZ(offset){
  _mfTzOffset = offset;
  document.getElementById('mfBtnJST').classList.toggle('active', offset===9);
  document.getElementById('mfBtnUTC').classList.toggle('active', offset===0);
}
(function(){
  var mfJst = document.getElementById('mfBtnJST');
  var mfUtc = document.getElementById('mfBtnUTC');
  if(mfJst){
    mfJst.addEventListener('touchend', function(e){ e.preventDefault(); setMfTZ(9); }, {passive:false});
    mfJst.addEventListener('click', function(){ setMfTZ(9); });
  }
  if(mfUtc){
    mfUtc.addEventListener('touchend', function(e){ e.preventDefault(); setMfTZ(0); }, {passive:false});
    mfUtc.addEventListener('click', function(){ setMfTZ(0); });
  }
})();

// ── 月の流れ 計算 ──
function calcMoonFlow(){
  var sd = document.getElementById('mfStartDate').value;
  var st = document.getElementById('mfStartTime').value || '00:00';
  var ed = document.getElementById('mfEndDate').value;
  var et = document.getElementById('mfEndTime').value || '23:59';
  if(!sd || !ed){ alert('開始日と終了日を入力してください'); return; }

  var sy=Number(sd.split('-')[0]), sm=Number(sd.split('-')[1]), sday=Number(sd.split('-')[2]);
  var sh=Number(st.split(':')[0]), smi=Number(st.split(':')[1]);
  var ey=Number(ed.split('-')[0]), em=Number(ed.split('-')[1]), eday=Number(ed.split('-')[2]);
  var eh=Number(et.split(':')[0]), emi=Number(et.split(':')[1]);

  var startUtcMs = Date.UTC(sy,sm-1,sday,sh,smi,0) - _mfTzOffset*3600000;
  var endUtcMs   = Date.UTC(ey,em-1,eday,eh,emi,0) - _mfTzOffset*3600000;

  if(endUtcMs <= startUtcMs){ alert('終了日時は開始日時より後に設定してください'); return; }

  var diffDays = (endUtcMs - startUtcMs) / 86400000;
  if(diffDays > 35){ alert('期間は35日以内にしてください'); return; }

  var stepMs = 30 * 60 * 1000;
  var seen = [];
  var seenSet = {};

  for(var ms = startUtcMs; ms <= endUtcMs; ms += stepMs){
    var T = jdToT(dateToJD(new Date(ms)));
    var lon = moonLon(T);
    var s = sabianFrom(lon);
    if(!seenSet[s.num]){
      seenSet[s.num] = true;
      seen.push(s);
    }
  }
  var T2 = jdToT(dateToJD(new Date(endUtcMs)));
  var s2 = sabianFrom(moonLon(T2));
  if(!seenSet[s2.num]){ seenSet[s2.num]=true; seen.push(s2); }

  if(seen.length === 0){
    document.getElementById('moonFlowResults').innerHTML = '<div class="moon-empty">シンボルが見つかりませんでした</div>';
    return;
  }

  var tzLabel = _mfTzOffset===9 ? 'JST' : 'UTC';
  function fmtDate(y,m,d,h,mi){
    return y+'年'+m+'月'+d+'日 '+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')+' '+tzLabel;
  }
  var periodStr = fmtDate(sy,sm,sday,sh,smi) + ' 〜 ' + fmtDate(ey,em,eday,eh,emi);

  var signSet = [];
  var signSeen = {};
  seen.forEach(function(s){
    var key = s.glyph+s.sign;
    if(!signSeen[key]){ signSeen[key]=true; signSet.push(key); }
  });

  var poem = buildMoonPoem(seen, signSet, diffDays);

  var symbolCards = '';
  seen.forEach(function(s){
    var title = s.data ? s.data[0] : '';
    var kw    = s.data ? s.data[1] : '';
    symbolCards += '<div class="moon-symbol-item">'
      + '<div class="moon-symbol-num">第'+s.num+'度<br><span style="color:#c8c8ff">'+s.glyph+'</span></div>'
      + '<div class="moon-symbol-body">'
      + '<div class="moon-symbol-sign">'+s.glyph+' '+s.sign+' '+s.deg+'°〜'+(s.deg+1)+'°</div>'
      + '<div class="moon-symbol-title">'+title+'</div>'
      + (kw ? '<span class="moon-symbol-kw">'+kw+'</span>' : '')
      + '</div></div>';
  });

  var html = '<div class="moon-period-label">☽ '+periodStr+' ☽</div>'
    + '<div class="moon-flow-poem">'+poem+'</div>'
    + '<div class="moon-symbols-header">── 通過したサビアンシンボル（'+seen.length+'度） ──</div>'
    + symbolCards;

  document.getElementById('moonFlowResults').innerHTML = html;
}

function buildMoonPoem(symbols, signSet, diffDays){
  var n = symbols.length;
  var firstS = symbols[0];
  var lastS  = symbols[n-1];
  var firstTitle = firstS.data ? firstS.data[0] : '';
  var lastTitle  = lastS.data  ? lastS.data[0]  : '';
  var firstKw    = firstS.data ? firstS.data[1] : '';
  var lastKw     = lastS.data  ? lastS.data[1]  : '';

  var keywords = symbols.map(function(s){ return s.data ? s.data[1] : ''; }).filter(Boolean);
  var midKws = [];
  if(keywords.length > 4){
    var step = Math.floor(keywords.length / 3);
    for(var i = step; i < keywords.length - step; i += step){
      if(midKws.length < 3) midKws.push(keywords[i]);
    }
  }

  var signStr = signSet.join('・');
  var daysStr = diffDays < 1
    ? Math.round(diffDays*24)+'時間ほどの旅'
    : diffDays < 2 ? '約1日の旅' : '約'+Math.round(diffDays)+'日間の旅';

  var poem = 'この時期、月は<strong>'+signStr+'</strong>を駆け抜ける'+daysStr+'をしていました。';
  poem += '<br><br>';
  poem += 'その旅は「<strong>'+firstTitle+'</strong>」——<em>'+firstKw+'</em>という扉から始まり、';

  if(midKws.length > 0){
    poem += '<br>途中には';
    midKws.forEach(function(kw, i){
      poem += (i===0?'':'、') + '<em>'+kw+'</em>';
    });
    poem += 'といった風景を通り抜けながら、';
  }

  poem += '<br>最後は「<strong>'+lastTitle+'</strong>」——<em>'+lastKw+'</em>という場所へと辿り着きました。';
  poem += '<br><br>';

  if(n <= 5){
    poem += '月はほんの数歩だけ、静かにその場に佇むように歩みを進めました。短くとも、その一歩一歩は濃密な時間でした。';
  } else if(n <= 15){
    poem += n+'つのシンボルを紡ぎながら、月はゆったりとした呼吸で空を渡りました。まるで水面に映る星たちを確かめるように。';
  } else if(n <= 30){
    poem += n+'度にわたるこの流れは、月が深く息を吸って空を一巡する時間。多くの物語が生まれ、また静かに還っていきました。';
  } else {
    poem += n+'ものシンボルを通り抜けた月は、まるで巡礼のように黄道を歩きました。出会いと別れを繰り返しながら、やがてひとつの円を描きました。';
  }

  return poem;
}

// ── 月の流れ計算ボタン ──
(function(){
  var btn = document.getElementById('mfCalcBtn');
  if(btn){
    btn.addEventListener('touchend', function(e){ e.preventDefault(); calcMoonFlow(); }, {passive:false});
    btn.addEventListener('click', function(){ calcMoonFlow(); });
  }
  // デフォルト日付：今日〜3日後
  var now = new Date();
  var displayMs = now.getTime() + _mfTzOffset * 3600000;
  var d = new Date(displayMs);
  var y = d.getUTCFullYear();
  var mo = String(d.getUTCMonth()+1).padStart(2,'0');
  var day = String(d.getUTCDate()).padStart(2,'0');
  var startEl = document.getElementById('mfStartDate');
  var endEl   = document.getElementById('mfEndDate');
  if(startEl) startEl.value = y+'-'+mo+'-'+day;
  if(endEl){
    var future = new Date(displayMs + 3*86400000);
    endEl.value = future.getUTCFullYear()+'-'+String(future.getUTCMonth()+1).padStart(2,'0')+'-'+String(future.getUTCDate()).padStart(2,'0');
  }
})();
