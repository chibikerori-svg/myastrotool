<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>サビアンシンボル計算機</title>
<!-- PWA / ホーム画面追加対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="サビアン">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d2b">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: #0d0d2b; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #0d0d2b 0%, #1a1a4e 50%, #0d1a3d 100%);
    min-height: 100vh;
    color: #e8e0f0;
    padding: 20px;
    touch-action: manipulation;
  }
  .header { text-align: center; padding: 30px 0 20px; }
  .header h1 {
    font-size: 2em; letter-spacing: 0.15em; color: #f0d080;
    text-shadow: 0 0 20px rgba(240,208,128,0.5); margin-bottom: 8px;
  }
  .header p { color: #a090c0; font-size: 0.9em; letter-spacing: 0.05em; }
  .input-section {
    max-width: 600px; margin: 0 auto 30px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(240,208,128,0.2);
    border-radius: 16px; padding: 24px;
  }
  .input-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .input-group { flex: 1; min-width: 140px; }
  label { display: block; font-size: 0.8em; color: #a090c0; margin-bottom: 6px; letter-spacing: 0.05em; }
  input[type="date"], input[type="time"] {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(240,208,128,0.3); border-radius: 8px;
    padding: 10px 14px; color: #e8e0f0; font-size: 1em;
    outline: none; transition: border-color 0.2s; color-scheme: dark;
  }
  input[type="date"]:focus, input[type="time"]:focus { border-color: #f0d080; }
  .calc-btn {
    background: linear-gradient(135deg, #f0d080, #c8a040); color: #1a0d00;
    border: none; border-radius: 10px; padding: 12px 28px;
    font-size: 1em; font-weight: bold; cursor: pointer;
    letter-spacing: 0.05em; transition: all 0.2s; white-space: nowrap;
    touch-action: manipulation;
  }
  .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(240,208,128,0.4); }
  .today-btn {
    background: transparent; border: 1px solid rgba(240,208,128,0.4);
    color: #f0d080; border-radius: 8px; padding: 8px 16px;
    font-size: 0.85em; cursor: pointer; letter-spacing: 0.05em;
    transition: all 0.2s; margin-top: 10px; touch-action: manipulation;
  }
  .today-btn:hover { background: rgba(240,208,128,0.1); }
  .note { font-size: 0.78em; color: #705090; text-align: center; margin-top: 10px; }
  .tz-toggle { display:flex; border:1px solid rgba(240,208,128,0.3); border-radius:8px; overflow:hidden; }
  .tz-btn { background:transparent; border:none; color:#a090c0; padding:6px 14px; font-size:0.82em; cursor:pointer; transition:all 0.2s; touch-action:manipulation; }
  .tz-btn.active { background:rgba(240,208,128,0.2); color:#f0d080; font-weight:bold; }
  .pluto-override-row { margin-top:10px; text-align:center; }
  .pluto-lon-input { width:90px; background:rgba(255,255,255,0.08); border:1px solid rgba(208,128,192,0.4); border-radius:6px; color:#e8e0f0; padding:6px 10px; font-size:0.9em; margin:0 6px; }
  .results { max-width: 900px; margin: 0 auto; }
  .result-date { text-align: center; color: #f0d080; font-size: 1.1em; margin-bottom: 20px; letter-spacing: 0.08em; }
  .planet-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; margin-bottom: 14px; overflow: hidden; transition: border-color 0.2s;
  }
  .planet-card:hover { border-color: rgba(240,208,128,0.3); }
  .planet-header { display: flex; align-items: center; padding: 14px 18px; cursor: pointer; gap: 14px; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  .planet-icon { font-size: 1.7em; width: 42px; text-align: center; flex-shrink: 0; }
  .planet-info { flex: 1; }
  .planet-name { font-size: 1em; font-weight: bold; color: #d0c0f0; margin-bottom: 2px; }
  .planet-degree { font-size: 0.85em; color: #a090c0; }
  .sabian-preview { flex: 2; text-align: right; }
  .sabian-num { font-size: 0.8em; color: #f0d080; margin-bottom: 2px; }
  .sabian-title { font-size: 0.88em; color: #e8e0f0; line-height: 1.4; }
  .planet-detail {
    display: none; border-top: 1px solid rgba(255,255,255,0.08);
    padding: 16px 20px 20px;
  }
  .planet-detail.open { display: block; }
  .full-title { font-size: 1em; color: #e8e0f0; margin-bottom: 10px; line-height: 1.6; }
  .keyword-badge {
    display: inline-block; background: rgba(240,208,128,0.15);
    border: 1px solid rgba(240,208,128,0.3); color: #f0d080;
    border-radius: 20px; padding: 5px 16px; font-size: 0.85em; margin-bottom: 14px;
  }
  .desc-text {
    font-size: 0.88em; line-height: 1.85; color: #c0b0d8;
    border-left: 3px solid rgba(240,208,128,0.3); padding-left: 14px;
  }
  .sign-meta { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px; }
  .meta-badge { font-size:0.78em; padding:3px 11px; border-radius:12px; border:1px solid; letter-spacing:0.03em; }
  .meta-fire  { color:#ff9868; border-color:rgba(255,152,104,0.45); background:rgba(255,152,104,0.1); }
  .meta-earth { color:#90c860; border-color:rgba(144,200,96,0.45);  background:rgba(144,200,96,0.1); }
  .meta-air   { color:#70d0f0; border-color:rgba(112,208,240,0.45); background:rgba(112,208,240,0.1); }
  .meta-water { color:#8899ff; border-color:rgba(136,153,255,0.45); background:rgba(136,153,255,0.1); }
  .meta-modal { color:#c8a8f0; border-color:rgba(200,168,240,0.4);  background:rgba(200,168,240,0.08); }
  .meta-ruler { color:#f0d080; border-color:rgba(240,208,128,0.35); background:rgba(240,208,128,0.08); }
  .meta-dignity-d  { color:#60e090; border-color:rgba(96,224,144,0.5);   background:rgba(96,224,144,0.1); }
  .meta-dignity-e  { color:#ffd700; border-color:rgba(255,215,0,0.5);   background:rgba(255,215,0,0.12); }
  .meta-dignity-dt { color:#a0a0b0; border-color:rgba(160,160,176,0.45); background:rgba(160,160,176,0.08); }
  .meta-dignity-f  { color:#70b0e8; border-color:rgba(112,176,232,0.5);  background:rgba(112,176,232,0.1); }
  .decan-box { margin-bottom:13px; padding:10px 14px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:10px; }
  .decan-box-title { font-size:0.75em; color:#7060a0; letter-spacing:0.06em; margin-bottom:7px; }
  .decan-row { display:flex; gap:18px; flex-wrap:wrap; }
  .decan-item { font-size:0.82em; color:#c0b0e0; }
  .decan-item strong { color:#e8d8ff; }
  .tarot-minor { color:#d0a8f8; }
  .tarot-major { color:#f0d080; }
  .expand-icon { color: #a090c0; font-size: 0.8em; transition: transform 0.25s; flex-shrink: 0; }
  .planet-card.open .expand-icon { transform: rotate(180deg); }
  .retro { color: #ff8888; font-size: 0.72em; margin-left: 5px; font-weight: normal; }
  .sign-col { color: #90c8f0; }
  .empty { text-align: center; color: #6050a0; padding: 50px; font-size: 1.1em; }
  .sun .planet-icon { color: #ffd700; }
  .moon .planet-icon { color: #c8c8ff; }
  .mercury .planet-icon { color: #a0d0a0; }
  .venus .planet-icon { color: #ffb0c8; }
  .mars .planet-icon { color: #ff8060; }
  .jupiter .planet-icon { color: #f0c060; }
  .saturn .planet-icon { color: #c0b090; }
  .uranus .planet-icon { color: #80f0e0; }
  .neptune .planet-icon { color: #8080ff; }
  .pluto .planet-icon { color: #d080c0; }
  @media (max-width: 580px) {
    .sabian-preview { display: none; }
    .input-row { flex-direction: column; }
    .header h1 { font-size: 1.5em; }
  }

  /* ─── タブナビゲーション ─── */
  .tab-nav {
    display: flex; max-width: 700px; margin: 0 auto 0;
    border-bottom: 1px solid rgba(240,208,128,0.25);
    padding: 0 10px;
  }
  .tab-btn {
    flex: 1; background: transparent; border: none; border-bottom: 3px solid transparent;
    color: #a090c0; font-size: 0.95em; letter-spacing: 0.08em;
    padding: 14px 10px; cursor: pointer; transition: all 0.25s;
    touch-action: manipulation; font-family: inherit;
  }
  .tab-btn.active { color: #f0d080; border-bottom-color: #f0d080; }
  .tab-btn:hover:not(.active) { color: #d0c0e8; background: rgba(240,208,128,0.05); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── 月の流れ要約 ─── */
  .moon-flow-results { max-width: 720px; margin: 0 auto; }
  .moon-period-label {
    text-align: center; color: #c8c8ff; font-size: 1em;
    margin-bottom: 24px; letter-spacing: 0.08em;
  }
  .moon-flow-poem {
    background: rgba(200,200,255,0.06); border: 1px solid rgba(200,200,255,0.2);
    border-radius: 16px; padding: 28px 30px; margin-bottom: 24px;
    line-height: 2.1; color: #d8d0f0; font-size: 0.96em;
    border-left: 3px solid rgba(200,200,255,0.4);
  }
  .moon-flow-poem strong { color: #f0d080; }
  .moon-symbols-header {
    text-align: center; color: #a090c0; font-size: 0.82em;
    letter-spacing: 0.12em; margin-bottom: 16px;
  }
  .moon-symbol-item {
    display: flex; gap: 14px; align-items: flex-start;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(200,200,255,0.1);
    border-radius: 11px; padding: 13px 16px; margin-bottom: 9px;
    transition: border-color 0.2s;
  }
  .moon-symbol-item:hover { border-color: rgba(200,200,255,0.3); }
  .moon-symbol-num {
    flex-shrink: 0; width: 44px; text-align: center;
    font-size: 0.75em; color: #f0d080;
    line-height: 1.3; padding-top: 2px;
  }
  .moon-symbol-body { flex: 1; }
  .moon-symbol-sign { font-size: 0.8em; color: #90c8f0; margin-bottom: 3px; }
  .moon-symbol-title { font-size: 0.92em; color: #e8e0f0; line-height: 1.5; margin-bottom: 4px; }
  .moon-symbol-kw {
    display: inline-block; font-size: 0.78em;
    background: rgba(200,200,255,0.1); border: 1px solid rgba(200,200,255,0.25);
    color: #c0b8f0; border-radius: 14px; padding: 3px 12px;
  }
  .moon-empty { text-align: center; color: #6050a0; padding: 50px; font-size: 1.1em; }

</style>
</head>
<body>
<div class="header">
  <h1>✦ サビアンシンボル計算機 ✦</h1>
  <p>日付を入力すると、惑星ごとのサビアンシンボルが表示されます（完全オフライン・Swiss Ephemeris 準拠）</p>
</div>

<div class="tab-nav">
  <button class="tab-btn active" id="tabBtnPlanets" data-tab="planets">☉ 惑星シンボル</button>
  <button class="tab-btn" id="tabBtnMoon" data-tab="moonflow">☽ 月の流れ要約</button>
</div>
<div class="tab-panel active" id="tab-planets">
<div class="input-section">
  <div class="input-row">
    <div class="input-group">
      <label>日付</label>
      <input type="date" id="dateInput">
    </div>
    <div class="input-group">
      <label id="timeLbl">時刻（JST / 日本時間）</label>
      <input type="time" id="timeInput" value="12:00">
    </div>
    <div>
      <label style="margin-bottom:6px; display:block;">時間帯</label>
      <div class="tz-toggle">
        <button class="tz-btn active" id="btnJST" data-tz="9">JST +9</button>
        <button class="tz-btn" id="btnUTC" data-tz="0">UTC</button>
      </div>
    </div>
    <button class="calc-btn" id="calcBtn">計算する</button>
  </div>
  <div style="text-align:center; margin-top:12px;">
    <button class="today-btn" id="todayBtn">今日の日付をセット</button>
  </div>
  <div class="pluto-override-row">
    <label style="display:inline; cursor:pointer; font-size:0.85em; color:#c0a0e0;">
      <input type="checkbox" id="plutoOverrideChk">
      冥王星を手入力する（黄経度数）：
    </label>
    <input type="number" id="plutoLonInput" class="pluto-lon-input" min="0" max="360" step="0.01" value="305.2" disabled placeholder="例: 305.2">
    <span style="font-size:0.78em; color:#705090;">度（0〜360°）</span>
  </div>
  <div class="note">※ 時刻不明の場合は12:00のままでOK。冥王星は手入力推奨</div>
</div>
<div class="results" id="results">
  <div class="empty">日付を選んで「計算する」を押してください ✦</div>
</div>
</div><!-- /tab-planets -->

<div class="tab-panel" id="tab-moonflow">
  <div class="input-section" style="max-width:600px;margin:30px auto;">
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;">
        <div class="input-group">
          <label>開始日</label>
          <input type="date" id="mfStartDate">
        </div>
        <div class="input-group" style="min-width:110px;max-width:130px;">
          <label>開始時刻</label>
          <input type="time" id="mfStartTime" value="00:00">
        </div>
      </div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;">
        <div class="input-group">
          <label>終了日</label>
          <input type="date" id="mfEndDate">
        </div>
        <div class="input-group" style="min-width:110px;max-width:130px;">
          <label>終了時刻</label>
          <input type="time" id="mfEndTime" value="23:59">
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div>
          <label style="margin-bottom:6px;display:block;">時間帯</label>
          <div class="tz-toggle">
            <button class="tz-btn active" id="mfBtnJST" data-tz="9">JST +9</button>
            <button class="tz-btn" id="mfBtnUTC" data-tz="0">UTC</button>
          </div>
        </div>
        <button class="calc-btn" id="mfCalcBtn" style="margin-top:20px;">流れを読む</button>
      </div>
    </div>
    <div class="note" style="margin-top:14px;">※ 月はおよそ27.3日で12星座を一周します。数日〜数週間の範囲が見やすいです</div>
  </div>
  <div class="moon-flow-results" id="moonFlowResults">
    <div class="moon-empty">期間を選んで「流れを読む」を押してください ✦</div>
  </div>
</div><!-- /tab-moonflow -->

<script>
const SABIAN=[["水から上がった女性と彼女を抱きしめるアザラシ","人間として地上で生きることを楽しみにやって来た人","太陽が1年をかけてひとめぐりする黄道12星座のスタート地点です。北欧やスコットランド、アイルランド地方には、アザラシが海から上がって、皮を脱いで人間となって地上で暮らし、やがてまた皮を着て海へ戻るという神話があります。まるでわたしたちの祖先がアザラシであるかのような物語ですが、すべての生物が海から始まったことを思えば、不思議ではないでしょう。"],["人間の自然な本質を明らかにするコメディアン","まわりで起きていることを天然自然に模倣する人","新しい世界に降り立ったばかりの若いたましいが、どのようにふるまえば良いのかわからず、まわりを見渡して、見よう見真似でそれらしくふるまう......という模倣の度数です。幼い子供が、まわりの大人のふるまいを意味もわからずに真似すると、周囲が爆笑する、ということがあるでしょう。幼児はまじめに真似しただけなので、なにがそんなにおかしいのかわかりません。だけれども、みんなが喜んでくれたという反応がうれしくて、何度もしつこく、その動作を繰り返すことがあるでしょう。"],["祖国の特色から作られた男の横顔のカメオ","その場の雰囲気に合わせて自在に人格を変える人","牡羊座は生まれたばかりの無垢な赤ちゃんが、さまざまな体験を経て『自分が何者であるのか』ということを確立させていく星座です。そして、わたしたちは自分のアイデンティティの根幹となるものを、まず生まれ育った場所の雰囲気から創り上げることになるでしょう。"],["人里から離れた道を散策するふたりの恋人たち","相対的な対比によって自分を成長させる人","ふたりの恋人たち......男女のペアが人里から離れた、人の少ない道を散策しています。ふたりはお互いに甘い心を抱きながら歩いているのかもしれません。"],["羽のついた三角","常人には理解できない高い理想を抱き、追い求める人","点が線、線が面になって、最初に完成するのが三角です。初めて形というものを体験する創造。何もないところから生み出されていくクリエイティブの歓び。タロットの三番目のカードは『女帝』ですが、これは創造性のシンボルで、どんどん生み出していくこと、そして発生したものが育っていく様子が描かれています。このシンボルでは、その創造力の三角に羽が生えているため、ある意味、どこまでも自由に際限なく、軽やかな発想で生み出していくことができるでしょう。"],["一辺が明るく照らされている四角","何事も一途にやり遂げることのできる人","四角形はすべてをかっちりと安定させるための土台です。基礎がしっかりとしているからこそ、その上に、強固な家を建てることができるでしょう。タロットの四番目のカードは『皇帝』ですが、彼は石の玉座に座り、王国を安定されるために威厳を保ち、頑なにルールを遵守して、国民の暮らしに秩序と継続を与えようとしています。ここでは、そんな四角形がクローズアップされていますが、そのうちの一辺が光り輝いています。これは、四角形を完成させるための、最後の一辺かもしれません。"],["ふたつの領域で同時に自己表現するのに成功する男","相反する物事から自分を確立していく人","男性がふたつの領域で同時に自己表現するというサビアン・ワードですが、ここでいうふたつの領域というのは、この宇宙に存在する、あらゆる二元の世界。表と裏、現実世界と精神世界、男と女、陽と陰......。その相反しながら支え合っているふたつの世界を、対比させることで、思索を深めていき、全体を理解しようと試みる度数です。"],["東から吹く風になびくリボンのついた大きな女性の帽子","これから始まる物事の予兆をキャッチして伝える人","東から吹く風というのは、春に吹く風を表していて、春というのは、はじまりの季節。風はさまざまなものを明るみにしながら、情報を運んでくる働きがあるため、ここではまだ誰も知らない新しい情報が運ばれてくる、ともいえるでしょう。女性というのは受け身の存在で、受容性の質があり、やってきた情報をキャッチしているといえます。そしてここでは同時に帽子によって守られてもいます。"],["水晶を凝視する人","鋭く世界を観察して理解する人","水晶の球体というのは、鏡のようにさまざまなものを写し出す働きがあります。また水晶体はいろいろなものをキャッチする媒介となって、見ようとしている対象の情報を受信し、その全体がどうなっているのか、明らかにするでしょう。"],["伝統的なイメージに新しい象徴的な形を与える教師","新しい価値観で世界をとらえ直す人","牡羊座は火のエレメントに属する星座ですが、これは物事を具体的な形として落としこまずに、抽象的な概念として扱うことのできる質を表しています。むしろ具体的な結果や事象、目に見える形式よりも、概念や精神性を強調する傾向があり、どのような意識で、それがなんのためにやっているのか、ということのほうが大事ともいえるでしょう。"],["国家の支配者","社会の中でカリスマ性を発揮する人","力強い自分自身の存在の確立をめざしていく牡羊座が、社会へと飛び出していき、集団と関わりながら、そのしくみの中でどうにかして自分らしさを強く打ち出そうとする度数です。社会の中でいかに自分らしくふるまうかということと、自分の力を存分に発揮することに意識が向けられていきますが、それは人を統率する力に憧れを抱かせるでしょう。社会に向けて力を解き放ち、さまざまなことにチャレンジしようとする意欲があふれて、実行力が満ちている状態です。"],["三角形を作って飛ぶ野生の雁の群れ","内なる野生に従った自然体の生き方に憧れる人","野生の雁が群れて飛ぶとき、空気の抵抗を減らすために、自然と集団でV字の三角形を作って飛んでいきます。そのように飛ぶ、ということが雁のDNAに組み込まれているわけですが、それは自然の法則にしたがった合理的なしくみが、身体の中に息づいているともいえるでしょう。人間が作り出した秩序の背後には自然の、そして宇宙の法則が歴然と横たわっています。"],["社会への抗議が成功しなかったことを明らかにする不発弾","思いついたら実行する行動力の人","社会への抗議というのがテーマとなっているサビアン・ワードですが、そういった行動に人を駆り立てるものは現状への不満。いまあるものを否定して、異なるものを祭り上げようとする行為が、抗議活動といえるかもしれません。"],["男と女のそばでとぐろを巻く蛇","異なるものを統合して精神的な成長をめざす人","わたしたちが、より完全な自分自身になろうとするとき、自分の中に相反するものがあると悩まされることになるでしょう。「こうしよう」「これが正しい」と、なにかを選ぶということは、選ばなかったもう一方を切り捨てることにつながり、そのようにしている限り、いつもその切り捨てた影が事ある度に主張してきて、なかなか成長することができません。"],["儀式用のブランケットを編んでいるインディアン","長い時間をかけて自分を成熟させる人","ブランケットを編むという作業は、とても気が遠くなるような長い時間をかけて、丁寧で精密に縦糸と横糸を交差させながら織り込んでいく必要があります。ただ同じように繰り返して編むだけでなく、そこから描き出されるさまざまな紋様は、縦糸と横糸......自分の内側にある男性性と女性性、右と左、光と影といった、異なる要素を互い違いに紡ぎ合わせていくことで創られていくのでしょう。これは、そのような長い時間をかけて、理想の自分自身の完成をめざしていく度数です。"],["日没の光のなかで働いている自然の精霊","自然界からのメッセージを受け取って表現できる人","人間の物理的な活動が活発になる昼間の時間と、目に見えない精神的な活動のほうが優位になる夜間の時間との、あいだにあるのが日没の時間です。陽が沈んでいく一日の終わりを迎えると、わたしたちはどこかホッとしたような気持になるかもしれません。そして、この頃から目に見えない存在たちが働き始めるでしょう。"],["沈黙して座っているふたりの威厳ある未婚女性","静かに熱く自分の内側で探求する人","新しい命のはじまりは、男女の交わりによって生じます。あらゆる物事の生産性、現実世界の豊かな発展性は、その両極が交わることによって生み出されるといえるでしょう。男性と女性、光と影、右と左という極の異なる、相反するもの同士がひとつに結ばれることで生じるのが発展。だとすると、ここでは女と女、影と影、左と左...といった、ひとつの同じ極のものがコピーされたかのように向き合っています。"],["二本の木のあいだに吊るされた空のハンモック","自我を抑えて客観と社会性を身につけていく人","わたしたちにとって新しい創造は、男と女、光と影、右と左といった、相反するものがひとつに統合されることによって起こります。しかし、牡羊座というのは常に主観が先行する星座であり、これまでのあいだに登場した他者はすべて「自分がそれを見てどう反応するのか」という対象でしかありませんでした。ここでは本格的に、より自分自身を統合していくための「客観」を手に入れていこうとする度数となります。"],["東洋の想像物である『魔法のじゅうたん』","自分で世界を変えようとチャレンジする人","物語でおなじみの魔法のじゅうたんは、大空を自由に飛びまわり、悠々とかけめぐることができるでしょう。牡羊座は火のエレメントに属する星座ですが、これはいつでも発展や成長を求める質があります。このじゅうたんの度数では、自分自身のポジティブな発想力によって、世界を変えようと盛り上げていく姿が描かれているでしょう。"],["冬に鳥に餌をやっている若い少女","自分自身の力で希望の道を拓く人","寒い冬の季節を生き延びることが難しい鳥を、年若い少女が保護して、餌をあげることで自然淘汰の流れから守ろうとしている度数です。これは、どんなに厳しい状況においても、自分自身の純粋さと想像力で乗り越えていくだけの力を身につけた、といえるかもしれません。ここで示されている鳥が、個人の希望や自由の象徴だとすると、自分らしいのびのびとした感性を、自身の手で餌をあげることで、育てているともいえそうです。"],["リングに上がる拳闘士","一途な情熱で何事も自分の手でやり遂げる人","拳闘士というのはボクサーのこと。彼らは日々の努力を重ねて、力をつけていき、自分自身を信じてリングに上がり、みずからの手で欲しかった勝利を勝ち取ります。牡羊座の守護惑星は火星ですが、これは自分自身の力を最高潮にまで発揮させる働きがあるでしょう。火星が正しく使われていると、理想の自分に、自分の力で近づいていくことになります。この火星の働きが充分に高まって、あらゆる成果を自分の手で勝ち取りにいこうとするエネルギーの満ちた状態だといえるでしょう。"],["あらゆる欲望を満たす庭へと続く門","自分の願った通りに世界が動いていく人","ひらかれた門をくぐり抜けると、そこはありとあらゆる欲望が満たされる庭でした。そんな昔話のような、おとぎ話のような、素敵なサビアン・ワードです。"],["軽やかなサマードレスを着た妊婦","自分の望みを自分で叶えることのできる人","ひとりの人間の中で、男性性と女性性とが完全に統合されたことの証として、妊娠したという状態が示されています。自分の中のふたつの極......能動的な側面と、受容的な側面とを自在に使いこなすことで、自分自身の手で望んでいるあらゆる充足を手に入れることができる人だといえるでしょう。そこで何か特別な無理をする必要はなく、あくまで自然体で「こうなったらいいな」と思い描いた理想の姿を、みずからクリエイトすることのできる資質があるかもしれません。ロマンティックな空想をすることを好み、いつもあれこれ思いをめぐらせている人もいるでしょう。"],["吹き込んだ風によって豊饒の角を持つコーヌコピアの形となった開かれた窓のカーテン","内なる充足を満たすことをめざす人","コーヌコピアというのは、ギリシア神話に登場するアマルティアという女性の物語を由来としています。アマルティアは、のちに全知全能の神となるゼウスの育ての親。ヤギの乳を与えながら、ゼウスを育てたといいます。大きく成長して立派な神となったゼウスが、そのときのヤギの角を折って、アマルティアに与えたものがコーヌコピアといわれています。彼女が望んだものがなんであったとしても、手に入るという豊饒のシンボルです。"],["ふたつの領域で経験を獲得する可能性のある男性","異質なふたつの世界を同時に体験する人","ここでいうふたつの領域というのは、現実の世界と虚構の世界。物質的な世界と、精神的な世界。目に見えるものと、目には見えないもの。そういった対比です。その異なるふたつの世界を両方とも体験したい、そのふたつの世界を同時に生きてみたい、という欲求が湧き上がってくるかもしれません。直観力が強いので、この世界が裏と表で相互に支え合っていることが理解できるのでしょう。両方に属することによって、逆側の世界を互いに強化できるという相乗効果も得られます。"],["抱えきれないほどの贈り物を所有する男","あふれる才能でさまざまなことにチャレンジする人","英語の『gift』という単語には、贈り物だけではなく、天性の才能、特別な能力という意味が含まれています。そこにはいわゆる、第六感ともいえるような直観や、目には見えないものを感じ取る感受性も含まれているでしょう。"],["想像を通して取り戻された失われた機会","成功と失敗を繰り返して大きく成長する人","ひらめきと直観力が非常に際立つ人です。やる気と活力も抜群に高まって、人生におけるさまざまなことに対して、チャレンジしていこうとする気概が満ちやすいでしょう。"],["期待に応えられなかったパフォーマーと向き合う落胆させられた大聴衆","まわりがどうであろうとも自分の道を貫く人","本人の力量とまわりからの期待にズレが生じるという体験を示しているサビアン・ワードです。牡羊座の目的は他の誰とも異なる自分だけのオリジナルな生き方を構築することにあります。親からの期待、先生からの期待、上司から、恋人から、配偶者から、子供から、友達から......わたしたちを取り巻く世界では、さまざまな人たちが自分の願望を身近な関係性のなかに投影し合っています。だけど、ここでは、残念ながら、その期待には応えられない、ということが示唆されているでしょう。"],["天球の音楽","自分を十二分に生きることに喜びを感じる人","このサビアン・ワードが指している「天球の音楽」とは、宇宙そのものの象徴です。地球上のすべての生きとし生けるもの、そして宇宙で息づいている、ありとあらゆるものが、それぞれの波動を発していて、それが重なり合い、共鳴し合って、大きなひとつの世界を作っている......ということを指しています。"],["アヒルの池とその子供たち","自分にふさわしい環境と生き方を知っている人","アヒルの池にアヒルの親子が暮らしています。「みにくいアヒルの子」の物語では、アヒルの群れの中に混ざってしまった白鳥の子どもが、やがて大きくなると、白鳥としての自分の生き方を取り戻す、ということが描かれていました。アヒルの子はアヒルの池に、白鳥の子は白鳥の湖に。"],["清らかな山の小川","生まれついた環境の中で自分を磨き上げる人","牡牛座は自分の生まれ持った資質を才能として現実世界の中で開花させていき、自身の手で心地よく豊かで安定した生活を送ることを目的とした星座。ひとつ前の牡羊座では、自分の可能性をさまざまな角度から切り拓いていきましたが、牡牛座ではそれをいよいよ実践的に活かしていく段階に入ります。"],["激しい雷雨","さまざまな可能性を目覚めさせて生きる人","激しい雷雨が人生の中で時折やってきて、その人にとても強い目覚めと啓示を与えるかもしれません。この雷雨とは、内なる資質を目覚めさせるための激しい一撃。"],["クローバーの花が咲く芝生へと向かっていく自然な歩み","ナチュラルに心地よい人生を楽しめる人","牡牛座という星座の目的は、現実の日常の中で心地よく好きなものに囲まれて、悠々と自分らしい生活を送ることにあるでしょう。身体で感じる心地よさ、生きる歓びがテーマの星座です。"],["虹の終わりにある黄金の壷","Rainbow』というのは、英語表現のひとつで「夢のような幸運」とか「思いがけない大金」といったことを示しています。表現の元になっているものは昔話にある「虹のふもとに到達できたものは、黄金の壺を見つけ出すことができる」ということからきています。しかし実際には誰も虹のふもとへたどり着くことはできないことから、もしそこに着くことができたら「ありえないような幸運に恵まれる」という表現として使われているようです。","虹は七つの色を含んでいますが、これをチャクラに対応させるとすべての色となるでしょう。そこから、すべてのチャクラを使いこなしている状態といえるかもしれません。意識の深い根っこの部分と身体との調和がとれて、活力がおのずと湧き上がり、人生全般に富と豊かさがもたらされると予感されます。"],["開いた墓にいる未亡人","みずから新陳代謝をうながして若々しい感性を保つ人","どんなものでも、いつかは終わるときが必ずやってきます。すべてのものは変化していき、若さを保ち続けることも、若いときと同じ感性を維持し続けることも、楽しい時間を永遠にキープすることもできません。変わってほしくない、とどまっていたい、なくならないで欲しいと願っているあいだは、いつも、いつかは失うということを恐れていなければならないでしょう。"],["深い峡谷を横切るカンチレバー橋","可能性を広げるために他者と関わろうとする人","ふたつの高い山のあいだに、深い峡谷があります。ここでいう山というのは、ひとりの完成された個人を指しています。ふたつの山が差し向ってそびえ立っているというのは、独立した個人と個人が、おたがいに干渉しあわずにそれぞれ自分を貫いているだけ、といえるでしょう。"],["祖先から受け継がれた井戸にいるサマリア人の女性","絶望的な状況において大逆転のチャンスをつかむ人","このサビアン・ワードに書かれているサマリア人というのは、ユダヤ人とのあいだに民族的な確執があり、ユダヤ人から差別的に見られていました。"],["雪に覆われていない土地にあるソリ","未来に対して保険をかけて備える人","まだ冬がやってきていないにも関わらず、すでにソリが準備されています。いまはまだソリが必要なタイミングではありませんが、やがて来たるべき時期にソリが必要とする日がくることがわかっている、ということが、ここでのポイント。用周到さを示していますが、それは逆にいえば、これから未来に続いていく流れを見越していて、必ず要するであろうものを理解できる能力が備わっているといえるでしょう。"],["完璧に飾りつけされたクリスマス・ツリー","内側に豊かな価値を持つことでどんなときでも動じない人","クリスマスのシーズンは1年で夜がもっとも長くなる冬至に近く、本格的な冬の寒さが厳しくなってくる時期。外はとても寒くてつらい季節だけれども、部屋の内側は煌々とした暖炉が暖かい輝きを放ち、その前に、美しく完璧に飾り付けのなされた豊かなクリスマス・ツリーが飾られている......そんな光景が見えてくるサビアン・ワードです。"],["赤十字の看護婦","安心できる環境の中でより多くの人たちに献身する人","個人的に身につけた能力を自分のためだけに使っていても、それはやがて限界が見えてくるものです。個人的な満足を満たすための能力でしたら、そんなに大きな働きをしなくても、人はそこそこの充足を得ることができるでしょう。"],["自分の庭の花に水をやる女性","内なる喜びと感受性を育み、充足した日々を送る人","ひとりの女性が自分の家の庭の花たちを、丁寧に大切に慈しみながら育てています。ここで水をやるのは、あくまでも、自分自身の庭の花。個人的な欲求から生じる美意識や自己愛といったものを、時間をかけて大切に育てていく姿が描かれたサビアン・ワードといえるでしょう。"],["ウインドウ・ショッピングをする若いカップル","高い感性を活かして積極的に社会と関わることを求める人","カップルが街で仲良くウインドウ・ショッピングしている姿が描かれたサビアン・ワードです。ここでいうカップルというのは、個人の内側にいる男性性と女性性のカップルといえるでしょう。女性性は自分自身の感受性や美意識を心の中で豊かに育んでいくことを求めていきますが、一方で男性性のほうはパッと見てわかりやすいようなカッコいい持ち物やステイタスや活躍する環境といったものを求めるかもしれません。"],["重い荷物を運んでいるポーター","多くの社会的欲望を抱き、実現するべく奮闘する人","ポーターが一生懸命に運んでいる重い荷物の正体は、みずからが求めて欲したものたち。さまざまな欲望を社会に投影すると、それらを得るために、多くの代償を支払うことになるでしょう。多くの美しいものが欲しければ、たくさんのお金を稼ぐ必要がありますし、住宅ローンや車の購入ローンを組んでも然り。社会的地位を求めれば、それを獲得して、維持するために、多くの責任を果たしながら働く必要があるでしょう。"],["ビーチの波打ち際で貝殻を探して遊ぶ子供たち","自分にとって快適な心地よいペースとやり方を重視する人","ビーチの波打ち際で遊んでいる子供たちは、そこが海の中で最も楽しく安全に過ごせる場所だということを知っています。もっと砂浜のほうへ下がってしまうと貝殻を見つけることができなくなりますし、もっと深くまで進んでしまうと高い波に巻き込まれる危険が生じます。"],["粋なシルクハットで頭を覆って、非常な寒さの嵐に勇敢に立ち向かう男性","どんな状況であっても欲しい成果をあげることのできる人","非常に厳しい寒さの嵐が吹きすさぶような状況におかれていたとしても、カッコいいシルクハットをかぶって、立ち向かっていこう!!というサビアン・ワードです。ここでいう、非常に厳しい寒さの嵐というのは、現実世界における世間の厳しい環境やプレッシャー。"],["生徒に興味を持たせることに失敗した老いた教師の伝統的な知識","新しい知的体系を創り上げることができる人","ここでいう伝統的な知識というのは、長いあいだ時間をかけて積み重ねられてきたもの。情報量が非常に豊富ですが、繰り返し使われているうちに、どうしても紋切り型になってしまいやすい、というところがあるでしょう。どこか惰性的なパターンが生じると、それは単に記号として繰り返されていくに過ぎず、教科書を丸ごと暗記するだけの授業には、生徒が飽き飽きとしてしまいます。"],["剣とたいまつの象徴的な戦い","内なる葛藤から新しい道を創り出す人","このサビアン・ワードの『剣とたいまつの戦い』というのは、自分自身の内側で起こっている摩擦を示しています。摩擦のひとつは、自分の中にある「新しいものを取り入れて、革新していきたい気質」としての剣と「これまで培ってきた知識や技術ややり方を大切にしながらやっていきたい」という伝統派のたいまつとの葛藤。もっと実際的で現在の流れに合った新しいものを求めている反面、これまでやってきて慣れ親しんだものも大事にしたいという気持ちもあり、このふたつをどうするか、考えさせられることがあるでしょう。"],["部屋の開いた窓を通して古いバッグを虫干ししている女性","自分自身を定期的に新陳代謝させる人","女性のバッグの中には、その人の大切なものがたくさん入っています。それがないと落ち着かないもの、安心できないもの、失ったら困るもの、自分にとって大切な価値のあるもの......。"],["海から浮上している新しい大陸","繰り返し鍛錬することで進化していく人","これまで何もなかった大海原から、新しい大陸が浮上してくる......そこはまだ誰にも汚染されていない純粋な清々しい大地であり、まだ何も複雑化されていない単純なありのままの土地が広がっているでしょう。"],["空を横切るように流れている翼の形をしたひとにぎりの雲","あふれる想像力と直観に満ちたクリエイティブな人","雲は常に動き続け、変わり続け、ひとときも同じ形をしていることはありません。その時々でさまざまな形を作っているようにも見えるし、あるいはふいに何かを知らせるメッセージや啓示のような印象をもたらすこともあるでしょう。それらは、クリエイターとしての感性を刺激して、なにかを創り出すためのさまざまなヒントを与えてくれることがあるかもしれません。"],["開いた本をさしている指","さまざまな物事からヒントを見つけ出す人","多くの知識が詰まった本を目の前に置いて、なにか知りたいことを思い浮かべ、パッと本を開いて、ある部分に指をさし、たまたまそのさしたものを知りたかったものの答えとして読み解いてみる......。世の中にある卜占とは、偶然に生じたものを象意として、世界のさまざまなことを読み解く手法です。占星術も天の星にわたしたちのいろいろに意図やおこないを投影して、紐解いたものだといえるでしょう。"],["荒れた水の上を飛ぶ白い鳩","人々に強い影響を与えることのできる人","荒れた水の上を飛ぶ白い鳩といえば、ノアの箱舟の神話です。大洪水のあとで、しばらく経って空模様が落ち着いた頃、最初にカラスを解き放ったけれど戻ってこなくて、更にしばらくしてから白い鳩を放ったら、オリーブの実を加えて戻ってきました。"],["貴重な宝石で充たされた宝石店","みずからの価値が充分に高まって勝負する人","宝石店には磨き上げられて装飾の施された貴重な宝石がたくさん集まっています。ここで磨き上げられて、美しく飾られたものは自分自身。自分の中にあった資質を育てていき、しっかりと磨いた結果として、社会で十分に勝負できるほどの価値となったことが示されているのでしょう。"],["ベルトから頭蓋骨を下げて馬で勇ましく駆けるインディアンの戦士","強いこだわりを貫いて戦果をあげる人","自分のこだわりや価値を守り抜くためには時々それを制限したり、否定したりするものとの対立が避けられない......というサビアン・ワードです。牡牛座が自己価値を高めて、自分なりの技術や知識の解釈を強化すると、どんどんこだわりが強くなり、それは対外的にも発揮されていくことになるでしょう。そうするとどうしても既存のものとは相容れない要素が出てきたり、人から求められることに対して自分なりのやり方でしか応えられなかったりすることが起こり得ます。"],["広大な公共の公園","のびやかに持ち前の能力を発揮して愛される人","公共の公園というのは社会の財産。その地域のコミュニティに所属している人であれば、誰でも自由に出入りして、利用することができるでしょう。"],["恋人にセレナーデを聴かせる甲斐甲斐しいスペイン人の男","十分に高まった技能でwin-winの関係を創る人","恋人にセレナーデを歌って聴かせることができるのは、男性がそれをするだけの能力を十分に身に着けているからといえます。また、男性は自分自身の才能で恋人の気を引こうとしていますが、それは彼自身の個人的な欲求といえるでしょう。"],["通行する人々に部族の工芸品を売るインディアンの老女","シンプルな形の中に自分の道を見出す人","個人の持っている能力や技術が最高に高まって、それは外の世界で流通し、勝負できるだけのものとなりました。そうであるのと同時に、その技術はその道の本流ともいうべき、最も伝統的な形へと回帰していきます。"],["『人生の変化』を経て新しい恋を体験する女性","ステージを上がり続けて魅力を大いに発揮する人","やっていることが停滞してきたり、古くなってきたり、重荷を感じてきたり、十分に自分らしさが活かせなかったりすると、一新して、違うことを始めたくなるかもしれません。リセット願望といえるかもしれないし、チャレンジ欲求であるともいえるでしょう。思いきって古巣を飛び出すことで、新しい経験、新しい恋が待っているかもしれない......そんな予感を彷彿とさせるでしょう。"],["テーブルで仕事しているふたりの靴修理職人","自分の内側にあるものを変化させて生み出すことのできる人","靴というのは外の世界へ出かけるときに履くもの。それは外の世界と渡りをつけていくための知識や技術や手法などの象徴といえるかもしれません。"],["古い城のテラスの上をパレードしている孔雀","持っている可能性のすべてを開花させて充実して生きる人","古いお城はいま住んでいる当人が建てたものではなく、古い時代を生きたその家の先祖が建てたものでしょう。わたしたちが自分の能力を高めて、大いにその価値を活かし、社会で活躍を果たしたとき、その背後には同時にさまざまな恩恵も存在しています。その能力はわたしたちが祖先から受け継いできたものですし、それを使いこなすことができるのは、活躍の場としての円熟した社会がそこにすでにあるためでしょう。"],["海の中の不思議を明らかにするガラス底ボート","起こっているさまざまな出来事を楽しむ人","海の中というのは陸上からは計り知れない不思議な面白さに満ちあふれています。また海は人の心や感情、集合体のシンボルであるともいえるでしょう。"],["ひそかに暖炉の前の靴下を満たしているサンタクロース","必要なことを啓示のように受け取る人","クリスマスの夜、暖炉の前には靴下が吊るされていて、そこには子供たちの純粋な夢やワクワクした期待が詰まっています。それをこっそりと夜中に靴下の中を満たしているサンタクロースは、子供たちの夢を実現させるために実存しますが、決して正体を見ることのできない存在でもあるでしょう。"],["パリのテュイルリー庭園","美しい言葉と表現にこだわりのある人","パリ一区にあったテュイルリー宮殿は計算し尽くされた秩序に基づいて、シンメントリーに形作られています。王族たちが贅を尽くして暮らしたその宮殿は、現在では焼失してしまいましたが、その庭園のみが残って、当時の面影を伝えているでしょう。庭園のいたるところ、隅々にまで整然とした形式美が行き渡り、きっちりと人の手によって手入れされて美しさを保っています。"],["クリスマスの古い記憶を呼び起こすヒイラギと宿り木","古い知識や情報に興味を抱いて学ぶ人","宿り木は、ほかの樹に寄生して、その栄養を吸い取って成長する植物です。その不思議な形態を見て、古代のケルト人たちは、宿り木には復活や再生の秘密を司る不思議な力があると信じていました。そのため、海外ではクリスマスの時期になると宿り木を玄関に吊るして、復活と愛の力をそこから得ようとする習慣があるそうです。"],["行動することを呼びかける革命的な雑誌","何にもとらわれない思考の自由さを持つ人","双子座は個人の知性の可能性を存分に働かせることを目的とするサイン。そのためには、ひとつの価値観や物の見方に縛られていると可能性がグンと狭まってしまいます。双子座にとっては意識がひとところに留まらず、いつでも自由に内外を出入りしている状況が望ましく、そのためにさまざまな制約を乗り越えようとするでしょう。"],["油田を掘っている労働者","自分の可能性を広げるための努力を怠らない人","油田を掘るためには地下の深いところへ潜って、アクセスする必要があります。油田を掘るという行為は、自分自身の未知の領域や深層心理に働きかけて、そこにある才能や可能性を発掘しようというアクションの顕れかもしれません。油田を掘るのは一攫千金を狙うような一面があるでしょう。ありきたりの知識や能力では飽き足らず、より深いレベルの能力を開発して、使えるようにしたいという欲求があるのかもしれません。"],["壮大な木々の影にあるバケツとロープを兼ね備えた井戸","多くの知恵を学び、それを惜しみなく分かち合う人","壮大な木々は樹齢も高く、わたしたちの世界をずっと見守り続けてきた長老的な存在です。そこにはたくさんの知恵と経験とが含まれているでしょう。木はわたしたちの体系づけられた社会を示すシンボルであると同時に、人間の脳内のシナプスとよく似たシンボルであり、人間たちが古代から発展させてきた豊かな叡智と通じるものがあるかもしれません。"],["工場を囲む興奮したストライカーたち","不公平な環境に対して毅然と立ち向かっていく人","労働者がストライキを決行するのは、自分たちの置かれている環境におおいに不満があるときでしょう。自分たちのしていることに対して、得られるものの物足りなさや、報われなさがあると、それは不平不満となって、日に日に募っていきます。"],["矢で満たされた矢筒","一途に志した道をマスターする人","弓を構えて矢を射るときは高い集中力を必要とするでしょう。少しでも心が乱れていては、矢が思わぬ方向へ逸れてしまい、標的に当てることはできません。したがって矢を射るときは集中すると同時に、心の中のエゴイスティックな部分をグッと抑えるような精神性が求められるでしょう。"],["急降下している飛行機","予定調和を裏切って、みんなを驚かせる人","地上に存在する、あらゆる物は重力の影響を受けて、大地に留まります。この重力を司るものは山羊座であり、社会的な秩序やルール「こうあるべき」という規範を重んじるサイン。地上にいるわたしたちは、多かれ少なかれ、この影響を受けて、ルールを守り、暮らすことになるでしょう。"],["開拓者に新しい経験の機会を提供するために新しく開かれた土地","新しい知的領域をみずから開発する人","ひとつの型にハメられたり、押し付けられたりすることを嫌い、いつでも自由でいることを望むのが双子座の習性。決まりきった仕事のパターンや「こういう風にいるものだ」と習慣化された思考回路から抜け出るために、あえて新しい経験をどんどん増やして、柔軟さを養っていこうというのが、このサビアン・ワードです。「新しく開かれた土地」というのは、まだ未開発で手つかずの自分の脳内の領域を指していて、それを切り拓くために、新しい経験を積み重ねていこうとするでしょう。"],["都市で独立するために戦う黒人の少女","古いパターンから解き放たれようと奮闘する人","サビアン占星術が地上にもたらされた1925年は、まだまだ有色人種に対する差別が各地ではびこっている時代でした。これはある種のパターンであり「こうあるべき」「これはおかしい」と定められた古い慣習や考えに対して、激しく抵抗していく様子を示してもいます。"],["コンサートで演奏している有名なピアニスト","みずから率先してみせることで人々の心を奮い立たせる人","ピアニストがコンサートで大勢の観客を前に、その腕前を披露するに至るまでのあいだ、とてつもなく長い道のりがあったことでしょう。ただ資質があるだけでは飽き足らず、ひたすらひとつの道を極めに極めた人だけが辿り着く達人の境地。常人にはとてもできないような厳しい道を歩き続けて達した人だからこそ、その演奏は人々の心に響き渡るのでしょう。"],["物理的な空間と社会的な区分とに橋をかけるためにテレパシーで会話するふたりの男性","より大勢の人たちに多くの情報を伝える人","双子座はコミュニケーションの伝達と関わるサイン。あらゆる動物は相互にコミュニケーションをとって、さまざまな物事を伝達し合いますが、人間は言語を習得したおかげで、より詳細な情報を多彩に分かち合うことができるようになりました。その恩恵で人間は大きな社会を築き、ひとつの目的を共有したり、さまざまな情報を伝え合ったりすることができます。"],["お互いの知識を交換するために会話をしているふたりのオランダ人の子ども","多彩なものの見方を広げようとする人","オランダという国はヨーロッパの中でも昔からさまざまな思想を持つ人たちや、他国では住むことのできなかった人たちを受け容れてきたという背景があるそうです。これは多様な人種や思想やその価値観をオープンに歓迎して、活発にお互いを知ろうと交流していくようなサビアン・ワード。"],["そうなった理由をドラマティックに熱く語る女性活動家","自分の思いを伝えることで人々を動かしていく人","ごく身近なありふれた環境の中で、どうにかしようとしてもうまくいかないことや、どうしても納得できないこと、個人の自由がどんどん奪われるようなことが起こると、人は『こんなことはおかしい!!』と感じるようになるでしょう。人がなにかしらの信念を抱くには、そこに至るまでの過程や原因が必ずあるはずです。そして自分の抱いている信念が誤ったものではなく、普通にあるものなのだと確信するためには、他の人たちも同じような思いを持っているのだと確認する必要があるかもしれません。"],["成熟した思想家のものに変化する健康な若者の頭","何事もじっくりと観察して考える人","若さというものは未熟でありながら、時にとても素直で、元気いっぱいのパワーにあふれ、情感がはちきれんばかりに身の内からあふれ出すようなところがあるでしょう。一方で成熟した思想家は、その身の内に多くの経験と知識とを有しているがゆえに、いつでも冷静沈着。性急に答えを出したり、反射的に感情で反応したりすることはほとんどないかもしれません。"],["アメリカの都市で母国語を話すふたりの中国人男性","自分の世界観をグッと深く突き詰めていく人","アメリカは多種多様な人種で構成される坩堝の国。特に大きな都市にはさまざまな人種の人たちが集まってきて、おたがいのことを理解し合うために、共通言語である英語を使ってコミュニケーションをとっていきます。"],["伝統的な智恵を明らかにする大量の古代の書物","人々の知恵がどこからやって来たのかを探求する人","古代の書物には、その土地に住んでいた民族の見つけ出したさまざまな知恵が記録されているでしょう。別の書物を紐解いたなら、それはまた別のある民族の伝統や文化や知恵が記されているかもしれません。"],["モダンなカフェテリアに飾られた豊富な食べ物やさまざまな地方の製品","とにかく多方面から知識や情報を集める人","あるカフェテリアに、その地方の特産品だけではなく、各地から流通してきたさまざまな製品や食品がたくさん並べられています。これは双子座のカフェテリアですから、そこに集まった品々は各地域の情報や知恵などに相当するかもしれません。"],["激しい労働者のデモ","旺盛な知識欲があふれかえっている人","現代はまさしく、世の中のいたるところに情報があふれかえっている情報化社会です。昔であれば、じっくりと時間をかけて丁寧に師匠から伝授されてきたものも、ゆっくりと腰をすえてひとつひとつマスターしていくものも、いまやネットで検索すればあらゆる情報やコツがすぐに見つかる時代となりました。バラエティ豊かなさまざまな知識や情報や世の中にあふれてくると、その価値のひとつひとつが低下していきます。"],["収穫祭で踊っているカップル","左脳と右脳をバランスよく使いこなす人","農村部でその年のさまざまな農作物が豊かに実ったことをみんなでお祝いする収穫のお祭りで、男性と女性のカップルが踊っているサビアン・ワードです。"],["高い木の巣の中にいる三羽の雛","さまざまな知識をわかりやすく体系づけることのできる人","サビアン・ワードで描かれている高い木は、ある種の社会的な体系を象徴すると同時に、頭の中にあるシナプスの構造も示しています。鳥はさまざまな情報を遠くから遠くへと伝達する役割を果たしますが、いまここでは雛であり、ここからさまざまな知的体系を育てていこうとしているのかもしれません。"],["凍っている村の池でスケートしている子どもたち","どんな状況にも臨機応変に適応できる人","池の水が凍ると、本来の池としての機能が果たせなくなり、使える用途が限られてしまうでしょう。しかし、ここではそれを逆に利用して、子どもたちがのびのびとスケートを楽しむ姿が描かれています。環境の中の限られた条件下に置かれても、自分なりの楽しみや方法を見つけ出す能力と関係しているかもしれません。"],["大きなヤシの木を整えている庭師","知性を偏りなく成長させていく人","わたしたちの思考というものは、ある一定の環境下におかれると、いつも同じようなパターンで働くようになります。それはある種のストレスや軋轢を最低限に抑えるための工夫ともいえますが、あまりにも同じような判で押されたパターンを繰り返していると、知性の成長が止まってしまうでしょう。"],["冬空の下で霜におおわれた木","シンプルな物事の本質を追求する人","木は自然のサイクルにまかせておくと、どんどん豊かに生い茂っていきますが、やがて晩秋がやってくると、ばっさりと身につけた葉をすべて落とし、枝も最低限の長さにまで自然と絞り込まれていきます。そして寒い冬の季節のあいだ、その姿のまま、ジッと耐えて、その表面には霜がおおうことがあるでしょう。そのような木の姿を示しているサビアン・ワードです。"],["森の中の部族のキャンプから出てきているジプシー","変わり続ける環境で可能性をひらく人","ジプシーは一か所に定住することなく、各地を転々としながら流浪を繰り返していきます。このサビアン・ワードのジプシーは森の中に安住するという道を選ばずに、あえて安定のない刺激的な環境に身を置くことを選んだのでしょう。そうすることで、いつも世界に対して意識がひらき続けることになり、変化に対して柔軟に対応させられるような生き方をすることができます。"],["過度な負債を抱えて破産した個人に再びやり直す機会を与える社会","いつも自由で軽やかでいることで進化を続ける人","双子座はいつでも軽やかで自由にパッとひらめいたアイデアを試してみたり、気になったところへ出かけていったりして、楽しく過ごしていたい星座。過剰な責任や過度の期待を背負わされることは、個人を縛り付ける重荷となって、自由と軽やかさを奪うことになるでしょう。"],["春のはじまりを告げるモッキンバード","世の中の流れや雰囲気を察していち早く伝える人","モッキンバードは和名『マネシツグミ』と呼ばれる鳥で、聞いた音がなんであっても真似して鳴くことができます。鳥は風の象徴でもあり、自由に飛び回って情報を伝達する役割があるため、スピーカーとしての働きがあるでしょう。"],["大きなビーチの群衆の前でパレードする水着の美女たち","新しい流行を創り出して人々に共感させる人","双子座は世の中や身のまわりで起こっていることを敏感にキャッチして、それを言葉に置き換えて、多くの人々に伝えることを目的としたサイン。情報伝達と関係しています。"],["古い旗を降ろして新しい旗を掲げる船の船員たち","土地の文化や伝統を新しい形で継承する人","牡羊座・蟹座・天秤座・山羊座という活動宮は、それぞれ春分・夏至・秋分・冬至という季節の変わり目に該当するサイン。これらは、これまでの流れが一旦終わって、まったく別の新しい流れがはじまる切り替わりポイントとなるでしょう。"],["広大な陸の上に浮かぶ魔法のじゅうたんにのった男性","生まれ育った土地やルーツの影響を色濃く受ける人","魔法のじゅうたんに乗ると、住んでいる土地や国の全体を見下ろすことができるでしょう。俯瞰的に全体を把握する、仕組みを理解するといったことと関係するサビアン・ワードですが、それは蟹座の特徴である『伝統や文化や歴史を通じておこなわれる』ということ。個人のオリジナルな視点で世界をとらえるのではなく、自分の生まれ育った地域で当たり前のように根付いている価値観や考え方を用いて世界を理解しようとする試みです。"],["毛深い鹿をリードするファーをまとった男","環境に馴染もうとみずから努力する人","蟹座は、牡羊座からはじまった流れを断ち切って、個性あふれる個人から、集団と同化する個人を強化するプロセスに入るサインです。蟹座に入って間もないここでは、同化しようと試みる個人と、しかし馴染みきっていない違和感との葛藤が生じることがあるかもしれません。"],["ねずみと議論しているネコ","他者を心地よく寛がせることのできる人","ねずみとネコは本来の力関係でいうと、相容れない性質があり、通常ネコはねずみを見つけると追いかけていこうとするでしょう。"],["踏み切りで電車に破壊された車","個人の意志が集団のために働くように昇華される人","車は個人が単独で乗りこなすもので、自由に行き先も運転の速度も変えることができます。それに対して、電車は行き先も速度も決まっていて、同時に大勢の人たちを乗せるもの。踏切で電車に破壊されるというサビアン・ワードは、小さな個人の意志が、大きな集合体に巻き込まれていくこと、個人が全体に取り込まれることを示しています。"],["羽根で巣を飾っている猟鳥たち","献身的に心地よい環境を整える人","猟鳥たちが、みずからの羽根で巣を飾るのは、そこを心地よい場所にするためでしょう。生活の母体である家を心地よくすること。そこに根付いて、身体を休め、力を養うために、ていねいにホームを整えること。"],["月明かりの下で踊っているふたりの精霊","目には見えない世界と特別なつながりのある人","サビアン・ワードに示されている通り、月との親和性が非常に高まる人です。そもそも蟹座の守護惑星は月であり、わたしたちの目には見えない世界とのつながりを強化しますが、ここではそんな世界で働いている力を受け取る能力がクローズアップされるでしょう。"],["人間の服を着てパレードをするウサギたちのグループ","模倣することを通して集団に馴染む人","ウサギは野性的であると同時に、月に住んでいるといわれている動物です。蟹座の守護惑星は月ですから、ウサギは蟹座とも縁のある動物ともいえるかもしれません。"],["魚を捕まえようと池に屈みこんでいる幼い裸の少女","人の心や自然のめぐりに純粋な興味を抱く人","幼い裸の少女は、まだ無垢で純真な飾らない心を持っている存在です。わたしたちの、大人になろうとも、決して失われることのない、ハートの純粋さを示しているのかもしれません。"],["カットする最初の段階にある大きなダイヤモンド","自分の内にある感受性に磨きをかけて表現する人","わたしたちは日常的に自分の内側でたくさんのものをキャッチして感じています。しかし、自分の内側で起こっていることを他者に理解してもらうためには、それを表現する方法を身につける必要があるでしょう。"],["有名人を風刺しているピエロ","パターンを鋭く見抜いて、そこから解放する人","わたしたちの心は、その環境のなかで、みんなが当たり前にしていることを模倣するという特徴があります。"],["偉大な教師の生まれ変わりであることを示すオーラを放っている赤ちゃんを世話している中国人の女性","あふれる愛情で人の最善の可能性を育てる人","赤ちゃんの放つオーラが「ただものではない」ということに気づいていながら、中国人の女性がその世話をしています。サビアン・ワードで「中国人」という単語が出てくると、それは東洋的な精神性の高さや、ていねいさと関係しているでしょう。"],["研究のために差し出されたとても目立つ親指を持つ手","自分で信じた道を貫き通す人","親指はお父さん指であり、強い意志を押し出していくような、大きな可能性を秘めている指。その親指がとても強調されている手が、学びをより深めるために差し出されています。何事に対しても、自分なりの意見や価値観をしっかりと持っている人だといえるでしょう。"],["北東の広く暗い空間に顔を向けている老人","心の内に深く潜り、宇宙の真理を求める人","北東というのは鬼門にあたり、これは霊界や異界への入り口にあたります。そして霊界や異界は、わたしたちの存在や宇宙の根源とつながっているでしょう。"],["大きな宴会のあとでゲストたちがリラックスしている豪華なダイニングホール","人々を結びつける力を持ち、日々の生活を豊かにしていく人","とても現実的で豊かさのあふれる生活を彷彿とさせるサビアン・ワードです。蟹座は共同体とのつながりや結束を強めるサインですが、その絆は共に協力しあって生活することによって育まれていくでしょう。"],["古代の書物を頼りに目の前にあるマンダラを研究している男","内なる宇宙の真理を紐解いていく人","マンダラというものは、この宇宙全体がどのような構造で成り立っているのか、あるいは人の心がどのような階層構造を持っているのか、はたまた目では見えない神々の世界がどのように成り立ち、作られているのか、といったことを図で示したもの。これを研究して紐解いていくことは、この宇宙や世界や人間の心や生き方がどのようにできているのか、という仕組みを学ぶことに通じるでしょう。"],["原種から生じる多層的な可能性の開花","あらゆる可能性を試しながら、自分を理解していく人","地球上に存在する、あらゆる動植物も元を辿れば地上に舞い降りた、ひとつの小さな細胞あるいは細菌であったかもしれません。それが他の物質たちと混じり合ったり、光や水や空気に反応したり、海に潜ったり、また陸に上がったりを繰り返しながら、多種多様な種族たちへと発展を遂げていきました。"],["雛たちに与える餌を大地からほじくっている雌鳥","理想を日常のなかで一歩ずつ実現させていく人","母鳥が一生懸命に地面を突っついているのは、子どもたちを豊かに成長させるため。"],["結婚の儀式を執り行っている司祭","人々の絆をつないでいく人","わたしたちの日常生活というのは、基本的に日々同じようなことの繰り返しでできあがっています。"],["セレナーデを歌っているベニスのゴンドラの船頭","自然と土地から支えられ、土地のために尽くす人","ハートの内側に深く潜り、地域や土地の歴史、人の営み、そして星から支えられているといったことを、理屈を超えたところで感じるようになると、自分の身のまわりにある世界のすべてが自分の一部であるように思えるでしょう。本能的に世界中の大自然の営みと自分自身の生命とが同じものを起源とし、同じように息づいていることを理解すると、今度は社会のあらゆる営みと自分自身とがつながっているかのように感じられるかもしれません。"],["オペラ公演で卓越した技を披露する有名な歌手","華やかな魅力を解き放って、社会のなかで活躍する人","オペラの公演を成し遂げるためには、志を同じくする何十人もの人たちで、力を合わせて完成させていく必要があるでしょう。ひとつの大きな目的に向けて、みんなで心を団結させていく必要もあります。出演者たちの感情が観客の心を打ち、揺り動かすため、公演が成功するかどうかは、出演しているひとりひとりの歌手たちの心をつかむ、気持ちの表現にあるといえるでしょう。"],["ヨットを待っている若い女性","社会に対する夢と理想を持っている人","ハーバーでヨットを待っている若い女性は、それがやって来ることを夢見ていて、そこに力強い期待を抱いているでしょう。ヨットがやってきたら、こんなことが起こるかもしれない、あんなこともできるかもしれないと、さまざまな想像力を広げながら、待ち続けているのかもしれません。"],["文学仲間の集まり","社会の空気を読み解き、それを楽しむ人","文学仲間の集まりというのは、文化人の集まりであるともいえるでしょう。その土地の持っている文化を、いまの時代にマッチした形で表現するのが文化人であり、文学者です。"],["南の海の小さな島に漂流した女とふたりの男","理想の人間関係によって支えられた環境を創生する人","自分たちにとっての理想の環境を創り上げよう!!と、現代社会の枠から飛び出して、まったく自由な閉鎖された地域に飛び出した三人です。集団の持っている本質的な力をもっと引き出し、大自然の営みと共鳴するような理想社会をめざして、まずは少数でそれをはじめてみようと試みるでしょう。"],["超越的な力が降りてきたことで影が薄くなる意欲的な男性","見えない恩恵に守られて、より豊かな経験ができる人","意欲のあふれる男性に自分のものではない、なにか超越した世界から力がやってきて助けられる......というサビアン・ワードです。その分だけ、本人の意志の力はすこし抑えられますが、見えないところからの恩恵が大きく働くでしょう。"],["**ラグジュアリーな家の図書室で\\本を読んでいるゲストたち**","洗練された情報を分かち合うことのできる人","蟹座は個人の自我を抑えることで、全体とつながるという試みをしてきました。ひとりで過ごす静かな場所で、この地球とのつながりをハートの内側から感じ、それをすることであたかも自分自身と世界とがひとつであるかのように同一感を得ることができます。"],["高級住宅の集まった渓谷に吹く嵐","自然の流れと共に変化しながら世界を保つ人","わたしたちがどれだけ賢くなり、上質な文化を築き上げることに成功したとしても、自然の脅威はそんなことなどまったく関係なく、わたしたちの創り上げた社会の流れを脅かします。唐突に起こる嵐は、それまでの静かで守られた環境をたちまちのうちに危機的な状況に追い込むでしょう。"],["集まった部族たちに白人の恋人を紹介するインディアンの少女","共同体のなかに新しい風を招き入れる人","これまで当たり前だとされてきた慣習に対して、新しい風を吹き込むサビアン・ワードです。蟹座が脈々と受け継ぎ、築いてきた共同体の価値に対して、積極的に新しい要素を招き入れようとすると働きがあるでしょう。"],["金色の秤で双子の新生児の重さを量っているギリシアの女神","新旧のバランスを上手にとって冷静に現実を渡り歩く人","金色の秤を持った姿で描かれることの多いのは正義の女神アストライア。彼女は人の魂を秤にのせて、嘘をついていないか、正直な選択をしているのか、ということを量ります。"],["アメリカ革命の娘","自分の土地への愛着がとても強く誇りに感じる人","なんだかんだいって、わが国が一番!!というところに落ち着くサビアン・ワードです。"],["野心に駆られて生命力が滾ることで血が昇ってきた男の頭","内側から生命エネルギーがあふれ出している人","人間の持っている根源的な生命エネルギーが炸裂してあふれ出すサビアン・ワードです。"],["おたふく風邪の流行","まわりの人たちの情熱を呼び覚ます人","内側からあふれる好奇心と活力とが、個人を超えて感染力を持ち、まわりへの影響力として広がることを示唆するサビアン・ワードです。"],["長い髪を肩の上に流してノーブラで若い人の服を着ている中年女性","自分のこだわりを貫いて表現する人","獅子座の象徴する生命力が個人の人生にまで流れ込んでくると、当人にいつも若々しいフレッシュな感性を呼び覚まします。肩の上に流した髪とノーブラで若い人の服を着た中年の女性というサビアン・ワードは、まわりからどう見られようとも関係なく、自分のしたいことをする、自由に生きる、という欲求のあらわれ。獅子座は子どものような陽気さと自由さをのびのびと表現することと関係しますが、それが思う存分に表現された状態ともいえるでしょう。"],["遠征ハンティングから持ち帰ったトロフィーのそばに立っている正装した年配の男","自分でやってみた成果を純粋に喜びと共に語る人","内側からあふれ出た生命力で、なにかを表現したり、大きな目標に向かってチャレンジしたりして、その結果として得た成果や経験を今度は仲間たちに見せつけよう!!というサビアン・ワードです。ハンティングの成果として得たトロフィーをみんなに嬉しそうに見せている男性は、自分の能力や経験を誇示しようとしますが、これは人間の持っている純粋な承認欲求と結びつけられるでしょう。"],["深い峡谷に塔のようにそびえ立つ岩のかたまり","壮大なビジョンに情熱を傾ける人","自然の風景は気の遠くなるほどの長い年月をかけて素晴らしい景観を生み出すことがあります。見るものを圧倒するような光景というのが世界のあちこちにありますが、それらはわたしたちの心の深い印象を刻み付けるでしょう。深い渓谷に塔のようにそびえ立つ岩もまた、気の遠い年月のうちに浸食されて作られたのかもしれません。"],["ヒッピー少女と向き合う古風で保守的なスタイルの女性","まわりの流れに合わせながらも独自性を探求する人","内側からあふれる生命力を存分に活かして、自分にしかない輝きを表現するのが獅子座のテーマ。"],["夜空に燦々と輝く星座たち","自分だけの輝きを手に入れようと模索する人","夜空に輝く星座たちは恒常的に、いつも同じ季節に同じ形を作っています。惑星はいつも揺れ動き、移動して、時間の経過とともに変化し続けますが、星座は揺るがなく恒久的な輝きを放ち続けるでしょう。"],["革命的な理想を広めている共産主義の活動家","型にハマらないオリジナルな生き方を模索する人","このサビアン・ワードに登場する共産主義の活動家というのは、現状の定められた社会の制度に対する反骨精神のようなもの。決められた型ややり方に従うのではなく、自由でより普遍的な価値や思想を基盤とした生き方を理想として、それを実践し、また周りに広めようともするでしょう。"],["制御された息づかいで美しい花瓶を創るガラス職人","自分の内側にある思いを情熱的に創生する人","ガラス職人がものすごい集中力で花瓶を創り出しているサビアン・ワードです。自分自身の息づかいで、どのように形作られるのかが変わってくるため、一瞬の気も抜けずに集中して、こだわり、自分の理想とするものを創り出そうとしているのでしょう。"],["太陽の光が一面にみなぎる早朝の露の輝き","自分自身の底力で輝きを見つけ出すことができる人","真夏の早朝に陽が昇る時間帯、あたり一面の草木から滴り落ちる露がキラキラと光り輝いている......という、さわやかなサビアン・ワードです。新しい朝のはじまり。その輝きはとても自然で、無理しなくてもおのずと内から湧き起こり、あたり一面を照らすでしょう。長くて深い夜があったからこそ、このすっきりと爽快な朝を体験できるのかもしれません。"],["巨大な樫の木に吊るされたブランコで遊ぶ子どもたち","社会のなかで自分らしく楽しめる道を求める人","このサビアン・ワードに描かれる大きな樫の木は、社会全体の体系といえるかもしれないし、脈々と受け継がれてきた文化の流れともいえるかもしれません。それらのバックボーンに支えられて、子どもたちが無邪気に遊んでいます。社会の規律に沿いながら、いかに自由に楽しく過ごすことができるか。受け継がれた文化や伝統を組み合わせながら、いかにオリジナリティあふれた躍動感のある遊びを創り出すことができるか。"],["素敵なランタンに照らされた大人たちの夜の芝パーティー","大勢の人たちの注目を集める術を心得ている人","夜の野外でのパーティーには、特別な空間と時間を楽しみたい大人たちが集まってきます。夜の芝パーティーは洗練された大人の社交場。そこでいかに自分らしさをアピールしてみせるのか、より多くの人たちの注目を集めることができるのか、ということがポイントとなるサビアン・ワードといえるでしょう。"],["コテージのポーチでロッキングチェアに揺られている年老いた船長","あらゆる物事を面白おかしく語る人","自宅の玄関ポーチに置かれているロッキングチェアに揺られながら、老いた遠い過去の冒険の数々を回想しているサビアン・ワードです。この船長に若かりし日々にどんな冒険をしたのか尋ねたら、面白おかしく脚色した武勇伝を延々と話して聞かせてくれるでしょう。"],["外への表現の機会を求めている人間の魂","自分の見せ場とそのやり方を心得ている人","内なる生命力が外の世界へとあふれ出して、わくわくする体験を求め始めた獅子座は、あらかじめ「こうだ」と定められた道から離れて、自分なりのやり方や道を模索していきます。自分と真剣と向き合っているうちに、それは次第に洗練されていって、他者に見せていく表現が非常に巧みになっていくでしょう。メリハリのある語り口や、クライマックスに向けて徐々に盛り上げていく演出などを身につけて、他者の目をグッと惹きつける能力が高まります。"],["喝采する人々で混み合った道を通る豪勢なフロートの行列","大勢の人たちを巻き込んで楽しませることのできる人","獅子座の主観に基づいた演出能力や表現力がもっとも輝くサビアン・ワードです。ここより後半の度数になると「どのように見られているのか」という客観が入り込んでくるため、純粋な主観の世界は失われていくでしょう。"],["嵐が終わり、光り輝く陽光に歓喜するすべての自然","いつも穏やかで落ち着いた心を持っている人","台風一過のように波乱の時間が過ぎて、穏やかに光り輝く太陽が戻ってきたことを、そこに最初からあった自然たちが歓迎しているというサビアン・ワードです。自然の存在にとっては、予定不調和の嵐が吹き荒れるよりも、いつでも変わらぬおだやかな日常のほうが安心といえるのかもしれません。"],["讃美歌を歌っている教会の聖歌隊","社会のなかで他者と共に創造性を発揮する人","教会でお祈りを捧げるというのは、クリスチャンにとって日常的な行為です。日本でいえば、神棚やお仏壇の前で手を合わせてお参りしたり、ご挨拶をしたりといった行為に通じるかもしれません。これは日常生活のなかで神さまやご先祖さまとつながる神聖な時間。"],["生徒たちのために実験をする化学者","いろいろな体験を経て大きく変容していく人","獅子座の前半では自分の内からあふれ出そうとする生命力や情熱といったものたちをベースに、創造力や独創性や表現力に磨きをかけてきました。中盤の折り返しを過ぎたこのサビアン・ワードでは化学の実験が取り上げられています。"],["ハウスボートパーティー","自由な生き方を社会のなかで構築していく人","仲間たちを集めて楽しくパーティーで盛り上がろう!!という獅子座らしいお祭り気質のサビアン・ワードです。社会的な義務や制約から離れたところで、自由に楽しくやろうとする姿が描かれるでしょう。"],["ズニ族の太陽の崇拝者","日常のなかにパワーと楽しみを呼び覚ますことのできる人","ネイティブ・アメリカンの一部族であるズニ族は、太古からズニの村に住み続け、部族内のつながりが非常に濃厚で、部族内の儀式についてはとても閉鎖的だといわれています。ネイティブ・アメリカンたちは基本的に、世界を取り巻いている、ありとあらゆる自然を崇拝し、共存している民族。"],["飛ぼうとして羽根をばたばたさせている中毒の鶏","自分のなかの限界を突破しようと試みる人","自分自身の力でいつでも活力を呼び覚ますことが獅子座のテーマ。それができるようになると、今度はその力を使って平凡な日常をもっとエキサイトなものにしようと働きかけることを試みます。内なる精神力、内なる霊的な力を日常生活に招き入れようとする試みは、オカルティックな事柄への興味として表れることがあるでしょう。"],["使命を果たしている伝書鳩","霊的な能力を訓練することで使命のために使えるようになる人","サビアン・ワードのなかに鳥が登場すると、それは霊的な感応力を持った存在として描かれます。目に見えない世界から、なにかしらのメッセージを受け取ることもあるでしょう。伝書鳩はまさにメッセンジャーとしての役割を持つシンボルそのものです。しかも好き勝手にどこかへ飛んでいってしまうことはなく、キチンと訓練されて、必要な人のところへ、必要なものをきっちりと届けることができるでしょう。"],["サーカスで危険な技を披露する裸馬乗りの女","意志の力で卓抜した技をマスターし人々を魅了する人","裸馬という生命体の原石のような火の象徴を乗りこなし、さらにその能力を見せつけることによって、まわりも熱狂させていく......というサビアン・ワードです。サーカスで危険な技に挑んでいる姿を見ると、わたしたちの内側では、その人の内部で起こっているものと同じような高揚感が広がるでしょう。"],["内なる霊性への到達に意識が完全に向けられているため、見かけと清潔さへの気遣いを放置して座っている男","徹底的な集中力で限界を突破していく人","自分の内側にある一点だけに完全に集中していて、他のものをすべて無視している状態が描かれているサビアン・ワードです。悟りを得るためにただ座り、なにが起こったとしても、ただひたすら内観している姿に通じるものがあるでしょう。そのように、ただただ「見ること」だけを続けて、ついにはある境地へと辿り着くのかもしれません。"],["広大で険しい砂漠を横切っている大きなラクダ","過酷な環境に耐えて究極の高みまで達する人","広大な砂漠は太陽の陽射しを遮るものがなく、水もほとんどなく、陽が沈めばグッと気温が下がり、時には砂嵐に見舞われる可能性もあるような、不毛で大変厳しい環境です。しかし、ラクダはその身体のコブの内側に脂肪を蓄えているため、そのような砂漠地帯でも悠々と旅することができるでしょう。"],["激しい嵐のあとの虹","とても難しい道のりを霊的な力で突き進む人","サビアン・ワードに出てくる虹は、神との契約の証として示されるもの。獅子座は自分のなすべきこと、自分の表現したいことを徹底的に自分自身の内側に見出していこうとするサインですが、ここではさまざまな試練や冒険を超えたあとで、ついに自分の魂が求めているものにたどり着くことがあることを予感させます。果たすべき使命のようなものが何かある、と感じるかもしれないし、あるいはそこへ向かわせる霊的な力として、明らかになることもあるでしょう。"],["東の空の夜明けの光","みずからの光り輝きでまわりの人たちを圧倒する人","東の空の夜明けに見える光とは、まさに太陽が昇ってくる新しい朝のはじまりを象徴しています。夜明けは占星術のホロスコープ・チャートにおける上昇宮の配置を示していますが、それは新しい人生の幕開け、再出発のタイミングだともいえるでしょう。自分にしかできない、真にオリジナルの生き方を実践する人生の再スタート、といえるかもしれません。"],["大きな木の枝先に乗り出すたくさんの小鳥たち","ていねいに日常を暮らしながら可能性をひらく人","大きな木というのが、わたしたちのダイナミックな人生そのものだとすると、その枝先に宿る小鳥たちというのは、日常のなかで起こる、細々とした雑事といえるかもしれません。ハレの日、非日常的に、自分自身の力を遡及して、おおいに輝くことも獅子座の壮大なテーマですが、それでもわたしたちの足元には平凡な日常があります。自分の喜びの本質とつながって、理解した人にとっては、何気ない日々のひとつひとつの些事が、楽しくのびのびとしたしあわせに満ちたものとなるでしょう。"],["波のあいだから現れる人間の姿に生まれ変わる準備のできた人魚","ひらめきやイメージを現実的な形として実現させる人","物語の人魚姫は陸の世界に憧れて、人間の暮らしを想像し、さまざまな冒険の果てに、ついには人間として生きることになりました。このサビアン・ワードの人魚は、その人間の姿になる直前の、いまにも波間から上がろうとする姿が描かれています。身体の半分が浸かっている海や、人魚の下半身の魚の部分は潜在意識や想像の世界を表しているのでしょう。"],["開封された手紙","自分で得たものを惜しみなくまわりに分かち合う人","手紙というのはとてもプライベートなものですが、ここではそれが開封されていて、誰でも自由に読めるような状態になっています。"],["肖像のなかで特徴が芸術的に強調されている男の頭","すぐれた観察眼で物事を徹底的に細かく調整する人","まるでピカソの描く絵のように、目に見えているものの一部が大きくクローズアップされている肖像画です。乙女座のはじまりの度数ですが、乙女座は自分と他者との区別をより明確にすることで、その対象と自分自身とを細部まで調整していくサイン。そのためにまず、外から見える印象をしっかりと識別することから始めるのでしょう。"],["景観を見下ろす大きな白い十字架","物事と自分自身を客観的に見つめる人","乙女座のひとつ前の星座である獅子座は、火のエレメントに属するサインで、とことん個人の主観を強調しながら、その生命の輝きをいかに表現するか、ということを探求しました。乙女座は地のエレメントに属するため、客観を育てることで個人の能力を磨き上げ、外の世界を変え得るだけの技術や知識を身につけていきます。"],["ふたりの守護天使","ある型に従うことを通して自分自身の基盤を作る人","地のエレメントに属する乙女座は、主観を抑えて客観を育てていきます。しかしその代償として、自信を失いやすく「これでいいのだろうか」と迷うことが多くなるでしょう。それを補ってくれるのが客観的な「正しさ」であり、ある具体的な成果をあげるためのマニュアルや教義を手に入れることで、その不安定さが落ち着くかもしれません。また、それに追従した結果として、なにかしらの目に見える具体的な成果や恩恵を得られるでしょう。"],["一緒に楽しく遊ぶ白人と黒人の子どもたち","信念を軸にして多くの人とつながっていく人","乙女座は主観を抑えることで客観を発達させるサインですが、主観が欠けることによる不安定さを補うために、なにかしらの外側の基準を採用することにしました。それはある種の「こうあるのが良い」と記された基準ですが、それを規範とすることで精神が安定して、客観的に自分を整えることができます。そして今度はその基準を通して世界を眺めてみると、間違いや不平等さが多くまかり通っていることに気づかされるでしょう。"],["自然の精霊や通常は見えない霊の代理人に気づくようになった男","物の本質に注目して別の角度から異なるイメージを与える人","主観を抑えて、客観を強化する乙女座の観察眼は、どんどん鋭く細やかになっていき、目に見ることのできない意志や願望が、どのようにして形や結果となっていくのか、というところに着眼します。どういう形にどんな名前がつけられているのか、その形がどういう要素で構成されているのか、その仕組みを把握することで、ある物に対する解釈や見方を自在に変えることができるでしょう。"],["メリーゴーラウンド","さまざまな物事に対して応答する能力を育てる人","乙女座は客観性を育てていくことを目的とした星座。客観的にさまざまな物や形を観察した結果、それらを構成しているものを理解できれば、別の見解や異なるイメージを与えられることがわかりました。ここではそれをさらに発展させるために、さまざまな実験をしていくことになるでしょう。"],["ハーレム","対人関係のなかで自分の資質を磨く人","乙女座はみずからの価値を高めるために、外側の世界から自分自身を必要とされる環境を求めます。六番目のサインである乙女座は、自立的に成長していくというよりも、より多くのものを外側から求められて、それに応じることで発展していくところがおおいにあるでしょう。"],["5歳の子どもの初めてのダンスレッスン","物事を動かしている仕組みを理解して体得する人","乙女座というサインは個人の持っている資質を高めて、現実のあらゆる物事に応答できる能力を育てていくことを目的としています。あらゆる物事のしくみを紐解いて理解し、それに別の視点からスポットを当てることで情感を盛り上げたり、ムードを変えたりということができるようになります。演出家としての能力はこれと関係しているでしょう。"],["表現主義の画家の描く絵","個人の感情を客観的に扱い、他とは異なる表現をする人","個人の持っている能力に磨きをかけていき、世の中にその力を使って貢献していく......というのが、乙女座にとってひとつの目的といえるかもしれません。自分のなかでのこだわりを発揮して、そこにどんどん磨きをかけていき、他ではないもの、他とは異なるものを創り出していくというのが、このサビアン・ワードのテーマといえるでしょう。"],["影の向こうを見て、影を超えていくふたつの頭","限界を超えようとしたときに自分の影と出会う人","自分自身の主観的なこだわりをとことん突き詰めていき、客観的に扱えるように整えていくことが乙女座の持っているテーマのひとつです。細部にこだわりのある乙女座は、どんどんマニアックに走っていく可能性がありますが、それを探求していくと、今度は自分自身のアイデンティティを支えている基盤そのものを超えようとするかもしれません。仕事をし過ぎて身体を壊したり、健康に気づかうあまり食べられないものが増えたり、用意周到になり過ぎて恐れが増大したりすることがあるでしょう。細部に入り込み過ぎた結果として、全体としての統合性が失われる危機に陥る可能性というのがあります。"],["赤ちゃんのなかに深い願望を見出す母親とそれに応じる息子","自分で望んだことを絶対に達成させようとする人","本来、親と子は別の人間ですが、親からみると、子どもは自分の創造物。子どもをなかば自分自身と同化した存在とみなし、そこに自身の願望を投影して、その願望通りになることを期待し、その思いを受け取った赤ちゃんが、それに応えようとしているサビアン・ワードです。"],["結婚式のあとで花嫁のヴェールをはずす花婿","自然のサイクルを読み解いて、管理する人","結婚式というのは、わたしたちの生活の営みの基盤が、またひとつ新しく誕生したということであると同時に、男性性と女性性とが統合されたということ。女性は、より生活に根差した大地や自然や身体や生命の神秘の象徴です。そんな女性の持っている生命の神秘を解き明かすかのように、花婿が花嫁のヴェールをはずしています。"],["ヒステリー状態となった政治を制圧する力のある政治家","思いがけない状況のなかで物事を解決できる人","サビアン・ワードにある「ヒステリー状態を制圧する」というのは、乙女座の持っている問題解決能力と関係しています。乙女座のテーマのひとつに、身の回りを取り巻く世界のあらゆるものを秩序立てて、機能させるということがあるでしょう。そのために乙女座は客観的に世界を眺めて、その法則性を知的に構造分解し、理解していきます。そして、それが理解できると、今度はその法則を通して、世界を見ることができるようになるでしょう。"],["貴族の家系図","すぐれた圧倒的な価値を受け継ぎ、明け渡す人","貴族がその家系を受け継いでいく目的は、手に入れた力を同じ血筋を持つ人たちに継承させていくことにあるでしょう。"],["勇敢な祖先から受け継いだ家宝の上等なレースのハンカチーフ","受け継いだ力をどのように使うか、考える人","わたしたちは、ひとりひとりが太古の昔から進化を遂げてきて、数々の厳しい時代を生き延びてきました。わたしたちの身体の内側には、地球上で生き延びるさまざまな知恵と技術とが受け継がれて、たくさん詰まっています。"],["動物園でオランウータンと直面する子どもたち","人生があるときに反転して自分を取り戻す人","乙女座は主観を抑えて、客観を鍛えることで自分を律してきました。自分がどう感じるのか、ということを後回しにして「どのようにふるまうべきか」ということを学びます。お手本となる教義を手に入れると、その価値観を通して世界を観察し、身のまわりのあらゆることを管理し、きっちりとした生活を送ろうとするでしょう。"],["噴火している火山","抑えてきた思いを表出させることで自分に還る人","乙女座は主観を抑えこむことによって、どこへ行っても通用するような客観に基づく自分を創り上げようと試みるサイン。自分を律して、ある教義にしたがった「正しいおこない」を積み上げていき、完璧な仕事ぶりや生活をすることで、基盤を整えようとするでしょう。"],["ウィジャ盤","見えない世界からの情報を受け取る人","乙女座は主観を抑えることで客観を発達させて、誰から見ても「ちゃんとした自分」であることを創り上げるサイン。"],["水泳競争","心を解放して、なにが起こるのかを楽しむ人","客観に耐え得る自分を鍛えるために、乙女座の前半では個人の主観を抑えて、感情や本能的な欲求を後回しにしてきました。しかし、それでは人生に間違いがなくなっていく代わりに、どんどん狭量になって、パワーが低下していきます。"],["西海岸をめざしているキャラバン車","自分の可能性をひらく環境に飛びこんでいく人","キャラバン車とはキャンピングカーのような、その中で生活することのできる車です。それが仲間たちと共に、西海岸をめざして移動しています。西海岸は流行のはじまる場所であり、多様な生き方が容認される自由な場所。いろいろな人たちが、さまざまな価値観を抱いて、それぞれの生き方をすることができる場所です。"],["女子バスケットボールチーム","高いモチベーションで大きな目標を成し遂げる人","少女たちが集まって、バスケットボールのチームを作り、日々鍛錬をしています。素直で純粋な少女たちが、ひとつの目標に向かって奮起し、気持ちをひとつにしようとしているのでしょう。"],["宝石のついた王家の紋章","最高の結果を出して、それがまわりからも認められる人","個人の持っている能力を惜しみなく発揮して、その質を最高潮にまで高めることが乙女座のひとつの目的です。他者からのあらゆる要求に応えられるように数々の知識や技術を身につけて、機敏さや判断力を磨き、柔軟に世界で起こることに対して対応しようと試みます。自分の属しているチームに貢献し、求められているものに応え、メンバーたちがそれぞれ機能するように調整したうえで、高い目標をめざして尽力もするでしょう。その結果として大きな功績を残すに至り、それが王家の紋章として示されています。"],["技能と個性を披露するライオンの調教師","自分と他者の本能的な部分を受け容れて教育する人","ライオンは本来、野生の動物であり、広大なサバンナの草原でおのれの習性にしたがってのびのびと本能のままに暮らしています。しかしサーカスやショーなどで技能を披露するライオンは、その生来の野性的な面が調教されていて、粛々と調教師にしたがうことになるでしょう。このライオンに相当する部分が、わたしたちのなかにある身体や心が持っている癖やパターンといえるかもしれません。"],["メリーと彼女の白い羊","世界のあらゆることを素直に受け止めることのできる人","「メリーさんの羊」の歌にあるように、白い羊をメリーさんが飼っていますが、その関係はやさしく、穏やかで、愛に満ちているでしょう。メリーさんと羊は仲良しであり、決して羊を縛り付けたり、鞭で打ったりすることはありません。他者に対する厳しさや批判や警戒心があるとき、それはわたしたちが自分自身の内側に扱いかねるものを持っているのでしょう。"],["公共の建物の前の半旗","何事に対してもしっかりとしめくくる人","半旗とは弔意を示すために、旗竿のもっとも高い位置から三分の一ほど下のところに掲げる旗のこと。葬儀のその人の肉体を持った人生をしめくくる最後の儀式ですが、それは個人の人生をきっちりと閉じて「ここまで」と線を引くために欠かせないものです。"],["祭壇のそばの聖職者に吊り香炉を捧げる少年","心の可能性を探求して師匠から学ぶ人","地のエレメントに属する乙女座は、世界のなかで自分の持つ能力を発揮するために、役割と責任の範囲を明確にしたうえで、いま目の前で求められていることに完璧に応える、ということを目的としてきました。それが成されることで個人の現実的な対処能力が充分に成長していきます。"],["宮廷の行事で儀式的に顔を合わせる貴婦人たち","精神的に充足する活動をまわりに伝え広める人","宮廷でなにかと行事の度に顔を合わせることになる貴婦人たちは王族や大臣、将軍の奥さまやお嬢さまたちでしょう。現代社会でいうならば、政治家の婦人会や花柳界を支える奥さまたち、ビジネスやスポーツで大成功を収めた男性のセレブ妻たちといったところでしょうか。"],["権力を握ったはげ頭の男","すぐれた直観ですべてを把握して、それを隠さずに伝える人","髪の毛は頭を保護する役割がありますが、それがないということは、ダイレクトにクラウンのチャクラにさまざまな情報が降りてくることを示しています。それは現実レベル、精神レベル、直観レベルにおいて、多彩な情報を受け取ることができるともいえるでしょう。それゆえに、なにが真実で、いまなにが求められていて、いまなにが必要なのか、ということをスパッと見極めることができそうです。そしてこの能力があるからこそ、さまざまな分野で道を切り拓き、権力あるポジションにつくことができるでしょう。"],["心を啓発させる古代の巻物を読んでいるオカルト知識の探求者","物事の本質を深く追い求めていく人","世の中が移り変わっていく過程において、さまざまな教義が創られては消えていきます。このサビアン・ワードの探求者は、そんな移り変わりにおいて、物事の本質をはっきりとつかむための知識を探求しているのでしょう。"],["やるべきタスクを即時に完全に終わらせることを意図しているため、いかなる誘惑も無視する男性","自分の世界を完全にするために高い集中力を向ける人","乙女座の最終度数にして、乙女座の特色が際立つサビアン・ワードです。乙女座は世界と関わるときに個人の役割と責任の所在とを明らかにしてから、その範囲において完全な形で世界と関わろうとします。"],["さまざまな生物たちの標本コレクションのなかで針を突き通されて完璧な美しい羽を見せている蝶","世界に対して自分自身を見せていく人","後半の6星座では、わたしたちが本格的に他者と関わり、社会のなかで活躍していく過程がやってきます。前半の6星座において、自分たちの内にあるものを活性化し、徹底的に磨きをかけてきました。天秤座ではまずその視点が逆転して「他者から見られている自分」「他者から期待されている自分」を把握します。"],["永遠の創造スピリットを具現化する種に変容させる過去の経験の実り","他者との関わりを通して自分の多彩な側面を見出す人","サビアン・ワードにある「過去の経験の実り」とは、前半の6星座で自身が体験して、身につけ、磨いてきた数々の能力や資質です。それらが自分自身を活かすリソースとなって、多くの人たちと出会い、めぐり合うことによって、さまざまな形に姿を変えながら、その時々で必要なものを生み出すことになるでしょう。"],["すべてが変わったことを明らかにする新しい日の夜明け","他者との相対的な関係によって人生の進む方向が変わる人","天秤座にとって自分と外側の世界は相対的につながっています。目の前にいる人たちに、自分をさらけ出すほどに、その反響は高まり、自分の個性にふさわしい場所へと連れていかれることになるでしょう。自身の発した言葉が引き金となって、誰かの心を動かし、その動かされたものの反動によって、自分の立ち位置が変わっていきます。まるでビリヤードの球のように、付いた球と付かれた球が同時に影響する世界といえるかもしれません。"],["キャンプ・ファイアを囲んで霊的なコミュニケーションをとる若者たち","不思議な縁で多くの人たちとつながっていく人","人の縁というのは不思議なもので、自分自身を隠さずにさらけ出すと、おのずと気の合う人が磁石のように引き寄せられてくることになります。多くの人たちが存在するなかで、わたしたちは自分の内側にあるものと、同じようなものを感じる相手に自然と惹かれていき、つながっていくことになるのでしょう。"],["生徒たちに新しい世界を創るための内なる知識を明らかにする男","他者との関わりのなかで多くのことに気づいていく人","男性が生徒たちに求められるままに語ることで、新しい世界を創るための知識を披露しているサビアン・ワードです。ここでいう「新しい世界」というのは、他者との関わりによって生み出されていく新しい自分であったり、新しいやり方であったりするかもしれません。そしてこの男性は「教えている」のではなく「明らかにしている」のです。最初から明確な知識やアイデアがあってそれを教えているというよりも、求められているものに応えているうちに、内面がどんどん露出されて、明らかになってきたともいえるでしょう。"],["内的なヴィジョンを前に理想が具現化するのを見ている男","自分を外に表現することで思いを実現させる人","思ったこと、願ったことがどんどん実現していく、という、一見幸運のようにも感じられるサビアン・ワードです。内側で見ていたヴィジョンが、外側に取り出されることで、どんどん具現化されていくでしょう。"],["ニワトリに餌をやりながら鷹から守っている女性","内なる世界を守りながら、少しずつ広げていくことのできる人","天秤座は常に外の世界に開いていて、その交流が活発に繰り広げられているからこそ、道が開かれていき、多くのもの手にすることができます。そこには自分と他者との間において、お互いの願望を見出し、お互いに満たし合うような共有意識も働いているでしょう。"],["さびれた家の中で燃え盛っている暖炉","他者との交流のなかで一度はあきらめ、そして復活する人","他者との交流の中で、自分の意思が明らかになっていき、そのことがそれを求めている人たちを引き寄せて、その願望の中で自身の意思が実現されていく、というのが天秤座の流れです。"],["アートギャラリーの特別室の壁にかかっている三人の巨匠","多くの人たちと関わることで自分の可能性を増やしていく人","天秤座は外の世界に対して自分を開いていき、戻ってきた反響を通して今の自分のことを知り、そこからさらにまた磨きをかけていく星座です。そのためにはいつも同じ人とばかり交流するよりも、より大勢の人たちと関わったほうが、誰にでも通用するだけの人格を磨き、手に入れることができるでしょう。"],["狭い急流を通り抜けて静かな水域に達したカヌー","対人関係に揉まれることでうまくなっていく人","川の流れに翻弄されて、アップダウンを繰り返すカヌーは、他者との感情的なやりとりや、人生のなかで起こる悲喜こもごもともいえるかもしれません。天秤座は自分と外の世界との関わりや、他者との関わりのなかで、バランスのいい着地点を見つけ出すサイン。狭く激しい急流を通り抜けるあいだはいろいろあったけれど、それが静かで落ち着いた水域に達したことで、その経験を冷静に見ることができるようになったのでしょう。"],["生徒たちを眼鏡ごしに見つめている教授","自分の知ったことを教え広めて世の中をよくしていきたい人","サビアン・ワードに教授とある通り、物事を人に教えることに適している度数です。これまで広げてきたさまざまな見聞を人に教えたい、伝えたいという気持ちが高まるでしょう。その背後には「これを知っていれば、みんな、もっと良くなることができるのに」という思いが隠されているのかもしれません。さらにその奥には、みんながそれを知ることで今の世の中を変えていきたいという、信念が含まれているのでしょう。"],["山から出てくる炭坑夫","集中力を発揮して、未知の分野の解明に挑む人","炭鉱夫が危険を冒してでも山に入るのは、そこに貴重な資源が眠っていると信じているからでしょう。鉱山にあるであろう、未知の宝物を掘り出しに行くのが炭鉱夫です。"],["しゃぼん玉をふくらませている子どもたち","多彩なアイデアが次々と思い浮かぶ人","子どもたちが膨らませて遊んでいるシャボン玉は、角度によってさまざまな色に輝き、大きさもまちまちです。大きくて立派なシャボン玉ができたと思っても、それは瞬く間に消えてしまうでしょう。現れては消え、消えてまたすぐ現れるシャボン玉は、わたしたちの思いつきやアイデアを示しているのかもしれません。"],["暑い正午の時間に昼寝する男","自分でも気づかない無意識の領域から大きなヒントを得る人","正午というのは通常、人間の活動がもっとも活発になる時間帯です。ホロスコープ・チャートでいうなら"],["環状の道","繰り返しコツコツと反復しながら理解を深めていく人","環状の道というのは、らせん構造になっていて、規則正しい円形の道を繰り返しまわりながら、少しずつ上昇していくように作られたもの。同じようなリズムを刻み続けること、同じ作業を何度も反復することで、少しずつ全体のレベルが引き上げられていくということと関係するでしょう。"],["嵐のあとで改造が必要となり立てかけられているボート","対人関係において悩まされた経験が糧となる人","自分の内側にあるものを外の世界に対してオープンに開き、さまざまな人の意見や反響で生き方を変えていくのが天秤座の世界観です。しかしその時に、強烈に自己主張を押し付けてきて「絶対にそうするように」と強い意志を持って、迫ってくる人がいたとしたらどうでしょうか。あるいは言うことが定まらず、こちらに求めてくることが二転三転して、仮に何かを提案したとしても、また別のものが返ってくる人が相手だとしたらどうでしょう。"],["湾で出入りしている船を眺める引退した船長","対人関係で傷つき、悩み、新しいやり方を見つける人","船旅には危険がつきもので、いつも思うようにうまくいくばかりではありません。天気が急に変わるかもしれないし、潮の流れも変わるかもしれません。船体のコンディションも何かの拍子におかしくなる可能性があります。そしてもし何かトラブルが起こったら、それは命の危機につながりかねないでしょう。"],["逮捕されたふたりの男","世の中のマイノリティの人たちに注目する人","風のエレメントに属する天秤座は、公平性の質を持ち、あらゆる人たちのあらゆる考えを尊重しようとします。時にそれによって、振り回されることも生じますがと、ひとたびそれを許容することができたら、それよりも内側にあるものはすべて受け入れることができるようになるでしょう。"],["隠れている泥棒集団","現在では主流ではないアンダーグラウンドとつながる人","まだ日の目の当たっていない、だけれども価値あることを志している人たちを応援したり、みずからその一員となったりするサビアン・ワードです。泥棒集団というのは社会から見たら影の存在ですが、そこには社会に対する反骨精神や反発力があるでしょう。"],["任務を遂行しているラビ","いかなるときも淡々と自分自身の信念を貫く人","ラビとはユダヤ教の聖職者。厳しい戒律を守りながら人々に神の教えを広め、導く存在です。"],["日曜日のビーチを楽しむ群集","どんな人とも偏見を持たずに付き合うことのできる人","日曜日のビーチには、大勢の人たちがさまざまな目的を持って遊びにやってきます。デートにくるカップルも、子どもを遊ばせる両親も、ナンパ目的の若者も、泳ぎの練習をしにくる人もいるでしょう。"],["噴水で鳥に水をやっている子ども","まわりの人たちに癒しとくつろぎを与える人","噴水は都会の中で人工的に作られた公園などにある癒しの場。コンクリートばかりの街の中で噴水の存在は、ホッとしたくつろぎを人々の心にもたらすでしょう。"],["夜明けを告げるおんどりの声","世の中の変化の流れをいち早く察して伝える人","夜明けの到来と共に鳴き声を響かせるおんどりに、私たちは起こされます。まだ人々が眠っている払暁の時間を、おんどりはいち早く察して、みんなに知らせるでしょう。"],["左側に三枚目の羽を持つ蝶","いま起こっている真実をすばやく察する人","蝶が持っている羽は通常、左右対称の二枚ですが、このサビアン・ワードの蝶は、さらに三枚目の羽が体の左側についています。この羽は人間の身体でいうならばオーラのようなもので、はっきりと目に見えるわけではありませんが、強い光に当ててみると、ぼんやりとその輪郭にそって光って見えるものが感じられるでしょう。それは生きているすべてものが発しているエネルギーともいえるかもしれません。"],["巡礼者に生と死の謎を唐突に啓示する秋の葉の光景","宇宙の流れやサイクルを自然とキャッチできる人","秋になると樹々の葉が次第に色づきはじめます。それは自然の原理ですが、そこに特別な意識を向けない限り、なんとなく「ああ、もう秋だなあ」と思うぐらいで、気を留めることがないでしょう。"],["お互いに入れ替わる鷹と大きな白い鳩","内なる硬軟を自在に使い分けることのできる人","タカ派・ハト派という呼称があるぐらい、鳥のなかでも鷹と鳩は真逆の質を持っているシンボルとして認識されています。鳥は風のエレメントの象徴で、悠々と自由に空を駆けめぐり、多彩に見識を広げ、見知ったことをまわりに伝えていくでしょう。"],["澄んだ空の中を高く舞う飛行機","何事も客観的に俯瞰して、全貌を把握する人","天秤座は世界の中に自分自身を明け渡して、それがさまざまな人に投影される姿から、自分を知り、自分を磨いていく星座。また同時に多くの人たちとつながり、その多彩な価値観に触れることで、どのような考えに対しても公平な見方をすることを学んでいきます。"],["周囲を取り囲み、助けてくれている霊的な力に気づいている男","人間の環境を取り巻いている大きな力に関心を向ける人","天秤座は自分の存在を、その個性を通して大勢の人たちにさらすことで、多くの人の価値観による反響をその鏡として受け取り、またそこに共通する普遍的な調和点を見つけてきました。ここでは、その調和点に対する逆の視点が開かれていきます。"],["世代間の知識の橋渡しをする人類","世代を超えた人類の歴史のなかに普遍的な価値を見出す人","ひとつの文化はその時代をその場所で生きている人たちが作り出しています。それが社会によって支えられるようになると、ひとつの文明として華やかにひらかれていきますが、それは永遠に続くことはなく、時代の移り変わりと共に終焉を迎えることになるでしょう。そしてまた別の時代、別の都市において新たな文明が起こり、また滅んでいく......ということが、世界中のそこかしこでくり返されています。"],["哲学者の頭にある三つの知識のこぶ","内なる調和がとれて、あらゆる物事を識別する人","天秤座は誰にも、何にも肩入れすることのない識別能力を手に入れることと関係しています。世の中にはさまざまな価値観が行き交い、ひとつの問題に対して複数の意見や見方がありますが、決してその内のいずれかが正しいわけでも、間違っているわけでもなく、ただそういった多様な価値が同時に存在している、ということを天秤座で学んでいきます。その背後には一貫した自然界の法則やエネルギーが流れていて、ひとつの現象はそのなかで起こる無数のバリエーションのひとつに過ぎないのだということを理解するのでしょう。"],["街の道を行く混んだ観光バス","他者と一体化して成し遂げることの喜びを知る人","ある観光ツアーの内容に惹かれて各地から集まってきた人たちが、ひとつの大型バスに乗り込んで、さまざまな体験を共有しているうちに、次第に打ち解けあっていきます。最初はどこかよそよそしくても、同じ体験をして、似たような感情を味わっているうちに、そこに共感が生まれて、ついには「あの体験を共にした仲間」というような気分になるかもしれません。深い旅を共に味わい、否応なく、その本音を語り合うことになった仲間とは強い絆で結ばれて、その後も関係が続いたり、思い出すたびにおもしろおかしく感じたりすることがあるでしょう。"],["倒れて割れた香りの漂っている繊細な香水ビン","他者と本音でぶつかることを繰り返す人","自立している香水瓶が、わたしたち、ひとりひとりの心だとすると、それがここでは倒れて割れてしまい、しかしそのために、その中に詰められた香りが漏れ出てまわりに漂っています。これは香水瓶を、心から本音が漏れてしまった状態に喩えているのかもしれません。"],["隣人たちが協力する小さな村の棟上げ式","仲間と協力し合って大きく成長していく人","蠍座は自分と他者との人格の境目がなくなるような体験をすることで、自分ひとりでは持てなかった大きな力を手に入れて、達成の喜びを味わうサイン。他者と一体化して協力することで、ひとりの人間の限界を超えることができるでしょう。"],["祈祷の儀式のために火のついたキャンドルを運ぶ若者","秘密の深い関係を持つことに充実を感じる人","ある宗教的な儀式のために若者がキャンドルを運んでいる、サビアン・ワードです。おそらくその儀式は、同じ意思を持った仲間だけが参加を許された特別なものでしょう。ひとたび、そのような秘密の儀式に参加すると、仲間の結束が強固に結ばれていき、その共通項となっている教義や価値観が自分の隅々にまで入り込むことになるかもしれません。何かに入信する、特定の誰かと深く関わるということは、このような通過儀礼を通り抜けることであるのでしょう。"],["巨大な岩場の海岸","人への深い失望から心の仕組みを理解する人","感情のかたまりの象徴である大きな波は、海岸の岩場にぶち当たると砕け散ります。蠍座に入って、お互いに心を許し、深い共感を得た仲間たちと出会いましたが、その心の奥には、決して簡単に分かり合うことのできない何か意志のようなものがあることに気づかされるかもしれません。"],["男たちを生まれた土地から引き離すゴールドラッシュ","深い自己変容を体験する人","一攫千金を夢見て、何もかも放り出し、故郷を飛び出して夢に身を投じるのがゴールドラッシュです。"],["深海潜水夫","濃厚な人間関係のなかで真理をつかむ人","人間は海の中では動きが遅くなり、息をすることもできません。酸素ボンベを背負って潜ることができても、やれることは果てしなく制限されるでしょう。ましてや深海であれば、ものすごい圧力が体にかかって、動きがますます限定されていきます。だけれども、そこにいることに慣れてくると、次第に体を動かせるようになるでしょう。"],["静かな湖面に映る月明かり","心の内側から浮かび上がってくる真実を見つめる人","静かな湖に月が映っています。ここでは直接、月を眺めずに湖に映された光のほうがクローズアップされています。静かな湖というのは、心の中にある静けさの象徴であり、月はわたしたちの無意識の中にある感情の象徴です。"],["仕事中の歯医者","究極のところまでやり抜くことで限界を突破する人","自分自身の力によって、物事を抜本から変えることのできる人です。"],["古い仲間を再び結びつける親睦夕食会","心の深みに触れることを仲間と分かち合う人","夕食は一日のうち、最も豪勢なものを家族みんなで集まって、ゆっくりと語り合いながら、共にいただきます。誰かを夕食に招いて、共に過ごすことで、おのずとその人との距離は縮まり、親密な関係を作り出すことができるでしょう。ひとつの食べ物を分け合う行為は、愛や滋養を分け合う行為であるともいえるかもしれません。"],["救助されている溺れた男性","全身全霊をかけて相手に飛びこんでいく人","溺れている男性が救助されているというサビアン・ワードですが、蠍座のシンボルですから、ここで溺れている対象は人の情や心といったものになるでしょう。"],["大使館の公式舞踏会","静かに相手を見定めてつながりを築く人","蠍座は自分の心の深いところで感じていることを通して、他者と共感することを求めるサイン。しかし、水のエレメントであるがゆえに非常に傷つきやすく、もし自分のすべてをさらけ出したにも関わらず、相手がそれを受け取ってくれなかったり、相手がそれを見せてくれなかったり、ということが起こると、深く落胆して、もう本心をさらけ出すことをやめようとも思うでしょう。"],["実験室で実験をする発明家","人と人を仲介して新しいものを創る人","発明家が実験をするサビアン・ワードです。いろいろな薬品や部品や知識や技法を混ぜ合わせて、新たなものを作り出すのが実験ですが、これは蠍座の実験。蠍座は対人関係を通して自分の足りないものを引き出したり、目覚めさせたりしていきますから、ここでは対人関係を使って実験するということになるでしょう。"],["新しい回線をつなげている電話接続士","対人関係を通して最高の人脈を引き出す人","後半星座の天秤座と蠍座は、他者との関係の中で自分の活かし方を模索していく星座です。自分のどんな才能を、どのように使うのかは、どこに誰といて、相手から何を求められるのかによって変わってくるでしょう。"],["五つの砂山のまわりで遊んでいる子供たち","集団で大きな物事を創り出す人","5という数は、五体や五感を持つ人間そのものを示す数であり、それらをすべて兼ね備えたわたしたちは、とても力強くパワフルな存在です。5つの砂山が描かれたシンボルですが、この砂山たちは人間の集まりともいえるでしょう。"],["突然笑い出した少女の顔","自分自身にくつろぐことで、他者を惹きつける人","他者との結びつきを大切にする蠍座は、対人関係にみずから働きかけてきました。"],["彼女自身のスピリットによって偉大な子どもを多く産み出した女性","自分の内側から未知の可能性を呼び覚ますことのできる人","蠍座は他者との結びつきを強化することで、自分に足りないものを外部から埋め合わせてきました。"],["多彩に素晴らしく輝く森の中の道","高い目標を達成させながら成長できる人","ちょうど蠍座のシーズンである10月末から11月にかけてが紅葉の盛りですが、それは自然の樹々にとっての変容の季節であるといえるでしょう。樹々は春になると若芽出して、葉を生い茂らせて、夏から初秋にかけて豊かな緑を存分に伸びやかに成長させます。そして秋になると紅葉し、やがてそれらはバラバラと一斉に舞い落ちて、冬には枝のみが残されるでしょう。"],["耳にした会話をくり返すオウム","内側からキャッチしたメッセージに従う人","オウムはどこかで聴いた人の言葉をくり返し、話すことができます。それは単に聴こえた音をそのままくり返しているだけでは、意味を咀嚼して理解しているわけではないでしょう。それでもオウムがくり返している言葉を聴いた人はインパクトを受けて、それがまた人口に膾炙されていくかもしれません。オウムは次々と人の言葉をコピーして、それを広めることができるでしょう。"],["神聖な道の入り口を閉じている二枚の暗いカーテンを引っ張る女性","目に見える世界と見えない世界とをつなぐ人","入り口を閉ざしているカーテンがシンボルとなっていますが、その背後にある神聖な道を進んでいくと、それはその人の心の深い部分あるいは現実の物事の背後に隠された真実の核のようなところに行き着くのかもしれません。そこへの入り口がカーテンで閉じられていますが、そのカーテンを引っ張っている女性は、神聖な道の中へも、また逆側の通常の世界へも自在に行き来できるのでしょう。"],["良心に従って命令に抵抗する軍人","相手が誰であったとしても自分の信念を貫く人","軍人はプロフェッショナルとしての技術や知識、精神力を身につけて正義のために戦う存在です。通常の軍人は縦型組織に属し、からの命令が絶対であり、それに逆らうことはないでしょう。しかしここでは揺らがない自分なりの信念がしっかりと根付いたがゆえに、相手が誰であれ、おかしいものに対してはおかしいとはっきりと口に出していく姿が描かれています。"],["野生の鴨を撃っているハンター","自分の属している場所を変えようと努力する人","蠍座は物事の表面的なことにはあまり興味がなく、真実を深く探求していくサイン。しかし、ひとたび核心に触れることで、これまで見えなかった、さまざまなことを思い知らされることにもなるでしょう。裏に隠された事情や、真の理由が見えてくると、ただ一方的に与えられていたことに対して、額面通りのままに、素直に受け取ることができなくなるかもしれません。"],["自然界の精霊に変容するウサギ","荒々しい衝動をアートな形に変容させる人","蠍座が真実を求めて世界の裏側や心の深いところまで潜り込むと、まだ誰も気づいていない未知の可能性や領域に気づかされることになります。"],["直観的な男性の「山の講話」を聴いたあとで帰路につく群衆","自分の影を受け容れて、またそれを他者に伝える人","山の上に住んでいる男は仙人のように暮らしながら、自然と一体化して、人間の心の極限を体験しているのかもしれません。人間が心の奥底に持っている、ざらっとした本能的な荒々しさを、精神の力で昇華させて、自分の意識の力で、自分自身を受け容れる術も、どんなときでも穏やかに落ち着かせる方法もマスターしているでしょう。"],["Ｘ線写真","どんな物事であってもその裏側を知らずにいられない人","Ｘ線を使って撮影されたレントゲン写真は、表面からは見ることのできない、その人の内側の実態を明らかに浮かび上がらせます。蠍座の持っている能力のひとつに、真実を鋭く暴いていく洞察力というものがありますが、ここではその力が最大限にまで高まって、表からはパッと見ただけではわからない物事の裏側やその真実の仕組みを明らかにすることに意識が向かっていくでしょう。"],["新しい領土に移動してテントを作っているアメリカン・インディアンたち","どこへ行っても柔軟に適応しつつ、自分のやり方を貫く人","ネイティブ・アメリカンが新しい場所へ引っ越して、居住区となるテントを張り直しているサビアン・ワードです。彼らは生きるための知恵を身につけており、そのために必要な道具をコンパクトに収めて、どこの土地へ行ったとしても、容易に順応していきます。それはある意味、自然と調和して生きる術を持っているがゆえに、どこへ行っても、自分たちのやり方で生き抜くことができるともいえるでしょう。"],["行進している軍楽隊","自分の得た確信をまわりに広めていく人","街を行進している軍楽隊の奏でる楽曲は非常に大きく響き渡ります。ある人は足を止めてその曲を聴き入り、ある人には聴くつもりがなくても、家の中にまでその音が響いてくるかもしれません。"],["領土に近づいている妖精たちの王","自分の心の内側に安住の地を見出す人","蠍座は自分に足りないものを外の世界に求めて、お互いに補完しあう関係によって、自分を満たしてきました。それが星座の度数の中盤から、自分の足りないものを自分の内側に見出すという、自己生殖のプロセスに突入します。"],["酋長に子どもたちの命ごいをしているインディアンの女性","他者とのあいだで葛藤をたびたび感じる人","ある部族からの独立を試みて、ここを出ようとしている女性が、仲間たちから「子どもを置いていけ」「子どもがどうなっても知らないぞ」と脅されているサビアン・シンボルです。どうにか子どもたちを助けてほしいと酋長に懇願していますが、仲間たちの強固な反対にあって、独立することをなかば諦めるような気分にもなっているでしょう。"],["いろいろないたずらにふけるハロウィン衣装の子どもたち","深刻な影に軽やかな光と笑いを与える人","ハロウィンに子どもたちが仮装するのは、お化けや魔女やパンプキン・ヘッドやゾンビなど、普段はわたしたちの心の奥深いところに巣くっている恐怖の対象です。日本でいうならば、怪談に登場する幽霊といったところでしょうか。"],["古い記憶を再び呼び起こすために集まった退役軍人たち","自身の可能性をひらくためにいろいろなことにチャレンジする人","すでに退役した軍人たちが再び集まってきているサビアン・ワードです。軍人たちは、かつて現役時代に自分を徹底的に鍛えて、肉体的にも精神的にも強靭で、何事に対しても自分で考えて、最善を尽くせるだけの知性と行動力を手に入れたでしょう。ひとりで何でもできる軍人ですが、ここではそれぞれの自由意志によって再び集まることで、みんなで大きな理想を成し遂げようとしているのかもしれません。"],["海の上に風の力を見せる白い帽子に覆われた波","大きな熱気のうねりの中で興奮する人","白い帽子に覆われた波というのは、大きな波が崩れる時に見える白く泡立ったしぶきを指しています。大きく風が揺れれば揺れるほど、大きな波がやってきて、たくさんのしぶきをあげるでしょう。"],["チェスをしているふたりの男","知略を尽くして難問を超えることに喜びを得る人","わたしたちの内側にある闘争心と戦略性を高めていくサビアン・ワードです。"],["両親から励まされて歩くことを学んでいる小さな子ども","理想をかなえるための実際的な行動をはじめる人","理想主義に傾きがちな射手座が、実際的な実践をはじめるのが、このサビアン・シンボルです。これまではやる気があったとしても、それは議論やシミュレーションに向けられていたものでした。ここではじめて、実際に使える具体的な手法として現実味を帯びてくるでしょう。"],["大木の枝に独りで座る老いたフクロウ","物事の裏の事情まで全体を把握している人","夜行性のフクロウが一羽で、大きな木の高いところに止まっています。フクロウは知恵の象徴ですが、老いたものはより多くの知恵を持っているでしょう。そして高い場所から俯瞰して、昼間に人々が活躍する姿ではなく、本音が自然と漏れ出てくる夜の姿を観察しています。スパイや忍者のようなものを連想させるサビアン・ワードといえるかもしれません。"],["クリケットの試合","正々堂々と勝負することに心を熱く躍らせる人","スポーツを通してお互いの力を磨き合い、その能力を発揮する......というのは射手座にとっても最も適切な方法ともいえそうです。射手座の火は「摩擦の炎」であり、お互いに切磋琢磨しながら、その時々のベストを尽くして、さらにそれぞれが成長することを望むでしょう。お互いの持っている力の限りを尽くして、ぶつかり合うことになりますが、そこには守るべき一定のルールがあり、同じ条件の中だからこそ、勝負の面白さがあるかもしれません。"],["人間のハートの扉をノックするキューピッド","予定不調和の行動のなかに喜びを見出す人","キューピッドは、その手に持っている弓矢を射ることで人のハートに火をつけることができます。新しい恋の経験は、個人を刺激して、未知のものへの期待と可能性とを大きくひらくでしょう。そしてそれは秘密であったり、なにかが隠されたりしているものであればなお、その人をより自由な世界へと精神を解放します。"],["新しい元素が形成されている地球の深部","いつも違う自分になりたい気持ちが渦巻いている人","常にいまここで起こっているものではない何かを求めているような焦燥感が身の内側にあるかもしれません。"],["階段で一段ずつ幼い子どもを導く母親","高い意識へ急激に上る可能性のある人","小さな子どもが母親に導かれるままに階段を一歩ずつ上っているサビアン・シンボルです。励まされて、難しいステップに挑戦し、また同時にそれを達成したことに子どもは大きな喜びを感じるでしょう。しかし、何のために階段を上っているのか、その上に何があるのかは、本人にはよくわかっていないかもしれません。"],["金髪の女神の演技が表現されるタイミング","華やかな雰囲気で人目をパッと惹きつける人","このサビアン・ワードに描かれる金髪の女神というのは、幸運の象徴のようなもの。その女神が表現されるタイミングというのは、その人に対して『幸運の女神が微笑んだ瞬間』といえるかもしれません。"],["古い寺院の左側にある人間の身体のような形状の燃えているランプ","精神的な修行や学びに興味を抱いて実践する人","古い寺院には長い時を超えて受け継がれている数々の教えがあります。かつてそこで学び、修行した人たちがいなくなったとしても、そこで彼らが得た精神的な成果はそこにずっと残り、現在を生きている今世の人たちにつながっているでしょう。"],["鷲に変化する旗、そして夜明けに敬意を表するおんどりに変化する鷲","思い立ったら、なにがなんでもそれを実現させる人","旗というものは、ある種の思想や考えや目的をシンボル化したもの。その旗が鷲に変化するということは、その思想や考えを実際の行動で示そうということかもしれません。のみならず、それが更に夜明けがきたことを告げるおんどりに変わるということは、自分の思いや理想をまわりに広めていく力も持っている、ということでしょう。"],["明るみに出る未亡人の過去","直観が高まってさまざまな事柄を認知できる人","占星術では一般的に夫が太陽で、妻が月として象徴されますが、それはわたしたちの顕在意識と無意識とも言い換えることができるかもしれません。その無意識の月の中のさらに奥に隠された秘密が明らかになる......というサビアン・シンボルです。"],["偉大なピラミッドとスフィンクス","地球と宇宙の持っている謎の解明に興味を抱く人","ギザのピラミッドとスフィンクスは古代に高度な文明を人間が持っていたことを示す重要なモニュメントです。いまもなお、謎が多く秘められていて、どのように作られたのかもわかっていません。古代の人々が持っていた叡智が集結し、悠久の時を超えて、霊的な存在と一体化するための仕掛けがふんだんに施されているでしょう。"],["自分の影を探しているグラウンド・ホッグ","高い理想や学んできたものを地上で実践する人","アメリカとカナダで毎年2月2日にグラウンド・ホッグデーという行事が行われます。これは冬眠から目が醒めたばかりのリスの一種であるグラウンド・ホッグを使った占いのようなもの。巣から出てきたグラウンド・ホッグが、外で自分の影を見つけると驚いて巣に戻ってしまい、そうすると冬があと6週間は続くと予想され、もし影を見ずにいるなら、春の訪れが近いとされます。"],["食べ物を期待して船のまわりを飛ぶカモメ","地に足をつけて生きる訓練をする人","いずれの星座もその半分の折り返し地点を過ぎる頃から、自分の足りないところを埋めるために、向かいの星座の質を学び始めます。射手座は前半の15度までのあいだに、視野をめいっぱい広げて、可能な限り、精神を自由に羽ばたかせてきました。その成果が実って、深く広い見解と高い意識が身についたのですが、しかし実際の現実世界では多くの人たちがそのことに関心を寄せず、気づきもせずに、目の前の忙しい日常に追われて暮らしています。"],["復活祭の日の出の礼拝","みんなと一緒に大きな希望に向かう人","復活祭はキリストの復活を祝うお祭りですが、ここで火のエレメントの持ち前の霊性が取り戻されることになります。日の出と共にイキイキとよみがえるのは、人の持っている、たましいの情熱や明るさ、向上心といったものかもしれません。"],["日除け帽で頭を守りながらビーチで遊んでいる子どもたち","火の情熱の力を適度に扱うことのできる人","ギラギラと輝く太陽の日差しを、帽子をかぶることで緩和させて、ビーチで子どもたちが遊んでいます。太陽は、太陽系の惑星の中心となる星であり、占星術のホロスコープ・チャートの中においてももっとも重要な天体です。わたしたちの人生そのものに活力をもたらし、楽しく盛り上げていこうとするパワーの源。射手座は火のエレメントの属するサインですが、火のエレメントの星座は、いずれも、この太陽の光の活動を活発にさせることを目的としています。"],["人間の脅威のない安全な土地へ子どもたちを連れて引っ越すペリカン","理想の環境に身を置くことで自分を成長させる人","ペリカンはみずからの胸に穴をあけて、その血を子どもたちに与えて育てるという伝説があります。この逸話からペリカンは最も強い子孫への愛を持っている動物とされて、自分の愛を捧げたキリストの象徴であるともされているそうです。"],["昔ながらの北部の村で夏のあいだに使う氷を凍った池から切り出している男たち","どこでも柔軟に働くことのできる人","サビアン・シンボルになっている古くから続いている北部の村では、夏のあいだでも凍り続けている池があり、村人たちはその氷を切り出す伝統的な方法を知っているのでしょう。氷のない土地の人々に求められるものに応じて、男たちが協力し合って、村の氷を切り出しているのかもしれません。伝統的な技術や知識を身につけた射手座が、必要とされる人たちのためにそれを具体的に生かす方法を見つけ出したともいえるでしょう。"],["借りたメガネをかけている子どもと犬","身の丈を超えた難しい課題に挑む人","本来、子どもや犬にメガネは必要ありません。子どもと犬は自然体のままに、のびのびと過ごすことのできる存在といえるでしょう。"],["中国人の洗濯物","どこへいてものびのびと自分らしくいる人","中国人は世界のあちこちに移民して、彼らのコミュニティを作り出します。最初は新しい環境に馴染もうと言語を学び、文化を学ぼうとしたかもしれません。しかし、結局は慣れた言語や文化の方が安心できるし、自分らしくいられることがわかると華僑を作り、どこであろうとも、自分たちのペースで暮らすことになるでしょう。"],["移民グループの求めに応じる新しい国の入り口","ありのままの自分自身で世界を渡り歩く人","もし、新しい国に移民するのであれば、その国にわたしたちは深く馴染んでいく必要があります。しかし、どう転んだところで、その国で生まれ育った人とまったく同じになることが不可能でしょう。"],["コテージの入り口に止まっている青い鳥","しっかりと知識体系を持ちながら更に進化を望む人","青い鳥は幸せの象徴。それが自分の住むコテージの門の上に止まっています。鳥は新しい刺激や情報を運んできますが、もっと幸せになるための道しるべを持ってきてくれるのかもしれません。"],["玩具の馬上にいる小太りの少年","たくさんの教養と共に可能なプランを練り上げる人","玩具の馬にまたがった小太りの少年がいるのは、おそらく家の中でしょう。少年が裕福であることは、小太りであることや玩具の馬が与えられていることから想像できます。"],["戦いにおける旗手","熱い信念を掲げて最前線で語る人","戦いにおける旗手の役割は大きく、味方を鼓舞するために欠かせない存在です。旗が上がっていることで、味方が善戦していることを兵たちは確信し、旗が前線へ上がっていくのを見て、兵たちは戦意を高めるでしょう。大舞台の上で仲間たちを鼓舞して、時に采配を振るうことにもなるかもしれません。"],["仕事している彫刻家","本当に良い教えを世の中に普及させる人","彫刻家が何かを創り始めるときは、頭の中に何を作るのかというイメージがあるでしょう。その頭の中にある理想の形を、実際に現実の中で形に落とし込んでいくことがテーマといえるサビアン・シンボルです。"],["いまだに使われている美しい流れの上にかけられた古い橋","ありきたりの形のなかに自身の理想をのせる人","さまざまな経験をした射手座がようやく見つけ出した素晴らしい思想や技術を、みんなも体得して実践すれば世界がもっと良くなるのにと思って、一生懸命に普及に努めます。強く熱く訴えることで、それは多くの人たちの心に響きますが、しかし同時になかなか思ったようには根付いていかないということも起こるでしょう。"],["エレガントな郊外の家の芝を刈る太った少年","学んできたことをシンプルな形で表現しようとする人","太った少年が自宅で芝刈りをしています。少年が太っているのは、射手座で充分にいろいろなことを学び、多様な価値を身につけたからといえるでしょう。"],["支持者を祝福する法王","ひとつの思想体系をまとめ上げて普及させる人","射手座がこれまで学び続けてきたことをひとつの体系としてまとめ上げ、それをまわりに広めていくのが法王の役割です。木星に守護される射手座は、自分には無限の可能性があり、いつまでもずっと探求し続けることができる、より新しいものを獲得し続けることができると思いこんで、自身をより広い世界へと解き放ってきました。"],["集まった部族たちに力を認識させるインディアンの酋長","社会の中で活躍する意欲がおおいに満ちている人","インディアン......ネイティブ・アメリカンは部族ごとにそれぞれの伝統や文化を持ち、ある土地に根付いて、コミュニティを作って暮らしています。その複数の部族たちが集まる場において、ある部族の酋長がおのれの部族の立場と権利を主張し、まわりの部族たちを納得させようとしているサビアン・シンボルです。"],["ひとつが戦争で損傷しているゴシック教会の三つのバラの窓","傷ついた経験を乗り越えて理想を実現させる人","バラ窓はゴシック建築の教会に飾られた、ステンドグラスで作られる円形の窓。『奇(くす)しきバラの花』と言われた聖母マリアを暗示したものであり、わたしたちの内側にある神聖な愛や共感や受容力といったものの象徴でもあるでしょう。"],["熱く新しい経験を求めて現実を創り出していく人間の魂","可能性をひらくために新しい経験を求め続ける人","自分の内側にある理想や願望を、何かしらの目に見える明確な形として示したい、確認したい、というサビアン・ワードです。ひとつの前の星座である射手座は火のエレメントに属するため、その理想は自分に内にある概念のまま、具体的な形がなくても扱うことができました。しかし山羊座は地のエレメントに属するため、目で見て、触れて、誰から見ても「そうである」と再現できる形にしてはじめて、それを扱うことができるようになります。ですから、ここでは自分の内にある思いや理想を、何かしらの形に変えて示すことをめざすでしょう。"],["水上旅行のはじまりに大きなカヌーを整える一行","現場で仲間と協力しながら目的を遂行する人","水上旅行という、それに参加する人全員で共有するひとつの目的のために、力を合わせて協力していこう、というサビアン・ワードです。いま目の前の限られた環境のなかにある資材を有効に使って、目的を達成しようとするでしょう。"],["何人かの男たちはカヌーを漕ぎ、他の者たちは出陣のダンスを踊る、インディアンの出征の道","仲間と共に大きな目標に立ち向かう人","インディアンの戦いとは部族間の領土争いです。山羊座は土地と関係しますから、部族同士で戦うことによって、どれくらいそれぞれが占有地を広げることができるのかが、ハッキリするでしょう。"],["暗い森に通じるアーチの下に敷かれた10本の丸太","集団を強固にまとめ上げることに尽力する人","集落を取り囲む暗い森は、人々にとって恐れの対象です。しかし共通する脅威の存在が出現すると、人々の結束は高まることになるでしょう。"],["神の力を宿して語るヴェールをかぶった予言者","土地の声を聴いて、応えることのできる人","これまでヴェールに覆われて隠されていたことが明らかになる予感です。"],["陽のあたる家で飼われている喜びを歌う鳥たち","その場の環境に適応してしあわせを見出す人","本来、鳥は自由に空を飛びまわることで生きるものです。しかし、このサビアン・ワードの鳥は、家の狭いカゴの中で飼われています。生来、嫌がるかもしれないカゴの中の暮らしを、この鳥たちはよほど居心地が良いのか、嬉しそうに歌っています。"],["ハープを運んでいる天使","自然との営みと心身とが調和する人","天使というのは、気づかないところでわたしたちのそばにいて天上界と地上界とをつなぐ存在です。天使の奏でるハープの音色は、地上に天界の波動をもたらすような働きがあるでしょう。"],["手から餌をもらっているアホウドリ","いまここにはないものを求めて冒険する人","アホウドリは警戒心が低く、乱獲が容易だったことからその和名がつけられたといいます。アホウドリにとって人間は未知の存在で、近づいていったら、何をしてくるのかわかりません。それでも目の前に差し出された餌を見て、リスクを顧みずに飛び込んでいくような勇気と好奇心があるのでしょう。"],["個人所有の土地の中のキジの大群","特定の知識や技術を選抜された人たちと共に高める人","キジは集団で行動する特性がある鳥だそうです。そのため、どの地域のキジであっても、まとめて一か所に集めると、同じような行動を始めるのだといいます。"],["生命についての小さな理解を明らかにする図解された自然科学の講義","ひとつのテーマに没頭することで新たな発見をする人","大学のゼミのような、小さな研究室で行われている講義や研究のイメージを持つサビアン・ワードです。すでにその分野の基礎知識を網羅している仲間たちが集まって研究すると、どんどんより細やかな箇所にまで意識が向けられていき、急速に新しい知識への理解と発見が進んでいきます。ある種のオタク集団というか、マニアックな人たちが徹底的にひとつのテーマを突き詰めることで、まったく新しい見識を広げることが予見されるでしょう。"],["究極の存在の真実と共にある火の崇拝者の瞑想","内なる精神と意志の力を発揮し続ける人","あらゆる宗教の原始的なものは、火をあがめることから始まりました。熱源であり、すべてを燃やし尽くし、情熱へと姿を変える火はわたしたちの命の源です。あらゆる生命は光の恩恵によって生かされていますが、それは人間にとっては意志であり、不屈の精神であるともいえるでしょう。"],["長いあいだ忘れられていた文化を思い起こさせる御影石に彫られた古代の彫刻","来歴からいまの自分を確信する人","長いあいだ、人々から忘れられていた古来の彫刻には、当時の人たちの思想や生き方が刻まれています。そこには文化や時代背景が違えども、現代を生きるわたしたちと同じように真実を探求し、ひとつの考えに行き着いた人たちが確実にいたということが示されているでしょう。もしいま、自分たちが時間をかけて探求し、仮に何かを見つけ出したと思った真実は、もうすでに別の誰かがずっと前に発見しているかもしれません。そんなことに気づかされるサビアン・ワードです。"],["おもちゃでいっぱいの病院の小児病棟","子ども心の解放に未来への可能性を見出す人","自分の生まれ育ったローカルな土地の文化や慣習を受け継いで、その場所がもっと良くなるように、ずっと安定した基盤が続いていくようにと模索して働き続けてきた山羊座ですが、自分たちのしていることは別の時代の別の場所でも似たようなことがくり返されているのだと気づかされました。それを踏まえた上で、根本から社会の普遍的な可能性を考えたときに、いまの大人を変えるよりも、子どもに与える教育の質を変えた方が、土台そのものが変わることに目をつけます。人間の持っているその才能と可能性を存分に引き出すためには、心を抑圧させるのではなく、解放させることがカギだと思い至ったのかもしれません。"],["体操着の少年少女であふれる校庭","自分の内側にある子どものような感受性を受け容れる人","体育の時間に子どもたちが体操着に着替えて、校庭に集まっています。そこでは身体を鍛えて、集団で動いてゆく規律を学びます。しかしあくまで対象は子どもたち。なかなかうまくできない子もいれば、きちんと列に並べない子もいるでしょう。やる気をなくして外へ出てこない子もいるかもしれません。"],["ヌーディズムに心理的解放を見出した抑圧された女性","心身を自由に使いこなすことで自分を確認する人","わたしたちが何かをマスターしようとするとき、ある規律の整った型を用いて、そこに沿うように自分を律していきます。それを繰り返すことで型通りの自分を創り出すことができますが、人間は感情や感覚を持っているため、その型に当てはまらず、切り捨てられたものが抑圧されて、影となり、むしろ自分に対して支障をきたす存在となります。"],["イギリス艦隊のユニオンジャック","感情の波を能動的に活用していく人","かつてのイギリスは世界中に植民地を持ち、巨大なイギリス艦隊にユニオンジャックをはためかせながら、海をどこまでも進んでいきました。"],["食品でいっぱいのバッグを運んでいる五歳の子ども","全体への貢献意識をみずから成長させる人","五歳の子どもが「はじめてのお使い」を頼まれて、真剣にこなそうとしているようなサビアン・ワードです。その身体に対して大きすぎるバックには、食品がぎゅうぎゅうに詰まっているのでしょう。食品は誰にとっても「価値あるもの」ですから、子どもは責任感を持って大役を果そうとしています。"],["祭祀のあいだ歌い続けている隠れた聖歌隊","全体のために黒子に徹することのできる人","荘厳な祭祀が行われているあいだ、ずっと聖歌がどこからともなく聞こえ続けています。しかし、歌が聞こえていても、歌っている聖歌隊の姿はどこにも見えません。だけれども、その場に聖歌がなければ、祭祀の荘厳さは半減するでしょう。バックグラウンド・ミュージックとして、祭祀そのものの演出をしているのです。これは全体のために見えないところへと貢献する姿勢ともいえるかもしれません。"],["リレー競争","最高のチームに所属して最善を尽くす人","リレー競争はチームのひとりひとりが有している能力を最高潮に発揮することで、他のチームとタイムを競う種目。団体戦であると同時に、個々のプロフェッショナルな実力が求められる競技といえるでしょう。"],["優雅に敗北を受け容れることで明らかになった将軍の高貴な性格","本質的なところに目を向けて社会に貢献する人","山羊座は自分の属している社会的な集団の価値を高めるために、身を尽くして貢献をする星座です。企業間競争や国家間の争いの中での勝利をめざし、より多くの売上とシェアを確保しようと尽力するでしょう。"],["戦争での勇敢さをたたえる２つの賞を受け取った戦士","社会で活躍しながらも個人的な充足も忘れない人","このサビアン・ワードに出てくる戦いは山羊座の戦いですから、現実社会におけるビジネスのシェア争いといえるでしょう。"],["修道院に入る女","精神的な力とつながって社会に貢献する人","女性が修道院に入るというと、一見、社会から隠匿するようなイメージがあるかもしれません。しかし、これは魚座ではなく、山羊座のサビアン・ワードですから、本当に現役を引退するのではなく、自分の内面を鍛錬するために精神修行の場に身を投じているといえるでしょう。"],["貴重な東洋の敷物でいっぱいの店","ローカルにはない知識や物を異文化から持ち込む人","サビアン・シンボルはアメリカで降ろされたもの。アメリカから見ると、東洋は遠い異文化の地域です。そこから持ち込まれた敷物がいっぱい満たされた店が繁盛している様子が描かれています。"],["滝の虹色の霧の中で踊っている水の精霊","独特の感受性で万人を強く惹きつける人","山羊座は自分の属するローカルな社会をより豊かな場所にするために奮闘してきました。その甲斐あって地域が充分に潤うと、さらなる発展として、次はローカルを超えたところとつながって、多くの人たちに地域の魅力を伝えたり、招き寄せたりすることになるでしょう。地方がその土地の特色や歴史を存分にアピールして、他国の人を惹きつけるようなインバウンドのイメージともいえるかもしれません。"],["山の神殿へとつながる急な階段を登っている巡礼者","自分の力のみを信頼して険しい道を歩む人","昔から人々は人里離れた険しい山の中にある特別な場所を聖地と定めて、崇めてきました。人が容易に足を踏み入れられないそれらの領域は、神聖な神の領域です。大抵の人はそこへ行くことを諦めて、里宮から遥拝して、ただ祈るばかりでしょう。"],["大きな養鶏場","社会の中で能力を活かしきることで次の道を見つける人","大きな養鶏場では、たくさんの鶏が飼われているでしょう。鶏はまもなくやってくる夜明けをいち早く察して、みんなに知らせます。ある種の予兆、確実にこれから起こるであろうことを、キャッチする力があるのかもしれません。"],["お茶の葉を読んでいる女","客観的に世界を把握して未来を予見する人","たまたまその時、その形をしていたというだけの事実から、お茶の葉を読んで、未来を予測している女性のサビアン・ワードです。その仕組みがまるっきりわからない人から見たら、なぜそんなことまで予見できるのか、不思議に感じるでしょう。しかし、ある法則を把握してしまえば、それは難しくないことかもしれません。"],["世界情勢に対する最高決断をくだす責任者たちの秘密会議","いまの社会に対する新しい理想のビジョンを抱く人","山羊座はひとつの閉じられた社会の基盤を強固にすることで、継続可能な安定した営みを人々と共有することを目的としたサイン。集団のなかに個人の能力を捧げて、全体を統括する視野を磨き、さらには個人的な感情を持ちえたうえで、社会のピラミッドの頂点に達する力を手に入れることになるでしょう。"],["カリフォルニアの古いレンガ造りの伝導所","変わることのない価値を求めて実践を試みる人","カリフォルニアにはアメリカの都市のなかでも若者たちが全国から集まってきて、最先端の流行を創り出していく土地。そのカリフォルニアにあるレンガ造りの伝道所は、世代を超えていまなお現役で活躍しています。"],["予期されなかった雷雨","真に自分自身の人生を生きる選択をうながされる人","水瓶座は既存の社会から、何かしらの型を押し付けられる生き方から、真に自由な人間の本質的な目覚めをうながす星座です。本質として生きるとは、他の何かではなく、自分自身の内なる権威に従った生き方を選ぶこと。それを実践するために、ここでは頼りにしていたシステムがことごとく壊れていくという経験をするかもしれません。"],["海軍からの脱走兵","あらゆる規律に背いてわが道を突き進む人","海軍は海上を舞台として戦う軍隊です。海を人間の集合意識としてとらえるならば、海軍は人の感情さえも規律で縛りつけようとする集団だといえるかもしれません。"],["ヒーリングの技を披露するヒンズー教徒のヨガ行者","スピリチュアルなスキルを発揮して独立して生きる人","社会的な制度やローカルな環境からの制約に真っ向から対立し、自由で自発的な立場を貫こうとするのが水瓶座です。社会に依存せず、"],["若いリーダーの努力を成就させようとしている先祖の協議会","さまざまなめぐり合わせによって道が拓かれる人","水瓶座は限定された社会の枠組みから離れて、より自由な環境のなかで個人の独立した人生を創り出していきます。しかし実際には、個人の能力でがんばっているように見えていながらも、その背後で働いている、さまざまな力に助けられていることに気づくでしょう。個人の技術や知識は先人たちが学び、切り拓いてきたものですし、それを身につけようと思い至った背景には、そこへ自分を連れて行った偶発性による導きがあったかもしれません。"],["ミステリー劇で儀式に興じる仮面をつけた演者","自分を自由にさせるために役割を演じる人","水瓶座は社会的な制約から自由になることを大切にする星座。自分自身を縛りつける環境から、いつでも自由でいることを求めるでしょう。そこで、ここでは自分の自由を守るために、その場で求められている役を演じることをしていきます。"],["卵から生まれたと見られる子ども","どこの何事にも頓着しない自分をめざす人","哺乳類は母親から乳をもらって成長し、そこに特別な愛着や絆が生じるでしょう。しかし、このサビアン・シンボルの子どもはあたかも自分が卵から生まれたかのように振る舞っています。もちろん親はいるでしょうけれども、そこに特別な思い入れや愛着を持ち過ぎることがないのでしょう。"],["飾られている美しい衣装を着た蝋人形","ロボットであるかのような機械的な反応することで、一定の距離を保とうと試みるでしょう。","相手が誰であれ、感情的に入れ込みすぎずに関係を築きます。そうすることでいつも自分自身の自由を守ることができるので、エネルギーを別のことに向けて使えるでしょう。"],["鷲に変身する旗","自分で決めた予定を忠実に実行する人","旗はさまざまな情報を含んだものが図で示された象徴です。鷲は実行力と情報収集力のシンボルです。旗が鷲に変化するということは、一度定めた目的を淡々と実行すること、といえるでしょう。コンピューターのプログラミングが旗だとしたら、そこで入力しておいた通りに動くのが鷲の役割ともいえそうです。この鷲は水瓶座のシンボルですから、野生の本能のままに飛んでいるというより、たとえばドローンのように、しっかりと設計された上で目的に向かって飛んでいるのかもしれません。"],["一時的に人気者となったけれど、人としてこの理想ではないことを実現するために作られた男","いつもまっさらな自分自身でいることを望む人","仕事や学業に精を出して、まわりのみんなから認められることで、人は人気を得たり、成功したりします。しかし水瓶座は、社会から求められる役割と同化することから解き放たれることを望むでしょう。"],["沈黙の時間の中で人生を変える新しいひらめきを受け取った男性","自分の内側から湧き上がってくる真実のみを抽出する人","外の世界からやってくる、あらゆる影響から自由になって、真に独立した自分自身を打ち出そうと水瓶座は奮闘します。水瓶座は「意識魂」というたましいと関係するのですが、それは外側の権威には従わず、自分の内側にのみ忠実に真実を求める生き方をうながすでしょう。"],["卒業するために広い階段の上をめざして並ぶさまざまなタイプの人々","意識の高い生き方を強く求める人","さまざまな経験を積んだ人たちが、一様に階段の上へ登っていることをめざしているサビアン・シンボルです。これは水瓶座の階段ですから、その人がどれくらい意識的に生きているのか、というものをはかるための階段かもしれません。"],["バロメーター","いつも冷静で公平に世の中の流れをとらえる人","バロメーターは気圧を測り、天候を予測するために使われます。きちんとした数値として観測点において測られ、これからくる天気の流れをすばやくつかむことができるでしょう。世の中の変化を敏感にキャッチするサビアン・ワードです。"],["トンネルに突入している電車","超合理的に人間らしさに時間を費やす人","大勢の人間を乗せた電車が、山を抜けるためのトンネルに突入しました。これは水瓶座のトンネルですから、古いやり方から新しい時代のやり方へと一気にワープするトンネルかもしれません。"],["フェンスの上に座って幸せそうに歌っている二羽のラブバード","一歩引いたところから全体の流れを掌握する人","ラブバードとは、オスとメスがほぼ離れることなく行動するインコのこと。仲良しカップルのインコたちが楽しげに歌っている姿は、平和で愛らしくもあるでしょう。"],["デスクに座る偉大なビジネスマン","理想の価値観をひとつの形として社会に示す人","信念に基づいた壮大な夢を思い描き、それを実現しようとしているビジネスマンのサビアン・ワードです。水瓶座が既存社会からの独立をめざす星座であるため、このビジネスマンのおこなうビジネスは、すでに社会に存在している形のものではありません。また経済活動がメインとなる牡牛座や蠍座からも離れているため、このビジネスはお金を稼ぐことよりも、理想の信念や価値観をなにかしらの形で実現させるものとなるでしょう。"],["主人と所有物を監視している番犬","曖昧になった境界にきっちりと線を引く人","番犬は通常、自分のテリトリーとそれ以外のテリトリーとの境界線にいて、異物が入り込まないように見張っている存在です。個人の領域を守ると同時に、どこにその境界があるのかということをはっきりとさせるでしょう。"],["秘密の動機が公に暴露されていく男","物事の真実を明らかにさせていく人","水瓶座は人間の持っている感覚の中では嗅覚との関わりがあり、これは真偽を見抜いて、嘘を嗅ぎ分ける器官です。嗅覚の非常にすぐれた動物は何キロも離れたところにいる獲物でも特定することができるでしょう。"],["水と化学薬品と筋力のある人たちの活躍で収められた山火事","いつも意識がオープンに開かれている人","水瓶座は狭い社会の制度の中に埋没することなく、自由で独立した意識を持ち続ける星座。社会の仕組みに取り込まれると、人は自分で考えることをやめてしまい、水瓶座はそれを危惧します。水瓶座の守護する天王星は、人が目覚めて生きること、惰性に陥ることなく、いつでもその瞬間に気づいているようにとうながすでしょう。"],["メッセージを運ぶ大きな白い鳩","外側の世界とシンクロニシティでつながっている人","メッセージを運ぶ白い鳩とは、ノアの箱舟に登場する、希望を伝える鳩かもしれません。ノアの箱舟に登場する白い鳩は、すべてが失われたと思われた世界の果てに、希望の土地があることをわたしたちに伝えました。"],["絶望し幻滅しながらもそれに屈しない精神的な強さのある表情で虚しい人生を眺めている女性","本能的な心と身体の声を凌駕しようとする人","理想とする大きな目的のために、自分のすべてを尽くして働きたい思いがおおいにある人です。水瓶座は自身の繊細な個性を否定することによって、世界のどこにでも適用し、すっと馴染めるような自分になることをひとつの理想としてきました。肉体や感情に重きをおいていると、それらは好き嫌いや、快・不快といったものに振り回されるため、どこでも生きるという本来の目的が見失われます。"],["子どもたちが心地よく暖かく遊べるようにと育児室の床に敷かれた布","心身を改めて解放しようと再教育を試みる人","世界のどこへ行ってもすっとなじみ、どんな役割にでも即座になることができるように、水瓶座は自身の個性を極力抑えるように努めてきました。個性があると、ある場所には適用できるけれど、ある場所には馴染めないということが起こるため、それを否定するためです。"],["座りながらすべての手足を振っている大きなクマ","意志の力で感情と本能を矯正させる人","天に輝くおおぐま座のクマは、神話において、狩猟の女神アルテミスに仕えていたニンフ(妖精)だったといわれています。アルテミスは月を象徴するため、このクマもまた、月と関係があるのかもしれません。そしてまた同時に、クマは本能的な動物でもあります。"],["みずからの情熱に打ち勝ち、自分の経験に基づく深い知恵を教える男","人間の隅々までを理解して冷静に語る人","ほとばしる情熱にまかせるようなことはせず、あくまで冷静に、自分の経験をしっかりと理論的に語る男性のサビアン・シンボルです。情熱が火のエレメントの象徴する熱さであり、直感やひらめきを示すのだとしたら、どこまでもクールな冷静さは風のエレメントの象徴。自身の理知的な意識を身体の隅々にまで広げていき、その感情も感覚までも制御しようとするでしょう。"],["右の羽がより完全に形成されている蝶","理性の力によって隅々まで自分らしさが行き渡る人","身体の右側というのは男性性の性質の象徴です。理性や知性の力によって自分自身をコントロールして、外の世界へ向かって、信念を打ち出していく領域を示しています。それに対して左側は女性性の象徴で、感性や感覚によってパッとつかみとる質であり、外の世界で起こっていることを受け容れる領域を示しているでしょう。"],["水圧計（ハイドロメーター）を使って車のバッテリーを検査している自動車修理工","高い知識と技術力で人の心に働きかける人","免許を取得するときに、教習所で運転前に車を点検することを習いますが、実際に日々の生活で車に乗り始めると、つい忘れてしまって、なにかおかしくなってから、慌てて車をチェックするという人は多いでしょう。このサビアン・ワードに描かれている自動車修理工は、まだ車の調子がおかしくなったわけではないけれど、常日頃からチェックして、万全を期しています。専門的な知識と熟練した技術力という水瓶座の骨頂を活かして、慎重かつ実直に社会と関わっていこうとする姿といえるでしょう。"],["新鮮なスミレで満たされた古代の陶器","個人的な感情を普遍的な価値のなかに見出す人","長い時代を超えて受け継がれてきた古代の陶器に、いま摘んできたばかりのフレッシュで若々しいスミレの花が満たされています。スミレはしばらくの間は咲いていますが、時間が経てば枯れていき、そこにあったことも忘れ去られてしまうでしょう。しかし、器のほうはその後も人々に受け継がれていくことになるかもしれません。"],["冬に供給されるために倒されて伐られた樹","何者にも依存しない真に自立した存在となる人","寒い冬を乗り越えるために、思いきってあらかじめ、必要となるであろう樹を伐り倒しておいた、というサビアン・シンボルです。水瓶座の守護惑星である天王星が持っている改革の力が、余すところなく発揮されるでしょう。"],["さなぎから出てきている蝶","真に独立した個性を打ち立てて表現する人","長いあいだ、さなぎとなっていたものが、少しずつ脱皮して蝶々に生まれ変わろうとしています。蝶は青虫からサナギになる過程において、その体を一旦、ドロドロに溶かしてから、蝶々に変容します。蝶々は地上に15,000種以上いると"],["より意識的になって明るさを増した多くの人々の心の光とひとつになって、その変化で首尾よく現れた人に顕現される、古代の文化に深く根づいたブラザーフッド（霊的な兄弟たち）の愛","より意識的になって明るさを増した多くの人々の心の光とひとつになって、その変化で首尾よく現れた人に顕現される、古代の文化に深く根づいたブラザーフッド(霊的な兄弟たち)の愛","ブラザーフッドというのは、進化した魂を持つアセンデッド・マスターたちで構成された団体だといわれています。彼らは元々、人間としてある時期を生きていた人たち。永遠の魂の存在となることに成功して、ここに留まり、わたしたちの進化を導いてくれるといわれています。"],["農家と問屋がさまざまな商品を並べる混雑した市場","市場価値ではない、自分だけの価値を探し求める人","水瓶座の終わりで完全に独立した個人が、人間としての意識を統合させるのが魚座です。射手座で思い描いた理想の姿を、わたしたちは山羊座において自分たちの生きる場所で実現させました。しかしそれは、その時と時代に制約された価値における実現だったため、水瓶座はローカルな社会とのつながりを断ち切って、完全に自由な個人として自立した存在となることをめざしました。"],["ハンターから隠れているリス","大切な価値を守るためにあえて隠す人","あらゆるものが雑多にあふれかえっている世の中で、魚座はその鋭い嗅覚と感受性をフルに使って「自分にとって本当に大切なもの」を見つけ出します。"],["砂漠に横たわる石化して割れた木の幹","人間の生み出した大切な価値あるものを守る人","ペトリファイドウッドという鉱物は、かつて木だったものが長い時間をかけて石化したもの。通常の木は経年と共に枯れていきますが、石化に成功することで数千万年から数億年ものあいだ、形を保ち続けることができます。これはさまざまなものを化石化させることで保護する目的のサビアン・ワード。"],["ふたつの海岸リゾートをつなぐ道の大渋滞","価値あるものを広めることに尽力する人","海沿いのリゾートに向かう道が大渋滞しています。人々がそこでの楽しみや癒しを求めて向かった結果として、大変混み合っているのでしょう。"],["教会のバザー","そのものの持っている魅力を最大に引き出すことができる人","多くのものが世界にあふれてくると、なかなか簡単には売れなくなるでしょう。バザーは各地で行われていますが、それが教会で開催されるとなると、そこに特別な意味がプラスされるように感じられます。ましてや「売上の10%が寄付されます」等と記されると、人々の善意があおられて、多少高くてもそこに支払おうという気持ちが高まるかもしれません。"],["正装して行進する軍の将校たち","大きな意義のために自分自身を捧げる人","ひとりの青年が軍に入隊し、軍服を与えられ、教育を受けます。そこで国を守るという行為は神聖な役割であり、多くの人たちの平和と秩序を守るための尊いことなのだと理解するかもしれません。そこにいるうちに青年は、自分が大きな使命を担っていることを深く理解して、訓練により一層励むことになるでしょう。"],["海上で囲まれた岩石の上で光の柱に照らされた大きな十字架","追い詰められた極限状態のときに神秘を体験する人","大海原に囲まれた小さな岩石の上にあった十字架に、光の柱が降りてくる......とても神秘的な深淵を連想させるサビアン・ワードです。"],["ラッパを吹いている少女","受け取った啓示を現実のなかで実現させる人","少女が高らかと吹き鳴らしているラッパは、大天使ミカエルの最後の審判を彷彿とさせるもの。とても大事な局面がやってきたことを高らかと知らせてまわり、自分自身と周囲とを鼓舞させる力があるでしょう。自然体でとても素直な存在である少女が、その純真な心で、何かしらの天の意志を受け取ったのかもしれません。"],["ライバルを引き離そうと意図して馬に拍車をかける騎手","自分の思いを一途に傾けて夢に飛びこむ人","騎手がレースの最中にライバルを引き離すために鞭を使い、そして馬と一体化したかのようにまっしぐらに突っ込んでいくというサビアン・ワードです。"],["地を隠す雲を通り抜けて旅をする飛行士","内なる神秘のイメージのなかに住む人","人間が知性を獲得したあとに、進化するために得たものは虚構を作り出す想像力でした。人は死ぬと星になり、天には神様がいて、わたしたちのおこないをいつも見ている。そういった物語や神話を共通して持つことで、わたしたちは同一の信念を持つ仲間としての結びつきを深めていきます。現代においても、わたしたちはそのものの実体ではなく、そのものがまとっているイメージや、そのものに付随する価値によって動かされることが多いでしょう。"],["光を求めて狭い小道を旅している男たち","生きながらにして究極の神秘を求道する人","最後の星座である魚座は肉と霊の分離を象徴し、たましいが純化された生き方を求めます。肉体は現実世界に根付いたものであり、わたしたちは生きている限り、ここから離れることはできません。"],["オカルト界のブラザーフッド聖域で試験を受ける新参者たち","大いなる意志とひとつになるか試される人","魚座は海王星の守護する星座であり、それはわたしたちの源を象徴しています。本能的にわたしたちはその源に近づき、光明を得ることを求める意識があり、より大きな意志の中に自分自身を溶け込ませようとするでしょう。"],["博物館に展示されている多くの戦いで使われた古代の剣","自分の属している場において大きな力を担う人","博物館ではその土地の歴史と文化が語られ、また、その証拠となる品々も展示されています。それは時代を超えて人々が伝承してきたものであり、現在の文化に至る礎を作ったものたち。時を超えて残されたものたちには、多くの人たちに訴えかけるだけの普遍的な価値があるでしょう。"],["キツネ皮の長いストールをまとった女性","品格と策略家としての顔が同居している人","キツネの皮で作られたストールをまとえるのは、お金持ちの貴婦人です。この女性はある種の特権階級としての権力や能力を持っているのでしょう。"],["実弾の弾幕による襲撃シミュレートを部下に命令する予定の将校","もどかしさを感じながらも大切なことを伝える人","軍の将校が本番さながらの実弾による演習を始める前に、部下たちを熱心に指導しているというサビアン・シンボルです。将校にはおそらく実際の戦争何度もくぐりぬけた経験があるため、その時の体験から得た注意事項を細やかに部下たちに伝えようとするでしょう。しかし、実体験のない部下たちにとっては、その大事さがいまひとつ伝わりきらず、どこか中途半端になってしまう可能性があります。"],["静かな研究の中でインスピレーションの流れを経験する創造的な個人","スピリチュアルを現実で活かそうと模索する人","ふとしたときにやってくるひらめきに従って、それを何かしらの形として、世の中に示していこうとするかもしれません。"],["復活祭のパレード","人が本来持っているたましいの力を取り戻させる人","復活祭はキリスト教圏内において、クリスマスよりも重要な行事とされています。キリストの復活は、人間の原罪が許されたあかしであり、それはたましいの救済の象徴といえるでしょう。"],["村の人々がすばらしい演技を鑑賞する巨大なテント","みんなの気持ちや場のムードを自在に変えられる人","演目が行われている巨大なテントといえば、サーカスが連想されますが、それに限らず、コンサートホールやライブハウス、クラブや遊園地などのようなものも含めて、このサビアン・ワードは人々の熱意を発散する場所を象徴しています。"],["弟子を指導する師匠","すぐれた価値をていねいに伝承させる人","次の新しい世代にまで残すべき価値の保存と伝承をするのが魚座の役割のひとつです。しかし、本当に大切なことを伝えるためには、受け取る人が自分と同じような感情を持っていなければ難しいということに気づきます。"],["夕食が準備されたテーブル","世の中の流れを信頼して自分を明け渡す人","ひとつの食事を分け合う行為というのは、テーブルを共にした者同士を結びつけて、親近感を抱かせるでしょう。何度も食事を共にしていると、そんなに詳しく話を聞いたわけではなくても、相手の心情や心持ちがおのずと手に取るように理解し合うことできます。言葉を超えた共感や理解、そしてたまたま、そのタイミングで共に食事をすることになった共鳴などが暗示されるサビアン・ワードです。"],["中国人の使用人に注意深くやさしく見守られながら白い子羊をあやす少女","自然と共鳴してなすべきことを理解する人","魚座を守護している海王星は、人間が定めた社会のルールや枠組みや法則を示す土星の領域を超えさせていき、もっと大きな宇宙そのもの、大自然そのものへと、わたしたちを回帰させる惑星です。すべてを制約によって管理しようとする枠組みから離れようとするため、体制側から見たら何をするのかわからない危険な存在ともいえますが、宇宙の流れとは共鳴し、よく馴染むでしょう。"],["新しい法のタブレットを持ってシナイ山のスロープから降りてくる予言者","みずから体験したものを言語化して普及させる人","シナイ山の頂上で神から十戒を授かったモーゼは、山から降りて、約束の地へたどり着きました。そして、受け取ったものが広まっていき、現在まで伝えられています。"],["降霊会で実体化された媒体","見えない世界からの要請を実現させる人","現在は物質社会であり、そこでの主役は人間。人は万物を支配して、そこにあるものはなんでも自由に使っても良いと思っている節があるでしょう。"],["人々が密接な相互関係で暮らす広大な海に囲まれた小島","大自然と共鳴して生きることを望む人","この小島で暮らしている人々は、広大な海に囲まれていて、その大きな自然と共にいることしかできません。いくら自分たちで創り出した、人間本位の社会的なルールに基づいて暮らそうと思ったところで、大自然を前に、それはあえなく崩れてしまうでしょう。"],["倒錯した慣習や物質化された理想の悪影響から克服することに成功した宗教団体","内面の意識とその結果が結びつくことを実行する人","宗教団体に所属している人は、ある教義に従って自分の生き方を改めて整え、それを忠実に貫きます。しかし、あまりにも教義を重んじるばかりに、それがどんな結果を生み出すのか、まわりにどう影響するのかを見ずにいると、そのことがかえって周囲との軋轢を生じさせるでしょう。"],["非常に細い三日月が日没に現れるのを見て、それぞれのプロジェクトを進める時間が来たことを理解するさまざまな人々","たましいの目的に回帰する人","魚座の最後の5度のプロセスは、次の牡羊座からの流れに回帰するために、本当に必要なものとのみ繋がっていき、それ以
