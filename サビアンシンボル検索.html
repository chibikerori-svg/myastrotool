個性あふれる個人から、集団と同化する個人を強化するプロセスに入るサインです。蟹座に入って間もないここでは、同化しようと試みる個人と、しかし馴染みきっていない違和感との葛藤が生じることがあるかもしれません。", "explanation": "このサビアン・ワードが示している男性は鹿のファーをまとって、あたかも本物の鹿であるかのようにふるまいながら、他の鹿たちをリードしています。この仲間であるようにふるまうことで対象との同化を試みていることは、蟹座が場の雰囲気に同化しようとする象徴といえるでしょう。\n蟹座はそこがどこであれ、その場の空気を読み解き、与えられた環境に馴染んでいきます。その場にいるのが鹿の集団であれば、あたかも自分も鹿であるかのようにふるまいますが、本当の鹿にはまだなりきっていないため、そのギャップが時折のぞいて、孤独を感じることがあるかもしれません。\nこの度数を持っている人は、自分の置かれた環境や場や関係性にみずから馴染もうと努力するでしょう。それがぴったりとうまくハマると心地よく、その集団を引っ張っていくようなリーダーシップを発揮できます。サービス業や接客にも向いていて、相手の雰囲気や求めているものに応じて、自分を寄せていくことも得意でしょう。\nしかしあまりにも相手が異質であったり、場の雰囲気に馴染みきれなかったりする場合には、さみしさを感じたり、ひとりだけで頑張っているような気がしてきたりするかもしれません。そんな繊細さを持っていることを自分自身が理解していることが必要といえるでしょう。"}, "蟹座_4": {"sign": "蟹座", "degree": 4, "symbol_ja": "ねずみと議論しているネコ", "symbol_en": "A cat arguing with a mouse.", "key_phrase": "ねずみとネコは本来の力関係でいうと、相容れない性質があり、通常ネコはねずみを見つけると追いかけていこうとするでしょう。", "explanation": "しかしここではネコがねずみを追いかけるのをやめて、議論しています。力で他者を凌駕するという古いパターンが終わろうとしているのかもしれません。\n蟹座は心地よい親和性によって、集団に馴染んでいくサイン。古いタイプのボスが、強い力でワンマンに縦型の構造で命令をくだして、みんなを引っ張っていくのだとしたら、蟹座のボスは仲間たちに親身に寄り添って、面倒を見て、じっくりと対話をしながら、ひとつの目的を共有しようとするのかもしれません。ここでは力と力による強弱の押さえつけるような関係はなくなっていき、むしろ力のあるものが弱いものを助けて面倒を見るような、相互互助的な関係がはじまっていくのでしょう。\nこの度数を持っている人は、相手が誰であったとしても、自分のほうから謙虚な態度で関わっていき、心地よくなるように馴染んでいこうと試みるかもしれません。親近感のあるコミュニケーションを通して、おたがいを理解し合い、受け入れ合おうともするでしょう。\n誰に対しても人当たりがよく、仲良く馴染もうとするため、サービス業全般、特に接客やセールスの営業や相談員などにはピッタリです。やさしく柔らかく親和的な態度で相手を心地よく寛がせることができるので、どこへ行ってもまわりの人たちと仲良く過ごすことができるでしょう。"}, "蟹座_5": {"sign": "蟹座", "degree": 5, "symbol_ja": "踏み切りで電車に破壊された車", "symbol_en": "At A Railroad Crossing, An Automobile is Wrecked By A Train.", "key_phrase": "車は個人が単独で乗りこなすもので、自由に行き先も運転の速度も変えることができます。それに対して、電車は行き先も速度も決まっていて、同時に大勢の人たちを乗せるもの。踏切で電車に破壊されるというサビアン・ワードは、小さな個人の意志が、大きな集合体に巻き込まれていくこと、個人が全体に取り込まれることを示しています。", "explanation": "牡羊座から始まったわたしたちの個性が、蟹座の段階にくると一旦すべて否定されていきますが、ここで個人の意志が通用しないということを体験するのでしょう。\n実際にわたしたちは個性を持っている個人であると同時に、集団の一員として暮らしています。いくら意志を尊重したいと思っても、集団のルールや規律の前で、それが通用しなくなることがあるでしょう。大きな目的や流れを遂行するために、むしろ強すぎる個性は邪魔にもなっていきます。\nしかし個人から見ると、それは大きな目的に対する個の犠牲ともいえるでしょう。\nこの度数を持っている人は、負けん気が強く、自分の思いや意志がしっかりとありますが、成長過程において、たびたび意志を打ち砕かれるような経験をすることがあるかもしれません。それはときに非常に苦しく、自分の存在を否定されたかのような気持ちになることもあるでしょう。\nしかし、それを繰り返すことで、自分自身の器がより丸く、大きくなっていき、大抵のことを受け容れられるようになっていきます。自分自身を貫くことよりも、全体のために働く喜びや大切さを実感することで、光り輝くことができるでしょう。自分の活動が全体の一部を担っているのだということに意識を向けるほど、大きな喜びの形となって活かされることになりそうです。"}, "蟹座_6": {"sign": "蟹座", "degree": 6, "symbol_ja": "羽根で巣を飾っている猟鳥たち", "symbol_en": "Game birds feathering their nests.", "key_phrase": "猟鳥たちが、みずからの羽根で巣を飾るのは、そこを心地よい場所にするためでしょう。生活の母体である家を心地よくすること。そこに根付いて、身体を休め、力を養うために、ていねいにホームを整えること。", "explanation": "わたしたちの心身が育まれる母体は家にあります。そこが心地よく、くつろげて、安心して、のびのびできるほど、わたしたちは持ち前の能力や感性を伸ばすことができるでしょう。そんな居心地の良い場所を作るために、みずからを捧げることが喜びとなるかもしれません。\nわたしたちには成長のさまざまな段階があって、それに応じた保護を必要とします。もっとも手厚い保護と世話を必要とするのは幼年期であり、安全に守られた環境が必要となるでしょう。思春期に入ると、自分の部屋や干渉されずに自分で考えたことが尊重される環境が必要となり、社会人や大学生として自立するとコンパクトにまとまった動きやすい拠点が必要となるかもしれません。結婚したならばそれにふさわしい住まいを、子育て中、熟年期と、その時々にふさわしい暮らし方というものがあるでしょう。\nこの度数を持っている人は、そのような母体となる拠点を心地よく整える才能を持っているようです。家族や仲間のために、なんでもしようとする大きな愛の持ち主です。献身性が高く、具体的な奉仕ができるので、家庭生活の基盤を作るのにぴったり。\n不動産関係や住居やインテリア、生活全般に関する仕事にも適性があるでしょう。"}, "蟹座_7": {"sign": "蟹座", "degree": 7, "symbol_ja": "月明かりの下で踊っているふたりの精霊", "symbol_en": "Two Nature Spirits Dancing Under the Moonlight.", "key_phrase": "サビアン・ワードに示されている通り、月との親和性が非常に高まる人です。そもそも蟹座の守護惑星は月であり、わたしたちの目には見えない世界とのつながりを強化しますが、ここではそんな世界で働いている力を受け取る能力がクローズアップされるでしょう。", "explanation": "なんとなく感じる。口には出さないけれど、わかる。そういった空気を読み解く力が人一倍強く、オーラ体の一部であるアストラル体の活動が活発になります。自然界では多くのものたちが月の満ち欠けによって息づき、動かされています。人間にも月の影響を強く受けやすいタイプの人がいますが、心のバイオリズム、身体の調子など、月から動かされるようなことがあるかもしれません。\nこの度数を持っている人は、あらかじめ自然界の流れと気線が結ばれているようなところがあり、直感を通じて、見えない流れを理解するでしょう。安全なもの、危険なもの、近づいていいもの、ダメなものを本能的に見抜く力が備わっていそうです。月の影響を受けやすくなるので、カレンダーで満ち欠けや月の星座などをチェックして、どんなめぐりのときに、どのようなことが起こるのか、ある程度わかっていると過ごしやすくなるように工夫できるでしょう。\nアートに造詣が深くなり、受け取ったものを描いたり、踊ったり、歌ったりすることで表現するのも得意かもしれません。純粋で型にとらわれない素直さがあるので、そこを汚染されないように大切に守ることも必要となるでしょう。"}, "蟹座_8": {"sign": "蟹座", "degree": 8, "symbol_ja": "人間の服を着て", "symbol_en": "パレードをするウサギたちのグループ", "key_phrase": "模倣することを通して集団に馴染む人", "explanation": "ウサギは野性的であると同時に、月に住んでいるといわれている動物です。蟹座の守護惑星は月ですから、ウサギは蟹座とも縁のある動物ともいえるかもしれません。\n月は環境に適応するために、すでにそこに馴染んでいる人を手本として模倣する質があります。模倣はわたしたちのあらゆる成長の原点。幼児期のわたしたちは、まわりの大人たちのふるまいを見て、あらゆること、するべきことを真似することによって覚えていくでしょう。たとえ大人に成長したあとであっても、なにかの技術などを習得するときは、それをすでにうまくこなしている人のやり方を見て、真似することが近道です。\nこのサビアン・ワードでは、ウサギが人間の服を着て、人間らしく行進することを模倣しています。これはある意味、自分の属する社会に馴染むために、集団で訓練を受けているような姿......幼稚園や保育園で、先生の真似をしながら、団体で行動することを憶えていくような姿に通じるものがあるでしょう。\nこの度数を持っている人は、自分の本能的な部分を、ある集団の規律に合わせて、律していくことをするかもしれません。また、幼児教育や、ある団体の秩序に人を馴染ませるのを促すことにも適性があるでしょう。\n心で感じていること、なにかキャッチした直感を、わかりやすく表現することも得意かもしれません。ともすると、さまざまな方向に揺れやすい感情のリズムをつかんで、心をある一定の方向へ沿わせていくようなこともできるでしょう。"}, "蟹座_9": {"sign": "蟹座", "degree": 9, "symbol_ja": "魚を捕まえようと池に屈みこんでいる幼い裸の少女", "symbol_en": "A Small Naked Girl Bends Over A Pond Trying To Catch A Fish", "key_phrase": "幼い裸の少女は、まだ無垢で純真な飾らない心を持っている存在です。わたしたちの、大人になろうとも、決して失われることのない、ハートの純粋さを示しているのかもしれません。", "explanation": "その素直な心が、ほんの好奇心から池で動きまわっている魚に興味を抱き、捕まえようとしています。池が集合体や無意識の象徴だとすると、魚は感情や心の揺れ動き、あるいは生命力の持っている神秘のシンボルだといえるでしょう。そこに手を伸ばしている姿は、人の内側に見え隠れする、心や気持ちの揺れ動きに敏感に反応して、捕らえようとしている姿に通じるものがあるかもしれません。\nあるいは、あらゆる自然の中に存在する生命の神秘に気づいて、それを紐解きたいと願うこともあるでしょう。\nこの度数を持っている人は、他者と自分の心の動きに敏感であると同時に、興味を抱いて、心理学やインナーチャイルドのケアをすることになるかもしれません。ハートをテーマとするものに縁ができやすく、そこに対する関心も高いため、子どもや動物や人の心に携わる人もいるでしょう。\n神秘的な目には見えない自然の営みや、生命の移り変わりにも惹かれるため、そういった秘密を解明したり、月の満ち欠けや潮の満ち引きが自然や人間にどんな影響をもたらしているのか、ということを研究したりすることもありそうです。自分と他者の心の動きや情操的な面に関心が寄せられます。\nとても素直で繊細でありながら、時にまわりをあっと驚かせる大胆な面も持ち合わせているでしょう。"}, "蟹座_10": {"sign": "蟹座", "degree": 10, "symbol_ja": "カットする最初の段階にある", "symbol_en": "大きなダイヤモンド", "key_phrase": "自分の内にある感受性に磨きをかけて表現する人", "explanation": "わたしたちは日常的に自分の内側でたくさんのものをキャッチして感じています。しかし、自分の内側で起こっていることを他者に理解してもらうためには、それを表現する方法を身につける必要があるでしょう。\n小さな子どもが、たくさん感じているのに「うまく言えない」「よくわからない」というのは、それをどのように表してよいのか、わからないため。たとえ大人になったとしても、わたしたちは起こっている事実を説明することができても、心の中で揺れ動いているものを伝えることはむずかしいでしょう。\nこのサビアン・ワードでは、ダイヤモンドの原石という大きな可能性のあるものを、誰から見てもわかりやすく、求められるようにカットしようとしている最初の段階です。内側で感じている主観を、客観できるように研ぎ澄ませていくこと。ダイヤを研磨したり、さまざまな処理を施したりして美しく輝かせていくことは、人の素直な心からあふれ出るものに磨きをかけることに通じるでしょう。\nこの度数を持っている人は、とても努力家で、自分の持っている資質を磨き続けようとするかもしれません。元々持っている素材たちをきちんと活かして、他者に示すことができるように高めていき、より良い自分になろうと試みるでしょう。\n新しいものを生み出したり、技術を身につけたり、なにかを創作する人もいそうです。その過程において苦労することがあったとしても、一身に向かっていくような一途さがあるでしょう。\nサビアン・ワードにある通り、ジュエリーや彫金やクリスタルと縁のある人もいるかもしれません。"}, "蟹座_11": {"sign": "蟹座", "degree": 11, "symbol_ja": "有名人を風刺しているピエロ", "symbol_en": "A Clown Caricaturing Well-Known Personalities.", "key_phrase": "わたしたちの心は、その環境のなかで、みんなが当たり前にしていることを模倣するという特徴があります。", "explanation": "しかし、それはあまりにも無意識のうちに起こるので、いつしかその当たり前がパターンとなり、なにかがおかしい、なにかが苦しいと感じることがあっても、そこから抜け出せないという事態にもなるでしょう。「こうあるべきだ」という、ある種の権力による支配構造がパターン化していると、そこに抑圧されていることが苦しくても、抜け出すことができません。\nピエロはそんな権力者による支配構造や、世界で起こっていること、有名人などを面白おかしく風刺するでしょう。その特徴や思想を極端なまでに強調すると、みんなは笑い始めます。それは当たり前だと思いこんでいたことに気づきをもたらすことであり、また、それに対して深刻になりすぎていた自分を笑い飛ばすことで心を自由に解放する行為。気づきと笑いが起こった途端に、まるで夢から醒めたかのような、ハッとした目醒めがやってくるでしょう。\nこの度数を持っている人は、このピエロのような視点を持つことができそうです。ひとつの物事に対して、深く観察することで、その特徴をパッとつかみ、真似することができるかもしれません。そうすると同時に自分や人が陥っているクセやパターンを見抜いて、なにが起こっているのか、なにか深刻になりすぎていないか、気づくこともできるでしょう。\n誰かを茶化したり、突っ込んだりしているときは、その人の支配や影響から逃れようとしているのかもしれません。パターンから離れて自由であることを求める心を持っているでしょう。"}, "蟹座_12": {"sign": "蟹座", "degree": 12, "symbol_ja": "偉大な教師の生まれ変わりであることを示す", "symbol_en": "オーラを放っている赤ちゃんを", "key_phrase": "A Chinese Woman Nursing A Baby Whose Aura Reveals Him To Be The", "explanation": "Reincarnation Of A Great Teacher.\nあふれる愛情で人の最善の可能性を育てる人\n赤ちゃんの放つオーラが「ただものではない」ということに気づいていながら、中国人の女性がその世話をしています。サビアン・ワードで「中国人」という単語が出てくると、それは東洋的な精神性の高さや、ていねいさと関係しているでしょう。\nその子が本当に偉大な教師の生まれ変わりであるかどうかは、大人にならなければ、わからないかもしれません。しかし、偉大な教師の生まれ変わりだろう、という思いがあれば、誰もがその子をていねいに扱い、意志を尊重して、充分な教育を与えて、育てようとするでしょう。\nこれは養育することと関係したサビアン・ワードで、その人の中に秘められた可能性や資質を見つけ出す能力といえそうです。人は誰でも、その人だけの特別な才能を秘めています。それを信頼して、人の最高最善の質を育てようとする深い愛情が示されているでしょう。\nこの度数を持っている人は、大勢の人間たちを愛し、信頼して、その人の持つ美しさや素晴らしさを見つけ出そうとするようです。一見なんでもない平凡なものの中にでも価値を見出して、またそれを育む力も持っています。\nとても深い愛情の持ち主で、人の秘めている神聖な可能性を育てていくことができるでしょう。実際に養育と関係するため、乳幼児の世話や子どもの教育、看護や介護などの職につくと、相手が誰であっても尊重して、心地よい関係を作っていくことができそうです。\n一般的なものの見方にとらわれず、自分独自の感受性を発揮して、世界を見ることができるでしょう。"}, "蟹座_13": {"sign": "蟹座", "degree": 13, "symbol_ja": "研究のために差し出された", "symbol_en": "とても目立つ親指を持つ手", "key_phrase": "自分で信じた道を貫き通す人", "explanation": "親指はお父さん指であり、強い意志を押し出していくような、大きな可能性を秘めている指。その親指がとても強調されている手が、学びをより深めるために差し出されています。何事に対しても、自分なりの意見や価値観をしっかりと持っている人だといえるでしょう。\nしかし、いくら自分の意見を持っていたとしても、もしかするとまわりの人たちは、パターンに縛られていたり、世間体や外の権威のいうことに従って動いていたりすることが多いかもしれません。そこにヤキモキしながら、時に誰も仲間のいないような、孤立感を憶えることもあるでしょう。蟹座は共感を求めるサインであるだけに、仲間が見つからないと意気消沈してしまうかもしれません。\nだけれども、それでも自分の意志を貫き、育て続けることで、まわりを巻きこみ、圧倒するような力を持つことができるでしょう。\nこの度数を持っている人は、自分なりの意見や価値をしっかりと持っていて、それを打ち出し、伝えようとするかもしれません。その意見に現実的な結果や実行力がともなわないときは説得力に欠けて、共感してくれる仲間に恵まれないこともあるでしょう。\nしかし、それでも自分で信じた価値をしっかりと育てて、目に見える結果につなげていくことで、大勢の人たちに影響を与えて、支持を獲得できるようになります。強い責任感を発揮して、孤軍奮闘しながら信じた道を貫くことで、大きな成長を手に入れることができるでしょう。"}, "蟹座_14": {"sign": "蟹座", "degree": 14, "symbol_ja": "北東の広く暗い空間に顔を向けている老人", "symbol_en": "A very old man facing a vast dark space to the northeast.", "key_phrase": "北東というのは鬼門にあたり、これは霊界や異界への入り口にあたります。そして霊界や異界は、わたしたちの存在や宇宙の根源とつながっているでしょう。", "explanation": "蟹座はわたしたちと家族とのつながり、その家族が住んでいる土地とのつながりを思い起こさせます。さらに、その土地の母体である星とのつながり、また星の母体である宇宙とのつながり......と、掘り下げていくほどに宇宙全体とその源へと、わたしたちをいざなうでしょう。\n蟹座はスペースと関係しますが、それは安心して暮らすことのできる居場所としてのスペースであり、そこでホッとくつろぐことで広がっていくハートのスペースでもあります。わたしたちが自分自身のハートの内側にくつろぐほど、自分と世界とがひとつとなるような、自分の存在が世界と溶け込んでいくような『空』を感じるかもしれません。このサビアン・ワードで老人が顔を向けている空間は、まさにわたしたちのハートが究極にくつろいでいる状態から、宇宙の真理を体験することの象徴かもしれません。\nこの度数を持っている人は、何事に対してもしっかりと受け止めて、自分の内側で熟考することを好む傾向があるでしょう。歴史やルーツを紐解くことに興味を持ったり、宇宙の真理を求めて、さまざまな宗教観や人の心の究極の真実を見出そうとしたりするかもしれません。\nがちゃがちゃと騒がしく過ごすことよりも、ひとりで静かなスペースで深層と向き合うほうが性に合うという人もいるでしょう。個人と土地、星、宇宙とのつながりを、自分の中で求めていく人です。\n**"}, "蟹座_15": {"sign": "蟹座", "degree": 15, "symbol_ja": "**", "symbol_en": "大きな宴会のあとで", "key_phrase": "豪華なダイニングホール", "explanation": "In A Sumptuous Dining Hall Guests Relax After Partaking Of A Huge\nBanquet.\n人々を結びつける力を持ち、日々の生活を豊かにしていく人\nとても現実的で豊かさのあふれる生活を彷彿とさせるサビアン・ワードです。蟹座は共同体とのつながりや結束を強めるサインですが、その絆は共に協力しあって生活することによって育まれていくでしょう。\n生活と衣食住は蟹座のメインテーマであり、食の豊かさはわたしたちの人生をもっとも豊かに彩ってくれる原点。日々の食事を共にしたり、客人を食事に招いて、共に過ごしたりすることで、人々はより深い絆で結ばれていくでしょう。\n宴会は古くから共同体の結束を高めるためにおこなわれてきました。特別な儀式の折、祭典や祝いの席、悼みの席、賓客がやって来たとき......共に豪勢な宴席を過ごすことによって、人々の円がより濃厚に結ばれていくことになるでしょう。\nこの度数を持っている人は、現実的な毎日の生活の隅々まで、みずからの意志と感情によって豊かになるように満たそうとするかもしれません。喜びと豊かさをとても大切にしていて、楽しいことが大好き。人や物や情報にも恵まれやすく、物質的に充実した日々を過ごそうとするでしょう。\n当然食べることも大好きで、美味しいものをお腹いっぱい、大好きな人たちと一緒にいただくことに至福の喜びを感じることも多いはず。自然と人と人とを結びつける力を持っていて、それをみんなと分かち合おうとするかもしれません。\n生きることの豊かさ、現実生活のすばらしさを知っていて、それを仲間たちと共に築き上げ、実行しようとするでしょう。"}, "蟹座_16": {"sign": "蟹座", "degree": 16, "symbol_ja": "古代の書物を頼りに", "symbol_en": "目の前にあるマンダラを研究している男", "key_phrase": "Ancient Book.", "explanation": "内なる宇宙の真理を紐解いていく人\nマンダラというものは、この宇宙全体がどのような構造で成り立っているのか、あるいは人の心がどのような階層構造を持っているのか、はたまた目では見えない神々の世界がどのように成り立ち、作られているのか、といったことを図で示したもの。これを研究して紐解いていくことは、この宇宙や世界や人間の心や生き方がどのようにできているのか、という仕組みを学ぶことに通じるでしょう。\n蟹座は自分の土地、この世界、宇宙との関わりを深く感じるサインですが、ここでは深く内省して、自分自身を見ることになるかもしれません。\n人間がどのような過程を経て成長していくのか。それは誰もが同じような道を辿るのか。どうすればより深淵な真理に近づくことができるのか。自分の心の奥底にある真実と、宇宙とが、どのようにつながりあっているのか。そういった謎に興味を抱くでしょう。\nこの度数を持っている人は、心理学を学んだり、精神世界について紐解いたりすることに惹かれるかもしれません。宗教から見る宇宙観や「悟る」という精神についてなど、心の深いところにある真理を探究することに興味を持ちやすいでしょう。自分の内側で深く思考をめぐらせて、じっくりとさまざまな謎と向き合おうとする一面がありそうです。\nまた、自分が探求して知り得たことの一端をアートとして表現する才能もあるでしょう。表にひらいて社交していくよりも、内側で観じて、思想を深めていくことのできる資質の持ち主です。"}, "蟹座_17": {"sign": "蟹座", "degree": 17, "symbol_ja": "原種から生じる多層的な可能性の開花", "symbol_en": "The Unfoldment Of Multilevel Potentialities Issuing From An Original", "key_phrase": "あらゆる可能性を試しながら、自分を理解していく人", "explanation": "地球上に存在する、あらゆる動植物も元を辿れば地上に舞い降りた、ひとつの小さな細胞あるいは細菌であったかもしれません。それが他の物質たちと混じり合ったり、光や水や空気に反応したり、海に潜ったり、また陸に上がったりを繰り返しながら、多種多様な種族たちへと発展を遂げていきました。\n蟹座はルーツとのつながりを強化するサインですが、自分の家族、血族をさかのぼるとヒトの起源に行き着き、さらには哺乳類の起源、動物の起源、生命体の起源......と、元の小さな可能性を秘めた、原種にたどり着くかもしれません。そこからありとあらゆる種類の挑戦があって、さまざまな形の存在へと分岐しながら進化したのでしょう。\nそして、わたしたちの中にも同じような、無限のような潜在力が秘められているともいえそうです。自分の持っているさまざまな可能性は、いろいろな挑戦を繰り返すことで、花開き、進化するでしょう。\nこの度数を持っている人は、自分の中に宿っている多様な潜在力を信頼して、どんなことにでもチャレンジしようとするかもしれません。何事でもやってみなければわからず、やりながら自分自身のことを理解していくことができそうです。なにかを成し遂げたら、それで終わりということもなく、そこから発展できる次の可能性を探して、また実際に行動を起こすことにつながるでしょう。\n自分の内側にあるものを、外側の行為に結び付けることで、すこしずつ自分を知っていきます。どんなことでもアクティブに、一度はやってみようと思うところがあるかもしれません。内なる可能性をさまざまな角度からひらいていくことになるでしょう。\n人生をおおいに楽しみながら、自分自身への理解を深める人です。"}, "蟹座_18": {"sign": "蟹座", "degree": 18, "symbol_ja": "雛たちに与える餌を", "symbol_en": "大地からほじくっている雌鳥", "key_phrase": "理想を日常のなかで一歩ずつ実現させていく人", "explanation": "母鳥が一生懸命に地面を突っついているのは、子どもたちを豊かに成長させるため。\nわたしたちがもっと豊かに発展しながら生きていくためには、何もせず、いつも同じ生活だけを繰り返していても変わりません。自分の理想を実現させるために、できることを少しずつこなしていくことが必要となるでしょう。\n日々の生活の中に実際的な行動として、理想に近づくためのエッセンスをもたらすこと。憧れているものに「いつかなる」のではなく、そのためにできるファーストステップをいますぐにでもはじめた人が、憧れを実現できるのでしょう。\n「これをしたい」「こうなりたい」と口では言いながらも、日々の行動を見ていると、まるでそれとは関係ないことばかりを繰り返す人がいます。理想と現実とが乖離しないように、日常のなかで結びつけていく働きが、このサビアン・ワードに含まれているでしょう。\nこの度数を持っている人は、自分の人生を切り拓いていくことに対して意欲が高く、内側に秘めている思いを、目に見える現実に反映させる力がありそうです。「こうしていきたい」という目標をしっかりと定めることで、具体的なアイデアやそれを実現させる創造性が湧いてくるでしょう。\n理想主義なところがありますが、しっかり現実に根付いていて、それをかなえるための材料を日常の中から見つけ出すことができそうです。新しい可能性を見つけ出して、それを育てていくことができる人だといえるでしょう。"}, "蟹座_19": {"sign": "蟹座", "degree": 19, "symbol_ja": "結婚の儀式を執り行っている司祭", "symbol_en": "A Priest Performing A Marriage Ceremony.", "key_phrase": "わたしたちの日常生活というのは、基本的に日々同じようなことの繰り返しでできあがっています。", "explanation": "結婚というのは、そんな日常を共に過ごすカップルが新しく誕生することを、本人たちが大いに自覚すると同時に、まわりの人たちにも知らしめる行為。生活を共にして、おたがいに助け合って生きていくということを、司祭にうながされて神の前で誓うと、わたしたちの日常は神聖な「約束されたもの」となるでしょう。\n司祭はわたしたちの日常的な出来事や心の揺れ動きに、特別な意味を見出します。わたしたちは司祭の言葉に耳を傾けることで毎日の生活で起こる、ひとつひとつの意味を確認するかもしれません。また司祭の執り行う儀式は、その共同体で暮らすさまざまな人たちの結束を強めることにもつながるでしょう。\nこの度数を持っている人は、自分の属しているコミュニティや、まわりにいる仲間たちのつながりや絆を結びつけていく働きをすることになりそうです。なにかしらの、人の感情的な結びつきを喚起させるような役割を担うことがあるかもしれません。\n人生における転換のときを迎えている人に寄り添って、それがうまくいくように支えることもするでしょう。仲間を増やして、その絆をかためていくことをみずから実践して、共同体のなかで一目おかれる存在となることもありそうです。\n決して、でしゃばることはありませんが、誰に対しても温和にやさしく、人々を導いていくような力を持っているでしょう。"}, "蟹座_20": {"sign": "蟹座", "degree": 20, "symbol_ja": "セレナーデを歌っている", "symbol_en": "ベニスのゴンドラの船頭", "key_phrase": "自然と土地から支えられ、土地のために尽くす人", "explanation": "ハートの内側に深く潜り、地域や土地の歴史、人の営み、そして星から支えられているといったことを、理屈を超えたところで感じるようになると、自分の身のまわりにある世界のすべてが自分の一部であるように思えるでしょう。本能的に世界中の大自然の営みと自分自身の生命とが同じものを起源とし、同じように息づいていることを理解すると、今度は社会のあらゆる営みと自分自身とがつながっているかのように感じられるかもしれません。\nベニスのゴンドラは昔からその地域を代表する乗り物であり、セレナーデは土地に伝わる伝統楽曲です。これを歌いながら船を漕ぐこともまた、この地域の伝承ですが、社会のあり様と自分とが調和していると、それを受け継いで、その行為を繰り返すことで、より土地と深くつながりを感じて、土地から支えられて、癒されることにもつながるでしょう。\nこの度数を持っている人は、生まれ育った土地や、縁あって住まうことになった土地に愛着を抱き、その土地のために働くことがありそうです。土地の持つ文化や風習を踏襲して、みずから体現しながら、それを広め伝えることも楽しんでするでしょう。\nその地域の持つ歴史や習慣にも興味を持ち、そこに根付き、みずから繰り返してみせることで、帰属意識がますます高まって癒されていきそうです。旅行業やガイドなど、その土地とダイレクトに関わる仕事をする人もいるでしょう。\nおおらかで癒し系の魅力を放っている人です。"}, "蟹座_21": {"sign": "蟹座", "degree": 21, "symbol_ja": "オペラ公演で卓越した技を披露する有名な歌手", "symbol_en": "A Famous Singer Is Proving Her Virtuosity During An Operatic", "key_phrase": "華やかな魅力を解き放って、社会のなかで活躍する人", "explanation": "オペラの公演を成し遂げるためには、志を同じくする何十人もの人たちで、力を合わせて完成させていく必要があるでしょう。ひとつの大きな目的に向けて、みんなで心を団結させていく必要もあります。出演者たちの感情が観客の心を打ち、揺り動かすため、公演が成功するかどうかは、出演しているひとりひとりの歌手たちの心をつかむ、気持ちの表現にあるといえるでしょう。\nこのサビアン・ワードに出てくる有名な歌手は、オペラの名手であり、その卓越した素晴らしい技を披露し、きっと観客を大いに魅了しています。人々の心を喚起させて、感動に導いていく力。華やかさと存在感。カリスマ的な魅力。この歌手はそういったものを使いこなして、社会的な成功体験と共に、大衆の心をつかむ能力も手に入れたといえそうです。\nこの度数を持っている人は、自分の内側にある感情を表現することがとてもうまく、そして多くの人たちの気持ちをつかむことができるでしょう。人々を惹きつけるだけの魅力と離れていてもパッと目を惹くような華やかさがあり、仲間たちを先導するリーダーとしての存在感があります。実際に大勢の人たちと共になにかを創り上げたり、社交を楽しんだりすることもあるでしょう。\n自身のしあわせを集団のなかで成功することに見出して、実際にそれを達成するだけの能力を持っている人です。高いポテンシャルを社会のなかで解き放って、大きなしあわせをつかむことができるでしょう。"}, "蟹座_22": {"sign": "蟹座", "degree": 22, "symbol_ja": "ヨットを待っている若い女性", "symbol_en": "A Young Woman Awaiting A Sailboat.", "key_phrase": "ハーバーでヨットを待っている若い女性は、それがやって来ることを夢見ていて、そこに力強い期待を抱いているでしょう。ヨットがやってきたら、こんなことが起こるかもしれない、あんなこともできるかもしれないと、さまざまな想像力を広げながら、待ち続けているのかもしれません。", "explanation": "夢と期待、それから空想が多大に広がっていくサビアン・ワードですが、それは海という集合無意識の象徴からやってくるため、彼女の個人的な願望を夢見ているだけとはいえないでしょう。こんなことが起こったら素敵だろうと期待を向けているものは、家族や地域やまわりを取り囲んでいる環境。人と人とが愛と思いやりと共感で結びついて、おたがいに助け合っているような、静かで美しい理想的な世界がやってくることを望んでいるのかもしれません。\nこの度数を持っている人は、いつも前向きで明るく、周囲の人たちに愛とやさしさを分かち合っているでしょう。想像力が満ちていて「こんな風になったらいいな」「あんなことをしてみたいな」と、たくさんの夢や理想を持っているかもしれません。他者の感情に寄り添って、共感することのできる深い受容性の持ち主です。\nただし、それゆえに、いつも待ちの姿勢となりやすく、思い描いているものをいつまでも夢のままにしておくことも起こるでしょう。他のアクティブな星と連携するか、自分の思いを他者に語って協力してもらうと、思いを実現することにつながるかもしれません。"}, "蟹座_23": {"sign": "蟹座", "degree": 23, "symbol_ja": "文学仲間の集まり", "symbol_en": "Meeting of a literary society.", "key_phrase": "文学仲間の集まりというのは、文化人の集まりであるともいえるでしょう。その土地の持っている文化を、いまの時代にマッチした形で表現するのが文化人であり、文学者です。", "explanation": "わたしたちはその時々の時代背景において、独自の空気感を持つでしょう。そのときの社会が持っている雰囲気を敏感に察して、その現象を言語化したり、新しいひとつの文化として提唱したりすることで、社会全体に対する影響力を持つのも文化人です。\nそれはある種、現代社会と自分とが馴染み切って、社会の空気とあたかも同化しているようであるからこそ感じられる些細な動きや変化といえるでしょう。いまの社会が持っている無意識のうちに醸し出しているイメージを拾い集めて、その時々の時代のローカルな文化を育んでいく人です。\nこの度数を持っている人は、鋭い感性と文化的な知識を豊富に持っているでしょう。時代の波を読み解く感受性と、それをセンス良く理論的に表現する力も併せ持っていそうです。仲間たちと集まって、わいわいと議論しながら、みんなでなにかを創り上げていくような活動に好んで参加する人もいるでしょう。\nどんな分野でも良いので、興味あるものに積極的に参加すると、その最先端を創り上げていくような充実感が得られそうです。仲間と一緒に文化的なさまざまな活動を楽しむことができるでしょう。文学的な才能にもあふれているので、感じているものを言葉に置き換えて表現することにも長けているようです。\n**"}, "蟹座_24": {"sign": "蟹座", "degree": 24, "symbol_ja": "**", "symbol_en": "**南の海の小さな島に漂流した女とふたりの男**", "key_phrase": "**理想の人間関係によって支えられた環境を創生する人**", "explanation": "自分たちにとっての理想の環境を創り上げよう!!と、現代社会の枠から飛び出して、まったく自由な閉鎖された地域に飛び出した三人です。集団の持っている本質的な力をもっと引き出し、大自然の営みと共鳴するような理想社会をめざして、まずは少数でそれをはじめてみようと試みるでしょう。\n3という数字は物事を新しくはじめるクリエイティブの象徴であり、女性ひとりに対して男性がふたりであるのは、すこしだけ能動性の力のほうが強化されている、ということかもしれません。新しい環境を手に入れた三人は、それぞれが異なる役割をこなしながら、理想の共同体を作り始めるのでしょう。\nこの度数を持っている人は、純粋な理想と、それを実行するだけの行動力とを併せ持っているようです。新しいコミュニティやスペースの創生に関わることがあり、その環境において、卓抜した才能を発揮できるでしょう。\n人間同士が愛と信頼をベースに結びつけられた関係に理想を抱き、限られた場所の中からその関係を実践していくことになるかもしれません。新しいものを創り出す能力が高く、思いついたアイデアを実現していくアクティブさもあるでしょう。\nいまの社会のなかにある仕組みのなかでそれを実行するよりも、そこから一歩離れたところで、自分だけの楽園を一から創生したほうが満足できることが多いはず。その理想に共感してもらえる仲間に恵まれると、とても充実した日々を過ごすことができるでしょう。"}, "蟹座_25": {"sign": "蟹座", "degree": 25, "symbol_ja": "超越的な力が降りてきたことで", "symbol_en": "影が薄くなる意欲的な男性", "key_phrase": "見えない恩恵に守られて、より豊かな経験ができる人", "explanation": "意欲のあふれる男性に自分のものではない、なにか超越した世界から力がやってきて助けられる......というサビアン・ワードです。その分だけ、本人の意志の力はすこし抑えられますが、見えないところからの恩恵が大きく働くでしょう。\n蟹座は独自の感受性で、先祖とのつながりや地球とのつながりを見出していく星座ですが、それらとつながることを通して、なにかに守られたり、自分以外のものから啓示のようにヒントを受け取ったり、どこからともなく不思議なサポートがやってきたり......といったことが起こりやすくなるでしょう。見えないところから降りてきたサポートを活かすことで、より豊かになっていくことを可能かもしれません。\n自分の意志を発揮してこれまでやってきたことにプラスして、もたらされた恩恵を取り入れていくことで、より多彩な経験が得られるようにもなるでしょう。\nこの度数を持っている人は、積極的に社会のなかで活躍していこうとする意欲がありそうです。特定のフィールドで活動をはじめると、ただ同じことを繰り返すだけでなく、経験を積み重ねながら、より新しいことにもチャレンジしていこうとするかもしれません。\n岐路に立ったときや、なにか困ったときなど、ふとした折にどこからともなく援助がやってきたり、ヒントが降りてきたりすることがあるでしょう。あたかも見えない力で、どこかへ運ばれていくような感覚がすることもあるかもしれません。\nそのような恩恵や不思議な流れを感じることがあれば、自分の意志を脇に置いて、そちらを信頼してついていくことが、物事をより円滑に進めるカギとなることも......。世界を深く信頼することで、不思議な縁も増えていくことになりそうです。"}, "蟹座_26": {"sign": "蟹座", "degree": 26, "symbol_ja": "**ラグジュアリーな家の図書室で", "symbol_en": "本を読んでいるゲストたち**", "key_phrase": "洗練された情報を分かち合うことのできる人", "explanation": "蟹座は個人の自我を抑えることで、全体とつながるという試みをしてきました。ひとりで過ごす静かな場所で、この地球とのつながりをハートの内側から感じ、それをすることであたかも自分自身と世界とがひとつであるかのように同一感を得ることができます。\nそうすると、社会の動きや世の中の流れや空気感を本能的にキャッチできるようにもなるでしょう。それは世の中を読み解いて、またそれに呼応するように、流行や文化を生み出す力となり得ます。それが得られると、自分自身が世の中に対して影響を与える力を持つようになり、その知性に共感した仲間たちが集まってくるようになるでしょう。\nこの図書室に集まっているゲストたちは、世の中の雰囲気や流れに対して、高い感受性を持っている仲間たちです。いま感じているものを言葉にして語り合うような知的欲求が高く、いつもこのサロンには水準の高い、価値のある情報が集まってくるでしょう。\nこの度数を持っている人は、鋭敏にさまざまなものを感じ取る感性と、それを言語化する知的な能力に恵まれるようです。身のまわりで起こっているさまざまなことに対して、洗練された質の高い情報を所有し、それらを気前よく仲間たちに分かち合っていくでしょう。能力を惜しみなく使うことが社会的な基盤を作り、豊かな経済力を生み出すことにつながっているようです。\n自分で得た情報や楽しみをひとり占めせずに、多くに分かち合っていくことが、心地よい豊かさを維持するためのコツ。多くの仲間たちと一緒に知的な雰囲気の漂う世界を創り出していきましょう。"}, "蟹座_27": {"sign": "蟹座", "degree": 27, "symbol_ja": "高級住宅の集まった渓谷に吹く嵐", "symbol_en": "A Violent Storm in A Canyon Filled With Expensive Homes.", "key_phrase": "わたしたちがどれだけ賢くなり、上質な文化を築き上げることに成功したとしても、自然の脅威はそんなことなどまったく関係なく、わたしたちの創り上げた社会の流れを脅かします。唐突に起こる嵐は、それまでの静かで守られた環境をたちまちのうちに危機的な状況に追い込むでしょう。", "explanation": "それでもわたしたちはその危機感を超えて、より強い基盤を作っていく必要があります。なにが起こるのか予測不能な世の中に対して、恐れて不安になるのではなく、内側からしっかりと世界そのものとつながることで、より柔軟にやってくるものに対応することができるようになるでしょう。\n心地よい暮らしや生き方をわたしたちは誰もが望んでいます。しかしそれは季節のめぐりや自然の移り変わりと同じように変わりゆくもの。ひとつの生き方や価値観に執着するのではなく、その時々のめぐりに合わせて一緒に変化していく力が、たとえ嵐がやってきたとしても、それを乗り越えていく力となっていくでしょう。\nこの度数を持っている人は、自分にとって大切な世界観や価値観があるのかもしれません。ていねいに創り上げていった自分の世界を心地よく楽しみますが、それは自然の原理によって変化を余儀なくされたり、脅かすような存在が出現したりといったことが起こるでしょう。\nそういったときに耐久していまの状態を維持するのではなく、柔軟に流れに合わせて形を変えていくことで、なにがあっても大丈夫、という強さを手に入れることができるようです。そうすることで結果として、変化の多い時代の流れにおいても、自分の世界を貫いていくことができるでしょう。"}, "蟹座_28": {"sign": "蟹座", "degree": 28, "symbol_ja": "集まった部族たちに", "symbol_en": "白人の恋人を紹介するインディアンの少女", "key_phrase": "共同体のなかに新しい風を招き入れる人", "explanation": "これまで当たり前だとされてきた慣習に対して、新しい風を吹き込むサビアン・ワードです。蟹座が脈々と受け継ぎ、築いてきた共同体の価値に対して、積極的に新しい要素を招き入れようとすると働きがあるでしょう。\n伝統を守って暮らしてきたインディアンの部族にやって来た、少女の白人の恋人は、彼らにとって未知の象徴です。まったくこれまでとは異なる価値観やものの見方をする彼は、共同体で暮らしている人たちをドキッとさせて、その生き方を根底から脅かすことになるかもしれません。それでもインディアンの少女は平凡な生き方では飽き足らず、既存の世界の外側にある価値に興味を抱いて、近づいていくのでしょう。たとえ仲間たちから奇異に見られたとしても、気にせずに、自分の内なる思いを貫いていくかもしれません。\nこの度数を持っている人は、ユニークな個性を持っていて、好奇心が強く、身近にないタイプや価値観に惹かれるところがあるでしょう。一度なにかに興味を抱いたら、まわりが何と言おうとも、まっすぐに進んでいく強さもありそうです。\n自分の信念を大切にして、貫いていきますが、仲間や共同体に対する思いも同時に持ち合わせています。なので、共同体から出ていくことよりも、「いい」と感じたものをみんなに紹介して共同体に馴染ませようとするでしょう。\nこれまでの平凡な当たり前のところに、新しい価値観を持ち込む人。新しい風を招き入れて、共同体の可能性そのものを広げていく人。なかば頑固にかたまりつつあった古い慣習に刺激を与えて、波紋を広げつつ、仲間たちの心を動かしていくことになるでしょう。\n自然の持っている基盤としての価値そのものに、新しい角度から可能性を見出すことができそうです。"}, "蟹座_29": {"sign": "蟹座", "degree": 29, "symbol_ja": "金色の秤で双子の新生児の重さを量っている", "symbol_en": "ギリシアの女神", "key_phrase": "新旧のバランスを上手にとって冷静に現実を渡り歩く人", "explanation": "金色の秤を持った姿で描かれることの多いのは正義の女神アストライア。彼女は人の魂を秤にのせて、嘘をついていないか、正直な選択をしているのか、ということを量ります。\nこのサビアン・ワードでは、双子の赤ちゃんの重さを秤にかけています。ふたりの赤ちゃんの一方は、本能や直感や感情を司っているかもしれません。そして、もう一方は知性や理性に相当するでしょう。双子の赤ちゃんですから、このふたつの相反する質が、ぴったりと釣り合うのかもしれません。\n言い換えるなら、これまで当たり前に繰り返されてきた既存の慣習や経験からやってくる判断と、これから体験するであろう見果てぬ未来に対する直観とをバランスよく扱うことのできる人。どちらにも偏らないため、何事に対しても冷静に私情をはさまずに、決断することができるでしょう。\nこの度数を持っている人は、感情と知性、感覚と直観のバランスがよく、いつもどこか冷静に、まわりと自分自身とを見ているようなところがあるかもしれません。自分のなかにあるものをすべて使って、しかしそのどれにも肩入れせずに、正直な判断をしようと試みるでしょう。\n他者に対しても、まっすぐに相手を見ているところがあるため、落ち着いて判断することができるはず。結果として他者から頼られたり、相談にのったりすることも増えやすいでしょう。新旧の知性を自在に使いこなして、旧来からの考え方と新しい合理的な思考とのバランスをとることも得意かもしれません。\nいろいろなタイプの人たちとも、仲良くやっていくことができるでしょう。"}, "蟹座_30": {"sign": "蟹座", "degree": 30, "symbol_ja": "アメリカ革命の娘", "symbol_en": "A Daughter of the American Revolution.", "key_phrase": "なんだかんだいって、わが国が一番!!というところに落ち着くサビアン・ワードです。", "explanation": "蟹座は過去から綿々と続けられてきた伝統に回帰するサイン。蟹座の最後の度数であるここでは、冷静に自分やまわりのことを見る力も養っているものの「やっぱりここがいい」と帰ってくることになるでしょう。\n国や土地や文化の良いところばかりではなく、限界点や問題にも気づいているかもしれません。歴史の中にはネガティブな要素もあり、決してすべてが必ずしも良いとは言えないかもしれません。時にはそのローカル性に嫌気がさして、他の文化に憧れてみたり、実際に飛び出していったりすることもあるでしょう。\nしかし、それでも戻ってくれば「やっぱり、この土地が一番いい!!」と感じて、欠点も含めて、すべてが良いと感じるようです。ここを否定することは、自分自身を否定することにつながります。家族や故郷とのつながりは、わたしたちの精神の深いところで、安心と安定をもたらすでしょう。\nこの度数を持っている人は、自分の生まれ育った土地との縁が強くなりやすいようです。土地の持つ歴史や文化、伝統などに興味を抱いて、大切にしようとするでしょう。\nその一方で、狭いローカルな社会の限界を感じたり、刺激が欲しくなったりして、他の環境や文化に一時的に飛び込んでいくこともありそうです。\nしかし、決して行ったきりにはならず、いろいろな体験を経た後で帰ってくると「やっぱり故郷はいいな」という思いを濃くすることでしょう。外へ出たくなることもあるけれど、ローカルな社会のなかへ回帰する人。精神を安定させるために、結局は落ち着くわが家を選ぶことになりそうです。"}, "獅子座_1": {"sign": "獅子座", "degree": 1, "symbol_ja": "野心に駆られて生命力が滾ることで", "symbol_en": "血が昇ってきた男の頭", "key_phrase": "The Spur Of Ambition.", "explanation": "内側から生命エネルギーがあふれ出している人\n人間の持っている根源的な生命エネルギーが炸裂してあふれ出すサビアン・ワードです。\n獅子座を守護している惑星は太陽ですが、これは人間の持っている本質的な欲求そのものを示しています。子どものように無邪気で、喜びと遊び心に満ちたエネルギー。わたしたちの純粋な好奇心と欲求のかたまり。これは制御することがむずかしいため、わたしたちは社会性を身につける過程において、しばしば封じこめようとするでしょう。\nしかし、完全にこれらの欲求を隠してしまうと、人生から喜びや活力が失われてしまいます。人間社会のなかでルールを守り、個人の人生を営みながらも、その基盤を自分らしい喜びと表現で満たしていくこと......それが獅子座の旅路といえるでしょう。\n獅子座の始まりの度数であるここでは、生命エネルギーがあふれて、さまざまな方向に好奇心をまき散らしています。どんなことでもやってみたい、見てみたい、やってみたい、触れてみたいという思いがあふれ出すでしょう。\nこの度数を持っている人は、非常にアクティブで、ひとたび思い立ったら、どんなことでも実行してみたいと思うかもしれません。子どものようにいろいろなことに興味を抱いて、実際に自分で積極的にそれを体験しようと試みるでしょう。気になるところがあれば出かけて行き、やってみないことには納得できません。\n活力があふれて、自主性もあり、自分のなかで起こっていることを大切にしながら、パワフルに人生を楽しむことのできる人です。"}, "獅子座_2": {"sign": "獅子座", "degree": 2, "symbol_ja": "おたふく風邪の流行", "symbol_en": "An epidemic of mumps.", "key_phrase": "内側からあふれる好奇心と活力とが、個人を超えて感染力を持ち、まわりへの影響力として広がることを示唆するサビアン・ワードです。", "explanation": "獅子座の持っている熱量は、他者へも伝播するもの。自分がとにかく心から楽しんで盛り上がっていたら、その情熱がどんどん感染するように広がっていった状態を示しています。自分自身がおたふく風邪の流行源となるように、大きくまわりまで巻き込んでしまったといえるでしょう。\nある種の集団ヒステリーを引き起こすような力でもあり、自分が好きなことを通してなにかを働きかけると、大きく広がりやすいかもしれません。みんなの内側にあるけれど、着火されていない情熱に火をつけてまわる人。本来持っている自由な生命力の表現を率先してやることで、みんなの内側にあるそれを解放する人。大きなエネルギーを動かすような影響をまわりにもたらすでしょう。\nこの度数を持っている人は、楽しいことが大好きで、ひとたびなにか面白いことを見つけてハマると、それを存分に味わい尽くすようなところがありそうです。さらにそれをまわりにまで広めていくような影響力を持ちますが、それは広めようと意識するというよりも「これがすごいんだ!!」と興奮していたら、その熱が自然と相手の興味や情熱を呼び覚ましたような感じです。\nとにかくどんなことでもまわりを巻きこむパワーがあるので、もっと意図的に使うこともできるでしょう。楽しいイベントやパーティーを企画してみんなを盛り上げたり、新しい遊びや商品を広めたりといったこともできそうです。"}, "獅子座_3": {"sign": "獅子座", "degree": 3, "symbol_ja": "長い髪を肩の上に流して", "symbol_en": "ノーブラで若い人の服を着ている中年女性", "key_phrase": "Braless Youthful Garment.", "explanation": "自分のこだわりを貫いて表現する人\n獅子座の象徴する生命力が個人の人生にまで流れ込んでくると、当人にいつも若々しいフレッシュな感性を呼び覚まします。肩の上に流した髪とノーブラで若い人の服を着た中年の女性というサビアン・ワードは、まわりからどう見られようとも関係なく、自分のしたいことをする、自由に生きる、という欲求のあらわれ。獅子座は子どものような陽気さと自由さをのびのびと表現することと関係しますが、それが思う存分に表現された状態ともいえるでしょう。\n自分らしさにこだわると同時に、ある種の奔放さもそこには示されています。あえて子どもっぽく振る舞ったり、自分のなかにあるセクシャリティの質を存分に楽しんだりすることにもつながるかもしれません。\nこの度数を持っている人は、自分の内側にある種の信念のようなものを持っていて、それをどこにおいても貫こうとするでしょう。自分らしくあることにこだわりを抱き、夢中になれるものに心を強く傾けていく情熱も秘めています。\n心から望んだものを手に入れること、それを表現することにもためらいがなく、それができているときに「自分らしく生きている」という感じがするかもしれません。他者がなんと言おうとも、自分の内なる声に忠実に生きることを良しとするでしょう。\nサビアン・ワードにあるように、見た目や立ち居振る舞いに自由な表現が出てくる人もいそうです。年齢などに関係なく、自分に似合う服装やヘアスタイルをかっこ良く決めていると、満足度が高くなるでしょう。"}, "獅子座_4": {"sign": "獅子座", "degree": 4, "symbol_ja": "遠征ハンティングから持ち帰った", "symbol_en": "トロフィーのそばに立っている", "key_phrase": "A formally dressed elderly man stands near trophies he brought back from", "explanation": "a hating expedition.\n自分でやってみた成果を純粋に喜びと共に語る人\n内側からあふれ出た生命力で、なにかを表現したり、大きな目標に向かってチャレンジしたりして、その結果として得た成果や経験を今度は仲間たちに見せつけよう!!というサビアン・ワードです。ハンティングの成果として得たトロフィーをみんなに嬉しそうに見せている男性は、自分の能力や経験を誇示しようとしますが、これは人間の持っている純粋な承認欲求と結びつけられるでしょう。\nわたしたちは子どものとき、誰もが自分が頑張って成し得たことや表現したことがあると「ママ、見て!!」と、それを喜びと共に家族たちにアピールします。そのときに驚かれたり、喜ばれたりする反応が子どもの自信とつながって、また次のチャレンジへと駆り立てる糧となるでしょう。\nわたしたちのなかにはそのように自分の能力を発揮したことを周囲に知らしめて、まわりにまでその影響を伝播させようとする質があるのかもしれません。\nこの度数を持っている人は、自分の能力を存分に活かして、何かを成し遂げたり、表現したりすることにチャレンジしようとするでしょう。そして実際に何かしらの成果を得ると、そのことが自分自身の誇りとなって、体験したことを面白おかしく他者に聞かせてまわるかもしれません。持ち前の能力による実績と、そこに至るまでの苦労や努力や達成のストーリーに、純粋に聞き手も一喜一憂させられそうです。\n子どものように素直な欲求と自己表現とが、この度数を持っている人の魅力といえそうです。人をグッと惹きつけるだけの能力も持ち合わせているでしょう。"}, "獅子座_5": {"sign": "獅子座", "degree": 5, "symbol_ja": "深い峡谷に塔のようにそびえ立つ岩のかたまり", "symbol_en": "Rock Formations Tower Over A Deep Canyon.", "key_phrase": "自然の風景は気の遠くなるほどの長い年月をかけて素晴らしい景観を生み出すことがあります。見るものを圧倒するような光景というのが世界のあちこちにありますが、それらはわたしたちの心の深い印象を刻み付けるでしょう。深い渓谷に塔のようにそびえ立つ岩もまた、気の遠い年月のうちに浸食されて作られたのかもしれません。", "explanation": "そのようにダイナミックで強靱な光景のような生き方に憧れて、何事かを成し遂げてみたいと、大きなビジョンを描くことがあるでしょう。獅子座の持っている熱い生命力が外の世界へと向けられて、途方もなく大きな夢へと成長したといえるかもしれません。\nそれは誰もが子どもの頃に一度は憧れるヒーローやヒロインへの憧れのようなものかもしれませんが、それを夢見て信じた人だけが、そこへたどり着くことができるのでしょう。\nこの度数を持っている人は、自分の内側に大きな情熱があることを感じるかもしれません。理想主義であり、その大きな情熱を自分で何かを成し遂げることにぶつけたいという欲求もあるでしょう。\nそれは大きな夢であるがゆえに、すぐにはどうしようもならず、時に壁にぶつかったり、うまくいかずに悩んだりすることもありそうです。しかし壁にぶつかっていくうちに、自分自身がどんどん丈夫な岩となっていって、ついには強い信念を持ち続けることに成功するでしょう。\n大きなビジョンを夢見て、そこに向かってエネルギーをそそぐことに喜びを感じるかもしれません。"}, "獅子座_6": {"sign": "獅子座", "degree": 6, "symbol_ja": "ヒッピー少女と向き合う", "symbol_en": "古風で保守的なスタイルの女性", "key_phrase": "まわりの流れに合わせながらも独自性を探求する人", "explanation": "内側からあふれる生命力を存分に活かして、自分にしかない輝きを表現するのが獅子座のテーマ。\nしかし、世の中の流れはどんどん移り変わっていくため、あるものが良い、素敵だともてはやされたとしても、それはまた別のものにとって代わられていくでしょう。古典的なスタイルが良いということを信じてきた女性は、それとは真逆のヒッピースタイルの少女を見たとき、驚きに目を見開いたかもしれません。しかし、ここでは変わりゆく時代の流れに淘汰されるのではなく、変化していく時代をも超越するだけの独自性を身に着けようとする思いが芽生えることになるでしょう。\n獅子座は他の誰とも異なる唯一無二の自分独自の世界ややり方を創造することをテーマとしています。流れゆく時代のなかで、決して流されることのない「あの人はあの人」というオリジナリティを確立させる必然を感じるかもしれません。\nこの度数を持っている人は「自分らしさとは何か」ということや、自分だけのやり方について、探求していくところがありそうです。既存の確立されたスタイルとは異なる、自分だけのオリジナルを見つけ出そうとするでしょう。\nしかし、その一方で時代の流れやいま流行っているものにも敏感で、それらをいち早くキャッチしながら、のっていくような手腕も持ち合わせていそうです。外の世界で起こっていることと、自分の中で感じていることのギャップと出会うたびに、いまの自分をすこしずつ修正することができるでしょう。\nだけれども、本当はそれらの流れとはまったく異なるところでイキイキと輝く自分を求めているところがありそうです。"}, "獅子座_7": {"sign": "獅子座", "degree": 7, "symbol_ja": "夜空に燦々と輝く星座たち", "symbol_en": "The Constellations Of Stars Shine Brilliantly In The Night Sky.", "key_phrase": "夜空に輝く星座たちは恒常的に、いつも同じ季節に同じ形を作っています。惑星はいつも揺れ動き、移動して、時間の経過とともに変化し続けますが、星座は揺るがなく恒久的な輝きを放ち続けるでしょう。", "explanation": "容易に移り変わっていく頼りない価値や輝きではなく、この星座のように変わることのない確かなものを追い求める気持ちがここでのテーマ。それは時代の流れや、流行り廃りとは一線を画した、普遍的なものをつかみたい、という欲求といえるかもしれません。世の中でいまこれが良いとされているものも、時期がくればまた別のものにとって代わられます。そんな頼りにならない社会的な流動性よりも、もっと本質的なものをつかんで確信を得ようとするでしょう。\n獅子座は太陽系惑星のなかで唯一無二の恒星である太陽を守護惑星としています。太陽の司る個性や意志、創造力や遊び心とダイレクトにつながって、自分らしい輝きを見つけ出すことを大事にするのかもしれません。\nこの度数を持っている人は、社会的なステイタスや世間で流行っているものにはあまり心が惹かれず、自分にしかできないことや、自分ならではのものを追求しようとするでしょう。世間の評判や評価によって簡単に揺らぐことのない個性やオリジナリティを内側に見出して、それを自分ならではの形で表現しようとするかもしれません。\n社会的な価値よりも、自分自身の本質と向き合うことを良しとするでしょう。個性が突き抜けたほうが、より輝く可能性のある人です。"}, "獅子座_8": {"sign": "獅子座", "degree": 8, "symbol_ja": "革命的な理想を広めている共産主義の活動家", "symbol_en": "A communist activist spreading his revolutionary ideals.", "key_phrase": "このサビアン・ワードに登場する共産主義の活動家というのは、現状の定められた社会の制度に対する反骨精神のようなもの。決められた型ややり方に従うのではなく、自由でより普遍的な価値や思想を基盤とした生き方を理想として、それを実践し、また周りに広めようともするでしょう。", "explanation": "ここでは本当に改革することよりも、まずは作られた型を壊すというところにエネルギーが向けられていきます。周りがどうであろうと、そこから離れて自分の信念を貫くこと。「こうであらねば......」という世間一般の常識とは異なる、自由な生き方を選択すること。独自の道を選び、生きることによって、それが同じように人生への閉塞感を持っている人への刺激にもなっていくでしょう。\nこの度数を持っている人は、自分の内側に強烈に働く、自由への渇望や縛られない生き方への理想がありそうです。実際に他の誰かにしたがう生き方や、世間一般の当たり前に落ち着くような生活を良しとはせず、自分らしい生き方を探求することになるでしょう。そして自分なりの理想や信念が見つかると、今度はそれをまっすぐに打ち出していくのかもしれません。\n新しい考え方や型にハマらない価値観を人生のなかで実践すると、それは他者を惹きつける魅力にもなるでしょう。とてもエネルギーが強いため、それをどこに意図を向けて、どのように扱うのかということを意識していると良さそうです。\nオリジナルな生き方が魅力として際立つ人だといえるでしょう。"}, "獅子座_9": {"sign": "獅子座", "degree": 9, "symbol_ja": "制御された息づかいで", "symbol_en": "美しい花瓶を創るガラス職人", "key_phrase": "自分の内側にある思いを情熱的に創生する人", "explanation": "ガラス職人がものすごい集中力で花瓶を創り出しているサビアン・ワードです。自分自身の息づかいで、どのように形作られるのかが変わってくるため、一瞬の気も抜けずに集中して、こだわり、自分の理想とするものを創り出そうとしているのでしょう。\n獅子座は自分自身の力によって、あらゆるものを創生することを司るサイン。過去からのパターンを押し付けられることを嫌い、みずから学んだものを、自分自身の求めている形で、自分の手で表現しようとするでしょう。\nここではその欲求が創作活動に向けられていきます。自分の内なる世界観を、なにか目に見える物や形や成果物として表したいという欲求が高まるかもしれません。高い集中力によって完成されたものには情熱が宿り、見た者、触れた者に影響をもたらすことになるでしょう。\nこの度数を持っている人は、創作意欲が高くなりやすく、何事も他に言われたようにではなく、自分自身の手で工夫して創り上げたいという思いがあるかもしれません。物事にこだわりがあって、あらゆるところ自分の意志を反映させたいと感じるでしょう。その内から湧き起こる欲求をコントロールしながら、目に見える形として表現する力も持っています。\nどんなことでもあらかじめ、ある程度の完成イメージを思い描いてから取り組むと良いかもしれません。技術を高めて、抜群の集中力で物事に熱い思いを吹き込むことのできる職人気質です。こだわりが強く、何事に対しても熱中するので、研究者や学者にも向いているでしょう。"}, "獅子座_10": {"sign": "獅子座", "degree": 10, "symbol_ja": "太陽の光が一面にみなぎる早朝の露の輝き", "symbol_en": "Early Morning Dew Sparkles As Sunlight Floods The Field.", "key_phrase": "真夏の早朝に陽が昇る時間帯、あたり一面の草木から滴り落ちる露がキラキラと光り輝いている......という、さわやかなサビアン・ワードです。新しい朝のはじまり。その輝きはとても自然で、無理しなくてもおのずと内から湧き起こり、あたり一面を照らすでしょう。長くて深い夜があったからこそ、このすっきりと爽快な朝を体験できるのかもしれません。", "explanation": "悶々と悩んで、自分をどのように表現するのか、どんなやり方でやったらいいのかということと真剣に向き合ったからこそ、答えが見つかったとき、パーッと霧が晴れたかのように感じることがあるでしょう。\n獅子座はうまくいかないときや、悩んだときに、その答えを外の世界ではなく、自分の内側に探し求めていきます。そして納得できるものが見つかるまで、自分のなかを探求して、必要であれば自分自身を成長させることで、あらゆる問題を突破していくでしょう。\nこの度数を持っている人は、のびのびと自然体で自分を表現することができるようです。いつでもパーッと明るい気持ちでいることを好みますが、それはそんな心持になるために、たくさん悩んで、考えて、自分らしくいられる道を探してきたからかもしれません。\nなにかを創り出すこと、自分らしい形を残すことに適性がありますが、それは決していつでもやすやすとできるわけではないでしょう。そこにはさんざん悩んだうえで納得できるものを創り出していく「産みの苦しみ」があるかもしれません。\nだからこそ、達成できたときの歓びはひとしお。思いきってチャレンジした人だけが、たどり着ける境地が待っているのかもしれません。"}, "獅子座_11": {"sign": "獅子座", "degree": 11, "symbol_ja": "巨大な樫の木に吊るされたブランコで", "symbol_en": "遊ぶ子どもたち", "key_phrase": "社会のなかで自分らしく楽しめる道を求める人", "explanation": "このサビアン・ワードに描かれる大きな樫の木は、社会全体の体系といえるかもしれないし、脈々と受け継がれてきた文化の流れともいえるかもしれません。それらのバックボーンに支えられて、子どもたちが無邪気に遊んでいます。社会の規律に沿いながら、いかに自由に楽しく過ごすことができるか。受け継がれた文化や伝統を組み合わせながら、いかにオリジナリティあふれた躍動感のある遊びを創り出すことができるか。\nここで獅子座の個性や自主性、遊び心や創造力といったものが、綿々と受け継がれてきた伝統や社会の体系を象徴する土星のなかに統合されていきます。社会の規律を守りながらも、いかに創造的な個人の人生を創り出していくのか、というのは、わたしたちにとって大きなテーマ。社会のバックボーンに守られながらも、自由に楽しく遊び心を忘れずに自分らしく生きていくことができるのか、ということが、自己実現であるともいえるでしょう。\nこの度数を持っている人は、楽しく過ごすことが大好きで、いつも面白いものがないか、どうしたらもっと盛り上がるのかということを探しているかもしれません。いろいろなアイデアを出したり、既存のものとまた別のものとを組み合わせたりして、もっと面白くなるための工夫をいろいろと試しているようなところがあるでしょう。社会の流れや自然の法則を遊びながら身に着けていき、その中で自分らしさを表現しようと試行錯誤することになりそうです。\n実際に現場へ出かけていったり、身体を使って体当たりしたりすることも好み、とにかくいろいろとやってみて、なにが一番しっくりくるのか、どれがもっとも楽しめるのかを探し出すでしょう。結果を出すことよりも、もっともイキイキと躍動できる瞬間を求めて、人生を楽しもうとする人といえるかもしれません。"}, "獅子座_12": {"sign": "獅子座", "degree": 12, "symbol_ja": "素敵なランタンに照らされた", "symbol_en": "大人たちの夜の芝パーティー", "key_phrase": "大勢の人たちの注目を集める術を心得ている人", "explanation": "夜の野外でのパーティーには、特別な空間と時間を楽しみたい大人たちが集まってきます。夜の芝パーティーは洗練された大人の社交場。そこでいかに自分らしさをアピールしてみせるのか、より多くの人たちの注目を集めることができるのか、ということがポイントとなるサビアン・ワードといえるでしょう。\n獅子座は自己表現がテーマであり、内なる喜びや情熱をなにかしらの形として表して、人目を惹きつけていきます。大勢の人たちに自分のなかにあるものを見せつけて、その反響を通して、自分は自分であるという確信を持つことにも通じるでしょう。\n獅子座の前半では、自分自身の純粋な生命力や喜びとつながって、ただがむしゃらに盛り上がっていたことに比べて、ここからより洗練された「魅せ方」「表現力」を極める段階に入っていきます。ここでは演出能力が高まって、夜のパーティーで大勢の人たちにアピールすることで、チャンスやコネクションを得ることができるでしょう。\nこの度数を持っている人は、華やかな雰囲気の場所で楽しく過ごすことを好むかもしれません。大勢の人たちの前で自分の体験を面白おかしく話して注目を浴びることが得意という人もいるでしょう。自己アピールと社交を通してチャンスを手に入れて、活躍の場を広げることができそうです。\nしかし、そういったことはあくまでおまけの話。とにかく人の集まる場所で大勢の人たちに囲まれて、賑やかに楽しく過ごしたい!!というが純粋な欲求かもしれません。そして大勢の人たちと関われば関わるほど、話し方や自己演出能力が高まって、自分自身が洗練されていくでしょう。\n「もっとカッコよく見せたい」という欲求が原動力の源。子どもっぽいと思われようとも、それが人を惹きつける力の根源にあるでしょう。"}, "獅子座_13": {"sign": "獅子座", "degree": 13, "symbol_ja": "コテージのポーチでロッキングチェアに揺られている年老いた船長", "symbol_en": "An Old Sea Captain Rocking Himself On The Porch Of His Cottage.", "key_phrase": "あらゆる物事を面白おかしく語る人", "explanation": "自宅の玄関ポーチに置かれているロッキングチェアに揺られながら、老いた遠い過去の冒険の数々を回想しているサビアン・ワードです。この船長に若かりし日々にどんな冒険をしたのか尋ねたら、面白おかしく脚色した武勇伝を延々と話して聞かせてくれるでしょう。\n獅子座の持っている自己演出能力が成熟した知性となって、まわりの人たちを巻き込んでいくことができるようになりました。状況と相手に合わせて自在に変化する表現力を身につけて、どこへ行っても、人目を惹きつけることができそうです。自分の体験したことをただそのまま話すのではなく、緩急をつけて、クライマックスに向けて盛り上げていくことができるでしょう。どうすれば、みんなに喜んでもらえるのか、どんな風に表現すると反応がより良いのかということを本能的につかむことができそうです。\nこの度数を持っている人は、表現することに関する才能があり、ひとつの出来事やテーマを面白おかしく人に聴かせることができるでしょう。人をグッと惹きつける話術に富んでいて、どんなことであっても、相手に聴かせるようにアレンジすることができそうです。\n大げさなところがあり、夢のようにも語りますが、見ている者を不快にさせることはなく、むしろ笑いの中に巻き込んでいくことができるでしょう。受けを狙った演出ができるため、シナリオライターや劇作家、小説家、エンターテイナーにも向いているかもしれません。\n獅子座の創造力と自己表現力が大きく開花する人といえるでしょう。"}, "獅子座_14": {"sign": "獅子座", "degree": 14, "symbol_ja": "外への表現の機会を求めている人間の魂", "symbol_en": "A Human Soul Seeking Opportunities For Outward Manifestation.", "key_phrase": "自分の見せ場とそのやり方を心得ている人", "explanation": "内なる生命力が外の世界へとあふれ出して、わくわくする体験を求め始めた獅子座は、あらかじめ「こうだ」と定められた道から離れて、自分なりのやり方や道を模索していきます。自分と真剣と向き合っているうちに、それは次第に洗練されていって、他者に見せていく表現が非常に巧みになっていくでしょう。メリハリのある語り口や、クライマックスに向けて徐々に盛り上げていく演出などを身につけて、他者の目をグッと惹きつける能力が高まります。\nそして身につけた表現能力を、どんなタイミングで、どのように示すことがもっとも自分らしいのか......ということを探し求めるのが、このサビアン・ワード。いくら素晴らしいストーリー・テラーであったとしても、聞き手の準備の整っていないところで語ったら、伝えたいものも伝わりきらないでしょう。いつ、どこで、どのように、どんなタイミングで表現するのが自分にとってベストなのか、その機会を探っていきます。\nこの度数を持っている人は、とてもすばらしい表現力を持っていて、人の意識を惹きつける才能があるでしょう。演出能力が高く、どういう場所でどんな風にふるまうことが、もっとも効果的か、より多くの人に伝えることができるのかということを見抜く力もありそうです。\nそれだけに、話すのがいいのか、書くのがいいのか、歌うのか、踊るのか、描くのか、創るのか......自分にもっとも合った表現を見つけることが大切です。さらにそれを実況的におこなうのか、オンラインなのか、個展でやるのか、発表会なのか、販売するのか、相手は不特定多数なのか、少数精鋭か......ふさわしい場所や聞き手を見抜くことも必要でしょう。\nそれらがぴたりとハマって、現在の自分にふさわしい場所とやり方と聞き手とが見つかったときに、人々を自分の世界に巻き込む力を発揮できそうです。"}, "獅子座_15": {"sign": "獅子座", "degree": 15, "symbol_ja": "喝采する人々で混み合った道を通る", "symbol_en": "豪勢なフロートの行列", "key_phrase": "With Cheering People.", "explanation": "喝采する人々で混み合った道を通る豪勢なフロートの行列\n大勢の人たちを巻き込んで楽しませることのできる人\n獅子座の主観に基づいた演出能力や表現力がもっとも輝くサビアン・ワードです。ここより後半の度数になると「どのように見られているのか」という客観が入り込んでくるため、純粋な主観の世界は失われていくでしょう。\nここで行列しているフロートは、日本のお祭りでいうところのお神輿と山車のようなもの。神さまを崇拝するためのお祭りは、わたしたちの内にある大きな力を外側の世界に投影して、放出するための手段ともいえるでしょう。ここでわたしたちは内なる衝動を最大まで発揮することを覚えます。\nまた、そこで放出された熱が、より大勢の人たちを巻き込み、動かす力となっていくことも感じられるでしょう。個人的な衝動から発したものが、個人を超えたところでより大勢の人たちを揺り動かす力になることを体験し、手に入れることができるかもしれません。\nこの度数を持っている人は、お祭り気質で、とにかく賑やかで盛り上がることを好むかもしれません。演出能力が抜群に高く、まわりの人たちを巻き込んで、盛り上げていく術を心得ているため、プロデュース業や演出家、芸能関係、イベンターなどに向いているでしょう。逆になんの変哲もない平凡な日々のなかでは、そんなにやる気が上がらず、のんびりしてしまうかもしれません。\nお祭り、イベント、パーティー、パレード、ライブ等、ハレの日こそが活躍の舞台。大勢の人たちを巻き込むことができるため、扱うお題が普遍的なテーマのほうが合っているかもしれません。どんなものでも「面白い!!」とみんながうなるようなものにアレンジしていくことができるでしょう。"}, "獅子座_16": {"sign": "獅子座", "degree": 16, "symbol_ja": "嵐が終わり、光り輝く陽光に", "symbol_en": "歓喜するすべての自然", "key_phrase": "嵐が終わり、光り輝く陽光に歓喜するすべての自然", "explanation": "いつも穏やかで落ち着いた心を持っている人\n台風一過のように波乱の時間が過ぎて、穏やかに光り輝く太陽が戻ってきたことを、そこに最初からあった自然たちが歓迎しているというサビアン・ワードです。自然の存在にとっては、予定不調和の嵐が吹き荒れるよりも、いつでも変わらぬおだやかな日常のほうが安心といえるのかもしれません。\nここでいう嵐とは、獅子座にとってのハレの日でもある、お祭り騒ぎ。オールナイトで大騒ぎしたあとの、翌朝の静けさをイメージしてもらうとわかりやすいかもしれません。「やりきった!!」という達成感があるかもしれませんが、同時にお祭りが終わってしまった、さみしさや物足りなさも感じるでしょう。\nまた、ピークを迎えたあとの、すこしゆっくりした気持ちで過ごしたいという気持ちも出てくるかもしれません。\nこの度数を持っている人は、獅子座のなかでは静かに過ごすことを好む傾向がありそうです。必要であれば、いつでも自分を表現することもできるし、そこにはそれなりの自信もありますが、普段はおだやかでゆっくりしていようと思うかもしれません。\nどちらかというと受け身になりやすく、あまり自分から積極的に表へ出ていくこともしないでしょう。自分のなかでメリハリをつけて、普段はゆっくりしていながらも、必要なときはしっかりと自分を打ち出したアピールができると、満足度が高くなりそうです。\nじっくりとまわりを見渡してから行動するような余裕が、いつも心の中にあるでしょう。落ち着きと客観性を持っています。\n**"}, "獅子座_17": {"sign": "獅子座", "degree": 17, "symbol_ja": "**", "symbol_en": "讃美歌を歌っている教会の聖歌隊", "key_phrase": "讃美歌を歌っている教会の聖歌隊", "explanation": "社会のなかで他者と共に創造性を発揮する人\n教会でお祈りを捧げるというのは、クリスチャンにとって日常的な行為です。日本でいえば、神棚やお仏壇の前で手を合わせてお参りしたり、ご挨拶をしたりといった行為に通じるかもしれません。これは日常生活のなかで神さまやご先祖さまとつながる神聖な時間。\nさらにこのサビアン・ワードでは、聖歌隊に参加することで、その神聖さをさらに盛り立てようとしているでしょう。ボランティアは無私の奉仕活動ですから、個人の欲求を超えて、より大きな存在のために働くことでもあります。また、複数の人たちと協力し合って、ひとつの目的を成し遂げようとする姿も描かれているでしょう。\n獅子座の前半で磨かれた創造力や表現力や演出能力が、自我をすこし抑えることで、より社会的に他者と協調したところで働くことができるようになったといえるかもしれません。\nこの度数を持っている人は、感受性が鋭く、日常にありふれているさまざまな物事や行為に対して、特別に意味を見出すことができるでしょう。精神性が高く、目に見えない高次の世界に興味を持つ人もいるかもしれません。\n讃美歌を捧げるというのは、歌の表現を通して神を感じようとする行為。身体を使って見えない世界とつながり、それを表現しようとすることもありそうです。\nまた、この特別な感覚を他者と共に協力し合うことで感じることもあるでしょう。無私の気持ちで人と一緒に協力して、なにかを創り上げていく喜びを知っている人だともいえそうです。"}, "獅子座_18": {"sign": "獅子座", "degree": 18, "symbol_ja": "生徒たちのために実験をする化学者", "symbol_en": "A Chemist Conducts An Experiment For His Students.", "key_phrase": "いろいろな体験を経て大きく変容していく人", "explanation": "獅子座の前半では自分の内からあふれ出そうとする生命力や情熱といったものたちをベースに、創造力や独創性や表現力に磨きをかけてきました。中盤の折り返しを過ぎたこのサビアン・ワードでは化学の実験が取り上げられています。\nいろいろな素材を混ぜ合わせたり、加熱したり、冷やしたりして、変性を起こしていくのが化学の実験です。それを何度も繰り返していく化学者は、凡人とは異なる視点で自然の法則や世界の成り立ちを理解することができる人ともいえるでしょう。そしてまたそれらを知り、新たな素材を変性させていく行為を通して、自分自身も変わり続けていきます。\n獅子座が属する火のエレメントは、変容がテーマ。より多くの物事を体験していくことで、自分自身の内側に働きかけが生じて、変化と成長が起こることになるでしょう。\nこの度数を持っている人は、とにかくどんなことでもやってみたい、試してみたい、という気持ちがありそうです。火のエレメントの星座は基本的に体感派ですから、何事も実際に身体を張って試し、情熱を傾けて熱中するでしょう。そしてさまざまなことを体験した分だけ、どんどん精神的にも肉体的にも目覚めて、成長することにつながりそうです。\nその過程において、たくさんの知恵や法則も得られるでしょう。知り得たことは、まわりの人たちや社会に影響をもたらす材料にもなり得ます。\nなにか夢中になれることや、解明したい事柄を見つけて、深く関わっていくことで、その分、大きな変容が期待できるでしょう。"}, "獅子座_19": {"sign": "獅子座", "degree": 19, "symbol_ja": "ハウスボートパーティー", "symbol_en": "A houseboat party.", "key_phrase": "自由な生き方を社会のなかで構築していく人", "explanation": "仲間たちを集めて楽しくパーティーで盛り上がろう!!という獅子座らしいお祭り気質のサビアン・ワードです。社会的な義務や制約から離れたところで、自由に楽しくやろうとする姿が描かれるでしょう。\nハウスボートが浮かんでいるのは水上です。通常の家は陸地に建てられますから、これは基盤が固定化されておらず、安定していないことが示されているでしょう。「安定した日々の暮らしの合間で、たまの休日にパーティーをしよう!!」ではなく、内面に湧き起こる感情のままに、高揚感や遊びをベースとした「毎日がパーティー」のような生活を手に入れようということかもしれません。\n自由でいたい、縛られたくないという思いが内側にあるならば、すこしでもそこから解放された形の生き方を作る必要があります。それは決して社会から逸脱するということではなく、自分の喜びや遊びを中心とした生き方をしながら、社会のなかに根差すこと。自由でとらわれず、しかし自分なりに社会と共存したスタイルを創り出していくことがテーマといえそうです。\nこの度数を持っている人は、とにかく楽しいことが大好きで、仲間たちを集めて盛り上げていくことも得意でしょう。パッと人目を惹きつける表現力に関しては変幻自在で、どこでも、誰を相手にしても、楽しくすることができそうです。\n旧来の社会的常識に縛られた、制約の多い生き方に魅力を感じず、気のおもむくまま自由に生きることに憧れるでしょう。自分の魅力と能力で自由な生き方を創造することのできる資質の持ち主です。"}, "獅子座_20": {"sign": "獅子座", "degree": 20, "symbol_ja": "ズニ族の太陽の崇拝者", "symbol_en": "Zuni Indians Perform A Ritual To The Sun.", "key_phrase": "日常のなかにパワーと楽しみを呼び覚ますことのできる人", "explanation": "ネイティブ・アメリカンの一部族であるズニ族は、太古からズニの村に住み続け、部族内のつながりが非常に濃厚で、部族内の儀式についてはとても閉鎖的だといわれています。ネイティブ・アメリカンたちは基本的に、世界を取り巻いている、ありとあらゆる自然を崇拝し、共存している民族。\nスー族のサンダンスは有名ですが、地球の生命体にとって絶対的な存在である太陽の力を、どの部族たちも地上に降ろして、同化しようと試みるのでしょう。\nこのサビアン・ワードでは、ズニ族が太陽を崇拝して、その力と同化しようとする術が描かれています。\n獅子座を守護しているのは太陽であり、これは占星術的にはすべての人間に備わっているもの。内なる太陽をいつでも呼び覚ませる術を持つことで、自在に自分の太陽を活性化できるということにも通じるでしょう。特別なお祭りやイベントやパーティーの日でなくても、日常の営みのなかでいつでも太陽の力を使いこなすことができれば、平凡な毎日でも元気に楽しく過ごすことができるようになるはずです。\nこの度数を持っている人は、いつでも必要なときに自分の力で人生に活力をもたらすことができるかもしれません。\nそのためには自分なりの楽しみ方やエネルギーを呼び覚ます、あたかもズニ族にとっての太陽崇拝の儀式のようなものがあると良さそうです。アートやダンス、スポーツや演劇、料理、音楽、デートやゲームなど......どんなことでもいいので、しているだけでパワフルに楽しく過ごせるものがあるといいでしょう。\nそれらの行為を繰り返しているうちに、自分の内側からひらめきがやってきて、エネルギーが満ちてくることを感じるかもしれません。いつでも地上に太陽のようなパワーをもたらすことのできる人です。"}, "獅子座_21": {"sign": "獅子座", "degree": 21, "symbol_ja": "飛ぼうとして羽根をばたばたさせている", "symbol_en": "中毒の鶏", "key_phrase": "飛ぼうとして羽根をばたばたさせている中毒の鶏", "explanation": "自分のなかの限界を突破しようと試みる人\n自分自身の力でいつでも活力を呼び覚ますことが獅子座のテーマ。それができるようになると、今度はその力を使って平凡な日常をもっとエキサイトなものにしようと働きかけることを試みます。内なる精神力、内なる霊的な力を日常生活に招き入れようとする試みは、オカルティックな事柄への興味として表れることがあるでしょう。\n地上で生きることに順応したニワトリが飛ぶことはできませんが、ここでは中毒になったニワトリがどうにかして飛ぼうとあがいています。普通に考えたら不可能なようなことを、どうにか無理やり達成させようとチャレンジしているのでしょう。本気で「こうしたい!!」と思ったことに関して、手段を選ばないような危険な雰囲気のするサビアン・ワードです。\nこの度数を持っている人は、自分からひとたび興味を抱いたことに対しては、どんなことでも一途にやり遂げようとするところがありそうです。まっすぐで愚直でもあり、なにか一心不乱に突き抜けていきたいような感覚を持つことがあるでしょう。\n自分の限界を突破したい、未知の能力を目覚めさせたい、という思いがあるかもしれませんが、焦り過ぎは禁物です。飛躍した考えで飛び込んでも、うまくいかないことがありそうです。\n極端なことを好み、何事も徹底的に突き詰めたい欲求があるため、なかにはオカルトなものに熱中する人もいるでしょう。退屈な日常を淡々と繰り返すよりも、たましいが湧き上がるような刺激を欲しているところがあるかもしれません。"}, "獅子座_22": {"sign": "獅子座", "degree": 22, "symbol_ja": "使命を果たしている伝書鳩", "symbol_en": "A Carrier Pigeon Fulfilling Its Mission.", "key_phrase": "霊的な能力を訓練することで使命のために使えるようになる人", "explanation": "サビアン・ワードのなかに鳥が登場すると、それは霊的な感応力を持った存在として描かれます。目に見えない世界から、なにかしらのメッセージを受け取ることもあるでしょう。伝書鳩はまさにメッセンジャーとしての役割を持つシンボルそのものです。しかも好き勝手にどこかへ飛んでいってしまうことはなく、キチンと訓練されて、必要な人のところへ、必要なものをきっちりと届けることができるでしょう。\n精神によって目覚めた霊的な能力を、誇示したり、振りかざしたりするのではなく、必要なとき、必要な人のためにコントロールして使うことと関係しているかもしれません。それはある種の落ち着きが働いていて、他者のために貢献する姿ともいえるでしょう。\n獅子座の内なる情熱と表現力とが社会のなかに馴染んでいって、他者の助けとなるところで働くことになりそうです。\nこの度数を持っている人は、まかされた責任や役割を高いプロフェッショナルの意識をもって、きっちりとこなすような、仕事人としての資質があるでしょう。「これをしよう」とひとたび思ったら、長い時間をかけて繰り返し訓練を重ねて、技術や知識を身につけていくことができます。とても有能であり、必要としてくれる人のために貢献しようとする思いもあるでしょう。\n伝書鳩は目的となった人のところへ「着地する能力」が訓練されています。そのように、人をあるべきところへ落ち着かせる力が備わっている可能性があります。我を見失っている人や、浮き足が立っている人、これから先の道を見失っている人などに、本来の自分らしさや進むべき道を取り戻させることを助けるでしょう。果たすべき役割があると、能力が生かされる人です。"}, "獅子座_23": {"sign": "獅子座", "degree": 23, "symbol_ja": "サーカスで危険な技を披露する裸馬乗りの女", "symbol_en": "In A Circus The Bareback Rider Displays Her Dangerous Skill.", "key_phrase": "意志の力で卓抜した技をマスターし人々を魅了する人", "explanation": "裸馬という生命体の原石のような火の象徴を乗りこなし、さらにその能力を見せつけることによって、まわりも熱狂させていく......というサビアン・ワードです。サーカスで危険な技に挑んでいる姿を見ると、わたしたちの内側では、その人の内部で起こっているものと同じような高揚感が広がるでしょう。\n裸馬には鞍も鐙もなく、まっすぐ乗ることさえ、不安定で危険です。それを乗りこなすということは、人間の持っている霊的で特殊な能力を使いこなすことに通じるものがあるでしょう。\n人間の内部に宿っている霊的な能力は、特別ではあるけれど安定しておらず、使いこなすためには危険がつきまといます。また訓練することで能力が使えるようになったとしても、次はその技に溺れて我を見失わないように気持ちを引き締めなければなりません。裸馬を乗りこなすためには、馬をコントロールする技術のみならず、容易に流されることのない意志の強さや自制心なども必要となるでしょう。それらを踏まえたうえで、ようやくわたしたちはむずかしい技を使いこなせるのかもしれません。\nこの度数を持っている人は、勇気があり、積極的に困難なものにも立ち向かおうとするところがあるでしょう。表現者としての才能がずば抜けて高く、自分の内に宿る生命力を訓練したうえで、なにかしらの形として解き放とうとするかもしれません。その卓抜した技によって多くの人たちを魅了し、熱狂させることができるでしょう。\nダイレクトな表現やライブが性に合っているため、ショービジネスやプレゼンテーションに向いています。さらにむずかしい技を獲得しようと自分を追い込んだり、危ないチャレンジをしたりすることもあるでしょう。ひとところに留まらず、トライし続けて、進化し続ける人ともいえそうです。"}, "獅子座_24": {"sign": "獅子座", "degree": 24, "symbol_ja": "内なる霊性への", "symbol_en": "到達に意識が完全に向けられているため、", "key_phrase": "放置して座っている男", "explanation": "Totally Concentrated Upon Inner Spiritual Attainment, A Man Is Sitting\nIn A State Of Complete Neglect Of Bodily Appearance And Cleanliness.\n内なる霊性への到達に意識が完全に向けられているため、見かけと清潔さへの気遣いを放置して座っている男\n徹底的な集中力で限界を突破していく人\n自分の内側にある一点だけに完全に集中していて、他のものをすべて無視している状態が描かれているサビアン・ワードです。悟りを得るためにただ座り、なにが起こったとしても、ただひたすら内観している姿に通じるものがあるでしょう。そのように、ただただ「見ること」だけを続けて、ついにはある境地へと辿り着くのかもしれません。\n実際に瞑想は脳の意識を変容させますが、自分自身の意志の力で「めざすところまで辿り着く」集中力を示しているのでしょう。そして、そのようなことが内部で起こっているときに、まわりがどう見ているか、ということをまったく気にも止めていない様子もここでは描かれています。\n通常わたしたちは少なからず他者の目を気にしながら暮らしていますが、ここではまったく人からどう思われようが気にしていません。それは社会の制約や他者から見られていることから本当に解放されて自由になった状態であるともいえるでしょう。\nこの度数を持っている人は、ものすごい集中力があり、自分にとって大事なことに関しては徹底的に突き詰めて、できる限りの最高潮まで達したいという欲求がありそうです。何かの作業や創作をはじめると、まわりの声が聴こえないほど没入して、むしろ食事やお風呂といった日常的な行為が煩わしくも感じられるでしょう。\n自分の内側の深いところへ到達すると、人々が基本的に自分のなかにあるものを投影して他者を評価しているに過ぎない、ということが見えてくるかもしれません。それゆえ、まわりがどう言おうとも気にせずに、自分の自由な世界を貫いていくことができるのでしょう。"}, "獅子座_25": {"sign": "獅子座", "degree": 25, "symbol_ja": "広大で険しい砂漠を横切っている大きなラクダ", "symbol_en": "A Large Camel Is Seen Crossing A Vast And Forbidding Desert.", "key_phrase": "過酷な環境に耐えて究極の高みまで達する人", "explanation": "広大な砂漠は太陽の陽射しを遮るものがなく、水もほとんどなく、陽が沈めばグッと気温が下がり、時には砂嵐に見舞われる可能性もあるような、不毛で大変厳しい環境です。しかし、ラクダはその身体のコブの内側に脂肪を蓄えているため、そのような砂漠地帯でも悠々と旅することができるでしょう。\nユダヤ教の密教であるカバラに宇宙創成の秘密を記した生命の樹がありますが、源を示すケテルと、太陽を示すティファレトのあいだの道に、アビスという深淵が横たわっています。この道は「砂漠のラクダ」と呼ばれる道で、それは外の環境に依存せずにいられるだけの必要なものを、その内側に持っている者だけが通過できます。厳しい砂漠の環境には、うるおいをもたらす水も、陽射しから身体を休める木陰も、夜の寒さから身を守ってくれる岩肌もありません。それらのすべてを自分自身で身につけたものだけが、この道を渡ることができるのでしょう。\nこの度数を持っている人は、どんなに困難であろうとも、ひとたび志した道をひたすら突き進むことになりそうです。目的達成意欲が非常に高く、究極の高みをめざして昇り続けていく、たましいの強さがあるでしょう。\nまわりがどうであろうとも気にせず、むしろひとりで独立した形であっても、淡々と目的地へと向かっていくかもしれません。状況が不利であろうとも、どんなにハードなことを要求されようとも、険しく厳しさが連なっている道であろうとも、自分を見失わずに意志の力で突き進んでいくでしょう。\n究極の真実と、自分にしかできない特別なものをつかむ可能性のある人です。"}, "獅子座_26": {"sign": "獅子座", "degree": 26, "symbol_ja": "激しい嵐のあとの虹", "symbol_en": "After the heavy storm, A rainbow.", "key_phrase": "とても難しい道のりを霊的な力で突き進む人", "explanation": "サビアン・ワードに出てくる虹は、神との契約の証として示されるもの。獅子座は自分のなすべきこと、自分の表現したいことを徹底的に自分自身の内側に見出していこうとするサインですが、ここではさまざまな試練や冒険を超えたあとで、ついに自分の魂が求めているものにたどり着くことがあることを予感させます。果たすべき使命のようなものが何かある、と感じるかもしれないし、あるいはそこへ向かわせる霊的な力として、明らかになることもあるでしょう。\nしかし、そこへ到達するためには、ある種の現実離れしたような厳しい現実を乗り越えて、みずからを積み上げていく必要があります。自分の力を心から信頼して、それを頼りに日々の鍛錬を続けた人だけが、まるで生まれる前に神と契約してきたかのような奇跡を現実のなかで創り出すことができるでしょう。\nこの度数を持っている人は、普通に考えたら難しいようなことであったとしても、自分の力を信じて突き進んでいくようなところがあります。表現者として、自分の持っている底力を信じ、鍛錬を積み重ねて、望んだ形として体現する力を持ち合わせているでしょう。みずからを奮い立たせて、定めた到達点まであきらめずに向かっていくような、目には見えない霊的な力が内側で働いていることを感じるかもしれません。\n目標が難しいほど、燃えるところがあり、どんな道でも一歩ずつ進んでいきます。まるでそこへたどり着くことを天と約束してきたかのような、純粋で気高い誇りを宿しているでしょう。"}, "獅子座_27": {"sign": "獅子座", "degree": 27, "symbol_ja": "東の空の夜明けの光", "symbol_en": "The Luminescence Of Dawn In The Eastern Sky.", "key_phrase": "みずからの光り輝きでまわりの人たちを圧倒する人", "explanation": "東の空の夜明けに見える光とは、まさに太陽が昇ってくる新しい朝のはじまりを象徴しています。夜明けは占星術のホロスコープ・チャートにおける上昇宮の配置を示していますが、それは新しい人生の幕開け、再出発のタイミングだともいえるでしょう。自分にしかできない、真にオリジナルの生き方を実践する人生の再スタート、といえるかもしれません。\n他者から強制されることのない、自分のたましいが望んでいる生き方を世界に向けて大きく見せていくことをはじめるのでしょう。他の誰もがまだしていないことにチャレンジしようとする気持ちが高まるかもしれません。それがどんな結末になるのかは、やってみなくてはわからないもの。思いきって飛び込み、たましいを傾けてやりきって、そして自分自身が変容することで世界に大きな影響をもたらすことになるかもしれません。\nこの度数を持っている人は、すばらしい卓抜した表現能力を持っているでしょう。何事でも極めたい対象を見つけると、繰り返し鍛錬しながら、持ち得る能力を最高潮まで引き出そうとするかもしれません。\nそのようにして表現されたものは、みずからのたましいが輝くような超越した印象を解き放ち、それを見た人はその存在に圧倒されるでしょう。太陽の輝きがまわりの人たちに大きなエネルギーをもたらすように、全身のすべてを絞り出して表現されたものが、大勢の人たちを巻きこむ力を持ちます。\n華やかで艶やかで、人を惹きつけるパワーとカリスマ性のあふれる人だといえるでしょう。"}, "獅子座_28": {"sign": "獅子座", "degree": 28, "symbol_ja": "大きな木の枝先に乗り出すたくさんの小鳥たち", "symbol_en": "Many little birds on a limb of a big tree.", "key_phrase": "ていねいに日常を暮らしながら可能性をひらく人", "explanation": "大きな木というのが、わたしたちのダイナミックな人生そのものだとすると、その枝先に宿る小鳥たちというのは、日常のなかで起こる、細々とした雑事といえるかもしれません。ハレの日、非日常的に、自分自身の力を遡及して、おおいに輝くことも獅子座の壮大なテーマですが、それでもわたしたちの足元には平凡な日常があります。自分の喜びの本質とつながって、理解した人にとっては、何気ない日々のひとつひとつの些事が、楽しくのびのびとしたしあわせに満ちたものとなるでしょう。\n大きなイベントを集中して成し遂げる喜びもあれば、いつもの小さな日常のなかで創意工夫を凝らして、他者の役に立ちながら、まわりに小さな影響をもたらしていく喜びもあります。どんなことにも意識を向けて、どんなことでも自分らしさを忘れずにいれば、日常はとても快適で心地よいものとなるでしょう。\nこの度数を持っている人は、毎日の暮らしを自分らしく丁寧におこなうことに喜びを感じることがありそうです。小さな工夫に楽しみを見出して、日々の細やかな暮らしのなかに希望を見出すこともできるでしょう。\n実際の生活のなかで、役立つことを好み、どんな小さなことであっても自分の手で創り出して、成し遂げることをていねいにこなしていける力があります。みんなに役立つ発信をしたり、全体のために働いたりすることもあるでしょう。\nいつも、自分自身に対してのんびりとくつろいでいて、人生に対するさまざまな希望や可能性にひらいている人です。"}, "獅子座_29": {"sign": "獅子座", "degree": 29, "symbol_ja": "波のあいだから現れる", "symbol_en": "人間の姿に生まれ変わる準備のできた人魚", "key_phrase": "波のあいだから現れる人間の姿に生まれ変わる準備のできた人魚", "explanation": "ひらめきやイメージを現実的な形として実現させる人\n物語の人魚姫は陸の世界に憧れて、人間の暮らしを想像し、さまざまな冒険の果てに、ついには人間として生きることになりました。このサビアン・ワードの人魚は、その人間の姿になる直前の、いまにも波間から上がろうとする姿が描かれています。身体の半分が浸かっている海や、人魚の下半身の魚の部分は潜在意識や想像の世界を表しているのでしょう。\nそれが、地上という現実レベルにおいて、いまにも形を創ろうとする過程を示しているともいえます。人の潜在的な力やひらめきや想像力やイマジネーションが、その人の創造性を刺激して、何かしらの形として表現しようとする欲求や過程ともいえるでしょう。ふと浮かんできたアイデアをキャッチして、それを実際に何かしらの形として落としこんでいく、創作意欲を象徴しているのかもしれません。\nこの度数を持っている人は、アーティストとしての気質がおおいにあるでしょう。どんなことでも、ひらめいたり、思いついたりすると、それを実際の形や結果として表そうとするかもしれません。身体を使って表現したり、毎日の日課に組み込んでみたりと、さまざまなことを試しもするでしょう。\nアートの分野においては、この能力が活きてくるため、描いたり、造ったり、踊ったり、書いたりするのにぴったりです。どんなものでも無意識から思いついたものを試行錯誤しながら、一度はどうにかして実現しようと試みるでしょう。\n夢やイメージや想像を実現させる力の持ち主といえそうです。\n**"}, "獅子座_30": {"sign": "獅子座", "degree": 30, "symbol_ja": "**", "symbol_en": "開封された手紙", "key_phrase": "開封された手紙", "explanation": "自分で得たものを惜しみなくまわりに分かち合う人\n手紙というのはとてもプライベートなものですが、ここではそれが開封されていて、誰でも自由に読めるような状態になっています。\n獅子座は自分自身の主観と深くつながって、他者とは一線を引いたところで「自分らしさ」を創造するサイン。その主観から発展したものが、より多くの人を熱狂させるものとなり、それが終盤に至って他の人に役立つ、いわば公共のものといえるまでに成長しました。自分の内側でひらめいたものや、なにかを思いついて創り出したものが、封印の解けた手紙のように、自分の手を離れてどんどん分かち合われていくかもしれません。\n主観から生み出されたものが、大勢の人たちにシェアされて、役に立つことで、また別のものへの創造意欲が駆り立てられることになるでしょう。\nこの度数を持っている人は、寛大でオープンな人柄であり、自分の得たものを惜しみなくまわりの人たちに与えていこうとするところがありそうです。何事もパワフルに表現しますが、そこに気負いはなく、本人はいたってナチュラル。どんなことでも秘密にするよりも、どんどん明らかにしていくことを好むでしょう。そうすることによって充実感と、自分のなかから力が抜けていくような虚脱感との両方を繰り返し、味わうこともありそうです。\nしかし、それでもなお、内から湧き出る創造意欲を、なにかしらの形として表現したうえで、人に伝えていくことになるでしょう。日常のなかで創造と分かち合いを繰り返しながら、自分らしい人生を切り拓くことになりそうです。"}, "乙女座_1": {"sign": "乙女座", "degree": 1, "symbol_ja": "肖像のなかで", "symbol_en": "特徴が芸術的に強調されている男の頭", "key_phrase": "Artistically Emphasized.", "explanation": "肖像のなかで特徴が芸術的に強調されている男の頭\nすぐれた観察眼で物事を徹底的に細かく調整する人\nまるでピカソの描く絵のように、目に見えているものの一部が大きくクローズアップされている肖像画です。乙女座のはじまりの度数ですが、乙女座は自分と他者との区別をより明確にすることで、その対象と自分自身とを細部まで調整していくサイン。そのためにまず、外から見える印象をしっかりと識別することから始めるのでしょう。\n実際に人間の持っている感覚において、乙女座が司るのは視覚です。視覚は物事を醒めた目で眺めていくでしょう。外から見た印象をはっきりと微細にとらえることで、その内側をさらに細やかに観察して、分析できるようにもなります。\n乙女座の得意とする専門分野は、全体を把握することではなく、部分のさらに細部にまで意識を向けて微調整すること。対象となるものを細かく見抜くことは、自分自身の能力や資質をそれに対応させるために、精度を上げていくことにつながるでしょう。\nこの度数を持っている人は、観察眼が非常に鋭く、さまざまな物事を隅々まで見通す力を持っているようです。集中力が抜群に高く、練度の高めた一部の突出した能力を活かすことが得意でしょう。\n頭の回転が速く、どこをどのように調整すればいいのか、パッと把握することもできそうです。自分の生き方に関しても、たびたび細かく調整していきますが、考えすぎると全体の流れや立ち位置がわからなくなるかもしれません。\n物作りに適性があり、目に見えるものの質を高める能力があるでしょう。"}, "乙女座_2": {"sign": "乙女座", "degree": 2, "symbol_ja": "景観を見下ろす大きな白い十字架", "symbol_en": "A large white cross dominates the landscape.", "key_phrase": "物事と自分自身を客観的に見つめる人", "explanation": "乙女座のひとつ前の星座である獅子座は、火のエレメントに属するサインで、とことん個人の主観を強調しながら、その生命の輝きをいかに表現するか、ということを探求しました。乙女座は地のエレメントに属するため、客観を育てることで個人の能力を磨き上げ、外の世界を変え得るだけの技術や知識を身につけていきます。\nここで景観を見下ろしているのは、圧倒的な客観の力が隅々にまで及んでいるともいえるでしょう。そして大きな白い十字架の下に眠っているのは、獅子座で鍛え上げた主観であるのかもしれません。個人的にどう思うか、どう感じるのか、ということよりも、それが実際に外からどう見られるのか、どのように使えるのか、ということのほうに重きがおかれるのが乙女座といえるでしょう。\nこの度数を持っている人は、観察力が非常に高く、いつもまわりの様子をしっかりと見ているようなところがありそうです。包容力があり、まわりの要求を何事であっても受け入れて、それに応えようともするでしょう。\n主観を抑えようとするところがあるため、いつもどこかしら自信のないような、自分が頼りないような思いを抱えている人もいるかもしれません。それを補うために、外から見た客観的な模範となる「正しさ」を学び、追従するような一面もあるでしょう。\n個人の実感や感情を抑圧することで、たびたびストレスを抱えることもあるかもしれません。みずからの信条を支えるような教義が見つかると、それを拠り所としながら、自身を支えていくことができるでしょう。"}, "乙女座_3": {"sign": "乙女座", "degree": 3, "symbol_ja": "ふたりの守護天使", "symbol_en": "Two gardian angels.", "key_phrase": "ある型に従うことを通して自分自身の基盤を作る人", "explanation": "地のエレメントに属する乙女座は、主観を抑えて客観を育てていきます。しかしその代償として、自信を失いやすく「これでいいのだろうか」と迷うことが多くなるでしょう。それを補ってくれるのが客観的な「正しさ」であり、ある具体的な成果をあげるためのマニュアルや教義を手に入れることで、その不安定さが落ち着くかもしれません。また、それに追従した結果として、なにかしらの目に見える具体的な成果や恩恵を得られるでしょう。\nここでいうふたりの守護天使のうち、ひとりは自分を教え導いてくれる、外側にいる守護者です。これは教師やコーチ、上司や先輩、友人といった姿を通して、自分を教え導いてくれることがあるでしょう。そして、その型や信念に従おうとする自分自身をサポートしてくれるのが、もうひとりの内なる守護天使かもしれません。信頼して、その導きに応えようとするときに、自分の側にいる天使がしっかりと結果を出すことを助けてくれるでしょう。\nこの度数を持っている人は、自分で志して信頼した道を、ていねいで正直に貫こうとするかもしれません。みずから求めることで必要なサポートを受け取ることがあり、それに従っていくことで「大丈夫」という確実な手ごたえを得られるでしょう。その結果や手ごたえを軸としながら、主観と客観を調整して、自分自身の主体を築いていくことができそうです。\nなかには目に見えない形でメッセージや思いがけないラッキーを受け取ったりすることもあるでしょう。信念が強調されるので、やや狭量になりやすいところもありますが、しっかりとした安定した基盤を作ることができそうです。"}, "乙女座_4": {"sign": "乙女座", "degree": 4, "symbol_ja": "一緒に楽しく遊ぶ白人と黒人の子どもたち", "symbol_en": "Black And White Children Play Together Happily.", "key_phrase": "信念を軸にして多くの人とつながっていく人", "explanation": "乙女座は主観を抑えることで客観を発達させるサインですが、主観が欠けることによる不安定さを補うために、なにかしらの外側の基準を採用することにしました。それはある種の「こうあるのが良い」と記された基準ですが、それを規範とすることで精神が安定して、客観的に自分を整えることができます。そして今度はその基準を通して世界を眺めてみると、間違いや不平等さが多くまかり通っていることに気づかされるでしょう。\n乙女座は柔軟宮の星座ですが、この柔軟宮の特徴として、まず自分が外側の環境からの必要に応じて変化していき、次に自分自身が変化して身につけた能力をもって世界を変えていくように働きかけることが挙げられます。乙女座は「どう見られているのか」という客観が発達するサインですが、ここでは見た目の違いではなく、その奥にある本質に踏み込んでいって、そこでアンバランスなものや足りていないものを補おうとするでしょう。\nこの度数を持っている人は、自分の信念を大切にしていて、それをベースとした生き方を構築する傾向がありそうです。ある種の信念をみずから実践してみせて、それがいかに正しいかということを証明すると、今度はまわりの人たちにその生き方を普及させようとするでしょう。実際に役立つことをし、自分のおこないによって世界が良くなっていくことは乙女座にとって喜びにつながります。\nそのため、良いと思っていることをみんなに教えて、間違っているものを正そうとする思いが出てくるでしょう。\nサビアン・ワードにあるように、博愛主義者であり、相手が誰であっても、受け容れてつながっていこうとする愛の持ち主です。そしてまた「これが良い」と感じたものであれば、異文化や馴染みのないものであっても、積極的に取り込んでいこうとするところがあるでしょう。"}, "乙女座_5": {"sign": "乙女座", "degree": 5, "symbol_ja": "自然の精霊や通常は見えない", "symbol_en": "霊の代理人に気づくようになった男", "key_phrase": "agencies.", "explanation": "自然の精霊や通常は見えない霊の代理人に気づくようになった男\n物の本質に注目して別の角度から異なるイメージを与える人\n主観を抑えて、客観を強化する乙女座の観察眼は、どんどん鋭く細やかになっていき、目に見ることのできない意志や願望が、どのようにして形や結果となっていくのか、というところに着眼します。どういう形にどんな名前がつけられているのか、その形がどういう要素で構成されているのか、その仕組みを把握することで、ある物に対する解釈や見方を自在に変えることができるでしょう。\n目に見えるものを形づくっている要素を、別の見方からとらえることで、それに異なるイメージを与えることができるようになります。片づけを断捨離と呼んだり、ダイエットの代わりにデトックスと表現したり、味のないぱさぱさの豆をスーパーフードと名付けたりすることで、ある物に対するイメージがハッと異なるものになるでしょう。現実にすでに存在しているものに対して、まったく異なるイメージを与えることを楽しむことのできる資質です。\nこの度数を持っている人は、現実にいまある物質や行為や現象が含んでいる可能性にもっと意識を向けていくかもしれません。もっとこの物の持っている可能性や潜在意識を引き出すためになにができるのか。ある物や結果に対して別の角度から眺めた見解を当てはめることで、あたかもまったく異なるイメージであるかのように作り替えることができるでしょう。そうすることで、これまで見落とされてきた、そのものの本質が別の角度から掘り起こされることになるかもしれません。\nコピーライトの能力があり、見えない微細な雰囲気や流れを読み解くことができるため、ストーリー・テラーとして才能を発揮する人もいるでしょう。空想やファンタジーの世界観を、現実のなかに滑り込ませることもできそうです。"}, "乙女座_6": {"sign": "乙女座", "degree": 6, "symbol_ja": "メリーゴーラウンド", "symbol_en": "A merry-go-round.", "key_phrase": "さまざまな物事に対して応答する能力を育てる人", "explanation": "乙女座は客観性を育てていくことを目的とした星座。客観的にさまざまな物や形を観察した結果、それらを構成しているものを理解できれば、別の見解や異なるイメージを与えられることがわかりました。ここではそれをさらに発展させるために、さまざまな実験をしていくことになるでしょう。\n馬は生命力や本能のシンボルです。しかし、メリーゴーラウンドの馬は作り物であり、限られた環境と動力のなかでのみ、躍動します。\nこれは、限定された環境のなかで能力を発揮する乙女座と通じるものがあるかもしれません。いまいる環境、限定されたルールのなかでこそ、イメージを自在に動かすことができるともいえるでしょう。\nまた六番目のサインである乙女座は、外からやって来る刺激に応答することで能力を発揮します。自分の属する環境でいま起こっていること、あるいは求められていることに応じながら、さまざまな可能性に対応するバリエーションを増やしていこうとするかもしれません。\nこの度数を持っている人は、日々の暮らしをより多彩に楽しもうとする心意気があるでしょう。限られた環境のなかで日々起こることに対して、ひとつひとつが躍動するように工夫を凝らしていくことができます。動線を変えてみたり、やり方をアレンジしたり、日常の雑事のやり方を変えたりすることで、どうしたらもっと毎日が楽しくなるか、実験するように試していくでしょう。\n物事に応答する能力が高まるため、トラブルやアクシデントが起こると、積極的に現場へ出向いていき、それに対処しようとするかもしれません。そうすることによってより応答力や変化に対応する能力が高まっていくでしょう。"}, "乙女座_7": {"sign": "乙女座", "degree": 7, "symbol_ja": "ハーレム", "symbol_en": "A harem.", "key_phrase": "対人関係のなかで自分の資質を磨く人", "explanation": "乙女座はみずからの価値を高めるために、外側の世界から自分自身を必要とされる環境を求めます。六番目のサインである乙女座は、自立的に成長していくというよりも、より多くのものを外側から求められて、それに応じることで発展していくところがおおいにあるでしょう。\nより多彩なバリエーションの要求があればあるほど、それに対応する振れ幅は大きくなります。柔軟宮である乙女座は、外の世界から求められるさまざまな要求に応じて、それに応えられる能力をもって世界に仕えていくことと関係するでしょう。\nハーレムはひとりの王さまと、彼を取り巻く大勢の愛妾たちの世界がドラマティックに展開します。狭くて濃厚な世界のなかでの人間関係は愛情とパワーを背景に容易に移り変わっていきます。王の愛着の対象が変化したり、寵愛を受けたものが関係を動かしたりすることも頻繁に起こるでしょう。相手の出方によって、こちらがどう対応するのかということを変える必要があり、それも常に相対的に動き続ける不安定な基盤の世界です。\nこの度数を持っている人は、多くの人たちと関わる複雑な対人関係のなかに身をおいて、働いたり暮らしたりすることがあるかもしれません。自分の役割や立場が相対的に相手のふるまいによって変わっていき、たびたび経歴が変遷することがあるでしょう。\nその時々の現在の環境のなかでの自分のやるべきことをさっと見つけ出し、応じていくことで能力が磨かれていきそうです。リアルな対人な関係に深く巻き込まれていき、そのなかで人を動かしたり、恩恵を得たりすることも多くなるでしょう。結果的に人を動かしていく対人スキルや交渉力や話術に長けてくるかもしれません。"}, "乙女座_8": {"sign": "乙女座", "degree": 8, "symbol_ja": "5歳の子どもの初めてのダンスレッスン", "symbol_en": "A Five-Year-Old Child Takes A First Dancing Lesson.", "key_phrase": "物事を動かしている仕組みを理解して体得する人", "explanation": "乙女座というサインは個人の持っている資質を高めて、現実のあらゆる物事に応答できる能力を育てていくことを目的としています。あらゆる物事のしくみを紐解いて理解し、それに別の視点からスポットを当てることで情感を盛り上げたり、ムードを変えたりということができるようになります。演出家としての能力はこれと関係しているでしょう。\n乙女座は外側の環境に依存して、やって来る物事に対して対応する力を身につけていきますが、それではいつも待ち続けなければならず、限界がやってきます。ここでは自律的に自分ひとりで、情感を自在に変えていくような能力を磨いていこうとするでしょう。\nダンスは肉体を使った表現であり、どのように動くのか、ということで、まわりに異なる印象をもたらしていきます。これが獅子座のダンスレッスンであれば、みずからの情熱と生命力によって、そこに命を吹き込むかもしれません。しかし乙女座にとって大切なことは、客観的にどの部分を、どのように動かせば、どんな反応を起こすことができるのかということを、本能的にではなく、知的に理解すること。計算によって空間やタイミングや動きの緩急の使い方を学んでいくことになりそうです。\nこの度数を持っている人は、とても勤勉で努力家。のびのびとした感性を持っていて、素直な気持ちで物事に取り組み、仕組みを理解して、体得しようとするでしょう。心と身体のバランスを整えることに興味を持ち、心・技・体がひとつとなるような高い能力を身につけようともするかもしれません。\nまわりの状況がなんであれ、それを気にせずに自分のペースで淡々と目標に向かっていくようなところもあるでしょう。なにかを学んだり、技術を身につけたりするのにとても良い資質を持っていて、自分自身の力で望んでいる自分になることができる人です。"}, "乙女座_9": {"sign": "乙女座", "degree": 9, "symbol_ja": "表現主義の画家の描く絵", "symbol_en": "An expressionist painter at work.", "key_phrase": "個人の感情を客観的に扱い、他とは異なる表現をする人", "explanation": "個人の持っている能力に磨きをかけていき、世の中にその力を使って貢献していく......というのが、乙女座にとってひとつの目的といえるかもしれません。自分のなかでのこだわりを発揮して、そこにどんどん磨きをかけていき、他ではないもの、他とは異なるものを創り出していくというのが、このサビアン・ワードのテーマといえるでしょう。\n表現主義の画家が描くのは、個人の感情の一部を強調した作品。それはこれまで世の中にあるどんな作品とも異なり、ユニークで、どんな感情をどのように表現するのかということも含めて、並び立つものがないでしょう。ここでは非常に個性が際立ち、他とは異なる自分自身であることが強調されていきます。\nみずからの主観的な感情を客観的に扱い、どう表現することで、まわりにどんな印象を与えることになるのか......いろいろと実験するように試してみることになるかもしれません。\nこの度数を持っている人は、こだわりが強く、またそのこだわりをどのように表現してみせるのか、ということにも強い関心がありそうです。ありきたりであることや、誰かの真似をすることを良しとせず、自分自身の知性の力でどのように表すことが、どんな風に効果があるのか、ということを理解して、コントロールするところがあるでしょう。\n独特のセンスを持っていて、他者とは異なるユニークな自分でいようとするかもしれません。そこに妥協はなく、とことん考え抜いて、そのやり方を選んでいることでしょう。\nアートや創作全般と相性が良く、自分の内から湧き起こる情感をどうしたらより伝えることができるのか、あらん限りの工夫を凝らします。こだわるあまりにマニアックに向かっていく傾向もありますが、いつもどこまで自分を表現できるのかというぎりぎりのところに意識がある人といえるでしょう。"}, "乙女座_10": {"sign": "乙女座", "degree": 10, "symbol_ja": "影の向こうを見て、影を超えていくふたつの頭", "symbol_en": "Two Heads Looking Out And Beyond The Shadows.", "key_phrase": "限界を超えようとしたときに自分の影と出会う人", "explanation": "自分自身の主観的なこだわりをとことん突き詰めていき、客観的に扱えるように整えていくことが乙女座の持っているテーマのひとつです。細部にこだわりのある乙女座は、どんどんマニアックに走っていく可能性がありますが、それを探求していくと、今度は自分自身のアイデンティティを支えている基盤そのものを超えようとするかもしれません。仕事をし過ぎて身体を壊したり、健康に気づかうあまり食べられないものが増えたり、用意周到になり過ぎて恐れが増大したりすることがあるでしょう。細部に入り込み過ぎた結果として、全体としての統合性が失われる危機に陥る可能性というのがあります。\nあるひとつの方向にだけ突出して成長したものは、その背後におざなりにしてきた存在たちを際立たせることにもなるでしょう。ひとつの考えに執着して「これが正しい」と思いこむことは、それに反するあらゆる影の力を強めることにもなりかねません。その影を見るチャンスが訪れる、というのが、このサビアン・ワードに含まれているでしょう。\nこの度数を持っている人は、なにかをやり始めると夢中になって、とことん突き詰めようとするかもしれません。自分の限界までこだわりを探求していくと、そこで本当に正しいことがなんだかよくわからなくなったり、それに反発する意見に遭遇したりすることがあるでしょう。その落差によって、動きがぴたりと止まり、これまでの自分を振り返ると同時に、これから先になにを信じればいいのか、わからなくなるかもしれません。\nしかし、そんなときこそ、おのれが切り捨ててきた影を統合するチャンス。人生にとって本当に大切なものを改めて思い返し、影を拾い集めるたびに、生き方や考え方の幅が厚みを持つことになるでしょう。\nそして以降はバランスのとれた選択がしやすくなるかもしれません。"}, "乙女座_11": {"sign": "乙女座", "degree": 11, "symbol_ja": "赤ちゃんのなかに深い願望を見出す", "symbol_en": "母親とそれに応じる息子", "key_phrase": "赤ちゃんのなかに深い願望を見出す母親とそれに応じる息子", "explanation": "自分で望んだことを絶対に達成させようとする人\n本来、親と子は別の人間ですが、親からみると、子どもは自分の創造物。子どもをなかば自分自身と同化した存在とみなし、そこに自身の願望を投影して、その願望通りになることを期待し、その思いを受け取った赤ちゃんが、それに応えようとしているサビアン・ワードです。\nここでいう赤ちゃんというのは、現実には自分のなかに芽生えた自分自身に対する希望や理想のようなものかもしれません。それがどんなに小さなものであっても、ひとたび「こうしたい」という気持ちが芽生えたなら、なにがあってもそれを貫き、達成しようとする強い気持ちが表れているでしょう。ある種の完璧主義が高まるシンボルでもあるかもしれません。\n乙女座はみずからの能力を高めて、より質の良い成果をあげることを目的としますが、ここではその思いが非常に高くなり「達成させることへの意欲」が、その人のなかの大部分を占めるようになるでしょう。\nこの度数を持っている人は、意志の力が強く、ひとたび自分で思い立ったものに関しては、どんなことをしてでも達成させようとするかもしれません。そのために水も漏らさぬ計画を立てて、目に見える世界のすべての隅々までを、意識の管理下におこうとするでしょう。\n完璧主義の傾向が高まるため、あらゆるものを周到に準備して、決して失敗しないように万全の注意をはらうかもしれません。ひとつのテーマを定めたら、徹底的にこだわって、すべてに対して自分の意志ややり方を貫こうとするでしょう。\nそのため、まわりに対しても、意志を押し付けるような場面がたびたび出てきそうです。そのようにして達成する体験が、深い満足につながるでしょう。"}, "乙女座_12": {"sign": "乙女座", "degree": 12, "symbol_ja": "結婚式のあとで花嫁のヴェールをはずす花婿", "symbol_en": "After The Wedding, The Groom Snatches The Veil Away From His Bride.", "key_phrase": "自然のサイクルを読み解いて、管理する人", "explanation": "結婚式というのは、わたしたちの生活の営みの基盤が、またひとつ新しく誕生したということであると同時に、男性性と女性性とが統合されたということ。女性は、より生活に根差した大地や自然や身体や生命の神秘の象徴です。そんな女性の持っている生命の神秘を解き明かすかのように、花婿が花嫁のヴェールをはずしています。\n男性の持っている能動的な知性や思考を活かした分析能力で、自然の謎を解明しようとしているのかもしれません。生命の営みの法則が見つかれば、それを体系づけて、管理することができるでしょう。また、女性の持っている受け身の夢を見たり、想像したり、憧れたりといったものを、男性の持つ行動力で実現させることもできそうです。\nいずれにしても、自分の内にある思いや神秘を力強く開拓する花婿といえるでしょう。\nこの度数を持っている人は、神秘的な世界や生命の営みや自然のサイクルな興味を抱いて、その法則を学んだり、読み解いたりすることがありそうです。どうしたらもっと快適に生きることができるのか、身体のしくみやバイオリズムを解き明かして、もっと心地よくなるように管理しようとすることもあるでしょう。\n人間の身体や健康や自然のサイクルに関して研究していくように探究心があり、それらを理解することで、どんなときでも対応できるような能力を手にするようです。身近なところで起こる、あらゆる問題に対して知的に応じる力を持つことができるでしょう。"}, "乙女座_13": {"sign": "乙女座", "degree": 13, "symbol_ja": "ヒステリー状態となった政治を", "symbol_en": "制圧する力のある政治家", "key_phrase": "思いがけない状況のなかで物事を解決できる人", "explanation": "サビアン・ワードにある「ヒステリー状態を制圧する」というのは、乙女座の持っている問題解決能力と関係しています。乙女座のテーマのひとつに、身の回りを取り巻く世界のあらゆるものを秩序立てて、機能させるということがあるでしょう。そのために乙女座は客観的に世界を眺めて、その法則性を知的に構造分解し、理解していきます。そして、それが理解できると、今度はその法則を通して、世界を見ることができるようになるでしょう。\nするとなにか問題やうまくいかないことが起こったときに、なにが起こっているのか、どうすれば良いのか、その対処法がおのずと見えてくるかもしれません。自分が知り得た法則を通して世界を眺めて、理解するため、ある種その「正しさ」を貫くような、押しの強さも出てくるでしょう。そうするとサビアン・ワードにある通り、なにかうまくいかないことが起こったときに、その解決法をパパッと思いつき、それを押し通して、場をどうにか治める力となりそうです。\nこの度数を持っている人は、非常に統率力が高く、グループをまとめる力があるようです。カリスマ性があり、その言葉には説得力があるため、そばにいる人は圧倒され、巻き込まれていくかもしれません。頼りがいがあり、みんながパニックに陥るような状況であったとしても、すぐれたリーダーシップを発揮して、場をまとめることができるでしょう。\nしかしその分、押しが強く、自分に反する意見は基本的に聞き入れないところがあるため、ワンマンになりやすい傾向もありそうです。どちらかというとトラブルや緊急事態が発生したときにこそ、すぐれた力を発揮できるタイプといえるでしょう。"}, "乙女座_14": {"sign": "乙女座", "degree": 14, "symbol_ja": "貴族の家系図", "symbol_en": "A aristocratic family tree.", "key_phrase": "すぐれた圧倒的な価値を受け継ぎ、明け渡す人", "explanation": "貴族がその家系を受け継いでいく目的は、手に入れた力を同じ血筋を持つ人たちに継承させていくことにあるでしょう。\n乙女座は世界を貫いている、ある種の法則を客観的かつ知的に理解することで、人間社会をより良くする卓抜した仕組みや製品や技術を創り出します。それを身につけて、実際に使いこなすことで、世界を変えていくような、圧倒的な力を持つことができるでしょう。\nしかし、個人の活動には限界があり、またいつしかは誰もが老いていくため、ひとたび手に入れた力をいつまでも持ち続けることはできません。そこで、その価値を受け継ぐ人を創生することで、力の維持と独占をしようとするのが、このサビアン・ワードにある貴族の家系です。ある有能なひとりが生み出したものを継承する人々を創ることで、その価値を守り、広め、より大きな力として強化することができます。\nこれはブランディングと関係するもので、ある製品や技術やサービスを特化するものともいえるでしょう。伝統芸能や特殊技術などが世代を超えて受け継がれていくことにも関係しているかもしれません。\nこの度数を持っている人は、すぐれた技術や知識、製品といった価値あるものを継承するための、少数精鋭のグループに参加することがありそうです。自分自身が創生者になる場合と、継承者になる場合とに分かれるかもしれませんが、いずれにして、価値ある特別なものを受け取り、与えて、使いこなすことになるでしょう。そしてその価値ある確かなブランドの基準から外れることなく、まわりに広めていく力も持っています。\nなかには実際に有能な祖先からなにか秀でた能力を受け継いで、明け渡すことになる人もいるでしょう。"}, "乙女座_15": {"sign": "乙女座", "degree": 15, "symbol_ja": "勇敢な祖先から受け継いだ", "symbol_en": "家宝の上等なレースのハンカチーフ", "key_phrase": "勇敢な祖先から受け継いだ家宝の上等なレースのハンカチーフ", "explanation": "受け継いだ力をどのように使うか、考える人\nわたしたちは、ひとりひとりが太古の昔から進化を遂げてきて、数々の厳しい時代を生き延びてきました。わたしたちの身体の内側には、地球上で生き延びるさまざまな知恵と技術とが受け継がれて、たくさん詰まっています。\nこのサビアン・ワードでは、勇敢な祖先がいたことが、家宝として代々受け継がれてきたハンカチの存在によって示されています。これはある種の家柄の良さや、生まれついた自分自身の階級といったものに誇りを持つことにつながるでしょう。そのハンカチを持ってさえいれば、どこの家の者であるのかが一目瞭然で誰からもよくわかり、個性が際立つかもしれません。また通常のハンカチというのは実用的なものですが、家宝のハンカチであれば、そう日常的に使われることはなく、汚れないように大切にしまわれることになるでしょう。\n価値あるものを持っていながらも、その力を出し惜しみするような、それでいて力を見せつけたいような、そんな複雑な気持ちがあるかもしれません。\nこの度数を持っている人は、たくさんの資質と力とをその内側に秘めているでしょう。実際に家柄が良かったり、ある種の特権階級にいたり、ということもあるかもしれません。\nしかし実際に社会と関わることに対しては保守的になりやすい傾向があり、自分の能力を出し惜しみすることがあるでしょう。ここでは自分の立場を守ることが優先されていき、社会と深く関わることで、やり方やペースや立ち位置が乱れることを防ごうとするかもしれません。すると人生そのものが守りに入って、ダイナミズムに欠けることがありそうです。\n持っている資質をどれくらい使いこなせるかがカギとなりそうです。"}, "乙女座_16": {"sign": "乙女座", "degree": 16, "symbol_ja": "動物園でオランウータンと直面する子どもたち", "symbol_en": "In The Zoo, Children Are Brought Face To Face With An Orangutan.", "key_phrase": "人生があるときに反転して自分を取り戻す人", "explanation": "乙女座は主観を抑えて、客観を鍛えることで自分を律してきました。自分がどう感じるのか、ということを後回しにして「どのようにふるまうべきか」ということを学びます。お手本となる教義を手に入れると、その価値観を通して世界を観察し、身のまわりのあらゆることを管理し、きっちりとした生活を送ろうとするでしょう。\nこのとき、管理しきれないものに関しては「扱わない」ことで秩序を守りますしかし、ここではその整えられた完璧さが破綻するようなショックが起こるでしょう。\nこのサビアン・ワードに描かれているのは、キチンと躾けられたお行儀の良い子どもたちと、野性味あふれるオランウータンが対面したところ。本能に忠実で主観にしたがうオランウータンは、乙女座がこれまで抑え込み、ときに排除してきた自分自身の投影であるかもしれません。決められた枠組みのなかで、同じような価値観の仲間とだけ付き合う生活はラクかもしれませんが、生命の持つダイナミズムがどんどん失われてしまいます。子どもがオランウータンと出くわすことで、本来持っている野性味を取り戻すこと......それは閉じ込めていた内なるチャイルドが外へ出てくることであり、本当の自分らしい生き方を取り戻すことにつながるでしょう。\nこの度数を持っている人は、人生のある時点において、これまでの生き方がくつがえるような経験をするかもしれません。それは努力してうまくやってきたはずの人生が、なぜかつまらなく、ガマンばかりになってきた頃に起こるでしょう。頑張っているのに身体を壊したり、憂鬱な気分が晴れなかったりしたときに、これまでの人生が否定されるような、しかし、それによって本当の自分を取り戻すかのような経験が起こるかもしれません。\nそのときに本当の自分自身と向き合って、失われたものが戻ってくるでしょう。人生を脅かす出来事や、自分をイライラさせる人物などが、そのきっかけとなるかもしれません。"}, "乙女座_17": {"sign": "乙女座", "degree": 17, "symbol_ja": "噴火している火山", "symbol_en": "A Volcanic Eruption.", "key_phrase": "抑えてきた思いを表出させることで自分に還る人", "explanation": "乙女座は主観を抑えこむことによって、どこへ行っても通用するような客観に基づく自分を創り上げようと試みるサイン。自分を律して、ある教義にしたがった「正しいおこない」を積み上げていき、完璧な仕事ぶりや生活をすることで、基盤を整えようとするでしょう。\nしかし、そうすることによって、抑え込んできた本能的な感情や欲求が衝動的にあふれ出してくる、というのが、このサビアン・ワード。溜めこんだ思い......自分で見ないように隠して抑え込んできたものたちが、自分自身の内側からあふれ出すマグマのように、どんどん出てくるかもしれません。\nそのきっかけは日常生活における、いつもの行為や関係性のなかにありそうです。いつもすこしずつ我慢して抑えてきたものが、あるとき、結界が壊れるように、ちょっとした事件であふれてくるでしょう。それが起こると、いつも自分をしっかりと律してきた人ほど、そんな自分自身に動揺して、傷つくかもしれません。しかし同時に、これまで抑えてきた重りがはずれるため、心が解放されて、元気を取り戻すことにもなるでしょう。\nこの度数を持っている人は、ある種の抑圧と、その反動による衝動的な爆発とを経験することになりそうです。普段は自分を律して、うまく、正しくできるように、何事も慎重で丁寧に行おうとするでしょう。\nしかし、あるときに抑えてきた感情や欲求が、暴発するようにあふれてくるかもしれません。その事実にショックを受けるかもしれませんが、結果的に本質が表出されるため、イキイキとした生命力を取り戻すことができるでしょう。\n普段は控えめですが、ひとたびなにかの主張をはじめると、徹底的にそれを貫くような激しさと華やかさを持っている人です。"}, "乙女座_18": {"sign": "乙女座", "degree": 18, "symbol_ja": "ウィジャ盤", "symbol_en": "An ouija board.", "key_phrase": "見えない世界からの情報を受け取る人", "explanation": "乙女座は主観を抑えることで客観を発達させて、誰から見ても「ちゃんとした自分」であることを創り上げるサイン。\nしかし、その過程において切り捨ててきた主観的な感情や欲求が影となって、予測不能な事態を招くことが多々ありました。すべてを自分の知性で理解できることだけで考えて、それ以外のものを切り捨て、管理しようとすると、どうしても想定外のことが起こる可能性があります。\nそこであらかじめ、理性では「予測できないこと」を招き入れることで、これから未来に起こり得ることを読み解こうとするのが、このサビアン・ワードです。\nウィジャ盤というのは、西洋版のこっくりさん。個人の意志や感情とは無縁の、偶然性や無意識の領域からのメッセージを、意識的に受け取ろうと試みます。そうすることで、自分自身の頭では考えつかないようなことでも、事前に安全な形で予測し、受け取ることができるようになるでしょう。\nこの度数を持っている人は、とても現実的でありながら、目には見えない世界の流れやオカルトな物事に興味を持ち、関わろうとするかもしれません。占いやチャネリングや降霊術などに惹かれて、それらのテクニックを通して、見えないもの、気づかずにいるもの、見落としているものに気づこうとするでしょう。\nこれはある種の防衛本能でもあり、想定していないことに振り回されるぐらいなら、自分で想定できないことまでを何らかの形で取り入れておいて、あらゆることに備えようとする欲求であるかもしれません。直感がおのずと鋭くなって、未来を読み解く力が高まるでしょう。\nオカルトを探求する人たちと関わることにもなるかもしれません。"}, "乙女座_19": {"sign": "乙女座", "degree": 19, "symbol_ja": "水泳競争", "symbol_en": "A swimming race.", "key_phrase": "心を解放して、なにが起こるのかを楽しむ人", "explanation": "客観に耐え得る自分を鍛えるために、乙女座の前半では個人の主観を抑えて、感情や本能的な欲求を後回しにしてきました。しかし、それでは人生に間違いがなくなっていく代わりに、どんどん狭量になって、パワーが低下していきます。\nそこで個人の感情や無意識の力を取り戻そうとする試みが始まりました。乙女座のなかに、対向する魚座の質を取り入れようとするチャレンジです。魚座は当然、水のなかを自由にすいすいと動きまわります。感情をイキイキと走らせることを、意識的におこなおうとするでしょう。\nヒプノセラピーやチャネリングなどを通して、潜在意識のなかにある可能性を意識的に取り扱ったり、あえて酔っぱらうことで無意識のなかにあるものを解き放ったりするかもしれません。水は情感の世界ですから、そこを自由に泳ぎ回り、競争するために、無意識の領域を解放させる必要があるでしょう。結果として深層心理の働きに興味を持ち、人の心の揺れ動きを扱えるようになりそうです。\nこの度数を持っている人は、人の心に興味を持って、深層心理や心のしくみに精通し、ハートのクリアリングのテクニックなどに長けてくるでしょう。スピリチュアルな世界と関わって、ヒーリングや心を豊かにする生き方などに詳しくなる人もいるかもしれません。\n心を解放して、感情を遊ばせ、さまざまな経験に心を揺らすことに喜びを感じるでしょう。そのためにあえて、人と本音でぶつかり合ったり、複雑な関係のなかに飛び込んだりして、心が揺れ動く刺激を求める人もいそうです。"}, "乙女座_20": {"sign": "乙女座", "degree": 20, "symbol_ja": "西海岸をめざしているキャラバン車", "symbol_en": "A Caravan Of Cars Headed To The West Coast.", "key_phrase": "自分の可能性をひらく環境に飛びこんでいく人", "explanation": "キャラバン車とはキャンピングカーのような、その中で生活することのできる車です。それが仲間たちと共に、西海岸をめざして移動しています。西海岸は流行のはじまる場所であり、多様な生き方が容認される自由な場所。いろいろな人たちが、さまざまな価値観を抱いて、それぞれの生き方をすることができる場所です。\nそんな新しい環境に身を投じることで、まわりからたくさんの刺激を受けて、自分の中のまだ使っていない未知の可能性が目覚めていくことが予想されるでしょう。一緒に西海岸をめざすキャラバンの一行は血筋や同郷などには関係なく、自由で多様な生き方に憧れて各地から集まってきた仲間たち。ひとつの目的をもった、寄せ集めの仲間たちと共に、未知の経験に対して、お互いに協力し合いながら立ち向かっていこうとする姿が描かれています。\nこの度数を持っている人は、自分の中にある可能性をひらいたり、刺激したりするものの中に、進んで飛び込んでいこうとするかもしれません。自分の中に能力があるならば、なるべく多くを使いこなしてみたい、さまざまな資質を目覚めさせたいと願うでしょう。ひとつのやり方やパターンにとらわれるのではなく、いろいろなやり方や手法を身に着けるために、あえて冒険をしてみようと思うかもしれません。\nまた非常に仲間思いであり、自分の属している集団のために尽力するでしょう。みんなで大きな目的を達成することにも喜びを見出せる人です。"}, "乙女座_21": {"sign": "乙女座", "degree": 21, "symbol_ja": "女子バスケットボールチーム", "symbol_en": "A girl\\'s basketball team.", "key_phrase": "高いモチベーションで大きな目標を成し遂げる人", "explanation": "少女たちが集まって、バスケットボールのチームを作り、日々鍛錬をしています。素直で純粋な少女たちが、ひとつの目標に向かって奮起し、気持ちをひとつにしようとしているのでしょう。\n乙女座は地のエレメントに属するサインであり、目に見える形で成果や結果を出すことを大切にしています。外の世界から求められることに対して、より質の高い成果を確実に出そうとするでしょう。\nバスケットボールは技術、瞬発力、判断力、柔軟性、機敏さといった乙女座の構成要素がふんだんに求められるスポーツです。ゴールにより多くのボールを入れて、チームを勝利に導くという目標は決まっていますが、どのようにしてそこへ辿り着くのかは、その時々の戦略次第で変わり、またその要求に応えるだけの能力と受容力も必要となるでしょう。また、ゴールが頭上にあるということは、手が届くものをめざすのではなく、より高い目標に向かっていくということを示しているのかもしれません。\nこの度数を持っている人は、とても努力家で、自分で定めた高い目標に向かって一途に力をそそぐことになるでしょう。個人的な技術や知識を高めると同時に、属しているチームに貢献するような献身性も発揮します。簡単には達成できないようなむずかしい課題に対しても、みんなで力を合わせて工夫して、どうにか成し遂げようとするでしょう。\n結果的に能力が飛躍的に引き出されて際立ち、どこへ行っても実務的に大きな成果を得ることになりそうです。チームとなった仲間たちと共に、数々の仕事を充実した形で達成させることができるでしょう。"}, "乙女座_22": {"sign": "乙女座", "degree": 22, "symbol_ja": "宝石のついた王家の紋章", "symbol_en": "A Royal Coat Of Arms Enriched With Precious Stones.", "key_phrase": "最高の結果を出して、それがまわりからも認められる人", "explanation": "個人の持っている能力を惜しみなく発揮して、その質を最高潮にまで高めることが乙女座のひとつの目的です。他者からのあらゆる要求に応えられるように数々の知識や技術を身につけて、機敏さや判断力を磨き、柔軟に世界で起こることに対して対応しようと試みます。自分の属しているチームに貢献し、求められているものに応え、メンバーたちがそれぞれ機能するように調整したうえで、高い目標をめざして尽力もするでしょう。その結果として大きな功績を残すに至り、それが王家の紋章として示されています。\n「王家の紋章」は、地上で獲得し得る最高のステイタスであるかもしれません。それは本人の多大な功績と能力によって得たものであるということが内外に示されるため、それを持つ人をおのずとまわりは尊重し、信頼をおいて見ることになるでしょう。\nこの度数を持っている人は、高い実績を残すために努力を惜しみなく重ねていき、それがしっかりと誰からもわかる形で認められることになりそうです。ステイタスやブランドと関係するシンボルであり、誰もが知っている名のある企業で働いたり、高名な学校の出身であったり、高級なブランドのものを身につけたりすることがあるでしょう。成し得たことを、しっかりとしたひとつのイメージとして認識させるために、みずからブランドを立ち上げることもありそうです。\nそれは決して口先だけのものではなく、確実に質の高い結果が伴っているもの。発揮し得る最高の能力を出しきることで、自分だけのステイタスを持つことができる人です。"}, "乙女座_23": {"sign": "乙女座", "degree": 23, "symbol_ja": "技能と個性を披露するライオンの調教師", "symbol_en": "A lion tamer displays his skill and character.", "key_phrase": "自分と他者の本能的な部分を受け容れて教育する人", "explanation": "ライオンは本来、野生の動物であり、広大なサバンナの草原でおのれの習性にしたがってのびのびと本能のままに暮らしています。しかしサーカスやショーなどで技能を披露するライオンは、その生来の野性的な面が調教されていて、粛々と調教師にしたがうことになるでしょう。このライオンに相当する部分が、わたしたちのなかにある身体や心が持っている癖やパターンといえるかもしれません。\nここでは、それらの無意識の持っているものを見極めて、コントロールし、洗練させていくことができるでしょう。ライオンはプライドの象徴でもあるので、他者や世間に対する見栄や意地のようなものも、ここでは調教されて、性格の丸さが出てくることになるかもしれません。\nこの度数を持っている人は、人が本来持っている資質を磨く教育者としての能力があるでしょう。その能力はまず、自分自身に向けられていき、心や身体の持っている無意識の部分を律したいと望むかもしれません。自分のなかの未知の部分と向き合って、それらをできる限り、受け容れていこうとするでしょう。\nそれから、そのための知識や技術を身につけると、今度は自分の外側の環境や身のまわりにいる人たちを導き、改善しようと努めることになりそうです。一律のマニュアルにしたがってそれをするのではなく、確かな技術を持ちながら、ひとりひとりの個性や癖を見極めて、その人に合った矯正をすることになるでしょう。そうして個々が潜在的に秘めている資質を存分に引き出すことのできる人です。"}, "乙女座_24": {"sign": "乙女座", "degree": 24, "symbol_ja": "メリーと彼女の白い羊", "symbol_en": "Mary and her white lamb.", "key_phrase": "世界のあらゆることを素直に受け止めることのできる人", "explanation": "「メリーさんの羊」の歌にあるように、白い羊をメリーさんが飼っていますが、その関係はやさしく、穏やかで、愛に満ちているでしょう。メリーさんと羊は仲良しであり、決して羊を縛り付けたり、鞭で打ったりすることはありません。他者に対する厳しさや批判や警戒心があるとき、それはわたしたちが自分自身の内側に扱いかねるものを持っているのでしょう。\n自分のなかにある、未知のもの、あるいは影の部分に対して「それを表に出してはいけない」「もっとこうするべき」「そんなことをしてはいけない」等、思っているとき、それはそのまま外側の世界の対人関係のなかで投影されることになるでしょう。誰かに対して厳しくするとき、それはそのまま、わたしたちが自分の内にあるなにかを否定しています。\nしかし乙女座のこのサビアン・ワードにおいて、メリーさんと白い羊は非常に仲良く、親密で、信頼関係が築かれています。自分の道を極めて、本能的な部分までしっかりと受け止めることのできた人は、自分に対する否定と恐れがなくなるのでしょう。\nこの度数を持っている人は、とても温和で自然体。自分に対しても、まわりの人たちに対しても、いつもやさしく、素直な気持ちで接することができるでしょう。\nしかしそのような境地に達するまでに、一度なにか自分で定めたことを極めた経験があるかもしれません。自然体ののびのびとした感性の背後には、何事に対しても一途にやり遂げるだけの根性が備わっています。自分の力でなにかを成し得たからこそ、自身に対する深い信頼があり、シンプルに生きることの大切さを知っているのでしょう。\n子どものような素直さを発揮して生きるということは、自分の内側のすべてを受け入れた、ということであるのかもしれません。"}, "乙女座_25": {"sign": "乙女座", "degree": 25, "symbol_ja": "公共の建物の前の半旗", "symbol_en": "A Flag At Half-Mast In Front Of A Public Building.", "key_phrase": "何事に対してもしっかりとしめくくる人", "explanation": "半旗とは弔意を示すために、旗竿のもっとも高い位置から三分の一ほど下のところに掲げる旗のこと。葬儀のその人の肉体を持った人生をしめくくる最後の儀式ですが、それは個人の人生をきっちりと閉じて「ここまで」と線を引くために欠かせないものです。\n地のエレメントに属する乙女座は、自分の内側にある実感を抑えることで、客観的に世界のなかで役立つ自分を創り上げようとします。それは広大な世界のなかで、個人の立場や役割、責任の範囲といったものを明確にひくことで可能になるでしょう。\nそして、そうであるならば、その仕事や責任をしっかりとやりきって、まとめ上げることで「完全になされた」といえるのかもしれません。このサビアン・ワードの半旗にはひとつの物事やサイクルの終わりが示されています。そして、そのときこそダラッとせずに、きっちりとまとめ上げることで、その出来事がひとつの形として完成するでしょう。\nこの度数を持っている人は、何事に対してもきっちりと「最後をしめること」を大事にするかもしれません。誰かと別れる、どこかから引退する、属していたグループから離れるといった特別なシチュエーションもそうですが、一日の仕事を終える、使ったもの片づける、人とのやりとりを終わらせるといった日常的なことに対しても、きっちりとやり遂げる、きれいにまとめて線を引く、ということが心地よさをもたらすことになるでしょう。\nいつでもきっちりと細部をまとめて、美しくスッと完結させることが、次のスタートを後顧の憂いなくして始めることにつながります。そしてそれはシンプルで無駄のない、きっちりとした人間の生き方につながるでしょう。"}, "乙女座_26": {"sign": "乙女座", "degree": 26, "symbol_ja": "祭壇のそばの聖職者に吊り香炉を捧げる少年", "symbol_en": "A Boy With A Censer Serves The Priest Near The Altar.", "key_phrase": "心の可能性を探求して師匠から学ぶ人", "explanation": "地のエレメントに属する乙女座は、世界のなかで自分の持つ能力を発揮するために、役割と責任の範囲を明確にしたうえで、いま目の前で求められていることに完璧に応える、ということを目的としてきました。それが成されることで個人の現実的な対処能力が充分に成長していきます。\nすると、残っているのは限定された時間や空間を超えたところで働く「全体性」を学ぶこと。次のサインである天秤座は、その全体性をもって多種多様な世界の人たちとつながり、付き合っていきますが、そのための準備が始まったといえるでしょう。\n祭壇のそばにいる聖職者は、なにか宗教的な儀式をおこなっているのかもしれません。宗教の儀式は個人の精神を閉じられて限定された空間から解放して、愛やつながりといった全体性を取り戻すことを助けるもの。見習いの少年はその全貌に触れながら、ベテランの聖職者に導かれて、その疑似体験をしているのかもしれません。\nこの度数を持っている人は、現実的な世界の中での役割を果たすことだけでは満たされず、心の持っている可能性をできる限り広げようとするでしょう。実務能力を鍛えるばかりでなく、人間性や精神的な面での成長を求めて、スピリチュアルな世界や心を扱う世界へと足を踏み入れることになりそうです。\nその姿勢は乙女座らしく、まずは優れた師匠を探して、彼らの活動から直接学び、体系がどのようになっているのか、その仕組みを理解しようとするかもしれません。権威からの教えを模倣することで、自分の心の可能性を開いていこうとするでしょう。"}, "乙女座_27": {"sign": "乙女座", "degree": 27, "symbol_ja": "宮廷の行事で儀式的に顔を合わせる貴婦人たち", "symbol_en": "A Group Of Aristocratic Ladies Meet Ceremonially At A Court\\'s Function.", "key_phrase": "精神的に充足する活動をまわりに伝え広める人", "explanation": "宮廷でなにかと行事の度に顔を合わせることになる貴婦人たちは王族や大臣、将軍の奥さまやお嬢さまたちでしょう。現代社会でいうならば、政治家の婦人会や花柳界を支える奥さまたち、ビジネスやスポーツで大成功を収めた男性のセレブ妻たちといったところでしょうか。\nあくせくと働いたり、日常的な家事や子育てといった雑務を自分でこなしたりする必要のない女性たちの興味や関心は、非日常的な体験をすることや、人としての精神性を深めること、社会がより良くなるための貢献といったことへ向けられるでしょう。しかし、それは実務としての役割ではないため、あくまで余裕をもって、ゆったりとした雰囲気のなかで進められるかもしれません。そしてまた彼女たちの始めた活動は、少しずつ顔を合わせた人たちとのつながりによって少しずつ広がっていき、同じような立場の女性たちへと伝播されていくでしょう。\n古今東西いつの時代のどこでも、セレブ女性たちの始めた活動はブームとなりやすく、一般の女性たちが憧れて真似することにもなりやすいようです。\nこの度数を持っている人は、精神的な充足を満たすための学びや活動に積極的に参加することになるでしょう。しかし、その姿勢はストイックで熱心にというよりも、自分が楽しみ、解放されるためのものとして、リラックスした雰囲気のなかで行うことを好みそうです。全体的にゆとりを必要としますが、自身が価値を見出したことに関しては、それを活用しながら、まわりに教え広めていくこともするでしょう。\nコミュニケーション能力が高く、人の心を惹きつけて、自分が良いと思ったものを普及させる力を持っています。実際には、自分が中心となって活動するよりも、フォロワーとして活躍している人物を支えることに適性があるでしょう。"}, "乙女座_28": {"sign": "乙女座", "degree": 28, "symbol_ja": "権力を握ったはげ頭の男", "symbol_en": "A baldheaded man who has seized power.", "key_phrase": "すぐれた直観ですべてを把握して、それを隠さずに伝える人", "explanation": "髪の毛は頭を保護する役割がありますが、それがないということは、ダイレクトにクラウンのチャクラにさまざまな情報が降りてくることを示しています。それは現実レベル、精神レベル、直観レベルにおいて、多彩な情報を受け取ることができるともいえるでしょう。それゆえに、なにが真実で、いまなにが求められていて、いまなにが必要なのか、ということをスパッと見極めることができそうです。そしてこの能力があるからこそ、さまざまな分野で道を切り拓き、権力あるポジションにつくことができるでしょう。\nまた、頭が隠れていないということは、自身の考えも丸見えである、という状態。乙女座は世界のなかで個人が「ここまで」と線を引いた範囲の役割をまっとうすると同時に、境界のなかに個人を守ってきましたが、ここではそれが閉じられておらず、直接的に世界とつながってもいます。世界に自分の一部を明け渡し始めるサビアン・ワードであるともいえるでしょう。\nこの度数を持っている人は、すぐれた直観力があるため、すこし聞いただけでなにをすればいいのか、明確に理解し、示すことができそうです。他では入手できないような情報も続々と集まりやすく、それらを総合的に使って道を切り拓くことになるでしょう。\nとても正直な性格の持ち主で、思ったことがなんであれ、それを言わずにいられません。ウソやごまかしを嫌い、どんなことでも自分の思いを赤裸々に伝えていくため、他者に対してもそうであることを求めるでしょう。\n迎合せずに飾り気のない真実を求めるため、人によってはこの人の発言を辛辣に感じるかもしれません。しかし、なんであれ、この人の言うことは、真実であることに間違いないでしょう。"}, "乙女座_29": {"sign": "乙女座", "degree": 29, "symbol_ja": "心を啓発させる古代の巻物を読んでいる", "symbol_en": "オカルト知識の探求者", "key_phrase": "illumines his mind.", "explanation": "心を啓発させる古代の巻物を読んでいるオカルト知識の探求者\n物事の本質を深く追い求めていく人\n世の中が移り変わっていく過程において、さまざまな教義が創られては消えていきます。このサビアン・ワードの探求者は、そんな移り変わりにおいて、物事の本質をはっきりとつかむための知識を探求しているのでしょう。\nもっとも普遍的で揺るがず、誰の中にも存在し、変わらないものは何なのか。どうしたらそれをつかみ、深く理解して、そこに到達することができるのか。自分の心をダイレクトに揺り動かす知識を求めて、太古の人々が研究し、知り得たものを探し求めようとしているのでしょう。\nオカルトとは、隠されているもの。目で見ることはできず、触れることもできないけれど、そこにあることが誰にとっても明らかな神秘の存在です。それを紐解き、そこに含まれている叡智を使って、あらゆるものの本質に迫ろうとするでしょう。\nこの度数を持っている人は、さまざまな物事の背後にある隠された真実に惹かれるかもしれません。目には見えない場の雰囲気や空気を読み解くことがうまく、察しの良さが際立つでしょう。神秘的な物事を紐解く教義に興味をもって、探求する人もいるようです。\nまやかしのものには惹かれず、どんな分野の物事であっても、本質的な純度の高さを追い求めていくでしょう。個人のエゴを超えて、真実をつかむための技術や知識に惹かれ、それを確立しようと試みるかもしれません。そしてはっきりとした確信が得られたときに、それを何かしらの形として証明することになるでしょう。"}, "乙女座_30": {"sign": "乙女座", "degree": 30, "symbol_ja": "やるべきタスクを即時に完全に終わらせることを意図しているため、", "symbol_en": "いかなる誘惑も無視する男性", "key_phrase": "Allurement.", "explanation": "やるべきタスクを即時に完全に終わらせることを意図しているため、いかなる誘惑も無視する男性\n自分の世界を完全にするために高い集中力を向ける人\n乙女座の最終度数にして、乙女座の特色が際立つサビアン・ワードです。乙女座は世界と関わるときに個人の役割と責任の所在とを明らかにしてから、その範囲において完全な形で世界と関わろうとします。\nしかし、それはあまりにも限定的な関わり方だといえるでしょう。成長のためには時に境界を超えて、他と交わり、予測不能なものを受け入れる必要があります。\nいずれの星座においても、最後の5度は次の星座の意図を先に取り込みながら、自身の星座を補完していきます。乙女座の次の天秤座で、わたしたちは自分自身を他者に明け渡し、その関わりを通して、成長の機会を得て、磨かれていくことになるでしょう。\nしかし、ここでは目の前のやるべき実務に集中するあまり、他のことを受け入れる余裕がまったくありません。結局乙女座にとっては、目の前のできることをひとつずつ片づけていくことが最善の道といえるのでしょう。\nこの度数を持っている人は、集中力が抜群で、小さなことにもこだわりを発揮し、コツコツと成果を積み上げていくことができます。多角的に物事を見るよりも、集中してひとつの道を極めることで、そこからすべてを理解しようとするかもしれません。\nしかし、時には自分の可能性を広げるために、思い切って「他の誘惑に耳を傾けること」も必要でしょう。自分で完璧に支配できる閉じられた世界から外へ出ることで、より新しい成長のチャンスがやってきます。慎重になりやすいところがありますが、思い切って一歩踏み出したときに、未知の可能性が迎え入れてくれるでしょう。"}, "天秤座_1": {"sign": "天秤座", "degree": 1, "symbol_ja": "さまざまな生物たちの", "symbol_en": "標本コレクションのなかで", "key_phrase": "完璧な美しい羽を見せている蝶", "explanation": "In A Collection Of Perfect Specimens Of Many Biological Forms, A\nButterfly Displays The Beauty Of Its Wings, Its Body Impaled By A Fine\nDart.\nさまざまな生物たちの標本コレクションのなかで針を突き通されて完璧な美しい羽を見せている蝶\n世界に対して自分自身を見せていく人\n後半の6星座では、わたしたちが本格的に他者と関わり、社会のなかで活躍していく過程がやってきます。前半の6星座において、自分たちの内にあるものを活性化し、徹底的に磨きをかけてきました。天秤座ではまずその視点が逆転して「他者から見られている自分」「他者から期待されている自分」を把握します。\nわたしたちはお互いに無意識のうちに、自分の内側にあるものを相手に投影して、期待しながら接しているでしょう。そして、相手からの期待に応えることによって、その相手との関係が良好になっていきます。\nより多くの人とめぐり合い、関わり合って、その期待に応え続けることで、わたしたちはより多くの人たちに受け入れられるだけの人格を獲得することになるでしょう。そうして、社会のなかでどこへ行っても、誰といても、馴染むことのできる自分自身になることが、天秤座の持っているテーマといえそうです。\nこの度数を持っている人は、対外的な他者との関わりのなかで、しっかりと自分を打ち出していくことになるでしょう。サビアン・ワードに描かれているシンボルは、標本にされた蝶ですが、わたしたちはそれを見たときに「この種類の、こんな蝶」と特定できます。さらにそこから「わたしはこの蝶、好き」「わたしはあまり好きじゃない」「羽の模様が綺麗」「もっと華やかなほうがいい」といった、多彩な感想が聞こえてくるかもしれません。\nこの人々の本音こそが、自分を磨くための鏡の声。返ってきたもので、自分を知り、より良くなるように磨くためには、まずしっかりと自分を見せていく必要があるでしょう。\nオープンに自分を表現していく人といえそうです。他者はさまざまな感想をもって、この人を見ていきますが、それを多く集めるために、世界に自分を開き続けることになるでしょう。"}, "天秤座_2": {"sign": "天秤座", "degree": 2, "symbol_ja": "永遠の創造スピリットを", "symbol_en": "具現化する種に変容させる", "key_phrase": "The Transmutation Of The Fruits Of Past Experiences Into The", "explanation": "Seed-Realizations Of The Forever Creative Spirit.\n永遠の創造スピリットを具現化する種に変容させる過去の経験の実り\n他者との関わりを通して自分の多彩な側面を見出す人\nサビアン・ワードにある「過去の経験の実り」とは、前半の6星座で自身が体験して、身につけ、磨いてきた数々の能力や資質です。それらが自分自身を活かすリソースとなって、多くの人たちと出会い、めぐり合うことによって、さまざまな形に姿を変えながら、その時々で必要なものを生み出すことになるでしょう。\n天秤座においてわたしたちは、より多くの人たちと接することで、対外的に自分をどのように見せていくのか、という表現方法に磨きをかけていきます。求められるものに応じることで、その表現はより多彩にバリエーションを増やすことができるでしょう。そして誰の求めにも応じて、その時々において必要な自分を出していくことができるのは、過去のリソースが現実を創り出すための種となっているからといえそうです。\nこの度数を持っている人は、身近なところから他者との関係に踏み込んでいき、それらとの関わりを通して、人生を拓いていくことになるでしょう。その時々の状況や、そばにいる人たちに合わせて、必要なものを表現していくことができます。\n人生のなかで、より多くの可能性をひらくためには、より幅広く、さまざまなタイプの人たちとつきあうことがポイント。相手が誰であれ、まわりにいる人たちに自然と寄り添うことができるため、その関係のなかにたくさんのチャンスがあることに気づかされるでしょう。多彩な人とのつながりによって、自分自身を大きく開花させていく人です。"}, "天秤座_3": {"sign": "天秤座", "degree": 3, "symbol_ja": "すべてが変わったことを", "symbol_en": "明らかにする新しい日の夜明け", "key_phrase": "すべてが変わったことを明らかにする新しい日の夜明け", "explanation": "他者との相対的な関係によって人生の進む方向が変わる人\n天秤座にとって自分と外側の世界は相対的につながっています。目の前にいる人たちに、自分をさらけ出すほどに、その反響は高まり、自分の個性にふさわしい場所へと連れていかれることになるでしょう。自身の発した言葉が引き金となって、誰かの心を動かし、その動かされたものの反動によって、自分の立ち位置が変わっていきます。まるでビリヤードの球のように、付いた球と付かれた球が同時に影響する世界といえるかもしれません。\n乙女座の段階までは、自分の思考で限定された世界の法則を理解し、その理解を使って、望むような結果を出そうとコントロールする意志が働くでしょう。しかし天秤座の段階へ進むと、個人を外の世界にひらいて、ゆだねているため、自分で示した意志に対して、まわりがどう反応するかによって、どの方向へどれくらい進むのかが変わってきます。そのため、自分でも思ってもみなかった方向へと人生が進んでいくということも起こるでしょう。\nこの度数を持っている人は、自分でも思いがけないところへと人生が転がっていくことを体験するかもしれません。ポロッといったことが実現したり、誘われて軽い気持ちで応じたことが大掛かりなことになったり、相手がなにかを自分に期待して場を与えてくれたりすることがあるでしょう。\n自分と世界とが相対的につながっていて、いつも望んでいる方向へ進むとは限らず、時にはびっくりすることも起こりそうです。他者との関係を通して「どうしてこうなったの?」と、自分でも思いがけないほど、人生がガラッと変わる体験をする人もいるかもしれません。"}, "天秤座_4": {"sign": "天秤座", "degree": 4, "symbol_ja": "キャンプ・ファイアを囲んで", "symbol_en": "霊的なコミュニケーションをとる若者たち", "key_phrase": "キャンプ・ファイアを囲んで霊的なコミュニケーションをとる若者たち", "explanation": "不思議な縁で多くの人たちとつながっていく人\n人の縁というのは不思議なもので、自分自身を隠さずにさらけ出すと、おのずと気の合う人が磁石のように引き寄せられてくることになります。多くの人たちが存在するなかで、わたしたちは自分の内側にあるものと、同じようなものを感じる相手に自然と惹かれていき、つながっていくことになるのでしょう。\nそうした仲間たちがどこからともなく集まってきて、キャンプ・ファイアを囲んでいます。火はわたしたちの意志や希望や変容のシンボルですから、なにかしらの共通する意識を囲んでいる状態といえるかもしれません。夜にキャンプ・ファイアを囲んでいると、おのずと内面にも火がついて、自分を語り出したいような気持ちに駆られるでしょう。誰かの話した言葉に触発されて、また別の誰かが自分について話し出し、また違う誰かも語り始めるかもしれません。そのようにして、つながった会話や親密な関係は、おたがいの存在や人生を支え合うようになるでしょう。\nこの度数を持っている人は、人と不思議な縁で結ばれることがたびたび起こりそうです。たまたま巡り合った人と、その内面を語り合うことで、濃厚な関係を築くことになるでしょう。その縁によって人生が支えられて、また別のつながりへと道がひらいていくこともありそうです。\n他者との交流を通して、自分の情感が豊かになっていき、また他者から支えられることによって、自分自身に確信を抱くことになるでしょう。多くのものをみんなと分かち合って、決して独り占めすることはありません。みんなで共有することをなによりも大切にする人だといえるでしょう。"}, "天秤座_5": {"sign": "天秤座", "degree": 5, "symbol_ja": "生徒たちに新しい世界を創るための", "symbol_en": "内なる知識を明らかにする男", "key_phrase": "upon which a New world could be built.", "explanation": "生徒たちに新しい世界を創るための内なる知識を明らかにする男\n他者との関わりのなかで多くのことに気づいていく人\n男性が生徒たちに求められるままに語ることで、新しい世界を創るための知識を披露しているサビアン・ワードです。ここでいう「新しい世界」というのは、他者との関わりによって生み出されていく新しい自分であったり、新しいやり方であったりするかもしれません。そしてこの男性は「教えている」のではなく「明らかにしている」のです。最初から明確な知識やアイデアがあってそれを教えているというよりも、求められているものに応えているうちに、内面がどんどん露出されて、明らかになってきたともいえるでしょう。\nわたしたちはお互いに自分自身の内にあるものを他者に投影しながら、自身を確認し、あるいは気づきを得ます。信頼している仲間たちに心の内を語って、いろいろな角度から質問されたり、それに対する他の人の意見を聴いたりしているうちに、自分がどうしたいのか気づいて、意志がかたまっていくことがあるでしょう。\nこの度数を持っている人は、他者と深いつながりを築くことに喜びを感じて、その交流を通して、多くの気づきを得ることになりそうです。ひとりで考えていて、よくわからなかったことが、他者と話しているうちに、どんどん明確になってくる、ということが起こるかもしれません。そのためにはお互いを信頼しあって、心の内にあるものを正直に明かし合うことが必要でしょう。\n誰かの本音に、誰かが刺激されて、またその反応によって自分自身が気づかされていく......。そんな反応が連鎖的に起こって、みずからの意志がはっきりとしてくるのかもしれません。"}, "天秤座_6": {"sign": "天秤座", "degree": 6, "symbol_ja": "内的なヴィジョンを前に", "symbol_en": "理想が具現化するのを見ている男", "key_phrase": "内的なヴィジョンを前に理想が具現化するのを見ている男", "explanation": "自分を外に表現することで思いを実現させる人\n思ったこと、願ったことがどんどん実現していく、という、一見幸運のようにも感じられるサビアン・ワードです。内側で見ていたヴィジョンが、外側に取り出されることで、どんどん具現化されていくでしょう。\nそれというのも天秤座にとって、自分の内なる世界と、外側の世界は相対的につながっているものだからです。自分がなにか意志を発すると、それに対してまわりが何らかの反応を示し、その返ってきたリアクションによって、自分が次になにをするのかが明らかになります。\nつまり自分自身が常に外からやってくる反響によって動かされるように、外側も自分の意志によって変化していくという関係で成り立っているのが天秤座の世界。自分の内にあるものを表現すると、それを求めている人が惹きつけられてやってきて、また、そんな彼らの反響に合わせて、自分の表現を変えていくために、実現がスムーズになるといえるかもしれません。自分のしたいことを示し、それに期待している人を引き寄せて、彼らの期待に応じることで実現させる、という関係です。\nこの度数を持っている人は、自分の望んだものが、なにかしらの形となって実現しやすいでしょう。それは意志や願望を外の世界に向かって明確に表現するほど、頻繁に起こります。なにかを伝えることで、それに興味を持っている人が反応を示し、なにかしらの期待を寄せるため、それに応える形で思いが実現するでしょう。\n素直に他者との交流のなかに自分をひらけばひ
