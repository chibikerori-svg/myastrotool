。だが、１０度では、もっと積極的に、過去の自分の体験にもとづいて、人を助ける活動に乗り出す。この度数の持ち主は、救済の必要な人に内側から共感できる、福祉的な仕事にむいている人だ。治療師や、医者にも多く見られる。\nNo. 9／72区分（牡牛座１１度～１５度）「自己愛」 個人的な欲望の発達と洗練\n所有的な愛に目覚める。商業的な行為に、大きな価値を見いだすが、たいていの場合、消費しすぎて、大きな負担を抱え込むことになる。しかし物質環境においての、徹底した事業力などが発達する。"}, "牡牛座_11": {"sign": "牡牛座", "degree": 11, "symbol_ja": "自分の庭で花に水をやる女性", "explanation": "自分の庭の花には水をやるが、他人の庭の花には見向きもしない。所有欲に関係した愛情を意味するこの度数では、洗練とか、修練を意味する愛情を意味していて、自分の能力や欲望に関係した問題で、毎日地道に水をやって育てる、という意味がある。これもまた牡牛座の特徴のひとつだが、たとえばピアノの練習を毎日するとか、化粧、美容に時間を使うということもこの度数に関係する。ネコを飼うというのも、そうかもしれない。とくにこの度数では、欲望は、すべて内面にむかっているので、やがて育った能力は、はっきりと個人の美的な洗練としてあらわれてくる。規則的な集中力。牡牛座１０度で、福祉と利他的な活動に集中した人は、それをつづけることに耐えきれなくなり、こんどは自分のことに目いっぱい熱中したい気持ちが強くなる。自己のアイデンティティを確実化するために、エゴを育てなくてはならない。これは対向（１８０度反対）にある蠍座の１１度がアイデンティティを失って溺れている状況であり、この度数が背後で糸を引いていることから推理できる。"}, "牡牛座_12": {"sign": "牡牛座", "degree": 12, "symbol_ja": "若いカップルがウィンドーショッピングをしている", "explanation": "牡牛座１１度で内面的な所有欲にむかっていた成長力は、やがてほこ先を、外の世界にむける。１１度はとても女性的で、１２度はこんどは欲望の男性的な側面だ。彼は社会参加をしたがっていて、そのためには、どうしても衣服、トレンディな流行品、道具を必要とする。車も欲しい。ノートパソコンも必須アイテムだ。社会的な欲望として、地位も欲しくなる。欲望の社会化とルディアは述べているが、シンボルの光景を想像してほしい。カップルの女性の側は、個人的なものだけを欲しがる。男性は、もっときょろきょろと外面的な欲望に関心をむけているのだ。この度数の持ち主は、欲望のエスカレートに注意。"}, "牡牛座_13": {"sign": "牡牛座", "degree": 13, "symbol_ja": "ポーターが重い荷物を運んでいる", "explanation": "１２度で欲望を社会に投影した人は、当然、社会のなかでなんらかの義務か、重荷を背負うはめになる。地位を欲しがれば、その地位に必要な労役を。１２度のウインドーショッピングで買い物をしすぎれば、ローンの支払いのため働かなくてはならない。社会のなかに、欲望を通じてひとつの歯車として組み込まれた姿が見える。欲望を社会化したのだから、当然彼はその欲望によって、社会から強制されるかかわりができた。牡牛座１１度の自己の成長力を確保する（内面の女性を養う）ためには、社会的な義務や労働に従事しなくてはならないのだ。ポーターは、重すぎる荷物でとても疲れている。しかし自分で掘った穴にはまったのだから、文句はいえない。"}, "牡牛座_14": {"sign": "牡牛座", "degree": 14, "symbol_ja": "海岸で、波打ち際の貝殻を手探りして、子供たちが遊ぶ", "explanation": "波打ち際は、海（無意識）と陸（意識）のあいだの臨海線。１３度ではたらくことになったポーターも、無理な野心はもたず、気楽に生きるのがふさわしいと自覚するようになった。自分の欲望の増加が原因で課せられた義務も、引受けられる可能な範囲を見定めて、適当な線で手を打たねばならない。可能なこと以外には、手を出さないという自覚。そうすれば、自分にふさわしいリラックスが手に入る。子供は、危険な海にどんどんと進んでいくことはない。波打ち際を定めて、その周辺で遊ぶのだ。ここにはとても自然な、バランスのとれたやすらぎがある。自分の能力の限界を自覚すること。無理のない生活のなかで、人の生命力は回復する。"}, "牡牛座_15": {"sign": "牡牛座", "degree": 15, "symbol_ja": "男が粋なシルクハットをかぶって、寒気を防ぎながら、嵐に立ち向かう", "explanation": "１１度、１２度で人は自分の欲望と成長力につき動かされた。１３度では、必然的にそれに必要な労力を強制された。１４度では、自分の限界をはっきりと知って、むやみな成長欲を緩和した。結論の１５度では、１４度の自覚にもとづき、自分のできる範囲での責任と、義務をしっかりと意識的に受け止め、寒気や嵐に対して、受けて立つ気概のある男に変身した。彼は社会的に成功していて、自覚的に生きている。自分のカルマは、自分から生み出したものだということをしっかりと意識しているのだ。社会的な体験から実際に学んだ人間は、本当の意味で成熟した勇気ある人間に変わっていくということを暗示する。そしてこの危機をちゃんと通過する意欲を示している。だからこの度数の持ち主は、責任感と自覚のある人物で、じたばたしない人だといえる。\nNo. 10／72区分（牡牛座１６度～２０度）「個性」\n新しい個性を確立するための哲学的な戦い\n他者のまねではない、真実の哲学的な価値を探求しようとする。模倣をもっとも嫌うので、しばしば気むずかしいが、最終的に独自の個性を確立する。"}, "牡牛座_16": {"sign": "牡牛座", "degree": 16, "symbol_ja": "年とった教師が、自分の生徒に伝統的な知識に興味をもたせることに失敗する", "explanation": "伝統的な知識の伝達には失敗するが、革新的な知識の伝達には成功する、という意味が含まれているのがこの度数。シンボルに、教師という象徴が使われているとおり、この度数の持ち主は人に教えたりする仕事の人も多い。新しい独自の体系を築き上げることに、野心を燃やす人が多いようだ。危機に直面したり、現実の生きた問題を扱うときに、伝統的な過去の知識はそのままではまるっきり使えないものだったことに気がつく。この１６度からはじまる５度は、個性の確立の出発点なので、自分の根本的な存在の原点にもどる必要がある。だから、いろいろな知識や教えを見ては、これではない、これではないと、言いつづける姿勢。禅やヨガのように「No\n!」を繰り返して、精神を純化する過程だ。創造的なエネルギーは充満しているが、まだその表現の具体的な方向は定まらない。大きな成果にむけて、模索している段階だ。この度数の持ち主は、そのことをよく自覚しておかないと、ただたんにないものねだりの、わがままな性格に終始することもある。"}, "牡牛座_17": {"sign": "牡牛座", "degree": 17, "symbol_ja": "「剣」と「たいまつ」の象徴的な戦い", "explanation": "伝統的な教師からなにも学ぶことができないことを自覚した魂は、彼自身の方法で戦う準備をする。霊というものは、それだけでは、個人の本当の生き方の鍵とはならない。それを知っているのは、人間が生活する上で行使する具体的な意志力や知性だ。個人に内在する霊と、生活のなかに埋もれた意志は、どちらも片方だけでは半欠けのものでしかなく、この２つが協力してはじめて霊肉二元のような象徴的な葛藤を繰り返しつつ、新しいその人の生きた価値を形成することになる。ここには終わることのない交流があり、休むことのない、自分の本当の生き方を問いつづける聖なる戦いがある。優れた教えを知ったからといって、それと自分とはまた違うということを、深く自覚。新しい価値の発見が生きた生活のなかで訪れる。非常に哲学的な人であるといえる。"}, "牡牛座_18": {"sign": "牡牛座", "degree": 18, "symbol_ja": "女性が自分の部屋の開かれた窓をとおして、古いバッグを虫干ししている", "explanation": "知覚の扉を浄化する度数。１６度、１７度の個性の確立のための戦いの、本当の敵は、自分の心のなかに潜んでいることに気がつく。無意識に育った自己の価値基準、バッグのような所有的な心を乾かし、空にしなくてはならない、という意味。これはいままでの善悪の概念とか、習慣的に身についた考え、常識などによりかかって自分が生きていることを自覚し、価値体系を一度クリアする。マインドを空にする、という暗示だ。価値観をゼロにもどすこと。やがて、内面の葛藤や戦いをつくり出す善や悪の概念そのものが消えてしまうので、しだいに新しい生き方の地平線が予感されてくる。古い考えを捨て、新しい\\\"わたし\\\"が生まれてくる前触れの、精神の浄化過程だ。"}, "牡牛座_19": {"sign": "牡牛座", "degree": 19, "symbol_ja": "大洋から新しい大陸が浮上する", "explanation": "１８度で、心が空にされ、言葉の定義とか、精神の葛藤やこだわりが消えたら、あとは精神の汚染から自由になって、新しい生命の可能性が浮かび上がる。大洋というのは、巨大な集合無意識の象徴であって、ここから新しい生き方と、それにまつわる新しいビジョンや生命力が壮大な迫力で浮かび上がってくる。本来自分が生きて踏みしめるべき大地は、非常に単純なものだったと確信してくる。これはまったく新しい境地。この度数をもった人は、人生のなかで、ものの見方を単純にしていくことで、新しい生き方の機会をもつことができる人。マインドはまったく純粋なので、偏見や常識を超えて、ものごとから真実を引き出すことができる。"}, "牡牛座_20": {"sign": "牡牛座", "degree": 20, "symbol_ja": "空を横切る翼のような雲の束", "explanation": "無意識の深みからくる生命の可能性は、超意識的なきざしの顕示によって、その方向を見定めることができる。知りたいことや、自分のいくべき方向を、いろんな日常的な暗示や兆候で読むことができる能力。カスタネダの著作に述べられている「聖霊の顕示」とでもいうべき、暗示的な、スピリチュアルな霊感がたびたび訪れる。神秘的な能力が、この度数で発達するのだ。どの方向をとったらいいのか、運命の方向を示してくれる雲。それらが正しいか、正しくないか内心で考えたり分析したりする心は、すでに１８度で空にされていて、ここでは透明で明晰な霊的な開示があるのみ。伝統にしたがうことをやめて、個人が個人らしい道を歩もうとして、信頼できる本来性を獲得したことを自然界が容認したのだ。雲や風の動きが彼に同意の合図をしている。言葉の解釈を必要としない世界に住んでいる。\nNo. 11／72区分（牡牛座２１度～２５度）「達人」\n能力を通じて、社会参加する喜び\n技術や熟練で磨いた才能で、社会的な貢献をする。実力だけが人生を真に開くことができる、という確信によって行動するので、職人的な能力を磨くことが理想的である。"}, "牡牛座_21": {"sign": "牡牛座", "degree": 21, "symbol_ja": "開かれた書物の一文を示している指", "explanation": "集合的な価値への隷属というキーワードをもっているこの度数は、ちょうど悩みが出たときに、聖書の１ページを目をつぶって指すことで解答を得ようとすることに似ている、兆候からさまざまなものを読み取る２０度の度数を、もっと組織的な方向にむける、という特徴がある。だが、解答を引き出すべき書物は、その社会がもっている伝統なので、価値の基準はつねに社会のなかにある。つまり社会のなかで、どこにどう参加するか直感的に判断する。われわれがしたがっている文明の動きを、全体的に観察し、その大河の流れのような動きにもとづいて、人の進むべき方向とかを考えることのできる指導性にもつながる能力だ。たとえば、ホメイニは、コーラン以外の書物を読まず、ボキャブラリは２００しかないと噂されている。困ったときには、コーランから解答を得る指導者とはまさにこの度数の意味だ。この度数は、ときには関連妄想的な要素ももっているといわれている。"}, "牡牛座_22": {"sign": "牡牛座", "degree": 22, "symbol_ja": "荒れて波立つ水の上を飛ぶ白い鳩", "explanation": "２１度で書物から啓示を得ようとした人物は、こんどは、自然界からの鳩の到来によって、メッセージを受け取る。これは、ある文化の規律にしたがって生きている人は、やがて危機のときに、文化の奥深いところに備わった高度な意識から、導きの印の鳩が飛んで、彼にいろいろなメッセージを伝えてくるようになる、そのことで救われるという意味がある。伝統や文化に忠実なものへの報酬。具体的な宇宙のリズムが、書物にとどまらず、生きた形ではたらきかけてくること。これは牡牛座の流れなので、自分の身体に資質として埋め込まれた直感のようなはたらきが、危機のときにつねに明確な指示をあらわしてくるという意味をもっていて、もちろんこの度数の持ち主が、多くの人に対して導きの白い鳩として行動することも忘れてはならない。"}, "牡牛座_23": {"sign": "牡牛座", "degree": 23, "symbol_ja": "高価な宝石に満ちた宝石店", "explanation": "個人の価値を証明する。宝石は、強度の熱と圧力でできあがり、また技術的に高度な装飾がほどこされている。こうした価値あるものとして行動し、意思表示をしたい人の度数だ。自分の価値観を、社会的な業績を上げることのなかで、いやおうなしに確認し、しっかりとした自信にしていく。実力勝負で、はっきりと成果を上げることに喜びをもっているし、そのことで人から評価されることに、大きな欲望をいだいている。技術とか、ステイタスとか、能力とかを評価し、その社会の一員であることに誇りをもつ。いってみれば、ここでは職人的な評価というものであるべきだ。社会的には、豊かで、明確なステイタスをもつことができるだろうし、成功するはずだ。ひけらかすに必要十分なものを確実にもっているからだ。"}, "牡牛座_24": {"sign": "牡牛座", "degree": 24, "symbol_ja": "恐ろしい顔つきで馬に乗るインディアンの戦士が、ベルトに人間の骸骨を吊している", "explanation": "集団の価値は他の集団の価値とは違う。インディアンは、自分たちが生き残るためには、侵入者を殺さねばならない。ある特定の集団での生き残りのためには、他の集団に対する残虐さ、暴力なども発揮しなくてはならない。生存のための激しい戦い。これは価値観の違う社会的な敵などと闘って、自分のしたがう社会や価値基準のなかで生存していかねばならない、ということを意味するし、ライバルを根絶やしにするための思いきった手段をとる、ということも関係する度数だ。骸骨というシンボルがあるので、ここでは生と死という厳しいイメージがあらわれている。この度数を持った人は、かなりすれすれの苛酷な状況に出会うことも多い。ある特別な分野や自分の活動の場を維持するために、最大限の力を発揮する。その意味では、決断力に満ちて有能である。"}, "牡牛座_25": {"sign": "牡牛座", "degree": 25, "symbol_ja": "広い公共の公園", "explanation": "公共の公園は、公費で建設される。市民の誰もが使うことのできるやすらぎの場だ。これら公的な施設を利用するたびに、その社会に属していてよかったと、喜びを感じる。この度数の持ち主は、誰もが共有できる社会の財産や文化的な産物に関係する。というのも牡牛座２４度で、その社会の維持のためにぎりぎりの力を使った結果、余裕のある落ち着いた環境が確保されたのだ。このなかで真にリラックスして生きることができるようになった。集団に貢献し、その結果集団から喜びがもたらされる、というよい意味でのエネルギーの交換があり、当然公共サービスなどの仕事にも関係した度数であるはずだし、博愛的な人格の持ち主だ。\nNo.\n12／72区分（牡牛座２６度～３０度）「消費」社会の文化的産物を、人はどのように消費するのか\n物質文化の豊かな開花を楽しみ、この伝統的にして、長い歴史のなかで培われた文化、芸術などを背景にして、自分の活動方向を発見しようとする。"}, "牡牛座_26": {"sign": "牡牛座", "degree": 26, "symbol_ja": "スペイン人の伊達男が、恋人にセレナーデを歌って聞かせる", "explanation": "文化の生産物や施設などを、それに所属している人が個人的な欲望の表現のためにスムーズに巧妙に利用している姿。個人的な地位を利用して、社会的なアイデンティティの達成と意義を見つけ出す。セレナーデは、その文化のなかの生産品。それを使って、伊達男が恋人を見つけたいという願望を達成している姿である。自分の内的な感情や欲望を、はっきりと外面的に表現する能力。集合的な文化の生産物を私的に利用してエンジョイする人格といえば、企業の接待費を使って遊びにいくというような巧妙さ、融通無碍な性質も示すだろう。これは社会参加が調和的に達成され、このなかで余裕をもって生きる度数だ。この度数を持つ人を、観察するかぎりでは、自己の欲望と、事業・社会的な発展を、二人三脚で進行させられる才能がある。"}, "牡牛座_27": {"sign": "牡牛座", "degree": 27, "symbol_ja": "年老いたインディアン女性が、通行人に彼女の部族の工芸品を売っている", "explanation": "老年期には、集合性というか文化遺産は、再びそれ自身の力を発揮して、そのなかにいる個人それぞれの独自性とか、個人的な性格を強調するむなしい努力を凌駕して、その腹のなかに楽々とのみ込んでしまう。２６度では個人がまだまだ元気で、文化や社会の生産品を利用していたが、こんどは２７度では、個人の個人的な衝動が、文化の伝統のなかに吸収されているありさまが見える。自分が語りたいことは、文化そのものがしゃべっている。老婆は、黙って民芸品を売るだけだ。個人が平和的に、伝統回帰しようとしている姿。これは集合魂と合体するという見方も可能。若いうちはつっぱって伝統に反抗していたのに、年寄りになってから、神社まいりとか、迷信とかに素直にしたがうようになる変化に似ている。"}, "牡牛座_28": {"sign": "牡牛座", "degree": 28, "symbol_ja": "「人生の変化」を経た女性が、新しい愛を体験する", "explanation": "社会的な行動パターンがその個人に植えつけた制約とか、また年齢的な制約とかを突破していこうとする、人間の新しいことへのチャレンジ能力を示している。この人はつねに新しいやり直しをはかろうとする。このやり直しをしたくなるときというのは、老いを感じたとき、やっている仕事が衰退しはじめたとき、社会的な義務や制約が重荷になったときなど。新しいはじまりは、より優れた本当の可能性をもっていなくてはならないが、この度数の人は、しばしば無駄な労力の浪費という行動をとり、対象を次々と変えていく可能性がある。こうした気紛れな（結局はふり出しにもどることになる）繰り返しに気をつけておかねばならない。社会的な産物をどう利用するかというテーマの流れのなかにあるので、無駄な消費という意味がしばしばあらわれてくる。"}, "牡牛座_29": {"sign": "牡牛座", "degree": 29, "symbol_ja": "テーブルを前にしてはたらく２人の靴直しの職人", "explanation": "靴は対外的な歩みの象徴だ。２８度の女性は、靴が古びたことを訴え、古い靴を捨てようとしている。だが、ここでは靴を直して、もう一度使おうとする。靴の直し方は、いろいろある。別の観点から見ると、別の直し方がある。そのような複数の可能性でものごとを見てゆき、多角的、効率的に発展していくありさまだといえよう。一見、価値がなくなったものも、よく見ると、新しい可能性がある。粗大ゴミで捨てられていたものも、別の用途から考えると、可能性に満ちた素材として目に映る！　古い素材を捨てるのでなく、つくり替えることで、新しく見直すこと。２８度では、自分は変らず、対象が変わった。ここでは、対象は変わらず、自分の姿勢が変わるのだ。工夫しながら、楽しく生きることのできる人。リサイクルなどに関係がある。"}, "牡牛座_30": {"sign": "牡牛座", "degree": 30, "symbol_ja": "古い城のテラスで行進している１匹の孔雀", "explanation": "いかに優れた人も、その人の属する文化と伝統の産物だ。個人はそうした先祖のつくった伝統を使い、その土台の上で活動する。もともと動物的だった人類に古代に贈られた知性が、孔雀の印であるといわれていて、遺伝的な資質の開花の上にその人の能力が存在しているという意味になる。これはどんなものも、ひとりで成し遂げられるものはなにもなく、すべてそれまでの文化的遺産のこやしの上に立って活動した故のものであることを強調している。遺伝によって特殊な優れた能力をもっていて、その発揮を通じて社会的な地位を獲得する人物なども暗示する。それまでの伝統の最終的な統合者、果実を手に入れる者という可能性が高い。これは家系などにもいえる。その家柄のなかでの総決算的な人物だということである。あるいは地球的魂の結実である。\nNo. 13／72区分（双子座１度～５度）「好奇心」 純粋な知性に対する関心\n個人的な好奇心や関心を追求することで、自分に新鮮な可能性が開かれることに対して、強烈な渇望感を抱いている。面白いことはなんでもしてしまうので、揺れ動く精神的な不安定さの解消が必要。"}, "双子座_1": {"sign": "双子座", "degree": 1, "symbol_ja": "ガラス底のボートが、海中の神秘を明らかにする", "explanation": "ボートの上という安全な位置にいて、人の無意識の種々の真実を、そこにのみ込まれない安全性を確保した場所で観察することができる。ガラス底というように、一部の意識は透明な観察力をもっている。だが、ガラスで隔てられたままなので、心は閉じている。このレベルでは、いろいろな情報とか、印象とか、ビジョンを語ることはできても決して同化はできない。防衛された心で、知性をはたらかせる度数になる。対人関係でも、本当の意味で相手に触れることはないだろう。さまざまな驚くべき事柄、世界の多彩さを見るにつけ、すばらしいとか、びっくりした、というその自分のリアクションに関心があり、たくさんの事柄をウォッチングすることに重点がおかれている。うわさ話も大好きだ。"}, "双子座_2": {"sign": "双子座", "degree": 2, "symbol_ja": "サンタクロースがこっそりと、暖炉の前にかけてある靴下をいっぱいにする", "explanation": "これは無垢な心をあらわしているといわれている。五角進行では、２番目は必ず１番目の対向なので、ここでは１度のボートというマインドによる閉鎖（乗り物は、いわばひとつの見方）ではなく、純粋に期待すること。あれこれと考えることを停止させて、明晰な意識をはたらかせないところで、祝福を受け取ることを意味している。意識の目をぼかす、というような意味あい。ルディアは、鋭く集中化した心は幻影を失わせるが、この２度は、ぼんやりと、そしてサンタはこっそりと行為する、という言い方で、はっきりと見ない世界で認知される霊的な影響について言及している。さまざまなことを予感するような能力だと思われる。純真さに対するあこがれがある。"}, "双子座_3": {"sign": "双子座", "degree": 3, "symbol_ja": "パリのトゥレリー庭園", "explanation": "自我の集中化と、形式主義。トゥレリー公園が古典的な秩序とシンメトリーの産物であるように、知的な自己表現において形式主義的な傾向が強くなるといわれている。双子座の２度のサンタクロースのシンボルが、ここでは、父権的な中性の王に変貌し、厳格で形式的な精神に変わる。これはある意味では２度の、真に受けやすい精神、信じやすい無垢の精神に対しての反動として、きわめて合理的で論理的な知性の表現に対して、ある種の美意識をはたらかせることを意味している。たとえばこの人の書いたものや、語った内容を考えて見ると、どのくらい忠実に気持ちを表現したかということより、表現法そのものがどのくらい凝ったものにできるか、という方向に関心がむいているように思える。たとえば、短歌や俳句など、知性の美的な表現などにも関連するはずだ。"}, "双子座_4": {"sign": "双子座", "degree": 4, "symbol_ja": "西洋ひいらぎと宿り木が、クリスマスの古い記憶を呼び覚ます", "explanation": "自分の見たり聞いたりした事柄を合理的で論理的に解釈しようとしたのが３度。ここでは再び自然な感情に訴えかけるものに対して郷愁を感じるようになり、前知性的な子供っぽい世界にもどろうという衝動が生まれることになる。形式主義的なバロック式芸術から、ロマン主義的傾向に走った西欧の芸術の歴史にも似た動きだが、３度の知的な緊張を強制的にほぐすような、差し迫った自然回帰願望となるので、どこかに無理な力がかかる。知的な発想法を強いて遠ざけ、情念的なものに依存したいという願望。保守的なものにむやみに回帰しようとする衝動である。これは厳格な知性中心の発想に対する反動からきた行動なので、再びまた別の形態へゆり戻しを起こしかねない不安定な要素をもっている。"}, "双子座_5": {"sign": "双子座", "degree": 5, "symbol_ja": "革命的な雑誌が行動を呼びかける", "explanation": "知性の発生以前の人間の創造力の源流を知りたいという欲望がこの度数の特徴だ。だが、双子座の、ひとつの方向に極端化すると、こんどはその反対に極端化する性質が、この度数では激しくあらわれる。慣習とか厳格な規律に縛られている心が、形のない方向へ爆発しようとする。しかし着実で効果的な解放の手段をもたないために、衝動的な行動を取る傾向がある。たとえばドラッグによる心理的な解放なども、この度数に関係している。言葉で説明できない公式化できないものに同化して、自分のマインドの抑圧を解放しようとするが、衝動的な手段である故に、力を失うと、また抑圧状況にもどる。今まであった既存の世界の否定、そして体制的なものの否定。反抗精神などが強く見られる。\nNo. 14／72区分（双子座６度～１０度）「発掘」 集合的な意識に対する関心\n個人的な探求心は、深い集合的な意識のなかの鉱脈探しに向けられる。というのも、これは大きなパワーの源流であり、そこから強いインパクトが得られるからである。集合性を超越する個を獲得したい衝動。"}, "双子座_6": {"sign": "双子座", "degree": 6, "symbol_ja": "油田をドリルで掘る労働者", "explanation": "知識の新しい領域を開発することで、人々から賞賛されたいという野望。油田というイメージは、力と富に対する一攫千金衝動を意味するが、同時に石油は生きた素材の腐敗した姿だということをルディアは述べている。たとえば、古代のかつて栄えた精神や、伝統的な知恵を、集合無意識の深い鉱脈から発掘し、多くの人々に知的な衝撃と影響を与えたいという野望を暗示している。知識的な意味での一攫千金の願望だが、その影響力に汚染される傾向が強く、ある信仰に染まってしまったり、部分的な価値を過度に強調しすぎたりするという、個人の素直な、ごく普通人としての判断力が失われる危険に注意しなくてはならない。"}, "双子座_7": {"sign": "双子座", "degree": 7, "symbol_ja": "堂々とした威厳のある樹の陰の下にある、桶と縄を伴った井戸", "explanation": "自然界の豊かな生命力と協調して生きたいという、自然界の力に対する基本的な信頼感。木陰は休息を意味するし、井戸からは生命を生き生きさせる水が手に入る。６度の野望に満ちた油田発掘とは対象的に、この度数の持ち主は、優れた深い知恵を、現在の人々の暮らしの改善に役立てたいという気持ちをあらわしている。孤独な野望やエゴは、ここで消え去り、多くの人を生かすことのできる優れた情報を人々に提供することに、関心がむかう。６度も、７度も、集合的な無意識などに対する関心としてはたらくことが多いようだ。これは心理学者ユングが述べた、人類の古い時代からつづく人類単位の無意識世界を暗示している。油田の鉱脈や、井戸の水脈は、こうした集合無意識を示している。古い文明などの研究者として、非常に優れた才能を与える度数だ。"}, "双子座_8": {"sign": "双子座", "degree": 8, "symbol_ja": "奮起したストライキをする人たちが工場を取り囲む", "explanation": "ストライキをする労働者は、油田を発掘することで手に入れた富と権力によって、特権的な生活をしている人々に対する反抗心をあらわにしている。すべての人に富を公平に分配すべきだと考えているのだ。石油経済に支えられた２０世紀はとくに、産業の急激な変化と、もてるもの対もてないもののアンバランスが激化していった時代でもあるが、こうしたアンバランス構造は、人々に数々の不安の種をもたらした。地球の生体系に闘争と崩壊的な状況をもたらしたのだ。この度数の持ち主は、まさにこうした近代的な知性のストレスをもった人が多い。この影響はおもに対人関係などでの不信、不調和などにあらわれやすく、ヒステリー的に怒りの爆発する人を何人か見かけた。"}, "双子座_9": {"sign": "双子座", "degree": 9, "symbol_ja": "矢の入った矢筒", "explanation": "征服者としての象徴。的を突き刺す弓矢のような意志。この度数の持ち主は、すさまじい集中力をもっていて、目標を決めると一点突破する。禅の弓道に関係すると述べられることも多い。障害物を越えて、そのむこうに突き抜ける力があるが、知性の発達が極限までつき進むと、障害物を突破したときに、同時に自分の自我や心という台座が壊れるのを観察することができる。なぜなら標的をつくっているのは自分の精神であり、突破したときに、自身の精神そのものを自分で打破ったからである。壊れた壁のむこうになにが見えるか？　征服者は、自然界の征服者なのか、それともより高度な、自我の征服者かもしれない。本能の征服者かもしれない。知的な集中力を極限まで推し進めたあらわれ。思いつめすぎて、健康を壊すというあらわれ方をする人もいるので、気をつけなくてはならないが、求道的な方向では、優れた才能をあらわすことは否定できない。"}, "双子座_10": {"sign": "双子座", "degree": 10, "symbol_ja": "飛行機が急降下する", "explanation": "自然のもっとも基本的な法則である重力に、知的で意識的な能力をもって挑戦する。重力とは、フランス人女性哲学者シモーヌ・ヴェイユが重力と恩寵を対極にあるものと考えたように、人が縛られている習慣とか、常識とかを象徴したり、また、自然なものごとの帰結や、いかにもありそうな展開に落ち着くなどという事柄を暗示している。この度数では、こうした重力に対する自由を獲得し、飛行機がそれ自身独立して、上昇したり、下降したり、またアクロバット的な飛行ができるように、個人の知性を独立的に純粋に強化することに関係している。いかなるものにも決して影響を受けない自我を確立すること。習慣的な弱い心には決して迎合しないこと。勝つか負けるか極端なもので、中間はないと極端に考える傾向の強い人だ。心と物質の戦い。あるいは本能と人の戦い。あるいは運命に対する戦い。\nNo. 15／72区分（双子座１１度～１５度）「冒険」未知体験に飛び込む知性\n環境のなかで積極的な行動や冒険をすることで、新しい関係が生じ、新しい価値が生まれることを発見する。古い習慣に流されない生き方をすると大きな力が手に入ることを、自らの行為で証明してみせる。"}, "双子座_11": {"sign": "双子座", "degree": 11, "symbol_ja": "体験の新しい機会を開拓民に提供する、新しく開かれた大地", "explanation": "自分たちを無意識に支配していた習慣とか、弱い心を克服し、自由な自我を形成することのできた人は、純粋な試みとして、自分にはまだ未知の体験領域が多く存在していることに関心がむくようになる。新しい人生を自分の意志で切り開きたいという強い願望を暗示するのが、この度数だ。前進への一歩一歩が、彼に新しい状況を表すし、まるで新天地を歩いているかのような新鮮な感情に満たされる。この度数の持ち主は、自分が知らないこと、いまだ体験したことがないものへつねに関心をむけていく傾向がある。なにか新しい仕事をするときに、なぜその仕事をするのかと聞かれたら「これはまだ自分が知らない分野だからだ」とこたえるような人だ。もちろん知識欲はきわめて旺盛だといえる。自然に、仕事も趣味も遍歴が多くなるだろう。"}, "双子座_12": {"sign": "双子座", "degree": 12, "symbol_ja": "黒人の女の子が、町で自分の自立のために戦う", "explanation": "新しい体験を求めて、自分の知らない世界に飛び込んだときに、自分の心が骨の髄まで古い習慣に支配されていることに気がつく。この自分の心のなかに巣くう、古い慣習と戦うことがテーマの度数だ。環境は新しいのに、自分はあいかわらず、昔ながらの考えをしていたことに驚く。内面にある葛藤がいろいろな形をとって表面にあらわれてくる。どんな活動の領域に飛び込んでも、自分は変わっていないので、何度も何度も古い眠った自分の心に気がつかされる。過去からの自由を求めて闘わなくてはならない。この度数の持ち主は、自分の内面にある古い心の無意識の投影として、たとえばどこかに引っ越したときに、その土地の人々の保守的な態度に出会ったりする体験が多くなる。象徴どおり、町や村のなかで、住民エゴとたたかい、孤軍奮闘しなくてはならないケース。"}, "双子座_13": {"sign": "双子座", "degree": 13, "symbol_ja": "有名なピアニストが演奏会を催す", "explanation": "個人的な道の探求のなかで、広く高い霊感と接点をもった人は、人々に対して、新しくて力強い積極的な精神の代表者としてはたらき、人々の情念を活発で力に満ちたものに変える改革者として生きることになる。平凡で無気力な人々に対して、積極的に一歩前進しようという挑戦の感情をもう一度呼び起こすことができるのだ。まず率先して、自分が優れた仕事をする。それを人に見せつけることで、人々にやる気をおこさせる。この度数は、ヴィルティオーゾの度数といわれ、事実、演奏家であるケースも多いのだが、勇気のある行動を示す人が多い。新しい領域へと入ってゆき、恐怖に打ち勝つこと。新しい体験に出会ったときに無意識にはたらく恐怖心を、この代理人を通じて取り除く。だから、この度数を持つ人は、他者の積極的な感情をあおるために、名声も必要とするだろう。"}, "双子座_14": {"sign": "双子座", "degree": 14, "symbol_ja": "物理的な空間や社会的な差異に橋を架けるため、２人の男がテレパシーで通信している", "explanation": "新しい開拓地では人間同士がコミュニケーションするために、新しい技術を開拓しなくてはならない。異なる言葉や、異なる習慣をもった人々が集まるのが、新天地だ。ここではすべての人に共通のコミュニケーション手段が確立されねばならない。心から心への通信がよりダイレクトな形で行われる意識の領域に入り込む努力をしなければならない。人間性というひとつの心で意思疎通できるように、意思疎通の普遍的な手段を探究しようとする。象徴どおり、テレパシー能力をもった人や、そこまでではなくとも、非常に勘の鋭い、さっしのいい人が多いようだ。また通信電話関係、ネットワーキング事業などにも関係する度数だ。伝達本能が非常に発達した人。外国語の修得能力の高さとしてあらわれる人もいる。"}, "双子座_15": {"sign": "双子座", "degree": 15, "symbol_ja": "２人のオランダ人の子供が自分たちの知識に興奮しながら、お互いに話し合っている", "explanation": "テレパシー能力などが実在するのかどうか、通常の科学や、常識的な知識の範囲で、テストされ、確認されねばならない。オランダ人の子供というシンボルは、きびきびした感じや解放的な議論というイメージで把握される象徴らしい。彼らは子供で、新しい体験は、まだ新鮮で確定的になってないありさまを暗示。体験した未知の現象について、活発にチェックされ、その有効性を検証しようとする姿勢。ルディアは、古代部族の文化では、人の「偉大なる夢」が有効なものとして許容され実行されるのには、他の部族の人間が同じ種類の夢を見たときにのみ、そうできるという条件があったと述べている。客観性を確認するために、議論したり、テストしたりする行為を暗示している。検査する、議論する、考証する、比較する、などに関係する度数だ。話し好きであることはいうまでもない。\nNo. 16／72区分（双子座１６度～２０度）「扇動」 知性の社会化\n個人的な思想を、社会のなかで強く主張することで、個人の思想はいずれは普遍的な価値に変わる。ここでは「慣れる」ことの価値に気づく。違和感のあるものでも慣れてしまうと、なんでも当り前のものであるかのように見える。"}, "双子座_16": {"sign": "双子座", "degree": 16, "symbol_ja": "自分の主張を情感的かつ劇的にスピーチする女性の活動家", "explanation": "知識や思想あるいは自分の信条などが真実であると確信できる条件は、他の多くの人が同じような考えをもっているということを確認する必要性を感じる。このためにこの度数の人は、多くの人に自分の信条をアピールする。扇動したり、大衆にはたらきかける能力を意味しているが、この場合、人々の情念や情熱を刺激する劇的なはたらきかけ方を特徴とする。古い概念に支配されている人、新しい考えに抵抗する人々を、感情的に巻き込んで、\\\"\n改宗\\\"させることに情熱を傾ける。信じていることは、なんであれ、人に公表せざるをえない性質だ。シンボルイメージから見ると、広報関係の仕事や、やはりジャーナリストとしての適性が考えられる。あまり冷静ではない資質かもしれない。"}, "双子座_17": {"sign": "双子座", "degree": 17, "symbol_ja": "たくましい若者の頭が、成熟した思考者のそれに変わる", "explanation": "前の度数と対立的な意味をもったこの度数では、知識を消化したり、学習したりするときの姿勢はとても内面的で、情念を刺激せず、静かに待つことで、心が成長していくというタイプを暗示している。ゆっくりと変化していく知的な成長。なにかを知っても、即座にそれを議論の的にしない。しばらく放置しておいて、自然に正しい判断ができるまで待つことになる。情感から心へ、本能から思考への知的な変容のプロセスに関連するといわれているが、この度数の持ち主を観察している限り、身につけた知識や考えが、気がつかないうちに浸透して、人柄まで変わってしまうという傾向があるようだ。同時にさまざまなことに影響を受けやすい傾向も否定できない。"}, "双子座_18": {"sign": "双子座", "degree": 18, "symbol_ja": "２人の中国人が、アメリカの都市で自国語を話す", "explanation": "自分がやりたい特別な関心事に意識を集中するために、自分がおかれている環境から孤立したような姿勢をとること。自分が環境の一部であるかのように振舞うことを拒否して、見知ったところでも（たとえば家族のなかでも）知らない人のように振舞うことで、自分の内面的で積極的な能力を確保しようという傾向がある。こうした生き方のなかで、特別な能力が芽生える。そして、共通した生き方の人と、真にコミュニケーションできる可能性。サビアンのシンボルに登場する中国人は、チャネラーの潜入観念によって、古代の知恵をもった深い知識の象徴としてあらわれているので、深い精神的な問題について考えている人をこの度数も暗示する。心を遠くにあるものに飛ばす。そこにいても、いないような態度を確立することで、精神の独立性を育てようとしている。"}, "双子座_19": {"sign": "双子座", "degree": 19, "symbol_ja": "巨大な古代の書物が、伝統的な知恵を開示する", "explanation": "人類全体に通底する深い知識や知恵について探求し理解すること。この度数の持ち主は秘教的な知識について、強い関心をもっており、人類の根っこに存在する「種の知識」に到達するという意味がある。種の知識とは書物ではない。時代とともに変化して、さまざまな文化を生み出すもとになる、いつの時代もかわらぬ根源の知恵のことだ。この度数を持つ人は、そうした惑星のすべての人類に共有される本当の知識を求めている。たとえば文化人類学のように、地域の差異にかかわらず、共通の知恵や神話などが世界中に散らばっていることを研究する、というような課題もこの度数の人のテーマだ。"}, "双子座_20": {"sign": "双子座", "degree": 20, "symbol_ja": "さまざまな地域の生産物である食べ物の豊富さを見せてくれる、現代的なカフェテリア", "explanation": "知識や情報がくまなく流通すると、これらの情報に備わった本来性の差異が不明となり、知的な混乱や、価値の消耗、消化不良、飽食などになる可能性がある。たとえば地域的に特有なもの、時期とか、農作物にふさわしい条件をすべて無視して、交換・流通していった結果、すべてが薄っぺらなものとなり、果物や野菜を満載したスーパーマーケットのような状態と化した知識などを意味している。ここでは無駄や膨大な消耗、消費ということが指摘されていて、よくも悪くも、さまざまな事柄を多彩に吸収して堪能してしまうと、ひとつひとつの知識の価値が喪失されがちになり感動する心を失ってしまう。よい意味で、知識の平均化。悪くは、無駄を意味している。ジャーナリズムやマスコミのもつメリットとデメリット。\nNo. 17／72区分（双子座２１度～２５度）「秩序」\n知的エントロピーをどう越えるか\n発達しすぎた個人の個人的な行為は、やがては人間の自然な情感や本能を破壊する。もう一度、個人の価値を再検討して、いったいなにが大切なのか整理する必要に駆られる。"}, "双子座_21": {"sign": "双子座", "degree": 21, "symbol_ja": "混乱する労働者のデモ", "explanation": "都市生活者の混乱という意味の含まれた象徴で、メディアの進化によって、情報の流通が行き渡り、さまざまな価値や概念が混乱してきた現代の都市では、人は自然な生命の秩序を失ってしまう。そのなかでは人の欲望や衝動は、正しい表現方法を見つけ出すことが困難となり、神経的なストレスが増加するありさまを象徴している。本当に努力した人だけが獲得できるようなものも、たいした努力もなしにすべて手に入れたいとする衝動、偽物の豊かさやいつわりの平等性。また成長という概念に振りまわされて、ただやみくもに行動すること。宣伝やスローガンで形つくられた欲望にしたがうことなどが特徴だ。押さえつけられ、抑圧された本能が、その必要に応じて感情的爆発をする。情報パニック。なにがほんとうで、なにが重要なのかが曖昧となり、感情がいらいらしてくる状況だといえる。"}, "双子座_22": {"sign": "双子座", "degree": 22, "symbol_ja": "刈り取りの祭り（収穫祭）で踊るカップル", "explanation": "ストレスの多い都市生活から抜け出して、農村ののどかな自然な暮らしにむかっていくこと。自然界や季節の移り変わりの素朴な原理を再評価し、心や身体が、生命エネルギーをもう一度活性化させて、リズミカルで健康な状態を取りもどすことを意味する。これは２１度の神経症的な状態を緩和するために、田舎にひきこもって、もう一度心身の健康を考え直すという意味がある。事実進行法でこの度数に惑星がきた人が、仕事をやめて、のどかな環境に移動する、というケースも多数見られた。また混乱した知識を整理するために、自然の法則をもう一度見つめ直すということもある。たとえば多くの仮説で、理解できなくなった事柄を、動物の行動特性にヒントを得て、整理しようとする、という方法なども、この度数の範疇に入るはずだ。"}, "双子座_23": {"sign": "双子座", "degree": 23, "symbol_ja": "木の高いところの巣にいる３羽の雛鳥", "explanation": "情報の混乱した世界では、価値体系の再構築をはじめなくてはならない。この度数では、より優れたものとより劣るもの、重要なことと、さほど重要でないことなどを、整理・分類するはたらきを示している。ものごとの価値基準を階層化すれば、頭脳や感情の混乱は防ぐことができる。雛鳥は、地面においてはならないし、保護されねばならない生命の新しい可能性だ。双子座２０、２１度では、あらゆるものの価値が混乱し、人の可能性は封じられてしまった。だから、ここでは、もう一度高いもの、低いものなど、価値の縦構造を整理することになる。創造的な意図で行われる思想の統合化という意味の含まれたこの度数は、哲学的な体系化などに関連していて、事実そのような仕事をしている人に見られる。３羽の３という数字は、たいてい創造的な原理に関係した数だ。"}, "双子座_24": {"sign": "双子座", "degree": 24, "symbol_ja": "村の凍った池でスケートをする子供たち", "explanation": "２３度で、ものごとのよい意味での優劣、分類法などを学んだ人は、制限とか、否定的な条件とかを巧みに利用して、自分の知的な発達をさらに、限界以上に拡大することが可能となる。最も拘束された状況（氷）を逆用することで、スケートという楽しみのある自由が獲得されている。人の意識をヒエラルキー的に分類すると、ある側面は機械的にはたらくように原理的に一括されてしまい、こうした不随的なはたらきには気を使う必要はなくなる。そこで、意識をより特別の関心のあるテーマに集中化できる条件が手に入る。自然条件や自分のおかれた条件を巧妙に利用する知性の能力。否定的な材料をうまく組み合わせて、自分の意志を実現する特技。仕事を自動化できる部分は自動化し、労力の無駄を避ける巧妙な知能である。"}, "双子座_25": {"sign": "双子座", "degree": 25, "symbol_ja": "大きなパームツリーを剪定する庭師", "explanation": "人間の知性は、自分の感情ストレスとか弱点を突かれる事態を巧妙に避けてとおりながら可能性の枝葉を伸ばす。結果的にさまざまな人格のステレオタイプがつくり出される。われわれの階層化された意識（２３度）は、ある鋳型にもとづいたオートマティックな進展しかしなくなり、やがては人間性の硬直化と運命の停滞に出会う。こうした人間個人の無意識なはたらきをもう一度反省し、知性の偏りや人格のアンバランスを慎重に矯正しようとする姿勢が、この度数だ。また、理想的に考案された人格像のとおりに人を教育しようとする姿勢もこの度数の特徴で、まだ人間性も人格も形が定まらない子供をある型どおりに教育することなど。人の成長は、ある基本的なコースをつくっておいても、可能性が拡大する都度、あらたに管理される必要がある、という事実から、しばしば感化院や再教育施設などにも関係している度数だ。整体治療師にも、この度数が見られた。\nNo. 18／72区分（双子座２６度～３０度）「本質」知性と存在の本質化\n個人の能力を本質化して、どんな環境や状況のなかでも、個人の力を再生可能にする。このためには、しばしば孤立無援の状況に置かれなくてはならない。"}, "双子座_26": {"sign": "双子座", "degree": 26, "symbol_ja": "冬空をバックにした霜に覆われた木", "explanation": "原点的な自己の存在のあり方をつきつめて探求するために、枝葉抹消して考えていくような姿勢。世俗的な価値の拒否という禁欲的な姿勢も含めて、本質化にむかう厳しい意志を示している度数だ。ルディアは自然界の周囲はある程度この試みを助けてくれる、と述べているが、運命が衰運になったときや、状況が逆境になったときに、われわれは自分の原点を明確に感じるような裸の状況に遭遇する。いろいろな可能性が封じられ、寒々しい状況のことだ。でも、この度数の人はこの状況に自分を見つめる大きな機会を得ることだろう。この人は発展的な事柄、円満な繁栄を好まない。本質をつねに求めて、枝葉を増やすことを望まない。孤独な状況も、好都合にはたらくはずだ。"}, "双子座_27": {"sign": "双子座", "degree": 27, "symbol_ja": "彼女の部族がキャンプしている森から出現する流浪の民", "explanation": "大地に根づいた存在としての生き方を捨て、緊張した人間関係と複雑な文化を内包した都市などの領域へと移動する、意識的な試みへの決意。新しい意識状態を求めて、故郷を捨てる。自分が生まれ育った環境やなれ親しんだ場所は、自分の真の可能性を開くには、本質的ではない、むしろ邪魔な要素となってしまった。生き方を変えるための過渡期をあらわしている度数。環境にはまったく依存しない生き方を求めて、自分の可能性をより複雑な世界にかけてみる。いろいろとカルチャーショックは受けやすいが、未来に対する希望に燃えているので、障害は気にしないだろう。流浪の民という象徴から推理できることは、漂流するように環境を変えていくこと。"}, "双子座_28": {"sign": "双子座", "degree": 28, "symbol_ja": "重荷を背負った個人に、破産を通じて社会が再出発の機会を与える", "explanation": "耐えきれない圧力から解放されて、自由な気分で新しい仕事を開始する。シンボルの破産という言葉は、社会的に歯車として組み込まれた、自分の社会的位置づけを一度ご破算にして、再出発の機会を手に入れるということ。事実上の経済的破綻、破産はごくわずかな例しかなく、また道義的な失敗も意味していない。むしろ、２７度で故郷をおき去りにする、という意味と似て、ここでは社会関係のなかでの重荷をおき去りして、再出発することだ。いままでのことをすべて忘れて新しく生き直すこと。破産制度は、社会制度がつくり出した、再出発の機会だといわれている。進行で、この度数に惑星がきた人は、いままでの過去の暮らしを清算して再出発を考えたほうがいいという状況にきているケースが多かった。めったにない機会だともいえるので、利用したほうがよい。"}, "双子座_29": {"sign": "双子座", "degree": 29, "symbol_ja": "春の訪れを告げる最初のモッキンバード", "explanation": "モノ真似鳥といわれるモッキンバードは、聞いた音を真似することができる。これは集合的な感情をキャッチして、なんらかの形あるものに表現してゆき、それを流行歌のように、多くの人に歌わせる。社会や環境の流れに敏感なアンテナをもっていて、集合的なもののなかに潜在する衝動、時流にのった欲求を取り出して、形にしていく才能だ。それによって多くの人の心をつかむことができる能力と考えられる。共感、共鳴の能力。芸能的才能に関係するのは、いうまでもない。社会状況に対して敏感に調和的に生きること。その時代のもっともトレンディな人の願望を真似して、手際よく演じてみせる人が多い。あるいはまた流行の仕掛け人的な要素が強い。"}, "双子座_30": {"sign": "双子座", "degree": 30, "symbol_ja": "海辺に集まったたくさんの群衆の前の、水着を着た美人の行列", "explanation": "地位や名声に関係した度数といわれる３０度は、社会が要求する基準、集合的にみんなが望んでいるものを具体的に表現することで賞賛される人柄を示す。社会的欲求は、自然な人間の本性から出ているとは限らない。毎年流行は変わり、流行の基準に完全に沿った形で自己表現した人が登場し、人々の注目を浴びる。したがって、３０度は、その前の双子座２９度が演出し形にした流行の流れのなかで、主にそれを演じる人をあらわしていると思われる。見せつけるに足る能力をもった人を暗示しているが、力や才能を誇示する気持ちや、また社会的な期待にこたえるためだけに努力する結果、一時的な成功しか得られないケースも多い。\nNo. 19／72区分（蟹座１度～５度）「復活」 情感の再生。新しい地図\n個人の能力を放棄して、共感力を発達させることで、人生の新しい未開拓の領域に乗り出す。このために一度個人のエゴが失われる体験をする。個の敗北は、ここでは新しい勝利を導く。"}, "蟹座_1": {"sign": "蟹座", "degree": 1, "symbol_ja": "船で船乗りが古い旗を降ろし、新しい旗を掲げる", "explanation": "牡羊座、蟹座、天秤座、山羊座のそれぞれはじめの部分は、大きなターニングポイントだ。牡羊座、牡牛座、双子座という個人性を育成する経験をたどってきた人は、この蟹座のはじまりで人生観が大逆転することを発見する。陽のサイクルから陰のサイクルへ入り、個人の意思よりも、集合的公共的な価値のほうが大切になり、一度自分の主張を引っ込めて、伝統や、社会、国家の価値観にしたがうことになるのだ。個人の能力を超えた役割が彼に課されるかもしれない。この度数では、後もどりのきかない変更、徹底した決断が起こり、能力は最高潮に高まり、このなかで彼は新しい旗揚げをする。自分がしたがうものを変更する、という大きな変化だ。この度数では、過去の記憶（転生の）が蘇生するといわれているし、情感的な面で自分が新しく生まれかわったと自覚することが多い。この度数の持ち主は、過去の伝統を新しく再生させる代表者となるだろう。"}, "蟹座_2": {"sign": "蟹座", "degree": 2, "symbol_ja": "魔法の絨毯に乗った男が、大地の巨大な区域を飛び回る", "explanation": "より高いレベルのものの見方を獲得して、自分の意識を拡大し、いままで見えなかった風景を観察する。ものごとの全体を観察するには、知性が新しい地平線を探索するよりも、むしろ、既存のある種の安定したものの見方を受け入れることで、人はより真実で広大な意識を獲得する、とルディアは指摘している。この場合、蟹座のはじまりは、個人の知性のオリジナルな視野ではなく、ある種の集合的な観点を受け入れる（陰の力へと交換する）ことを暗示するので、そのなかで、個人は個人の知性の探索のあがきをやめ、むしろ安定したものの見方に入るようになる。２次元的な拡がりでの不確定な探索をあきらめることによって、意識の３次元のなかで高まりを獲得することを理解する。未来予測に関する確かな能力がある度数の人だ。伝統的な、多くの人が使っているものの見方を通じて、ものごとの全体を眺望できる能力。"}, "蟹座_3": {"sign": "蟹座", "degree": 3, "symbol_ja": "シャギーディア（毛深い鹿）を連れている、毛布に身を包んだ男", "explanation": "新しい決断と、新しい考え方を獲得した個人は、この新しい生き方のなかで、自分が困難な状況に立たされていることを感じる。しかしこれは深層の心の拡大をテストされている度数で、霊的な方向へ心を移すために、ひとつの孤立が課せられているとみなすべき状況。つまり生きていく活力を、自分自身の奥に潜んだ源流から引き出すために、彼は孤立して寒々しい北の果てにつれていかれるのである。一見、予感された変化がなにひとつ起こらない事態のなかで、忍耐力と意志のテストがなされている。いらだって、投げ出してはならない。この度数を持っている人を観察するかぎりでは、やはりなにかひとつのことをしようにも、なかなか仲間が見つからないとか、ひとりで努力しなくてはならない状況に立たされやすいようだ。"}, "蟹座_4": {"sign": "蟹座", "degree": 4, "symbol_ja": "ネズミと議論しているネコ", "explanation": "力のあるネコが自分よりははるかに弱者であるネズミに言い訳する姿は、自身のなかに存在する古い気質が、新しい事態に対して葛藤しているありさまを暗示する。いまひとつ、自分の状況が把握できない。いままでの常識だとネコはネズミを食うことさえできた。だが、なにか事態が変化したことを予感するために、強気に出ることができない。この度数は、とても聡明な精神を示していることもあり、通常の力関係がなりたたない場所で、純粋な知性がはたらく状況でもある。いままで信じていた古い考え方がしだいに力を失い、それについて検討しているうちに、周囲との人間関係のなかで、新しいあり方が浮上してくる。いままで正当化されていた事柄が正当化されなくなり、他の人の態度が違ってくるかもしれない。変化のほうが早くきたのだ。個人の精神は、それを後から気がつく。この度数の持ち主は、人と会話するときに、とても柔らかく優しい姿勢を維持できるのが特徴。相談員としてはよい度数だ。"}, "蟹座_5": {"sign": "蟹座", "degree": 5, "symbol_ja": "踏み切りで、列車にぶつかった車", "explanation": "列車は集合的な乗り物、車は個人の意思で走る乗り物。個人の行為を積極的に追及するさいに、不注意なことに、この集合的な社会の意思と激突する可能性を暗示している。車は破壊されるが、運転者は生き残るといわれていて、これは自分のエゴのあり方を変更せざるを得ないという意味で、カルマの再調整の度数といわれている。集団社会の規律にあわせて、そのなかで共存できる自分の生き方を真剣に考えなおさなくてはならないのだ。これは蟹座の４度で予感されていたことが、現実に壁として激突してくることを暗示。あなたのなかで、一度折れなくてはならないものがあるのだ。この度数の持ち主を見ていると、わざわざこんなことしなくてもいいのにというときに、人とぶつかりやすい言動をとる人が多い。人生のなかで何度も挫折があるが、その都度生き方が軌道修正される。\nNo. 20／72区分（蟹座６度～１０度）「犠牲」 新しい生存のための犠牲と構築\nまだ未発達の自分の愛情や共感を育てるために、新規の巣作りをする。人に自分の気持ちを理解してもらうことの困難と戦い、信念を明確にする。"}, "蟹座_6": {"sign": "蟹座", "degree": 6, "symbol_ja": "猟鳥が自分たちの巣を羽で飾っている", "explanation": "本能的に、自己を新しい生命の形態にささげる。５度で破壊された個人の意志は、蟹座のはじまりから用意された新しい生活形態にあわせ、新しくまた組み立てられる。再建の度数。人生の新しい波がはじまり、とても具体的な形でその準備をする。新しい生活スタイルや、文化の形の構築にささげられる開拓的な努力。動物レベルが人間レベルのために、生命を生み出すなど、異なったレベルのあいだでの深い無意識の協力関係。つまり本能的に心身のすべての要素が、新しい動きにあわせた創造をはじめるということだ。実際にこの度数を持っている人を見ると、このシンボルのイメージどおりに、インテリアや家具、具体的な生活用品などに縁が深いようで、住居に関連した仕事につくのが理想だと思われる。"}, "蟹座_7": {"sign": "蟹座", "degree": 7, "symbol_ja": "２つの自然霊が月光の下で踊る", "explanation": "この世界には不可視の存在が多数あるといわれている。この目に見えない世界に関心がむかう。あらゆるものの背後で、神秘的な力がはたらいていることを実感的に理解し、そうした存在たちと共に生きようとする。蟹座の守護星は、月だが、この度数はとくに月の影響に関係した不可思議な原理を知る度数だ。夢と、日常の現実感覚の違いなどにも詳しくなるだろう。想像力が大変に豊かになる。６度からは創造的な構築にささげられる犠牲をあらわすので、ここでも自分の新しい心の創造のために、物質的な身体を持たず、心のなかにだけ存在している。神秘学の専門用語でいう「アストラル界」の体験を拡大する度数だ。これがその人の感情や情感を大きく変えてしまうことになる。月の光になじんでみよう。"}, "蟹座_8": {"sign": "蟹座", "degree": 8, "symbol_ja": "ウサギの群れが、人間の服を着て行進する", "explanation": "生命は、あらゆる分野のものが、成長するための刺激として、より優れたものを真似る傾向があり、これは成長する過程では、はじめにどうしても模倣するべき、より優れた「参考にする人」が必要であることを指摘する。真似ることで、意識の拡大をしようとする行為がここにある。知的な模倣ということよりは、知識に対する探究以前の、（つまりウサギの世界の）模倣的な動きである。ウサギは月の世界の生きものだといわれているし、月あるいは蟹座には、イメージを複写するというはたらきがあることが知られている。とはいえ、牡羊座の２度のようなコメディアン的な模倣ではなく、本能的に学習と成長のためになにかを真似るという行動であらわれやすい。物真似は、さらに射手座２１度にも見られるが、ここでの違いは、具体的に存在する誰かの物真似が多いということだ。"}, "蟹座_9": {"sign": "蟹座", "degree": 9, "symbol_ja": "小さな裸の女の子が、魚を捕ろうとして、池の前でかがみ込む", "explanation": "つかみどころのない生命に対して、理解しようと、少女のように内気に、生命に歩み寄ること。ウサギは知識を探究せず、まず模倣する。こんどは、少女は理解しようと、相手に手を伸ばしはじめる。少女はまだ社会的な自意識とか大人の知識がなく、彼女が手を伸ばすとしたら、まさに純粋な関心による素直な行動だ。神秘的に見えるもの、素早く動くものに対する好奇心を満たそうとしている。なかなか意識的にはつかまえることのできない、生命の意味の最初の理解に到達しようと一生懸命な姿。この度数では、情操の基本的な要素が発達する。人に対する見方も素直になる。自我の再構築の過程のなかで、心が純粋な形で生き生きと再建される。"}, "蟹座_10": {"sign": "蟹座", "degree": 10, "symbol_ja": "最初のカッティング過程の大きなダイヤモンド", "explanation": "９度の池の水は、カッティングされていないダイヤモンドに象徴を変える。完全さへむけて、訓練をはじめる。つかみどころのない生命の実感を、より明確に把握できる知識的で技術的な産物につくり替えていこうとする努力なので、ここでは表現力の訓練という項目が重視されていると思う。知識や理解は、ひとつの固さを獲得し、また他の人に理解でき観賞できるものへと変わっていく。自分の主観的な印象や考えをはっきりと人に理解できるものにつくり替えねばならない。原石にとって痛みを伴った処理の過程。しかしできあがった宝石は、貴重な産物で、苦労に見合った成果だといえる。いまだ体験したことのない新しい技術を身につけるために、苦労している人の姿。技術者、職人、創作する人などにも関係する度数だし、もちろん象徴どおりに、彫金、宝飾関係も縁が深い。\nNo. 21／72区分（蟹座１１度～１５度）「真理」究極の価値に向かう\n自分の心の底にある価値観を見いだすために、どんどん深い意識に入り込んでいく。周りに振り回されないで、物事を純粋に考えるための強い意思を築く。"}, "蟹座_11": {"sign": "蟹座", "degree": 11, "symbol_ja": "道化が有名人を風刺する", "explanation": "無意識のうちに条件づけられた心を、下剤的に笑い飛ばすことで、そこから自由になろうとすること。魅力や偏見に支配されている心を自由に解放する。客観性、心の独立性を発達させるために利用する方法は、まずここでは、無駄なものをはき出すプロセスである。笑う能力は、自分自身のつまらない習慣や振舞いを笑い飛ばすことだ。これは心の条件づけをなくすステップなので、ときには、いままで尊敬していたり敬愛していたものの価値をひきずり下ろすことで自由になろうとする行為も含まれている。皮肉、風刺、心のなかのダイナミックな力を解放したい衝動。この人が誰かを茶化しているときには、その誰かからの支配力から逃れたい気持ちでしていることに気がつくべきだ。"}, "蟹座_12": {"sign": "蟹座", "degree": 12, "symbol_ja": "中国人女性が、偉大なる教師の生まれ変わりであることを示すオーラを放つ、赤ん坊をあやしている", "explanation": "有名人や偉人を笑い飛ばし、その価値から自由になった後では、身近な平凡な、まだ隠れた可能性である赤ん坊のなかに、偉大なものの芽が存在することを認知する。だから１１度と１２度は対になって、知性の公平さを獲得するプロセスとなっている。あらゆるもののかくされた価値を発見すること。つまらないもののなかにも、大切な価値があることに気がつくこと。そうした価値を、偏見に支配されないで、素直に見通す目を養うこと。自己の隠された、いままで気がつかなかった価値が啓示されることも多い。あたりまえだと思っていたもののなかに、すばらしい可能性が隠されている。ごく稀に、この度数を持った人物は、転世の記憶を探ることで、自己開発に役立つケースがある。"}, "蟹座_13": {"sign": "蟹座", "degree": 13, "symbol_ja": "研究のために差し出された、親指のきわだった手", "explanation": "偏見や古い価値感から自由になって、本当に大切な価値を見とおす目を養った人は、この能力をより発達させるために、強い意思の発揮が要求されている。というのも、多くの人は、本当の価値を見分けることよりも、風評や言葉にふりまわされてものを考えているからだ。結果的に彼は孤立する。まだ可能性は幼児に過ぎず、誰にも証明できない価値にすぎないから、彼は強く決意して、自分の意志を主張し、自分の確信をもっと確実なものに育てねばならない。親指は、意志力や統率力をあらわす指で、目的をはっきりさせ、集中力を発揮できる強い気質。凡傭さを突破して、成長しようとする意志をあらわしている。苦しい状況でも迷わず、自己の目的を貫き通す人だ。"}, "蟹座_14": {"sign": "蟹座", "degree": 14, "symbol_ja": "老人が、広大な暗やみの空間に直面し、北東の方向を見ている", "explanation": "心理学者ユングが、オールド・ワイズマンと呼ぶ元型。老賢者は、北東にむいている。これはルディアに言わせると、霊的・宇宙的な力の源で、神秘的な意味での本当の地球の極。しばしば東洋でも、うしとらの鬼門として知られている方角だ。この度数の持ち主は、不変のリアリティに直面する老賢者のように、究極の無、あるいは仏教でいう「空」に精神を集中させている。感覚的には決して認知できない、言葉でも説明できない究極の真実の深淵を覗いている。これは本当の意味での「空虚」を知覚する度数なので、なかには極端に世俗離れした人もいる。進行でこの度数を通過するときには、日常生活のあらゆるものの印象が消えていき、自分の深層の意志だけがはっきりと見える、という体験になりやすい。"}, "蟹座_15": {"sign": "蟹座", "degree": 15, "symbol_ja": "贅沢なダイニングホールで、客たちが大宴会のあと、リラックスしている", "explanation": "シンボルは、とても物質的な姿を現している。だが、１４度の完全な無と、くっきりと対比していることに気がつくべきだ。１４度の永遠の真実への探究によって、爆発的に解放された、根底的な意志をもって、もう一度物質的な生活が組み立てられる。ここでの豊かさ、物質性は、存在の充満とか、実現ということのシンボライズした姿。「無」にもどった人は、はじめて「有」を正しく評価し、自分の生活のすみずみまで、自分の意志を浸透させ、豊かな暮らしにしようと望む。いずれにしても生きた存在であるわれわれは、「無」に長くもちこたえることができず、この世界にもどって、実社会で、自己実現をしなくてはならないのだ。これはたとえば、死を疑似体験をした人が、はじめてこの世界を楽しく、生き生きと暮らすことができるようになった、という意見とどこか似ている現象だ。\nNo. 22／72区分（蟹座１６度～２０度）「展開」 自己と世界の構造的な関係\n現象世界やいかなる物質的な事柄も、心の象徴として現われていることを知り、自分と世界の関係をもう一度、自分の内的な動機から捉えなおす。"}, "蟹座_16": {"sign": "蟹座", "degree": 16, "symbol_ja": "男がとても古い書物を頼りに、自分の前にあるマンダラを研究している", "explanation": "人格統合について深く考える。世界や自分、また自分のなかの心や頭脳など、あらゆるものは、ある基本的な法則に従っているのではないかと考え、この基本的な仕組みについて関心をもった姿をあらわしている。経験的に思ったり考えたりするのではなく、もう少し構造的にものごとを考えてみたいを思う。マンダラというのは、人間や世界の基本的な仕組みをあらわした図形で、エニアグラムもその部類だといえるが、これらは宇宙のなかにある、２つの対立した原理や、そのさまざまな多様なバリエーションを、全体的に構造性で推理できる生命の設計図だ。研究と内的な注意力、集中を示す知的な度数。自分の生き方をもう一度全体的に把握し直してみたいと思う気持ちがある。"}, "蟹座_17": {"sign": "蟹座", "degree": 17, "symbol_ja": "ひとつの胚種から多彩なレベルへと展開する潜在的な可能性があらわになる", "explanation": "１６度の静的に瞑想し集中している姿（理解による統合）と対比して、１７度では、外にむかって伸びていく植物の芽や枝のように、ダイナミックな、たえず生産される活動的な状況をあらわしている。これは連想的な展開として、人生のなかでいろいろな可能性に次々とチャレンジしていく人をあらわしている。ひとつの可能性が実現すると、それが次の可能性をつくり、またそれが・・・と発達するタイプ。イメージとして種が発芽するプロセスそのものを考えてほしい。自己実現を目指して、積極的に行動する人物。この度数の人は、行動を通じて自分がなにかを理解する。立ち止まって考えるのではなく、歩きながら、行動しながら、自分の可能性はなにかをつかむ人だ。なんでも実際的に試してみるべきときなのだ。"}, "蟹座_18": {"sign": "蟹座", "degree": 18, "symbol_ja": "雌鳥が雛の餌を探して土をほじくっている", "explanation": "漫然と暮らしている限り、発展は存在しえない。自分が目指したい人生の方向のために、発展、成長に不可欠な循環形態を実際的な生活形態として努力して確保するのがこの度数の主題だ。ある研究をしたいのなら、その情報がたえず流通する環境にいくことが大切である。なにかの仕事をしたいのなら、その仕事に関連した環境に少しでも近づくこと。その人なりの伸び方、成長の独特の方法が、ここで確立される。ちょうど輪作の場をつくり出すかのように、実生活を意欲ある姿に変えていくことが課題だ。たとえば、ほんとうは詩人になりたい。でも、儲からないので、実際にはそれとは関係のない仕事を金銭収入のためだけに行っている。こうした内面と外面生活のずれは、この度数の人の可能性を伸ばさない。マンダラを学習した男は、内面と外面が合致した暮らしに近付かなくてはならない。精神的なマンダラの具体化が、個人の実生活でまず準備されなくてはならないことを暗示している。"}, "蟹座_19": {"sign": "蟹座", "degree": 19, "symbol_ja": "結婚の儀式を執り行う司祭", "explanation": "社会を構成する人間の基本的な単位は、男女のセット。これが陰陽の両極化の具体的なあらわれだ。これに対して、第３の超個人的な意味づけを付与すると、人生は非常に意味あるものとなる。結婚式の儀式で、男女に特別な価値を与えようとするのが司祭だ。これは実人生に対して、象徴的な価値を見つけ出す能力の度数だ。生活は聖化される。司祭は、実務的な生産性をもっていないが、社会や集団のなかでの「ハレ」の場面に立ち会うことにのみ、社会参加の可能性を手に入れる。この度数の持ち主は、こうした特別な精神的な仕事を通じて、あるいは特殊な役割をもって社会参加する人だ。お祭りというハレのときにのみはたらくテキヤなども、この度数に関係しているといえる。人生のなかの重要な「転換期」を見つけ出すのがうまい。そしてそれを利用できる人。聖職者にも関連。"}, "蟹座_20": {"sign": "蟹座", "degree": 20, "symbol_ja": "ヴェニスのゴンドラ乗りが、セレナーデを歌う", "explanation": "自己と社会の象徴的な関係が結ばれる。１６度から２０度までの流れは、マンダラを瞑想する男からはじまった。これは人の内面と、社会や環境という外面との、象徴的構造的な結びつきが確立される過程をあらわしていて、マンダラの生きた応用的な展開がはじまるのだ。環境に自分を十分に投影できるし、なにを見ても、自分の一部だと感じることもあるだろう。ここで幸福感が感じられる。社会と、個人の深層の心のはたらきが調和的に関係できることを知るからだ。孤独な集中的な探究は、いまは必要がなくなった。社会にすべて投げ出しても構わないという気持ちになる。社会は、自分だと思うからだ。この度数の持ち主は適応性が高いが、ただし手前勝手な考え方をする人もいる。\nNo. 23／72区分（蟹座２１度～２５度）「共感」 社会のあり方を模索する\n他者との共感を下敷きにして、さまざまな人と関わりあい、この相互性によって、新しい社会的な価値が生まれる。"}, "蟹座_21": {"sign": "蟹座", "degree": 21, "symbol_ja": "オペラを歌うことによって、有名な歌手が自分の名人芸を証明する", "explanation": "双子座１３度のビルティオーゾとは対象的に、オペラは集団的な音楽の調和。多くの人が協力して、ひとつのハーモニーをつくり出す社会は、オペラのようなものだといえる。そのなかに参加して、名声を得る歌手は、文化のなかで、心の面で報酬を得ている。したがって社会的に成功した人が、その社会のなかで、感情面でも満足し、社会的財政的に成功したことを意味している。ゴンドラ乗りは個人的に幸福だった。２０度のゴンドラ乗りは、自分が手に入れた理解に自信をもって、もっと社会のなかに自分を投げ出したのだ。投機した分だけ報われる。オペラでは、今度はこの幸福感が、集団的なところから反射してきたのだといえよう。成功物語とか、社会のひとつの決まりきった鋳型にまみれたなかで、やや陳腐だが、つつがなく成功していく姿。"}, "蟹座_22": {"sign": "蟹座", "degree": 22, "symbol_ja": "若い女性が、ヨットを待っている", "explanation": "一般的な社会環境が提供してくれるものでは基本的に満足できない、想像的な人を示している。２１度の通俗性は嫌いだと思う。そしてその人は代わりに、自分の夢見るものの未知の訪れに恋焦がれている。無意識のむこうから、新しいイメージをもった、集合的な達成の舟が到来する期待。それは人いきれのする息詰まる賑やかな劇場ではなく、ないだ海の静けさのなかで夢見たものだ。ルディアは、永遠の女性性質が夢見る期待、とここで述べているが、いずれにしてもこれは個人的な在り方での夢や期待ではなく、理想的な社会生活という、集団の新しいタイプの生活に対する期待を暗示している。つねに予感があるが、それはいつも予感だけで終わるかもしれない。情感は充満している。だから、期待はいらいらするほど強いものになっている。"}, "蟹座_23": {"sign": "蟹座", "degree": 23, "symbol_ja": "文学仲間の会合", "explanation": "２１度のオペラのように、集合的な環境とのかかわりにのんでのまれるという関係性ではなく、一歩個人的な姿勢に退いた詩人、小説家、批評家は、特別な能力があって、彼らは社会の影響に生かされているにもかかわらず、その才能で、少しばかり優れたアンテナをもっている。その結果、社会の動向に影響を与えることが可能となる。それは社会の動きを評価したり、またちょっと批判したりしながら、微調整をする役割の位置づけにあって、社会の無意識のイメージをそのつど、言語化して、活気を与える。多くの人にとって、直感や衝動にすぎないものを明確にできる表現力に恵まれている。２１度は既存の社会。２２度は、未知へのあこがれ。２３度でこの前２つの度数はうまく混ぜられて表現されるのだ。この度数を持っている人は、この象徴どおりに、文化的な知識人に適合している。もちろん文学的な才能と見てもよい。"}, "蟹座_24": {"sign": "蟹座", "degree": 24, "symbol_ja": "南方の小さな島の、１人の女性と２人の男性の漂流者", "explanation": "社会のなかにいて批判的なアプローチをしていた文学仲間は、３人の小さな単位に置き換えられ、社会とは孤立した生き方を選ぶようになる。そして南の島へ漂流する。これは、小さなグループをつくり、もっと本質的な集団の在り方を追求しようとしているのだ。社会全体の潮流からは逸脱することだ。女性は、情感的な生活。２人の男性は、知的な方向性と、霊的な方向性の印。これらはすべて相互依存によって、なりたたねばならない。しかもこれは、無意識の海に囲まれた南の島で、現実的に調和的な形態にならなくては生きてゆけない。統合の分野はとても小さいが、生命の特別な新しい発展形態を予感させる。新しい村づくりとか、小さなところからはじまる共同体の新しい試みだといえる。より本質的な問題を追求するために、限定された世界とか、特定の人間関係のなかで生きること。信頼できる人はごく少数だけに限られてしまうが、人の結びつきの理想を追い求めている人だ。"}, "蟹座_25": {"sign": "蟹座", "degree": 25, "symbol_ja": "超越的な力の降下によって、意志に満ちあふれていた男の影が弱くなる", "explanation": "これは天賦の力をあらわしている度数だと思われる。この前の度数で、人は自分の身体や心の調和的な在り方を模索した。このなかで、霊的な応答が開始される。なにかをしようとするときに、超越的な世界、神意からの補助があるということだ。リーダーとして有能な度数だ。この２５度は、２１度からはじまった過程をすべて内包した結果だと見れば、社会参加の能力もあり、または批判する知能、理想を求めるあこがれの気持ち、理想を求めて現実に共同体づくりを試してみる、などといったすべての経験が統合されている。経験的に豊かな人として成長していくタイプだともいえる。その上で、霊的な世界からの援助がある。社会的に大変に有能な人だといえるだろう。\nNo. 24／72区分（蟹座２６度～３０度）「伝統」伝統に支えられた富と名声\n個人は伝統的な価値観のなかに吸収され、社会的な種の一員であることに、誇りを抱く。こうした社会は新陳代謝しながら成長する。"}, "蟹座_26": {"sign": "蟹座", "degree": 26, "symbol_ja": "贅をつくした家の書斎で本を読む来客たち", "explanation": "文化的な優越性と、富の集中によって、個人が贅沢な行為にゆったりと浸っている条件が獲得された。長いあいだの社会的な努力に集中した結果、リラックスして、贅沢な知的な楽しみと、友人との優雅な会話ができるようになったのだ。この友人は、情報について優秀な水準を保っていて、彼のところには、いつも頂点的なレベルの情報が集まってくる。井戸端の日常会話ではなく、それは政治にしても、また文学、哲学にしても、最高の水準の情報だ。物質的地盤や社会地盤が、この人の個人的な楽しみを維持することに十分な足がかりを与えてくれている。行為と努力の結実として、高いステイタスと、贅沢さは、十分に満喫されている。この度数の持ち主に貧乏な人ももちろんいる。だが、上質な文化生活をしていることは共通しているようだ。"}, "蟹座_27": {"sign": "蟹座", "degree": 27, "symbol_ja": "高価な住宅の密集する渓谷に吹く暴風", "explanation": "社会的文化的エリートが、自分の地位と身の安全を確保しようとしても、つねにそこには自分の力を超えたものの挑戦がある。彼はいつも脅かされているのだ。破壊から免れても、つねにその危機は存在しつづけることに、注意をむけ、自分を守らねばならない。自然界の力は、人の文化的な達成にはもともとなんの関心もないし、助けてもくれない。この自然界の挑戦を受けて、なおかつ社会的な地位を維持する行為のなかで、内的な変容をする。これは２６度の静かな暮らし、安全性とは対比がある。管理不可能な危機的な状況に挑戦することによって、この人はより強力な能力を獲得することができる。社会的な立場の維持のためには、かなり徹底した努力をしなくてはならない。プレッシャーや他の人の敵意なども受けて立つ必要がある。"}, "蟹座_28": {"sign": "蟹座", "degree": 28, "symbol_ja": "インディアンの女性が、集まった彼女の部族に白人の恋人を紹介する", "explanation": "情感的で温かい「自然にかえる」ことにむけて心をまかせること。これは、２６度、２７度がまとめられて、積極的な変容への可能性を暗示する。２７度では、自然は暴風雨としてやってきて、脅威となった。だが、この度数では自然に対する姿勢は随分と変化した。恋人としてなら、それは素直に受け入れられる。おもに２６度、２７度は白人文化の結実を暗示していて、この「白い」知性が、生命の原初的な価値に対する理解と許容の感情をいだくようになり、内的な再生へと導かれていく度数だ。心理学のユング派の用語としての、自然界の豊かなパワーの代名詞、アニマは、ここではインディアンの女性として描かれている。合理的な西欧的な知性がそうしたものと調和的に結びつくのだ。たとえばシャーマニズムに、人類の再生の鍵を感じるときというのは、この度数の作用、２６度の文化的な達成の頂点をとおりこした後、もう一度自然な生き方に回帰したいと思う気持ちをあらわしている。"}, "蟹座_29": {"sign": "蟹座", "degree": 29, "symbol_ja": "ギリシアのミューズが、新しく生まれた双子を黄金の秤にかけて重さを量っている", "explanation": "ものごとの判断や選択のさいに直観を巧みに利用する。合理的な知性と、自然な本能的な感覚を身につけた人は、この一見、対立したかに見える２つの要素をうまく使いわけて、ものごとを選ぶときに、両方の視点から判断する。だからこの度数の人は、人から相談をされやすいし、なんの気なしに決めたことも、他の多くの人は、その判断をとても重要視する傾向がある。人生は無数の選択肢の集合で、全体的な運命が決められていると考えるなら、この人自身が大変にバランスのとれた人生を歩く、というふうに見てもよいだろう。優れた直観力、異質な要素をうまく結びつけた判断力。西欧的な思想と、東洋的なあるいは土着的なシャーマニズムなどが巧妙に融合している人格。"}, "蟹座_30": {"sign": "蟹座", "degree": 30, "symbol_ja": "アメリカ革命の娘", "explanation": "伝統的な社会文化の自慢。ヨーロッパの正義からの逃亡者であったアメリカ人の先祖がいまや尊敬のまなざしを受け、今度は中東などの新しい革命的な動きを抑圧しようとする、という事実を見れば、伝統というものも、さほど客観的なものではない。だが、この度数の人は、つねに安定した組織とか伝統に、生命力が吸収されてしまい、それに対する恭順の姿勢をあらわす傾向がとても強い。マンダラを研究した１６度の男は、そのあらわれである社会の伝統形態に吸収され、そこから一歩も出ることができなくなる。蟹座は、過去の伝統の再現と、そこに個人が吸収されることを意味する星座だ。心理学者は、「深層のマンダラは、精神的な危機の状況において、秩序を取りもどす魔力をもっている」と主張する。社会のマンダラとして家族や、民族などの伝統は、危機のときに、強い助けとなるだろう。この度数は、こうした人の心の奥にある伝統的な精神に対して依存する心をあらわしている。\nNo. 25／72区分（獅子座１度～５度）「火」 生命力の活性化\n個人のなかに、抑えがたい創造衝動が吹き出す。生命的な躍動感に満ちて、いやおうなく人生は冒険的な方向へと導かれていく。"}, "獅子座_1": {"sign": "獅子座", "degree": 1, "symbol_ja": "活力エネルギーが、野心にかられて動員されるにしたがって、男の頭に血が昇る", "explanation": "根源的な生命エネルギーが、獅子座のこの初めの度数で爆発する。この生命エネルギーは、炎のような激しさをもって、自我が管理すべき頭に上ってくるので、個人に対して危機を与える可能性がある。統合された人間から放たれるこのエネルギーは、「自発的な放射」「意識的な発光」と名づけられているので、いわゆるヨガでいうところのクンダリニかもしれない。非常に興奮しやすくなり、制御が困難な生命力だ。誇りが高く、活力のあふれた獅子座の資質は、このエネルギーがそもそもの原因かもしれない。これが人を行動にかりたてる。獅子座の３０度の流れは、このエネルギーの変質、変容に関係のある経験領域だといってもいいのではあるまいか。"}, "獅子座_2": {"sign": "獅子座", "degree": 2, "symbol_ja": "おたふく風邪の流行", "explanation": "獅子座１度の生命の発光は、こんどは多かれ少なかれ、他人に蔓延し、個人の危機は、集合的な危機に広がっていく。集団ヒステリー症状のような。おたふく風邪という子供のかかる病気は、大人がかかるととても危険な作用があり、性的な機能に刺激過多な影響も与えるのだという。社会と個人のあいだで、爆発する生命エネルギーが共鳴していききし、そこから生活の地盤が集団単位で地崩れするような影響。危機。この度数を持つ人は、なにかするたびに周辺の人を盛大に巻き込んでいく。だが本人もまた管理できない強い生命力に動かされてしまっている。"}, "獅子座_3": {"sign": "獅子座", "degree": 3, "symbol_ja": "中年の女性が、長い髪を肩に流し、ノーブラで、若むけの服を身につけている", "explanation": "１度からはじまった強い生命エネルギーは、個人に若々しいバイタリティを与えてくれるが、この力は多かれ少なかれ、個人の自我に侵入してきているので、個人の生き方や考え方に甚大な影響を与える。この力を利用して、年齢の生物的限界や常識の限界を突破する可能性をこの度数の持ち主は考えている。年齢にふさわしくないハデな衣服や、年齢にふさわしくない幼ぶった言動が多い人も見かける。獅子座の２度は、性的な感情の暴走も指摘されていたが、そのおかげで、３度で、いつまでもセクシュアルなことにこだわる気質の人が生まれてくる傾向もある。性的な仕事に携わる人にこの度数が多いことを確認しているが、必ずしもこの度数の持ち主がその傾向をすべて帯びているとは限らない。"}, "獅子座_4": {"sign": "獅子座", "degree": 4, "symbol_ja": "正装した初老の男が、自分の狩りの遠征から持ち帰った戦利品のそばに立っている", "explanation": "獅子座特有の、自分が達成したことを劇化する特質。正しいルールにのっとって、自分が動物的な資質を克服したこと、勇気が必要な至難の業を達成したことを、仲間に見せつけること。獅子座１度で爆発した生命力を制御することに関心がむいているとは言っても、この場合その能力があることを仲間なり、周囲に宣伝したい気持ちが強くあらわれる。３度のノーブラの女性も、対外的に自分を誇示する傾向は同様。３度が女性的なあらわれになることに対して、４度は男性的な気質として表現されている。自分がいかにすごい体験をしたかを人に自慢する人に、この度数の持ち主が多くいた。"}, "獅子座_5": {"sign": "獅子座", "degree": 5, "symbol_ja": "深い峡谷に、岩が塔を形成する", "explanation": "壮大な自然界がつくり出した非個人的な絵。これが、人を個人的な思惑から、もっと広大な精神の力へとむけさせる。そのような壮大なイメージの光景を見て、意識の広い視野を獲得する。人生に人間を超えた力がはたらくことをかいま見て、人生をもっとダイナミックなものにしたいと思う気持ちが芽生える。その結果、壮大なうぬぼれやホラ話の傾向も出てくる可能性がある。１度で大きな生命エネルギーが解放され、これが人を変えていく姿がこの５角で表現されているが、いくどかの子供っぽいあらわれを経過した後に、ここではダイナミックな意識の視野の拡大という結果を獲得した。２度では制御できず、３度ではそれに寄りかかり、４度では克服の主題へと変遷し、この５度で、壮大なビジョンに到達するのだ。\nNo. 26／72区分（獅子座６度～１０度）「破壊と創造」 創造と破壊の感情\n個人の創造衝動を判断材料にして、古い社会の習慣を破壊し、そこから脱出しようとする。作っては壊し、作っては壊しという行為のなかで、自己形成する。"}, "獅子座_6": {"sign": "獅子座", "degree": 6, "symbol_ja": "保守的で古風な婦人が、「ヒッピー」の女性と出会う", "explanation": "つねに変化する社会的な価値づけ。社会の世代の交替のなかで、それまで優れていたり、よいと思われたことも、次の世代では覆される。ヒッピーとの出会いによるカルチャー・ショックは、わたしたちの社会の価値のはかなさを印象づける。流行や、社会の流動的な価値への従属性から超越しなくてはならないという危機感は、つねにわれわれの意識を新しくし、活発な活動性を触発する。この度数の持ち主は、こうした時代の変化に直面しやすく、その動きに非常に詳しくなるケースも多い。時代の表現にあわせていく巧みさと手腕、時事性や流行に敏感なアンテナをもっている場合もある。しかし基本的には、時代の変化に対する失望感が支配していることは事実だ。"}, "獅子座_7": {"sign": "獅子座", "degree": 7, "symbol_ja": "夜空に輝く星座", "explanation": "社会的な価値が時代とともに変遷し、社会のなかには恒久的な価値などなにひとつないことに気がついた人は、いつも変らない恒久的な基準を求めようとするようになる。頑張ってつくり上げた社会的なステイタスも、次の時代にはすぐに無価値になるからだ。夜空を見る体験は、つねに恒久的なものに心をむけさせる。永遠について考える。ほとんど変化しないパターンの星の集団は、つねに変わりつづける流行と社会的な理想の流れとは反対のもので、そうした永遠を感じさせる遠い光景を見ているうちに、精神のなかに、力強い沈黙が獲得される。この度数の持ち主は、永遠とか恒久的なもの、変らない価値にあこがれ、実生活での努力を放棄することが多い。"}, "獅子座_8": {"sign": "獅子座", "degree": 8, "symbol_ja": "共産主義の活動家が、自分の革命的な理想を広める", "explanation": "永遠性を感じさせる価値や思想を、現実の社会にもち込もうとする試み。階級のない自由な社会体制という夢は、社会に対して混沌とした無政府状態をつくり出す方向へとむかう。いずれ、新しいタイプの社会への再組織化のための土壌をつくり出すだろうが、ここでは無秩序な破壊的な願望として表現されることが多い。この破壊のための力は、獅子１度からもたらされているので、強力なインドのシバ神に似た特徴をもっているといわれている。基本的には改革が目的ではない。混沌とした状態、永遠性へもどりたいというむやみな衝動だ。だがこの度数の持ち主を見るかぎりでは、その考え方の破天荒さに魅力があることも事実だ。"}, "獅子座_9": {"sign": "獅子座", "degree": 9, "symbol_ja": "ガラス吹き工が、自らの呼吸を調節して、美しい花瓶を形づくる", "explanation": "創造的な緊張感と慎重さ。職人的な度数。職人は自分の息、すなわち霊的な火を作品に吹き込んでいるので、非常に集中的な精神の創造への傾倒を暗示する。深く感じられた情感は、オブジェに生き生きとしたパワーを与える。自らの生命をこめた作品化を試みているのである。破壊の行動によって、人生は混沌としてくるが、その後で、過去の、すでに壊してしまった価値の残骸を素材にして、もう一度新しい世界を形成したい、という願望でもある。創造作品に取り組むことを通じて、自己の再構築を目的とする人がとても多い。なにか創作することが非常に適しているといえる。このシンボルには熱が関与していて、その姿勢には熱気と、集中性が感じられる。"}, "獅子座_10": {"sign": "獅子座", "degree": 10, "symbol_ja": "太陽の光が野に流れ込むと、早朝の露（朝露）が輝く", "explanation": "獅子座の動きには上昇する精神の火という性質がつねについてまわるが、８、９度で、この火を破壊や創造にふりむけるとき、おびただしいさまざまな感情体験がもたらされる。革命行動も、創作も、外部的な行為ではなく、自己の人格変質に関係する行為だから、ここでは苦痛や抑圧体験、押し殺したような集中などさまざまだ。この度数で、やっとこれらが解放され、高揚した感情へと変わっていく。悲しみや苦痛という、あたかも暗い夜のような体験を通過したあとでの、夜明けの明るみに生まれたような感動的な新鮮な気分。この度数を持つ人は、このような感動的な体験や、それに伴う情感がものごとをはかる基準となってくる。苦労の後の解放。抑圧の後の明るみ、苦しみの後の楽しみ。やはりなにか創作したりつくったりすることにむいている人。\nNo.\n27／72区分（獅子座１１度～１５度）「遊技」精神の緊張を解きほぐす遊技性\n遊びやゲーム性のなかで、自分の新しい可能性を創造しようとする。余暇と遊技性は、人格形成において、もっとも大切な糧である。"}, "獅子座_11": {"sign": "獅子座", "degree": 11, "symbol_ja": "大きなオーク（楢、樫など）の木の枝から吊されたブランコで遊ぶ子供たち", "explanation": "人類の伝統を暗示する樹木。そこから伸びたさまざまな文化と教えをもてあそんで、そこから得られる言葉や概念で、ブランコ遊びをする。だが、子供はつねに巨大なしっかりとした、枝と幹に支えられている。心の潜在的な資質を目覚めさせるにともなって、感情の緊張をほぐすため、リラックスした楽しみの方法を見つけださねばならない。知的なゲームをしたり、いろんな分野の資料を組み合わせて、新しいアイデアを考案したり、といろいろ忙しいが、必ずしもある具体的な成果がほしいわけではない。いきいきした楽しみが重要なのだ。いったりきたり、躍動的な頭脳の活動。ひとつの思想遊戯の世界と考えてもいいかもしれない。"}, "獅子座_12": {"sign": "獅子座", "degree": 12, "symbol_ja": "素敵なランタンに灯された芝生の上での大人たちの夕食パーティ", "explanation": "大人の洗練された趣味や遊びの世界。日々の仕事と義務から逃れて、大人は趣味を求めて集まるが、標準化されファッション化された冗談やゴシップが飛び交うので、必ずしも１１度のように、無垢なものではなくなった。芝生もランタンも、洗練を意味するが、定式化され意外性の欠けた集まりとなる。１１度では、依存化するべき偉大な伝統としてしっかり立っていたオークの木は、ここではすでに単なる飾りとして利用されている。表面的な知性、機知に熱中する心。だがこの度数では、なにか実質的な実りのある成果が必要なのではなく、緊張をほぐすことが大切なのだということを強調しておかねばならない。"}, "獅子座_13": {"sign": "獅子座", "degree": 13, "symbol_ja": "年取った船長が、自分の小屋のポーチ（のロッキングチェア）で体を揺らしている", "explanation": "静かな追憶。船長はかつて無意識を象徴とする海の上で、危険にさらされながら自我をあやつる人生を歩み、いまではこの現場から退いて、オークのブランコは、ロッキングチェアとなって、ゆっくりと余暇を楽しんでいる。イスをころがしながら、いままでの体験にもとづき知恵をあみだそうとしている。哲学的な思索には、余暇が必要だ。１１、１２、１３度は子供の知性、大人の知性、そして老年の知性という対比をもって進むが、この度数を持つ人は、現実の社会生活での仕事にさほど真剣ではない場合もある。むしろ余暇をすごすことのなかで、豊かな結実が存在する。人生の戦いに直接参加せず、傍観者としてふるまうケースが多い。やる気のない人だといわれることも多い。"}, "獅子座_14": {"sign": "獅子座", "degree": 14, "symbol_ja": "人間の魂が、表現のための機会を探している", "explanation": "自己実現を切望する。魂の奥底からの自己表現衝動が、ここで勢いよく吹き出す。いままで表現することを差し控えて、待ちつづけ、ずうっと待ちつづけて、やっと自己表現にむかっていくような、爆発的な活力はカーニバル的なハデなあらわれ方をする。子供、大人、老人を超えて、表現しようとする、いつの時代にも共通した生命表現のあらわな衝動。魂それ自身を語らせる。という特徴のある度数だが、現実には演劇、ポップミュージックのスターなどに非常に頻繁にあらわれる度数だ。彼らはなにを表現するかというテーマが重要なのではなく、人間のわくわくするような生命力そのものを対外的に表現することに喜びを感じる。この度数の人は、そうした表現の場を探そう。"}, "獅子座_15": {"sign": "獅子座", "degree": 15, "symbol_ja": "歓声を上げる人々の中を行く壮大な山車を伴う、ぺージェント", "explanation": "自己表現の熱い衝動は、自分の心を公的にデモンストレーションできるまで安定して発達する。祭りは、その出しものも含めて、人々の潜在的な願望の噴出の集合的な通路にもかかわらず、やはり演出され、緻密に企画されねばはじまらない。情感的な興奮の頂点であるが、熱望を劇化して表現することのできる技術と沈着さが、この度数の人には身についている。理想のドラマチックなプレゼンテーション能力。プロデュースする才能などに関係する。そのような職種につくのがベストだろう。だが、ここで扱われる熱狂という素材は、一般化されたもので、さほど純粋に個性的ではない。多くの人をのせることのできる普遍的な興奮やお祭りなどに関連している度数だ。つねにどのくらい人に印象づけられるか、どのくらい興奮を呼ぶかを計算しながら生きていく人かもしれない。\nNo. 28／72区分（獅子座１６度～２０度）「非日常」\n遊びが高じて、真面目な探求心へと変わる\n自由な行動で非日常的な瞬間を求める。非日常的な瞬間にこそ、自分の本当の創造的な自我の種が隠されていることを自覚する。"}, "獅子座_16": {"sign": "獅子座", "degree": 16, "symbol_ja": "嵐が止み、自然のすべてが輝くばかりの陽光に歓喜する", "explanation": "生命にまつわる種々の危機が去った後で、陽光のように喜びがわき上がる。オカルト分野で「魂の夜」という常套語があって、これは不毛な、どんなものもすべて台無しなったかのように思われる失意の感情に襲われる瞬間だ。どんなに優れた人も、体験するし、いかなることをしていても体験の経過として必ず訪れ、自分のしていることが全部間違っていると感じる。だが必ず、その後でこの魂の夜を抜けて、意識と生命がもういちどリフレッシュされ、いままでの体験はすべて意味あることだった、と確信できるようになる。このような体験を通じて、この度数を持つ人は、人間の生き方の新しい可能性を理解できるようになる。ルディアは、もっとも楽しみに満ちた霊感を受けやすい度数であると述べている。ひとつの生命の歓喜の頂点体験に関係した度数だ。"}, "獅子座_17": {"sign": "獅子座", "degree": 17, "symbol_ja": "賛美歌を歌う、教会のボランティアの聖歌隊", "explanation": "ボランティアに利潤追求の意志はない。純粋な心で、人との共同の楽しみを暗示している。一緒にはたらくこと、そのものが楽しい。宗教のはたらきは、このただ一緒にはたらく共同体に、特別な神聖な感情と意味を与えることで、共有された共通の感情の鋳型に、神聖な生命力が流れることを意味する。深い安心感と、リラックスが訪れる。獅子座１６度の危機を切り抜けた瞬間の爆発するような新鮮な感情に比較して、安定した社会的な活動の穏やかな喜びを暗示している。この人が人と共同するのは、裏のない純粋な気持ち。奉仕的な仕事にむいているといえる。善意と無垢な感情。"}, "獅子座_18": {"sign": "獅子座", "degree": 18, "symbol_ja": "化学者が自分の生徒に実験を指導する", "explanation": "錬金術に関係しているといわれるこの度数は、知恵によって自然界の条件をコントロールすることへの期待をあらわしている。自然界の隠された原理を発見し、それを自分のものにするわくわくする感情へとむかう。いままでの伝統的な知識をさらに発展させる。研究の喜び、真理探求の興奮など。この度数を持つ人は、こうした自然界の原理の研究と、それによって、隠された事実があばかれ、この知識で、自然界に対して力をもつということに関心があるので、科学者や化学者、研究にむいている。また状況を自分の思いのままにつくり替えることのできる能力。受け継がれた先祖からの知識を継承する能力。それをさらに発展させる能力がある。"}, "獅子座_19": {"sign": "獅子座", "degree": 19, "symbol_ja": "ハウスボートの上でのパーティ", "explanation": "集団でのエンターティンメントや魅力的な人間関係のなかに、生命力の解放の場を見つけ出す。いつもの仕事や社会的な義務から逃れたところで、生命エネルギーの自由な流れを追求する。ハウスボートは、川や岸に近い海にあるので、これは陸地（社会）にすぐもどることができるような場所で、非日常的な体験をする。ボヘミアン的な気質。社会的な制約、地位や年齢や思想にとらわれない素朴な人間関係を求めている。この度数をもつ人を観察するかぎりでは、仕事や規則ずくめの生活をすると、非常に疲れやすく、生活のなかに不確定な思いつきの行動のできる時間を確保する必要がある。またそこで霊感が出る。放浪癖があるといえばいいだろうか。気まぐれや気ままさが発揮できる余地を残しておかねばならない。いきなり失踪したりする人も多いが、リラックスを求めているのだ。"}, "獅子座_20": {"sign": "獅子座", "degree": 20, "symbol_ja": "ズーニー族のインディアンが、太陽に向かって儀式をしている", "explanation": "自然のエネルギーの賛美へと回帰すること。現代人が長いあいだ否定してきた人類の根っこの力に対する回帰と、自分が崇拝するものへ自己同一化することで、生命を回復する技術を示すと同時に、舞踏に関係する度数でもある。ある意味で、これは獅子座１９度が本格化したことを暗示している。社会生活のなかでの一時的な逃走によるリラックスが、本格化して趣味のレベルではとどまらなくなり、自由な暮らしに自分の根拠をおくようになってきた。そして文明人が忘れてしまった、いにしえのインディアンのような、本能的な生活基準を本格的に取りもどす行為を探索しはじめる。ここでは舞踏などは、生命力を強力に取りもどすために十分に効果的に活用できるのだ。やがて、ただ活力を充填する、ということにとどまらず、サイキックな能力が動きはじめる。\nNo. 29／72区分（獅子座２１度～２５度）「オカルト」\nサイキックエネルギー扱い方\n現実は精神力により変えることができる、という確信を要求する。結果的にしばしばオカルト的な力にも関心を見いだす。創造的な新しい意思が、外界をどのくらい変革していくかに関心が焦点化する。"}, "獅子座_21": {"sign": "獅子座", "degree": 21, "symbol_ja": "興奮した鶏が、ふらふらと羽をばたつかせて飛ぼうとしている", "explanation": "鶏は鳥という霊性を暗示するシンボルのなかでも日常的に飼いならされた霊性を暗示するので、純粋な霊性とは異なる。それで、しばしばオカルト的、実用的な力をもった、つまり超能力とか、また人を驚かせるような心霊的な事柄を暗示している。プードゥー教では、鶏をいけにえに使うが、そのイメージはこの度数に近い。呪術など、濃密な気の力が充満した世界。準備なしで早急に、オカルト的な事象を扱おうとする態度。これが心理的な混乱を引き起こしてしまう。１９度の趣味的な没入がやがてこのサイキックな力の発見へと推移してきたので、この度数では、まだ心霊的な諸力については、あまりなれていない人をあらわしている。ヒステリックに興奮するサイキックな力は、また性的な興奮もあらわすことがある。日常的な欲求の満足に、オカルト的な力を使おうとする野心からくる、種々のトラブル、エゴと霊的な力が結びついたときの混乱。"}, "獅子座_22": {"sign": "獅子座", "degree": 22, "symbol_ja": "自分の使命を果たす伝書鳩", "explanation": "中毒した鶏と対照的に、訓練され間違いのない伝書鳩が、メッセージをもち運ぶ。もちろん霊を意味する鳥が運ぶ言葉は、霊的な使命などをあらわしていて、ここでは個人的な動機で追求したオカルト的体験への反省もかねて、もっと建設的な事柄に奉仕する、という姿勢を意味している。誰かの役に立つ奉仕をする、というはたらきをすることで初めて使命や意味が判明する。高度なエネルギーが解放される。それは明確な目的をもっている。２０度は、サイキックな力を呼び出すことだった。２１度は呼び出された力が、われわれの日常的な心に恐怖心を生み出した。それは２２度で目的あるものに使用される、という決着を迎える。ここで心霊的な諸力は、安定したはたらきにむかうといえるだろう。"}, "獅子座_23": {"sign": "獅子座", "degree": 23, "symbol_ja": "サーカスで、裸馬の乗り手が自分の危険な技術を披露する", "explanation": "人の潜在下に蓄えられている大きな粗野なリピドーを、勇気あるものがコントロールする技術を身につけ、コントロールできることを多くの人に披露することで、感銘を与える。なんらかの実際的な偉業をなしとげる度数、といわれているが、主にここでは、ショーマンとしてふるまう傾向があるので、つねに誰かが彼の業を見ていなくてはならない。日常を超えた力と心を人々のなかに巻き起こす。全体に、有名な神秘主義者は、この獅子の２０度から２６度くらいまでの帯域になんらかの惑星をもっていることが多い。この帯域はオカルティズムの代表的な資質に関係するのだろう。"}, "獅子座_24": {"sign": "獅子座", "degree": 24, "symbol_ja": "霊的な達成に完全に集中している男が、表面的な清潔さを無視して座っている", "explanation": "オカルト的なサイキックな力は、この度数で、完全な訓練と自己集中によって、精神的に意味あるものへと制御されようとしている。超越的な力と自覚を身につけるために、一点集中している姿は、ひとつの目的の追求には、他のあらゆることを犠牲にするくらいの意志の凝縮が必要であり、それを成し遂げることのできる能力を暗示。獅子座２３度では、まだ力の誇示をするショー的な感情が残っていたが、ここでは精神的な完成に集中している姿に変わり、人からどう評価されるかには一見、かまっていないように見える。自己の内側にコンセントレーションする能力。２１度で開発されたオカルト的な力は、われわれの自我のあり方を変えることで、価値あるものに開花することを自覚し、長期にわたる自己訓練に取り組む気概をもった男に変わる。"}, "獅子座_25": {"sign": "獅子座", "degree": 25, "symbol_ja": "大きなラクダが広大で近づきがたい砂漠を横断しているのが見られる", "explanation": "ラクダは体内に水をもち、砂漠のなかでの長い旅にたえられる体質をしている。精神的な完成を達成するには、２４度の行者のように、あらゆる余分なものを捨てて、一部の目的に集中するよりも、むしろ、ごく普通の暮らしのなかで、多くの人が体験していることをすべて体験し、基本的な人としての自己充足をした上で、目的を追求するということが大切だ。ものごとを進める上で、万全な準備などをあらわしている。自分のなかにすべてを持てば、どんなことも障害とはならない、という意味。用意周到な性格。その上で、未知の新しい体験に飛び込む決意をあらわした度数。この度数の持ち主は、非常に困難な課題をこなすことのできる耐久力をもっていることが多い。まだ、一度も体験したことのない、新しい試みを人生のなかで追求する。\nNo. 30／72区分（獅子座２６度～３０度）「誓約」自己表現がやっと達成される\n個人的な創造性の発揮を通じて、多くの人と共感を獲得し、この個人的な創造性に、必然性が伴うことで、自己の使命を自覚する。"}, "獅子座_26": {"sign": "獅子座", "degree": 26, "symbol_ja": "激しい嵐のあとの虹", "explanation": "２５度の砂漠は、２６度では激しい嵐に象徴を変える。人生のさまざまな激変や困難を、ルディアのいう「下剤」として利用した人が、自己の深層の魂の元型とむきあうときを示すのが、この度数。虹は神と人の契約の印だといわれていて、霊的な根源的な目的と、個人の生活が、虹というリンクでつながれていることを暗示しているので、個人の本当の目的の自覚が、ここで訪れる暗示がある。ルディアのサビアン解説のキイノートとして、この度数には「神聖な性質を伴う契約、不死の約束」と書かれているが、実際この度数を持つ人は、しばしばなんらかの明確な目的や霊的な世界との契約というものを保持して生まれてきている形跡がある。なんらかの超越存在に仕組まれているとしか思えない、果たすべき使命があるのだ。"}, "獅子座_27": {"sign": "獅子座", "degree": 27, "symbol_ja": "東の空の夜明けの輝き", "explanation": "人生の新しい周期への出発の意欲。新しい人生への挑戦。深層の霊と、個人のあいだに、特定の契約のリンクがある人間は、この契約にもとづいた特定の目的をもって、実人生に挑戦する。獅子座は、つねに他の誰にも代用のできない、特別な選ばれた目的がないと満足のできない星座だ。この世界に生まれたことのない神々との契約のリンクが２６度で思い出された以上、この特別な任務のようなものは、この度数の持ち主に満足を与えることになる。だが、新しい人生は未踏の、まったく新しい試みであり、前例のないことに挑戦しなくてはならないので、迷いも多くなるかもしれない。東の空は、行動的であることを象徴化している。非常に活発な創造的な人生を歩く人だ。"}, "獅子座_28": {"sign": "獅子座", "degree": 28, "symbol_ja": "大樹の枝にいる、たくさんの小鳥たち", "explanation": "霊的な啓示がもたらされた人が、新しい人生に取り組むときには、いままでの日常感覚は失われ、まったく新鮮なアイデアとか、いろいろな可能性について心がわくわくすることになる。生活の場が、ひとつの遊び場のように期待に満ちたものになる。そのために、種々のアイデアで混乱しがちになる。だが、ちいさな小鳥たち、という象徴でわかるように、気分は軽い。軽快でさわやかな日常感覚が、回復する。自分の活動領域やビジョンを制限し、ひとつだけをはっきりと実行するということを心掛ける必要がある。そうしないと、ここでは日常生活の分裂が起きやすい。フラストレーションは解決されていて、快適で満足な生活が訪れる。日常の快適さ、爽快さを味わうことができる。"}, "獅子座_29": {"sign": "獅子座", "degree": 29, "symbol_ja": "大洋の波から浮上した人魚が、人間の形に生まれ変わろうとしている", "explanation": "無意識の言葉やメッセージを意識的な形へ固定化したい衝動を暗示するこの度数は、芸術家が、無意識の海から、ある言葉を引き出そうとしている瞬間の、興奮と不安、落ち着かない気持ちを暗示しているといわれている。上半分は人、下半分は魚である人魚は、意識と無意識の両方にかかわっていて、言葉や霊感がのど元から出てきそうな直前の心理を暗示。すべての創作作業をする人の根底にある欲望の火をあらわした度数。形にしたいこと。したがって、この度数を持つ人は、創造的な能力の発達した人だといえるはずである。また生活のなかで、無意識の影響を受けやすい。機械のように生きることのできない人である。言葉になる前に行動であらわし、あとでそれを納得するということも起きやすい。"}, "獅子座_30": {"sign": "獅子座", "degree": 30, "symbol_ja": "開封された手紙", "explanation": "獅子座で追求する事柄は、つねに個人的な色合いを帯びている。だが、最後には、すべての人に共有・共感されるものであるということを述べていて、一見、個人的に閉鎖されているように見えるものでも、結局それはすべての人に通じていることを理解できる。この度数で、個人の主観にとじ込められているという獅子座独特の抑圧感覚から解放される。意識は拡大し、コミュニケーションと理解、共有することの価値を認識する。獅子座２９度からこの度数で、大きな転換が起こった。個人的に体験し、追求してきたことを、公共的に生かす能力だ。すべての人に役立つことのできる人。なおかつ、彼は個人的な意欲や熱意を失っていない。スピーチなどで、独特の解放された感情をまき起こすことのできる能力がある。\nNo. 31／72区分（乙女座１度～５度）「識別」 自己を外側から見つめる\n物事を外面的に識別し、ここから乙女座の基本的な分析力、識別力を発達させようとする。あまりにも識別に重点を置いた結果、全体性を見失う危険性があるが、物事の差異を認識するなかに、自己の価値が築かれていく。"}, "乙女座_1": {"sign": "乙女座", "degree": 1, "symbol_ja": "芸術的に強調された男の頭が、重要な意義を帯びる肖像画", "explanation": "乙女座は、理性や識別力を発揮させることを主眼においた星座だ。この乙女座のはじまりの度数では、いままでの獅子座の内面から感じる実感という生き方を否定し、ものごとをまず外観から観察するようになる。すると、ここではものごとの外観の特徴の違いなどが、重要な識別の鍵になるので、獅子座への反動から、ついこうしたひとつひとつの違いを強調しすぎの傾向に傾く。あの人はこういう癖がある。この人はこういう輪郭をもっている、と識別力を発揮していくうちに、すべてに共通した全体的な要素を見落とす傾向がある。だが、優れた観察力には目を見張るものがあるのも事実で、イラストレーターなど、ものの外観を鋭くとらえる職業に多い度数でもあるようだ。"}, "乙女座_2": {"sign": "乙女座", "degree": 2, "symbol_ja": "大きな白い十字架から見おろす土地の全景", "explanation": "ものごとを客観的に見るには、自分自身の自我とか、願望投影を捨てねばならない。つまり自分に対して超然とした位置に立たねば、見えてこない。そこで、白い十字架は、自分の気持ちを葬り去る印と解釈され、自分の気持ちを墓に埋めた上で、土地の全景を見わたすという情景が描かれる。人生全体が自分の気持ちを捨てた上での活動、仲間への参加という意味をもっている。これは獅子座の魂を犠牲にすることも含む。しかし自分の見方を捨てて考えようとするので、逆に人とのコミュニケーションで苦労する面もあるようだ。素直に感情を出せばわかりあえるのに、自分の気持ちをさも汚いもののように、恥ずかしく思う気持ちが、この人をとても引っ込み思案な人格にさせてしまうのだ。"}, "乙女座_3": {"sign": "乙女座", "degree": 3, "symbol_ja": "守護天使", "explanation": "主観的な心や感情を犠牲にした人は、必ず心理的に危機が到来するだろう。自分がなにを基準にして生命力を満たせばよいのかわからない不安に襲われるのだ。そのときに、自然界のはたらきを目に見えない背後から支えている、守護天使のような存在が、その人の心を埋め合わせにくる。そして人間的ではない感情が心を支配するようになる。人生のアイデンティティの再確認を必要とする、ぎりぎりの状態の人のためにやってくる超自然的な助け。２度で、いままでの主観的な獅子座の心を捨てた後の、血の入れ替えのようなプロセスだ。現実に危ないところで偶然のように命が助かる、という体験をしている人が、この度数の人に多い。"}, "乙女座_4": {"sign": "乙女座", "degree": 4, "symbol_ja": "黒人と白人の子供たちが、幸せそうに一緒に遊んでいる", "explanation": "子供のシンボルは無垢と素朴な心。自分の生まれ育った文化や階級、あらゆる偏見、ローカルな影響を脱して、人に共通した人間性の地盤に立って生きる人。融通無碍で、闊達な状態。これは３度の影響で、人の人らしいにおいが脱色された後での、子供のように純化された精神で、人とコミュニケーションしようとする度数。超自然的な影響のあとは、サビアンではたいてい子供らしさのシンボルがあらわれる。ここで外見の比較を気にする１度の影響は克服されているといえる。考え方のなかに、常識を超えた正直さがある人だ。"}, "乙女座_5": {"sign": "乙女座", "degree": 5, "symbol_ja": "自然霊や通常は見えない霊の代理者の存在に気づくようになる人間", "explanation": "日常の生活のなかで、あらゆるものの形、名前、事物がどうやって形成されているのかなどに関心がある乙女座１度は、結論として、これらが生み出される過程を理解し、見えないものがしだいに形になるプロセスを漠然と理解する。物理的な特徴を超えた自然界の原理について、シンボリックな形でそれを認知しようとする。この度数の人は、分析的な心によって、ものごとに名前と形を付与しようとする傾向が見られる。ものの名前はひとつの精霊のようなものだと直観する。名前や形が独立して生命をもつようなイメージに執着する。童話的、ファンタジー的な創作のセンスとしてあらわれる人もいる。\nNo. 32／72区分（乙女座６度～１０度）「情念」 情感や情念に支配を受ける\n情念、感情、性愛的な欲動に対しての識別力を発達させる。魅力や情愛に依存するが、この感情を突き詰めていくことで、真の客観的な自分を発見する。"}, "乙女座_6": {"sign": "乙女座", "degree": 6, "symbol_ja": "メリーゴーランド", "explanation": "生命力のダイナミックな運動への関心。回転しながら浮き沈みするリビドーやサイキック・パワー（馬）を乗りこなそうとしている子供は、当然メリーゴーランドの軸となる部分や、遊園地につれてきてもらった親に依存している。守られ、限られた範囲のなかで、激しく運動し、生命力を解放する技術を身につけようとする。ダイナミックな緊張感。躍動感。性エネルギーを暗示することもあるといわれる度数だが、馬は偽物で、生命の本質よりも、その運動性に関心が集中。スポーツにも関連。活力のある情感の躍動感に酔う性格だともいえる。日常生活のなかで、感情の嵐が吹き荒れる場面に楽しみを見い出す人もいる。乙女座の理知的な関心が、ここでは情感というものにむけられたために、はじめはこれらの関心が遊戯として発揮されてくるのだ。この遊戯性は、構造の馬として描かれている。"}, "乙女座_7": {"sign": "乙女座", "degree": 7, "symbol_ja": "ハーレム", "explanation": "情感やリビドー、あるいは性愛的な感情などの、より屈折したあらわれに対する関心。ハーレムで待っている女性たちは、拘束された身分におかれている。つまり愛着とか、欲望とかに、人生の主導権を握られた人物を暗示する。こうした立場の場合、健康な子供のメリーゴーランド遊びのように生命の躍動感を楽しむのではなく、もっと微妙でもっと屈折した感情表現に通じてくるものだ。魅力や、性的な磁力などをあやつって、ハーレムの主であるサルタンを引き寄せる技巧は、この度数の持ち主が、自分では動かずに、人を動かす技術にたけてくるとかであらわれてくるケースも多い。情感的なものへ依存している生き方、情念や情愛を通じて、拘束し拘束される関係に生きること。６度と、７度の対比は、同じ主題を扱いながら、狩猟民族的な、自分から行動する、という生き方と、農耕民族的な、ほしいものはじっと待って引き寄せるという姿勢の違いがあらわれている。"}, "乙女座_8": {"sign": "乙女座", "degree": 8, "symbol_ja": "５歳の子供が、初めてのダンスの授業を受ける", "explanation": "その人が属している風俗、文化の基準にあわせた踊り方、つまり自己表現する手腕を学習する。もちろんダンスの練習には、先生がいて、この規範にしたがい、自分の生命力やリビドーをコントロールする訓練を受けている。６度では母親、７度ではサルタン、８度では先生というふうに、依存的な人生はつづくが、８度のテーマは、情感的なものへの没入でも、危ない遊びでもなく、バランスのとれた人間性の発達というものだ。シンボルには、５の数字が使われていて、これは完全な人の象徴だといわれている。この度数の持ち主は人間性の健康な発達という目的で、さまざまな事柄を学習する熱心さを発揮する。もちろん象徴に描かれているように、舞踏などに縁は深い。伝統にしたがうので、独自性はさほど発達しない。神秘学などの学習にも関係するケースがある。"}, "乙女座_9": {"sign": "乙女座", "degree": 9, "symbol_ja": "抽象派の画家が仕事をしている", "explanation": "伝統的な生命エネルギーの表現方法に飽き足らない人は、ここで自分独自の表現方法を模索する画家として描かれる。彼は反抗的で、非妥協的な性格をしている。６度からつづいた権威や情愛への依存性を断ち切るために、自分に一番正しく、一番自由な表現とはなんだろうと、自己の深層にどんどん入っていく。この度数の持ち主の創作なり、仕事や活動は、こうした本当の自分の表現方法を確立したいという動機に裏づけられた模索の行動だ。だが、個人性の基礎を追求するあまり、葛藤とか自意識過剰な行動が強調されがちで、わざわざ奇をてらった表現、これ見よがしに強調された反伝統性を売りものにしてくる人もいる。感情をぶつけるような形の定まらない絵、不気味さを前面に出した暗黒舞踏や、わざわざ暗い側面を強調した作品などだ。シンボルどおり、画家にこの度数を何度か見かけた。芸術に非常に深く関係した度数だといえる。"}, "乙女座_10": {"sign": "乙女座", "degree": 10, "symbol_ja": "２つの頭が、自分たちの影の外とそのむこうを見る", "explanation": "情念や情感に依存して生きる人は、その情念の呪縛から自由になれない。自由になろうとすると、いつかは自分がつかまっている情念的な実体を客観視しなくてはならなくなる。ある日、その人は、無意識からやってきた醜い恐ろしい姿のものに出会い、恐怖に打たれることになる。この度数は、情感の奴隷として、猶予つきで何者かに生かされていた人が、真の自由を獲得するために、苦しい橋をわたらねばならないことを意味していて、自分が発達させることを怠った、影の自己との合体をしなくてはならないプロセスを意味している。これはつねに永遠の課題だ。誰もが、自分の主観的な感情に支配された、個人的な人格から脱出するのに、このプロセスをたどらねばならないからだ。情感に支配された乙女座６度から９度までの眠りは、自分自身の逆さま像である影の実体に出会うことで、はじめてたたき起こされることになる。この度数は大きな気づきをあらわす。\nNo. 33／72区分（乙女座１１度～１５度）「創造」待ち望んだ夢を形にする\n潮流、派閥、ある種の勢力を統一的に展開することで、人間の生き方の秩序が永遠に続いていくことに対して価値を見いだす。貴族的な家系も、能力や人格の継承によって、無秩序や混沌のなかを生き抜く知恵。"}, "乙女座_11": {"sign": "乙女座", "degree": 11, "symbol_ja": "自分の赤ん坊に、息子を深く待ち望んだ気持ちが叶えられたことを見る母親", "explanation": "人の潜在的な夢と理想を明確に形にする。息子というのは、われわれの想像力でつくり出す、こうありたい未来の自分という子供だ。これを想像力が育て、やがて長いいらいらするような時をへて、その発現をかいま見る。長く待ち望んでいた夢を実現するのは、感動的な体験だ。１０度の光と影を統合した男は、そこに新しい自分が生まれるのを発見したのだといえる。理想は、具体的なさわることのできる現実的な姿をもって実現される。この度数を持つ人は、願望をはっきりと形にできる実行力のある人だといえる。また東洋の仙道などで、想像的に形成した\\\"気\\\"を濃密に練ることで、陽神という分身をつくる技術が述べられているが、これらは１０度の影の統合、１１度の物理化と、非常に密接に結びついている事例だ。夢見たことは、実現すること、という単純さがこの度数の特徴だ。ちょっとしたアイデアを企業化できる人など。"}, "乙女座_12": {"sign": "乙女座", "degree": 12, "symbol_ja": "結婚式のあと、新郎が新婦からヴェールをはぎ取る", "explanation": "１１度は、母親があたかも子供を産むかのようなたとえで語られる女性的な夢の実現の方法だった。だが１２度は男性的な意志力や、実行力が強調されている。新婦というシンボルは、自然界にも置き換えられる。つまり男性的な、自然界に対して優位に立つ能動的な能力を発揮して、あたかもヴェールをはぎ取るかのように、いままで知られることのなかった自然界の神秘を明らかにする才能だ。また支配力、指導力に関係する度数だ。あるいは女性の夢を実現する男性の、保護的な力とも受け取れる。真理解明の探求心はかなり強調されていて、精神的にたよりがいのある人柄を持つ度数だと思う。"}, "乙女座_13": {"sign": "乙女座", "degree": 13, "symbol_ja": "パワフルな政治家が政治的な内紛（ヒステリー）状態を克服する", "explanation": "自然界の混沌とした影響や、秩序化して整理する意志。１２度では、解明すべき神秘の宝庫の女性は自然界だった。だが、１３度では、この女性は大衆や社会に姿を変える。大衆や集合意識の構造化できなかった過去の心、習慣、さまざまな混沌とした心を伴った、あばれる本能的な要素を、ひとつの明確な基準にそって秩序化し、沈静するカリスマ的な人物を暗示。彼は社会を構築し、形のないものを明確な形にする。それゆえ、その社会から見て、父としての位置づけにはまることになる。とらえどころのない神秘的な作用をもつカリスマとしてあらわれると述べられているが、１２度は自然界に対し、１３度は人心と社会に対して（獅子座を象徴とするもの全体に対して）指導力として顕示すると考えればよい。多くの指導者に、この度数が頻繁にあらわれている。"}, "乙女座_14": {"sign": "乙女座", "degree": 14, "symbol_ja": "貴族的な家系図", "explanation": "真の創造力や自発的な危機回避能力、解決能力は、先祖からもたらされた能力を受け継いだ流れのなかで育成された能力だ。人は単独に発達してこなかったし、長い歴史のなかで、ひとつの根っこから引き継いだ意志によって行動する。この度数を持つ人は、人格の完全な開花のために、自分の魂や人格の、直接の母体となる古い根っこを確認することになるだろう。自己の霊系とかに気づく。その流れのなかで、自分の作業を完成させようとする。ひとつの理想像は、個人単独ではつくり出すことができないことを自覚する。根源的な底力だといえよう。この度数を持つ人に、家系図に熱中したり、先祖を研究したりする人が多く見られるが、血筋的に強い根っこをもっているケースが多いようだ。たとえ今の家柄がごく普通に見えても、よく調べて見ると、そこには大きな先祖の力が息づいていることに気がつくだろう。"}, "乙女座_15": {"sign": "乙女座", "degree": 15, "symbol_ja": "勇敢な祖先から受け継いだ家宝である、見事なレースのハンカチ", "explanation": "レースのハンカチは貴族的な開花。過去から受け継がれた業績の精髄の上に立って、その目的の線上で行為する場合、先祖からのさまざまな能力を引きつぎ、多くの恩恵を受けることができる。ここでは貴族的な気質などが強調されていて、霊的な糸から彼のために織り上げたものを彼に手渡すのだと、ルディアは述べている。乙女座１１度からはじまる人類史は、１２度で自然を克服し、１３度で社会を形成し、１４、１５度が子孫への伝達を意味している。この度数を持つ人は、家柄などに拘束される可能性はとても大きいが、それ以上に、すばらしいものを受け継ぐことが多い。自己のルーツを明確に確認した上で、自分の目的を知ることが重要だ。\nNo. 34／72区分（乙女座１６度～２０度）「衝撃」 潜在意識の反撃\n人工的に育成されてきた自我には、必ず自然本能からの反撃が生じる。この反撃によって自我は崩壊するが、この瞬間、新しい未来が開けてくることも事実である。自我と本能の緊張関係のなかで、新しい自我を構築する。"}, "乙女座_16": {"sign": "乙女座", "degree": 16, "symbol_ja": "動物園で、子供たちがオランウータンに面と面を突き合わせる場所まで連れていかれる", "explanation": "猿の種族はアトランティスなど古代文明種族の退化した姿だといわれる。またここでは動物的な衝動という、人らしからぬ衝撃に出会うことで、自己の忘れてしまったはずのカルマに直面する。乙女座の人らしさを追求する試みは、獅子座の抑圧の上に成り立っていて、ここでその古い力の反逆に出会うのだ。予想だにしなかった原始的な\\\"わたし\\\"に遭遇する状況のなかで、ショックを受けるような体験がある。自己の根底に隠していた動物的な側面への気づきは、自分のなかからではなく、ごく身近な他者からもたらされるかもしれない。たとえばいかにも乙女座らしい女性がセクシャル・ハラスメントに会いやすくなるのも、そのあらわれだ。注意が必要だろう。"}, "乙女座_17": {"sign": "乙女座", "degree": 17, "symbol_ja": "火山の爆発", "explanation": "潜在意識のなかに抑圧されてきた力の爆発。１６度で出会った潜在意識の力は、ここでいよいよ生活の表舞台にあらわれて爆発する。これは自我を破壊する危険性をもっている。だが、火の力による浄化とも考えられ、人格的な自我の効力がここで空にされる。ある意味ではやはり緊張の解放だ。この度数以前に１４度から温存されてきた家系的な価値は、ここで無効にされる可能性がある。何人かこの度数の持ち主を観察していて、彼らのなかには突然のショックなどに出会いやすいことが判明しているが、潜在意識からの反撃は、本当の自己発見への導きとして積極的な意味で取り組むべきだろうと思われる。"}, "乙女座_18": {"sign": "乙女座", "degree": 18, "symbol_ja": "ウィジャ盤（西洋版こっくりさん）", "explanation": "潜在意識からの衝撃によって、いままでの自我があらかた破壊されてしまうと、今後の生きる方針を考える場合、意識の深いレベルから到来するメッセージを読む技術が大切になってくる。これが占い的な能力として成長するケースが多い。この度数を持つ人は占い師とくにアストロロジャーとして有能であるといわれている。この度数では、まだ潜在意識から届くメッセージを意識的に制御しておらず、むしろ制御しないことで、深いものをのぞくという技能だ。牡羊座９度、水瓶座１３度とこの度数の３つは、占いに関連した職業を持っている人の大半にあらわれてくる。とくに個人が今後どう生きるべきか、という難問に正しい解答を探り出すことのできる能力が、この度数だといえる。"}, "乙女座_19": {"sign": "乙女座", "degree": 19, "symbol_ja": "水泳競技", "explanation": "１８度で受動的な範囲で潜在意識の情報をかいま見ることができる技能の発達した人は、やがて１９度で、のぞいた世界を能動的に泳ぐことを学ぶ。ここで扱われている水は、潜在意識の、神秘学でいうアストラル世界のことで、この水泳が幽体離説（OOBE）を暗示する可能性もあるかもしれない。目的の場所にいき、また泳いでもどってくる技術を身につけ、より高度な精神の可能性を知る。また魔術的な能動的な能力をあらわすことも多い。別の意味では、集団で競いあうことで、お互いに刺激しあう意味もある。しかし、水泳の訓練は、たいてい潜在意識や心の訓練と結びついていることに、案外と多くの人が気がついていないようだ。"}, "乙女座_20": {"sign": "乙女座", "degree": 20, "symbol_ja": "車の一行が（米国の）西海岸を目指している", "explanation": "競争で力を競いあうのではなく、人々と調和的につらなって、ある新しい世界にむかうという意味があらわれる。新しい世界とはなんだろうか？西海岸は、少なくとも、人の動物的な資質を示すオランウータンを抑圧している世界ではなく、種々の欲望や、さまざまな感情を容認する開かれた世界だと思う。まるでパンドラの箱のような印象を感じさせる西海岸。さまざまな破天荒な冒険も許される自由な世界の象徴。そこはいろいろと刺激的な世界でもある。潜在意識が開く種々の可能性と危険を、仲間同士で協力しあいながら、歩いていくことを意味する。血筋とか、民族などにはこだわらない関係で、協力しあって、新天地を目指すこと。潜在的な可能性を多様なバラエティある発展へむかわせようとしている。\nNo. 35／72区分（乙女座２１度～２５度）「達成」\n実務的な能力の頂点的な発達\n人と協調することで、より高い目標に到達する。卓越した能力と責任感に基づいた、職業的な有能さを示す。"}, "乙女座_21": {"sign": "乙女座", "degree": 21, "symbol_ja": "女の子のバスケットボール・チーム", "explanation": "集団的な参加の感情を学ぶために、スポーツ競技を利用する。頭より高い目標地点に、ボールを協同して運んでいき投げるという象徴は、いままでの自分よりもより高度な目的にむけて、仲間とバトンタッチしながら協同的にはたらく、心をより高いものを照準にしてひとつにしていく、という意味でもある。これは協同するという単純な意味だけでなく、つねに柔軟な対応のできる集団である、ということ。より高度な事柄に敏感で、受容性のある集団。この度数を持つ人は、何人かの複数のスタッフと協同して仕事をすることにとてもむいているし、組織的な適応性が高いだろう。"}, "乙女座_22": {"sign": "乙女座", "degree": 22, "symbol_ja": "高価な宝石に彩られた王家の紋章", "explanation": "ここでは王家ということがあらわれていて、これは社会全体のなかで機能するある特別なステイタスと実力を暗示する。紋章は、集合的な地位や霊的な任務を表わしているが、それを身につける者は、その任務の責任をもたねばならない。この度数を持つ人は、独特の優雅な資質を感じさせる。共通した特性として、ステイタスをもちながら、それを表立って利用したがらない性質があるようだ。だが、地位にまつわる責任や重圧を、この度数の持ち主は引き受けねばならない。なんらかの分野で、王者のような立場に立つことができる。バスケットボールの女の子たちが集団で追求したゴールには、この王家の優れた力と責任を果たす玉座ができ上がってしまった。神的な要素を、社会にもち込む中心の場のようなはたらき。"}, "乙女座_23": {"sign": "乙女座", "degree": 23, "symbol_ja": "ライオン使いが、自分の技術と気骨を示す", "explanation": "真の優れた人は、最後に残ったプライドをこの度数で乗り越えなくてはならない。ライオンは誇りのある生命エネルギーであり、それは２２度の王の属性。個人はステイタスからくる誇りにそこなわれないようにしなくてはならない。この場合、シンボルから想像されるような、自己の動物的な資質やそれに対する恐怖を乗り越える訓練をする、という意味よりも、もう少し高度な発達段階だ。一番大切にし、よりどころにしていた価値をどう犠牲にするか。どう超越するか。もっとも優れたアイデンティティを形成していたものを、捨てる。捨てることで自由になる。進行法でこの度数があらわれた場合、自尊心を捨てさせられる体験をすることが多いようだ。"}, "乙女座_24": {"sign": "乙女座", "degree": 24, "symbol_ja": "メリーさんと、メリーさんの子羊", "explanation": "個人の卓越性に対する依存心を捨てて、その先にむかうとき、幼児のような心がもどってくる。この度数を持つ者は、かつて王家というステイタス、そしてそれの誇りを制御するという主題に取り組んだ。すべてを捨てたあとは、なにもない素朴は少女のような、そして子ヒツジのような精神にもどることを暗示する。人間に共通した純朴さ、子供らしさを取りもどす。これは未熟な幼児性ではなく、意識的に獲得された子供らしさである。無垢の姿勢でのみ、霊的な力に関与できる、という意味もあり、またこれ以後の度数の進化に必要な身軽さ、スピーディで透明な感受性が要求されている。この度数を持つ人は子供のような単純さでものごとを考えるので、複雑さにごまかされない目をもっている。"}, "乙女座_25": {"sign": "乙女座", "degree": 25, "symbol_ja": "公的な建物の前に掲げられた半旗", "explanation": "仕事を責任をもって果たすことのできた人は、そろそろ乙女座のサイクルを終わるにあたって、さらに高度な精神的な道に入る準備をする。世俗的な意味での職業経歴は、この度数でほぼ終了し、彼は自由な身にならなければならない。だが、たとえばこの人がいなくなっても、会社が傾かないように後継者を育てたり、今後の収入面を維持できるような準備をしたり、残務整理的なことに気を配らねばならない。より高度な世界に赴くために、経歴を完成させること。反旗というのは、弔意を示すので、社会的な経歴から、この人が手を引くこと、すなわち職業人としては死ぬことを意味している。かといって、いきなり手を引くのではなく、いままでの水準を落とさないようにして去る、という工夫に力を使わねばならない。\nNo.\n36／72区分（乙女座２６度～３０度）「弟子」「個」としてのあり方を純化して、神聖な世界へ\n個人でできることのすべてを終えると、もっと超越的な力の介在への憧れが生じる。ここから宗教的な心が芽生える。限界を認知することで、より大きな可能性が開かれることを自覚する。"}, "乙女座_26": {"sign": "乙女座", "degree": 26, "symbol_ja": "香炉をもって、祭壇のそばにいる神父の侍者を務める少年", "explanation": "自分の理解を超えた事柄を学ぶため、徒弟のような立場に立つ。徒弟というよりは、これはデッチ奉公のようなものだ。右も左もわからない未知な世界では、まず参加することに重点がおかれる。学習するにも、まず慣れる必要がある。著者が観察するかぎりでは、この度数の持ち主に、精神世界や、宗教的な活動に参加する人は多い。神聖な力がはたらく場なり組織なりに、参加することで、自分にその影響を取り込むことなのだ。社会的にできることがすべて２５度までで完成したら、新しい進化の道を求めて、もう一度徒弟としての少年にもどるのだ。神秘的なことを学習するため、どこかに参加すること。"}, "乙女座_27": {"sign": "乙女座", "degree": 27, "symbol_ja": "貴族の女性たちが、宮廷での職務として、儀式的に出会う", "explanation": "王様は宇宙を支配する力の象徴だとすれば、宮廷の貴婦人たちは、その威容と権威をを維持するために、実際的な種々の任務を遂行するブレーンだ。ヘルメス文書に、太陽のまわりをめぐる１２の聖霊たち、という記述があるが、貴婦人たちはこの聖霊たちに似ている。これは単なる実務的な業務能力を意味していない。形式的な厳格さとか、威厳とか、尊敬など「神的な」作業に参加し、それを助ける、というはたらきが強化されている。崇拝される伝統的な儀式を実行する能力とキイノートがあり、この度数はわかりやすくいうと、神官のそばでつかえるミコのような立場の力を暗示していると思う。バイプレーヤーとして最高の能力をもつ。この立場にある人を企業でも、また宗教団体でも、よく見かける。権威の維持のための独特の才能をもっている。"}, "乙女座_28": {"sign": "乙女座", "degree": 28, "symbol_ja": "力をつかまえた禿頭の男", "explanation": "伝統や形式は、つねに本質的な力に挑戦を受ける。分解作用のある人物が浮上し、とルディアは述べているが、あらゆる伝統のなかで、変革的な強制的な力を実行する人物があらわれる。変化の必要性があるときに、非情なまでの決断力を実行しなくてはならない。力と意志をもって状況に対処する。意味のないものを破壊する。強制的につき進む。もし２７度が、神学構造での秩序正しいヒエラルキアを維持するものだとすれば、それらを破壊してもう一度本質的な力の活性化をはかろうとする、サマエル（サターン）が、この度数の象徴となる。だがこれは反逆者でなく、王（神）の裏の姿でもある。さけられない変化。意志の強烈な人柄、ものごとを飾りでなく本質だけで見つめようとする姿勢。"}, "乙女座_29": {"sign": "乙女座", "degree": 29, "symbol_ja": "オカルトの知識を求める者が自分の心を啓発する古代の巻物を読む", "explanation": "存在の本質的な面で、なにが真実かを探求する。依存できる伝統的な、あるいはシステム的な神学構造が破壊された後で、急いで、自分にもっとも大切なものとはなにか、を確認しようとしている姿。純粋な素朴な啓示に回帰して、ものごとを考え直すこと。構築され、破壊され、という繰り返しの地上のサイクルから脱出して、永遠に真実に思えるものに、彼はジャンプする準備をする。存在の本質、いままでの自分を超えるむこう岸にいたるのに必要な技術が獲得されねばならないので、彼は時間を超えた真実に心を集中させなくてはならない。この度数の持ち主は、もっとも本質的な知恵を探求する。そしてなにをすれば自分を超えて、本質の世界におもむくことができるか、はっきりと手がかりをつかむことができる。"}, "乙女座_30": {"sign": "乙女座", "degree": 30, "symbol_ja": "急ぎの仕事を片づけることに完全に専心しているために、１人の男がどんな誘惑にも耳を傾けないでいる", "explanation": "ささいなことにはいっさい患わされることなく、自分を超えるためには、なにが必要かはっきりと見据えて集中している状態。乙女座は、他者に対しては開かない、個人性のなかに閉じこもった星座だ。この乙女座を後にして、より広い世界にむかわねばならない。いままでの自分を超えるというのは、ひとつの試験のようなものだし、暗い崖の前に立っているような恐怖感も感じるかもしれない。だが、あれこれと思い悩むと、せっかくの機会を失うことになりかねない。ここでは主観的な意識から、客観的な意識へジャンプするために、自分の殻を捨てねばならない時期がきていることをあらわしている。この度数を持つ人は、人生そのものがひとつのイニシエーションのようなものだと考えるべきだ。しかし気迷いも増加する。無駄なことに煩わされないように気をつけるべき。\nNo. 37／72区分（天秤座１度～５度）「人格」 変容の過程\n自己をあたかも他人から見るかのように認知する。ひとつの個性の標本として、自分も他人も、公平な価値を持っている。この個性から、新しい人生が開けてくる。"}, "天秤座_1": {"sign": "天秤座", "degree": 1, "symbol_ja": "多くの生物学的な形態の完全な標本の収集の中に、一匹の蝶が、細い針で突き刺されている", "explanation": "１２星座の牡羊座から、乙女座までの前半サイクルが「個」の確立を主題にしているとしたら、天秤座以後魚座までの後半サイクルは、「集合性」のなかでの生き方の確立を主題にしている。その集合性のサイクルのはじまりのこの度数では、自分からみた自己像ではなく、人から自分がどう見えているかを、自分ではっきりと認識し、人から見える自分という人格像を受け入れることを意味している。自分を、他の多くの人のなかの一人にすぎないとみなすことが、この度数のテーマだ。客観的な自己像に気がつき、対人関係のなかで、この人格像に束縛されることを受け入れる。象徴のなかに描かれている細い針は、ひとつの意志をあらわしていて、ある目的で統一した自分像を確立すること。乙女座までの個人の主観的な意識へ自閉症的に閉じこもっていた人は、この度数ではじめて、他者との本当の意思疎通を実現することができるようになる。"}, "天秤座_2": {"sign": "天秤座", "degree": 2, "symbol_ja": "過去の体験の果実が、永遠に創造的な霊の種子の実現へ変成する", "explanation": "新しく確立した人格像が、新しい人生の可能性を開く。性格が運命を導くとは、よくいわれる言葉だが、他者との関係のなかで新しく築かれた人格が、次々と目新らしい可能性を開いてゆき、未来について新鮮な期待がもてる度数だ。植物が種を吐き出し、この種は土壌のなかで、自然にその種にふさわしい発芽をしていく。種子の発芽は、本人が意識していなくても、環境が変化していくことで実感されるだろう。確信に満ちて、自分の信じている方向へ歩み出す。とはいっても、ここでは象徴に「永遠に創造的な霊」と書かれているように、具体的な人生のなかでの事業の可能性とか社会的な発展というものとは位相が違うようだ。心理学でいう元型、つまりその人の魂の形態のようなものが導く運命が開かれていくという度数だ。"}, "天秤座_3": {"sign": "天秤座", "degree": 3, "symbol_ja": "新しい日の夜明けが、すべてが変わっていることを明らかにする", "explanation": "ルディアは天秤の１、２、３度を変成のプロセスの三位一体と解釈しているので、この３つの度数を引用してみよう。\n（１度）不死の完成形態を体験する。\n（２度）「形と名前を超えたところ」に到達するために、形態にかかわっているエネルギーを解放する。\n（３度）新しい創造活動により、エネルギーを再び具体化する。\n天秤座３度では自分の周囲の状況があらかた違うものに変わっていることに、ある日はたと気がつくことになる。習慣にしたがう日常の意識はこうした深い動機に無自覚なことが多く、気がつくと、状況はまわりのほうから先に変化している、ということが多い。生き方をはっきりと変えなくてはならない。心機一転生き直すという体験がここでは多くなることを指摘しておこう。"}, "天秤座_4": {"sign": "天秤座", "degree": 4, "symbol_ja": "キャンプファイアーのまわりに、若い人々の集団が霊的な交渉を保ちながら座っている", "explanation": "新しい目的の実現のために、おなじ意志を持つ者たちが集まり、初心の気持ちで語りあい、意志を煮詰める。仲間の輪の中心には、始源的なイメージを刺激する炎が燃えていて、このなかで、心の底から本当の気持ちを確認しあう。形の上ではまだなにも固まっていない初心の状態で、意欲的になること。連帯。小さな範囲からはじめるグループ性。内面の力を実行にむけて準備すること、意志を固めること。進行法で、この天秤座３度や４度を通過しているときには、いままで維持していた社会的な立場や仕事がつづけられなくなり、創造的な気分に満ちて、心機一転、人生の計画を練り直すということが起こりやすい。そして、このときには共通した意志をもった仲間が必ずいて、みんなで相談しあいながら進むとよい時期だ。シンボルイメージどおりに解釈すれば、若者のつどいとか、レジャー、結婚相談所などに関連した職種もむいているということになる。"}, "天秤座_5": {"sign": "天秤座", "degree": 5, "symbol_ja": "自分の生徒に、「新しい世界」を建設可能にする、内的な知識の基礎を明らかにする人", "explanation": "より優れた人から、生徒に伝達される知識。先生と生徒の関係。４度のキャンプファイヤーで目的が明確になった仲間は、自分たちに役立つ知識をもっている先生に遭遇する。弟子に準備ができれば先生があらわれる、というたとえをそのままあらわした度数だといわれている。これは弟子のなかですでに力が固まっていて、あとは先生が弟子の潜在的な資質を刺激するだけでよいという状況だ。対向にある度数は、牡羊座５度。これは抽象的あるいは超越的な理想を暗示する度数なので、この天秤座の位置では、明確に理想が明らかにされる、と考えられる。集団を統率する理想だ。その後の人生で重要な鍵となるような知識を手に入れる機会が訪れる、という出方をしやすい。\nNo. 38／72区分（天秤座６度～１０度）「願望」\n理想を実現化するときに現れる反動や否定性の処理\n願望を実現する。この実現という行為に出た瞬間に、必然的に生じる否定的な反撃をいかに処理するかに、多くの時間を費やす。"}, "天秤座_6": {"sign": "天秤座", "degree": 6, "symbol_ja": "人が、内的なヴィジョンを前にして、自分の理想が具体的な形をとるのを観察する", "explanation": "自分の心のなかにあるビジョンを、実現・物質化するために、そのイメージをすみからすみまで、ありありと思い浮かべる。極度に克明なイメージは実現される、と願望実現イメージ瞑想で実証されていることだが、この度数はそれに通じてくる人だ。漠然とした願望は、心と物質をつないでいるある通路を通らないので、これはなかなか形になることがない。この度数は、その想像と現実のあいだの連絡がはっきりと確立されることを暗示する。だが、これはまた個人が不安に思ったことや妄想で考えたりしたことも、形になってしまうとか、また個人の気持ちが外界に投影されてしまう傾向も示すことになるので注意しなくてはならない。なにかなしたい意志があるときには、それをイメージ化し、ありありと思い浮かべよう。"}, "天秤座_7": {"sign": "天秤座", "degree": 7, "symbol_ja": "鶏の雛に餌をやり、鷹から守ってやっている女性", "explanation": "心のなかにある理想イメージを実現しようと決意した段階で、すぐさま反動があらわれる。これは自分の心のなかに巣くう保守的な感情かもしれないし、また他者の反感や悪意であらわれることも。個人はそれに脅かされ、それに対処しなくてはならなくなる。願望を実現しようとすれば、つねにこの否定的な問題を解決しなくてはならない。この度数の持ち主は、自分がいろいろとしたいことをつねに妨げる障害物なり敵意ある存在に出会いやすい。鶏を保護する女性は、より大きな霊（鷹）よりも、日常性（鶏）を保護しようとする弱気な感情を暗示する。変革への恐れ。この度数の持ち主は、こうした反動的、対立的影響と戦わねばならない。具体的には心霊攻撃などに遭遇しやすい。対向の牡羊座７度が、二元論を意味する度数であるように、白い魔術と黒い魔術の戦いというイメージに支配されやすい。"}, "天秤座_8": {"sign": "天秤座", "degree": 8, "symbol_ja": "人の住まなくなった家で燃え立つ暖炉", "explanation": "永遠に再生する再出発の希望。７度で反動の側に負けてしまった個人は、もう一度本来の積極的な希望ある努力にもどる契機が何度も訪れる。主人のいない家でも、いつまでも暖かい暖炉が燃えているという象徴で、７度で受けた心の傷は徐々に修復されていくという度数だ。やり直し。軌道修正すること。より大きな包容力に出会うこと。傷ついたわれわれ個人の姿勢そのものや傷口を直接追求することなく、もう一度やり直しをして、回復を待つという意味も。核心部分にはしばらく触れないままで、なにかを努力しつづけること（主人のいない家にもかかわらず、暖炉を燃やすこと）。対向にある牡羊座８度の、霊的な教育ということを考慮に入れれば、もう一度精神的な問題について、学習をあらたにしなおすという意味がある。しかし、天秤座７度とともに、この流れはオカルト的なエネルギーをあらわすので、心霊的にきわめて敏感な体質であることに注意しなくてはならない。"}, "天秤座_9": {"sign": "天秤座", "degree": 9, "symbol_ja": "３人の「年取ったマスター（大家、巨匠）がアート・ギャラリーのなかの特別室の壁にもたれかかっている", "explanation": "自己実現をするには、大きな展望のもとに、長期にわたる努力が必要だ。過去の精神修養の伝統とか、先人の偉大な業績に対して尊敬の念が高まる。そして自己実現の願望も、個人的なものではなく、実は古い時代から多くの人が同じように追求してきた事柄であり、自分の試みもなにも特別なものではなかった、と気がつき、奉仕的な長期にわたる自己修練の道を志すようになる。人類が交わった遠い昔のグルとの契約。無償の行為をつづける訓練に入ること。この度数を持つ人は、いろんな組織や団体で、世話人のような立場になりやすい。対向にある牡羊座９度は、水晶を見つめる男。同じように、天秤座９度でも、絵やビジョンのなかに、偉大なるものの影を感じとり、それとの遠い間接的な関係を通じて、自分を磨く。"}, "天秤座_10": {"sign": "天秤座", "degree": 10, "symbol_ja": "狭い急流を無事に渡って、カヌーが静かな水面にたどりつく", "explanation": "天秤座６度から、人間が願望を実現するさいに遭遇する、大きな反動や不安な感情などを体験する過程がはじまったが、１０度で、あらかた人の心の法則について知り抜くところまでいたることができた。ある程度自分の感情のはたらきをコントロールすることができるし、心理的に揺れても、そのなかで平静を装うこともできるようになった。自己の目的を果たすには、いろいろな出来事が起こり、多くの人が挫折しそうになるが、こうした心のはたらきに対して熟知していく度数だ。内的な啓示・直感を躊躇することなく、表現できる勇気もある。ものごとを実現するのに、十分な慎重さをもった人だといえる。\nNo.\n39／72区分（天秤座１１度～１５度）「研究」知性の伝達に必要な工夫、探究の方法\n客観的な知識の獲得と、その伝達、教授すること、研究すること。あまりにも深く集中する傾向の人も多いので、意識と潜在意識のうまい利用法を確立し、自分特有の学習リズムを獲得しなくてはならない。"}, "天秤座_11": {"sign": "天秤座", "degree": 11, "symbol_ja": "眼鏡越しに、自分の生徒をじっと見る教授", "explanation": "指導したり教えたりする人に多くあらわれてくる度数。眼鏡は自分特有のものの見方をあらわしている。が、生徒に知識を伝達するときに、眼鏡をずらして、生徒にあわせた見方をする、という解釈から、知識を他の多くの人に伝達するときに、わかりにくいものは、相手にあわせて、わかりやすく工夫して、伝えていくことができる能力。知識の伝達に伴う困難を解決できる。指導する場合に生ずる特有の問題はたくさんあるが、この度数の人はいろいろと工夫しながら、教授したり、指導したりできる人だ。偏見を越えて、人を素直に見ることの必要性。自分のもっている知識や能力を、他人のためにいかす。"}, "天秤座_12": {"sign": "天秤座", "degree": 12, "symbol_ja": "鉱夫たちが、深い炭鉱から表に出てくる", "explanation": "鉱脈から必要な素材を抽出する。非常に激しい知的な努力、ときには頭痛や吐き気、窒息しそうなくらいの集中力を発揮して、人々のために役立つ知識を開発する。発見する。考え出す。大変にグレードの高い知的探求能力。緊張を伴う暗い探求。炭鉱は深層心理的な面を暗示するとすれば、この度数は、心理学的な分野での才能をあらわしている。だが、あまりにも集中的な精神をもっているために、しばしば日常生活で健康が不調になりやすい人も暗示する。もっとのびのびと気楽な生活をする工夫を考えてみよう。天秤座１１度と１２度は、学者や研究者特有の無理な姿勢をあらわしているのだ。"}, "天秤座_13": {"sign": "天秤座", "degree": 13, "symbol_ja": "シャボン玉を膨らませる子供たち", "explanation": "想像力とファンタジーの能力。知的なゲームをすることで、さまざまな仮説や技術、試案が生み出される。作られては消え、作られては消えるが、ここで知性は鍛えられ、応用的な能力が発達する。実用性と深刻さ、真剣さに欠けていると思われるが、これは知能の洗練に不可欠な要素だと思う。近年「知の遊び」は随分と流行してくるようになった。この度数を持つ人は、頭脳的に発達しており、雑学的教養を身につける傾向が強い。博覧強記の人物。読書においても、ある分野だけに傾倒せず、次々とさまざまな課題を制覇する。知性をひとつのゲームとして扱う姿勢である。１１、１２、１３度とも、学校の先生に頻繁にあらわれる度数だ。"}, "天秤座_14": {"sign": "天秤座", "degree": 14, "symbol_ja": "真昼の暑い時間帯に、男が昼寝をする", "explanation": "いくら考えても解決できなかった問題について考えるには、潜在意識の協力を必要とする。テーマに集中した後で、昼寝すると、ある種の意識の潜伏期を経て、目覚めたときにふっと解決策が浮かぶ、という体験。異質ななじめない知識も、こうすることで、脳に完全な形で消化される。これは右脳と左脳、つまり自我と潜在意識をうまく共同的に扱う技術だ。このために、忙しくはたらく現代人の生活と、こんどは夢のなかを漂うような休息の場を交互に行き来する生活姿勢が必要となる。対向は、牡羊座の１４度だが、この天秤座でも同じように、意識と無意識という対立要素を結びつけることがテーマだ。この人がものごとを理解するには、時間がかかるが、それは表面的ではなく、真に理解しようとするからだ。"}, "天秤座_15": {"sign": "天秤座", "degree": 15, "symbol_ja": "環状の道", "explanation": "社会生活の安定した規則的なリズムが必要な時期に差しかかる。知識の探求のために、心身のバランスを壊してまで集中するのでなく、規則的なリズミカルな暮らしのなかで、知識が発達していく過程をあらわしている。ルーチンな規則的な生活のなかで、はじめて超越的な優れた問題を扱うことができる。というのも、人間の生活はどんな細部までも、緊張と弛緩の繰り返しでなりたっていて、このリズムが自我意識と、潜在意識の手をとりあったバランスある関係をつくり出しているからだ。このリズムを無視して、いきなり集中的な学習をしても、心は新しいものを受け入れる許容度をすぐに獲得するわけではない。この度数の持ち主は、規則的な生活のリズムを巧妙に利用して、優れた業績や研究をする人を暗示している。のんびりしているようでいて、効率的に心身を利用できる人である。\nNo. 40／72区分（天秤座１６度～２０度）「傷痕」\n潜在意識を扱いかねて傷つき、修復する\n人と深く関わることで、主観的な自我に傷を負う。この傷を見つめることで、真実の理解に到達する。"}, "天秤座_16": {"sign": "天秤座", "degree": 16, "symbol_ja": "嵐のあとに、船が修理を必要として陸に上がっている", "explanation": "海は、未知の世界。とくに潜在意識をあらわしている。この上を航行する船は、人の自我をあらわしているが、ときには大きな危険に遭遇して、傷つき、陸地という、既知の常識的な世界にもどって、回復を待たねばならないような事態に遭遇する。対人関係などで激しく傷つき、そこから逃げ出さねばならなくなる。たいていこうした傷や危険は、自己流のアプローチによる過ちが原因であることがほとんどだ。この度数の持ち主は、こうした危険な状況に出会いやすいので、注意が必要だ。とくに、深層心理を扱うような問題には、よほど能力のあるアドバイザーがいない限り、自分から飛びこまないほうがいいといえる。"}, "天秤座_17": {"sign": "天秤座", "degree": 17, "symbol_ja": "仕事を退いた船長が、港に出入りする船を見ている", "explanation": "陸に打ち上げられ、航行が不可能となった船の船長は、航海をやめたので、不安な気持ちはいまはない。だが、かつての航海での事故や不測の事態はなにが原因だったのか、反省している。過去をチェックし、分析し原因をつきあてる。また多くの他の船（人）を観察している。他の人に、過去の体験にもとづいて、アドバイスできる能力。自分の人生を客観視して、分析すること。昔はいろいろあった、と他の人に思い出話をするような姿勢。天秤座の１６度がしばしば危険な事故をあらわすことが多いので、これが心のトラウマ（傷）となり、１７度の度数の人は、ひっこみ思案になっている状況だと思われる。過去の失敗について、いろいろと考え分析している姿。"}, "天秤座_18": {"sign": "天秤座", "degree": 18, "symbol_ja": "２人の男が逮捕され、拘置されている", "explanation": "個人と社会の建設的な関係の崩壊。社会と個人の関係は基本的な秩序があるが、この秩序という面では、社会が許容することができない個人の存在を暗示する度数。危険人物、不穏な計画をもっている個人を、社会は追放するか、個人が機能しないように、拘置する。１６度のトラウマから、この度数の持ち主は、不満を抱えていて、これが社会全体の調和を乱す行動へと駆り立てる。だが革命的な斬新なアイデアをもって行動し、その結果がどのような事態になるか、はっきりと受け取る決意をもって行動している場合もある。結果を直視すること。たとえ彼のいうことが客観的に正しいことであっても、他の多くの人々との調和的な関係が保てないあいだは、彼はたんなる異分子でしかない。まだ社会とのズレがあるのでこの不満はなかなか癒えることはない。"}, "天秤座_19": {"sign": "天秤座", "degree": 19, "symbol_ja": "泥棒の一味が隠れている", "explanation": "勝てば官軍、負ければ賊軍という言葉があるように、社会に対しての不満からくる新しい提案は、個人が主張するかぎり見向きもされないが、集団での抗議となれば、やがて正当な主張だとみなされる。不満に対する抗議行動も、社会に受け入れられれば、尊敬される改革者とみなされる。１８度の姿勢を反省して、集団社会との建設的な関係の回復を目指した人々は、レジスタンス的な行動で、自分たちの意志を通すようになる。１６度からこの度数までは、一連の物語のように構成されている。対人関係で大きく傷ついた１６度の人は、一度退散し、反省する（１７度）が、こんどは内側からの不満の感情が吹き出す。だが、積極的な姿勢で、自分たちの意志を通そうとする、という過程だ。だがこのシンボルイメージが物語るように、なにか浮かばれない感情があることは否定できない。"}, "天秤座_20": {"sign": "天秤座", "degree": 20, "symbol_ja": "自分の務めをとり行うラビ", "explanation": "自己流の行き方で、対人関係などに失敗し、傷ついた人は、この問題をすべて解決するために、伝統的な生き方とか、また古い宗教などに、心の安定を求めるようになる。偉大な宗教家が、その前半生で、大きく傷ついた経歴をもっているように、この度数は、苦い体験が前提にある。個人は、集団との関係や、また潜在意識との関係を、もっとも安全に回復させるには、やはり古来から続いた伝統的な道に依存することが賢明だと気がつく。そこには非常に多くの人が実践し、確かめてきた膨大なマニュアルがあるからだ。自己流の知識ではなく、伝統の知恵を借りること。古来の宗教的な方法に回帰する。他の個人が自分と同じ失敗をしないように、アドバイスし、指導すること。多くの人に信頼される立場。\nNo. 41／72区分（天秤座２１度～２５度）「同調」自然界の力を乗りこなす\n自然界の力をうまく利用することで、自分もまた他者も、ある有為な行為に乗り出すことができる。いわば天地の運気を利用する力を身につける。"}, "天秤座_21": {"sign": "天秤座", "degree": 21, "symbol_ja": "海岸を楽しむ日曜日の人だかり", "explanation": "海岸で休暇を楽しむ人々は、日常の義務や仕事を脱ぎ捨ててやってきた人々だ。ここでは、どんな人もただの人。種族、年齢、思想、境遇を超えて、母なる海に触れることで、生命の基本的な共感の喜びを体験できる。また自然界から豊かな生命力をも補充される。リラックスし、健康も回復する。社会的な仲間意識の育成に、こうした自然の力を借りること、これらとともに考えていく姿勢。人々に休息とか、楽しみを与えていく仕事にむいている度数だ。ゆりかごのようなやすらぎがあるので、この度数の人は人々から愛される。はればれとした解放感、満足感が味わえる。母親的な愛情を暗示することも多く、包容力の豊かな人だ。"}, "天秤座_22": {"sign": "天秤座", "degree": 22, "symbol_ja": "噴水で鳥に水をやる子供", "explanation": "陸地の果てにある海は、生命を根源的に癒す力をもっている。しかし、海に出かけていくことのできない人に対して、ここでは、その海の力のいく分かを代行できるような、噴水が作られ、水が与えられる。思いやりをもって、人を助けようとする人をあらわしている。子供という象徴は、これが計画された福祉や奉仕でなく、その場その場であらわれる、人に対する素朴な気遣いの心を表現していて、必要なつどあらわれる、霊的な成長を促す対人関係などを暗示するケースも多い。自分より進化していない魂に対して、援助する行為。人生のなかで、予期せぬ形であらわれる援助。それがこの人を非常に豊かな成長に導く。"}, "天秤座_23": {"sign": "天秤座", "degree": 23, "symbol_ja": "雄鳥の声が日の出を告げる", "explanation": "東の地平線で夜が明けはじめるときに鳴く雄鳥は、自分が日の出を導いたと錯覚するが、それは誤りで、自然界のサイクルとして、日の出が到来したときに、そこに雄鳥が居合わせたにすぎない。だが宇宙的な力が、雄鳥を通路として、姿をあらわしたというのも事実。この度数を持つ人は、ものごとの移り変わり、気運の盛り上がり、なにか大きな出来事が起こっている現場に居合わせて、その動きに乗ることで、積極的な優れた能力を発揮する。世間の気運の動きに敏感で、それを自己表現を生かす機会として利用できるのだ。２１度での海、２２度での噴水として表現された自然界のパワーは、ここでは力強い日の出として姿を変えている。土地の力（竜脈）を巧妙に利用できる人ともいえる。"}, "天秤座_24": {"sign": "天秤座", "degree": 24, "symbol_ja": "左側に３番目の羽をつけた蝶", "explanation": "生命力や霊感、宇宙的なエネルギーの予期せぬ動きに対して、柔軟な応答力を身につけなくてはならない。というのも、この度数を持つ人は、２１度であらわれた海という宇宙的な生命の力が、つねに潜在的な予期せぬはたらきかけをして、豊かではあるが、言葉や知性では対応できない未知の変化にたびたび遭遇するはめになるからだ。２３度で、強い力がはたらく瞬間をつかまえる技術にたけてきた。このおかげで、運命は激しい変化をしつづける。衝撃に対する内的な強靭さを要求されている。つねになにかの実りある潮流に反応し、動かされる。後から納得できる予期せぬ運命の変化も、その瞬間には、心がくじけそうになる。自分の内側からくる変化を受け入れること。変化するほど、成長できる人だ。"}, "天秤座_25": {"sign": "天秤座", "degree": 25, "symbol_ja": "秋の葉の光景が、巡礼者に生命と死の神秘の突然の啓示をもたらす", "explanation": "たえず予期せぬ形で、宇宙的な潮流が人生に、新しい現実をあらわしてくることを受け入れた人は、あらゆる現象のあらわれの背後に、宇宙的な神秘が語りかけてくることを体験する。２３度は宇宙的な潮流の一番強いところをつかんだ。２４度では流れ全体に乗った。２５度では、これらの影響が生活のすみずみまで浸透してきた。彼はそれらをはっきりと「見る」ことができる。必要なものをよそに求めず、つねに自分の場所にすべてがあることに気がつく。現象の背後の真実を見わける力。偏見や概念に支配されず、あらゆるものに共通の宇宙的な原理が生き生きとはたらいていることを、頭脳的にではなく、直接感じること。霊感に満ちた人だといえる。\nNo. 42／72区分（天秤座２６度～３０度）「知恵」知の道の完成\n物事に対する客観的な知識を追求し、誰に対しても、どのような状況に対しても共通の普遍的な理解に到達しようとする。"}, "天秤座_26": {"sign": "天秤座", "degree": 26, "symbol_ja": "鷲と大きな白い鳩が、互いに姿を入れ替える", "explanation": "天秤座の最後の５度では、高度な理解力や洞察力が発達する。知識が知識にとどまらず感情や意志まで変質させる、というのが特徴だ。たとえばヨガには「知識の道」というものがあって、なんの実践訓練も祈りの修行もなしに、純粋に知識だけを求めて、最終的には他の進化の方法によって達成したものと同一の境地に到達することができるといわれている。２６度から３０度は、この知識の道といえる。鷲と鳩の象徴は、意志と愛とか、知と意志のような異なる資質、ときには相反する人間の諸能力が助けあい、その機能がおたがい入れ替わりをすることを述べている。知ることで、人間それ自身も変容してしまうような変化。これは知識が身になり、生きるようになるということだ。天秤座２１度から、２５度までの、自然界の力に乗るという流れが前提にあって可能な境地だ。"}, "天秤座_27": {"sign": "天秤座", "degree": 27, "symbol_ja": "飛行機が、くっきりと澄んだ空を高く飛ぶ", "explanation": "鷲と鳩という、両極化された２つの意志と愛の協力を２６度があらわし、この度数では、それが結果的に、その人を超越的な視点に立たせることを暗示。人間的なあらゆる問題に対して、高い視点から見つめわたす。新しい視覚を獲得し、高度な自由と平和を獲得する。自分の人生の経験に対しても、超越的な、あたかも他人から見たかのような姿勢をとることができるようになる。これはいさぎよさをもった、否定的な体験に対しても「あれは、あれでよかった」と総括できるような人格を生み出すようになる。視野は、いつも晴れわたっている空のような状態。また人智を超えたような問題に詳しくなる。"}, "天秤座_28": {"sign": "天秤座", "degree": 28, "symbol_ja": "自分のまわりを取り巻き、手助けしてくれる霊的な力に気づきはじめた男", "explanation": "自分の人生や、世界が、大きな全体の「一なるもの」に属していることを、内的な確信として手に入れる。２６度で、主体と客体が交換されたり、また２７度で、これらもともと対立する陰陽のような原理が「合体」してしまうと、必然的に、世界の果てにある人智を超えた、宇宙的な根源原理を知覚するようになる。いままで知ることのなかった、霊的な力、恒久的なはたらきについて、直接理解する。精神的な達観にとどまらず、やがて霊的な影響に浸される。あらゆるものが不可分に結びついて、相互に補いあう原理、こうした宇宙的な力を知覚する。しばしば個人的には、この人の人生のなかで、霊的な力が援助している、という姿にうつるものだ。こうした目に見えないあらゆるもののつながりを理解し、それとコミュニケーションできる可能性がある。"}, "天秤座_29": {"sign": "天秤座", "degree": 29, "symbol_ja": "世代から世代に伝達可能な知識に到達するための、人類の広大で忍耐強い努力", "explanation": "霊的なコミュニティを知覚することを学んだ存在は、遺伝や血筋というものからははっきりと意識的に離れたところで、多くの人が、人間的な生きた意識を通じて、進化に参加していることを知り、ここで自分も社会に意識的な参加をしようと決意する。主観的な牡羊座から乙女座までは、個人のおかれた具体的な条件、血筋や才能に寄りかかる傾向があった。この天秤座の度数では、そうした条件はすべて超えられ、あらゆるものは無条件となり、自覚的な集団や進化への参加だけが、すべての鍵を握っていることを深く理解する。個人の孤立感は、ここで根絶やしにされるといえる。人々との本当の意味での深い共感。この度数をもつ人は、自分の意志で積極的な社会参加をする。助け合う本当の能力が芽生える。"}, "天秤座_30": {"sign": "天秤座", "degree": 30, "symbol_ja": "哲学者の頭にある知識の３つのコブ", "explanation": "ドイツの神秘学者シュタイナーは、人間は進化すると、脳が３つに分割され、再統合されると述べている。これは思考と感情と意志の３つの脳だ。これらが互いに無意識の干渉をやめて、あらためて新しく結合化すると、その人はあらゆる面で意識的に人生に取り組むようになる。非常に明晰で、意識的な人格。感情も意志も、完全な形で制御される。この段階では、注意力は非常に鋭く発達するものだ。これはいつの時代でも、個人の生き方の理想だ。この度数の持ち主は、深い意味で、こうした人間性や人格の完成を目指している人だといえよう。非常に深い哲学性と、理想を実現しようとする姿勢。人間にとってあるべき姿とはなにかをつねに考えている。\nNo. 43／72区分（蠍座１度～５度）「共有」 仲間とともに体験する喜び\n仲間と体験を共有することで、自己が根底から変わっていくというドラマチックな変革を求める。インパクトと力強さを好む。"}, "蠍座_1": {"sign": "蠍座", "degree": 1, "symbol_ja": "街の通りの混雑した観光バス", "explanation": "素性も身分も違う複数の人々が、同時に体験する新鮮なバス旅行は、強烈な感情体験を呼び覚まして、そのなかに、参加者全員を巻き込んでしまう。パックツアーからもどった人々が、その後まで連絡しあい、互いに共感しあう仲間になるのは珍しくないが、この度数は、共有される新しい体験を通じて、人々が親しく交わる状況を示している。新しい感情と、意識のひろがり。天秤座の後半で追求した哲学的な成果が、やがてわれわれの感覚的な領域に新しい変化を引き起こしてしまい、ごく自然に新しい印象をもった世界に導かれていくありさまを暗示している。感動的な体験によって、心のあり方が、刷新されていく姿だ。シンボルどおりに、観光などに関係した仕事もよいといえる。"}, "蠍座_2": {"sign": "蠍座", "degree": 2, "symbol_ja": "繊細な香水の壜が割れて、中の香りが拡がっている", "explanation": "新しい体験に入り込んだ人は、いままでの過去の体験とか生活地盤をある程度犠牲にせざるを得なくなる。過去を感傷的に想起するのがこの度数だ。まだ感情の準備ができていないあいだに、偶然の出来事で、過去と決別する。うっかりと大切にしていたものが割れる。運命的に過去と切り離される。過去に対して感情面での整理を強いられる、など。たとえば新鮮な印象で移動、引っ越し、転職などを決意した人も、いざ自分の過去の事柄を整理しようと考えた段階で、後ろ髪をひかれるような思い出に支配されてしまう。胸がうずくような過去への思い出をあらわす度数なので、ノスタルジックな情念とか、退廃的あるいは斜陽的なムードを刺激する、雰囲気性の強い芸能・芸術の職業などが考えられる。シンボルどおりに、嗜好品、香水、装飾品などを扱うことにも縁が深い。"}, "蠍座_3": {"sign": "蠍座", "degree": 3, "symbol_ja": "隣人の協力を得ての、小さな村での棟上げ式", "explanation": "人が住む家は、人格とか精神構造の象徴でもあるが、こうした建築のために、隣人が集団で仲間意識をもって作業することは、ベーシックな部分での共感の感情を形成する。この度数を持つ人は、人と協力してなにかを成し遂げる、ということを通じて人格形成するタイプの人だ。一緒に同じものをつくり上げた時の喜び。蠍座は共有される感情の星座だが、１度のように受動的な姿勢ではなく、創造の行為のなかでの人との親しみに満ちた共感が形づくられていく。積極性で、過去の思い出にひきずられる心（２度）を、ふっきらなくてはならない。プロダクションのような、複数のスタッフとともに、なにかをつくる仕事。もちろん建築関係も、縁が深い。みんなでつくり上げる、というイメージにあこがれているのだ。"}, "蠍座_4": {"sign": "蠍座", "degree": 4, "symbol_ja": "若者が宗教的祈祷儀式で、キャンドルを運ぶ", "explanation": "若者は、成長するまで、若者が属している社会のさまざまな儀式的な側面を無意識に覚えこんでいる。彼らはそれをものごころつくまでは、あたりまえのものとして感受しているのだが、やがてこの成長過程の体験に結びついた儀式的なシンボリックなイメージを呼び出すことで、さまざまな感情とか力を再現できることに気がつく。この度数は、シンボルを使う技術、ときには魔術的な能力だといわれている。属している文化は、現代文化だけでなく、その背後にある古代からの伝統も含み、これらには無数のシンボルが機能している。それらを扱うときの感情状態が重要なのだが、この若者は神聖な感情に満たされている。またこの度数は、性の儀式的な面を語っている度数なので、セックスの神秘性にもひかれる度合いが強い。"}, "蠍座_5": {"sign": "蠍座", "degree": 5, "symbol_ja": "海の荒波に微動だにしない巨岩", "explanation": "人類が長いあいだに築きあげてきた習慣や文化、不文律の常識などは、ちょっとやそっとの刺激ではびくともしない岩のように、しっかり安定しているものだ。変化に対する驚くほどの抵抗力があって、この度数の持ち主は、この保守的な習慣を、自分の進路を妨げる障害のように感じるかもしれない。でも、外の世界に対する非難は筋違いで、自分のなかにこうしたがっしり動かない気質が潜んでいることを自覚しなくてはならない。変化や成長は、じっくりと時間をかけて進展するし、よい意味では、安定した常識感覚が備わっていて、あまり小さなことにはふりまわされない人だということだ。感情の荒波にふりまわされない耐久度の高い、地道な人として、信頼されることも多い。焦りは禁物。なにに取り組む場合にも、じっくり腰を据えて、長期的展望に立って生きることだ。\nNo. 44／72区分（蠍座６度～１０度）「投機」\n冒険が創り出すダイナミックな感動\n勇気を持って、障害を突破することで、大きな変化を体験する。いかなる困難も、乗り越えられないことはあり得ないと思う。"}, "蠍座_6": {"sign": "蠍座", "degree": 6, "symbol_ja": "ゴールドラッシュが、郷土から人々を引き離す", "explanation": "新しいわくわくする体験を求めて、いままでなれ親しんだ環境や風土、考えから離れていく。つねにより大きな感動を求めて、過去を犠牲にするという度数。新しい野心のために、いままでのすべてを犠牲にしても構わない決意をあらわすので、思いきった行動に出る人だ。ただし、ゴールドラッシュというシンボルからわかるように、孤独な独自の夢を追いかけているわけではない。比較的流行しているものに飛び込むという傾向が強いからだ。対向にある度数は牡牛座の６度、渓谷にかかる橋。他者との共同をあらわすので、複数の人々が共同して、新しい野心に生活や夢をかける、という意味が背後にはたらいていると思われる。新しい企業アイデアに思いきって飛び込むという人にこの度数を見かけた。"}, "蠍座_7": {"sign": "蠍座", "degree": 7, "symbol_ja": "深海の潜水夫", "explanation": "冒険心は、内面にむかう。たとえ外面的ななにかを調査しようとするときでも、関心の焦点は非常に精神的な事柄である。多くは自分の心の深層におりる試み。自分にとって意味あるものを求めるという意味では、他の人にそれがなにを意味しているか、どう貢献するかは問題とはなっていない。深い探求心。潜在意識の広大な海に飛び込むので、霊的な危険に対する強度とか、忍耐力が必要だ。これは無意識に対する挑戦といえる。そしてもどってきたときには、人格に大きな変化が起こっている。この度数をもっている人を観察すると、自分の直観にかすかな手ごたえを感じると、どんどんと深層の世界を探求していくという冒険心がかなり強いようだ。また詩人や作家にもあらわれやすいと思われる。内的なダイナミズムに魅惑される人。"}, "蠍座_8": {"sign": "蠍座", "degree": 8, "symbol_ja": "月の光を浴びる静かな湖", "explanation": "心を静かな風のない状態に停止させ、浮かび上がってきたものを凝視する。知りたいことや探したいものがあるとき、自分から対象に飛び込んだりしないで、関心をむけたまま、静かに待っていると、やがて心の深層から、特別な印象がふつふつとわき出してくる。たとえば、インドでは伝統的に、壷
