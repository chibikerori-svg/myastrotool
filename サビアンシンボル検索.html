るのかわかりません。それでも目の前に差し出された餌を見て、リスクを顧みずに飛び込んでいくような勇気と好奇心があるのでしょう。\n山羊座は共同体の結束を強めるために自分の所属しているコミュニティに力を尽くします。しかし同じメンバーで同じルーティンだけをただ繰り返していると、それはやがて外部からの侵入を受けたり、あるいは外での流れについていけなくなったりして、崩れてしまうでしょう。真に強い結束を得て、コミュニティを堅強に維持するためには、定期的に新陳代謝をする必要があります。そのためには、いま現在の内部には存在しない新しい要素を外の世界から持ち込んで、常により良くなるように改善し続ける必要があるでしょう。\nこの度数を持っている人は、積極的に自分のコミュニティの外へ出ていき、未知のところでの交流を楽しもうとするところがありそうです。すでに知っている既存の世界の外側に興味を広げていき、そこから「今ここにはないもの」を探し出そうとするでしょう。\nそれは異文化だったり、異なる習慣や食生活、物やその扱い方だったりするかもしれません。未知の要素にダイレクトに触れることで、時に傷ついたり、ショックを受けたりすることもあるでしょう。\nしかしそれでも好奇心が上回り、勇気を出して、異色なものと関わっていくことになりそうです。"}, "山羊座_11": {"sign": "山羊座", "degree": 11, "symbol_ja": "個人所有の土地の中のキジの大群", "symbol_en": "A Large Group Of Pheasant On A Private Estate.", "key_phrase": "特定の知識や技術を選抜された人たちと共に高める人", "explanation": "キジは集団で行動する特性がある鳥だそうです。そのため、どの地域のキジであっても、まとめて一か所に集めると、同じような行動を始めるのだといいます。\nここでは、ある目的に沿って選ばれた、あるいは選んだ人々が集まり、行動を共にするということが暗示されているでしょう。一か所に選抜した人たちを集めて特定の目的を与えると、それは一般的な人たちがやるよりも、ずっと高度で専門的な領域にまで簡単に発展していきます。研究室や勉強会、クラブといったものを連想するとわかりやすいかもしれません。\nそれは特定の目的のために集まった人たちで構成されていて、誰もが自由には入れることはできないでしょう。そこに入るには、ある一定の条件を満たす必要があるのです。しかし、ひとたび入ったら、その団体の一員であるという、特別な意識のようなものが得られるかもしれません。そこで占有される関係性や知識は、内部の人たちだけが扱える特権といえるでしょう。\nこの度数を持っている人は、特定の閉鎖的なグループに所属したり、みずから作ったりすることがありそうです。それはメンバーが固定されていて、長く続くほど、グループのマニアックさと力とが増していくことになるでしょう。より専門性が高まっていく代わりに、一般社会から隔絶されていく可能性もあります。\nしかしその分、そこで分かち合われている学びや技術は革新的に進歩して、非常に高度なレベルにまで達するでしょう。そういった場所に所属することを通して、自分自身の腕を存分に磨く人といえそうです。"}, "山羊座_12": {"sign": "山羊座", "degree": 12, "symbol_ja": "生命についての", "symbol_en": "小さな理解を明らかにする", "key_phrase": "An Illustrated Lecture On Natural Science Reveals Little-Known Aspects", "explanation": "Of Life.\n生命についての小さな理解を明らかにする図解された自然科学の講義\nひとつのテーマに没頭することで新たな発見をする人\n大学のゼミのような、小さな研究室で行われている講義や研究のイメージを持つサビアン・ワードです。すでにその分野の基礎知識を網羅している仲間たちが集まって研究すると、どんどんより細やかな箇所にまで意識が向けられていき、急速に新しい知識への理解と発見が進んでいきます。ある種のオタク集団というか、マニアックな人たちが徹底的にひとつのテーマを突き詰めることで、まったく新しい見識を広げることが予見されるでしょう。\n実際に時代を切り拓く最先端にいるのは、このような人たちです。研究室の中でさまざまなことに対する仮説を立てて、検証し、新しい技術や発見や知識を生み出していくのでしょう。やがて、そこで生み出されたものが、わかりやすい一般の製品として形を変えて普及していくことになるのかもしれません。\nこの度数を持っている人は、オタク気質で、細部にこだわり、ひとつのことを突き詰めていく資質があるでしょう。オープンに開かれた場所で働くよりも、閉鎖された環境に適応し、マニアックな仲間たちと共に、気になる分野を徹底的に探求することに充実を感じるかもしれません。\n非常にストイックな質があり、仮説を自分自身の身で実証することで、確信に変えることができるでしょう。一般的に理解されないことでも、そこに通じた仲間がいることで、より深く研究に没頭できそうです。\n偏りはあるかもしれませんが、いくつもの成果を作り上げることができる人。どんどん実験の場に自分自身を置きましょう。"}, "山羊座_13": {"sign": "山羊座", "degree": 13, "symbol_ja": "究極の存在の真実と共にある火の崇拝者の瞑想", "symbol_en": "A fire worshiper meditations on the ultimate realities of existence.", "key_phrase": "内なる精神と意志の力を発揮し続ける人", "explanation": "あらゆる宗教の原始的なものは、火をあがめることから始まりました。熱源であり、すべてを燃やし尽くし、情熱へと姿を変える火はわたしたちの命の源です。あらゆる生命は光の恩恵によって生かされていますが、それは人間にとっては意志であり、不屈の精神であるともいえるでしょう。\n山羊座は、社会的結束力を強化し、社会の中で自分の持っている力を活かすことを目的とした星座。地のエレメントに属する星座ですが、そこに対極の火の力がもたらされることで、常にイキイキとした生命の力を獲得し続けることができるでしょう。\nここではみずからの内なる火に着火することで、ひとりでも意志を持ち続けることにチャレンジしていく姿が描かれています。まわりがどうであれ、自分自身の意志ややる気がいつも高まっていれば、そこから集団に火をつけて、士気を高めることができるでしょう。\nこの度数を持っている人は、興味が自分自身の内側へ向きやすく、どうしたらいつも高いテンションや意志の力を維持できるのかということを考えるかもしれません。惰性的でいることよりも、何事に対してもしっかりと意識して取り組むことを望み、そのことから厳しさが表に現れることもあるでしょう。\nやる気が高いので、まわりにいるやる気のない人や、ダラダラした無駄な行動に苛立ちを感じることもありそうです。目的意識が高く、何事に対しても集中して取り組む姿勢が高まるでしょう。気持ちがブレないため、不要なものに耳を傾けないかもしれません。\n現実を創り出していくための、内なる底力とつながる人です。\n**"}, "山羊座_14": {"sign": "山羊座", "degree": 14, "symbol_ja": "**", "symbol_en": "長いあいだ忘れられていた文化を", "key_phrase": "御影石に彫られた古代の彫刻", "explanation": "An Ancient Bas-Relief Carved In Granite Remains A Witness To A\nLong-Forgotten Culture.\n長いあいだ忘れられていた文化を思い起こさせる御影石に彫られた古代の彫刻\n来歴からいまの自分を確信する人\n長いあいだ、人々から忘れられていた古来の彫刻には、当時の人たちの思想や生き方が刻まれています。そこには文化や時代背景が違えども、現代を生きるわたしたちと同じように真実を探求し、ひとつの考えに行き着いた人たちが確実にいたということが示されているでしょう。もしいま、自分たちが時間をかけて探求し、仮に何かを見つけ出したと思った真実は、もうすでに別の誰かがずっと前に発見しているかもしれません。そんなことに気づかされるサビアン・ワードです。\n繰り返し試して、実践し、研究してたどり着いた成果であっても、いつかどこかで誰かがすでに似たようなことをやっていた可能性があります。広く文献をあたって、その事実に巡り会ったときに、自分の発見が特別ではなかったのだという落胆とともに、自分の発見は間違いではなかったのだという正当性を容認されたかのような、ふたつの思いを得るかもしれません。\nこの度数を持っている人は、自分の志した分野において、その来歴を詳しく知ることが、未来へ進むための手がかりとなるでしょう。実際に試してやってみたこと、知り得たことが、すでに先人の考え出したものの中にあるかもしれません。それらを知ることで、いま自分が取り組んでいることに示し合せると、しっかりとした手ごたえを持ちながらも革新的に進んでいく道を見つけ出すことができるでしょう。\n誰かの残した成果が役立つのは、あなた自身が実際にいま、同じような体験をしているから。実践の中で過去の知恵を活かしていくことができるでしょう。"}, "山羊座_15": {"sign": "山羊座", "degree": 15, "symbol_ja": "おもちゃでいっぱいの病院の小児病棟", "symbol_en": "In A Hospital, The Children\\'s Ward Is Filled With Toys.", "key_phrase": "子ども心の解放に未来への可能性を見出す人", "explanation": "自分の生まれ育ったローカルな土地の文化や慣習を受け継いで、その場所がもっと良くなるように、ずっと安定した基盤が続いていくようにと模索して働き続けてきた山羊座ですが、自分たちのしていることは別の時代の別の場所でも似たようなことがくり返されているのだと気づかされました。それを踏まえた上で、根本から社会の普遍的な可能性を考えたときに、いまの大人を変えるよりも、子どもに与える教育の質を変えた方が、土台そのものが変わることに目をつけます。人間の持っているその才能と可能性を存分に引き出すためには、心を抑圧させるのではなく、解放させることがカギだと思い至ったのかもしれません。\n小児病棟には傷ついた大勢の子どもたちが集まります。たくさんのおもちゃを使って、彼らの情操を目一杯引き出そうとするサビアン・ワードです。\nこの度数を持っている人は、日常の何気ない行為の中にも小さな喜びを見出そうとするでしょう。もしかすると、過去に自分で自身を抑圧して苦しんだ経験があるかもしれません。そして、自分の心に嘘をついたり、本音を隠したりすると、結局は自分が苦しむだけなのだということに思い至り、それからあとはのびのびと正直に生きることを選ぶでしょう。そのためのリハビリ時間も必要かもしれません。\nまた自身の経験から、インナーチャイルドの癒しと関わったり、子どもの情操教育に興味を持ったりする人もいそうです。人を根本から変えることに興味を持って、そのためのプログラムを作ったり、実際に教えたりする人もいるでしょう。"}, "山羊座_16": {"sign": "山羊座", "degree": 16, "symbol_ja": "体操着の少年少女であふれる校庭", "symbol_en": "School Grounds Filled With Boys And Girls In Gymnasium Suits.", "key_phrase": "自分の内側にある子どものような感受性を受け容れる人", "explanation": "体育の時間に子どもたちが体操着に着替えて、校庭に集まっています。そこでは身体を鍛えて、集団で動いてゆく規律を学びます。しかしあくまで対象は子どもたち。なかなかうまくできない子もいれば、きちんと列に並べない子もいるでしょう。やる気をなくして外へ出てこない子もいるかもしれません。\n山羊座は社会の中で役立つ自分でいるために、個人的な感情を切り捨ててきました。ですが実際のわたしたちには心があり、ここを無視しているとさまざまな弊害が起こります。わたしたちの感情を解放することが世界とシンクロする鍵であり、自然と調和してうまくやるための最後のパーツ。山羊座の対面の蟹座が象徴する、わたしたちの内にある子供っぽさや感情のムラを統合することが、より強い自分になるための近道といえるでしょう。\nこの度数を持っている人は、自分自身の心を扱うことが、自身を成長させる鍵となりそうです。大人としてうまくやりたいのに、たびたび子どもっぽい感情があふれ出て、すべてを台無しにするようなことが起こるでしょう。\nしかし、そこで自分の心に蓋をしても、外側から心を揺さぶるような人や出来事がやってくるだけです。わたしたちは自分の心をどこにも隠すことができません。そこで自分自身を受け容れて、子どもっぽさを少しずつ取り込むための訓練を始めます。実際にスポーツを通してメンタルを鍛えたり、子どもたちや若者たちの教育に関わったりする人もいるでしょう。\nいずれにしても自分の内側にある感受性や素直な質を活かしていくことが大切です。"}, "山羊座_17": {"sign": "山羊座", "degree": 17, "symbol_ja": "ヌーディズムに心理的解放を見出した", "symbol_en": "抑圧された女性", "key_phrase": "ヌーディズムに心理的解放を見出した抑圧された女性", "explanation": "心身を自由に使いこなすことで自分を確認する人\nわたしたちが何かをマスターしようとするとき、ある規律の整った型を用いて、そこに沿うように自分を律していきます。それを繰り返すことで型通りの自分を創り出すことができますが、人間は感情や感覚を持っているため、その型に当てはまらず、切り捨てられたものが抑圧されて、影となり、むしろ自分に対して支障をきたす存在となります。\nかつて宗教の多くは霊主体従を教えとして広めていき、肉体的な欲望を精神の力で抑えることを推奨しました。あるいは多くの道徳観念も同様に「かくあるべき」という教えのもと、個人的な欲求や思いを抑圧したものがあるでしょう。\nその結果として、多くの精神的な病や心の葛藤が生じたため、ここでは身体の感覚を解放することで、より完全な自分を取り戻そうと試みています。わたしたちは、意志と心と身体から作られているもの。山羊座は肉体感覚を司る、地のエレメントに所属するサインです。有能な自分自身となるためには、頭だけを鍛えても仕方なく、心を解放して、身体感覚を取り戻すことが必要だということにたどり着いたのでしょう。\nこの度数を持っている人は、とても繊細で身体の感受性が強く、どんなことでも実際に自分で確かめてみようとするかもしれません。それが本当はどんな感じがするのか、実際のところはどうなのか、現場へ出かけていって、やってみることで理解し、どうするか考えるでしょう。\n中には人生の中で何度か環境から抑圧されるような不遇な体験をする人もいるかもしれません。そこを乗り越えるためにスピリチュアルなことを学び、自分の感情と感覚とを取り戻して、自分らしさを解放することがあるでしょう。"}, "山羊座_18": {"sign": "山羊座", "degree": 18, "symbol_ja": "イギリス艦隊のユニオンジャック", "symbol_en": "The Union Jack Flag Files From A British Warship.", "key_phrase": "感情の波を能動的に活用していく人", "explanation": "かつてのイギリスは世界中に植民地を持ち、巨大なイギリス艦隊にユニオンジャックをはためかせながら、海をどこまでも進んでいきました。\n山羊座は個人的な感情や欲望を抑えることで社会のために貢献する星座ですが、むやみに気持ちを抑えるばかりでは、ほころびが出てきて、うまくいかないことを経験します。そこで対面の蟹座の質を解放し、心のままに感情を動かすことを始めますが、それを山羊座の管理能力を使って試みようというのがこのサビアン・ワードです。\n海は感情の象徴ですが、ここではそれを受け入れた上で、能動的にテンションを上げたり、発散させたりすることにトライしていきます。いつやってくるかわからない波に翻弄されるのではなく、波を読む力を高めて、積極的に大海原へ乗り出そうとするでしょう。\nこの度数を持っている人は、自分の感情の波を受け入れた上で、管理しようと試みるかもしれません。そのために心の仕組みを理解して、感情のパターンや、どんなことをすれば発散できるのかということも分析するでしょう。\n人はどうしても、不安になったり、緊張したり、イライラしたりすることがあります。それらを抑えるのではなく、正しい扱い方をマスターすることで、より統合された大人としての人格を手に入れようとするでしょう。\nプロのスポーツ選手が、メンタルをトレーニングすることに通じるかもしれません。心を自在に操ることができれば、社会にもっと貢献して、より大きな成果をあげることもできるはずです。"}, "山羊座_19": {"sign": "山羊座", "degree": 19, "symbol_ja": "食品でいっぱいの", "symbol_en": "バッグを運んでいる五歳の子ども", "key_phrase": "食品でいっぱいのバッグを運んでいる五歳の子ども", "explanation": "全体への貢献意識をみずから成長させる人\n五歳の子どもが「はじめてのお使い」を頼まれて、真剣にこなそうとしているようなサビアン・ワードです。その身体に対して大きすぎるバックには、食品がぎゅうぎゅうに詰まっているのでしょう。食品は誰にとっても「価値あるもの」ですから、子どもは責任感を持って大役を果そうとしています。\nこれはわたしたちが自分に対してより大きな課題を課し、またそれを成し遂げようと試みる様子が示されているのかもしれません。ここで果たそうとしている大きな課題とは、他の人のためにもなるような大きな仕事。\nわたしたちは大人になると、自分の責任を自分で果たすだけの力を手に入れますが、他者への貢献や責務といった面では未熟さが残り、自身で育てていく必要があります。時に他者への責任が発生するかもしれない仕事や役割から逃げ出したくなる気持ちもありますが、それを克服しようと奮闘するのが、この子どもなのでしょう。ここでは自分自身の繊細で幼い感情の育て直しが描かれます。\nこの度数を持っている人は、みんなのために役立つことをしようと、一生懸命働きそうです。それは単にチームのために自分の役割をまっとうするのみならず、チーム全体への責務を負ったり、他のメンバーの面倒を見たりといった、より大きな意味での働きです。\nチームの中には、自分のことしか考えず、全体の調和を乱す人もいるでしょう。それに自分自身の中の子ども心が刺激されて、同じように責任を放棄したくなることもあるかもしれません。\nしかし、それでも気持ちを引き締めて、みんなのために働くことをやめないでしょう。"}, "山羊座_20": {"sign": "山羊座", "degree": 20, "symbol_ja": "祭祀のあいだ歌い続けている隠れた聖歌隊", "symbol_en": "A Hidden Choir Is Singing During A Religious Service.", "key_phrase": "全体のために黒子に徹することのできる人", "explanation": "荘厳な祭祀が行われているあいだ、ずっと聖歌がどこからともなく聞こえ続けています。しかし、歌が聞こえていても、歌っている聖歌隊の姿はどこにも見えません。だけれども、その場に聖歌がなければ、祭祀の荘厳さは半減するでしょう。バックグラウンド・ミュージックとして、祭祀そのものの演出をしているのです。これは全体のために見えないところへと貢献する姿勢ともいえるかもしれません。\n聖歌隊が必要以上にでしゃばったり、自分たちの存在をアピールしたりしないことで、祭祀の厳かさが際立つのでしょう。全体のために働くということは、そのような側面があります。主役のために、他の者たちが名を隠して働くこと。そこで功名心を逸らせることもありません。\nそれが全体のためだということを理解している人たちが、個々の主張を抑えて本当の貢献ができるのでしょう。\nこの度数を持っている人は、自分の属している組織やグループをうまくいかせるために、全体を見て、そのバランスを取りながらも、同時に黒子に徹することができそうです。表にしゃしゃり出ることはなく、しかしさりげなく機知をきかせて、みんながうまくいくように調整するでしょう。\nそれを自分がしているのだと主張することはしませんが、かといって押さえるところはしっかりと押さえて、メリハリを利かせるような良い仕事をするでしょう。みんなで作り上げたものが成功することが喜びとなり、そのために大きく力を尽くします。本当に仲間想いの人だといえるでしょう。"}, "山羊座_21": {"sign": "山羊座", "degree": 21, "symbol_ja": "リレー競争", "symbol_en": "A relay race.", "key_phrase": "最高のチームに所属して最善を尽くす人", "explanation": "リレー競争はチームのひとりひとりが有している能力を最高潮に発揮することで、他のチームとタイムを競う種目。団体戦であると同時に、個々のプロフェッショナルな実力が求められる競技といえるでしょう。\n社会の中のビジネスシェア争いは、まさにこれに置き換えられるかもしれません。ある業界内において、それぞれの会社が成果を出して、ビジネスのシェア占有率を増やそうと躍起になって奮闘します。強いライバル社がいることで、こちらの実力もさらに引き出されていくでしょう。また、誰かひとりではなく、社内の全員が個々の実力を存分に出し切ることも求められます。\n結果として、シェア争いは市場を活性化させて、より良いサービスや製品を生み出すことにつながります。それはすなわち、社会全体をより良くすることにつながっているでしょう。そういう背景があるからこそ、あるビジネスの中に飛び込んだ人たちは能力の全てを尽くして、戦い続けるのかもしれません。\nこの度数を持っている人は、社会の中でより有益な成果をあげられる組織に所属し、その中で自分の力を存分に尽くすことに、やりがいと喜びを感じるでしょう。能力を存分に発揮できる、働きがいのある環境を見つけることが何よりも大切です。競争に参加するために、自分にとって意義があって、貢献しがいのあるチームに属することが欠かせません。\nここで役立つことができるのだと誇りに感じられるようなチームにいるからこそ、持ち前の能力をおおいにふるうことができるのでしょう。社会の中で働くことに大きな充実感を得ることのできる人です。"}, "山羊座_22": {"sign": "山羊座", "degree": 22, "symbol_ja": "優雅に敗北を受け容れることで", "symbol_en": "明らかになった将軍の高貴な性格", "key_phrase": "優雅に敗北を受け容れることで明らかになった将軍の高貴な性格", "explanation": "本質的なところに目を向けて社会に貢献する人\n山羊座は自分の属している社会的な集団の価値を高めるために、身を尽くして貢献をする星座です。企業間競争や国家間の争いの中での勝利をめざし、より多くの売上とシェアを確保しようと尽力するでしょう。\nしかし、そればかりを目的にしていると、本当に大切なことを見失ってしまうかもしれません。コストをカットして、低賃金で人を雇い、質のたいして良くないものを大量に売って、それで競争に勝ったとしても、多くの社会的な課題をその後に生み出すばかりとなるでしょう。\nそこで、このサビアン・ワードの将軍は、戦いではみずから潔く負けを受け入れます。表面の勝負で、数値上は負けたように見えたとしても、代わりにそこではもっと大切な本質の部分が守られるでしょう。結果的に大きな視野で見たときの勝利を得られるかもしれません。\nこの度数を持っている人は、基本的にはしっかりと社会のなかで結果を出すことに精を出して、頑張るでしょう。しかし、ライバルに勝つことだけにとらわれず、しっかりと内的に充実することや、質の高さをキープすることにも意識が向けられます。売上をたくさん伸ばすことよりも、社員がのびのびと働きやすくて離職率が低いとか、品質が良いものを提供して、確実なリピーターが何人もいるといった方が、実質的な意味において、社会に貢献しているといえるかもしれません。\nまわりに煽られて本質を見失うことなく、自分のペースでコツコツと地に足をつけて進むことができる人です。"}, "山羊座_23": {"sign": "山羊座", "degree": 23, "symbol_ja": "戦争での勇敢さをたたえる", "symbol_en": "２つの賞を受け取った戦士", "key_phrase": "戦争での勇敢さをたたえる２つの賞を受け取った戦士", "explanation": "社会で活躍しながらも個人的な充足も忘れない人\nこのサビアン・ワードに出てくる戦いは山羊座の戦いですから、現実社会におけるビジネスのシェア争いといえるでしょう。\nそこでこの戦士はふたつの賞を受け取っています。そのひとつは、社会に貢献して高い功績を残すことのできる能力に対する評価でしょう。そしてもう一方は、それ以外の選択をすることのできる精神性に対する評価です。\n社会の中で活躍し、結果を残すことは大切です。しかし、それのみに取りつかれて、他の大事なものを犠牲にしては元も子もありません。時に人は実益よりも、精神的にホッとできることや、豊かになれることを選ぶことも大切です。\nこの戦士は物質的な充実と精神的な充足、その両方の意義を知っている人だともいえるでしょう。\nこの度数を持っている人は、自身の力を自在に使いこなして、やるべきときは集中して結果を出し、しかし負荷がありすぎると感じるときには、サッとそこから降りるということができそうです。人生全般を最も有益で合理的に過ごせるように、緩急のメリハリをつけて、上手に社会と付き合っていくことができるでしょう。仕事もプライベートも上手に充実させることができるビジネスマンであったり、子育てを楽しみながら自分のキャリアの道を開いていくワーキングマザーといったりするイメージです。\n社会と大いに関わり、成果を出しながらも、そこには制約にとらわれない自由さがあるでしょう。自身が実績を出しながらものびのびと過ごす姿は、他の人を解放させることにもつながりそうです。"}, "山羊座_24": {"sign": "山羊座", "degree": 24, "symbol_ja": "修道院に入る女", "symbol_en": "A woman entering a convent.", "key_phrase": "精神的な力とつながって社会に貢献する人", "explanation": "女性が修道院に入るというと、一見、社会から隠匿するようなイメージがあるかもしれません。しかし、これは魚座ではなく、山羊座のサビアン・ワードですから、本当に現役を引退するのではなく、自分の内面を鍛錬するために精神修行の場に身を投じているといえるでしょう。\n企業の社長が伊勢神宮の神域で祈りを捧げたり、寺社を巡って経文を唱えたりするとき、普段の姿とは異なり、静かで敬虔な気持ちになるかもしれません。社会で活躍している人がそのような場所へ出かけるのは、古来日本を支えてきた精神的な力の源流に触れて、その力の一部を自分のものとして、社会のために活かそうとするためでしょう。国家の弥栄に尽くして、人々の精神の安寧を支えるといった大きな力を得ることで、わたしたちはさらに社会に貢献することができます。\nこの度数を持っている人は、そのローカルの土地の精神的支柱となっている場所と縁を作ることがありそうです。それは古くから伝わるお寺や神社や、その土地の祈りの場所かもしれません。そことのつながりを深くして、みずからの精神を鍛えることで、社会に貢献するための、より大きな力を得ることができるでしょう。\nどちらかというと、明るく華やかに活躍するよりも、静かに内面を整えたり、本質を見つめたりすることが多いかもしれません。しかし、決してその働きは地味ではなく、自分の属する場においては、大きな力を発揮することになるでしょう。\n何かの分野の研究者になったり、文章を書いたり、まとめたりする能力に秀でている人も多いようです。"}, "山羊座_25": {"sign": "山羊座", "degree": 25, "symbol_ja": "貴重な東洋の敷物でいっぱいの店", "symbol_en": "A Store Filled With Precious Oriental Rugs.", "key_phrase": "ローカルにはない知識や物を異文化から持ち込む人", "explanation": "サビアン・シンボルはアメリカで降ろされたもの。アメリカから見ると、東洋は遠い異文化の地域です。そこから持ち込まれた敷物がいっぱい満たされた店が繁盛している様子が描かれています。\n山羊座は自分の所属している限定されたローカルな地域を発展させるために力を尽くす星座です。地のエレメントに属する山羊座は、ここからここまでと領地を区切ることで、そのテリトリーの持つポテンシャルを最大まで引き出してきました。その「のびしろ」が最大まで引き出されてしまうと、次にやるべきことは、その中にはないものをこの場に持ち込んできて、発展させることです。\n島国の日本ではよく海外発の料理や雑貨やファッションなどが大流行することがありますが、それはまさに限定されたローカルの地域に、異文化のものが持ち込まれた様子が描かれているでしょう。人間の源流をたどっていくと同じ所へ行き着きますが、そこから枝分かれして、それぞれのローカル色が作られたのだと思えば、それがなんであれ、面白がって取り込むことができるかもしれません。\nこの度数を持っている人は、いまここにはないものを異文化から吸収することで持ち込み、ローカルの場を活性していきそうです。積極的に外の世界へ出て学び、そこで得たものを自分の属する場所に持ち帰って、そこをより豊かにするために活かすでしょう。\n新鮮な刺激が欲しいため、いつも外の世界に目を光らせて、流行の仕掛け人のようになることもありそうです。自分が前面に出ることよりも、情報や物をクローズアップさせて、裏で仕掛けていくことを好むでしょう。"}, "山羊座_26": {"sign": "山羊座", "degree": 26, "symbol_ja": "滝の虹色の霧の中で踊っている水の精霊", "symbol_en": "A Nature Sprit Dancing In The Iridescent Mist Of A Waterfall.", "key_phrase": "独特の感受性で万人を強く惹きつける人", "explanation": "山羊座は自分の属するローカルな社会をより豊かな場所にするために奮闘してきました。その甲斐あって地域が充分に潤うと、さらなる発展として、次はローカルを超えたところとつながって、多くの人たちに地域の魅力を伝えたり、招き寄せたりすることになるでしょう。地方がその土地の特色や歴史を存分にアピールして、他国の人を惹きつけるようなインバウンドのイメージともいえるかもしれません。\nその際には人の心にダイレクトに訴えて、その共感を呼び覚ますことがここでは求められるでしょう。流れ落ちる滝のキラキラと輝く虹色の光の中で、精霊が踊っている姿は、万人を惹きつける魅力があります。音楽や絵画、踊りといったアートは言葉を超えて人々の心をダイレクトに響き、また、あふれる豊かな緑や花、自然の織りなす光景、古くから伝わるお寺や神社といった場所の持っている独特の神秘性......言葉では説明しきれない、造形美がここでは際立つでしょう。\nこの度数を持っている人は、非常に感受性が高く、アーティストとしての適性がありそうです。生まれ育った土地の文化や歴史や自然の中に、人を惹きつける美しさや情緒に訴えかけるものを見つけ出すと、それを現代の社会の中でより人々に受け入れられるようにアレンジすることができるでしょう。伝統的な文化や美しさをわかりやすい形で再生させて、多くの人たちを魅了します。\n直感やイマジネーションが冴えて、どうしたら良いのかという答えもおのずと見えてきそうです。言葉の壁を越えて、大勢の人たちとつながることができるでしょう。"}, "山羊座_27": {"sign": "山羊座", "degree": 27, "symbol_ja": "山の神殿へとつながる", "symbol_en": "急な階段を登っている巡礼者", "key_phrase": "山の神殿へとつながる急な階段を登っている巡礼者", "explanation": "自分の力のみを信頼して険しい道を歩む人\n昔から人々は人里離れた険しい山の中にある特別な場所を聖地と定めて、崇めてきました。人が容易に足を踏み入れられないそれらの領域は、神聖な神の領域です。大抵の人はそこへ行くことを諦めて、里宮から遥拝して、ただ祈るばかりでしょう。\nしかし、このサビアン・シンボルの巡礼者は、どんなに険しい道であろうとも、体力と精神力の限りを尽くして、信念と共にそこへ向かおうとしています。そこへ行き着くことが難しいほど、もし、たどり着くことができたあかつきには、人生が大きく変わるほどの経験が待っているかもしれません。\n山羊座を守護する惑星は土星ですが、これは鉛を示していて、これを金に変えることが錬金術です。鉛の土星を自分自身のたゆまぬ努力によって、輝くたましいの象徴であるゴールドに磨き上げること。それが山羊座にとっての究極の目的といえるかもしれません。\nこの度数を持っている人は、非常に努力家で、恐ろしいほどの集中力があり、勤勉で、自分で志した高い目標を自分の力で必ず成し遂げようとするでしょう。山の神殿は容易には辿り着けない場所にありますから、これは自身にとって前代未踏の記録に挑戦するようなことを含んでいるのかもしれません。\n働くのであれば会社のトップになるとか、何かをするのであれば最高の賞を取るなど、誰からも認められるような存在になることを目指す人もいるでしょう。\nそれが何であれ、安易にラクすることよりも、厳しく自分自身を引き締めて、険しい山道を登ることを選ぶ人です。"}, "山羊座_28": {"sign": "山羊座", "degree": 28, "symbol_ja": "大きな養鶏場", "symbol_en": "A large aviary.", "key_phrase": "社会の中で能力を活かしきることで次の道を見つける人", "explanation": "大きな養鶏場では、たくさんの鶏が飼われているでしょう。鶏はまもなくやってくる夜明けをいち早く察して、みんなに知らせます。ある種の予兆、確実にこれから起こるであろうことを、キャッチする力があるのかもしれません。\n山羊座は社会のために働き、集団そのものがもっと豊かになるための貢献をする星座。しかし社会の基盤が安定することで次第にその仕組みが制度化されていき、誰もがその手順に沿ったやり方で社会と関わりを持つようになります。このなかば固定化された仕組みから脱するには、最初から仕組みに属さない自由な立場の生き方を貫くか、あるいは仕組みの役割をいち早く駆け抜けてやりきるかの、どちらかとなるでしょう。会社員が出世していって、自分の能力の限界と思える地位にまで上り詰めた時、平社員だった時とは全く異なる光景が見えるはずです。\n自分の能力の限界だと思うところまでやりきり、それを表現した時に、初めて見える世界、知らなかった世界が、その先に多様に広がっていることに気づくでしょう。\nこの度数を持っている人は、自分の能力を社会の中で存分に活かすことで、そこから自由になる可能性を持っています。その時々の与えられた役割や仕事の中で充分過ぎるほどの成果を出すと、それに取り組む前にはわからなかった、さまざまなことが見えてくるでしょう。\nそこに辿り着いた時、おのずと視野が広がって、新たな可能性が、また別の可能性がと、次々と道が開かれていきます。何かをやり遂げた人だけが、その道の先に続いている新しく来る時代の予兆や、流れの先行きに気づくことができるでしょう。それらを知ることによって、既存の仕組みから自由になる道を見つけ出すことができる人です。"}, "山羊座_29": {"sign": "山羊座", "degree": 29, "symbol_ja": "お茶の葉を読んでいる女", "symbol_en": "A woman reading tea leaves.", "key_phrase": "客観的に世界を把握して未来を予見する人", "explanation": "たまたまその時、その形をしていたというだけの事実から、お茶の葉を読んで、未来を予測している女性のサビアン・ワードです。その仕組みがまるっきりわからない人から見たら、なぜそんなことまで予見できるのか、不思議に感じるでしょう。しかし、ある法則を把握してしまえば、それは難しくないことかもしれません。\n社会や経済がどうなっているのか、そしてどうなっていくのかを予測することができる人です。それを読み解けるのは常に視野が今の社会の内部にとらわれておらず、もっと広く客観的に世界をとらえているからでしょう。\nあるいは同時に、そこで起こっていることをやり尽くしたからこそ、見えてくるものがあるのかもしれません。会社を起こして成功した人は、どうすればビジネスで成功できるのか、その法則を語ることができるでしょう。株で財を成した人は、いつのタイミングで売買するのが良いか、判断することができます。\n余すところなく経験することによって、わたしたちは客観的に物事を予見する能力を手にするのでしょう。\nこの度数を持っている人は、あらゆる物事と同化せずに、とらわれることもなく、いつも冷静に世界を眺めているところがありそうです。いま起こっていることを注意深く観察して、人々の動向を見ているため、さまざまな物事に対して次に何が起こりそうか、読み解くことができるでしょう。分析力が高まり、そこに個人的な感情が介入しないため、人から頼られたり、アドバイスを求められたりする機会が増えそうです。\n直感や第六感が冴えるため、占いや精神世界と関わることも多いでしょう。"}, "山羊座_30": {"sign": "山羊座", "degree": 30, "symbol_ja": "世界情勢に対する", "symbol_en": "最高決断をくだす責任者たちの秘密会議", "key_phrase": "Affairs.", "explanation": "世界情勢に対する最高決断をくだす責任者たちの秘密会議\nいまの社会に対する新しい理想のビジョンを抱く人\n山羊座はひとつの閉じられた社会の基盤を強固にすることで、継続可能な安定した営みを人々と共有することを目的としたサイン。集団のなかに個人の能力を捧げて、全体を統括する視野を磨き、さらには個人的な感情を持ちえたうえで、社会のピラミッドの頂点に達する力を手に入れることになるでしょう。\n頂点に立つとはじめて、他のピラミッドの頂点も見えるようになり、その下部にいたときには決して見ることのできなかった、さまざまな現実に気づかされるかもしれません。山羊座の最終度数であるここでは、自分の属している社会の構造が、その長所も欠点も含めて、よく見えています。\nそして、それをより良く改変するためのアイデアや価値観も手に入るのですが、しかし実際にはなかなかそれが理解されないというジレンマがあるでしょう。先見の明を持ち、全体のビジョンを持った人は、次の一手を見すえて動こうとします。しかし社会の内部に属している人たちにとっては、それはピンとこないため、現存のしくみに従って動こうとするでしょう。\nこの度数を持っている人は、社会全体に対する広い視野があり、経済のしくみやその構造に関する知識や情報が集まってきそうです。しかし、それは同じような価値観を持っている人に限って通用する話であり、なかなか万人には理解されないでしょう。\nそのため、もっと新しいことにチャレンジしたいと思いつつも、いまの環境のなかではなかなか実現しがたいジレンマを抱えることがありそうです。同じような価値観を持っている仲間を見つけて、既存の社会から脱し、理想の社会を作ろうとするかもしれません。"}, "水瓶座_1": {"sign": "水瓶座", "degree": 1, "symbol_ja": "カリフォルニアの古いレンガ造りの伝導所", "symbol_en": "An Old Adobe Mission In California.", "key_phrase": "変わることのない価値を求めて実践を試みる人", "explanation": "カリフォルニアにはアメリカの都市のなかでも若者たちが全国から集まってきて、最先端の流行を創り出していく土地。そのカリフォルニアにあるレンガ造りの伝道所は、世代を超えていまなお現役で活躍しています。\n時代や土地を超えて受け継がれていく普遍的な原理。どの時代、どの場所においても変わらずに通用するもの......そのようなものに価値を見出して、理想としながら具現化をめざすのが水瓶座の目的です。\n人間としての意識がしっかりと目醒めた姿を理想として、それを実践する生き方に身を投じようとするでしょう。そして、そのように信念が世代を超えて継承されていくことを志して、そのために理想を共有できる仲間たちとつながっていくかもしれません。人生のあいだで短いあいだにそれを成し遂げることではなく、人生が終わっても継続されていくような普遍的な価値を求めて、共有していくのでしょう。\nこの度数を持っている人は、限定されたローカルな地域の慣習や、縦型の権威からの押し付けに反発して、自由な生き方を強く求めるかもしれません。既存の社会のしくみのなかにおさまることよりも、誰もが自分らしく自由にふるまうことのできる環境に憧れて、早くに独立する人もいそうです。\n他者からのコントロール下に入る代わりに、自分なりの理想や信念を求めて、さまざまな学びを深める人もいるでしょう。そして自分なりの信条となるものを見出すと、長い人生をかけてそれを体現しようと試みるかもしれません。\nより普遍的な理想を求めて、内なる真実とつながり続ける人だといえるでしょう。"}, "水瓶座_2": {"sign": "水瓶座", "degree": 2, "symbol_ja": "予期されなかった雷雨", "symbol_en": "An unexpected thunderstorm.", "key_phrase": "真に自分自身の人生を生きる選択をうながされる人", "explanation": "水瓶座は既存の社会から、何かしらの型を押し付けられる生き方から、真に自由な人間の本質的な目覚めをうながす星座です。本質として生きるとは、他の何かではなく、自分自身の内なる権威に従った生き方を選ぶこと。それを実践するために、ここでは頼りにしていたシステムがことごとく壊れていくという経験をするかもしれません。\n自由でいたいと思いながらも、社会の一部や、安定した仕組みに依存しているようなところがあれば、それはここですべて失われていきます。何もなくなったところで、外へ頼ることを諦めて、自分自身との対話を通してのみ展開する、真の水瓶座の世界へと移行するのでしょう。\n何か形あるものに依存した瞬間に、それは土星の枠の中に封じ込められていきます。水瓶座はひらめきと共時性のサイン。その時々に起こることを、自分の内なる発想と機転で乗り越えて生きていくのです。\nこの度数を持っている人は、真に自由な生き方をするために、自分でも思いがけない経験をすることがあるでしょう。予定していたことがうまくいかなくなったり、まったく予想外の展開が起こったりすることもしばしばありそうです。\nしかし、それは真の自分自身に目覚めるための通過儀礼。偽りの人格が剥がれ落ちることで、その下に隠された本質が姿を現します。型にはまらない自分だけの生き方をすることで、本当の人生が始まるでしょう。思いもよらないドラマティックな体験をする人もいるかもしれません。"}, "水瓶座_3": {"sign": "水瓶座", "degree": 3, "symbol_ja": "海軍からの脱走兵", "symbol_en": "A Deserter From The Navy.", "key_phrase": "あらゆる規律に背いてわが道を突き進む人", "explanation": "海軍は海上を舞台として戦う軍隊です。海を人間の集合意識としてとらえるならば、海軍は人の感情さえも規律で縛りつけようとする集団だといえるかもしれません。\nそんな制約に心底、嫌気がさして、隊から勝手に脱走した兵士のサビアン・シンボルです。水瓶座の信条の第一は「自由」にあって、何事にも誰にもとらわれない生き方を求めます。外の権威ではなく、内なる真実に従うことをモットーとして、そのために規律を破り、人の期待を裏切ってでも、独立の道を選ぶでしょう。\n水瓶座を守護する天王星は、土星の決めた制約を壊すことを目的とした星座。凝り固まって、自分で考えることをやめてしまった人々に、センセーショナルなインパクトをもたらして、自分の意志を取り戻させるのです。\nこの度数を持っている人は、何よりも自由を愛し、誰からも支配されない独立した自分でいることをどこにいても貫くでしょう。一時的に組織に属することがあったとしても、途中でやめてしまったり、あるいは表面的に合わせているようでいても、実質的にはマイペースに自分のやり方と信条を貫いていたりすることが多そうです。\n多くの人たちが常識だと思い込んでいることに対して反旗を翻し「自分はそうは思わない」と、はっきりと打ち出す強さがあるでしょう。どんなことであっても、決まりきった型にはめられることを嫌い、あらゆることに独創性を見出します。縛られていると感じた途端に逃れたくなるでしょう。\n既存の価値から逸脱して、自分だけのオリジナルを探求する人です。"}, "水瓶座_4": {"sign": "水瓶座", "degree": 4, "symbol_ja": "ヒーリングの技を披露する", "symbol_en": "ヒンズー教徒のヨガ行者", "key_phrase": "ヒーリングの技を披露するヒンズー教徒のヨガ行者", "explanation": "スピリチュアルなスキルを発揮して独立して生きる人\n社会的な制度やローカルな環境からの制約に真っ向から対立し、自由で自発的な立場を貫こうとするのが水瓶座です。社会に依存せず、\n収入も生活もすべて、誰からも支配されないやり方でまわしていくことを望むでしょう。\nそのために、どこへ行っても生きていくためのスキルや知識を身につけて実践するのがこのサビアン・ワードです。一般的な社会通念上の医療や薬剤のシステムから見たら、ヒンズーのヨギの施すヒーリングは怪しく見えるかもしれません。\nしかし水瓶座は社会に依存しない代わりに、同じ信念を有する横のつながりを持つ星座。同じように社会に対して独立したい、コントロールされたくないという意志を持った仲間たちが集まり、ヨギのヒーリングを支持するかもしれません。\nこの度数を持っている人は、社会の仕組みから独立した形で通用するようなスピリチュアルなスキルや知識を身につけていることが多いでしょう。世の中の理を独自の感覚で読み解き、自分ならではの感覚を通して、世界と関わろうとするかもしれません。独立志向が高く、社会の制約に縛られない自由な形で生きていくことを望むでしょう。\nしかし、本当に独立するためには横のつながり、多くの仲間たちを得ることが必要です。本来ヨギは、ヨガを通して、あらゆる物事に静寂を見出すことをめざします。まわりがどうであれ、自分自身の真実をつながり、自分なりのテクニックやスキルで世界と対峙することができる人でしょう。"}, "水瓶座_5": {"sign": "水瓶座", "degree": 5, "symbol_ja": "若いリーダーの努力を成就させようとしている", "symbol_en": "先祖の協議会", "key_phrase": "Leader.", "explanation": "若いリーダーの努力を成就させようとしている先祖の協議会\nさまざまなめぐり合わせによって道が拓かれる人\n水瓶座は限定された社会の枠組みから離れて、より自由な環境のなかで個人の独立した人生を創り出していきます。しかし実際には、個人の能力でがんばっているように見えていながらも、その背後で働いている、さまざまな力に助けられていることに気づくでしょう。個人の技術や知識は先人たちが学び、切り拓いてきたものですし、それを身につけようと思い至った背景には、そこへ自分を連れて行った偶発性による導きがあったかもしれません。\n「たまたま、そのときに、それとめぐり合った」\n「そうしようと思ったら、偶然にも同じタイミングでそれが起こった」\n「これをしようとしたら、助けてくれる人がちょうど現れた」\n山羊座によって維持される限定された社会の空間から離れることで、より自由度の高い共時性が働くようになります。このシンクロニシティによって示される、さまざまな偶然性こそが、見えない力による導きといえるかもしれません。\nこの度数を持っている人は、なにかをしようと働きかけたときに、それがうまくいくような流れにのった、という経験をすることがあるでしょう。さまざまな出会いや、はじまりのきっかけや、次の段階へ進むときのチャンスなどが、自分で望んで行動することで、外側の世界から招かれるかのように、やってくるかもしれません。\nサビアン・ワードにある通り、先祖の助けや導きを感じる人もいるでしょう。しかし、それだけに限らず、宇宙に流れている法則や見えない気のめぐりのようなものを感じて、その恩恵に活かされていることを実感できそうです。"}, "水瓶座_6": {"sign": "水瓶座", "degree": 6, "symbol_ja": "ミステリー劇で儀式に興じる仮面をつけた演者", "symbol_en": "A Masked Figure Performs Ritualistic Acts In A Mystery Play.", "key_phrase": "自分を自由にさせるために役割を演じる人", "explanation": "水瓶座は社会的な制約から自由になることを大切にする星座。自分自身を縛りつける環境から、いつでも自由でいることを求めるでしょう。そこで、ここでは自分の自由を守るために、その場で求められている役を演じることをしていきます。\n役者が脚本を渡されて配役された時に、それが何であれ、なりきるように、その場に応じて仮面をつけて演じることを試みるのです。その場が自分に求めている役割や仕事が何なのか。自分の立場がまわりの人たちにどのように影響しているのか。そのためにはどのように振る舞うのがベストなのか。それらを客観的に観察しながら、その時々の役割を熱演することで、自分自身の本体はその場から離れた瞬間に素に戻ることができます。演じていればその立場に過剰な責任を抱くことも「こうあるべきだ」という型と同化することもないでしょう。\nこの度数を持っている人は、本体としての自分自身の自由を守るために、何事にも入り込まないようにするでしょう。代わりに、どこにいてもまわりをよく観察して、そこでどんな役割を求められているのかを知り、その仮面をかぶって、それをまっとうします。役者が素直に脚本に従うように、そこに自分のこだわりを持ち込まないため、まわりと余計な軋轢や摩擦を起こすことなく、その役に溶けこむことができるでしょう。\nしかし、同化してそのものになることを拒むため、ひとつの場所や役割に留まることはしたくないし、しない方が自由でいられるかもしれません。シンボルに「ミステリー劇」とあるため、日常の中でも少し不思議な出来事に遭遇したり、ちょっと特殊なポジションの役を与えられたりすることもあるでしょう。"}, "水瓶座_7": {"sign": "水瓶座", "degree": 7, "symbol_ja": "卵から生まれたと見られる子ども", "symbol_en": "A Child Is Seen Being Born Out Of An Egg.", "key_phrase": "どこの何事にも頓着しない自分をめざす人", "explanation": "通常、人間の子どもには親がいます。\n哺乳類は母親から乳をもらって成長し、そこに特別な愛着や絆が生じるでしょう。しかし、このサビアン・シンボルの子どもはあたかも自分が卵から生まれたかのように振る舞っています。もちろん親はいるでしょうけれども、そこに特別な思い入れや愛着を持ち過ぎることがないのでしょう。\n誰からも支配されることのない真の自由を獲得するためには、どこにも誰にも深入りしないほうがうまくいく、という考えに基づいています。それは一見、すべてのものから切り離された閉鎖的な生き方のように見えますが、別の側面から見ると、一部の空間やつながりだけに閉じ込められることのない、真にオープンに世界に開いた生き方であるともいえそうです。\nわたしたちの身体の感覚が強くなるほどに、そこに好き嫌いが生まれ、自分にとって良いものと悪いものを区別するようになります。そこであえて感覚を希薄にすることで好き嫌いをなくして、どこの何にもスッと馴染むことができる自分を維持するのかもしれません。\nこの度数を持っている人は、真に自由な自分でいるために、どこか感覚的に世の中から一歩ひいているようなところがありそうです。実際にはそこにいるし、生活もしていますが、いろいろなものに対する執着が薄く、いつもどこかが希薄なような感じがするかもしれません。スクリーンを通して世界を見ているようなところがあり、あらゆるものにこだわりがなく、頓着しないことも多いでしょう。\n特定の生き方や考え方と同化することを嫌い、限りなく無色透明な自分でいることを望む人といえそうです。"}, "水瓶座_8": {"sign": "水瓶座", "degree": 8, "symbol_ja": "飾られている美しい衣装を着た蝋人形", "symbol_en": "Beautifully Gowned Wax Figures On Display.", "key_phrase": "世界を客観的に眺めながら実験を試みる人", "explanation": "蝋人形はとても緻密に作られていて、ある意味人間以上に完璧な美しさを持っています。現代でいうなら\nAI を搭載したロボットがこれに該当するかもしれません。\n水瓶座は誰からも支配されない完全に独立した自由を獲得することを目指す星座です。そのためには一度生々しいつながりを断ち切った方がうまくいくと考えるでしょう。感情的なつながりを重視していると、自分では望んでいない家や土地からの干渉や情に捕まります。そこで彼らに対して、あたかも自分が\nAI\nロボットであるかのような機械的な反応することで、一定の距離を保とうと試みるでしょう。\n相手が誰であれ、感情的に入れ込みすぎずに関係を築きます。そうすることでいつも自分自身の自由を守ることができるので、エネルギーを別のことに向けて使えるでしょう。\nこの度数を持っている人は、この世界の仕組みをロジカルに理解して、自分の手で再現することに喜びを感じるかもしれません。特定の技術を身につけて、いつも同じように働きかけたら同じ結果が得られることに満足するでしょう。世界に対して実験的にいろいろなことをして働きかけてみようとする思いがあり、自分独自のアイデアで新しいことを試みるかもしれません。\n直接的ではない、バーチャルな世界でのやり取りを楽しんだり、何か始める前に想像を広げてシミュレーションしたりしそうです。他者に対しては、リアルにべったりと付き合うよりも、さっぱりと感情的に深入りしすぎずに付き合うことを好むでしょう。"}, "水瓶座_9": {"sign": "水瓶座", "degree": 9, "symbol_ja": "鷲に変身する旗", "symbol_en": "A Flag Is Seen Turning Into An Eagle.", "key_phrase": "自分で決めた予定を忠実に実行する人", "explanation": "旗はさまざまな情報を含んだものが図で示された象徴です。鷲は実行力と情報収集力のシンボルです。旗が鷲に変化するということは、一度定めた目的を淡々と実行すること、といえるでしょう。コンピューターのプログラミングが旗だとしたら、そこで入力しておいた通りに動くのが鷲の役割ともいえそうです。この鷲は水瓶座のシンボルですから、野生の本能のままに飛んでいるというより、たとえばドローンのように、しっかりと設計された上で目的に向かって飛んでいるのかもしれません。\n水瓶座はこの世界の成り立ちを思考で理解すると同時に、実験の場として新しい世界との関わり方をアイデアによって持ち込みます。「みんながそうしているから」「普通はこうだから」というやり方は決してせず、人生の隅々に至るまで、きちんとした理由に基づいた生き方をすることが心地よくもあるでしょう。\nこの度数を持っている人は、自分で計画を立てて、その計画した通りに実行することに充実感を覚えそうです。気分やノリで行動を変えることはなく、淡々とこなすことができるでしょう。もし、それが合わなければ計画を修正して、もっと合理的なやり方に変えていきます。\nある意味、本能的な部分をカットして、忠実にマインドの計画に従う生き方はどこか機械的に感じられるかもしれません。\nしかし、何も考えずに、ただ習慣だから、気分だからと実行するような思考停止な生き方は、この度数の人にとって、意識が眠っているようにしか感じられないでしょう。人生の隅々にまで意識を通電させた生き方を理想としているともいえそうです。"}, "水瓶座_10": {"sign": "水瓶座", "degree": 10, "symbol_ja": "一時的に人気者となったけれど、", "symbol_en": "人としてこの理想ではないことを", "key_phrase": "A Man Who Had For A Time Become The Embodiment Of A Popular Ideal Is", "explanation": "Made To Realize That As A Person He Is Not This Ideal.\n一時的に人気者となったけれど、人としてこの理想ではないことを実現するために作られた男\nいつもまっさらな自分自身でいることを望む人\n仕事や学業に精を出して、まわりのみんなから認められることで、人は人気を得たり、成功したりします。しかし水瓶座は、社会から求められる役割と同化することから解き放たれることを望むでしょう。\nわたしたちは大抵の場合、無意識のうちにローカルな環境の持っている意志に染まり、社会から要請される役割や成果が、あたかも自身の望みであるかのように感じています。水瓶座はローカルの意志と同化することを拒むため、それらが自身の意思とは無関係のところから形成された、仮の人格の仮の望みであることに気づくかもしれません。そうであるがゆえに、どこにいても、その役割に没頭しきることができず、いつもどこか醒めた思いでいることになるでしょう。\nそしてまた本来の人間の自由意志とは、そのように何者からも影響されることのないものだということを知っています。まっさらな自分でいることを望みますが、そうであるほどに、どこにいてもしっくりする感じがしなくなるという事態が起こる可能性があります。\nこの度数を持っている人は、いつもどこか冷静なところがあり、何をしていても、それをしている自分を見る、もうひとりの自分がいるかもしれません。さまざまな場所でそこで求められている役割を演じますが、その何とも同化することがないため、ひとつの場所に長くいると、離れたくなったり飽きてきたりするでしょう。\nたとえ何かの成果をあげて、まわりから認められたとしても、その自分が真の自分ではないと感じているようなところがありそうです。どこにも属さない無色透明な自分でいることを大事にしながらも、世界のどこに身を置くか、迷うことも出てくるでしょう。"}, "水瓶座_11": {"sign": "水瓶座", "degree": 11, "symbol_ja": "沈黙の時間の中で人生を変える", "symbol_en": "新しいひらめきを受け取った男性", "key_phrase": "His Life.", "explanation": "沈黙の時間の中で人生を変える新しいひらめきを受け取った男性\n自分の内側から湧き上がってくる真実のみを抽出する人\n外の世界からやってくる、あらゆる影響から自由になって、真に独立した自分自身を打ち出そうと水瓶座は奮闘します。水瓶座は「意識魂」というたましいと関係するのですが、それは外側の権威には従わず、自分の内側にのみ忠実に真実を求める生き方をうながすでしょう。\nこのサビアン・ワードは、静かに沈黙している瞑想的な状態の中から純粋なひらめきや直観を受け取っている様子が描かれています。それはいかなる思考やイメージとも異なるでしょう。思考やイメージは過去に経験して見知ったものから作られるもの。ここではそれらを脇において、もっと深いレベルからもたらされる真実に触れようと試みるでしょう。\nしかし、それは容易なことではありません。わたしたちは経験が増えるほど、それらの影響を無意識のうちに受けてしまいます。それゆえに、純粋な真実とつながるためには、時にそれらを排除することが求められるでしょう。\nこの度数を持っている人は、あらゆる物事に対して他人が作り出した基準には従わずに、すべてを自分のやり方や考えで行いたいと考えるかもしれません。そのために時々、いろいろな情報や影響を遮断して、自分ひとりで過ごす時間を求めるでしょう。\n既存のやり方の真似をしたり、参考にしたりすることを好まず、他の人がしていないことを自分の力で作り出し、形にすることを好みます。それゆえに他の同業者がやっていることを気にも止めなかったり、参考文献を読んだりすることをしない人もいるでしょう。純粋な自分自身から生じる「オリジナル」を求める人です。"}, "水瓶座_12": {"sign": "水瓶座", "degree": 12, "symbol_ja": "卒業するために広い階段の上をめざして並ぶ", "symbol_en": "さまざまなタイプの人々", "key_phrase": "卒業するために広い階段の上をめざして並ぶさまざまなタイプの人々", "explanation": "意識の高い生き方を強く求める人\nさまざまな経験を積んだ人たちが、一様に階段の上へ登っていることをめざしているサビアン・シンボルです。これは水瓶座の階段ですから、その人がどれくらい意識的に生きているのか、というものをはかるための階段かもしれません。\nこれが山羊座の階段であれば、それはどれくらい稼ぐことができたのか、どれほどの地位についているのか、というヒエラルキーを示しているでしょう。しかし水瓶座は、そんな物質的な基準の真逆をいく星座。すなわち、社会の特定の価値と自分自身の意志とを同化している人を「眠っている人」とみなして、自分自身で考えて、オリジナルの行動をする人ほど「より意識的だ」と定義するでしょう。ですから、ここでいう卒業とは、ある種の解脱のように、カルマの輪からの卒業をさしているのかもしれません。\nそして、誰が何をして、どんな道を志したとしても、人々はやがて自分らしさに目覚めていき、みんなが同じように意識の高みをめざすことになるのだということを示唆しているのかもしれません。\nこの度数を持っている人は、精神的な面での上昇志向が強く、どこまでも他人に支配されない自分だけの道を志すようです。そして同じように、他の誰にも影響されない生き方をしている人を仲間とみなし、逆に自分で何ひとつ考えることなく、社会の基準をおのれの規範としている人を見ると「眠っている人だ」と感じることがあるでしょう。\n仲間たちとともに、意識の進化した生き方を強く求め、実践していきます。自分に対して、非常にストイックな面が出てくるかもしれません。"}, "水瓶座_13": {"sign": "水瓶座", "degree": 13, "symbol_ja": "バロメーター", "symbol_en": "A barometer.", "key_phrase": "いつも冷静で公平に世の中の流れをとらえる人", "explanation": "バロメーターは気圧を測り、天候を予測するために使われます。きちんとした数値として観測点において測られ、これからくる天気の流れをすばやくつかむことができるでしょう。世の中の変化を敏感にキャッチするサビアン・ワードです。\nなぜ、それを察することができるかというと、意識がすべてのものに対して開かれているため。大抵の人は、自分の興味ある分野にのみ意識を向けて、似たような仲間たちの話から動向をつかみます。自分とは関係ない分野の情報を断ち切って、余計なものを入れないようにする人もいるでしょう。\nしかしローカルな慣習やしきたりから自由である水瓶座は、特定の誰かや何かに偏らずに、全体の流れをくまなく見ることができます。特定の誰かに肩入れしないので、結果的に冷静にどこで誰が何をしようとしているのか、単なる事実として、その空気が動き、圧力が高まっていることが感じられるでしょう。\nこの度数を持っている人は、非常に鋭く、世の中の流れや人の動きを読み解くことができます。一般的な考えや物の見方にとらわれず、全体を公平に機械的に見るため、史実として起こっていること、起こりそうなことをとらえることができるでしょう。\n特定の人に肩入れすることなく、他者と交流しながらも、いつも冷静に相手の動きを見ているかもしれません。水瓶座は占星術を象徴する星座ですが、星を読むときもこのように特定の星座や惑星に偏った見方を与えないことが大切。機械的で公平な視野が開けて、何かで情報を得なくても、世の潮流を感じることができるでしょう。"}, "水瓶座_14": {"sign": "水瓶座", "degree": 14, "symbol_ja": "トンネルに突入している電車", "symbol_en": "A Train Entering A Tunnel.", "key_phrase": "超合理的に人間らしさに時間を費やす人", "explanation": "大勢の人間を乗せた電車が、山を抜けるためのトンネルに突入しました。これは水瓶座のトンネルですから、古いやり方から新しい時代のやり方へと一気にワープするトンネルかもしれません。\n山羊座が好むことが合理性であれば、水瓶座が実践するのは超合理性。コツコツと下積みをして一人前になろうと努力を重ね、そのためにより効率的な修行方法を見つけ出すのが山羊座だとしたら、その作業はすべてコンピューターにインプットして、面倒な部分は自動化しようとするのが水瓶座です。\n昔は何時間もかけて人力と根性で山を越えたものです。それがトンネルを掘って、線路を引けば、一気に大勢の人を短時間で運ぶことができます。さらに地下にリニアを通すようにして、無人運転にすれば、ますます効率的にもなるでしょう。\nこの度数を持っている人は、発想力が豊かで、人々の生き方をますます合理的にしていこうと考えるかもしれません。身体を使って根性でやり遂げるようなことに何時間も費やすよりも、できることはすべて自動化して、もっと有意義なことに時間を使おうとするでしょう。とにかく無駄なことを極力カットして、どうしたらもっと合理的にやれるのかを考えるかもしれません。\n水瓶座の目的は、内なる権威に従って、ひとりひとりがその魂の輝きを放つことにあります。そのためには肉体労働や不要な作業に時間を取られている暇はありません。できる限り、あらゆることを自動化して、もっと自分が充実するために時間を使うべきだと考えます。\n新しい時代の新しい発想へと、人を導いていくこともできるでしょう。"}, "水瓶座_15": {"sign": "水瓶座", "degree": 15, "symbol_ja": "フェンスの上に座って", "symbol_en": "幸せそうに歌っている二羽のラブバード", "key_phrase": "フェンスの上に座って幸せそうに歌っている二羽のラブバード", "explanation": "一歩引いたところから全体の流れを掌握する人\nラブバードとは、オスとメスがほぼ離れることなく行動するインコのこと。仲良しカップルのインコたちが楽しげに歌っている姿は、平和で愛らしくもあるでしょう。\nこれが個人の内部で起こっていることだとしたら、この人はどこか余裕を持って世界を眺めているのかもしれません。男女のインコたちは、個人の内側の男性的な能動性と女性的な受動性とのバランスが取れていて、必要な時にそのどちらも使いこなせることを示しているのでしょう。\nフェンスの上にいるこのインコたちからは、世の中のことがよく見えています。水瓶座は既存の社会からの独立を試みて、どこの誰にも染まらない意識を構築してきました。その結果として、世界のことを客観的にとらえる視野が発達し、何が起こっていて、何が今必要であるのかが、よく見えるようになったのでしょう。\nこの度数を持っている人は、どこにいても高い地位についたり、リーダーシップを取ったりする立場になることが多そうです。それはあなたが広いビジョンを持っていて、いま何が起こっていて、何をすればいいのか、的確に指示する力があるからでしょう。\n誰にも感情的に肩入れせず、個人的な感情による良し悪しのジャッジを持たないがゆえに、他の人には見えない全体を把握する能力が高まります。そのため多くの人があなたにアドバイスを求め、実際その通りに行動するかもしれません。全体から一線を引いたところから、秩序とバランスをもたらすことができる人です。"}, "水瓶座_16": {"sign": "水瓶座", "degree": 16, "symbol_ja": "デスクに座る偉大なビジネスマン", "symbol_en": "A big businessman at his desk.", "key_phrase": "理想の価値観をひとつの形として社会に示す人", "explanation": "信念に基づいた壮大な夢を思い描き、それを実現しようとしているビジネスマンのサビアン・ワードです。水瓶座が既存社会からの独立をめざす星座であるため、このビジネスマンのおこなうビジネスは、すでに社会に存在している形のものではありません。また経済活動がメインとなる牡牛座や蠍座からも離れているため、このビジネスはお金を稼ぐことよりも、理想の信念や価値観をなにかしらの形で実現させるものとなるでしょう。\n自分自身で大切にしている信念がその中心にあるため、ある種、その思想が絶対となって、まわりへその影響を広めていくことになりそうです。水瓶座は大切にしている価値観の外にある、個人的な感情や都合をあまり重視しないため、まわりからはどこかクールに見られることがあるでしょう。しかし、それを貫くからこそ、ひとつの理想を形としたビジネスが成立するのかもしれません。\nこの度数を持っている人は、自分のなかにある理想を実現する力を持っているでしょう。意志の力が強く、実行力があり、自分の信じた道を貫いていきます。その姿勢はワンマンといえるような権威的な側面があるでしょう。\nしかし水瓶座の理想は個人的な感情から発したものではなく、ある種の時代からの要請であったり、人々の未来に対する願望を反映していたりします。それゆえに多少強引でありながらも、まわりに対する説得力があり、同じような意識を持っている人を強烈に引き寄せる力があるでしょう。"}, "水瓶座_17": {"sign": "水瓶座", "degree": 17, "symbol_ja": "主人と所有物を監視している番犬", "symbol_en": "A Watchdog Stands Guard, Protecting His Master And His Possessions.", "key_phrase": "曖昧になった境界にきっちりと線を引く人", "explanation": "番犬は通常、自分のテリトリーとそれ以外のテリトリーとの境界線にいて、異物が入り込まないように見張っている存在です。個人の領域を守ると同時に、どこにその境界があるのかということをはっきりとさせるでしょう。\n水瓶座が自分の理想ともいえる大きなビジョンを思い描き、それを実現させる過程において他の人たちを惹きつけて、巻き込んでいくと、次第にその領域や役割が曖昧になっていきます。これが地のエレメントであれば、複数で何かをするにしても、地位や役割や雇用形態で境界がはっきりと分かれているのですが、水瓶座の場合はそうではありません。ある人の打ち立てた理想や信念に対して、大勢の人たちが賛同して関わっていったときに、明確な契約が発生しないままに進んでいくと、後になって誰が何をどれだけして、どんな権利があるのか、わからなくなるでしょう。\nその境界が曖昧になったときに登場するのが、この番犬といえるかもしれません。\nこの度数を持っている人は、社会の中で時々、自分の領域や権利がどこまでなのかということを考え、線を引き直すことがあるでしょう。自身の責任や権利が、協力してやってきた人たちとのあいだで曖昧になることがあり、改めて調整する必要が発生するかもしれません。それは骨の折れる作業ですが、依存しあっり、同化したりするような曖昧さを残しておきたくないという気持ちもあるでしょう。\nまた犬(DOG)のアナグラムは、神(GOD)となるため、この世界とは異なる別の領域と隣接する可能性も、この度数の人は持っています。人知れずうちに、おおいなる存在と接触する経験をする人もいるでしょう。"}, "水瓶座_18": {"sign": "水瓶座", "degree": 18, "symbol_ja": "秘密の動機が公に暴露されていく男", "symbol_en": "A Man\\'s Secret Motives Are Being Publicly Unmasked.", "key_phrase": "物事の真実を明らかにさせていく人", "explanation": "水瓶座は人間の持っている感覚の中では嗅覚との関わりがあり、これは真偽を見抜いて、嘘を嗅ぎ分ける器官です。嗅覚の非常にすぐれた動物は何キロも離れたところにいる獲物でも特定することができるでしょう。\nこの嗅覚が司るものは人間の正直さ。あるいは誰かひとりだけが周囲をごまかし、得をしようとしていないかという狡さを見抜く公平性の質。これが強化されると個人のエゴから生じた狡猾さや隠された欲求を誰もがわかるような形として表面化させて、おおやけにしていきます。\n1980年代後半から水瓶座の時代に突入して、本格的なインターネットによる全世界のつながりが強化されると、これまで隠されてきたさまざまな真実が公のものとなってきました。いまや情報は全員で分かち合うものであり、そこに秘密があることが突き詰められるような時代といえるかもしれません。\nこの度数を持っている人は、公明正大な質があり、どんなことでもオープンにしていこうと働きかける資質があるでしょう。個人の小さな秘密から、社会や団体が持っている秘密、あるいは真理や宇宙の秘密といったものまで、意識次第でいくらでも扱うことが可能です。\n実態を明らかにすることや調査することに適性があるため、どんな分野であったとしても、隠されたものをオープンにしていくことになるでしょう。心理カウンセラーや探偵としても活躍が期待できそうです。さまざまな物事の本質をつかもうとする意欲のある人です。"}, "水瓶座_19": {"sign": "水瓶座", "degree": 19, "symbol_ja": "水と化学薬品と", "symbol_en": "筋力のある人たちの活躍で収められた山火事", "key_phrase": "Muscular Energy.", "explanation": "水と化学薬品と筋力のある人たちの活躍で収められた山火事\nいつも意識がオープンに開かれている人\n水瓶座は狭い社会の制度の中に埋没することなく、自由で独立した意識を持ち続ける星座。社会の仕組みに取り込まれると、人は自分で考えることをやめてしまい、水瓶座はそれを危惧します。水瓶座の守護する天王星は、人が目覚めて生きること、惰性に陥ることなく、いつでもその瞬間に気づいているようにとうながすでしょう。\n山火事は、それが起こった時の季節や気候、風向き、木の種類や密集具合によって、どのように広がるのかが変わります。ですから山火事が起こったときは、注意深く成り行きを見守りながら、柔軟にその都度、その都度で対処していくことが求められるでしょう。\nこれは問題対処能力を示すサビアン・ワードですが、そこにはマニュアルが存在しません。ある現象が起こったとき、その状態から知っている知識を当てはめて考えることは簡単にできます。しかし、それをしてしまうと、想定外のことが起きている時の初動の対応が後手にまわってしまうでしょう。どんなことに対してもしっかりと意識を向けて、何が起こっているのかを見定めることで、完全に問題に対応できるのかもしれません。\nこの度数を持っている人は、意識が常にオープンに開かれていて、どんなことも偏見を持たずにしっかりと受け止めようとするでしょう。起こったことに対して、マニュアルで対応するような手抜きはせずに、毎回きちんと自分で考えて、それに合ったやり方で向き合っていきます。\nその誠実さは思い込みや偏見を捨てて、常に今をきちんと見届けるところに示されるでしょう。実力があり、誰からも信頼される人です。"}, "水瓶座_20": {"sign": "水瓶座", "degree": 20, "symbol_ja": "メッセージを運ぶ大きな白い鳩", "symbol_en": "A Large White Dove Bearing A Message.", "key_phrase": "外側の世界とシンクロニシティでつながっている人", "explanation": "メッセージを運ぶ白い鳩とは、ノアの箱舟に登場する、希望を伝える鳩かもしれません。ノアの箱舟に登場する白い鳩は、すべてが失われたと思われた世界の果てに、希望の土地があることをわたしたちに伝えました。\n世界はすでに完璧であり、必要なものは全部備わっている。そんなことが、このメッセージには示されているのかもしれません。\n水瓶座は前半の度数で、世界とのあいだにどこか一線を引いたような態度をとって、あまり深入りしないように、何事にも肩入れようにと努めてきました。それは外側の支配から逃れて、真に自由な自分を作るためでしたが、逆にいえば、感覚を閉じなければ、それらに影響される部分が少なからずあったのでしょう。\nしかし、真に心の自由を手に入れて、常に自分の中心とつながってさえいれば、外の世界の何と関わっていてもブレることはありません。それどころか、世界はすでに万全であり、自分に必要なことはいつでも自在に起こるのだということに気づかされるでしょう。\nこの度数を持っている人は、自分自身の中心に身を置いていると同時に、世界のあらゆることに開いているようです。何かを頭で計画しすぎなくても、必要なことはおのずと起こるでしょう。それはシンクロニシティであり、自分の意識と外の世界が当たり前のようにつながっていることを示しています。何か迷った時も、自然と自分にとってのヒントやメッセージややるべきことがやってくるでしょう。\nまた、自分の気づいたことや知り得たことを発信すると、それが他の誰かにとっての必要なメッセージとなるかもしれません。"}, "水瓶座_21": {"sign": "水瓶座", "degree": 21, "symbol_ja": "絶望し幻滅しながらも", "symbol_en": "それに屈しない精神的な強さのある表情で", "key_phrase": "A Disappointed And Disillusioned Woman Courageously Faces A Seemingly", "explanation": "Empty Life.\n絶望し幻滅しながらもそれに屈しない精神的な強さのある表情で虚しい人生を眺めている女性\n本能的な心と身体の声を凌駕しようとする人\n理想とする大きな目的のために、自分のすべてを尽くして働きたい思いがおおいにある人です。水瓶座は自身の繊細な個性を否定することによって、世界のどこにでも適用し、すっと馴染めるような自分になることをひとつの理想としてきました。肉体や感情に重きをおいていると、それらは好き嫌いや、快・不快といったものに振り回されるため、どこでも生きるという本来の目的が見失われます。\nそこで度数の前半では、それらとのつながりを希薄にさせるために、あえてクールに身のまわりの環境や人たちと距離を取るということを試みました。後半に入ると、もっと世界とダイレクトに関わりながらも、変わらずに無色透明な自分でいることにチャレンジをします。\nしかし、そんな理想とは裏腹に、わたしたちの身体はやっぱりお腹が空くし、眠くなるし、それゆえに好き嫌いがなくなることもありません。そんな本能的な部分がなくならない自分自身に幻滅しながらも、内なる理想を完遂させるために、身体の声や欲求を無視してがんばることがあるでしょう。\nこの度数を持っている人は、自分の身体や心にあえて極度な負荷をかけながら、目的を達成することがありそうです。まるでストイックな修行僧のように、心と身体の欲求を精神力で押さえ込もうと試みるかもしれません。\nそれでも容易に心と身体をコントロールすることはできず、たまにそれらが大きく主張してくることがあるでしょう。そのような葛藤を超えて、精神の力を駆使して、高い技術や知識を身につけることのできる人です。"}, "水瓶座_22": {"sign": "水瓶座", "degree": 22, "symbol_ja": "子どもたちが心地よく暖かく遊べるようにと", "symbol_en": "育児室の床に敷かれた布", "key_phrase": "Comfort And Warmth.", "explanation": "子どもたちが心地よく暖かく遊べるようにと育児室の床に敷かれた布\n心身を改めて解放しようと再教育を試みる人\n世界のどこへ行ってもすっとなじみ、どんな役割にでも即座になることができるように、水瓶座は自身の個性を極力抑えるように努めてきました。個性があると、ある場所には適用できるけれど、ある場所には馴染めないということが起こるため、それを否定するためです。\n土地に馴染むことを拒否する個性は、基本的に心と身体に宿っています。身体は幼少期から慣れ親しんだ環境を心地よく感じることが多く、そこからかけ離れた場所に不快を示すでしょう。\nまた心のほうは幼少期の成長過程において、ある程度の感情的な反射のパターンが近親者との関係において作られます。そこで、ここでは改めて何も干渉されることのない自由な個人となりきるために、幼児期の記憶から再教育しようと試みるでしょう。床に敷かれた布が、現実と自分自身とのあいだを取り持って、どこにいてもすっと馴染むように、個人の情操を育て直していきます。\nこの度数を持っている人は、自分自身の心の持っている可能性に目をつけて、そこをのびのびと解き放つために再教育しようとするかもしれません。水瓶座らしく、心の仕組みや、成長の過程において人はどんな影響を受けるのかということを理論的に学んで、その視点から個人の心を自由にしようとするでしょう。\n中にはトラウマの解放や、自己受容の再プログラムなどを試みる人もいるかもしれません。いずれにしても、心と身体を解き放つことを通して、癒しを体験することが多くなりそうです。真に自由な人間を作るための教育に興味を持って、そこに関わる人もいるでしょう。"}, "水瓶座_23": {"sign": "水瓶座", "degree": 23, "symbol_ja": "座りながらすべての手足を振っている", "symbol_en": "大きなクマ", "key_phrase": "座りながらすべての手足を振っている大きなクマ", "explanation": "意志の力で感情と本能を矯正させる人\n天に輝くおおぐま座のクマは、神話において、狩猟の女神アルテミスに仕えていたニンフ(妖精)だったといわれています。アルテミスは月を象徴するため、このクマもまた、月と関係があるのかもしれません。そしてまた同時に、クマは本能的な動物でもあります。\n水瓶座は大きな目的のために、理性で自身を律して、自分のあらゆる行動を意識でコントロールできるようにと、進化を試みてきました。しかし、理性の力だけで感情と身体感覚まで手綱けることはなかなかむずかしく、自身のすべてを律しきることができません。\nそこでここではあえて、その本能的な部分にスポットを当てて、再教育しようとするでしょう。月はわたしたちの本能や感情、身体的なパターンや幼児性、無意識の領域などを示しています。それらを理性の力で、思考や意思と同じ方向へ向くようにと導き、矯正を試みるでしょう。その際には、ダンスやアートなど、感情や感覚を言語以外のもので表現することも役立ちます。\nこの度数を持っている人は、自分自身を律することに興味を持つかもしれません。それも表面的な部分ではなく、本能的なところや感情的なところまで、意志の力でコントロールすることを望むでしょう。\nそれは決して押さえつけて封じ込めるのではなく、それらの特性を理解して生かすことで、自発的に力を得ることをうながすようなやり方です。そのためには、心と体と思考がどのような関係を持っているのかを学び、ついで実践することになるかもしれません。情緒を解放させるために、アートの手法を使う人もいるでしょう。"}, "水瓶座_24": {"sign": "水瓶座", "degree": 24, "symbol_ja": "みずからの情熱に打ち勝ち、", "symbol_en": "自分の経験に基づく深い知恵を教える男", "key_phrase": "Experience.", "explanation": "みずからの情熱に打ち勝ち、自分の経験に基づく深い知恵を教える男\n人間の隅々までを理解して冷静に語る人\nほとばしる情熱にまかせるようなことはせず、あくまで冷静に、自分の経験をしっかりと理論的に語る男性のサビアン・シンボルです。情熱が火のエレメントの象徴する熱さであり、直感やひらめきを示すのだとしたら、どこまでもクールな冷静さは風のエレメントの象徴。自身の理知的な意識を身体の隅々にまで広げていき、その感情も感覚までも制御しようとするでしょう。\nそれも、その方法を身につけたからこそ、できることです。\nそしてまた、知識として知り得たことを、実践を通して生きた知恵とすると、その根拠を余すところなく語ることができるのかもしれません。情熱にまかせるということは、どこかオートマティックなまま、自分を制御しない本能的な部分を残しているということを示しているのでしょう。エネルギーを無駄に消費せず、正しく使うためには、意識の力でいかなる時も、いかなる部分も、冷静沈着な自分でいることがコツなのかもしれません。\nこの度数を持っている人は、とても賢く、分析家で、あらゆる物事を冷静に、その行動から結果までどのようになっているのかということを理解しようとするでしょう。体験せずに安易に語ることはせず、すべて自分で実践、体験したことに基づいて「それがどのようになっているのか」と淡々と語ります。経験したことをわかりやすく、全体の成り立ちも含めて、人に教えることができる人です。\nしかし、感情と本能に身を任せている部分が多い人は、その構造を理解できないかもしれません。それも含めてまた、人間というシステムを冷静に見ている人といえそうです。"}, "水瓶座_25": {"sign": "水瓶座", "degree": 25, "symbol_ja": "右の羽がより完全に形成されている蝶", "symbol_en": "A butterfly with the right wing more perfectly formed.", "key_phrase": "理性の力によって隅々まで自分らしさが行き渡る人", "explanation": "身体の右側というのは男性性の性質の象徴です。理性や知性の力によって自分自身をコントロールして、外の世界へ向かって、信念を打ち出していく領域を示しています。それに対して左側は女性性の象徴で、感性や感覚によってパッとつかみとる質であり、外の世界で起こっていることを受け容れる領域を示しているでしょう。\nそんな右と左の領域において、右の羽がより完全に形成されている、ということは、外側の誰かや何かに依存しない形で独立をめざしていた水瓶座が、周囲の影響を受けないで自立する自分になった、といえるかもしれません。信念が隅々にまで行き渡り「自分らしさ」を際立たせているでしょう。表面的な「理性派」ではなく、個人の感覚や感情の働きまで、そのメカニズムを理解して自由に扱うことのできる能力がありそうです。\nこの度数を持っている人は、とても理性的でバランスがとれていて、いつもどこか冷静でもいるようです。安易に人をジャッジしたり、感情を無視したりすることはなく、なにが起こっているのかを客観的に理解することができるでしょう。\n感受性や体感覚、感情も含めて、抑圧することなく、イキイキとしていながら、いつも安定していて、流されることはほとんどないかもしれません。それは人間を形成している心と身体、思考と魂についての理性的な理解があり、それを実践したからこそ辿り着いた境地であるともいえるでしょう。\n多少のことには動揺することのない、バランスのとれた自我を手に入れられる人だといえそうです。"}, "水瓶座_26": {"sign": "水瓶座", "degree": 26, "symbol_ja": "水圧計（ハイドロメーター）を使って", "symbol_en": "車のバッテリーを検査している自動車修理工", "key_phrase": "水圧計（ハイドロメーター）を使って車のバッテリーを検査している自動車修理工", "explanation": "高い知識と技術力で人の心に働きかける人\n免許を取得するときに、教習所で運転前に車を点検することを習いますが、実際に日々の生活で車に乗り始めると、つい忘れてしまって、なにかおかしくなってから、慌てて車をチェックするという人は多いでしょう。このサビアン・ワードに描かれている自動車修理工は、まだ車の調子がおかしくなったわけではないけれど、常日頃からチェックして、万全を期しています。専門的な知識と熟練した技術力という水瓶座の骨頂を活かして、慎重かつ実直に社会と関わっていこうとする姿といえるでしょう。\n水圧計は水=感情を計るツールですが、水瓶座にとっては心の繊細な揺れ動きさえも、どのように生じて、収束していくものなのか、学んで理解することができます。\nそのように感情を扱う姿勢はクールに見えますが、細やかな心の揺れ動きにも対応できるという点においては誠実だといえるでしょう。\nこの度数を持っている人は、いつも物事を客観的に見ているようなところがありそうです。何かの分野における高い知識と技術力を身に着けながら、そのスキルで社会と関わり、改変が必要なものを直していこうとするでしょう。みずからの力で社会の中で高い結果を出していきながら、人の心や感情を扱うことも可能です。むしろ問題のある人の心に働きかけて、それらを変えていくようなところがあるでしょう。\n起こっていることに対して、いつでも冷静に判断して、全体がうまく形となっていくように導くことができる人です。"}, "水瓶座_27": {"sign": "水瓶座", "degree": 27, "symbol_ja": "新鮮なスミレで満たされた古代の陶器", "symbol_en": "An Ancient Pottery Bowl Filled With Fresh Violets.", "key_phrase": "個人的な感情を普遍的な価値のなかに見出す人", "explanation": "長い時代を超えて受け継がれてきた古代の陶器に、いま摘んできたばかりのフレッシュで若々しいスミレの花が満たされています。スミレはしばらくの間は咲いていますが、時間が経てば枯れていき、そこにあったことも忘れ去られてしまうでしょう。しかし、器のほうはその後も人々に受け継がれていくことになるかもしれません。\n時代を超えて人々が大切にする「普遍的な価値」のなかに、共鳴できる自分自身の信念を寄り添わせていくのが水瓶座です。その「普遍的な価値」が「古代の陶器」といえるでしょう。\n一時的な個人の感情よりも、この「古代の陶器」である、自然にそった普遍性を優先しようとするかもしれません。「自分がどうしたいのか」という一時的な思いが新鮮なスミレだとすると、それよりも「この場合はこうするのが良いのではないか」という普遍的な価値のなかに、自身の感情を見出すことがあるかもしれません。\nこの度数を持っている人は、しっかりとした自分の信念や価値観があり、それを語るもののなかに、個人的な感情や思いも含ませていくようなところがあるでしょう。ダイレクトに個人的な感情や思いをそのまま語るよりも、ある信念体系に基づいた思想を語ることで、個人のそれを代弁させることがありそうです。\nまた古い知恵や普遍的な法則を、いまこの時代でも通用する形に変えて表現することもあるでしょう。価値あるものをわかりやすく、日常的なものに託して伝えることのできる人です。"}, "水瓶座_28": {"sign": "水瓶座", "degree": 28, "symbol_ja": "冬に供給されるために倒されて伐られた樹", "symbol_en": "A Tree Felled And Sawed To Ensure A Supply Of Wood For The Winter.", "key_phrase": "何者にも依存しない真に自立した存在となる人", "explanation": "寒い冬を乗り越えるために、思いきってあらかじめ、必要となるであろう樹を伐り倒しておいた、というサビアン・シンボルです。水瓶座の守護惑星である天王星が持っている改革の力が、余すところなく発揮されるでしょう。\nこれが山羊座の改革であれば、樹についている不要な枝葉を切り落とすことで、エネルギーを幹に集中させて、再生と生き残りを図ることになります。\nしかし、水瓶座はそもそもローカルな土地に依存しない、無色透明な自分になることを目的としたサイン。一定の場所とのつながりを持たず、代わりに共時性を通して、同じ価値観を持つ仲間たちとつながってきました。ここではあえて、そのつながりさえ断ち切って、真に自立した個人になろうとするかもしれません。\nつまり、樹を根こそぎ伐り倒すことによって、他のものに依存することで眠らせてきた力までが目覚める可能性があるでしょう。\nこの度数を持っている人は、社会の中で大きな改革を実行できる人です。より理想的な環境を作るために、既存のあり方を根こそぎ、徹底的に変える力を持つでしょう。情に流されることなく、全体のために必要なことを自分の力で成し遂げられる人です。\nまた、他の人の作った仕組みの中には入らずに、真に独立した環境において、一から自身で考えたものを構築していく人もいるでしょう。ときには信頼していた仲間と離れるような経験をすることがあるかもしれません。しかし、それによって、自身の内なる力が目覚めることにもなるでしょう。"}, "水瓶座_29": {"sign": "水瓶座", "degree": 29, "symbol_ja": "さなぎから出てきている蝶", "symbol_en": "A butterfly emerging from a chrysalis.", "key_phrase": "真に独立した個性を打ち立てて表現する人", "explanation": "長いあいだ、さなぎとなっていたものが、少しずつ脱皮して蝶々に生まれ変わろうとしています。蝶は青虫からサナギになる過程において、その体を一旦、ドロドロに溶かしてから、蝶々に変容します。蝶々は地上に15,000種以上いると\nいわれますが、それらはすべて異なるエネルギーを、天界から地上へと運んでいるそうです。それはひとりひとりの姿形が異なり、決して同じたましいを持つ者のいない人間と共通するものがあるかもしれません。\nわたしたち人間は、どこかで他者とのつながりがある限り、それらの影響から逃れることができないでしょう。水瓶座はローカルな価値に縛られることを厭い、より広範な地域で、どこにきても通用する自己像を作り出してきました。\nしかし代わりに、同じ理想を共有する仲間とつながってきたのですが、ここではそのつながりさえも切り離して、真に自由な個人に立ち戻ります。そして誰にも影響されない環境において、自分らしさを余すところなく、隅々まで表現することになるのでしょう。\nこの度数を持っている人は、誰からも影響されない形で、真に自分らしい考えや表現を作り出すことになりそうです。アーティストとしての感性があり、何事もひとつひとつ、自分自身と対話して表現しようとするでしょう。\nそれは純粋な自分の内側からあふれてきたものであり、あなたのたましいが表現したがっているものかもしれません。自分が何者であるのか、自分自身に問い続けて、内なる正直さから、あらゆるものを選ぶ力のある人です。"}, "水瓶座_30": {"sign": "水瓶座", "degree": 30, "symbol_ja": "より意識的になって明るさを増した多くの人々の心の光とひとつになって、", "symbol_en": "その変化で首尾よく現れた人に顕現される、古代の文化に深く根づいた", "key_phrase": "Deeply rooted in the past of a very ancient culture, a spiritual", "explanation": "brotherhood in which many individual minds are merged into the growing\nlight of a unanimous consciousness is revealed to one who has emerged\nsuccessfully from his metamorphosis.\n人間の究極的かつ普遍的な真実を探求する人\nブラザーフッドというのは、進化した魂を持つアセンデッド・マスターたちで構成された団体だといわれています。彼らは元々、人間としてある時期を生きていた人たち。永遠の魂の存在となることに成功して、ここに留まり、わたしたちの進化を導いてくれるといわれています。\n水瓶座の志す、わたしたちの進化とは、環境的な要因にも、人為的な影響にも、共時的な共鳴にも、とらわれることのない、真に魂の本質から自立した個人となること。そのために自分を律し、時間をかけて磨き続けてきたのでしょう。\nわたしたちの肉体と感情は地上のパターンに縛り付けられて、同じ営みをひたすら繰り返しています。それを意志の力で変えていき、本来の魂として生きることができるようにと磨いていくことが錬金であり、それをアセンデット・マスターたちが助けてくれるのでしょう。古今東西、どの時代、どの文明、どの地域に住む人たちも、人間として進化すること、おのれの魂を磨くことを望んできました。わたしたちは源からやってきて、源に還る存在ですが、その光あふれる源において、永遠の存在であることが、わたしたちのめざす道でもあるのかもしれません。\nこの度数を持っている人は、さまざまな日常的なことにこだわりを持つことが少なく、代わりに人類のルーツや宇宙のしくみ、その源について興味を持つことがありそうです。わたしたちがどこから来て、死んだらどこへ行くのか。悟るというのはどういうことか、死んだら魂はどうなるのか、永遠の命が存在するのか。\n新旧含めて、いろいろな文献を紐解く人もいるでしょう。人間が普遍的にめざしていた、究極の人間性とはどんなものなのか。どこの世界でも、いつの時代でも変わることのない真実を求めていき、それを知るほどにさまざまな制約から魂が自由になっていきそうです。"}, "魚座_1": {"sign": "魚座", "degree": 1, "symbol_ja": "農家と問屋が", "symbol_en": "さまざまな商品を並べる混雑した市場", "key_phrase": "Of Products.", "explanation": "農家と問屋がさまざまな商品を並べる混雑した市場\n市場価値ではない、自分だけの価値を探し求める人\n水瓶座の終わりで完全に独立した個人が、人間としての意識を統合させるのが魚座です。射手座で思い描いた理想の姿を、わたしたちは山羊座において自分たちの生きる場所で実現させました。しかしそれは、その時と時代に制約された価値における実現だったため、水瓶座はローカルな社会とのつながりを断ち切って、完全に自由な個人として自立した存在となることをめざしました。\nあらゆる時代にも場所にも制約されることのない個人として、世界と最後の統合をするのがこの魚座です。\n水のエレメントに属する魚座は、他の蟹座や蠍座と同じように、多くの人たちとめぐり逢い、結びついていきます。蟹座や蠍座がある一定の同じ価値を持つ相手との習合だったのに対して、魚座は価値の制約を受けないところから始まるでしょう。\nこのサビアン・シンボルの市場は戦後の闇市のようなもので、あらゆるものが一か所に集められて、法外な値段が付けられています。何を価値とみなすのか......混沌とした世界の中で頼りになるのは自分の嗅覚のみ。自身の魂からの選択が試される時の始まりです。\nこの度数を持っている人は、世の中のあらゆるものに対してオープンで、偏見を持つことがないでしょう。古今東西のさまざまな価値に触れることを楽しみ、時に混乱しながらも、数多の学びや体験や出会いをくり返していきます。そこからキラリと光る「自分にとっての価値あるもの」を見つけ出すことができるでしょう。\n感受性が非常に鋭く、自分にとって惹かれるもの、魂と呼応するものを探します。魚座はお酒と関係する星座ですが、酩酊状態を楽しむ人もいるでしょう。"}, "魚座_2": {"sign": "魚座", "degree": 2, "symbol_ja": "ハンターから隠れているリス", "symbol_en": "A Squirrel Hiding From Hunters.", "key_phrase": "大切な価値を守るためにあえて隠す人", "explanation": "あらゆるものが雑多にあふれかえっている世の中で、魚座はその鋭い嗅覚と感受性をフルに使って「自分にとって本当に大切なもの」を見つけ出します。\nしかし、山羊座の牽引する世の中は競争化社会であり、自分が大切にしたい価値あるものは、そこではちっぽけな存在で、軽々しく扱われているかもしれません。それが富を生み出さない限り、現代社会では「たいして価値がないもの」とみなされる可能性があるのです。たとえ、それが文化的・普遍的な価値を持っていようとも、現代を生きる忙しい人たちに一蹴され、踏み潰されてしまう危険があるでしょう。\nリスは大事なものを家に持ち帰って、収集します。また、警戒心が非常に強く、自分を狙うハンターからすばやく身を隠すでしょう。\nここではそのように、自分の見出した価値をあえて他者に秘密にすることによって、隠そうとする心理が出てくるかもしれません。\nこの度数は持っている人は、秘密主義であり、あまり多くを語らないでしょう。特に自分自身の本音や、内側で大切に思っていることに関しては、相手が本当にその価値を理解し、受け取ってくれるという確信がなければ、言わないかもしれません。自分が大切にしている価値と世界観を安易な市場価値で値踏みされることも、土足で踏み込まれて荒らされることも好まず、そんなことをされるぐらいならばと、ひっそりと隠して、誰にも知られないようにするでしょう。\n内気で多くを語りませんが、豊かな内面と感受性を持っている人です。"}, "魚座_3": {"sign": "魚座", "degree": 3, "symbol_ja": "砂漠に横たわる石化して割れた木の幹", "symbol_en": "Petrified Tree Trunks Lie Broken On Desert Sand.", "key_phrase": "人間の生み出した大切な価値あるものを守る人", "explanation": "ペトリファイドウッドという鉱物は、かつて木だったものが長い時間をかけて石化したもの。通常の木は経年と共に枯れていきますが、石化に成功することで数千万年から数億年ものあいだ、形を保ち続けることができます。これはさまざまなものを化石化させることで保護する目的のサビアン・ワード。\n世界には、さまざまな価値あるものがあふれていて、いまこの瞬間も各地で生み出され続けています。最後の星座である魚座は、時代のはざまにあって、前からの流れと新しい流れとをつなぎます。その際に古くて不要なものは自然と終わっていき、人間にとって本当に価値あるものだけが、そのつなぎ目を超えて残ることになるでしょう。現代においても残っている文化や習慣やすぐれた芸術や文学や思想などは、そういった時代と時代のつなぎ目を何度も乗り越えてきたものだといえそうです。\nこの度数を持っている人は、人間にとって本当に価値があるものに目を向けることになるかもしれません。新しく便利なものがたくさん生み出されていく世界の中で、消えていきそうになるものたち。その中でも、これはなくしたくない、なくなってはいけないと感じるものを見つけ出しては、みずからがそれを継承したり、守ったりすることがあるでしょう。\nそれは自然の営みに基づいた、人と自然とが調和して作り出す、文化や思想や手法などかもしれません。それらを風化させたくないがゆえに、あまり表に出さずに、ひっそりと活動することもあるでしょう。"}, "魚座_4": {"sign": "魚座", "degree": 4, "symbol_ja": "ふたつの海岸リゾートをつなぐ道の大渋滞", "symbol_en": "Heavy car traffic on a narrow isthmus linking two seashore resorts.", "key_phrase": "価値あるものを広めることに尽力する人", "explanation": "海沿いのリゾートに向かう道が大渋滞しています。人々がそこでの楽しみや癒しを求めて向かった結果として、大変混み合っているのでしょう。\nしかし、リゾートして開発される前のその場所は、もしかすると名もない漁村であったかもしれません。美しい海と広大な景観があったとしても、そのことを知らなければ、誰もそこを目指すことはなかったでしょう。\n魚座は12星座の最後のサインであり、次の新しいサイクルへ入る前の終わりを象徴しています。これまでのサイクルの中で終わらせるものと、受け継いでいくものとの、選別をすることになるでしょう。世の中にはたくさんの価値あるものがあふれていますが、経年と共にその存在が失われていくものも多くあります。例えば伝統技術や地域に根ざした文化などもそうかもしれないし、人口が減少することで失われていく景勝地などもあるでしょう。\nそれらを保存するためには、多くの人たちに知ってもらうしかありません。リゾート開発をすれば、自然や静けさは失われていきますが、その土地の文化や歴史などを守ることができるでしょう。\nこの度数を持っている人は、自分が価値を見出した大切なものを他者に伝え、守ろうとするかもしれません。それはこれまでの歴史と文化が営んできたものに含まれる、さまざまな神話や風習やイメージでもあるでしょう。\n時代の移り変わりと共に失われていきそうになるそれを守るために、小さな声を上げて、みんなに知ってもらおうと尽力します。なかなかうまく表現できなくて、思いが伝わらず、やきもきすることもあるかもしれませんが、すこしずつ努力を重ねていくでしょう。"}, "魚座_5": {"sign": "魚座", "degree": 5, "symbol_ja": "教会のバザー", "symbol_en": "A chrch bazaar.", "key_phrase": "そのものの持っている魅力を最大に引き出すことができる人", "explanation": "多くのものが世界にあふれてくると、なかなか簡単には売れなくなるでしょう。バザーは各地で行われていますが、それが教会で開催されるとなると、そこに特別な意味がプラスされるように感じられます。ましてや「売上の10%が寄付されます」等と記されると、人々の善意があおられて、多少高くてもそこに支払おうという気持ちが高まるかもしれません。\nこのサビアン・ワードはそのように魅力的なキャッチコピーを付けることで、人々の心を自在に動かしたり、あおったりすることと関係しています。物があふれている現代社会において、わたしたちは商品そのものではなく、それに付随するイメージや付加価値を購入の対象として検討するでしょう。\n「世紀のベストセラー」「全米が泣いた」「××年度ナンバーワン」「スマートな生活」といったキャッチコピーの放つイメージにわたしたちは惹かれて、購買意欲をそそられます。\nこの度数を持っている人は、そのものが持っている価値のイメージや本質をとらえて、それに魅力的な名前やコピーをつけることのできる資質がありそうです。どちらかというと、人の精神的なところに与える影響を見抜く才能があり、そこを商品の付加価値として魅力的に見せることかできるでしょう。\n芸術と関わることが多く、そのアートが持っている価値をわかりやすい形で示し、喧伝することができるかもしれません。説得力があるため、他のものとの差を表して、多くの人たちを惹きつけます。どのように見せていきたいのか、そのものを通して与えたいイメージを常に考えると、うまくいくでしょう。"}, "魚座_6": {"sign": "魚座", "degree": 6, "symbol_ja": "正装して行進する軍の将校たち", "symbol_en": "A Parade Of Army Officers In Full Dress.", "key_phrase": "大きな意義のために自分自身を捧げる人", "explanation": "ひとりの青年が軍に入隊し、軍服を与えられ、教育を受けます。そこで国を守るという行為は神聖な役割であり、多くの人たちの平和と秩序を守るための尊いことなのだと理解するかもしれません。そこにいるうちに青年は、自分が大きな使命を担っていることを深く理解して、訓練により一層励むことになるでしょう。\nやがて青年は将校となり、行進の際には堂々たる気持ちで、自分たちの役割を世に知らしめているかもしれません。\n人間が知性と同時に得たものは想像力であり、また多くの人たちとそれを共通して認識する力も持ち合わせています。「この紙には価値があるのだ」と全員が共通して想像するために貨幣経済は成り立っています。現代人の生活は、ほとんどがその実体ではなく、その実体が纏うイメージや付加価値によって翻弄され、選択されているでしょう。そしてわたしたちはそこにいることで容易にその価値に溶け込み、それこそが神聖で正しいことなのだと信じて、そのイメージの通りに振る舞おうとするのかもしれません。\nこの度数を持っている人は、何か大きな役割のために自分を捧げることができるでしょう。それはある集団の持っているイメージだったり、価値観だったり、教義であったり、宗教の教えだったりするかもしれません。少なくとも、その集団の全員が共通の認識として抱いている価値を、そこに属し、染まることで、みずからもまっとうしようとするでしょう。\n魚座は個人を超えて全体とひとつになることをしていくサインであるため、ここでは個人の意思がより大きなものと同化していきます。仕事にやりがいを見つけると、そのために個人的な生活の一部を犠牲にするような働き方をする人もいるでしょう。大義のために働くことにやりがいを見出す人です。"}, "魚座_7": {"sign": "魚座", "degree": 7, "symbol_ja": "海上で囲まれた岩石の上で", "symbol_en": "光の柱に照らされた大きな十字架", "key_phrase": "sea.", "explanation": "海上で囲まれた岩石の上で光の柱に照らされた大きな十字架\n追い詰められた極限状態のときに神秘を体験する人\n大海原に囲まれた小さな岩石の上にあった十字架に、光の柱が降りてくる......とても神秘的な深淵を連想させるサビアン・ワードです。\nこれはある種の神の啓示がやってくるようなことを示しているでしょう。それもたったひとりで極限状態に追い込まれた時に、それはやってきます。\n日常のわたしたちは淡々と生活をしています。その時、ただ漫然となかば無意識に日々を送るのではなく、そこに意義を見出して、自分の信じたもののために懸命に力を尽くして働いていると、ある時そこを突き抜けるようなことがやってくるでしょう。それを信じて尽くしていたら、ある限界を超えた時に、それが訪れるといえるかもしれません。\nこの度数の持ち主は、そもそも、ひとたび決めたらそれを信じて、一途に情熱を傾けていくような面があります。その熱さが日常を超えた時に、まったく思いがけないような神秘を招くのでしょう。\nこの度数を持っている人は、ひたむきさがあり、ひとたび何かを志したり、作業し始めたりすると、ひたすらそれをやり遂げようとするようです。そして、あるとき、極限まで追い詰められたような気分になると、思いがけない体験をすることがあるでしょう。そうなることがわかってやっていたわけではないけれど、どこかでそれを願っていたようなところはあるかもしれません。\n自分を守ろうとするつもりがなく、すべてを捧げて没頭する姿勢が奇跡を呼びこむのでしょう。\n芸術家気質なところがあり、平凡さが続くことを望んでいないかもしれません。心のどこかでは、新しい局面がやってくることを待ち続けている所がありそうです。"}, "魚座_8": {"sign": "魚座", "degree": 8, "symbol_ja": "ラッパを吹いている少女", "symbol_en": "A girl blowing a bugle.", "key_phrase": "受け取った啓示を現実のなかで実現させる人", "explanation": "少女が高らかと吹き鳴らしているラッパは、大天使ミカエルの最後の審判を彷彿とさせるもの。とても大事な局面がやってきたことを高らかと知らせてまわり、自分自身と周囲とを鼓舞させる力があるでしょう。自然体でとても素直な存在である少女が、その純真な心で、何かしらの天の意志を受け取ったのかもしれません。\nそれは再現性のない、はっきりしないものかもしれませんが、純粋な少女にとっては大きな啓示です。受け取ったそれを少女は素直に信じこみ、そしてそのイメージを具体化して、現実の物事の中に見出すと、そこに大義があるのだとラッパを鳴らして吹聴し、盛大にまわりの人たちを巻き込んでいくでしょう。霊的な啓示を受けた少女の行動ともいえますが、それが真実であるかは定かではありません。\nしかし、そのすぐれた感受性で受け取ったものを真実とみなすと、熱意と共に人に知らせてまわり、世間に多大な影響を与えるでしょう。\nこの度数を持っている人は、直感力が強く、何かしらのイメージやビジョン受け取ることがありそうです。そしてひとたびそれを得ると、そのイメージを内側でどんどん膨らませていき、それを元に何をすべきなのか、目的を作ることができるでしょう。そしてみずから作り出した目標の中に激しく身を投じると同時に、まわりの人たちのことも煽って、その気にさせていくこともするようです。\n人を扇動したり、盛り上げたりする力があって、自身の情熱の中に他者を巻き込むでしょう。\nアートとも関わりが深く、やってきたひらめきを何かしらの形に変えて、多くの人たちを魅了するかもしれません。"}, "魚座_9": {"sign": "魚座", "degree": 9, "symbol_ja": "ライバルを引き離そうと", "symbol_en": "意図して馬に拍車をかける騎手", "key_phrase": "ライバルを引き離そうと意図して馬に拍車をかける騎手", "explanation": "自分の思いを一途に傾けて夢に飛びこむ人\n騎手がレースの最中にライバルを引き離すために鞭を使い、そして馬と一体化したかのようにまっしぐらに突っ込んでいくというサビアン・ワードです。\n騎手がわたしたちの理性の象徴だとしたら、馬は本能や感情といえるかもしれません。あるいは馬は太陽の化身ともされるので、たましいともいえそうです。霊と精神と肉体とがひとつになって、より大きな意志の中に思い切って飛び込んでいく姿がここに描かれているでしょう。\n海王星に守護される魚座は自我の力が弱くなり、代わりに自分以外のものと同調していく傾向があります。相手の望みが自分の望みであるかのように感じられたり、相手の痛みが自分の痛みであるかのように感じられたりすることもあるでしょう。\nそのような同一化が、自身の見出した大義や夢に向かって発揮されるため、思いきってその対象に飛び込んでいくことになりそうです。\nこの度数を持っている人は、とても一途で情熱的。自分で「これだ」と見出し、信じたものに対して全身で飛び込んでいくような大胆さがあるでしょう。\nあれこれ空想するだけや夢を見るだけで終わることはなく、実行部隊として前へ出て行って活躍します。中途半端に迷ったり、自分の一部を守ったりすると、失敗したり、怪我したりしますが、本人が突き抜けてしまうので完全にやり抜くことができるでしょう。\n非常に高い集中力があり、特に他者と競い合う状況では抜群の実力を発揮します。何か大きな物事を仕切ることにも向いているでしょう。"}, "魚座_10": {"sign": "魚座", "degree": 10, "symbol_ja": "地を隠す雲を通り抜けて旅をする飛行士", "symbol_en": "An aviator pursues his journey, flying through ground-obscuring clouds.", "key_phrase": "内なる神秘のイメージのなかに住む人", "explanation": "人間が知性を獲得したあとに、進化するために得たものは虚構を作り出す想像力でした。人は死ぬと星になり、天には神様がいて、わたしたちのおこないをいつも見ている。そういった物語や神話を共通して持つことで、わたしたちは同一の信念を持つ仲間としての結びつきを深めていきます。現代においても、わたしたちはそのものの実体ではなく、そのものがまとっているイメージや、そのものに付随する価値によって動かされることが多いでしょう。\nここではあたかも、そのものよりも、それがどんな意味を秘めているのかというストーリーの方が重要となってきます。\n雲の下には大地があり、そこにはわたしたちの現実の世界が広がっていますが、雲の上には神様や天使たちが住んでいるかもしれません。\nこのサビアン・ワード\nの飛行士は大地に降りることなく、雲の上の旅を続けます。そしてあらゆるものが秘めている物語の世界と共に、いつも過ごしているでしょう。\nこの度数を持っている人は、想像力が豊かで、さまざまなことを空想することが得意かもしれません。あたかも、そちらの世界の方が実際のように感じられたり、現実世界の背後にもうひとつ別の異なる世界があって、二重になっているかのようにも感じられたりするでしょう。\n内なる神秘の世界を大切にしたいため、あまり本心を他者に話さないこともありそうです。理解されなくて淋しい思いをするぐらいなら、ひとりでその世界の中にいることを好むようなところもあるでしょう。防衛心から、人の前にいるときは普通を装ったり、むしろ真面目にしているように見せたりするかもしれません。しかし実際は人と交わると疲れてしまうので、ひとりで過ごす方が気楽に感じられるでしょう。"}, "魚座_11": {"sign": "魚座", "degree": 11, "symbol_ja": "光を求めて狭い小道を旅している男たち", "symbol_en": "Men Traveling A Narrow Path, Seeking Illumination.", "key_phrase": "生きながらにして究極の神秘を求道する人", "explanation": "最後の星座である魚座は肉と霊の分離を象徴し、たましいが純化された生き方を求めます。肉体は現実世界に根付いたものであり、わたしたちは生きている限り、ここから離れることはできません。\nしかし、それでもなお俗世間から離れたところで自分の中にあるさまざまなものを祓い落として、この身体を持ったまま、超常的な神秘を体験することを求めるでしょう。\n魚座は真に自分自身にとって価値あるものを求める星座ですが、それは大半の場合、普遍的な価値を持っていて、物質的な価値を超えているはずです。そしてそのように真に価値あるものは時代や文化を超えて、廃れることなく、受け継がれていくことになるでしょう。そのようなものの中にこそ究極的な価値があるのではないかと思い定めて、古い教義や密儀を紐解くことがあるかもしれません。\nこの度数を持っている人は、精神的に求道するストイックな一面がありそうです。究極の真実を求めて、古くから伝わる神秘的な教義に惹かれる人もいるでしょう。\nサビアン・シンボルに出てくる狭い小道というのは、ユダヤの密教であるカバラの「生命の樹」に描かれる道(パス)であるかもしれません。宇宙創世の秘密が描かれているといわれる「生命の樹」の密儀を読み解くことによって、本当に自身の体系がそのようになっているのか、追体験しようとする人もいるでしょう。\n伝統に残された知恵と同化することで、たましいの神秘を紐解こうとするかもしれません。"}, "魚座_12": {"sign": "魚座", "degree": 12, "symbol_ja": "オカルト界のブラザーフッド聖域で", "symbol_en": "試験を受ける新参者たち", "key_phrase": "being examined and their character tested.", "explanation": "オカルト界のブラザーフッド聖域で試験を受ける新参者たち\n大いなる意志とひとつになるか試される人\n魚座は海王星の守護する星座であり、それはわたしたちの源を象徴しています。本能的にわたしたちはその源に近づき、光明を得ることを求める意識があり、より大きな意志の中に自分自身を溶け込ませようとするでしょう。\nしかし、そうしようとするほど、そこに反発しようとする個人の意識も同時に現れて、そこから逃げ出したくなるかもしれません。\nオカルト界のブラザーフッド集団は光明を得た人たちであり、真実の教えを伝えながら、人々が霊的に成長することを見守り、導く存在です。魚座の世界でわたしたちは個人を超えたところにある神秘とめぐり合い、また人の内側にある究極の光とひとつになることをめざすでしょう。だけれども、いざ、そこへ足を踏み入れようとすると「本当にその教えを受け入れて、ひとつになるつもりがあるのか?」と、問われることになります。場合によっては、そこで怖気づき、逃げ出してしまうでしょう。\nこの度数を持っている人は、内側で葛藤を抱えることが多そうです。自分の信じている人たちと深く関わり、どっぷりとそこに入ることを望みながらも、同時に激しくそこから逃げ出したいような、決して入りたくないような気持ちに襲われるかもしれません。そこにいたいのと同時に、深く関わることを恐れるような側面があるでしょう。\nそのため、学校や会社や趣味のグループなどであっても、どっぷりと染まりきれずに、そこから脱落したり、あるいは何かあったらすぐに離脱できるようなポジションに位置したりすることも多そうです。\n自分のすべてをさらけ出せるかどうかがカギ。隠しておきたいものがある人は逃げ出し、逆にすべてを見せて飛びこんだ時には、新しい道がひらけるでしょう。"}, "魚座_13": {"sign": "魚座", "degree": 13, "symbol_ja": "博物館に展示されている", "symbol_en": "多くの戦いで使われた古代の剣", "key_phrase": "博物館に展示されている多くの戦いで使われた古代の剣", "explanation": "自分の属している場において大きな力を担う人\n博物館ではその土地の歴史と文化が語られ、また、その証拠となる品々も展示されています。それは時代を超えて人々が伝承してきたものであり、現在の文化に至る礎を作ったものたち。時を超えて残されたものたちには、多くの人たちに訴えかけるだけの普遍的な価値があるでしょう。\n何を残して、何が失われていくのか......それを選定するのは、まさに最後の星座である魚座の役割です。博物館に飾られている剣は、おそらく古い時代の戦いで使われたものでしょう。歴史は常にその勝者が塗り替えていき、敗者のものは失われたり、改ざんされたりする可能性があります。力のある者、意志ある者たちが、何を価値として、何を残そうとするのか......それによって博物館の展示品も歴史も変わってしまうでしょう。\nこの度数を持っている人は、自分の属する集団において、大きな力を持つことがありそうです。それは自分の意志次第で今後の方向性まで変わってしまうほどの、大きな力であることもあるかもしれません。実際の役割や立場に関わらず、意外と自分の発言がまわりに大きく影響していることがあって、驚かされることもあるでしょう。\nその力は、あなたが望むとも望まぬとも、その場と時代からの要請を受けて、託されたものかもしれません。何が正しくて、何を残すのが良いのか......価値を見極めてしっかりと発言する必要があるでしょう。魚座はしばしば価値の伝承と関係しますが、まさにその立場になる可能性のある人です。"}, "魚座_14": {"sign": "魚座", "degree": 14, "symbol_ja": "キツネ皮の長いストールをまとった女性", "symbol_en": "A Lady Wrapped In A Large Stole Of Fox Fur.", "key_phrase": "品格と策略家としての顔が同居している人", "explanation": "キツネの皮で作られたストールをまとえるのは、お金持ちの貴婦人です。この女性はある種の特権階級としての権力や能力を持っているのでしょう。\nと同時に、キツネは人を化かすような、どこかずる賢いイメージがあります。そのふたつをうまく組み合わせたものが、このシンボルを持つ人の才覚として現れやすいでしょう。すなわち、特別な立場や権力を得ることができながらも、矢面に立って責任を取ったり、なにかの代表になったりするのではなく、うまく立ち回ったり、裏で根回ししたりして、面倒で厄介な責任をさらりとやり過ごすような才覚です。強い力を持ち、それをコントロールしながらも、表からはそのように見せないことができるため、まわりからはそんな能力があることに気づかれずにいることも多そうです。\nこの度数を持っている人は、品格があり、誰に対しても物腰が柔らかく、それでいて実のところ策略家でもあるでしょう。表からはそうだと見えないところで手を回したり、コネクションを利用したりと、影働きの能力が際立ちます。\nしかし、日頃は表にはそのように見せていないため、あなたの持っている大胆さを垣間見た人はきっと驚くでしょう。なんともいえない魅力があり、多くの人たちを惹きつけます。だけれども、本心から正直に思っていることを語ることは少ないでしょう。\n大きな責任やプレッシャーの脅威を上手に回避しながらも、そのメリットや恩恵をちゃっかりといただくような面がある人です。"}, "魚座_15": {"sign": "魚座", "degree": 15, "symbol_ja": "実弾の弾幕による", "symbol_en": "襲撃シミュレートを部下に命令する予定の将校", "key_phrase": "Barrage Of Live Shells.", "explanation": "実弾の弾幕による襲撃シミュレートを部下に命令する予定の将校\nもどかしさを感じながらも大切なことを伝える人\n軍の将校が本番さながらの実弾による演習を始める前に、部下たちを熱心に指導しているというサビアン・シンボルです。将校にはおそらく実際の戦争何度もくぐりぬけた経験があるため、その時の体験から得た注意事項を細やかに部下たちに伝えようとするでしょう。しかし、実体験のない部下たちにとっては、その大事さがいまひとつ伝わりきらず、どこか中途半端になってしまう可能性があります。\n軍隊は統一された目的を持つ組織であり、それは魚座が本当に大事なものを全員で共有しながら、認識していくことに通じるでしょう。しかし実際には、その理解度には個々の内側で差が生じることがあり、本気で全員に同じような信念や思いを抱かせることの難しさも、ここには表れるかもしれません。\nこの度数を持っている人は、現場で使える知識や技術や本当に大切なポイントを他者に伝えていく、指導者としての資質があるでしょう。自身の経験に基づいて、すぐにでも実践して使えそうなことを、極力細かくていねいに伝えようとするかもしれません。本当に大事なことを守っていくために、後継者の育成に関わる人もいるでしょう。\nしかし同時に、他者に物事を伝達するときの難しさも実感しそうです。いくらていねいに説明したところで、同じ経験をして、同じような心情にならない限り、いくら言ってもピンとこない......ということがたびたびあるでしょう。\nそのようなもどかしさを感じながらも、心を砕いて真心を伝えようとする人です。"}, "魚座_16": {"sign": "魚座", "degree": 16, "symbol_ja": "静かな研究の中で", "symbol_en": "インスピレーションの流れを経験する", "key_phrase": "In the quiet of his study a creative individual experiences a flow of", "explanation": "inspiration.\n静かな研究の中でインスピレーションの流れを経験する創造的な個人\nスピリチュアルを現実で活かそうと模索する人\nふとしたときにやってくるひらめきに従って、それを何かしらの形として、世の中に示していこうとするかもしれません。\nどの星座でも、度数の折り返しのあたりから、よりその質を成熟させるために、向かいの星座の資質を取り込み始めます。ここでは乙女座の持っている「現実的な形や結果として示す力」や「他の人に対して役に立つ力」が入りこんできて、魚座の持っている霊的な魅力を活かすことになるでしょう。\nこのサビアン・シンボルは、一生懸命に考える人というよりも、ある時にやってきた、ひらめきに乗って、さまざまなものを創造していく人だといっているのかもしれません。そして、思いついたものをそのまままわりに広めていき、みんなを巻き込むような流れを作り出していくのでしょう。\nこの度数を持っている人は、いろいろなことを思いつきやすく、そしてまたそれを実際にやってみよう、現実の中で試してみようという気概に満ちているようです。たくさんのアイデアがありますが、それらは海王星的なスピリチュアルや癒しやアート、お酒やアロマや霊的な学びなどと関係しているかもしれません。\n自分の好きなそれらのものを題材として、どうにかしてみんなの役に立つ形にはできないかと模索し、実行するでしょう。\nいまここにはないものを作り出して、みんなを驚かせたり、巻き込んだりすることにもなりそうです。魚座の持っている霊的な資質を、日常に落としこむことを試みる人といえるでしょう。"}, "魚座_17": {"sign": "魚座", "degree": 17, "symbol_ja": "復活祭のパレード", "symbol_en": "An Easter Parade.", "key_phrase": "人が本来持っているたましいの力を取り戻させる人", "explanation": "復活祭はキリスト教圏内において、クリスマスよりも重要な行事とされています。キリストの復活は、人間の原罪が許されたあかしであり、それはたましいの救済の象徴といえるでしょう。\n人間のたましいは本来、光に満ちあふれていて、愛と情熱であり、喜びであり、平和なものです。さまざまなことに好奇心を抱いて、実際にやってみたい、行ってみたい、やってみたいといった気持ちを抱かせるのも、たましいの働きの恩恵だといえるでしょう。\nしかし、わたしたちの多くは、日常生活を粛々と送る過程において、その欲求を隠したり、抑えたりしています。毎日のルーティン作業に追われているうちに、何が楽しくて、何がしたかったのかを忘れてしまうことがあるでしょう。\n復活祭のパレードは、そのような状態に陥っているわたしたちのたましいを解放することを助けてくれます。\nこの度数を持っている人は、個人が潜在意識下に持っているさまざまな感情や欲求を明らかにさせて、そのはけ口を作り出すことができるでしょう。楽しいことやお祭り騒ぎが大好きで、みんなと一緒に自身のたましいが震えるような体験をすることを望んでいるかもしれません。みんなを巻き込んでパーッと楽しく明るい気持ちにさせることで、人間が本来持っている自由な躍動感や生命力を取り戻させるでしょう。それは歓喜であり、たましいの復活です。\n多くの人たちを熱狂させるような演出や見せ方がうまく、なかば混沌とした、活性化した状態をもたらす人といえるでしょう。"}, "魚座_18": {"sign": "魚座", "degree": 18, "symbol_ja": "村の人々がすばらしい演技を鑑賞する", "symbol_en": "巨大なテント", "key_phrase": "村の人々がすばらしい演技を鑑賞する巨大なテント", "explanation": "みんなの気持ちや場のムードを自在に変えられる人\n演目が行われている巨大なテントといえば、サーカスが連想されますが、それに限らず、コンサートホールやライブハウス、クラブや遊園地などのようなものも含めて、このサビアン・ワードは人々の熱意を発散する場所を象徴しています。\nわたしたちは本来、その本質の中に、何かに熱中したり興奮したりするものを含んでいるでしょう。それを効率よく発散させるために、ここでは時間と場所をあえて限定しています。\n大好きなアーティストのライブが控えていれば、そのために大人しく体力を温存しておくかもしれません。金曜日の夜に踊りに行くことが決まっていれば、それまでに仕事を済ませようと張り切るでしょう。だらだらと遊び続けるよりも、メリハリをつけて区切ることで、その質が高まり、満足度も上昇します。\nライブやパフォーマンスも限られた時間の中でいかにカタルシスするかということを意識して、クライマックスに向けた演出がなされているでしょう。\nこの度数を持っている人は、演出能力が高く、人々が盛り上がるようにプログラムを組んだり、見せ方を工夫したりすることが得意なようです。ムードメーカーになりやすく、まわりの人たちのテンションを自在に変える才能もあるでしょう。\n楽しい遊びを好みますが、ダラダラと遊び続けるより、パッと盛り上がって、一気に発散することで充実します。そのことを知っているので上手に時間を使い、場を華やかにすることができるでしょう。\nアーティストや演出家などに向いていて、興行を仕切る資質もありそうです。ムードを作り出して、みんなをどのような気持ちにさせるのかを調整できる人です。"}, "魚座_19": {"sign": "魚座", "degree": 19, "symbol_ja": "弟子を指導する師匠", "symbol_en": "A master instructing his disciple.", "key_phrase": "すぐれた価値をていねいに伝承させる人", "explanation": "次の新しい世代にまで残すべき価値の保存と伝承をするのが魚座の役割のひとつです。しかし、本当に大切なことを伝えるためには、受け取る人が自分と同じような感情を持っていなければ難しいということに気づきます。\nそこでここでは自分が体験したことと同じことを相手にも体験させることで、似たような感情を呼び覚まそうと試みるでしょう。実際に体験することで聞いただけでは計り知れなかった、さまざまな実感が湧いてきます。細かいところまで「ここはどうしたらいいのか」という具体的な疑問も湧いてきますし、達成した時の喜びも味わえるでしょう。そして同じような道程を通り抜けた人に、あらゆる価値は正しく伝承されていくのかもしれません。\nこの度数を持っている人は、自分の知り得た価値ある知識や技術を他の人に伝えることをするでしょう。もしかすると、あなた自身のかつて誰かから大切なことを受け取ったのかもしれません。そこで得た感激や喜びを後世にまで残そうと、それを伝える努力をするでしょう。\n自分が得たものと同じ喜びが他者に伝わっていったときに、深い喜びを得ることができそうです。指導者や伝達者としてのすぐれた資質があり、自分が通ってきたものと同じ道を相手にも辿ってもらおうとするかもしれません。\nあらゆる物事はそのように優れた先達の面倒見の良さによって後世に残っていくのでしょう。ていねいにわかりやすく人を導く力を持っている人だといえそうです。"}, "魚座_20": {"sign": "魚座", "degree": 20, "symbol_ja": "夕食が準備されたテーブル", "symbol_en": "A table set for an evening meal.", "key_phrase": "世の中の流れを信頼して自分を明け渡す人", "explanation": "ひとつの食事を分け合う行為というのは、テーブルを共にした者同士を結びつけて、親近感を抱かせるでしょう。何度も食事を共にしていると、そんなに詳しく話を聞いたわけではなくても、相手の心情や心持ちがおのずと手に取るように理解し合うことできます。言葉を超えた共感や理解、そしてたまたま、そのタイミングで共に食事をすることになった共鳴などが暗示されるサビアン・ワードです。\nここで準備された夕食は、それを必要とする、すべての人に提供されるもの。それはあたかも全国に広がる「子ども食堂」のように、それを必要とするすべての人たちに開かれていて、タイミングが合った人たちがそこに集い、それぞれが必要なものを得ることができるのでしょう。\nそしてそこで何かを得た子どもたちは、やがて大人になると、社会にまた別の形で何かを還元することになるのかもしれません。\nこの度数を持っている人は、善意があり、親切でやさしく、必要としている人に求められているものを与えようとするでしょう。それは特定の誰かに限らず、自分に対して求めてくる人がいれば、惜しみなく与えることのできる人です。気前よく分かち合いますが、そこに恩着せがましいこともせず、受け取るだけで立ち去る人がいても執着しないでしょう。\nある意味、ダルマの法則に従って生きているようなところがあるかもしれません。自身の純粋な欲求に従って生きていれば、必要なタイミングで必要なものや縁がおのずとやってくる......それを実践する人といえるでしょう。"}, "魚座_21": {"sign": "魚座", "degree": 21, "symbol_ja": "中国人の使用人に", "symbol_en": "注意深くやさしく見守られながら", "key_phrase": "Under the watchful and kind eye of a chinese servant, A girl fondles a", "explanation": "little white lamb.\n中国人の使用人に注意深くやさしく見守られながら白い子羊をあやす少女\n自然と共鳴してなすべきことを理解する人\n魚座を守護している海王星は、人間が定めた社会のルールや枠組みや法則を示す土星の領域を超えさせていき、もっと大きな宇宙そのもの、大自然そのものへと、わたしたちを回帰させる惑星です。すべてを制約によって管理しようとする枠組みから離れようとするため、体制側から見たら何をするのかわからない危険な存在ともいえますが、宇宙の流れとは共鳴し、よく馴染むでしょう。\n子羊も少女も本能的に自然と馴染むことのできる純粋な存在です。感受性が開ききっていて、自然のあらゆる物事から多くを学び、なすべきことを、思考を超えたところで理解するでしょう。「なんとなく、こうした方がいいから」という理由で動いていく人なので、周りから見ると危なっかしく感じられるかもしれません。\nしかし少女のそばには守り人がついているため、決して本当に危ない目に遭うことはないでしょう。\nこの度数を持っている人は、とても純粋で感受性が鋭く、またその直感を頼りにさまざまなことを始めたり、決定したりすることがありそうです。何をすべきなのかということを自然の流れやインスピレーションから受け取り、意味がしっかりと把握できなくても、その本能の訴えから行動することができるでしょう。常識やルールにとらわれることなく、自然に共鳴して、心地よく過ごすことを好みます。\n誰に教わるでもなく、大切なことを自然の存在たちから学ぶことができるため、何をすれば良いのかを本能的に理解するでしょう。目に見えない流れや神秘を読み解くことのできる資質の持ち主です。"}, "魚座_22": {"sign": "魚座", "degree": 22, "symbol_ja": "新しい法のタブレットを持って", "symbol_en": "シナイ山のスロープから降りてくる予言者", "key_phrase": "Mount Sinai.", "explanation": "新しい法のタブレットを持ってシナイ山のスロープから降りてくる予言者\nみずから体験したものを言語化して普及させる人\nシナイ山の頂上で神から十戒を授かったモーゼは、山から降りて、約束の地へたどり着きました。そして、受け取ったものが広まっていき、現在まで伝えられています。\n魚座は別次元との接触が頻繁に起こるサインであり、個人を超えた非日常な神秘体験をすることがたびたびあるでしょう。ここではモーゼが山頂で神に触れる体験をしたように、なにかしらの宇宙原理を体験することになるかもしれません。\nしかし、チャレンジはそれを経験したあとにあるでしょう。なにかしらの体験を通して感じたエッセンスを、わかりやすい言葉に置き換えて、それを新しいひとつの法則として普及させることが目的です。これまであった法則にプラスして、みずから体験のなかで受け取ったものを用いて、まったく新しい教義を創り出していきます。さらにそれを人々に伝えて、新しい教えを伝播させていくまでがワンセットといえるでしょう。\nこの度数を持っている人は、感受性が非常に強く、さまざまな物事からメッセージを受け取ったり、直感的になにかを得たりすることがありそうです。それは個人的なものというよりも、全体性に近いため、受け取ったものをみんなに伝えたいとも感じることがあるでしょう。\nしかし、そうするためにはわかりやすい言葉と、誰もが理解できるような理論とが必要となります。それを創り出すことに難しさと同時に喜びを感じて、複雑な思いながらもチャレンジすることになるでしょう。\n感じて体験したものを言語化して人に伝えていき、そしてまた人を導いていくような資質の持ち主です。"}, "魚座_23": {"sign": "魚座", "degree": 23, "symbol_ja": "降霊会で実体化された媒体", "symbol_en": "A \\\"Materializing\\\" Medium Giving A Seance.", "key_phrase": "見えない世界からの要請を実現させる人", "explanation": "現在は物質社会であり、そこでの主役は人間。人は万物を支配して、そこにあるものはなんでも自由に使っても良いと思っている節があるでしょう。\n母音言語を話す日本人には、自然を感じとり、それらと共存しようとする感性があるはずです。しかし、それでもなお物質主義・資本主義が基盤となっている社会においては、人間の生活が良くなっていくことが前提とされており、そのために自然が失われようとしているかもしれません。\n魚座は、土星に制約された人間の管理社会の枠組みを取り払って、本来持っている感受性を取り戻すことを助けるサイン。そこでは人間は一種類の動物に過ぎず、他の生き物や自然の存在たちと目には見えないレベルにおいて交流し、また共存しようと試みるでしょう。\nサビアン・シンボルにある降霊会において、霊媒師は媒体となる物質......例えば水晶やカードや岩や紙や本などの依り代になるものを差し出すことで、そこから自然が示すメッセージを得ようとしています。そしてそのようにして得た自然からのメッセージに従って生きること、それを現実にすることをしていくでしょう。\nこの度数を持っている人は、非常に鋭い直感力の持ち主で、何かを媒体としながら、自然がいま、わたしたちに求めていることを理解しそうです。そしてまたそのようにして得たことを実際の生活の中で実現しようと行動に移すでしょう。\n世界にはいま、自然の声を聴く力を失って、誰かに言われるままに生きている人が多くいるかもしれません。\nその世界の中であなたは正直に自分を語って、実現することになるでしょう。勇気があり、そして自然の存在と共に生きるという理想を実行する人です。"}, "魚座_24": {"sign": "魚座", "degree": 24, "symbol_ja": "人々が密接な相互関係で暮らす", "symbol_en": "広大な海に囲まれた小島", "key_phrase": "seen living in close interaction.", "explanation": "人々が密接な相互関係で暮らす広大な海に囲まれた小島\n大自然と共鳴して生きることを望む人\nこの小島で暮らしている人々は、広大な海に囲まれていて、その大きな自然と共にいることしかできません。いくら自分たちで創り出した、人間本位の社会的なルールに基づいて暮らそうと思ったところで、大自然を前に、それはあえなく崩れてしまうでしょう。\n魚座の守護する海王星は、人間社会の基盤である土星の制限を壊して「わたしたちが自然を管理している」のではなく「わたしたちが大いなる自然の一部である」という事実に回帰させます。そのため自分本位な人間を中心とした考えから、他の動物や自然と共生するような考えや法則へと、わたしたちを導くでしょう。\nその事実を前に、人間の作り出した社会の中で生きることに息苦しさを感じるようになった人たちが、誰も住んでいない離れ小島に渡って、新しい生活を始めるというサビアン・ワードです。そこで待っているのは大自然の脅威。そこでは、それらを中心とした生き方をすることを余儀なくされるかもしれません。\nこの度数を持っている人は、自然と共生する生き方に憧れて、実際に社会の中心から離れることがあるでしょう。自然の多い土地でゆっくりとその土地の恵みをいただき、季節のめぐりを頼りにして、地球の環境にやさしい暮らしをすることを実践するかもしれません。何か買い物したり、消費したりする時も、できる限り、地球上の誰にとっても良い結果を生み出すものを選ぼうと心がけるでしょう。\nもし、社会から離れることができない場合でも、心はそういったものに関心を寄せ続けるかもしれません。人間の作り出した社会の仕組みを超えたところで、地球と共に生きることを志す人です。"}, "魚座_25": {"sign": "魚座", "degree": 25, "symbol_ja": "倒錯した慣習や物質化された理想の悪影響から", "symbol_en": "克服することに成功した宗教団体", "key_phrase": "Of Perverted Practices and Materialized Ideals.", "explanation": "倒錯した慣習や物質化された理想の悪影響から克服することに成功した宗教団体\n内面の意識とその結果が結びつくことを実行する人\n宗教団体に所属している人は、ある教義に従って自分の生き方を改めて整え、それを忠実に貫きます。しかし、あまりにも教義を重んじるばかりに、それがどんな結果を生み出すのか、まわりにどう影響するのかを見ずにいると、そのことがかえって周囲との軋轢を生じさせるでしょう。\n自分は神に奉仕しているつもりでも、まわりからは全財産を吸い上げられているように見えるかもしれません。子どもが悪いことをしたら鞭で罰する教義は、別の側面から見たら虐待です。あまりにも現実的な結果やまわりへの影響を無視していると、自分では正しい行為を貫いているように思っていても、まわりからは真逆の意見で見られるでしょう。\n終末戦争を信じて関係ない人たちに攻撃をして仕掛けた信者たちは、一般人から見たら、彼らこそが脅威のテロリストです。\nこの度数を持っている人は、さまざまな思想や生き方に興味を持ちながらも、それをすることがまわりにどう影響するか、どう見られるかということを強く意識するでしょう。内面の思いこみに走りすぎるあまりにバランスを失ってしまうことに警鐘を鳴らして、諌めようとするかもしれません。人間が精神的な向上をめざすあまりに、集団から孤立したり、身なりを気遣わなくなったり、家族とうまくいかなくなったりすることは論外でしょう。\nしっかりと規則正しく、片付いた部屋でこざっぱりと家族と仲良く暮らし、まわりから信頼されて、バランスの取れた人だと見られることを意識するかもしれません。"}, "魚座_26": {"sign": "魚座", "degree": 26, "symbol_ja": "非常に細い三日月が日没に現れるのを見て、", "symbol_en": "それぞれのプロジェクトを", "key_phrase": "さまざまな人々", "explanation": "Watching the very thin moon crescent appearing at sunset, different\npeople realize that the time has come to go ahead with their different\nprojects.\n非常に細い三日月が日没に現れるのを見て、それぞれのプロジェクトを進める時間が来たことを理解するさまざまな人々\nたましいの目的に回帰する人\n魚座の最後の5度のプロセスは、次の牡羊座からの流れに回帰するために、本当に必要なものとのみ繋がっていき、それ以外のものを切り離していきます。魚座はその成長の過程において、本当に大切なものが何であるのかを再確認し、それを継承するための方法もいろいろと模索してきました。ここではいよいよ、その大切にしたい価値そのものと、自分自身とが一体化していきます。\n魚座が大切にしたい価値は、決して個人的な範疇にはおさまらず、社会的に成功するような華々しいものではないでしょう。地球そのものの大地や自然や動物たち、人々の営みや脈々と受け継がれてきた文化......そういったものの中に、自身が今生で体験しようとたましいが決めてきた目的があるはずです。ここではどんどん自分自身が純化されていき、たましいの目的以外の関係や環境との繋がりが、おのずと切り離されていくでしょう。\nこの度数を持っている人は、地球との繋がりを独自の感覚で得るかもしれません。いわゆる社会や世間で成功するといったことには、あまり興味や関心を抱かず、心の中心にある「何か星のために貢献したい」ような「自然のものと触れあって共に生きていきたい」ような、そんな思いを大切にして、そして実行することになるでしょう。\n同じような思いを持っている仲間が集まってきて、それ以外の繋がりは終わってしまうかもしれません。たましいの望んでいること以外、することができず、おのずと引き寄せられるように決めてきた約束に回帰するでしょう。\n人間として真の独立を果たす人といえそうです。"}, "魚座_27": {"sign": "魚座", "degree": 27, "symbol_ja": "晴れた秋の空を照らす収穫の月", "symbol_en": "The Harvest Moon Illumines A Clear Autumnal Sky.", "key_phrase": "運命的に人生が変遷する人", "explanation": "わたしたちの目に見える現実は、内側にある意志が作り出した結果として、地上に映し出されています。何も変わらない平凡な日々も、嵐のような激しい生き方も、その人が望んでいるからこそ起こっているのでしょう。\nこの時、その「望んでいる自分」が、常にひとつであるとは限りません。表層にあるわたしたちの意思は平凡の安定した暮らしを望みながらも、その深層にある意志は、もっと別の何かを望んでいるということが、たびたびあるでしょう。\nその、自分でもまだうっすらとしか気づいていない意志が、時に運命的な出来事を招き寄せることがあるかもしれません。それは一見「思わぬ出来事に巻き込まれてしまった」であるかのようでありながらも、本当に望んでいる人生を、自分自身が呼び寄せているのでしょう。\nこの度数を持っている人は、非常に繊細で敏感な感受性を持ち。自分にとっての美しさや心地よさをよくわかっているかもしれません。自然を感受し、それらと共存することに憧れを覚えながらも、しかしどこから始めたらいいのか、わからないこともあるでしょう。\nあるとき、運命的な出来事が人生を変えることになるかもしれません。それは平凡の生き方を望む自分から見たら「事件」ですが、それはあなた自身の本質が招き寄せたことでもあるでしょう。\n出会う人や、起こった出来事から、自身が真に望んでいる生き方を理解し、受け入れることで、本当に手ごたえのあるリアルな人生が始まる人といえそうです。"}, "魚座_28": {"sign": "魚座", "degree": 28, "symbol_ja": "満月の下で明らかにされた", "symbol_en": "肥沃な庭のさまざまな成熟した野菜", "key_phrase": "Vegetables.", "explanation": "満月の下で明らかにされた肥沃な庭のさまざまな成熟した野菜\n宇宙の創造サイクルに触れる人\n宇宙を創造し続けている、その源に触れるような体験をするかもしれない度数です。\n何かが始まって、成長していき、成熟すると、それは朽ちていき、やがて終わっていく......というプロセスを、わたしたちは日々体験しています。なくなるかもしれない、終わるかもしれないということばかりに執着していると恐れを感じるかもしれませんが、この世界を創造し続けている原理は止まることなく、絶え間なく、わたしたちの宇宙の生を支え続けているでしょう。\nその「創生の源」に対する信頼は、思いきって、本物以外のすべてを手放さなければ得られないかもしれません。宇宙は、星は、自然は、それそのものが常に生育し続け、実らせようと循環しています。わたしたちの営みはその生命の中に、誰もが間違いなく、宇宙に生かされているでしょう。\nこの度数を持っている人は、真に心の充足を求めて行動することがありそうです。それは何かを得ることや、成し遂げることというよりも、すでに世界に満ちている豊かさに触れて、それを実感することかもしれません。内的な豊かさが成熟した実りを結ばれることを知っている母親のように、精神的に満足した生き方をすることを望むでしょう。\nそのためには外側の持ち物をむしろ減らしていって、内側の感性を研ぎ澄ませていく方が、やりやすいかもしれません。想像力の中に身を置いて、アートやスピリチュアリティの満ちた、精神的に豊かな生き方をすることになるでしょう。\nシンプルに、しかし、深く充足することを知っている人です。"}, "魚座_29": {"sign": "魚座", "degree": 29, "symbol_ja": "プリズムを通り抜けさまざまな色の屈曲した光", "symbol_en": "Light Breaking Into Many Colors As It Passes Through A Prism.", "key_phrase": "シンプルな自分自身の感性で生きる人", "explanation": "プリズムは日本語では「三稜鏡」という名のガラスや水晶で作られた多面体。光を通すと屈折が生じて、七色の光と変化して外へ放たれます。元はひとつであるものが七つに分かれて、またそのそれぞれが七つに分かれて......という、果てしない分裂によって物事の創造が生じ、広がっていくのでしょう。\n宇宙が分裂していて広大な世界となったように、ひとつの細胞が分裂していくことで多様な生き物が生み出されていきます。個人の人生は短いものですが、その人の残した足跡がまた、他の何かを生み出すための種となって受け継がれていき、別の形となり、また他の何かにつながっていくのかもしれません。その表現された色や形が違えども、それはまた別の何かを創り出すきっかけとなるでしょう。\nわたしたちの営みを脈々とつないでいる生命の光。それは花開いては終わっていき、しかしまた別のものへと変化していくのでしょう。\nこの度数を持っている人は、見ることのできない生命の営みや流れに興味を抱くことがあるかもしれません。宇宙創成の秘密を知りたがったり、人々の間で受け継がれている命の営みの流れそのものを感じたりする人もいるでしょう。\n自分にとって価値があると感じたものを、自分なりの色で表現しようとするかもしれません。他の誰かのようにではなく、自分で感じているものを、感じたままに表現して生きること。シンプルに余計なものを剥ぎ落としていった後に残る、純粋な感性を大切にする人です。\n人間としての本質で生きることに関心を持っているかもしれません。"}, "魚座_30": {"sign": "魚座", "degree": 30, "symbol_ja": "少年の偉大な理想によって構成され", "symbol_en": "彼が成長するにつれて似始める岩の表面", "key_phrase": "takes is as his ideal of greatness, and as he grow up, begins to look", "explanation": "like it.\n少年の偉大な理想によって構成され彼が成長するにつれて似始める岩の表面\n無意識の内に自身の本質と共に生きる人\n12星座360度の旅路の最終度数です。12星座の旅は直線ではなく螺旋状に循環していますから、この次は牡羊座の始まりへとジャンプします。この時、決して前周期と同じ牡羊座の1度に辿り着くのではなく、1周分の経験を経た上での、一階分、上の新しい牡羊座の1度に辿り着くでしょう。\nこの新しい始まりは、生まれたての赤ちゃんのようにまっさらで、何の記憶も持っていません。それにも関わらず何をすればいいのか、何をしたいのかを、わたしたちが本能的に知っているのは、過去に生きた人たちの経験とその夢と理想とが、土地や文化やそのDNAに刻まれているからでしょう。\n魚座の旅路の中で、わたしたちは本当に大切にしたい価値を見出し、それをどうしたら保存できるのか、継承できるのか、さまざまに試してきました。そして自然と共鳴し、共にある生き方を体現することで、自身の本質をそこと同化させてきたのでしょう。その体験が土地や文化やDNAに刻まれていき、それはまた他の誰かに明け渡されていくのかもしれません。\nこの度数を持っている人は、無意識のうちに自分の本質に従って生き方に開いていくでしょう。何かを成し遂げることよりも、自然の流れの中に自身を埋没させることの方を好むかもしれません。\n無自覚のうちに自分にふさわしい生き方を引き寄せて、それに従って生きることになるでしょう。自分でも「なぜ、それをしているのか」わからないことがあるかもしれません。しかし自然体でいることで、おのずと引き寄せられていくことの中に、自身の本質そのものが現れているでしょう。"}}, "ichiran": {"牡羊座_1": {"sign": "牡羊座", "degree": 1, "symbol_ja": "海から上がったばかりの女性を、アザラシが抱いている", "explanation": "全星座の出発点であるこの度数で、人はいままで１度も経験したことのない、まったく新しい存在状態に生まれる。生みの苦しみに似た抑圧状態のなかで、まずこの世界に確実に足をつけようと努力する。が、なにもかもが前例のない新しい人生なので、とまどうことが多く、弱気になりがちだ。そして、無意識の子宮である「海」に、退行したくなる誘惑にかられる。「女性」は受容的な資質のしるし、「アザラシ」は無意識的な動物状態への退行の象徴だ。ここから考えてこの度数の持ち主は自分がなにをしたいのか、まだはっきりと自覚できない。完全に新しい経験への挑戦なので、この人物のいる周辺では、新しい出来事の胎動が見られることが特徴だろう。意識と無意識の境界戦がまだはっきりと定められていない。自我が明確でない。まず自分のおかれた周辺の環境を観察することが大切だ。"}, "牡羊座_2": {"sign": "牡羊座", "degree": 2, "symbol_ja": "人間の性質を明らかにするコメディアン", "explanation": "小さな幼児は、周囲で忙しく動いている両親や姉や兄、家に訪ねてくる人々を、先入観のない目でじっと見つめ、人を見比べることで、自分を確立しようと試みる。この度数の人は、こうした幼児にも似た純粋さ、偏見のなさ、無意識ではあるが、ある種の客観性をもっている。たえず周囲の人を観察していることが多い。他人の特徴的な性癖などをものの見事に演じるので、思わず笑いを誘う。象徴どおりに天性の「コメディアン」だといえる性格をしているようだ。牡羊座の前半は、まだ明確に自我が確立されておらず、自分が行動し意思決定をするには頼りない段階だが、子供のように純粋な人間性の鑑として、多くの人に愛される。この度数の持ち主が浮き彫りにする、戯画化された人間観察力によって、はっとする思いを感じる人は多いはずだ。"}, "牡羊座_3": {"sign": "牡羊座", "degree": 3, "symbol_ja": "男のカメオの肖像が、彼の祖国の形を暗示している", "explanation": "観察し模倣することで、自我を形成しようとする試みは、この度数では、地域社会とか、国民性、会社や組織など、集団の全体的な精神を模倣・学習の対象としていく傾向がある。自分が属している集団の全体的な特徴をはっきりと把握して、その代表となるような行動や性癖を身につけていく人だ。とても象徴的な行動をとる人なので、この人が属す組織や集団の特徴を、彼を観察することで、つかむことができる。この度数の持ち主は、集団に同化することで、自我を確立しようとする目的があるので、集団のなかに生きることが大切だ。それぞれの地域には、その地域なりの住民の個性があるが、この度数の人々は、こうした地域住民性とのずれがまったく存在しない個性を持って生きている。たとえばこの人に好まれると、その地域は居心地がよいとか、嫌われると自然にその場所に住むことが困難になる、などという現象が見られるものなのだ。"}, "牡羊座_4": {"sign": "牡羊座", "degree": 4, "symbol_ja": "恋人たちが秘密の散歩を楽しむ", "explanation": "子供はある年齢になると、異性を意識し、心を男性と女性という役割に分極させる。すると、それまで理解することもできなかった感情のダイナミズムとか、ロマンチックな情操などが発達するようになる。そして、これが人間の内面からわき上がる創造的な力を刺激することに気がつく。性の意識が芽生えた段階で、個人は環境と自分が分離していることを自覚する。この度数は、こうした純粋な男女間の感情によって、活力が活発に刺激されるタイプの人だといえる。また純粋に個人的な、人から邪魔されない隠れ家を心のなかにつくって、ひそかに創造的な仕事をすることに喜びを感じる。もちろんこれは他人にむやみに踏み込まれてはならないし、秘密の心の世界は知られてはならない。このなかでゆっくりと自分の生き方が熟成されてくるからだ。全体に対外的な自己表現能力は発達しておらず、人からなにを考えているのかわからない人といわれやすい。でも心を許した人にはなんでも話すという気質をもっている。"}, "牡羊座_5": {"sign": "牡羊座", "degree": 5, "symbol_ja": "翼をつけた三角", "explanation": "自分の生き方の理想的なヴィジョンを獲得する。社会的な要求、現代の風潮、その人のおかれた環境などとはまったく関係なしに、非常に抽象的な、現実社会にはほとんど応用不可能な理想を夢見ている状態。純粋な精神主義と考えてもよい傾向だ。１度で生まれ、２度で人格を識別する能力を育て、３度で集団に参加し、４度で男女に２極化しダイナミックに生命力の活発化がはじまった存在は、５度で自分の生き方の理想的なヴィジョンを手に入れる。これは「超越」的なイメージのある理想への関心としてあらわれてくる。実際性からはほど遠い純粋な直感力、純粋な哲学的精神的な思想が、この度数の特徴だ。いつかは実現するかもしれない純粋な理想像に対して、まだ子供っぽくあこがれている段階。だが、この牡羊座の初期の度数は、全体に誕生後間もない段階なので宇宙的なエネルギーのダイナミズムが失われずに生き生きはたらいている。これらの度数の持ち主は、単純だが憎めず、魅力的といえる。存在をすべて献身的に投げ出すように理想像に意識を集中する。新しい次元を意識している。多くのオカルティストにあらわれる度数だ。\nNo. 2／72区分（牡羊座６度～１０度）「象徴」 始源的な概念を理解する\n何かを理解するときに、シンボリズムや抽象概念でつかもうとする。数学的なセンスに優れた人も出てくる。相変わらず現実離れはしているが、人生への哲学的な価値を認識する。"}, "牡羊座_6": {"sign": "牡羊座", "degree": 6, "symbol_ja": "一辺が光り輝く四角", "explanation": "自分の自我をよりはっきりと確立したいために、５度でできた理想像に対して偏った熱中とか集中をする。これはとても頑固で、排他的な姿勢であるが、他を理解したり受容的になったりすることは、この人の目的からはずれてしまう。他人の意見などまったく聞か 、など日常的な事柄をなんのてらいもなく楽しむことのできる能力だ。この度数を持つ人は幸福な状態だといえる。"}, "牡羊座_24": {"sign": "牡羊座", "degree": 24, "symbol_ja": "内側にむかって吹く風で、開かれた窓のカーテンがコーヌコピア（豊穣の角）の形になる", "explanation": "物理的な生活が十分に満足したものになると、人はより高度なものを求めるようになる。ごく日常的なしあわせな状況は、その人から見ると退屈なもので、官能的な\\\"気\\\"がはりつめた風船のように充実して限界まで到達すると、それはいままでの生き方の限界を突破するエネルギーに変わる。生命力はいままでの常識を突破して、高度な霊的な世界を知覚するようになる。風（ネウマ）が、オープンマインドの窓に吹き込み、人格の家の内側に膨らみをつくり出すような刻印をするとルディアは述べている。これはただ単にオープンマインドを示すにとどまらず、心の非常に繊細な感受性が、霊的な影響をキャッチして、その形を自身のなかに刻印する。こうした高度な質性を獲得する特殊な度数だ。超自然的な影響によって、生活が変わってしまう、人が変わってしまうことだ。神秘体験や、霊中枢チャクラの目覚めなどは、この度数に関係すると述べる人もいる。それ以外にも、ファンタジーな芸術・文芸などに対する才能をも物語るようだ。"}, "牡羊座_25": {"sign": "牡羊座", "degree": 25, "symbol_ja": "人が存在の２つのレベルでの体験を得る可能性", "explanation": "かならずしも人間的とは限らない異次元のビジョンを手にいれてしまった人は、それまでの常識世界と、もうひとつの霊的な世界と、それぞれ分裂した２つの人間の可能性を手にいれてしまい、物心両面で望むとおりの人生を歩まなくてはならないという新しい可能性に立たされる。この２つの分裂した要素を結びつけた新しい活動を思い描き、強い意欲がわきあがる。ここでは予感と計画性ばかりが強まるのだが、肉と霊という２つの領域にまたがった形で発展しようとするために、これまでの単純な発想法は消え去ってしまう。いまひとつの意味は、実生活なものと、霊生活的なものを分離して、両方をマルチ進行で生きる姿勢を確立するような人である。いろんな意味で、大きな可能性が内包されている人。２つの名前を持つ人などもあらわしている。\nNo.\n6／72区分（牡羊座２６度～３０度）「自覚」自分探しはやがて結論を見いだす\n自分は何者か、という自己探求が結論を迎えようとしている。実際面では多くの失敗を繰り返すが、この失敗は自覚を生み出すので大切な事柄でもある。成功が目的ではなく、自己発見が目的だからである。"}, "牡羊座_26": {"sign": "牡羊座", "degree": 26, "symbol_ja": "人が自分がもてる以上に多くの贈り物を所有している", "explanation": "自分がいままで体験したことのないタイプの潜在能力に出会った人は、それが切り開く可能性の世界に期待をかけるが、同時に自分の生き方を落ち着いたものにすることに困難を感じる。興奮して思いつきをどんどん実行しようとして度を失うかもしれない。いろいろな可能性を考えて、自己分裂する。つまり可能性のありそうなことはすべて実行しようとする。ほとんど深い考えなしに、人生の種々の可能性にかけようとするために、行動は破綻しやすい気紛れさとか、早急さをもっている人のようだ。たくさんアイデアを思いついても、注意深く進むべきである、という警告をあらわしている度数。猪突猛進、非常に行動的な人柄。過剰な活力をもっているはずだ。ここでは企画や立案などの才能があると思われる。そういう方向に自分のもった可能性を消費させれば、個人の人生は比較的落ち着いたものになるのではないかと考えられるからだ。"}, "牡羊座_27": {"sign": "牡羊座", "degree": 27, "symbol_ja": "想像力を通じて、一度失われた機会を再び手に入れる", "explanation": "前の度数とかなり類似した意味なのだが、新しい体験の領域で、実現可能に見えるすべてのものに、心がかきまわされると、自分の立脚点がしだいに不明になり、簡単に失敗する人生となる。が、この度数では成功と失敗はなかなか見分けがつかない。ある面で成功すれば、別の面で失敗し、またある失敗は、別の可能性を開くからだ。こうした人生の複雑な展開を、想像力と推理力で十分考え思い描くことで、心を広げていくことをあらわしている度数だ。うまくいかないと、こんどは別の角度から検討してみるとか、いろいろイメージと精神のはたらきをたくましくして、解決していこうとする態度。この度数を持っている人は当然人生のなかで何度か大きな失敗を体験し、再興するという努力を経過するはずであるが、そのことで人格的におおいに成長する。想像力を要求される業種にむいているといえる。"}, "牡羊座_28": {"sign": "牡羊座", "degree": 28, "symbol_ja": "予想が裏切られて演奏に失望する観衆", "explanation": "能力以上のものを期待されていて、それにこたえることができないことを自覚した場面で、彼はどのように行動すべきだろうか。気まずい状況のなかで人々にどういう影響を投じるか、責任をもつことを意味している。この度数は失敗を意味しているが、この失敗は周囲を取り巻く状況とこの本人の関係のなかで起こることであって、純粋に本人のせいだけではない。ここでの特徴は、まわりの期待を裏切るというような意味での失敗であり、また本人もまわりの人を失望させることに恐れをもっていてこれが大きなプレッシャーとなって、失敗の引き金をつくる。ここでは周囲の状況というものが、これらの事態を引き起こした鍵でもあり、それらをうまく分析して、今後の材料にしなくてはならない。ただたんに個人の能力がなかった、という意味ではなく、社会情勢でしかたなく会社が倒産したとかのケースが多いようだ。"}, "牡羊座_29": {"sign": "牡羊座", "degree": 29, "symbol_ja": "天球の音楽", "explanation": "この宇宙は波動でできている。あたかも音楽にたとえられるような、この波動を、この度数の人は身近に感じることができる。世界に対するこのような感じ方が、自分も含めて環境全体に対しての全体的な一体感をつくり出す。これがとても情感的な喜びをもたらすのだ。内面の声を聞く、という度数だが、声は人格化されたものではなく、波動や雰囲気として感じられるものだ。このなかで、個人は全体状況のなかで、自分がどこにいるべきか、いったい自分とは何者なのか、その位置をはっきりと自覚する。人の期待にこたえることに失敗するという２８度の体験がこの度数にいたる前提、つまり人の期待に配慮しなくなった段階で、自己の内面にもどり、自分ができることはこれしかない、という天命のようなものに気がつく。内面的に充実した人だ。またここでは音楽の才能があらわれる人も多い。"}, "牡羊座_30": {"sign": "牡羊座", "degree": 30, "symbol_ja": "池のアヒルと、その子供たち", "explanation": "自分の本当の運命や使命を自覚することは、日常世界で満足して暮らすには、どうしても欠かせない問題だ。自分を知らない人は、普通に暮らすということに居心地の悪さを感じるからだ。２９度で彼は神秘的で荘厳なビジョンを体験し、この３０度で具体的な制限された日常の仕事にもどってくる。これは、自己実現の大きな第１歩、潜在的な個人の能力の可能性は、ここではじめて具体化の方向にむかう鍵を見つけ出すことに成功する。自分の内なる声を聞いた人は、自分の限界を認め、自分になじみある生き方にもどってくる。いろいろ可能性を試した結果、自分にはやはりこれしかない、という「古い池」に回帰するのだ。海にあこがれても、自分は池に住むのがふさわしいと自覚する。なにが一番重要か、なにが自分にできるかを厳しく選別して、牡羊座の総決算をする。落ち着いて自分に課せられた務めを果たそうと考えている人だ。\nNo. 7／72区分（牡牛座１度～５度）「運命」 運命の実践\n遺伝的に与えられた能力を最大限活用する。運命づけられた人生のコースを歩むことで、報酬を手に入れる。選択の困難な出来事が多く起こるが、それを無条件に受け入れることが課題。"}, "牡牛座_1": {"sign": "牡牛座", "degree": 1, "symbol_ja": "清らかな山の小川", "explanation": "牡羊座の全過程を通じて探し出すことのできた、自己のあるべき姿は、牡牛座で純粋に具体化された生き方として定着する。牡羊座３０度の、あひるの池の水は、こんどは山の上から下界に勢いよく流れ出すのだ。自分のなかに潜在していた資質がいかなるものだろうと、課せられた運命というものがあって、その運命を強制的に実践しなくてはならない。この度数では、避けることのできない体験をする、ということが指摘されている。山は象徴的に、小さな意味では人間の自我をあらわすし、大きな意味では、個人が従っている霊脈をあらわしている。ここから力が流れ出て、その人の個性がその個性にふさわしいと思えるような生き方にいやおうなく投げ込まれるのだ。躊躇したり、立ち止まったりできないし、この度数を持つ人は成就しなくてはならない使命がある。"}, "牡牛座_2": {"sign": "牡牛座", "degree": 2, "symbol_ja": "電気的な嵐", "explanation": "意識の頂点である山と、個人の活動が開通した結果、大きな運命とか宇宙的な影響からの雷鳴のような天啓が轟く。高次の霊的な運命を受け入れるように強制する強い力が、この度数をもつ人を見舞う。啓示と破壊の両方の刺激がある。人生のなかで、ショッキングで打撃的な出来事がしばしば起こる。雷鳴、光、嵐などがこの度数のイメージだからだ。これは１度に自己の運命を実践しようと強制的な意志がはたらき、その結果、潜在意識や、自然界がそれに対してはっきりとした反応をしている光景だ。この度数をもつ人に、しばしばオカルト的な魔力をもっている人を見かけるのも、意志が自然界を打ち、その結果個人の周辺の状況が激しく反応を返してくる、ということだろうと思われる。"}, "牡牛座_3": {"sign": "牡牛座", "degree": 3, "symbol_ja": "開花した三つ葉の芝に自然な歩みで入り込む", "explanation": "芝生は、質素で平均的な、われわれの立っている生活のごく日常的な地盤を意味している。人の行動の核心となる個性や運命が、こうした足もとの部分にまで浸透した結果、この人は満ちたりた落ち着いた生き方を手に入れることになる。自分にふさわしい住居、自分にふさわしい経済、すべてがこの人らしい整い方をする。心身のすみずみまで、生き生きとしたありさまを示すので、とても喜ばしい現象だ。この度数をもつ人は、自己の運命の実現のために激しく努力して、その結果豊かな成果を得て満足した状況にある。芝生というシンボルが重要な意味をもつのは、具体的な生活の地盤のすみずみにまで、個人の運命の力が浸透しきったことを意味しているのだ。個人はあたりまえのような顔で、この恩恵を感受できる。"}, "牡牛座_4": {"sign": "牡牛座", "degree": 4, "symbol_ja": "虹の端にある黄金の壷", "explanation": "天界の影響力とつながるというのが、虹の承意だ。虹はどこがはじまりで、どこが終わりかはっきりしない。そのようにこの度数も、つかみきれない漠然とした影響力が人生にかかわってくることを暗示している。しかし人生全体を観察すると、総合的には富の象徴として、この度数をもつ人の人生に豊かさがもたらされているはずだ。その人の深い意識と、身体に、調和的なエネルギーが循環していて、活発な生命力が交流しているありさまが描かれている。ビジネス、経済的な発展、人間関係の拡大、感性の豊かさ、などがこの度数の特徴だが、つまりは天界との契約（虹）で、使命を達成するかわりに、それに必要な物質的な条件や富が得られるという暗示なのだ。また思いがけない幸運な発展をしていく人をあらわす度数である。"}, "牡牛座_5": {"sign": "牡牛座", "degree": 5, "symbol_ja": "開いた墓での未亡人", "explanation": "いかなるものも腐敗して失われるというのが、この世界の真実だ。どんなに美しく楽しみに満ちたものも、最後は空虚な抜け殻になる。また家族や、血縁、親しい人などとのいかなるきずなも、いつかは切れるものだ。この事実に落胆しているあいだは、この度数は悲観的な意味がある。だが、本当の意味は、自分を新しく出発させるために、過去を捨てる心の準備をすれば、より大きな可能性にチャレンジできる機会がここで訪れることを暗示。ここでは自らの意志で過去のカードを捨てることが自己変革の鍵になる。経歴を消すとかの意味も。１度からはじまった、運命の実践とその報酬という流れは、ここでそろそろ終結し、いよいよ自分で自分の人生を切り開く生き方を考えなくてはならない。\nNo. 8／72区分（牡牛座６度～１０度）「救済」\nエゴの殻を捨てて、互いに助け合う\n個人の運命や、過酷な条件づけに縛られて孤立した人々を結びつけ、共感によって、互いに助け合う関係を築く。慈悲心が発達する。"}, "牡牛座_6": {"sign": "牡牛座", "degree": 6, "symbol_ja": "峡谷にかかるカンチレバー橋", "explanation": "渓谷は、山と山のあいだの深い溝を示し、これはそれぞれ個人は自分のエゴや個性、自我に閉じこもって、互いに他人を恐れていることを暗示。人と人とのあいだの深い谷に橋をかけ互いに協力しあい、個人の壁を超えようとするのが、この度数の真意だ。人が実質的に進化するには、他の人とのかかわり方がもっとも大切になる。この度数の人はそれを十分に理解し、自閉症的になりやすい人々に対する愛情を示す傾向がある。人類の集団化され助けあう知能は、想像を絶する困難を超えることも可能だ。牡牛座の１度から５度までは、個人の能力をぎりぎりまで発展させることがテーマだったが、いまやこのそれぞれの個人の個性は、他人との交流を妨害する壁として意識される。５度で、自分ひとりの可能性に絶望した人は、初めて６度で、人との協力が大切なのだ、とはっきり自覚するのだ。"}, "牡牛座_7": {"sign": "牡牛座", "degree": 7, "symbol_ja": "先祖の井戸にいるサマリアの女", "explanation": "新しい存在の質が、古い陳腐なものにとってかわるため、もっとも高度な創造力が、もっとも低いもののなかに降りてくること。新しい力と出会うためには、いままでの伝統に対して絶望していなくてはならない。サマリアの女は、見捨てられた辺境の立場におかれていて、そうした者にのみイエスが出会うという意味深い度数。これは非常にスピリチュアルな開示を意味することが多い。社会の中心に存在し、まだ伝統に希望をもっている人々には、未来は提示されず、誰も期待することのないひとりの孤立した女性にそれが示された。これは大逆転の度数だ。絶望的で、希望のないどん底の状況で、はじめて本当の高度な意識が目覚める。この度数を持つ人の人生はしばしば困難な状況があらわれるはずだ。だがそのなかでこそ、本当のことを知る。最悪のときに最高のものを見つけ出すのだ。"}, "牡牛座_8": {"sign": "牡牛座", "degree": 8, "symbol_ja": "雪におおわれていない土地にあるソリ", "explanation": "まだ冬がきていないのに、冬の到来に備えて準備すること。文化的な産物をあらわす象徴は、牡牛座６度では橋、７度では井戸、８度ではソリという姿で暗示されている。自分の未来の生き方をはっきりと意識したサマリアの女は、自分も含めて、未来に生き延びるために、伝統的な文化の産物も利用しなくてはならないと自覚し、将来のために準備するという度数だ。７度も、８度も、多くの人はすぐには気がつかないが、あとで急速に重要性を帯びてくる事柄に注意を払うことができる能力がある。具体的には、養老院とか、あるいはなんらかの教育施設など、未来にやっと役立つような計画を温め、その準備をしている人などに、この度数が強くはたらいていた。とくに現代の社会状況では、この度数の持ち主は重要なはたらきをするだろう。将来のために準備し、多くの人が見向きもしないことでも、忍耐強く計画的な生活をする能力。"}, "牡牛座_9": {"sign": "牡牛座", "degree": 9, "symbol_ja": "立派に飾られたクリスマスツリー", "explanation": "外は冬。牡牛座８度で準備されたソリが使われるべき冬がきている。これは状況的に辛い時期とか、また逆境などを暗示しているが、その人の内面はつねに温かく、祝福に満ちている。家のなかは暖かく豊かで、そしてクリスマスツリーには装飾が凝らされていて、聖なる価値が強調されているということだ。内面的に充実し、豊かな心を持つ人。あるいは信念の強い人は、いかなる状況でも、幸福な感覚を維持することができるという意味にとれる度数だ。苦労も苦労だと感じない、ときには他の人が見たら明らかであるにもかかわらず、本人は自分が苦痛な状況にあることにまったく気がつかない、というケースが多く見られた。牡牛座７度は、最悪の絶望のときに訪れる天啓だった。すでに最悪の状況を否定的に見る習慣を克服しているために、これほど逆境や不幸に忍耐強い人はいないと思われる。周期的な再生、いまは冬でも、また春がくるということに対しての確信がある。外部的な影響にふりまわされない、しっかりした人。"}, "牡牛座_10": {"sign": "牡牛座", "degree": 10, "symbol_ja": "赤十字の看護婦", "explanation": "個人的な愛の感情ではなく、社会全体に対する博愛的な奉仕、協力的な感情によって、人はさらに高いレベルに上昇することができる。個人的な狭い範囲の救済に終始していた人は、やがて個人の確信、信頼、信仰が、他の人に対しても貢献できることを知り、広い範囲での福祉などについて考えるようになる。牡牛座６度から、１０度までは、支えを失った個人の、困難を乗り越えて発達する、苦しい過程を示すが、６度では、自分が救済されるためにどうしても必要な事柄として、人と協力しあうことを覚えた
