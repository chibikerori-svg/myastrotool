<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サビアンシンボル 検索アプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #e0d7f5;
    padding: 20px;
  }
  .container { max-width: 860px; margin: 0 auto; }

  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #c8b4f8, #f0a8d0, #c8b4f8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.1em;
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #a89bc8;
    margin-bottom: 24px;
  }

  /* ── セレクター ── */
  .selector-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,180,248,0.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }
  .selector-row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
  .selector-group { flex: 1; min-width: 160px; }
  label {
    display: block; font-size: 0.82rem; color: #c8b4f8;
    margin-bottom: 7px; letter-spacing: 0.05em;
  }
  select {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(200,180,248,0.4);
    border-radius: 10px;
    color: #e0d7f5;
    font-size: 1rem;
    padding: 10px 14px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus { border-color: #c8b4f8; }
  select option { background: #302b63; color: #e0d7f5; }

  input[type=range] {
    width: 100%; height: 6px;
    border-radius: 3px; border: none;
    accent-color: #c8b4f8;
    background: rgba(200,180,248,0.3);
    cursor: pointer;
  }
  .degree-btns {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px;
  }
  .degree-btn {
    background: rgba(200,180,248,0.12);
    border: 1px solid rgba(200,180,248,0.25);
    border-radius: 7px;
    color: #c8b4f8;
    font-size: 0.78rem;
    padding: 4px 9px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 32px;
    text-align: center;
  }
  .degree-btn:hover { background: rgba(200,180,248,0.28); color: #fff; }
  .degree-btn.active {
    background: linear-gradient(135deg,rgba(200,180,248,0.4),rgba(240,168,208,0.3));
    border-color: #c8b4f8; color: #fff; font-weight: bold;
  }

  /* ── ヘッダー ── */
  .result-header {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,180,248,0.3);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 16px;
    text-align: center;
    backdrop-filter: blur(10px);
    display: none;
  }
  .sign-degree-label { font-size: 0.9rem; color: #a89bc8; margin-bottom: 6px; }
  .symbol-name { font-size: 1.35rem; font-weight: bold; color: #f0e8ff; margin-bottom: 5px; line-height: 1.4; }
  .symbol-en { font-size: 0.88rem; color: #b8a8d8; font-style: italic; margin-bottom: 10px; }
  .key-phrase {
    display: inline-block;
    background: linear-gradient(135deg,rgba(200,180,248,0.2),rgba(240,168,208,0.2));
    border: 1px solid rgba(200,180,248,0.4);
    border-radius: 20px;
    padding: 5px 18px;
    font-size: 0.95rem; color: #f0c8e8;
  }

  /* ── カード一覧 ── */
  .cards-list { display: flex; flex-direction: column; gap: 16px; }

  .source-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,180,248,0.2);
    border-radius: 16px;
    padding: 22px 24px;
    backdrop-filter: blur(10px);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .source-title {
    font-size: 0.75rem;
    color: #c8b4f8;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(200,180,248,0.18);
    padding-bottom: 8px;
  }
  .source-symbol {
    font-size: 1.05rem;
    font-weight: bold;
    color: #f0e0ff;
    margin-bottom: 12px;
  }
  .range-badge {
    display: inline-block;
    background: rgba(240,168,208,0.15);
    border: 1px solid rgba(240,168,208,0.3);
    border-radius: 12px;
    padding: 4px 12px;
    font-size: 0.85rem; color: #f0a8d0;
    margin-bottom: 10px;
  }
  .explanation {
    font-size: 0.93rem;
    line-height: 1.95;
    color: #d0c4e8;
    white-space: pre-wrap;
  }
  .keyword-big {
    font-size: 1.5rem;
    font-weight: bold;
    color: #f0c8e8;
    text-align: center;
    padding: 16px 0;
  }

  /* ── empty ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: #7868a8; font-size: 1rem;
  }
  .star { font-size: 2rem; display: block; margin-bottom: 12px; }

  @media (max-width: 600px) {
    h1 { font-size: 1.4rem; }
    .selector-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>✨ サビアンシンボル</h1>
  <p class="subtitle">星座と度数を選んで、あなたのシンボルを見つけよう</p>

  <div class="selector-card">
    <div class="selector-row">
      <div class="selector-group">
        <label>🌟 星座</label>
        <select id="signSelect" onchange="updateResult()">
          <option value="牡羊座">牡羊座 (おひつじ座)</option>
<option value="牡牛座">牡牛座 (おうし座)</option>
<option value="双子座">双子座 (ふたご座)</option>
<option value="蟹座">蟹座 (かに座)</option>
<option value="獅子座">獅子座 (しし座)</option>
<option value="乙女座">乙女座 (おとめ座)</option>
<option value="天秤座">天秤座 (てんびん座)</option>
<option value="蠍座">蠍座 (さそり座)</option>
<option value="射手座">射手座 (いて座)</option>
<option value="山羊座">山羊座 (やぎ座)</option>
<option value="水瓶座">水瓶座 (みずがめ座)</option>
<option value="魚座">魚座 (うお座)</option>
        </select>
      </div>
      <div class="selector-group">
        <label>🔢 度数: <span id="degreeLabel" style="color:#f0a8d0;font-weight:bold;">1 度</span></label>
        <input type="range" id="degreeRange" min="1" max="30" value="1" oninput="syncDegree(this.value)">
      </div>
    </div>
    <div class="degree-btns" id="degreeBtns"></div>
  </div>

  <div id="resultHeader" class="result-header"></div>

  <div class="cards-list" id="cardsList"></div>

  <div id="emptyState" class="empty-state">
    <span class="star">⭐</span>
    上で星座と度数を選んでね
  </div>
</div>

<script>
const DATA = {"goisu": {"牡羊座_1": {"sign": "牡羊座", "degree": 1, "symbol_ja": "水から上がった女性と彼女を抱きしめるアザラシ", "symbol_en": "A woman rises out of water, a seal rises and embraces her.", "key_phrase": "人間として地上で生きることを楽しみにやって来た人", "explanation": "太陽が1年をかけてひとめぐりする黄道12星座のスタート地点です。北欧やスコットランド、アイルランド地方には、アザラシが海から上がって、皮を脱いで人間となって地上で暮らし、やがてまた皮を着て海へ戻るという神話があります。まるでわたしたちの祖先がアザラシであるかのような物語ですが、すべての生物が海から始まったことを思えば、不思議ではないでしょう。\nわたしたちはお母さんのお腹の羊水のなかで育まれ、産道を通って誕生します。牡羊座がはじまる前の魚座で、わたしたちは全体性の海へと回帰しましたが、そこからひとつのたましいが、新しい12星座の旅をするために海から上がってきたのでしょう。生まれたての赤ちゃんにとって、地上ははじめて体験する世界であり、彼女はここへ来る前の胎内での記憶......魚座の集合無意識の記憶になかば包まれている状態かもしれません。\nはっきりと目醒めるまでのあいだ、そのぼんやりとした記憶が、この地上における唯一の記憶として、彼女を導くでしょう。あらゆる創造のはじまりであり、無限の可能性をもって、彼女はここに立っています。\nこの度数を持つ人は、とてもナチュラルで純粋。素直な気質であらゆることをのびのびと楽しみ、そして鋭い直観を持っているでしょう。さまざまな体験とそのプロセスを楽しみ、生きることそのものを面白がって、どんなことにでもトライしようとするかもしれません。\nまわりの人たちがどうであろうと、自分のペースややり方を貫き、好きなことを楽しんでやっていくことができるでしょう。自分の思いの強さで、物事を実現させようとするところがありそうです。"}, "牡羊座_2": {"sign": "牡羊座", "degree": 2, "symbol_ja": "人間の自然な本質を明らかにするコメディアン", "symbol_en": "A comedian reveals human nature.", "key_phrase": "まわりで起きていることを天然自然に模倣する人", "explanation": "新しい世界に降り立ったばかりの若いたましいが、どのようにふるまえば良いのかわからず、まわりを見渡して、見よう見真似でそれらしくふるまう......という模倣の度数です。幼い子供が、まわりの大人のふるまいを意味もわからずに真似すると、周囲が爆笑する、ということがあるでしょう。幼児はまじめに真似しただけなので、なにがそんなにおかしいのかわかりません。だけれども、みんなが喜んでくれたという反応がうれしくて、何度もしつこく、その動作を繰り返すことがあるでしょう。\nまわりの大人たちが真似する幼児を面白がるのは、その動作のなかに、自分のしていることのデフォルメされた姿を見ているからかもしれません。外国人観光客が日本へやって来て、日本の文化や習慣をたどたどしく真似している姿にも、同じように感じることがあるでしょう。逆にわたしたちが外国へ出かけて行き、慣れない習慣に出会うと、まわりを観察して、なんとなく合わせてみることも、同じところから発しているものかもしれません。どうしていいかわからないとき、わたしたちは本能的にまわりの人たちを真似することで、その本質をつかもうと試みます。\nこの度数を持つ人はとても素直であらゆる物事をそのまま受け取る質があるでしょう。あまり深く考えずに反射的に対応したり、思ったことをそのまま口に出したりするかもしれません。真似することが得意で、無意識に人の口癖を繰り返したり、CMソングを口ずさんだりすることも多いでしょう。そのように模倣することで、そのものの本質をズバリとつかんでいくのです。\n流行りの芸人の真似をしたり、流行語を喋ったりして、まわりがウケても、本人はいたって天然気質。まわりで起こっていることに応えながら、思考を超えたところで本質を直観的につかみとることができるでしょう。"}, "牡羊座_3": {"sign": "牡羊座", "degree": 3, "symbol_ja": "祖国の特色から作られた男の横顔のカメオ", "symbol_en": "The cameo profile of a man in the outline of his country.", "key_phrase": "その場の雰囲気に合わせて自在に人格を変える人", "explanation": "牡羊座は生まれたばかりの無垢な赤ちゃんが、さまざまな体験を経て『自分が何者であるのか』ということを確立させていく星座です。そして、わたしたちは自分のアイデンティティの根幹となるものを、まず生まれ育った場所の雰囲気から創り上げることになるでしょう。\n土地にはそれぞれの地質や気候などから独特の土地柄を持ちます。そして、そこに住む人は共通して、その土地の持つ雰囲気をまとうことになるでしょう。土地の気質が住人の気質に影響するのと同様に、住む人たちの価値観もまた、土地柄に影響します。その相互関係によって、土地の雰囲気が保持されていくのでしょう。\n男性の横顔の肖像のカメオという度数ですが、ここでは彼の個人的な特徴よりも、彼の生まれ育ったローカル地域の特徴のほうがにじみ出ています。あの地域は気性が荒いとか、こちらの土地は忍耐強いとか、あそこの地域は商売がうまいといった、わたしたちが感じる地域性のようなものは、おのずとそこで生まれ育った人に反映されるのです。\nこの度数を持つ人は、その時々に所属する集団や周囲の人の影響を受けて、価値観や考え方が変わるという経験をしやすいようです。ひとたび、なにか身につけたとしても、所属や付き合う相手が変わると、また本人の雰囲気も変わっていくかもしれません。\n素直にその場所に馴染み、その気質がそのまま自分のアイデンティティのようになりやすいでしょう。ひとつのところに留まれば、その土地のステレオタイプのような人格が強化されるかもしれません。逆にいくつのも場所を経験することで、さまざまな人格が引き出されていきます。\n基本的にはどこへ行ってもすぐに打ち解けることができるでしょう。"}, "牡羊座_4": {"sign": "牡羊座", "degree": 4, "symbol_ja": "人里から離れた道を散策するふたりの恋人たち", "symbol_en": "Two lovers strolling through a secluded walk.", "key_phrase": "相対的な対比によって自分を成長させる人", "explanation": "ふたりの恋人たち......男女のペアが人里から離れた、人の少ない道を散策しています。ふたりはお互いに甘い心を抱きながら歩いているのかもしれません。\nわたしたちが生まれてから「自分は男である」あるいは「女である」ということを、意識し始めるのは、いつ頃からでしょうか。幼児期のあいだは、どこか中性的であり、男女の区別なく、他との個性の違いも判然とせずに育つかもしれません。それが物心ついて、男女の違いを理解し始めると同時に、自分のなかの男らしさ、あるいは女らしさというものに目覚めはじめるでしょう。\nはっきりと対比するものが現れてはじめて、わたしたちは自分の個性を自覚していきます。そして持っていないものを羨み、欲することで、それを手に入れるための地に足のついたみずからの成長がはじまるのでしょう。世界には表と裏、陰と陽、右と左、上と下、内と外といった二極があり、それらはお互いに自分にないものを補完し合うことで成立しています。男と女が結びついて、あらゆる生物が殖えていきますが、性を意識することはそのはじまりといえるでしょう。\nこの度数を持つ人は、人から離れた自分だけの秘密のスペースや時間を大切にして、そのなかでじっくりと自身を成長させていくかもしれません。さまざまな対比によって自分を知り、足りないものに興味を抱いて、それを求めることで活動意欲を高めるでしょう。自分の内側からなにかを創り出す力も秘めています。\n秘密主義の傾向がありますが、心をゆるした相手にはどんなことでも打ち明けるかもしれません。恋愛やパートナーシップにこだわりがあって、関係性を通して、自分を更に成熟させていくでしょう。"}, "牡羊座_5": {"sign": "牡羊座", "degree": 5, "symbol_ja": "羽のついた三角", "symbol_en": "A triangle with wings.", "key_phrase": "常人には理解できない高い理想を抱き、追い求める人", "explanation": "点が線、線が面になって、最初に完成するのが三角です。初めて形というものを体験する創造。何もないところから生み出されていくクリエイティブの歓び。タロットの三番目のカードは『女帝』ですが、これは創造性のシンボルで、どんどん生み出していくこと、そして発生したものが育っていく様子が描かれています。このシンボルでは、その創造力の三角に羽が生えているため、ある意味、どこまでも自由に際限なく、軽やかな発想で生み出していくことができるでしょう。\n実際にこの度数を持つ人は、とても高い理想と、ぶっ飛んだ直観力を持っていることが多く、実現可能かどうかはともかくとして、いろいろなことを思いつくことが多いようです。形にできるかどうか、ということよりも、高い理想を抱き続けることと、挑み続けることが何よりも大切な度数といえるでしょう。\n純粋に精神性の高いものを追い求めていき、それは地に足をつけて生きる常人には理解できない抽象的な目的でもあるかもしれません。現実の目に見える形がどうであるのか、ということよりも、精神的にどんな意識状態であるのか、ということのほうが、この人にとっては大事なのでしょう。そのように精神状態を維持するために、苦しかったり、難しかったりしても、それを手に入れよう、達成しようとする試みをやめることはないかもしれません。\n現実社会で物理的な結果を出すことばかりを追い求める凡人にはわかりにくい一面があるかもしれませんが、しかしまわりの人たちがどうであれ、自分を貫く強さと高潔さを持っているでしょう。内なる世界を満たすものを追い求めて、ひらめきと直観によって世界を理解する人です。"}, "牡羊座_6": {"sign": "牡羊座", "degree": 6, "symbol_ja": "一辺が明るく照らされている四角", "symbol_en": "A Square, With One Of Its Sides Brightly Illumined.", "key_phrase": "何事も一途にやり遂げることのできる人", "explanation": "四角形はすべてをかっちりと安定させるための土台です。基礎がしっかりとしているからこそ、その上に、強固な家を建てることができるでしょう。タロットの四番目のカードは『皇帝』ですが、彼は石の玉座に座り、王国を安定されるために威厳を保ち、頑なにルールを遵守して、国民の暮らしに秩序と継続を与えようとしています。ここでは、そんな四角形がクローズアップされていますが、そのうちの一辺が光り輝いています。これは、四角形を完成させるための、最後の一辺かもしれません。\n牡羊座という星座は、どんなことでも自分の力でやれるような、強くたくましい自分になることが目的ですが、いまだ未熟なまだ始まったばかりの若いこの度数では、その理想を実現するために奮闘しようとするでしょう。とすると、この四角形は自分自身の土台といえるかもしれません。いまだ、しっかりと自我がかたまっていないため、他者からの影響を受けやすい一面がありますが、それを本人の頑なな意志でカバーしようと努めます。\nこの度数を持つ人は、自分の定めた理想を実現させるために、一心不乱に取り組むようなところがありそうです。一度こうと決めたなら、他者の忠告も聞かずに飛び出していくような情熱も持ち合わせているでしょう。\nまた、なかには、すでに完成された基盤や構造が、どのようになっているのか解明してみたい、という欲求に駆られる人もいるようです。ひとつの物事の真実を探求して、それがどうなっているのか、明らかにすることに歓びを感じることがあるでしょう。\n一途で情熱的なところがあるため、専門家や研究家に向いています。どんなことでも集中することで、真実のカギを握ることができるでしょう。"}, "牡羊座_7": {"sign": "牡羊座", "degree": 7, "symbol_ja": "ふたつの領域で", "symbol_en": "同時に自己表現するのに成功する男", "key_phrase": "ふたつの領域で同時に自己表現するのに成功する男", "explanation": "相反する物事から自分を確立していく人\n男性がふたつの領域で同時に自己表現するというサビアン・ワードですが、ここでいうふたつの領域というのは、この宇宙に存在する、あらゆる二元の世界。表と裏、現実世界と精神世界、男と女、陽と陰......。その相反しながら支え合っているふたつの世界を、対比させることで、思索を深めていき、全体を理解しようと試みる度数です。\nあらゆる体験から、物事の構造を理解していくため、出会いと別れ、成功と失敗、順調と不調、ラッキーとアンラッキーなど、一見ネガティブに感じられるようなことでも、ポジティブな体験との対比となるため、この度数の人には成長のヒントとなるかもしれません。\n実際にこの度数を持つ人は、まったく相反するようなふたつ以上の物事を同時に体現することになりやすく、またそうすることで、その両方をうまくいかせる術を身につけることがあるでしょう。頭を使う仕事と感性を使う仕事、リーダー役と補佐役、現実的な考え方をする友人と、スピリチュアルな考え方をする友人、モノづくりの趣味と身体を動かす趣味など、何事もまったく異なるようなことを同時にすることがプラスと働くでしょう。本業と副業とふたつの仕事を持ったり、多趣味で多方向のつながりを持ったり、軟派な彼氏と硬派な彼氏とふたりのボーイフレンドを持ったりする人もいます。そういう意味では住まいも都市部に暮らしながら、週末は地方へ出かけるなどすると、メリハリが生まれて、この人には良い影響があるでしょう。\nまったくタイプの異なるものを同時に体験することで、自分らしさを確立することができるようです。あえて相反する物事を同時に進めてみると、よいかもしれません。"}, "牡羊座_8": {"sign": "牡羊座", "degree": 8, "symbol_ja": "東から吹く風になびく", "symbol_en": "リボンのついた大きな女性の帽子", "key_phrase": "東から吹く風になびくリボンのついた大きな女性の帽子", "explanation": "これから始まる物事の予兆をキャッチして伝える人\n東から吹く風というのは、春に吹く風を表していて、春というのは、はじまりの季節。風はさまざまなものを明るみにしながら、情報を運んでくる働きがあるため、ここではまだ誰も知らない新しい情報が運ばれてくる、ともいえるでしょう。女性というのは受け身の存在で、受容性の質があり、やってきた情報をキャッチしているといえます。そしてここでは同時に帽子によって守られてもいます。\nこの度数を持つ人は、また始まっていないこと、これから起ころうとしていることに対して、とても敏感なところがあるかもしれません。帽子についているリボンが、やってきた小さな風にも反応して、さまざまな予兆や伝播する前の情報をキャッチしやすくなるでしょう。\nしかし牡羊座は、いまだ自我を鍛えている最中ですから、数多の情報に対して、そのまま反応してしまうと、見えない力や霊的な影響に振り回され過ぎてしまう恐れが出てきます。この人がキャッチする情報は玉石混合。純粋なものもあれば、誰かの邪な思いから発せられたものもあり、多くの情報をシャワーのように浴びながら、それを識別する力を養うことがこの人のテーマといえるかもしれません。\n実際にこの度数の人は、さまざまな情報を敏感にキャッチすると、好奇心おもむくままに、反射的に行動しようとするようなところがあるでしょう。また、知り得たことをそのまま、まわりに広めたい欲求もあるかもしれません。\nしかし、ここで一呼吸おいて、つかんだ情報をしっかりと精査する過程を入れることで、自分の質をより鍛えることができるでしょう。うまくその資質を活かすことで、マスコミや良質な情報の発信者として、活躍することができるかもしれません。"}, "牡羊座_9": {"sign": "牡羊座", "degree": 9, "symbol_ja": "水晶を凝視する人", "symbol_en": "A Grystal gazer.", "key_phrase": "鋭く世界を観察して理解する人", "explanation": "水晶の球体というのは、鏡のようにさまざまなものを写し出す働きがあります。また水晶体はいろいろなものをキャッチする媒介となって、見ようとしている対象の情報を受信し、その全体がどうなっているのか、明らかにするでしょう。\n水晶を凝視する人は、いわゆる水晶占い師といえるかもしれませんが、いまここにいながらにして、客観的に世界で起こっているさまざまなことを手に取るように知ることができます。そして、さらに深く観察することで、その全貌を理解することもできるでしょう。霊感、直観、全体性の鋭い理解といったものが総合的に鍛えられていく度数です。目に見えるものも、見えないものも、その両方を感じ取ることができるでしょう。\nこの度数を持っている人は直観力にすぐれていて、わずかなヒントからなんとなく全貌を理解することができるかもしれません。スピリチュアルな世界に興味を持つことも多そうです。誰かに習ったわけでなくても、自然と世の中の流れを把握したり、人の心理を鋭く見抜いたりすることができるでしょう。すばらしい直観と高い精神性が自分自身の成長をおのずと導いていき、物事を深く洞察して、この世界の見えない法則や理を解き明かすことに夢中になる人もいるかもしれません。\n研究者気質であり、自分自身が当事者となって現実世界で活躍するよりも、どこか傍観者的に世界を眺めているような立場を好む傾向がありそうです。そして、ひとり密かに紐解いたさまざまな秘密を、よりじっくりと探求していくのでしょう。"}, "牡羊座_10": {"sign": "牡羊座", "degree": 10, "symbol_ja": "伝統的なイメージに", "symbol_en": "新しい象徴的な形を与える教師", "key_phrase": "伝統的なイメージに新しい象徴的な形を与える教師", "explanation": "新しい価値観で世界をとらえ直す人\n牡羊座は火のエレメントに属する星座ですが、これは物事を具体的な形として落としこまずに、抽象的な概念として扱うことのできる質を表しています。むしろ具体的な結果や事象、目に見える形式よりも、概念や精神性を強調する傾向があり、どのような意識で、それがなんのためにやっているのか、ということのほうが大事ともいえるでしょう。\nこのサビアン・ワードでは、教師がこれまで営まれてきた、わたしたちのさまざまな日常的なおこないに対して、新しいシンボリックな形式を与えることが描かれています。たとえば、占星術を学んだことのある人は、身のまわりで起こるいろいろな出来事を12星座や10惑星にたとえて読むかもしれないし、東洋思想を学んだ人であれば五行を通して世界を理解するかもしれません。色で理解する人や、音で理解する人、言語や思想で理解する人......それがなんであれ、なにかしらの概念を通して、これまで当たり前にあった生活や関係性を、新しい様式としてとらえ直そうする意識がここでは働くでしょう。\nこの度数を持っている人は、新しいものの見方や考え方に興味を持ち、それを習得することで、世界を自分なりに理解しようとするかもしれません。他者から「これは、こういうものだ」と古い慣習として押し付けられることを嫌い、みずからの意志で旧来のあらゆる常識や押し付けから逃げ出して、新しい価値を創造しようと試みるでしょう。\n現状を打破しようとする情熱のあふれる人です。また学んだことを応用するだけでなく、みずから表現したり、人に教えたりすることもできるでしょう。"}, "牡羊座_11": {"sign": "牡羊座", "degree": 11, "symbol_ja": "国家の支配者", "symbol_en": "The Ruler Of A Nation.", "key_phrase": "社会の中でカリスマ性を発揮する人", "explanation": "力強い自分自身の存在の確立をめざしていく牡羊座が、社会へと飛び出していき、集団と関わりながら、そのしくみの中でどうにかして自分らしさを強く打ち出そうとする度数です。社会の中でいかに自分らしくふるまうかということと、自分の力を存分に発揮することに意識が向けられていきますが、それは人を統率する力に憧れを抱かせるでしょう。社会に向けて力を解き放ち、さまざまなことにチャレンジしようとする意欲があふれて、実行力が満ちている状態です。\nただし、そのための規範となる手法が本人の中で確立されていなければ、単なる子供じみた支配欲求として、他者を圧倒するに過ぎません。人を納得させて追従したくなるような厚みのある説得力や、誰もが認めるだけの形式に則った実力が伴っていれば、うまく本領を発揮しやすいでしょう。\nこの度数を持っている人は、社会のなかで活躍するだけの高いリーダーシップの資質を備えています。集団の先頭に立って道を切り拓くような力があるため、勢いがほしいときや、全体の士気を高めたいときにはぴったりです。しかし緻密さや細やかに状況を分析するような冷静さには欠けるため、ブレーンや補佐役がそばにいてフォローしてもらえるほうがうまくいきやすいでしょう。\nまた、なにをするのかという信念や、ある程度の目的がしっかりと定まっているほうが成功の確率が高まります。立ち昇る雰囲気にカリスマ性があり、胸に抱いた信念を実現するだけの実行力があります。団体の理念を象徴するような代表者に向いているでしょう。"}, "牡羊座_12": {"sign": "牡羊座", "degree": 12, "symbol_ja": "三角形を作って飛ぶ野生の雁の群れ", "symbol_en": "A Triangularly Shaped Flight Of Wild Geese.", "key_phrase": "内なる野生に従った自然体の生き方に憧れる人", "explanation": "野生の雁が群れて飛ぶとき、空気の抵抗を減らすために、自然と集団でV字の三角形を作って飛んでいきます。そのように飛ぶ、ということが雁のDNAに組み込まれているわけですが、それは自然の法則にしたがった合理的なしくみが、身体の中に息づいているともいえるでしょう。人間が作り出した秩序の背後には自然の、そして宇宙の法則が歴然と横たわっています。\nこの度数を持っている人は、そういった人智では計り知れない宇宙の流れに興味を抱き、その法則やしくみを解明しようとするかもしれません。自然の摂理がどのように働いているのか。さまざまな環境において、動植物がどのように関わり合いながら生きているのか。宇宙の星たちがどういう法則で生まれてきて、やがて終わっていくのか。そういったものに興味を持ち、解明して、そういった自然の流れに沿った生き方に憧れることがあるでしょう。\nまた同時に人類全体が誰かに統治されるような人工的な生き方ではなく、それぞれが宇宙や自然の法則に目覚めていき、それにしたがった生き方を実践することこそがしあわせだと思うようなところがありそうです。平和のために、そういった生き方こそが人間にとっても自然なのだと感じると、より一層、法則を探求するようなところがあるでしょう。\n宇宙の謎や法則に興味をもって解き明かしたり、環境に関心があったりするかもしれません。純粋に自然体の生き方に憧れて、自分にとって無理のない生活をしようと試みることもあるでしょう。"}, "牡羊座_13": {"sign": "牡羊座", "degree": 13, "symbol_ja": "社会への抗議が成功しなかったことを明らかにする不発弾", "symbol_en": "An Unexploded Bomb Reveals An Unsuccessful Social Protest.", "key_phrase": "思いついたら実行する行動力の人", "explanation": "社会への抗議というのがテーマとなっているサビアン・ワードですが、そういった行動に人を駆り立てるものは現状への不満。いまあるものを否定して、異なるものを祭り上げようとする行為が、抗議活動といえるかもしれません。\nしかし、すでに完成して動いている、あらゆる現況を完全に抑えこんで、まったく別のものを際立たせようとするのは、とてもむずかしいでしょう。また、なにかひとつを強く否定して、別のなにかを肯定すると、そこからこぼれ落ちる例外が次々と矛盾を生み出すため、自分の中で葛藤が起こるかもしれません。\nこの度数を持っている人は、現状の不満を感じていることに対して、あまり深く考えずにパッと反論してみたり、素直に受け入れずに抵抗してみたりすることがありそうです。しかし、それらは充分に練り上げたうえでの行動ではなく、反射的に反抗しているに過ぎないことも多々あるため、なかなかうまくいかず、むしろ反対にやりこめられるような経験も増えるでしょう。そのため、現況に対するフラストレーションを抱えこみやすく、いつも自分がどうしたいのか、よくわからない不満と、現況への怒りとのあいだで、揺れ動いているようなことが起こるかもしれません。\nあまり深く考えずに、思いついた瞬間にパッとやってみる、というのは、まさに牡羊座の象徴です。結果よりも、まずはひらめいたら実行する、という行動力。その結果として、勢いだけが先行しやすく、状況をすべて把握していないうちから発言したり、動き始めたりすることがあるでしょう。\nそれで失敗することもあるかもしれませんが、それでもめげずにまた突き進むのもまた、牡羊座の特徴です。直観力やひらめきがあり、大胆な行動力の持ち主です。"}, "牡羊座_14": {"sign": "牡羊座", "degree": 14, "symbol_ja": "男と女のそばでとぐろを巻く蛇", "symbol_en": "A serpent coiling near a man and a woman.", "key_phrase": "異なるものを統合して精神的な成長をめざす人", "explanation": "わたしたちが、より完全な自分自身になろうとするとき、自分の中に相反するものがあると悩まされることになるでしょう。「こうしよう」「これが正しい」と、なにかを選ぶということは、選ばなかったもう一方を切り捨てることにつながり、そのようにしている限り、いつもその切り捨てた影が事ある度に主張してきて、なかなか成長することができません。\nこのサビアンでは、とぐろを巻いている蛇が男と女という、相反するものをひとつに結びつけています。なにかを切り捨てても、それは何度も姿や形を変えて目の前に現れることになるため、最終的にわたしたちは、それを切り捨てるのではなく、粛々と受け容れることによってのみ、統合とした人格へ近づくことができるのでしょう。蛇は忌みなるものであると同時に、知恵と変容の象徴。脱皮を繰り返すことで、より力強いものへと進化していく動物です。目の前に現れる「気の合わない人」を無視したり、切り捨てようとしたりするほど、うまくいかなくなるケースが増えるでしょう。それをあきらめて、受け容れ、どうにかうまくつきあおうとしていくときに、わたしたちは精神的に成長していくことができます。\nこの度数を持っている人は、さまざまな異なるタイプの人たちとの交流を積極的に楽しもうとするところがあるかもしれません。ひとりで過ごすよりも、あえて、いろいろな人たちと一緒に関わりながら過ごすという経験が、多くを学ばせ、心を成長させてくれるでしょう。\nまた、人格を統合すること、精神的に成長することに興味をもつことがあるかもしれないし、他者の成長を助ける役割になったりすることがあるかもしれません。中には恋愛を繰り返して、自分に足りないものを、パートナーを通して補ったり、学んだりする人もいるでしょう。"}, "牡羊座_15": {"sign": "牡羊座", "degree": 15, "symbol_ja": "儀式用のブランケットを編んでいるインディアン", "symbol_en": "An Indian Weaving A Ceremonial Blanket.", "key_phrase": "長い時間をかけて自分を成熟させる人", "explanation": "ブランケットを編むという作業は、とても気が遠くなるような長い時間をかけて、丁寧で精密に縦糸と横糸を交差させながら織り込んでいく必要があります。ただ同じように繰り返して編むだけでなく、そこから描き出されるさまざまな紋様は、縦糸と横糸......自分の内側にある男性性と女性性、右と左、光と影といった、異なる要素を互い違いに紡ぎ合わせていくことで創られていくのでしょう。これは、そのような長い時間をかけて、理想の自分自身の完成をめざしていく度数です。\nすぐに達成できるようなことをめざしてはいないため、なにか日々の生活のなかでくり返しながらできることを工夫して、淡々と積み上げていくことになるかもしれません。長い時間をかけて、じっくりと自分自身の統合をめざしていくこと、そのものが、自分にとっての儀式(セレモニー)といえるのでしょう。\nこの度数を持っている人は、内側のバランスのとれた人格者となることを、どこかで意識しているかもしれません。自分のなかにある、相反する質を組み合わせながら、モノづくりをすることもあるでしょう。なかには自然科学に興味を持つ人もいるかもしれません。自然の中のさまざまな、相反する要素から全体性を知ることを面白がることがありそうです。\nいずれにしても違和感のあるものを切り捨てるのではなく、それを取り込んで、自分の一部にしようと努めるのかもしれません。精神的に成熟することをめざすようなところがあるでしょう。"}, "牡羊座_16": {"sign": "牡羊座", "degree": 16, "symbol_ja": "日没の光のなかで働いている自然の精霊", "symbol_en": "Nature spirits are seen at work in the light of sunset.", "key_phrase": "自然界からのメッセージを受け取って表現できる人", "explanation": "人間の物理的な活動が活発になる昼間の時間と、目に見えない精神的な活動のほうが優位になる夜間の時間との、あいだにあるのが日没の時間です。陽が沈んでいく一日の終わりを迎えると、わたしたちはどこかホッとしたような気持になるかもしれません。そして、この頃から目に見えない存在たちが働き始めるでしょう。\n光のなかで働いている自然の精霊は、樹や山や大地や空や海など、あらゆるところにいて、自然そのものを司る存在。とても素朴で天然そのもの。なんの迷いも疑いもなく、その存在としての質を全開に、のびのびと楽しんでいるようにも見えるでしょう。\nこの度数を持っている人は、まるでその人自身が自然界の精霊であるかのように、いつでもどこでも人目を気にせず、自分らしくのびやかにふるまうところがあるかもしれません。目で見える物理的な面よりも、目には見えない精神的な活動や動きのほうに敏感で、そういったものを感じて、受け取り、表現することができる資質も持ち合わせているでしょう。火のエレメントに所属する星座は体感型なので、感じるものを自分自身の肉体を通して表現することもできるかもしれません。アーティストとしての天性の才能があり、自然のなかから、目には見えない直観から受け取ったものをダンスにしたり、描いたり、歌ったり、言葉で表現することができるでしょう。\nひらめきや思い付きにあふれる人柄なので、もっと直観を活かしていくと、人生が明るくひらけていきやすいかもしれません。"}, "牡羊座_17": {"sign": "牡羊座", "degree": 17, "symbol_ja": "沈黙して座っているふたりの威厳ある未婚女性", "symbol_en": "Two Dignified Spinsters Sitting In Silence.", "key_phrase": "静かに熱く自分の内側で探求する人", "explanation": "新しい命のはじまりは、男女の交わりによって生じます。あらゆる物事の生産性、現実世界の豊かな発展性は、その両極が交わることによって生み出されるといえるでしょう。男性と女性、光と影、右と左という極の異なる、相反するもの同士がひとつに結ばれることで生じるのが発展。だとすると、ここでは女と女、影と影、左と左...といった、ひとつの同じ極のものがコピーされたかのように向き合っています。\n本来の対となる「男」と向き合うのではなく、あたかも鏡と向き合って、おのれの姿を映し出している状態ともいえるでしょう。そうすることで、物理的な現実面での発展の代わりに、自分自身の奥深く、その内側にグッと入り込んで見つめていくような、内省する能力を獲得したことが、ここでは表れています。\nこの度数を持っている人は、自分自身の精神性を高めることに意識が強く向かっていく可能性があるでしょう。表面的には対外的な主張や活動が控えめになるため、おとなしい人柄だと思われることがあるかもしれません。実際にとても冷静沈着で、何事に対しても飾らずにまっすぐ、ありのままの現実を見ているようなところがありそうです。\nしかし、決して熱さがないわけではありません。その内側には情熱があり、自分自身で志したものを一途に探求するような激しさを秘めているでしょう。ある意味では、探求者ともいえるかもしれません。自分自身の本質をつかむことや、意識を高く持つことに対して、興味を持つことがあるでしょう。"}, "牡羊座_18": {"sign": "牡羊座", "degree": 18, "symbol_ja": "二本の木のあいだに吊るされた空のハンモック", "symbol_en": "An Empty Hammock Stretched Between Two Trees.", "key_phrase": "自我を抑えて客観と社会性を身につけていく人", "explanation": "わたしたちにとって新しい創造は、男と女、光と影、右と左といった、相反するものがひとつに統合されることによって起こります。しかし、牡羊座というのは常に主観が先行する星座であり、これまでのあいだに登場した他者はすべて「自分がそれを見てどう反応するのか」という対象でしかありませんでした。ここでは本格的に、より自分自身を統合していくための「客観」を手に入れていこうとする度数となります。\n牡羊座の向かいは天秤座であり、これは常に天秤の向こうに重りをおくように、外側の世界や他者を意識していく星座です。人からどう見られているのか、まわりはいま、どんな様子であるのかということを探りながら、自分を磨いていくことになるでしょう。このサビアン・ワードでは、誰ものっていない空のハンモックが自我の不在を象徴しています。自分がいない代わりに客観や社会性を受動的に身につけようとしているのでしょう。\nこの度数を持っている人は、自己主張をなるべく抑えて、対人関係のやり取りのなかから、現実的な自分の姿を観察しようとするところがあるかもしれません。自分自身の資質を鍛えるために、あえてさまざまなタイプの人たちと交流したり、社会活動に参加したりということもあるでしょう。\n自我を抑えて、他者と社交する術を身につけていくため、対人スキルが高まって、営業や接客、他者との交渉が得意となる人も出てくるかもしれません。自己主張が抑えられる代わりに客観性と社会性が身に付き、よりどこへいっても通用するような統合的な自分自身となっていく可能性のある人です。"}, "牡羊座_19": {"sign": "牡羊座", "degree": 19, "symbol_ja": "東洋の想像物である『魔法のじゅうたん』", "symbol_en": "The \\\"Magic Carpet\\\" Of Oriental Imagery.", "key_phrase": "自分で世界を変えようとチャレンジする人", "explanation": "物語でおなじみの魔法のじゅうたんは、大空を自由に飛びまわり、悠々とかけめぐることができるでしょう。牡羊座は火のエレメントに属する星座ですが、これはいつでも発展や成長を求める質があります。このじゅうたんの度数では、自分自身のポジティブな発想力によって、世界を変えようと盛り上げていく姿が描かれているでしょう。\nもしいま、なにか面白くないことが起こっているのだとしたら、あるいは、なにかに困っているのだとしたら、どうすればもっと面白く、便利で、やりやすくなるのか？\nそれを牡羊座らしい新しいひらめきやアイデアをもって、道を切り拓いていこうとする気概の満ちている人です。誰かにどうにかしてもらうのではなく、みずからの内からあふれ出す情熱と共に進んでいこうとするかもしれません。外からやって来るチャンスを待つのではなく、みずからの好奇心と創造力でその機会を作り出し、飛び出そうとするでしょう。\nこの度数を持っている人は、みずからの活力でその場やみんなを盛り上げていこうとする力を秘めているでしょう。それが可能であるかどうかはともかくとして、夢のような大きな話をするのが大好きで、どうしたらそれができるのかということを考えることにもわくわくするかもしれません。場を盛り上げるムードメーカーとしての才能があり、エンターテイナーとしての資質があふれているでしょう。\nひらめきを形に変えることができるため、創作活動が得意で、しかもそれがむずかしいテーマであるほど、心が躍るかもしれません。待つよりも、攻めの姿勢がよく似合う人です。"}, "牡羊座_20": {"sign": "牡羊座", "degree": 20, "symbol_ja": "冬に鳥に餌をやっている若い少女", "symbol_en": "A young girl feeding birds in winter.", "key_phrase": "自分自身の力で希望の道を拓く人", "explanation": "寒い冬の季節を生き延びることが難しい鳥を、年若い少女が保護して、餌をあげることで自然淘汰の流れから守ろうとしている度数です。これは、どんなに厳しい状況においても、自分自身の純粋さと想像力で乗り越えていくだけの力を身につけた、といえるかもしれません。ここで示されている鳥が、個人の希望や自由の象徴だとすると、自分らしいのびのびとした感性を、自身の手で餌をあげることで、育てているともいえそうです。\nまた鳥は霊性の象徴でもあるため、ある種の直観のようなものが鍛えられていくことを意味している側面もあるでしょう。あるいは、このサビアン・ワードに示されるように、自分だけではなく、他の人にまで希望を与えてあげたり、その夢を育むことを助けてあげたりすることがあるかもしれません。\nいずれにしても、この度数を持っている人は、感受性と想像力がとても豊かで、環境がどのようであったとしても、夢や希望を見失わずに育んでいくことができるでしょう。着実に一歩ずつ、頭の中で描いた理想をかなえていくことができるかもしれません。愛情深く、献身的で、他者を助けたり、環境を保護したりするような立場になる人もいるでしょう。とても純粋でまっすぐな意志を持っているため、その力で現実を変えることができそうです。\nシンプルだけれども、強い闘志を秘めていて、何事も自分の手で実現できる人です。直観力もすぐれているため、どうしたらいいのか、ふとひらめていて、理解することもあるでしょう。"}, "牡羊座_21": {"sign": "牡羊座", "degree": 21, "symbol_ja": "リングに上がる拳闘士", "symbol_en": "A pugilist enters the ring.", "key_phrase": "一途な情熱で何事も自分の手でやり遂げる人", "explanation": "拳闘士というのはボクサーのこと。彼らは日々の努力を重ねて、力をつけていき、自分自身を信じてリングに上がり、みずからの手で欲しかった勝利を勝ち取ります。牡羊座の守護惑星は火星ですが、これは自分自身の力を最高潮にまで発揮させる働きがあるでしょう。火星が正しく使われていると、理想の自分に、自分の力で近づいていくことになります。この火星の働きが充分に高まって、あらゆる成果を自分の手で勝ち取りにいこうとするエネルギーの満ちた状態だといえるでしょう。\n牡羊座にとっての理想とは、したいことを、したいと思ったときに、いつでも成し遂げるだけの力と自由な生き方を手に入れることにあります。みずからの努力によって、それを勝ち取るボクサーは、まさにその力を手に入れたときの象徴といえるかもしれません。\nこの度数を持っている人は、どんなことでも自分の手で成し遂げることを望み、そして実際にそのように行動を起こすでしょう。欲しいもの、成果、勝利、名声など、どんなものであったとしても、ひとたび、それを手にすることを自分に課したなら、必ずやり遂げるような力を秘めています。とても努力家であり、あふれる情熱の持ち主。内なる熱さでまわりを巻きこむようなパワーもあるでしょう。\nボクサーがリングに上がるということは、リング上のルールに従うということでもあるため、ある意味では素直さや、正々堂々とした態度も持ち合わせていそうです。まっすぐに一途な情熱で、欲しい成果をみずから勝ち取っていく強さの持ち主です。"}, "牡羊座_22": {"sign": "牡羊座", "degree": 22, "symbol_ja": "あらゆる欲望を満たす庭へと続く門", "symbol_en": "The Gate To The Garden Of All Fulfilled Desires.", "key_phrase": "自分の願った通りに世界が動いていく人", "explanation": "ひらかれた門をくぐり抜けると、そこはありとあらゆる欲望が満たされる庭でした。そんな昔話のような、おとぎ話のような、素敵なサビアン・ワードです。\n自分でそんなに一生懸命がんばりすぎなくても、願いが叶いやすいでしょう。なぜ、そういうことが起こるかというと、前提として、この度数を持つ人の魅力と能力とが存分に開花して、発揮されているということがあります。そうなっていると、一生懸命になにかを願わなくても、おのずとその自分にふさわしい立場や環境がやってくることになるでしょう。\n職場でコツコツと頑張って成果をあげていれば、自然とまわりから認められて、ふさわしい地位が向こうからやって来ることになるかもしれません。あるいは「こんな風に活躍したい」とイメージして、その活躍にふさわしい力を手に入れれば、おのずとその自分に見合うだけの環境が与えられることになるでしょう。\nこれはそもそも、わたしたちの「望み」の大半が、自分を取り巻く環境や社会からやってきていることに起因しています。そのため、それにふさわしい能力を身につければ、その望みを実現するチャンスが自然と外側からやってくるでしょう。\nこの度数を持っている人は、自分がイメージしたものや、このようになりたいと思い描いた理想を実現する機会が外からやってくることが多くなりそうです。積極的に自分から攻めていかずとも、願うとチャンスに恵まれるため、のんびりと待つ気質や好機を受け取ろうとする気質が育まれていくでしょう。自分の思いと外の世界とが共鳴しやすいタイプといえるかもしれません。"}, "牡羊座_23": {"sign": "牡羊座", "degree": 23, "symbol_ja": "軽やかなサマードレスを着た妊婦", "symbol_en": "A Pregnant Woman In Light Summer Dress.", "key_phrase": "自分の望みを自分で叶えることのできる人", "explanation": "ひとりの人間の中で、男性性と女性性とが完全に統合されたことの証として、妊娠したという状態が示されています。自分の中のふたつの極......能動的な側面と、受容的な側面とを自在に使いこなすことで、自分自身の手で望んでいるあらゆる充足を手に入れることができる人だといえるでしょう。そこで何か特別な無理をする必要はなく、あくまで自然体で「こうなったらいいな」と思い描いた理想の姿を、みずからクリエイトすることのできる資質があるかもしれません。ロマンティックな空想をすることを好み、いつもあれこれ思いをめぐらせている人もいるでしょう。\nしかし、妄想だけで終わることはなく、それを実現するだけの力を秘めています。多くのチャンスを引き寄せる受容力。そして、絶好の機会だと感じたら、すばやくそれをつかみ取り、行動に移していくだけのアクティブさ。そのふたつの質が、さまざまな物事を実現へと導くことになるでしょう。\nこの度数を持っている人は、特別に飾ることよりも、ナチュラルに人生のさまざまなことを楽しもうとするでしょう。華美なことや、多くを望まず、シンプルで身の丈に合った生き方を好み、その中でやりたいことを次々と実現させていくかもしれません。明るく軽やかな気質で、いつも楽しい希望を抱きながら、いまの環境の中から自分の道を切り拓くことができるでしょう。\n充足感を自分自身で満たすことのできる、しあわせに人生を楽しむことのできる資質の持ち主です。"}, "牡羊座_24": {"sign": "牡羊座", "degree": 24, "symbol_ja": "吹き込んだ風によって豊饒の角を持つ", "symbol_en": "コーヌコピアの形となった", "key_phrase": "Blown Inward By The Wind, The Curtains Of An Open Window Take The Shape", "explanation": "Of A Cornucopia.\n吹き込んだ風によって豊饒の角を持つコーヌコピアの形となった開かれた窓のカーテン\n内なる充足を満たすことをめざす人\nコーヌコピアというのは、ギリシア神話に登場するアマルティアという女性の物語を由来としています。アマルティアは、のちに全知全能の神となるゼウスの育ての親。ヤギの乳を与えながら、ゼウスを育てたといいます。大きく成長して立派な神となったゼウスが、そのときのヤギの角を折って、アマルティアに与えたものがコーヌコピアといわれています。彼女が望んだものがなんであったとしても、手に入るという豊饒のシンボルです。\nここではそんな豊かさが充分に満ち足りていて、その次の段階へ向かっていくことが暗示されます。物質的になんでも手に入るような豊かな状態になると、人は次に霊的な成長を求めるようになるでしょう。このサビアン・ワードは、これまでの物資的な成功や安定を求める生き方から、精神的な充足感や目に見えない世界への憧れが強化されることが予想されます。\nこの度数を持っている人は、とても繊細で直観力が強く、目に見えるもの、見えないものも含めて、さまざまなものを感受しやすい傾向があるでしょう。いわゆる第六感のようなものが働きやすいタイプです。神秘的な体験をする機会があったり、精神世界に興味をもって意識を高めていくことにチャレンジしたりする人もいるかもしれません。また空想力が広がって、ファンタジックな世界を探求し、それを文学やアートなどを通して表現する人もいるでしょう。\nいずれにしても、内なる世界が広く豊かで、クリエイティブな能力にも恵まれている人です。"}, "牡羊座_25": {"sign": "牡羊座", "degree": 25, "symbol_ja": "ふたつの領域で経験を獲得する", "symbol_en": "可能性のある男性", "key_phrase": "ふたつの領域で経験を獲得する可能性のある男性", "explanation": "異質なふたつの世界を同時に体験する人\nここでいうふたつの領域というのは、現実の世界と虚構の世界。物質的な世界と、精神的な世界。目に見えるものと、目には見えないもの。そういった対比です。その異なるふたつの世界を両方とも体験したい、そのふたつの世界を同時に生きてみたい、という欲求が湧き上がってくるかもしれません。直観力が強いので、この世界が裏と表で相互に支え合っていることが理解できるのでしょう。両方に属することによって、逆側の世界を互いに強化できるという相乗効果も得られます。\nまた、このふたつとは、人間の持っている、ふたつの異なる側面も示しているでしょう。わたしたちのなかには意識と無意識、物質と非物質、能動と受容といった、相反するものが同時に存在しています。ふたつの世界を体験することによって、このふたつの資質を同時に満たすような、深い満足を得られる可能性があるでしょう。\nこの度数を持っている人は、実際に環境の異なるふたつの場所で働いたり、まったく違うタイプのふたつの趣味を持っていたり、まったく性格の異なる人たちとのつながりを持っていたりすることがあるでしょう。一方はとても現実的で物質や肉体に働きかけて、目に見える結果を探求していくような世界。もう一方は精神的で、知性に働きかけて、意識を超然とさせるようなものに興味を抱くかもしれません。なかには異なるふたつの名前を使い分けて、活動する人もいるでしょう。\n目には見えない内なる想像力を使いこなすことで、現実的な結果を生み出すこともできるクリエイターの要素も持ち合わせています。"}, "牡羊座_26": {"sign": "牡羊座", "degree": 26, "symbol_ja": "抱えきれないほどの贈り物を所有する男", "symbol_en": "A man possessed of more gifts than he can hold.", "key_phrase": "あふれる才能でさまざまなことにチャレンジする人", "explanation": "英語の『gift』という単語には、贈り物だけではなく、天性の才能、特別な能力という意味が含まれています。そこにはいわゆる、第六感ともいえるような直観や、目には見えないものを感じ取る感受性も含まれているでしょう。\nこの度数を持っている人は、そのような能力に恵まれやすく、見えるものだけではなく、その背後にあるものや相関関係を読み解く能力にすぐれているかもしれません。いろいろにものに気づいたり、感じたりすることが多く、先見の明がひらかれているといえるでしょう。そして同時に、その能力を使いこなすことで、自分自身の未知の可能性にチャレンジしていこうとする気持ちも高まるかもしれません。\nとにかく、いろいろなことを思いつき、ひらめき、気づいたものを片っ端から試してみたくなるような衝動に駆られることもあるでしょう。やってみたいことが次々と内側からあふれてきて、気持ちと行動力があちらこちらへと向けられていきそうです。\nしかし、単にパッと気持ちのおもむくままに行動するだけではなく、面白いアイデアとしてどんどん企画を立てたり、新しいやり方を思いついたら次々と試してみたりすることで、生まれ持った才能を、地につけて使いこなすことができるでしょう。いまの自分のいる環境をより充実させていく方向で、その能力を使っていくと、さらに直観力に磨きをかけることも。あふれる才能を野放しにするのではなく、しっかりと現実面で使いこなすことで、さまざまな分野におけるクリエイターとして活躍することができるでしょう。"}, "牡羊座_27": {"sign": "牡羊座", "degree": 27, "symbol_ja": "想像を通して取り戻された失われた機会", "symbol_en": "Through Imagination A Lost Opportunity Is Regained.", "key_phrase": "成功と失敗を繰り返して大きく成長する人", "explanation": "ひらめきと直観力が非常に際立つ人です。やる気と活力も抜群に高まって、人生におけるさまざまなことに対して、チャレンジしていこうとする気概が満ちやすいでしょう。\nそのときに「これをしたら、どんな結果になるのか」ということは、ほとんど深く考えずにトライするかもしれません。そのため、成功するものがあれば、失敗することも起こり、あるいは形として成り立つ前に終わってしまう......ということもあり得るでしょう。\nしかし、その失敗や、うまくいかなかった経験が糧となって、そこから更にアイデアを膨らませていき「じゃあ、今度はこうしたらどうだろうか」と、別の角度から違うやり方で試していくのが、この人の持っている能力です。そうやって、ひとつの物事に何度でもトライ&エラーでチャレンジしていくことで、実際にどんなことであっても、満足のいくレベルにまで到達させられるでしょう。\nこの度数を持っている人は、実際に人生の中で、何度か成功と失敗の紆余曲折を経験することがあるかもしれません。だけれども、本当に欲しいもの、成し遂げたいことに関しては、自分の内側から湧き出る直観とひらめきから、別のイメージを想像し、実際にどうにか満足する形にまで仕上げることができるでしょう。\n時に諦めなくてはいけないことがあったとしても、後になってもそれを忘れることがなければ、必ずチャンスを作り出して、それを手に入れることになりそうです。成功と失敗の落差が多いほど、自分自身が磨かれていき、結果的に大きく成長できるでしょう。"}, "牡羊座_28": {"sign": "牡羊座", "degree": 28, "symbol_ja": "期待に応えられなかったパフォーマーと向き合う落胆させられた大聴衆", "symbol_en": "A Large Audiences Confronts The Performer Who Disappointed Its", "key_phrase": "期待に応えられなかったパフォーマーと向き合う落胆させられた大聴衆", "explanation": "まわりがどうであろうとも自分の道を貫く人\n本人の力量とまわりからの期待にズレが生じるという体験を示しているサビアン・ワードです。牡羊座の目的は他の誰とも異なる自分だけのオリジナルな生き方を構築することにあります。親からの期待、先生からの期待、上司から、恋人から、配偶者から、子供から、友達から......わたしたちを取り巻く世界では、さまざまな人たちが自分の願望を身近な関係性のなかに投影し合っています。だけど、ここでは、残念ながら、その期待には応えられない、ということが示唆されているでしょう。\nまわりがなにを望んでいようとも、自分は自分。そうであることに嘘はつけないし、たとえ周囲からの期待を裏切ることになったとしても、自分らしいやり方で、自分の道を作り出していくことに落ち着くことになるでしょう。\nこの度数を持っている人は、無理せずに、自分のできることを、自分のやり方とペースとでやっていこうとするかもしれません。それが一番確実に自分のエネルギーを自分のためだけに使える方法だということを知っているのでしょう。\nそのため、時に所属しているグループのペースに合わせることをむずかしく感じることがあるかもしれません。逆に自分のやる気があっても、集団のほうが方針を変えたり、編成を変えたりして、思うように力をふるえないということも起こり得ます。表からは、自分を貫いているため、淡々としているように見られるかもしれませんが、その内側には情熱を秘めているでしょう。"}, "牡羊座_29": {"sign": "牡羊座", "degree": 29, "symbol_ja": "天球の音楽", "symbol_en": "The music of the spheres.", "key_phrase": "自分を十二分に生きることに喜びを感じる人", "explanation": "このサビアン・ワードが指している「天球の音楽」とは、宇宙そのものの象徴です。地球上のすべての生きとし生けるもの、そして宇宙で息づいている、ありとあらゆるものが、それぞれの波動を発していて、それが重なり合い、共鳴し合って、大きなひとつの世界を作っている......ということを指しています。\nもっと狭義の世界でいえば、海の中の世界では、さまざまな種類の生物たちが共生し合っているように、地上のいろいろな動物たちが、それぞれの領域において、自分らしい生き方をしているように、みんなが自分らしく過ごしていることで「完全なる世界が創られている」という視点がひらかれているでしょう。自分は自分で、他人は他人。牡羊座はオリジナルの自分だけの人生を構築していくことが目的ですが、他者の期待に応えることをやめたことで、自分にしかできない役割を見つけて、自分に見合った環境の中で、生まれ持った質をのびのびと発揮できるのかもしれません。\nこの度数を持っている人は、自分の持っているものを最大限にまで発揮することに喜びを感じるでしょう。それを自分にゆるすことが、まわりを活かすことにもつながっていき、そしてまた、それを認め合える仲間に恵まれることにもなりそうです。自分らしさを存分に発揮して、自分にしかできないやり方を探求し、それをつかむこともできるでしょう。\n音楽と縁もあり、歌ったり、踊ったり、演奏したりすることを好む人もいるようです。のびのびと自分自身を十二分に生きることに喜びを感じるでしょう。"}, "牡羊座_30": {"sign": "牡羊座", "degree": 30, "symbol_ja": "アヒルの池とその子供たち", "symbol_en": "A duck pond and its brood.", "key_phrase": "自分にふさわしい環境と生き方を知っている人", "explanation": "アヒルの池にアヒルの親子が暮らしています。「みにくいアヒルの子」の物語では、アヒルの群れの中に混ざってしまった白鳥の子どもが、やがて大きくなると、白鳥としての自分の生き方を取り戻す、ということが描かれていました。アヒルの子はアヒルの池に、白鳥の子は白鳥の湖に。\n牡羊座という星座は自分の持っている可能性のすべてを開花させようと奮闘しますが、最終度数のここでは、本当の自分の望みや力を全部理解したうえで、自分の身の丈にぴったりと合ったアヒルの池......日常生活に帰結します。自分の役割や資質をわかっているからこそ、現実の毎日の暮らしの中で、地に足をつけて自分を活かし、その可能性を引き出す環境を見出すことができるのでしょう。ここからわたしたちの人生がひらかれていくのかもしれません。\nこの度数を持っている人は、さまざまな経験を重ねながら、自分自身を知り、自分だけのオリジナルの人生を送ることになるでしょう。多くの体験が自分の真の姿を浮き彫りにしていき、その結果として、他者と比べることなく、自分にふさわしい選択をすることができるようになるかもしれません。\n自分にとても正直で、いつも正々堂々とふるまい、自分の心に忠実です。いまいる環境のなかで無理せず、自分らしく過ごしながら、その時々にベストな選択をしていくことができるでしょう。自分の直観、決断、行動に忠実であることがより自身への信頼を高め、力を増していくことにつながりそうです。またそのように生きることが、自分自身を輝かせることにもなるでしょう。"}, "牡牛座_1": {"sign": "牡牛座", "degree": 1, "symbol_ja": "清らかな山の小川", "symbol_en": "A clear mountain stream.", "key_phrase": "牡牛座は自分の生まれ持った資質を才能として現実世界の中で開花させていき、自身の手で心地よく豊かで安定した生活を送ることを目的とした星座。ひとつ前の牡羊座では、自分の可能性をさまざまな角度から切り拓いていきましたが、牡牛座ではそれをいよいよ実践的に活かしていく段階に入ります。", "explanation": "このサビアン・ワードが指している山というのは個人であり、それが所有している資質を含んだもの、といえるでしょう。山にはたくさんの資源が眠っているように、わたしたちの内側にも多くの可能性が潜んでいます。流れている小川は、その肉体に受け継がれてきた血脈の流れを示しているのかもしれません。\nわたしたちの個人の能力は、その家系の特質を多かれ少なかれ含んでいるでしょう。また、どのような時代に、どの家に生まれついたのかによっても、ある程度の人生の選択肢はおのずと定められていきます。\nこの度数を持っている人は、自分生まれや出身、肉体が受け継いだ才能といったものを使いこなしながら、環境に定められた枠の中で、自分の道を進んでいくことになるでしょう。その時々の目の前に置かれている環境に馴染み、その中で成果を上げることを純粋にめざすかもしれません。生まれついた家系や、あるいは結婚した先の家業などに巻き込まれて、翻弄される人もいるでしょう。\nしかし、そのような環境の中で自分の質を磨いていき、人生を拓いて、心地よい居場所を見つける強さを秘めた人です。"}, "牡牛座_2": {"sign": "牡牛座", "degree": 2, "symbol_ja": "激しい雷雨", "symbol_en": "An electrical storm.", "key_phrase": "激しい雷雨が人生の中で時折やってきて、その人にとても強い目覚めと啓示を与えるかもしれません。この雷雨とは、内なる資質を目覚めさせるための激しい一撃。", "explanation": "ヘレン・ケラーはある瞬間に水という物質が「water」という言葉を持っているということのつながりに、雷に打たれたかのように気づきました。それはあたかも、脳内のシナプスに電流が走って、ふたつの物事を結びつける通路が通電し、それらが相互的な意味を持つことに目覚めるような体験といえるでしょう。\nそのように当たり前だと思っていたことがつながりを持っていたのだ、ということに、ふいに気づかされることがあるかもしれません。それが大きなところでは、天と地の約束、自分がこの地上にいる意味といった、使命のようなものを目覚めさせる可能性があります。\nこの度数を持っている人は、自分自身の生まれ持った資質を120％目覚めさせたいという欲求を持つかもしれません。そのために、いまいる環境を飛び出して、持っている可能性のひらけそうな場所へと行こうとする人もいるでしょう。\nまたハプニングやイベントなど、思いがけない体験を好んだり、思いもよらない出来事に巻き込まれたりすることもありそうです。さまざまな体験がひらめきやイマジネーションへとつながって、創作意欲を掻き立てることもあるでしょう。その成果として、思いがけないものを創り出したり、新しいアイデアで今あるものの形を変えていったりすることもあるかもしれません。"}, "牡牛座_3": {"sign": "牡牛座", "degree": 3, "symbol_ja": "クローバーの花が咲く芝生へと向かっていく自然な歩み", "symbol_en": "Natural Steps Lead To A Lawn Of Clover In Bloom.", "key_phrase": "牡牛座という星座の目的は、現実の日常の中で心地よく好きなものに囲まれて、悠々と自分らしい生活を送ることにあるでしょう。身体で感じる心地よさ、生きる歓びがテーマの星座です。", "explanation": "ここでいう「クローバーの花が咲く芝生」というのは、豊かな現実の基盤そのもの。「自分らしい生き方」「自分にとって心地の良い生き方」が生活の基盤に根付いて、隅々まで、自分の望むように行き届いている、ともいえるかもしれません。自分に必要な生き方、身の丈に合った心地よい生き方を無理しなくても引き寄せることができる......そんなイメージです。環境の中で工夫しながら、自分らしさを見出していくことができるのでしょう。\nこの度数を持っている人は、自分の能力を無理しなくても、マイペースにのびのびと使うことができるでしょう。クローバーの花が太陽の光と自然の恵みによってすくすくと生い茂るように、ある意味では、とても素直ですこやかに自分の能力を伸ばすことに恵まれているともいえそうです。そうして開花した自分自身の力によって、心地の良い、望んだ通りの生活を手に入れる可能性があります。\n素直にしていると、その恩恵が得られるため、人生が豊かに満ち足りて、それを充分に受け取って、楽しむことができるでしょう。お金や生活に困ることもなく、環境の良いところで、イキイキと暮らすことができる人です。\n自分のペース、自分のやり方、自分の感覚に忠実であることが心地よさのカギといえるでしょう。"}, "牡牛座_4": {"sign": "牡牛座", "degree": 4, "symbol_ja": "虹の終わりにある黄金の壷", "symbol_en": "The Pot Of Gold At The End Of The Rainbow.", "key_phrase": "このサビアン・ワードである『The Pot Of Gold At The End Of The", "explanation": "Rainbow』というのは、英語表現のひとつで「夢のような幸運」とか「思いがけない大金」といったことを示しています。表現の元になっているものは昔話にある「虹のふもとに到達できたものは、黄金の壺を見つけ出すことができる」ということからきています。しかし実際には誰も虹のふもとへたどり着くことはできないことから、もしそこに着くことができたら「ありえないような幸運に恵まれる」という表現として使われているようです。\n虹は七つの色を含んでいますが、これをチャクラに対応させるとすべての色となるでしょう。そこから、すべてのチャクラを使いこなしている状態といえるかもしれません。意識の深い根っこの部分と身体との調和がとれて、活力がおのずと湧き上がり、人生全般に富と豊かさがもたらされると予感されます。\nこの度数を持っている人は、自分の使命を果たすことで、それに見合った環境やチャンスや成果が与えられるでしょう。ビジネスがうまくいき、経済的な恩恵を得て、感性がますます高まり、対人関係も豊かに発展するような幸運が期待できるかもしれません。\n自分を信頼して、自分の持っているすべてを使いこなして、行動を起こしていくことが、そのためのカギ。内なる意識を地上に反映させて実現させるように、自分の力で不可能を可能にしようと望み、アクションを起こすことで、豊かなエネルギーが人生全般において循環するでしょう。\nそれこそ「思いもかけない」チャンスにも恵まれるかもしれません。"}, "牡牛座_5": {"sign": "牡牛座", "degree": 5, "symbol_ja": "開いた墓にいる未亡人", "symbol_en": "A widow at an open grave.", "key_phrase": "どんなものでも、いつかは終わるときが必ずやってきます。すべてのものは変化していき、若さを保ち続けることも、若いときと同じ感性を維持し続けることも、楽しい時間を永遠にキープすることもできません。変わってほしくない、とどまっていたい、なくならないで欲しいと願っているあいだは、いつも、いつかは失うということを恐れていなければならないでしょう。", "explanation": "だけれども過去に執着せずに、古くなったもの、もう合っていないもの、感性にヒットしなくなったものを思いきって手放していけば、それは新しい風を呼び込むきっかけとなるかもしれません。新しい風は新しい感性を呼び覚ます可能性があります。\nこの度数を持っている人は、過去に創り出したものや築いてきたものを、時に思いきって手放していくことがあるでしょう。そうして自分の過去の創作物や愛着を持っていたものたちを、みずから墓に埋めることによって、感性が若々しくよみがえり、新たな創作意欲や才能や表現が湧き上がるのかもしれません。\nどんな持ち物も関係も才能も、一度はすべてどっぷりと堪能して、使いきろうとするでしょう。充分に使いきる、やりきることで、それに対する未練がなくなって、手放すことがむずかしくなくなります。\nみずからの意志で定期的に、さまざまな物事をリセットすることが人生をリフレッシュするカギといえそうです。\n中には過去の経歴や活動をあえて葬り去るように隠して、次の活動にとりかかる人もいるでしょう。"}, "牡牛座_6": {"sign": "牡牛座", "degree": 6, "symbol_ja": "深い峡谷を横切るカンチレバー橋", "symbol_en": "Cantilever Bridge Across A Deep Gorge.", "key_phrase": "ふたつの高い山のあいだに、深い峡谷があります。ここでいう山というのは、ひとりの完成された個人を指しています。ふたつの山が差し向ってそびえ立っているというのは、独立した個人と個人が、おたがいに干渉しあわずにそれぞれ自分を貫いているだけ、といえるでしょう。", "explanation": "しかし、そこに橋が架けられています。カンチレバー橋というのは、日本語では片持ち梁橋といって、片側一方の土地の端の力だけで橋全体を支える構造をしているそうです。つまり山の一方から、もう一方の山に対して橋を架けるという行為を通して、渡りをつけようとしている、といえるでしょう。\n自分という山と、相手という山とのあいだに橋を架けることで、協力しようとか、コミュニケーションをとろうとする姿勢を出しているともいえそうです。\nこの度数を持っている人は、さまざまな人たちとのつながりから、自分にとってプラスとなることを学ぼうとするかもしれません。自分のやり方だけで能力を開発していても、いつかは限界を迎えます。そこに他者からの刺激や知識が加わることで、更に自分の可能性を大きく広げることができるでしょう。\n独学である程度の壁を感じるときなどは特に、自分から興味をもって、いろいろに人と積極的に関わろうと働きかけることがあるかもしれません。他の人のやり方を学ぶことが、大きな刺激となるはずです。\n中には、人の心そのものや、その内側にあるものを知りたいという欲求を持つ人もいるでしょう。"}, "牡牛座_7": {"sign": "牡牛座", "degree": 7, "symbol_ja": "祖先から受け継がれた井戸にいる", "symbol_en": "サマリア人の女性", "key_phrase": "絶望的な状況において大逆転のチャンスをつかむ人", "explanation": "このサビアン・ワードに書かれているサマリア人というのは、ユダヤ人とのあいだに民族的な確執があり、ユダヤ人から差別的に見られていました。\n通常、井戸の水くみというのは、朝と夕方の涼しい時間に行うことが多かったそうですが、とあるサマリア人の女性は、ユダヤ人たちと出会うことを避けて、人気のない昼間の時間に井戸へ水くみに出かけました。そこにひとりのユダヤ人の男性がいて、出会うことになるのですが、彼こそがイエス・キリストであった......という話があります。\nこれは、古くなって、追いやられて、もうどうしようもないくらいに追い詰められたときにこそ、新しい力が目覚める、という暗示。井戸でイエス・キリストと出会ったサマリア人の女性は、その後、キリストの教えに目覚めて、これまでの絶望的な人生から新たな希望を見出すことができるようになりました。古いやり方、伝統、手法......そういったものに本人が心底うんざりしているときにこそ、まったく新しい可能性が啓示のようにさしこんでくる、ということを示しているサビアン・ワードです。\nこの度数を持っている人は、人生の中で本当に追い詰められたときに、高次の意識が目覚めるかもしれません。大逆転の暗示であり、すべての退路が断たれて、思いつくあらゆる手段がなにもかも通用しないようなときにこそ、天啓がさしこむことが起こるでしょう。\nなにかに希望を見出していたり、執着したりしているときには、なかなかそれが起こらないかもしれません。「もう本当になにもかも無理だ」と、すべてを諦めて、投げ出してしまいたいときにこそ、もっとも高度な創造力が降りてくる可能性があるでしょう。"}, "牡牛座_8": {"sign": "牡牛座", "degree": 8, "symbol_ja": "雪に覆われていない土地にあるソリ", "symbol_en": "A Sleigh On Land Uncovered By Snow.", "key_phrase": "まだ冬がやってきていないにも関わらず、すでにソリが準備されています。いまはまだソリが必要なタイミングではありませんが、やがて来たるべき時期にソリが必要とする日がくることがわかっている、ということが、ここでのポイント。用周到さを示していますが、それは逆にいえば、これから未来に続いていく流れを見越していて、必ず要するであろうものを理解できる能力が備わっているといえるでしょう。", "explanation": "地のエレメントである牡牛座は、結果を出すこと、現実の中で具体的な目に見える形を創り出すことをなによりも大切にします。そのための準備をかなり早い段階からはじめていき、何事に対しても、そのときになってから慌てないように揃えておこうとするのでしょう。\nこの度数を持っている人は、万事において自分で計画し、コントロールしながら、長い目で見た時の結果を導き出すことができそうです。いまここにあるものと、ないものとを見極めて、あえて反対の能力や意見も取り入れながら、オールマイティーにあらゆる事態に備えようとするかもしれません。\nいますぐに必要でなくても、やがて使うことになるもの、いずれ芽を出すことになりそうなものを鋭く見極めて、長いスパンでそれを育てることができるでしょう。何事に対しても将来に困ることがないように、完璧に整えて、蓄えておきたい性分があるかもしれません。そして、その能力が実際に未来のそのときに、役立つときがやって来るでしょう。"}, "牡牛座_9": {"sign": "牡牛座", "degree": 9, "symbol_ja": "完璧に飾りつけされたクリスマス・ツリー", "symbol_en": "A Fully Decorated Christmas Tree.", "key_phrase": "クリスマスのシーズンは1年で夜がもっとも長くなる冬至に近く、本格的な冬の寒さが厳しくなってくる時期。外はとても寒くてつらい季節だけれども、部屋の内側は煌々とした暖炉が暖かい輝きを放ち、その前に、美しく完璧に飾り付けのなされた豊かなクリスマス・ツリーが飾られている......そんな光景が見えてくるサビアン・ワードです。", "explanation": "これは、いかに外の世界の状況が厳しくなってきたとしても、それに振り回されることのない内側の強さや豊かさ、揺るぎのない精神性が満ちている状態だといえるでしょう。まわりがどのようであったとしても、自分の心や才能、心身の機能や持っているものがきちんと安定していることで、どんな状況でも乗り越えていけるだけの強さを身につけているといえるかもしれません。\nこの度数を持っている人は、自分に対して揺るぎない価値を持つことで、どのような状況がやってきたとしても、乗り越えていける強さを持つことができるでしょう。たとえ一時的にうまくいかないように見えることがあったとしても、厳しい冬を超えれば春がやって来ることを知っているため、動じずに、ジッと耐えて待つことができるかもしれません。\nまた自分の内面を豊かにするために、さまざまな機能を身につけたり、資格をとったりすることもあるでしょう。自分の中にたくさんの価値あるものを創り出すことが、ますます自信を発揮することにつながります。\n中には収集癖が高じて、さまざまな美しいものを集めたがる人もいるでしょう。"}, "牡牛座_10": {"sign": "牡牛座", "degree": 10, "symbol_ja": "赤十字の看護婦", "symbol_en": "A Red Cross nurse.", "key_phrase": "個人的に身につけた能力を自分のためだけに使っていても、それはやがて限界が見えてくるものです。個人的な満足を満たすための能力でしたら、そんなに大きな働きをしなくても、人はそこそこの充足を得ることができるでしょう。", "explanation": "能力をより大きな社会のためや、それを必要としている大勢の他者のために活かそうとすることが、個人のためだけに使う限界を超えて、より高いレベルの能力へとジャンプをうながすことになります。\nとはいっても、この段階では無防備に自分自身をなげうってまで......ということはしません。このシンボルとなっている赤十字は戦時中でも安全が保証された中立の立場であり、あらゆるものから守られている場所。だからこそ安心して、堂々と献身することができる、というのが、このサビアン・ワードの特徴です。\nこの度数を持っている人は、自分の才能や資質を個人のためだけではなく、より大きな社会のために活かそうと働きかけることがあるでしょう。\nしかし、どこの団体でも良いというわけではなく、きちんと身元のしっかりとした安全なグループや組織を選んで、所属しようとするかもしれません。自分自身のバックアップが保証されているような安心できる環境の中にいてこそ、のびのびと資質を発揮して、集団に利益が上がるように貢献し、働きかけることができるでしょう。\n他者に対する博愛精神がとても高く、持っている愛を分かち合おうとするかもしれません。実際に医療従事者やヒーラーとして、多くの人たちの健康に携わるような人もいるでしょう。"}, "牡牛座_11": {"sign": "牡牛座", "degree": 11, "symbol_ja": "自分の庭の花に水をやる女性", "symbol_en": "A Woman Watering Flowers In Her Garden.", "key_phrase": "ひとりの女性が自分の家の庭の花たちを、丁寧に大切に慈しみながら育てています。ここで水をやるのは、あくまでも、自分自身の庭の花。個人的な欲求から生じる美意識や自己愛といったものを、時間をかけて大切に育てていく姿が描かれたサビアン・ワードといえるでしょう。", "explanation": "庭の花を育てるためには、毎日、定期的に手間暇をかけてお手入れをする必要があります。自分の内側にあるもので、コツコツと時間をかけて育てていきたいものに意識が向けられて、集中して、実行していくことになるでしょう。\nたとえば、毎日すこしずつお稽古ごとのレッスンをしたり、美容のために時間を使ってマッサージやストレッチをしたり。ファッションセンスや色彩センスに磨きをかけたり、趣味や楽しみの時間を作るように心がけたりして、自分の中にある喜びと美意識とを成長させていくことになるかもしれません。\nこの度数を持っている人は、自分自身の内なる感受性に忠実で、良いと感じたものや、好きな行為を何度も繰り返して磨きをかけていくことがあるでしょう。美しいものや、心地よい行為が大好きで、心を深く動かされるものに集中して、じっくりと養分を与えるように育みます。そうして手塩にかけて育てたものが、自分自身の人生のうるおいとなり、生活の隅々に至るまで、喜びに満たされていくことを望むでしょう。\n生きる喜び、というのは牡牛座のメインテーマです。自分の内側が豊かであることにこそ、しあわせと充足感を見出す人です。"}, "牡牛座_12": {"sign": "牡牛座", "degree": 12, "symbol_ja": "ウインドウ・ショッピングをする若いカップル", "symbol_en": "A Young Couple Window Shopping.", "key_phrase": "カップルが街で仲良くウインドウ・ショッピングしている姿が描かれたサビアン・ワードです。ここでいうカップルというのは、個人の内側にいる男性性と女性性のカップルといえるでしょう。女性性は自分自身の感受性や美意識を心の中で豊かに育んでいくことを求めていきますが、一方で男性性のほうはパッと見てわかりやすいようなカッコいい持ち物やステイタスや活躍する環境といったものを求めるかもしれません。", "explanation": "牡牛座は、自分の内なる才能を豊かに育んでいき、その才能を存分に活かしながら、目に見える現実世界を心地よく整えていくことを目的とした星座。「もっといろいろなものが欲しい」「もっとあちこちで活躍したい」「もっと豊かで心地よい現実を過ごしたい」といった、さまざまな欲望が湧き上がってきて、それらを得るために個人の社会参与しようとする活力が奮い立つかもしれません。\nこの度数を持っている人は、美意識にすぐれていて、いろいろなものに対する感度が高く、世間のトレンドや流れをいち早くキャッチすることができそうです。それらの中から、自分が欲するものを見つけ出すと、それをどうにかして得るために、努力を重ねていく向上心もあるでしょう。\n見ていて楽しいもの、美しいものを求めると同時に、それらを自分の手で表現したい、創り出したいという欲求も抱くかもしれません。そして、その欲望に忠実に、表現能力や創作能力を発揮することができるでしょう。\n物を鋭く見極めていく審美眼にすぐれ、いつまでも若々しい感受性を持ち続ける傾向もありそうです。"}, "牡牛座_13": {"sign": "牡牛座", "degree": 13, "symbol_ja": "重い荷物を運んでいるポーター", "symbol_en": "A Porter Carrying Heavy Baggage.", "key_phrase": "ポーターが一生懸命に運んでいる重い荷物の正体は、みずからが求めて欲したものたち。さまざまな欲望を社会に投影すると、それらを得るために、多くの代償を支払うことになるでしょう。多くの美しいものが欲しければ、たくさんのお金を稼ぐ必要がありますし、住宅ローンや車の購入ローンを組んでも然り。社会的地位を求めれば、それを獲得して、維持するために、多くの責任を果たしながら働く必要があるでしょう。", "explanation": "ポーターが運んでいるのは、そういった、みずから求めることによって得たものたちと、その代償行為といった『所有物』。牡牛座はみずからの所有物をどんどん増やすことで、充実した暮らしをすることが目的といえる星座ですが、多くの事柄に欲望を抱き、たくさんの物を求めるほどに、果たすべき役割や責任は重くなるでしょう。\nこの度数を持っている人は、とても向上心が高く、かなりの努力家。多くの夢や希望を思い描いては、それらのすべてを社会の中で実現しようと奮闘するでしょう。社会的な野心が相応に高く、常に「もっと良くなること」を求めて頑張りますが、ある程度の満足がいくと、さらにその上をめざして、また別の何かを求めようとするかもしれません。\nそれらの欲望は社会的責任へのプレッシャーになると同時に、社会的意欲へのモチベーションにもなるでしょう。たくさんの知識や技術や能力を持ちながら、努力を積み重ねることによって更に才能を輝かせることになりそうです。"}, "牡牛座_14": {"sign": "牡牛座", "degree": 14, "symbol_ja": "ビーチの波打ち際で貝殻を探して遊ぶ子供たち", "symbol_en": "On The Beach, Children Play While Shellfish Grope At The Edge Of The", "key_phrase": "自分にとって快適な心地よいペースとやり方を重視する人", "explanation": "ビーチの波打ち際で遊んでいる子供たちは、そこが海の中で最も楽しく安全に過ごせる場所だということを知っています。もっと砂浜のほうへ下がってしまうと貝殻を見つけることができなくなりますし、もっと深くまで進んでしまうと高い波に巻き込まれる危険が生じます。\n自分にとって最も快適な場所で得られるものだけを楽しむ......多くの結果を追い求めると、それはリスクが増えて心地よさが半減してしまうため、リラックスして楽しみながら成果が得られるような、ちょうどいいラインを見つけ出した、ということが、この人にとって大切なポイントといえるでしょう。\nこの度数を持っている人は、自分に多くのプレッシャーを与えすぎるよりも、快適に心地よく過ごせるような生き方を求めるかもしれません。まわりがどうであろうとも、無理せず、自分にとって気持ちいいペースを貫くことを好むでしょう。心地よい場所、方法、ペース......身のまわりを自分の落ち着いたもので固めていくかもしれません。あまり大きな冒険を無理してするよりも、心が落ち着いておだやかに過ごせることがなによりも大切です。\n未知の世界や物事に興味がないわけではありませんが、その姿勢はとても慎重。\n背伸びすることなく、ゆっくりと自分のペースで少しずつ試していくようなやり方を好むでしょう。\n自分の感性に忠実であり、とてもナチュラルな人です。純粋さを秘めていて、その内なる自己価値からじっくりと、世界と関わっていくことになりそうです。"}, "牡牛座_15": {"sign": "牡牛座", "degree": 15, "symbol_ja": "粋なシルクハットで頭を覆って、", "symbol_en": "非常な寒さの嵐に勇敢に立ち向かう男性", "key_phrase": "Braves A Storm.", "explanation": "どんな状況であっても欲しい成果をあげることのできる人\n非常に厳しい寒さの嵐が吹きすさぶような状況におかれていたとしても、カッコいいシルクハットをかぶって、立ち向かっていこう!!というサビアン・ワードです。ここでいう、非常に厳しい寒さの嵐というのは、現実世界における世間の厳しい環境やプレッシャー。\nしかし、それらを避けるのではなく、みずからの内側に秘める力を振り絞って、勇敢に立ち向かっていくだけの能力と責任を身につけたといえるでしょう。\n頭を覆っているゴージャスで粋なシルクハットは、たくさんの豊かな知性を兼ね備えていることを物語っています。そのために、どのような状況におかれたとしても、みずからの勇気と能力と知恵を自在に使いこなして、求めている成果をみずからつかむことができるでしょう。\nこの度数を持っている人は、責任感と行動力があふれていて、さらに豊かで実用的な知性も持ち合わせているようです。たとえ、なにが起こったとしても、冷静に状況を見極めて対応しながら、一歩ずつ前へ進んでいくことができるでしょう。\n牡牛座は現実に結果を生み出していくことと関係しているため、この人が持っているのは実際にさまざまな状況において実践的に対応していくことのできる知恵。それを使いこなすことで、その時々に求めている実りをみずから得ることができる人です。\n世の中の流れや景気に振り回されることなく、いつも一定の成果を上げ続けることができるでしょう。それができるようになったのは、どんなときであっても、淡々と繰り返して、実力を蓄えてきたからかもしれません。"}, "牡牛座_16": {"sign": "牡牛座", "degree": 16, "symbol_ja": "生徒に興味を持たせることに失敗した", "symbol_en": "老いた教師の伝統的な知識", "key_phrase": "新しい知的体系を創り上げることができる人", "explanation": "ここでいう伝統的な知識というのは、長いあいだ時間をかけて積み重ねられてきたもの。情報量が非常に豊富ですが、繰り返し使われているうちに、どうしても紋切り型になってしまいやすい、というところがあるでしょう。どこか惰性的なパターンが生じると、それは単に記号として繰り返されていくに過ぎず、教科書を丸ごと暗記するだけの授業には、生徒が飽き飽きとしてしまいます。\nこのサビアン・ワードにおいて、マニュアル通りの授業にうんざりしているのは生徒たちですが、これは自分自身の内側にある若々しい感受性の象徴といえるかもしれません。また、教科書に書かれている知識を丸暗記しただけでは、実際には使いこなせないことも多く、現場で実践するには、その時々の要件に対してもっと実用的で柔軟な知識が求められるのだということに気づいたともいえるでしょう。\nこの度数を持っている人は、旧来の知識や手法に満足を憶えず、自分の実体験に基づいた新しい知的体系を構築しようと試みるかもしれません。創造的な野心が満ちて、もっと実用本位で具体的な成果をあげることができるような技術や方法に興味を抱くでしょう。\nまたサビアン・ワードに教師とあるように、そのようにして構築した自分ならでは知的体系を人に教え広めていくことにも長けているようです。\nいずれにしても、納得のいかないものをそのまま受け入れることはなく、それらに対する不満や物足りなさが創造するためのバイタリティとなるでしょう。新しいメソッドや具体的なノウハウを見つけ出すことに喜びを感じるかもしれません。"}, "牡牛座_17": {"sign": "牡牛座", "degree": 17, "symbol_ja": "剣とたいまつの象徴的な戦い", "symbol_en": "A Symbolical Battle Between \\\"Swords\\\" And \\\"Torches\\\"", "key_phrase": "このサビアン・ワードの『剣とたいまつの戦い』というのは、自分自身の内側で起こっている摩擦を示しています。摩擦のひとつは、自分の中にある「新しいものを取り入れて、革新していきたい気質」としての剣と「これまで培ってきた知識や技術ややり方を大切にしながらやっていきたい」という伝統派のたいまつとの葛藤。もっと実際的で現在の流れに合った新しいものを求めている反面、これまでやってきて慣れ親しんだものも大事にしたいという気持ちもあり、このふたつをどうするか、考えさせられることがあるでしょう。", "explanation": "だけれども、この葛藤があるからこそ、これまでやってきたことを尊重しながら、そのうえで新しいものを取り入れるということができるのかもしれません。\nまた、もうひとつの葛藤として、内なる意志や精神の部分と、現実的な結果や具体性がぶつかり合うものもあります。高い志や「こうありたい」と願う、精神的な理想を抱いても、わたしたちは現実生活の営みのなかで、それを実践するしかありません。そうすると簡単に頭で思い描いているようにはいかず、現実で実践するために、さまざまな変換が必要になるでしょう。\nこの度数を持っている人は、自分の内側でいつも何かしらの葛藤を抱えることがあるかもしれません。\nしかし、それはありのままの現状を甘んじて受け入れることを良しとしない、こだわりの強さや、思想的な部分から生じています。旧来の考えや手法を尊重しながらも、もっと新しい技術や知識を身につけるにはどうしたらいいか。あるいはもっと意志の強さや理想的なものを、実生活に反映させて生きるにはどうすれば良いか。\n思想の広がりを内側に抱いて、哲学的な生き方をする人といえるかもしれません。"}, "牡牛座_18": {"sign": "牡牛座", "degree": 18, "symbol_ja": "部屋の開いた窓を通して", "symbol_en": "古いバッグを虫干ししている女性", "key_phrase": "自分自身を定期的に新陳代謝させる人", "explanation": "女性のバッグの中には、その人の大切なものがたくさん入っています。それがないと落ち着かないもの、安心できないもの、失ったら困るもの、自分にとって大切な価値のあるもの......。\nバッグを虫干しするためには、それらを一度すべて取り出して、どこかに置いておく必要があるでしょう。そしてバッグを隅までしっかりと開いて、風通しの良いところでリフレッシュさせていきます。\nバッグを虫干しするように、自分の中にある思いこみや古いパターン、所有欲や自己価値の基準などを一度すべてリセットしようと試みるのが、このサビアン・ワードの特徴です。自分の価値観をゼロにすることで、再びまっさらな状態から考え、創り始めようとするのでしょう。\nこの度数を持っている人は、自分の力を解放し、手放すことによって、新しい能力を身につけようとすることがあるかもしれません。そのために古いやり方や知識や技術に執着することはなく、あえて自分のすでに知っているものや、持っているものをすべて公開したり、教えたりすることがあるでしょう。\nバッグを所有しているということは、その中に入れる、さまざまな価値ある才能や力や技術や知識を身につけているということ。\nしかし、過去に身につけたものだけにこだわることはなく、常に新しい手法やアイデアを手に入れるために、惜しみなく手放していくでしょう。そうすることでその時々の時代に合った柔軟で面白く斬新なアイデアや技術に恵まれるかもしれません。いつまでも若々しい感受性を持ち続ける人です。"}, "牡牛座_19": {"sign": "牡牛座", "degree": 19, "symbol_ja": "海から浮上している新しい大陸", "symbol_en": "A New Continent Rising Out Of The Ocean.", "key_phrase": "これまで何もなかった大海原から、新しい大陸が浮上してくる......そこはまだ誰にも汚染されていない純粋な清々しい大地であり、まだ何も複雑化されていない単純なありのままの土地が広がっているでしょう。", "explanation": "どんなことであっても、繰り返し続けていくことで、ある程度はできるようになります。最初は難しく感じていたことでさえ、身体がひとつずつ手ごたえを感じながら繰り返していくことで、コツを習得していき、しばらく続けていると、いつの間にか無理なくそれをすることができるようになるでしょう。すると自然とステップアップのチャンスがやってきて、おのずとわたしたちは次の段階へと歩みを進めることができるようになります。\nこの浮上してきた大陸は、そのようなわたしたちが進んできたことで生じた、未知の新しい可能性であるかもしれません。\nこの度数を持っている人は、自分の内側から次々と新しいものを創り続けることができるでしょう。海洋の象徴しているものが、人の集合無意識であるとしたら、自分のまっさらなところから新しいひらめきや創造性がやってきて、なにかを生み出そうとする機運が満ちているかもしれません。\n努力を重ねることで、あるときふいに、次の段階へとおのずと進むときがやってくることもあるでしょう。コツは何事もあまり難しく考えすぎるよりも、シンプルにそぎ落としていくこと。身体がコツを体得することで、次にするべくひらめきやヒントがやってきやすくなるでしょう。\nそして思いついたら、どんどん実行する、形にすることで、よりスムーズにさまざまなことが更に進行していくはずです。自分自身の未知の可能性を信じて、新しい道を進んでいける人です。"}, "牡牛座_20": {"sign": "牡牛座", "degree": 20, "symbol_ja": "空を横切るように流れている翼の形をしたひとにぎりの雲", "symbol_en": "Wisps Of Winglike Clouds Streaming Across The Sky.", "key_phrase": "雲は常に動き続け、変わり続け、ひとときも同じ形をしていることはありません。その時々でさまざまな形を作っているようにも見えるし、あるいはふいに何かを知らせるメッセージや啓示のような印象をもたらすこともあるでしょう。それらは、クリエイターとしての感性を刺激して、なにかを創り出すためのさまざまなヒントを与えてくれることがあるかもしれません。", "explanation": "いずれにしても、刻一刻と変化する雲の様子は、まったくの偶然の産物であり、そこに個人の意志が介入する余地はないでしょう。そこに示されているものは、なんであったとしても、まったくの純粋な天からのギフト。そしてそれを受け取って、読み解くためには、また別の能力が必要となるでしょう。\nこの度数を持っている人は、想像力がとても豊かで、アイデアにあふれ、まったく思いがけないところからヒントに恵まれることがありそうです。ある種の霊感のようなものにすぐれていて、まったく個人的な感情や意志の働かない領域から、なにかの啓示のようなものを受け取る人もいるかもしれません。まわりの空気や雰囲気を察する能力も高く、その時々で必要なものを創り出すことのできるクリエイターとしての力も秘めているでしょう。\nまわりから求められるものに柔軟に応えて、どんなものでも生み出そうとするかもしれません。頭で考えてわからないことであったとしても、あえて心を無にして静かに過ごすことで、ふいに答えがわかったり、そのヒントがひらめいたりすることがあるでしょう。\nクリエイティブにして、直観が豊かに働く人です。"}, "牡牛座_21": {"sign": "牡牛座", "degree": 21, "symbol_ja": "開いた本をさしている指", "symbol_en": "A finger pointing in an open book.", "key_phrase": "多くの知識が詰まった本を目の前に置いて、なにか知りたいことを思い浮かべ、パッと本を開いて、ある部分に指をさし、たまたまそのさしたものを知りたかったものの答えとして読み解いてみる......。世の中にある卜占とは、偶然に生じたものを象意として、世界のさまざまなことを読み解く手法です。占星術も天の星にわたしたちのいろいろに意図やおこないを投影して、紐解いたものだといえるでしょう。", "explanation": "これはたまたま偶然的に「そのようになったもの」から導き出したものを、自分の答えとして受け取ること。しかし星や数字と異なって、本は誰かが何かしらの意図をもって書き記したもの。それを題材に自分の可能性を探るということは、決して突飛な発想や、まったくの新しい未知のものではなく、すでにある秩序に基づいたものの中から、自分を模索する作業であるともいえるでしょう。\nこの度数を持っている人は、物事をシンプルに、しかし大きく、これまで人間が歩んできた道のりや流れから大局をつかんだり、おのれの役割を見出したりすることがありそうです。世界にすでに存在しているさまざまなものをヒントにして、進むべき道を探し当てたり、人を導いたりすることもできるかもしれません。\nしっかりと本をさしている指が意志の強さも示しています。\n大きな流れから自分が感じて受け取ったものを実践してみる。そしてまた、その結果に実際にやってみた自分の体験を付け加えて、他の人に教え広めていく。そのようなことを積み重ねていく人だといえるでしょう。"}, "牡牛座_22": {"sign": "牡牛座", "degree": 22, "symbol_ja": "荒れた水の上を飛ぶ白い鳩", "symbol_en": "White dove over troubled waters.", "key_phrase": "荒れた水の上を飛ぶ白い鳩といえば、ノアの箱舟の神話です。大洪水のあとで、しばらく経って空模様が落ち着いた頃、最初にカラスを解き放ったけれど戻ってこなくて、更にしばらくしてから白い鳩を放ったら、オリーブの実を加えて戻ってきました。", "explanation": "ここでの鳩は新しい土地があることを知らせる、希望のメッセンジャーとしての役割を果たしています。鳩は伝令として、新しい意識を人々にもたらしたのでしょう。\n水は集合的な意識を象徴したものですが、それが荒れているということは感情が高ぶったり、変化を起こしたりしているといえるかもしれません。鳩が運んできたメッセージによって、わたしたちの心が大きく揺り動かされているともいえるでしょう。\nこの度数を持っている人は、これまで育ててきた才能や知識や技術を使って、人々の心を動かしていくことができそうです。コツコツと資質を育てることによって、多くの人たちに影響を与えるだけの力を身につけることができる人、といえるかもしれません。自分なりに見出した知識や技術が鳩の新しいメッセージのように誰かの希望となり、役立つことがあるでしょう。\nまたこれは自分自身が行き詰まったときや、迷いが生じたときに、自然の中から啓示を受け取ることも示しています。白い鳩のメッセージがなにかしらの自然な現象を通して、あなたに訴えかけてくることがあるでしょう。それは身体が持っている本能的な知恵であったり、危機を察知したときに働く直感のようなものであったりするかもしれません。\nいずれにしても、自然の力から進むべき道を導かれることが起こり得るでしょう。"}, "牡牛座_23": {"sign": "牡牛座", "degree": 23, "symbol_ja": "貴重な宝石で充たされた宝石店", "symbol_en": "A jewelry shop filled with valuable gems.", "key_phrase": "宝石店には磨き上げられて装飾の施された貴重な宝石がたくさん集まっています。ここで磨き上げられて、美しく飾られたものは自分自身。自分の中にあった資質を育てていき、しっかりと磨いた結果として、社会で十分に勝負できるほどの価値となったことが示されているのでしょう。", "explanation": "ここにたどり着くまでには、たくさんの苦労があったかもしれません。しかし、自分をごまかさないでしっかりと磨いてきたからこそ、ここまでやってこられたのでしょう。\n宝石店にはそれを求めてくるリッチな人々が集まります。自分にふさわしい価値を身に着けようとする人たちに対して、十分に応えるだけの準備が整っているともいえるでしょう。\nこの度数を持っている人は、自分自身の価値を ら、持ち前の能力が最も活かせるステージへと、その時々で変化することができれば、大きな成功へのステップとなるかもしれません。\n「自分をより活かしていく」という目的を見失ってしまうと、単に次々と場所を渡り歩いているだけの消耗する行為になってしまうので注意が必要です。いまの自分自身の能力を最も発揮できる場所に身を置き続けることで、愛もエネルギーも十分に引き寄せることができるでしょう。\nサビアン・ワードにある「新しい恋の体験」とは、どこへ行っても自分の魅力で顧客やパトロンを見つけ出すことができるということ。可能性を存分に開花させていきましょう。"}, "牡牛座_29": {"sign": "牡牛座", "degree": 29, "symbol_ja": "テーブルで仕事しているふたりの靴修理職人", "symbol_en": "Two cobblers working at a table.", "key_phrase": "靴というのは外の世界へ出かけるときに履くもの。それは外の世界と渡りをつけていくための知識や技術や手法などの象徴といえるかもしれません。", "explanation": "それが古くなって履けなくなった=そういった持ち物(技術たち)が外の世界で通用しなくなってきたときに、捨てるのではなく、修理して再び履けるようにする、というのが、このサビアン・ワードです。しかも靴の修理人がひとりではなく、ふたりいるということは、ひとつの改善方法だけではなく、別の切り口からとらえた、いくつかのやり方があるということ。一見、古くなったように感じられる伝統的な手法も、現代的な視点からアレンジすることで、どんな時代であっても通用させることができるでしょう。\nこの度数を持っている人は、自分独自の感性と世界観による知識や哲学観や技術を持っていることがありそうです。その揺るぎない自己価値がベースにあるからこそ、それを基盤としていろいろと応用させながら、さまざまなものに変化、発展させることができるようです。うまく今の流れや新しいエッセンスも取り入れて、アレンジし、いろいろな価値あるものを自分の内側から創り出していくことができるでしょう。\n実際に何かを創り出す作業にも向いていて、仕事の企画やアイデア出しも得意かもしれません。またそれを実行するだけの実力も兼ね備えているため、他者から信頼されて、いろいろなタイプの仕事をこなす人もいるでしょう。\nさまざまな道に精通する可能性のある、職人気質の持ち主です。"}, "牡牛座_30": {"sign": "牡牛座", "degree": 30, "symbol_ja": "古い城のテラスの上をパレードしている孔雀", "symbol_en": "A Peacock Parading On The Terrace Of An Old Castle.", "key_phrase": "古いお城はいま住んでいる当人が建てたものではなく、古い時代を生きたその家の先祖が建てたものでしょう。わたしたちが自分の能力を高めて、大いにその価値を活かし、社会で活躍を果たしたとき、その背後には同時にさまざまな恩恵も存在しています。その能力はわたしたちが祖先から受け継いできたものですし、それを使いこなすことができるのは、活躍の場としての円熟した社会がそこにすでにあるためでしょう。", "explanation": "これまで地球を支えてきた無数の大きな力が自分の身体を通って結実し、ひとつの成果として目の前に現れている、というのが、このサビアン・ワードです。\nクジャクは元々が本能的な動物だった人間に与えられた知性のシンボル。また、そうであると同時に美しさと気品、豊かさの象徴でもあり、多くの人々を魅了するでしょう。受け継がれた資質が存分に花ひらいて、たくさんの恩恵を地上で受け取れるかもしれません。\nこの度数を持っている人は、自分自身の身体に宿るさまざまな能力を惜しみなく使いこなすことで、地上でとても心地よい楽園のような生き方を送ることができるでしょう。肉体の感性や感覚が際立ち、芸術的な才能が輝く人もいそうです。\n自分の家や身体が受け継いできたものを存分に使いこなすことができるでしょう。中には、自分の暮らす土地や文化の有している伝統に興味を抱くこともあるかもしれません。\n自分の内なる可能性をすべてひらいていくことが、豊かで充実した人生を送るためのカギ。地上のさまざまなことを楽しみ尽くしましょう。"}, "双子座_1": {"sign": "双子座", "degree": 1, "symbol_ja": "海の中の不思議を明らかにするガラス底ボート", "symbol_en": "A Glass-Bottomed Boat Reveals Undersea Wonders", "key_phrase": "海の中というのは陸上からは計り知れない不思議な面白さに満ちあふれています。また海は人の心や感情、集合体のシンボルであるともいえるでしょう。", "explanation": "ガラス底ボートに乗ると、そんな不思議な世界を垣間見ることができます。しかしガラスが個人と海との間を隔てているため、決して直接水に触れることは起こりません。\nあくまで客観的な立場から、人の感情や揺れ動きや、そこで起こるさまざまなドラマティックな出来事を面白がって眺めていたいというサビアン・ワードでしょう。対象と同化しないところで客観的に知り得たことを語り、関係性においても心の中まで深入りせずに心地よい距離を保とうとするかもしれません。\nこの度数を持っている人は、いろいろなものを観察して、興味を持ち、何が起こっているのか、人がどんなときにどのように反応したのか、それに対してまわりの人たちはどう動いているのかといったことを理解して、そこからさまざまな知識を得ることを楽しむでしょう。あくまで客観的な第三者として安全な距離をおいたところから眺めて、多角的な情報と共にあれこれ分析することが得意かもしれません。\n人間ウォッチング、スキャンダルや噂話など、世界で起きているさまざまな出来事に興味をもって情報を集めますが、それらに対して当事者たちがどう感じているのかということよりも、それに反応する自分自身の心の揺れ動きを楽しむようなところがあるでしょう。\n双子座のテーマは知的好奇心。それがなによりも際立つサビアン・ワードです。"}, "双子座_2": {"sign": "双子座", "degree": 2, "symbol_ja": "ひそかに暖炉の前の靴下を満たしている", "symbol_en": "サンタクロース", "key_phrase": "必要なことを啓示のように受け取る人", "explanation": "クリスマスの夜、暖炉の前には靴下が吊るされていて、そこには子供たちの純粋な夢やワクワクした期待が詰まっています。それをこっそりと夜中に靴下の中を満たしているサンタクロースは、子供たちの夢を実現させるために実存しますが、決して正体を見ることのできない存在でもあるでしょう。\n双子座の靴下と子供たちですから、その夢や期待は知的な欲求かもしれません。『知りたい』と思って求める気持ちと、それがやってくるのを待ち続ける純粋さがそこにはあるでしょう。\n自分からあちこち出かけて知的欲求を満たすのではなく、『こういうことが知りたい』と思い描き、眠っているあいだにそれがやってくるのを待っているような受け身の姿は『啓示を受け取る』『メッセージを受け取る』といった類いのある種の霊的な予兆を受け取る力として働く可能性があります。\nこの度数を持っている人は、内側にたくさんの好奇心を秘めているでしょう。実際にいろいろな知識を調べたり集めたりすることも好きかもしれませんが、同じぐらい空想したり、想像したりして、思いを巡らせることもするかもしれません。\nまた、ある種の霊感のようなものが働きやすく、ぼんやりしているときや夢の中で、印象的なビジョンを受け取ったり、メッセージや言葉を観たりする人もいるでしょう。本能的なところで直観が働いて、なんとなく答えを見出すようなことがあるかもしれません。本質はとても純粋なところがあるでしょう。"}, "双子座_3": {"sign": "双子座", "degree": 3, "symbol_ja": "パリのテュイルリー庭園", "symbol_en": "The Garden Of The Tuileries In Paris.", "key_phrase": "パリ一区にあったテュイルリー宮殿は計算し尽くされた秩序に基づいて、シンメントリーに形作られています。王族たちが贅を尽くして暮らしたその宮殿は、現在では焼失してしまいましたが、その庭園のみが残って、当時の面影を伝えているでしょう。庭園のいたるところ、隅々にまで整然とした形式美が行き渡り、きっちりと人の手によって手入れされて美しさを保っています。", "explanation": "そんな庭園のような形式美を感じさせる表現と関係したサビアン・ワードです。多くの情報、知識を脳内でわかりやすく分類して関連付けして、所有するということもあるでしょう。またそれらの情報をいかに整然とわかりやすく美しく伝え、表現するかというところに独自のセンスが働くかもしれません。\nこの度数を持っている人は、賢くスマートで美意識が高く、さまざまな情報を自分の中で関連付け、整理して持つことが得意なところがあるでしょう。\nまた、知り得たことをどのような言葉を使って、どんな風に表現するのか、というところにこだわりがあるかもしれません。時には内容そのものよりも、どう見せるか、どんな文体と言葉で表現するかといったほうに意識がより強く向けられる場合もあるでしょう。\nさまざまな表現技法に精通しやすく、ボキャブラリーも豊富。いろいろな人の表現から学ぶことも好み、自分のそれを増やすことにも興味を覚えるでしょう。\n多くのことを美しく、わかりやすく人に伝えることのできる才能の持ち主です。"}, "双子座_4": {"sign": "双子座", "degree": 4, "symbol_ja": "クリスマスの古い記憶を呼び起こす", "symbol_en": "ヒイラギと宿り木", "key_phrase": "古い知識や情報に興味を抱いて学ぶ人", "explanation": "宿り木は、ほかの樹に寄生して、その栄養を吸い取って成長する植物です。その不思議な形態を見て、古代のケルト人たちは、宿り木には復活や再生の秘密を司る不思議な力があると信じていました。そのため、海外ではクリスマスの時期になると宿り木を玄関に吊るして、復活と愛の力をそこから得ようとする習慣があるそうです。\nまたクリスマスの時期に赤い実をつけるヒイラギはクリスマス・ホーリーと呼ばれる聖なる木。キリストの受難と血のシンボルでもあり、リースとしてたびたび飾られることがあるでしょう。\nいずれにしてもこれらは古い知恵や自然なものへの回帰を呼び起こさせるかもしれません。自分自身の体験のみならず、人間がこれまで学び、創り上げてきた叡智の源とつながるようなところがあり、古い人類の記憶にアクセスして、そこから情報を出し入れすることのできる可能性があります。\nこの度数を持っている人は、知性の力がとても豊かであると同時に、理路整然とした思考回路を確立することができるでしょう。古くに成立した叡智や伝統的な思想に興味を抱いて、さまざまなことを学ぶ人もいるようです。\nやや保守的なものに惹かれる傾向がありますが、それらがどのように成り立ち、どんな構造を持っているのかを理解して、それらの持つ知恵を使いこなすことができるでしょう。中には叡智の源に直接アクセスして、情報をダウンロードするような人もいるかもしれません。いずれにしても、個人を超えた領域にある知性に興味を抱くことがあるでしょう。"}, "双子座_5": {"sign": "双子座", "degree": 5, "symbol_ja": "行動することを呼びかける革命的な雑誌", "symbol_en": "A Revolutionary Magazine Asking For Action.", "key_phrase": "双子座は個人の知性の可能性を存分に働かせることを目的とするサイン。そのためには、ひとつの価値観や物の見方に縛られていると可能性がグンと狭まってしまいます。双子座にとっては意識がひとところに留まらず、いつでも自由に内外を出入りしている状況が望ましく、そのためにさまざまな制約を乗り越えようとするでしょう。", "explanation": "思考が規律化されてパターンとして固まってしまう以前の状態へと立ち戻ろうとするサビアン・ワードです。既存の教えや、すでに完成された体制を否定することで、もっと自由でなんでもありな発想力を取り戻そうとするかもしれません。ひとつの考えに縛られたり、囚われたりすることを厭い、何にも影響されない自由な精神を獲得するための行動を起こしていく力を持つでしょう。\nこの度数を持っている人は、切れ者で鋭く、観察力にすぐれており、また知的な可能性を開拓しようとする意欲があふれているようです。人に制限を与えるような価値観や考え方よりも、新しい発想で、いま新しく発生するようなものに可能性を見出して、実際に試していくところがあるでしょう。なにかのアイデアがひとつ生じたところで、そこに留まり続けることはせず、常に思考の生まれる源のようなところとつながっていようとするかもしれません。\n他者から干渉されたり、決めつけられたりすることに対しては激しく反抗していく強さも秘めているでしょう。新しい知性の可能性を求めて、実際にさまざまなことにチャレンジする人もいるかもしれません。"}, "双子座_6": {"sign": "双子座", "degree": 6, "symbol_ja": "油田を掘っている労働者", "symbol_en": "Workmen Drilling For Oil.", "key_phrase": "油田を掘るためには地下の深いところへ潜って、アクセスする必要があります。油田を掘るという行為は、自分自身の未知の領域や深層心理に働きかけて、そこにある才能や可能性を発掘しようというアクションの顕れかもしれません。油田を掘るのは一攫千金を狙うような一面があるでしょう。ありきたりの知識や能力では飽き足らず、より深いレベルの能力を開発して、使えるようにしたいという欲求があるのかもしれません。", "explanation": "また発掘して見つけ出すことのできるオイルというのは、古代の有機体だったものが変容したもの。このことから古い叡智や知識体系を引っ張り出してきて、いまの時代に通用するようにアレンジすることも、ここには含まれているかもしれません。\nこの度数を持っている人は、とても能力が優れているうえ、とても勉強熱心。常に新しいことを知ろうとする欲求を秘めているでしょう。いろいろな方向へ興味が向かっていき、ひとたび何かを学び始めると、一途に深めていこうとするところがありそうです。自分の内側の真実を探ることにも好奇心が向くため、しっかりと内観したり、見果てぬ能力を磨こうとしたりするかもしれません。\n古く伝統的な知識体系に食指が動いて、どんどん深めようとする人もいるでしょう。広く深いところへ知的な欲求が向いていき、実際にそれらを使いこなす能力も持ち合わせています。情報をしっかりと判断する識別能力を身につけると、更にさまざまな面で充実するでしょう。"}, "双子座_7": {"sign": "双子座", "degree": 7, "symbol_ja": "壮大な木々の影にある", "symbol_en": "バケツとロープを兼ね備えた井戸", "key_phrase": "多くの知恵を学び、それを惜しみなく分かち合う人", "explanation": "壮大な木々は樹齢も高く、わたしたちの世界をずっと見守り続けてきた長老的な存在です。そこにはたくさんの知恵と経験とが含まれているでしょう。木はわたしたちの体系づけられた社会を示すシンボルであると同時に、人間の脳内のシナプスとよく似たシンボルであり、人間たちが古代から発展させてきた豊かな叡智と通じるものがあるかもしれません。\n木の下にある井戸は、人々をホッとさせる存在です。誰でも自由に汲み上げられるように、バケツとロープが兼ね備えられていて、水を求める人々の心と身体を存分に潤すでしょう。\n水は人々の心や感情、集合意識を司ります。わたしたちを活かすための豊かな知識や情報が惜しみなく分かち合われていき、人々に恵みの恩恵をもたらすでしょう。\nこの度数を持っている人は、大自然の持っている生命の力や、古くから人々が大事にしてきた知恵や知識体系に興味を持つことがありそうです。そして実際にわたしたちを活かすための知識を学んで身につけると、今度はそれを惜しみなく多くの人たちにシェアしていこうとするでしょう。\nシンプルだけれども、本質的な知恵であるほど、それらは人々の人生を豊かに潤わせてくれます。それを必要とする人たちに分け与えて、みんなで幸せになろうとするでしょう。\n大勢の人を導く力があるため、グループリーダーや先生や指導者としての資質も持ち合わせているかもしれません。どこか、まわりの人たちをホッとさせるような存在を感じさせるでしょう。"}, "双子座_8": {"sign": "双子座", "degree": 8, "symbol_ja": "工場を囲む興奮したストライカーたち", "symbol_en": "Aroused Strikers Surround A Factory.", "key_phrase": "労働者がストライキを決行するのは、自分たちの置かれている環境におおいに不満があるときでしょう。自分たちのしていることに対して、得られるものの物足りなさや、報われなさがあると、それは不平不満となって、日に日に募っていきます。", "explanation": "誰もが全員同じような立場と状況に立たされているのであれば、それを感じることはないかもしれません。風のエレメントは公平性やバランスを重んじるため、上下関係の厳しさや、使われる者と使う者とのあいだの格差に対して、とても敏感に反応します。それらのあいだにある垣根を壊して、人の可能性や閉じ込められた関係を解放させようとする勢いが満ちたサビアン・ワードといえるでしょう。\nこの度数を持っている人は、ものすごいパワーの持ち主で、一途に自分の正義を貫こうとするかもしれません。おかしいと思った出来事に対して、毅然とした態度で立ち向かい、熱弁をふるうこともあるでしょう。自分の内にある信念を何よりも大切にして、それに反するものがあれば、相手が誰であったとしても容赦なく向かっていく強さも秘めていそうです。\n対人関係の平等さを重んじて、どんな立場であろうとも、お互いに尊重し合うことを大切にするでしょう。ひとりひとりの個性と存在とが、平等に尊重されることが何よりも大切かもしれません。\nそのため、バランスの悪い関係性や、不公平な環境、誰かひとりだけが得するようなやり方に対しては高いフラストレーションを抱くことがありそうです。正義のために熱く戦う強さの持ち主です。"}, "双子座_9": {"sign": "双子座", "degree": 9, "symbol_ja": "矢で満たされた矢筒", "symbol_en": "A quiver filled with arrows.", "key_phrase": "弓を構えて矢を射るときは高い集中力を必要とするでしょう。少しでも心が乱れていては、矢が思わぬ方向へ逸れてしまい、標的に当てることはできません。したがって矢を射るときは集中すると同時に、心の中のエゴイスティックな部分をグッと抑えるような精神性が求められるでしょう。", "explanation": "個人のエゴイスティックなものを抑えて、ひとつの道を極める力。あるいは逆に、ひとつのことをじっくりと探求することによって、個人の小さなエゴを超えていくことができるのかもしれません。\n矢はすさまじいスピードで飛ぶため、速さやスピードとも関係しているサビアン・ワードでしょう。風の力を使って飛ぶ矢が、矢筒に満たされているということは、各地に拡散させるためのたくさんの知識や情報を持っているともいえるかもしれません。\nこの度数を持っている人は、非常に高い集中力があり、むずかしい問題やテーマにも積極的にチャレンジしていこうとする意欲に満ちているでしょう。なにかを学び始めたら中途半端に止めることはなく、完遂するまですごい勢いで突き進むかもしれません。思いこんだら一途なところがあるので、時々身体を休めることを意識すると良さそうです。\nたくさんの知識と情報を持っている頭脳派であり、それらを必要とあらば、すばやく広める力も持っているでしょう。精神力の高さで個人の弱さや思いこみを乗り越えていくような真摯さを秘めています。志した分野をマスターすることができるでしょう。"}, "双子座_10": {"sign": "双子座", "degree": 10, "symbol_ja": "急降下している飛行機", "symbol_en": "An Airplane Performing A Nose Dive.", "key_phrase": "地上に存在する、あらゆる物は重力の影響を受けて、大地に留まります。この重力を司るものは山羊座であり、社会的な秩序やルール「こうあるべき」という規範を重んじるサイン。地上にいるわたしたちは、多かれ少なかれ、この影響を受けて、ルールを守り、暮らすことになるでしょう。", "explanation": "それに対して、火と風のエレメントは重力の影響を受けずに自由に飛びまわります。急降下のアクロバット飛行を披露する飛行機は、重力に逆らって、自在に空を飛びまわる力を手に入れたことになるでしょう。\n常識に縛られない力、ありきたりの方法や技術に落ち着かない力。誰よりも速く、情報を広めていき、ときに周囲で見ている人たちをはらはらさせることがあるかもしれません。しかし、それさえもどこかで面白がって、ほくそ笑んでいるようなところがあるでしょう。\nこの度数を持っている人は、とても自由で、何者にも縛られず、みずからの遊び心とクリエイティビティでさまざまなものを生み出す力を持っているようです。なにかを思いついたら、それを即座に広めたり、実行したりする力もあり、万事に対して有能な資質の持ち主。みんなが思いつくような予定調和を裏切って「えーーー!!」と驚かせるようなことを仕掛けることに喜びを感じるでしょう。\nさまざまな知識とアイデアとを自在に使いこなして、誰も思いつかないような面白いアイデアを次々と生み出すことができるようです。常識に縛られることのない、独創的な創造力を秘めているでしょう。"}, "双子座_11": {"sign": "双子座", "degree": 11, "symbol_ja": "開拓者に新しい経験の機会を提供するために", "symbol_en": "新しく開かれた土地", "key_phrase": "新しい知的領域をみずから開発する人", "explanation": "ひとつの型にハメられたり、押し付けられたりすることを嫌い、いつでも自由でいることを望むのが双子座の習性。決まりきった仕事のパターンや「こういう風にいるものだ」と習慣化された思考回路から抜け出るために、あえて新しい経験をどんどん増やして、柔軟さを養っていこうというのが、このサビアン・ワードです。「新しく開かれた土地」というのは、まだ未開発で手つかずの自分の脳内の領域を指していて、それを切り拓くために、新しい経験を積み重ねていこうとするでしょう。\nまた双子座は風のエレメントに属するサインですが、土地というのは地のエレメントが象徴する現実に属するもの。風の思いついた新しいひらめきやアイデアを、実際に現実の世界の中でどんどんチャレンジして実行してみようとする気概が満ちているかもしれません。\nこの度数を持っている人は、現実主義者で、実際に現場で行動を起こしていくことを旨とするでしょう。好奇心旺盛で前線へ飛び出していき、働くタイプです。何事も実践してみないとわからないので、思いついたことを試してみながら、その手ごたえをもって、多くの知識を習得することになるでしょう。\nそのため多趣味だったり、仕事の経歴がバラエティ豊かになったり、多方面に造詣を深めたりすることが起こるかもしれません。まだ開かれていない何もない空間に新しい枝葉が広がっていくように、ぐんぐんと知識領域を広げていく生き方をすることになる可能性があるでしょう。"}, "双子座_12": {"sign": "双子座", "degree": 12, "symbol_ja": "都市で独立するために戦う黒人の少女", "symbol_en": "A negro girl fights for her independence in the city.", "key_phrase": "サビアン占星術が地上にもたらされた1925年は、まだまだ有色人種に対する差別が各地ではびこっている時代でした。これはある種のパターンであり「こうあるべき」「これはおかしい」と定められた古い慣習や考えに対して、激しく抵抗していく様子を示してもいます。", "explanation": "これは別の視点から見ると、自分の内側から生じる新しいものへの欲求や憧れに対して湧き起こる古いパターンとの戦いと言えなくもありません。新しい考え方ややり方を採用したい一方で、それに反発する気持ちが湧き上がってきて、その矛盾をたびたび感じることがあるでしょう。過去の因習や制約から解き放たれて自由になりたい自分と、しかしそのパターンについとらわれそうになったり、安心したりしている自分とがいて、それが現実の世界に投影されると、そのような葛藤を抱える人と多く出会うことになるかもしれません。\nこの度数を持っている人は、いつも自分の心の内側と向き合って、その正直さを貫こうと意識をしていることでしょう。しかし、そのたびに古いパターンが顔を出してきて、自分を過去のやり方に連れ戻そうとするものを同時に感じるかもしれません。\n外の世界に過去へ向かおうとするもの、古いパターンにとらわれているものを見出したときは、新しい考えややり方を選んで進むべきだと説得してまわるかもしれませんが、それも自分自身の内にあるものの投影といえるでしょう。\nしっかりとした意志を持ち、自由な何者にもとらわれない生き方に憧れながらも、どこか矛盾と葛藤とを抱えるようなところがあるかもしれません。外からの圧力に対しては激しく戦って、抵抗していく熱さを秘めています。"}, "双子座_13": {"sign": "双子座", "degree": 13, "symbol_ja": "コンサートで演奏している有名なピアニスト", "symbol_en": "A Famous Pianist Giving A Concert Performance.", "key_phrase": "ピアニストがコンサートで大勢の観客を前に、その腕前を披露するに至るまでのあいだ、とてつもなく長い道のりがあったことでしょう。ただ資質があるだけでは飽き足らず、ひたすらひとつの道を極めに極めた人だけが辿り着く達人の境地。常人にはとてもできないような厳しい道を歩き続けて達した人だからこそ、その演奏は人々の心に響き渡るのでしょう。", "explanation": "その人の精神のすべてを傾けた、ひたむきで情熱的に生きる人のパフォーマンスを見ると誰もが心を打たれて、ハッと呼び醒まされるようなところがあります。人の情熱に触れることで眠っていたものが揺さぶられて、自分もなにかをやりたい、自分らしく情熱をもって生きたいと思わされるのかもしれません。\nこの度数を持っている人は、なにかしらの分野で専門的な技術や知識を身につけたようとすることがあるでしょう。そしてひとたび志したなら、徹底的に道を極めて、まわりの人たちに率先して、みずからそれをやって見せようとするかもしれません。誰もが踏み入れたことのない領域まで進んでいくことで、おのずとまわりの人たちに影響を与えて、やる気を起こさせもするでしょう。\n自分が見本となることで、人々の心に火をつける役割の人。身につけたものを人々の前で披露する機会にも恵まれて、名声を得ることも多そうです。\nサビアン・ワードとなっている音楽は、言葉や時代を超えるもの。単なる知識に留まらず、より広範に伝達していく能力を身につけることとも関係しているでしょう。"}, "双子座_14": {"sign": "双子座", "degree": 14, "symbol_ja": "物理的な空間と社会的な区分とに", "symbol_en": "橋をかけるために", "key_phrase": "Bridging Physical Space And Social Distinctions, Two Men Communicate", "explanation": "Telepathically.\nより大勢の人たちに多くの情報を伝える人\n双子座はコミュニケーションの伝達と関わるサイン。あらゆる動物は相互にコミュニケーションをとって、さまざまな物事を伝達し合いますが、人間は言語を習得したおかげで、より詳細な情報を多彩に分かち合うことができるようになりました。その恩恵で人間は大きな社会を築き、ひとつの目的を共有したり、さまざまな情報を伝え合ったりすることができます。\nより多くの個体数の人々に同時に大量の情報を共有させるには、それを可能にするためのものが必要となるでしょう。物理的な空間を超えるものとしては電話やテレビやインターネットがそれを可能にし、社会的な区分=異文化や異なる言語間のコミュニケーションにおいては自動翻訳機能などがそれを可能とするかもしれません。テレパシーというのは、その最たるもので、物理的な距離も人種や言語の相違の壁も超えて、ダイレクトに心と心とを結びつけることができるでしょう。\nこの度数を持っている人は、伝達能力が非常に高くなる可能性があります。少しの情報から、多くの意志を読み解くような察しの良さがあるかもしれません。勘が鋭く、外国語でもなんとなく理解できたり、相手の思いをすべて聞かなくてもキャッチしたりするようなところがあるでしょう。\n場の雰囲気をつかむのもうまく、人の心に届くように話したり、書いたりすることが得意な人もいるようです。テレパシーのようにすばやくダイレクトに伝達する知性が発達して、スピードと言語能力とが強化されるでしょう。"}, "双子座_15": {"sign": "双子座", "degree": 15, "symbol_ja": "お互いの知識を交換するために", "symbol_en": "会話をしているふたりのオランダ人の子ども", "key_phrase": "多彩なものの見方を広げようとする人", "explanation": "オランダという国はヨーロッパの中でも昔からさまざまな思想を持つ人たちや、他国では住むことのできなかった人たちを受け容れてきたという背景があるそうです。これは多様な人種や思想やその価値観をオープンに歓迎して、活発にお互いを知ろうと交流していくようなサビアン・ワード。\n象徴として描かれる子どもはまだ経験が少ない分、純粋な存在で、相手の言うことがなんであれ、色眼鏡をかけて判断するようなことはしないでしょう。それがどんな意見や価値観であったとしても、そのまま一旦受け容れて、そこからそれに対して自分がどう思うか、お互いの価値ある意見や情報を積極的に交換しようとしているのかもしれません。\nこの度数を持っている人は、人とおしゃべりをしたり、意見交換をしたりすることが大好きで、大勢の人たちの話を聞きたがるところがあるでしょう。双子座は風のエレメントに属しますが、風は客観的な合理性を司り、多くの考えを知ることによって、より合理的な判断をくだす傾向があります。そのためにも多様な意見をより多く広く集めようとするところがあるかもしれません。\n人々と議論を交わしたり、意見を出し合っていろいろと試してみたり、さまざまなアイデアを比較してみたりと、あらゆる考えの可能性を広げようとするところもあるでしょう。\n知識がとても豊かに広がって、学者などにも適性のある知性的なタイプです。いろいろな考えに好奇心を抱いて、探求していくことになるかもしれません。"}, "双子座_16": {"sign": "双子座", "degree": 16, "symbol_ja": "そうなった理由を", "symbol_en": "ドラマティックに熱く語る女性活動家", "key_phrase": "自分の思いを伝えることで人々を動かしていく人", "explanation": "ごく身近なありふれた環境の中で、どうにかしようとしてもうまくいかないことや、どうしても納得できないこと、個人の自由がどんどん奪われるようなことが起こると、人は『こんなことはおかしい!!』と感じるようになるでしょう。人がなにかしらの信念を抱くには、そこに至るまでの過程や原因が必ずあるはずです。そして自分の抱いている信念が誤ったものではなく、普通にあるものなのだと確信するためには、他の人たちも同じような思いを持っているのだと確認する必要があるかもしれません。\nそのために自分の中にある思いを、このサビアン・ワードでは、女性活動家が熱く語っているのでしょう。自分に起こった身の上をドラマティックかつ情感たっぷりに語ることで、それは聞き手の心を揺り動かし、自分にも同じような経験があると思い起こさせることになるかもしれません。それは人が無意識のうちに感じていたものを、表舞台へと引っ張り出すことにもつながるでしょう。\nこの度数を持っている人は、自分の内側で感じたり、思ったりしていることがなんであれ、それをまわりの人たちに伝えていこうとするかもしれません。それは個人の意志から生じているため、クールに淡々と語るというよりも、どうしてもおのずと気持ちが入り、情感たっぷりに熱がこもるでしょう。その態度が人々の心に火をつけて、動かすことになりそうです。\n無自覚のうちにまわりの人たちを扇動したり、多くの気づきを与えて喚起させたりすることがあるかもしれません。意識的に個の質を活かすと、マスコミ関係や広報、政治活動などに役立てることもできそうです。自分の内側に熱い思いと理想とを秘めているでしょう。"}, "双子座_17": {"sign": "双子座", "degree": 17, "symbol_ja": "成熟した思想家のものに", "symbol_en": "変化する健康な若者の頭", "key_phrase": "何事もじっくりと観察して考える人", "explanation": "若さというものは未熟でありながら、時にとても素直で、元気いっぱいのパワーにあふれ、情感がはちきれんばかりに身の内からあふれ出すようなところがあるでしょう。一方で成熟した思想家は、その身の内に多くの経験と知識とを有しているがゆえに、いつでも冷静沈着。性急に答えを出したり、反射的に感情で反応したりすることはほとんどないかもしれません。\nこれは知性の成熟と関係するサビアン・ワードで、起こった出来事や聞いたことに対して、パッと反射的に反応せずに、内側で一度受け止めてから、深くじっくりとそれについての考察をめぐらせることになるでしょう。ひとつずつ、丁寧に受け止めて考えをめぐらせることで、短絡的ではない、筋の通った知性が系統立って育つことにもつながりそうです。\nこの度数を持っている人は、クールで落ち着いたところがあり、さまざまな意見や出来事を自分の中で一度じっくりと観察・吟味してから、それがどういうことなのか、理解しようとするかもしれません。そのためパパッとめまぐるしく対応するよりも、ひとつのことを時間をかけて突き詰めていくことに適性があるでしょう。\n研究家気質であり、自分なりに見出したひとつの思想の視点が育つと、今度はその視点を軸として、さまざまなことをとらえ直すこともできるかもしれません。受け身であるがゆえに影響を受けやすいところもありますが、ひとつずつ、自分なりに考えることを大切にしているでしょう。"}, "双子座_18": {"sign": "双子座", "degree": 18, "symbol_ja": "アメリカの都市で", "symbol_en": "母国語を話すふたりの中国人男性", "key_phrase": "自分の世界観をグッと深く突き詰めていく人", "explanation": "アメリカは多種多様な人種で構成される坩堝の国。特に大きな都市にはさまざまな人種の人たちが集まってきて、おたがいのことを理解し合うために、共通言語である英語を使ってコミュニケーションをとっていきます。\nところが、このサビアン・ワードでは、アメリカの都市にいながらも、あえて周囲の人たちと馴染まずに、同胞とだけ母国語を使って話をしている男性たちが描かれているでしょう。これは、あえてまわりの環境に溶け込まず、そのつながりを制限することによって、内側でひとつの物事を狭く深く突き詰めようとする試みかもしれません。\n大勢の人たちと関わると、多様な意見に翻弄されて、その普遍性を前に個人の真実がぼんやりとしてしまうようなことが起こるでしょう。ここでは自分自身の内なる世界を守るために、周囲との関わりを閉じていく姿がクローズアップされています。\nこの度数を持っている人は、内なる世界観が強く、そこをひたすら探求することでまわりとは異なる独立した価値観や精神性を育てようとするかもしれません。ひとつの物事を深く見つめていくため、なにかしらの専門分野を身につけたり、あるジャンルでのオタクのようになっていったりする傾向もあるでしょう。\n自身の知り得たことを大勢の人たちに理解してもらうよりも、その世界についての造詣がある人たちと交流することで、更に見識を深めようとすることもありそうです。自分自身の精神的な部分を探求して、自分なりに世界の真実をつかもうとする人もいるでしょう。"}, "双子座_19": {"sign": "双子座", "degree": 19, "symbol_ja": "伝統的な智恵を明らかにする大量の古代の書物", "symbol_en": "A Large Archaic Volume Reveals A Traditional Wisdom.", "key_phrase": "古代の書物には、その土地に住んでいた民族の見つけ出したさまざまな知恵が記録されているでしょう。別の書物を紐解いたなら、それはまた別のある民族の伝統や文化や知恵が記されているかもしれません。", "explanation": "そのように世界の各地に点在する大量の古代の書物を解き明かしていくことで、全人類に共通する普遍性や、いつの時代でも通用する叡智の源がどこであるのかということを突き止めようとするのが、このサビアン・ワードです。\n地上にかつて存在した多くの人類種と、現在唯一生き残っているサピエンスとの大きな違いは認知革命によって虚構を創り出す想像力を手に入れたことにあるといわれています。この能力によって、わたしたちはお互いを共通のシンボルで結びつけ合うことができるようになりました。\nたとえば、ひとつの現象から神なるものを生み出し、そこに共通の信仰心を持つことで、その信念から広範な文化を創り出すことができるようにもなったのです。そのような知恵の源泉を辿っていき、全人類の知性について考察するようなところがあるかもしれません。\nこの度数を持っている人は、歴史や過去を紐解いて、人々が培ってきた知性に興味を抱くことがあるでしょう。特に秘教的なものに惹かれて、その本質を探究することがあるかもしれません。それはそこに現代を生きる人間とのあいだに共通するものを見つけ出すことが、ひとつの目的でもあるでしょう。\nどこの世界でも共通して持っている神話や宗教の中に、人々の普遍性や変わることのない知恵を見出し、それを研究する人もいそうです。多くの情報を集めながら、人間にとっての真実や知恵の源泉を掘り下げていく、探求者だといえるでしょう。"}, "双子座_20": {"sign": "双子座", "degree": 20, "symbol_ja": "モダンなカフェテリアに飾られた", "symbol_en": "豊富な食べ物やさまざまな地方の製品", "key_phrase": "Regions.", "explanation": "とにかく多方面から知識や情報を集める人\nあるカフェテリアに、その地方の特産品だけではなく、各地から流通してきたさまざまな製品や食品がたくさん並べられています。これは双子座のカフェテリアですから、そこに集まった品々は各地域の情報や知恵などに相当するかもしれません。\nカフェテリアはいろいろなタイプの大勢の人たちが集まってきて、多彩な情報が交換される場所。そのようにさまざまでバラエティ豊かな情報が集まってくることを示すサビアン・ワードといえるでしょう。\n都市部のデパートのように、そこに行けばすべてが揃っているという場所は便利ですが、ひとつひとつの商品の価値が均質化されてしまう可能性は否めません。その地方の、その場所でしか手に入らない......という特質が失われていき、代わりに情報価値の競合化が起こることにもつながるでしょう。\nこの度数を持っている人は、とにかくどんなことでも知りたがり、そのためにも大勢の人たちとつきあおうとするかもしれません。どんな分野にも興味を抱いて、さまざまな方面でのスペシャリストになれる資質の持ち主です。\nしかし、なにかひとつだけを特化して極める...というには飽き足らず、次はこちら、その次はこちらと、多方面に興味の食指を伸ばして、次々と情報を吸収しようとするでしょう。その結果として本人の知性は豊かになりますが、いったい何がもっとも得意であるのかが、わからなくなるということが起こるかもしれません。\nやりたいこと、知りたいことがたくさんあって、それゆえに一番がこれ!!というものが決められなくなるかもしれませんが、代わりに雑多な知識を持つ可能性のある人です。"}, "双子座_21": {"sign": "双子座", "degree": 21, "symbol_ja": "**激しい労働者のデモ**", "symbol_en": "A Tumultuous Labor Demonstration.", "key_phrase": "現代はまさしく、世の中のいたるところに情報があふれかえっている情報化社会です。昔であれば、じっくりと時間をかけて丁寧に師匠から伝授されてきたものも、ゆっくりと腰をすえてひとつひとつマスターしていくものも、いまやネットで検索すればあらゆる情報やコツがすぐに見つかる時代となりました。バラエティ豊かなさまざまな知識や情報や世の中にあふれてくると、その価値のひとつひとつが低下していきます。", "explanation": "またそれらの情報は玉石混合となって、質の良いものも、そうではないものも、出所がよくわからないまま、広がっていくことにもなるでしょう。知りたいと思えば、どんなことでも簡単に知ることのできる時代ですが、そこに書かれているものとは正反対の情報も同時に見つけることができるため、なにが真実で、なにがそうではないか、見極めることがむずかしいともいえます。\nこのサビアン・ワードに描かれる、デモをしている労働者は、情報過多による脳内の混乱と、メディアによって揺り動かされる本来の自分から発したものではない思いたちの象徴といえるかもしれません。\nこの度数を持っている人は、とにかくいろいろな情報を知りたがり、集めようとするところがあるでしょう。学ぶことが大好きで、知識欲旺盛。一生懸命に向かっていくため、ワーカホリックにもなりやすいようです。さまざまな情報が頭のなかで渦巻いて、いろいろなことがわかるがゆえに、時にそれらの知識がぶつかり合って、ストレスが生じることもあるでしょう。\nまた外から入ってきたニュースや情報に同調して、自分から生じたものではない思いに突き動かされることもあるかもしれません。\nいずれにしても、徹底的になにかを突き詰めようとする勢いがあって、ひとたび志したなら、大抵の知的分野で活躍することができるでしょう。"}, "双子座_22": {"sign": "双子座", "degree": 22, "symbol_ja": "**収穫祭で踊っているカップル**", "symbol_en": "Dancing Couples In A Harvest Festival.", "key_phrase": "農村部でその年のさまざまな農作物が豊かに実ったことをみんなでお祝いする収穫のお祭りで、男性と女性のカップルが踊っているサビアン・ワードです。", "explanation": "農村部での暮らしは、都会生活に比べると、ずっと刺激が少なく、シンプルで、自然に近いもの。情報と刺激のあふれかえる都市暮らしに疲れると、人は田舎にぶらりと出かけていって、その自然に癒されようとするでしょう。自然に人の本来の生命エネルギーを取り戻させるような働きがあることは、いうまでもありません。ここではそのようなある種の自然回帰のような願望が描かれている可能性があります。\nまた、数多の情報で混乱した知性を落ち着かせて整理するために、人々の創り出した知識ではなく、シンプルな生命の循環や宇宙の法則に目を向けようとすることもあるでしょう。\nこの度数を持っている人は、ひとつひとつの物事を、その仕組みを理解しながら学ぶことを好むかもしれません。いくつもの情報が入り混じって混乱してきたときは、シンプルに自然の流れや法則に立ち戻ることで、それらを客観的に理解することができるでしょう。\nまたサビアン・ワードに描かれているダンスをしているカップルは、その人の左脳と右脳のダンスともいえるかもしれません。左脳を使って知性だけを鍛えるのではなく、右脳の司る本能的な直感も同時に使っていくことが、本人のまだ使っていない未知の能力を引き出すことにもつながりそうです。\n楽しい遊びを好み、他者に対して社交的で、実際に身体を動かしてなにかすることが得意な人もいるでしょう。身体が動きたい動きにゆだねる、ふとやってきたひらめきにしたがう、といったことを繰り返していくと、より本能的な力が目覚めてくることがあるかもしれません。"}, "双子座_23": {"sign": "双子座", "degree": 23, "symbol_ja": "高い木の巣の中にいる三羽の雛", "symbol_en": "Three Fledglings In A Nest High In A Tree.", "key_phrase": "サビアン・ワードで描かれている高い木は、ある種の社会的な体系を象徴すると同時に、頭の中にあるシナプスの構造も示しています。鳥はさまざまな情報を遠くから遠くへと伝達する役割を果たしますが、いまここでは雛であり、ここからさまざまな知的体系を育てていこうとしているのかもしれません。", "explanation": "世の中にあふれる数多の知識や情報を集めていき、改めて種類別に分類してラベリングし、その情報の深度や重要度を見極めながら、体系づけること。そうすることによって、必要な情報をその人が求めているレベルにおいて、すばやく見つけ出すことができるようになるでしょう。情報化社会においてあふれかえっているものを、もっと便利に使いこなすことができるように、その価値を見直して再設定することと関係しているかもしれません。\nこの度数を持っている人は、とても賢く、物事を見極める力にすぐれていて、あらゆる情報を分類したうえで使いこなすことができるでしょう。さまざまな物事の仕組みや成り立ちを構造的に理解する力が富んでいて、それを人に教えたり伝えたりする能力にも恵まれています。どんな種類の情報であったとしても扱うことが可能で、わかりやすく整理する能力を持っているでしょう。\nまたそれらを基盤において新しい知識の理解に結び付けたり、新しい発想を創り出したりすることもできそうです。サビアン・ワードに含まれている三羽の雛は、新しい価値あるものを創り出していくことの象徴。さまざまな物事を体系づけることによって、そこから必要な情報を自在に使いこなすことができるようにもなるでしょう。\nクリエイターとしての資質も持ち合わせている人です。"}, "双子座_24": {"sign": "双子座", "degree": 24, "symbol_ja": "凍っている村の池で", "symbol_en": "スケートしている子どもたち", "key_phrase": "どんな状況にも臨機応変に適応できる人", "explanation": "池の水が凍ると、本来の池としての機能が果たせなくなり、使える用途が限られてしまうでしょう。しかし、ここではそれを逆に利用して、子どもたちがのびのびとスケートを楽しむ姿が描かれています。環境の中の限られた条件下に置かれても、自分なりの楽しみや方法を見つけ出す能力と関係しているかもしれません。\nあるいは逆に環境の中のネガティブな要因を逆手にとって、自分の実現したいことと結びつける能力とも関係しているでしょう。そのためには子どもらしい遊び心や自由な発想力、ひらめきを活かすことなどがポイントかもしれません。\nまた、水が凍るということは、水の象徴する感情が揺れ動かされない、ということでもあるでしょう。限定された状況を嘆いたり、落ち込んだりするのではなく「じゃあ、こんな風にやってみたら、どうだろうか」とアイデアを活かして、軽やかに対応するような姿勢が描かれているのかもしれません。\nこの度数を持っている人は、頭の回転が速く、アイデアも豊かで、柔軟性にすぐれています。どんな状況におかれたとしても、冷静にいまできることを見極めて、パパッと臨機応変に対応することができるでしょう。適応能力が高く、じっくりと考えこむよりも、その場の空気に合わせてアイデアを出しながら考えていくことが得意かもしれません。\n遊び心があふれていて、パッと思いついたことをやってみようとする好奇心もあるでしょう。また、それを他者に伝えることも得意で、どんな環境やメンバーにも上手に馴染んでいくことができるようです。"}, "双子座_25": {"sign": "双子座", "degree": 25, "symbol_ja": "大きなヤシの木を整えている庭師", "symbol_en": "A Gardener Trimming Large Palm Trees.", "key_phrase": "わたしたちの思考というものは、ある一定の環境下におかれると、いつも同じようなパターンで働くようになります。それはある種のストレスや軋轢を最低限に抑えるための工夫ともいえますが、あまりにも同じような判で押されたパターンを繰り返していると、知性の成長が止まってしまうでしょう。", "explanation": "ここではそんなパターンに陥っている自分を改めて見直して、一方向だけに成長したものを整え直して、自分を育て直そうとする試みが描かれているかもしれません。木を剪定するというのは、頭の中のシナプスを整え直そうとするようなもの。たくさん集まった情報や学んできたものをまとめ直し、整理して、必要なものに絞り込むことにも通じるかもしれません。\nまた、これはある種の矯正力としても働くため、一定の教育や考え方を他者に与えたり、いまあるバランスの悪いものを整え直そうとしたりする働きもあるでしょう。\nこの度数を持っている人は、自分自身と向き合って、欠けているところや、偏っているところを見直そうとすることがあるかもしれません。いままで学んできたものや、知り得た情報を整理することもうまく、自分の中でスマートに知識を体系づけることもできそうです。\nいろいろな物事を関連付けて考えて、自分で理解したことを他者に伝える力も持ち合わせているでしょう。人になにかを教えたり、バランスの崩れた物事を整えたりすることに従事する人もいるかもしれません。いずれにしても、客観的に物事を見て、分析することのできる知性の持ち主です。"}, "双子座_26": {"sign": "双子座", "degree": 26, "symbol_ja": "冬空の下で霜におおわれた木", "symbol_en": "Frost-covered trees against winter skies.", "key_phrase": "木は自然のサイクルにまかせておくと、どんどん豊かに生い茂っていきますが、やがて晩秋がやってくると、ばっさりと身につけた葉をすべて落とし、枝も最低限の長さにまで自然と絞り込まれていきます。そして寒い冬の季節のあいだ、その姿のまま、ジッと耐えて、その表面には霜がおおうことがあるでしょう。そのような木の姿を示しているサビアン・ワードです。", "explanation": "しかし、一見寒々としている木の内側では、やがて再びやってくる春に備えて、新しい芽を出す力が蓄えられているはずです。この木が示しているように、あちこちへ広がった知識や考えを一度ばっさりとすべて落として、本質に還ろうとすることが描かれているかもしれません。情報過多で頭でっかちになったものを、一刀両断することでシンプルな本質に立ち戻り、自分自身の基盤を再構築しようとするでしょう。\nこの度数を持っている人は、自分の内なる精神を充実させることに興味を持つかもしれません。外側で豊かに発展することよりも、ストイックに自分と向き合って、自分にとっての真実や本質をつかむことに惹かれるでしょう。\nそのため時に、他者から離れて自分の世界に入ったり、あえて情報から遠ざかって自分のなかでじっくりと探求したりすることもありそうです。あちこちに広がり過ぎた話や、多くなり過ぎた情報をシンプルにわかりやすくまとめる力も持ち合わせているでしょう。物事の本質を見極めて、少ない言葉や表現で核心を突くような鋭さの持ち主です。"}, "双子座_27": {"sign": "双子座", "degree": 27, "symbol_ja": "森の中の部族のキャンプから出てきている", "symbol_en": "ジプシー", "key_phrase": "変わり続ける環境で可能性をひらく人", "explanation": "ジプシーは一か所に定住することなく、各地を転々としながら流浪を繰り返していきます。このサビアン・ワードのジプシーは森の中に安住するという道を選ばずに、あえて安定のない刺激的な環境に身を置くことを選んだのでしょう。そうすることで、いつも世界に対して意識がひらき続けることになり、変化に対して柔軟に対応させられるような生き方をすることができます。\nある土地に縛られる生き方は安定しているかもしれませんが、ひとつのパターンを作り出して、考え方や価値観を偏らせることにつながるでしょう。自分の持っている可能性をひらき、多様な生き方に目覚めるために、あえて一か所にとどまらずに、さまざまな体験に身を置こうとすること。すると当然いろいろな出来事と遭遇する可能性がありますが、それこそ、この人の願ってもいないことといえるでしょう。\nこの度数を持っている人は、ジッとひとつのことに集中するよりも、あちこちへ出かけたり、いろいろなことを試してみたりしたがるかもしれません。面白く刺激的なものを求めて、自分の足で情報を集めようとするところもあるでしょう。好奇心が強く、どんなことでもやってみようとしたり、あまり馴染みのない異質なものにも興味を持ったりすることもありそうです。\n新しい考え方や生き方に興味を持って、実際にやってみることにもなりやすいでしょう。変化が多く、変わり続けることにこそ、人生の醍醐味を感じるところがあるかもしれません。"}, "双子座_28": {"sign": "双子座", "degree": 28, "symbol_ja": "過度な負債を抱えて破産した", "symbol_en": "個人に再びやり直す機会を与える社会", "key_phrase": "Opportunity To Begin Again.", "explanation": "いつも自由で軽やかでいることで進化を続ける人\n双子座はいつでも軽やかで自由にパッとひらめいたアイデアを試してみたり、気になったところへ出かけていったりして、楽しく過ごしていたい星座。過剰な責任や過度の期待を背負わされることは、個人を縛り付ける重荷となって、自由と軽やかさを奪うことになるでしょう。\nサビアン・ワードにある破産とは、そんな社会的な責任や期待を一旦リセットして、まっさらな状態にして、やり直すということ。実際の経済的な破産ということではなく、どちらかというと精神的な面での重荷から解放されるために、いまの立場や役割から離脱するということがほとんどでしょう。\nまた双子座の司る知的な分野での破産という意味でいうなら、行き過ぎた考え方や偏った知性のリセットともいえるかもしれません。\nこの度数を持っている人は、ひとつのことを何か集中して取り組んだあとで、まったく違うことへ方向転換したくなったり、違うやり方に興味を抱いたりすることがあるでしょう。これまで積み上げてきたものがあったとしても、ふいにそれを手放して、まったく違うやり方を始めたくなるかもしれません。\nいまある地位や役割にずっとしがみつくことなく、むしろ、しがらみやパターンができてくると、そこから離れて自由な立場に戻りたくなることもあるでしょう。その時々の自分のフィーリングに合わせて、あくまで自由で軽やかに柔軟な立場でいることが大切かもしれません。新しい考え方や価値観にも興味をもって、飛び込んでいくところがあるでしょう。"}, "双子座_29": {"sign": "双子座", "degree": 29, "symbol_ja": "春のはじまりを告げるモッキンバード", "symbol_en": "The first mockingbird of spring.", "key_phrase": "モッキンバードは和名『マネシツグミ』と呼ばれる鳥で、聞いた音がなんであっても真似して鳴くことができます。鳥は風の象徴でもあり、自由に飛び回って情報を伝達する役割があるため、スピーカーとしての働きがあるでしょう。", "explanation": "サビアン・ワードにある「春のはじまり」というのは、1年のはじまりであり「最初の」ということ。このモッキンバードは時代の流れや人々の心にあるものを敏感にキャッチして、なにかしらの言葉や情報といったものに変えて、多くの人たちに伝えることになるでしょう。人々の心や世の中の風潮から察せられたものを、なんらかの形に置き換えて広めていくようなスピーカーといえるかもしれません。\nこの度数を持っている人は、時代の空気や人々の雰囲気を読み解く力がすぐれていて、それを言葉に変換して伝えることができるでしょう。マスコミやライター、メディア関係などにぴったりで、誰よりもいち速く噂や情報をキャッチして、多くに広めていくことが得意かもしれません。時代の先端を先取りして、いまの雰囲気を示すのにぴったりの言葉を創り上げるような、流行を創り出す才能も持っているでしょう。\nまだ形にはなっていないけれど、漂っているものを、なにかしらの概念として受け取り、ふさわしい言葉で名づける才能です。人間は噂話をする力を身につけたことで進化したといわれていますが、そういった意味において、情報戦に強く、生き残る力のすぐれている人ともいえるかもしれません。"}, "双子座_30": {"sign": "双子座", "degree": 30, "symbol_ja": "大きなビーチの群衆の前で", "symbol_en": "パレードする水着の美女たち", "key_phrase": "新しい流行を創り出して人々に共感させる人", "explanation": "双子座は世の中や身のまわりで起こっていることを敏感にキャッチして、それを言葉に置き換えて、多くの人々に伝えることを目的としたサイン。情報伝達と関係しています。\nその集大成でもある最終度数のここでは、世の中の流れや風潮をいち早くとらえて、まだ誰も示していないうちに、それをみずから体現してみせる人を表しているでしょう。\n双子座は時代の雰囲気をつかんで、それを言葉に落とし込み、世の中に発信していく流行の作り手としての役割があるますが、それを先頭きって示していくようなポジションです。移り変わっていくものの象徴でもあるため、発信する内容はその時々で流れるように変化していくでしょう。\nしかし、それは確実に人々がいま求めているものの中心であるため、その心に突き刺さり、人目を惹きつけるような華やかさが満ちています。\nこの度数を持っている人は、時代の空気感を読み解く独自の感性を持っていて、それをなんらかの形として人前で示す立場になりやすいでしょう。頭の回転が非常に速く、スマートで、多くの人たちの心情に訴えるような表現能力を兼ね備えています。いまの時代を先取りして、反映するような、流行を生み出す力もあり、そこに人々の感情を上手に巻き込んでいくでしょう。\nサビアン・ワードにある大きなビーチとは、次のサインである蟹座が象徴する人々の情感の世界。そこに対して強烈にアピールする水着の美女たちが、大きな名声を得ることにもつながるでしょう。"}, "蟹座_1": {"sign": "蟹座", "degree": 1, "symbol_ja": "古い旗を降ろして", "symbol_en": "新しい旗を掲げる船の船員たち", "key_phrase": "土地の文化や伝統を新しい形で継承する人", "explanation": "牡羊座・蟹座・天秤座・山羊座という活動宮は、それぞれ春分・夏至・秋分・冬至という季節の変わり目に該当するサイン。これらは、これまでの流れが一旦終わって、まったく別の新しい流れがはじまる切り替わりポイントとなるでしょう。\n夏至にはじまる蟹座の最初に該当するここでは、これまでの牡羊座から双子座までの個人を強化していくプロセスが終わり、もっと大きな集合的な意識がひらかれていくことになります。\n四番目の星座である蟹座の定位置は4ハウス。これはわたしたちの足元にある地球を指していて、この母体とのつながりを強化していきます。蟹座のプロセスに入ると、わたしたちは一旦、個性を脇に置いて、まわりを取り巻いている社会や過去から続いている伝統や血族とのつながりいったものに価値を見出すことになるでしょう。\nこの度数を持っている人は、生まれ育った土地や、現在住んでいる土地に馴染み、その場所が持っている歴史や文化や伝統といった価値と同化していこうとするかもしれません。ある種の価値の継承者となりやすく、古くから伝わる伝承や文化を現在でも通用する新しい形で提示する役割を担うこともあるでしょう。同郷の仲間や伝統を大切にして、それらを引き継ぎ、みずから体現する可能性のある人です。\nサビアン・ワードにある船と船員たちは、大きな集合体の中で、同一の目的をもった運命共同体のようなもの。ある土地や文化を背景に、ひとつの目標を共有しながら、おたがいに助け合っていく関係におのずと巻き込まれていくことになるでしょう。\n**"}, "蟹座_2": {"sign": "蟹座", "degree": 2, "symbol_ja": "**", "symbol_en": "広大な陸の上に浮かぶ", "key_phrase": "A man on a magic carpet hovers over a large area of land.", "explanation": "生まれ育った土地やルーツの影響を色濃く受ける人\n魔法のじゅうたんに乗ると、住んでいる土地や国の全体を見下ろすことができるでしょう。俯瞰的に全体を把握する、仕組みを理解するといったことと関係するサビアン・ワードですが、それは蟹座の特徴である『伝統や文化や歴史を通じておこなわれる』ということ。個人のオリジナルな視点で世界をとらえるのではなく、自分の生まれ育った地域で当たり前のように根付いている価値観や考え方を用いて世界を理解しようとする試みです。\nその土地、その場所の持っている伝統ややり方や考え方をまるっと採用しながら、その地域を理解しようとすること。たとえば、ある土地へ出かけて行ったときに、旅行者の視点で自分の価値観と照らし合わせて、その場所を見るのではなく、ローカルの人たちの視点に立って、彼らの大切にしている価値観や世界観をそのまま共有することに通じるかもしれません。\n水のサインの特徴である「共感性」を用いて、そこにあるものをそのまま受け入れることだといえるでしょう。\nこの度数を持っている人は、土地や人に呼応する共感能力が非常に高く、郷に入ったら郷に従うことが難なくできるかもしれません。自分の生まれ育った土地や血族のルーツとのつながりが強く、特別に意識しなくても、それらからの影響を色濃く受けた考え方や物の見方をしやすいところがあるでしょう。\nもっと意識的に、先祖たちの生き方や営みを理解したり、その土地が持っている歴史や伝統や氏神さまの役割などを学んだりすることで、そこから受け継がれた力を使いこなせるようになりそうです。それらとの見えないつながりを強化することで『守られている』という感覚が一層、強くなるかもしれません。"}, "蟹座_3": {"sign": "蟹座", "degree": 3, "symbol_ja": "毛深い鹿をリードするファーをまとった男", "symbol_en": "A Man Bundled In Fur Leads A Shaggy Deer.", "key_phrase": "蟹座は、牡羊座からはじまった流れを断ち切って、
