らくほど、それは更に充実していきます。そしてオープンに他者と関わるほど、この人に惹かれる人も増えていくでしょう。"}, "天秤座_7": {"sign": "天秤座", "degree": 7, "symbol_ja": "ニワトリに餌をやりながら", "symbol_en": "鷹から守っている女性", "key_phrase": "ニワトリに餌をやりながら鷹から守っている女性", "explanation": "内なる世界を守りながら、少しずつ広げていくことのできる人\n天秤座は常に外の世界に開いていて、その交流が活発に繰り広げられているからこそ、道が開かれていき、多くのもの手にすることができます。そこには自分と他者との間において、お互いの願望を見出し、お互いに満たし合うような共有意識も働いているでしょう。\nしかし、そこで手に入れたものを守りたいがゆえに他者との交流を閉じてしまうと、どうなるでしょうか。サビアン・シンボルにあるニワトリも鷹も鳥の種類で、それは風が象徴しているものですが、鷹が空の高いところを悠々と飛びまわることに対して、ニワトリは地上で生きています。いまの暮らしや手に入れたものを守ろうとニワトリばかりを養育して、かつて自由に大空を飛び回っていた鷹を追い払ってしまうと、天秤座が外の世界との相互作用を失ってしまうことになるでしょう。すると途端にかつての仲間たちが離れていき、そしてそれは自分自身の生活を脅かす影となって、世界が狭く閉じられていくかもしれません。\nこの度数を持っている人は、対人関係に保守的な傾向があり、自分の小さな安定を守ることにエネルギーを注ぐことがありそうです。しかし、他者との交流を閉じてしまうと、それらは影となって穏やかな日々を脅かすものが出現しやすくなるでしょう。\nそれを避けて関わらないようにすることで安定した日々を手に入れることに成功するかもしれませんが、代わりに世界が閉じられていき、あらゆることが少しずつ停滞して、うまく運ばないことが増えていきそうです。\nそれを克服するためには少し危ない気配のする鷹とたまには交流すること。自分を守ることをやめて、広い世界に身をさらけ出すことで、より強い力が戻ってくることになるでしょう。"}, "天秤座_8": {"sign": "天秤座", "degree": 8, "symbol_ja": "さびれた家の中で燃え盛っている暖炉", "symbol_en": "A blazing fireplace in a deserted home.", "key_phrase": "他者との交流のなかで一度はあきらめ、そして復活する人", "explanation": "他者との交流の中で、自分の意思が明らかになっていき、そのことがそれを求めている人たちを引き寄せて、その願望の中で自身の意思が実現されていく、というのが天秤座の流れです。\nしかし、実現された途端にプラスの反響だけではなく、思いがけない反響がやってくることがあるでしょう。自分が良かれと思ってしたことが誰かの反感を買ったり、ライバルを生み出したりすることがあるかもしれません。そして何かをすると他者から叩かれることがあるのだと知ると、中には表に出ることを諦めて、内に引っ込むことを覚える人もいるでしょう。\n確かに他者と交流することをやめて外の世界とのつながりを閉じてしまえば、影と出会うことになります。だけれども代わりに日常がどんどん閉じていき、人生そのものが停滞することを体験するようにもなるでしょう。このまま沈んだ人生を送りたいわけではないのだと、自分の中に残った意志。それが住人のいなくなった家でも燃え続ける暖炉の炎であるのかもしれません。\nこの度数を持っている人は、人生の中で何かを成し遂げることとそれを手放すことを経験しそうです。何かを達成したときに、思いがけない反感にあったり、邪魔する何者かが現れたりして、それをあきらめ、手を引こうと思った経験もあるかもしれません。\nしかし、一度は諦めた夢も希望も、本当の意味で決別することはないのでしょう。心の内側では、本当の望みとつながっている意志が消えずに残り続けます。\nそれがある限り、諦めずに何度でもやり直すことができるでしょう。しかも再生したときには、以前よりもさらに強くたくましくなっているはずです。"}, "天秤座_9": {"sign": "天秤座", "degree": 9, "symbol_ja": "アートギャラリーの", "symbol_en": "特別室の壁にかかっている三人の巨匠", "key_phrase": "Gallery.", "explanation": "アートギャラリーの特別室の壁にかかっている三人の巨匠\n多くの人たちと関わることで自分の可能性を増やしていく人\n天秤座は外の世界に対して自分を開いていき、戻ってきた反響を通して今の自分のことを知り、そこからさらにまた磨きをかけていく星座です。そのためにはいつも同じ人とばかり交流するよりも、より大勢の人たちと関わったほうが、誰にでも通用するだけの人格を磨き、手に入れることができるでしょう。\nもともと風のエレメントである天秤座は、複数の意見や比較対象物があるほうが自分のことをより詳しく理解することができます。このサビアン・ワードでは、アートの世界で巨匠と呼ばれる三人の作品がギャラリーにかけられています。おそらく三人はそれぞれに際立つ個性と華々しい経歴とを持っているでしょう。\nどうやって巨匠にまで登り詰めることができたのか。どのように努力をして、どうやって報われたのか。何に苦労をして、どうしてそれを突破したのかなど、三人の異なるストーリーが人生を歩む上でのさまざまなヒントを与えてくれそうです。\nこの度数を持っている人は、人間の持っている可能性や選択に興味を持つことがあるでしょう。人があるときに、どのようにして困難を乗り越えたのか、いろいろな人たちの話を聞いて、自分を知るための手がかりにするかもしれません。多くの人たちの異なる体験の中の共通する真実を見つけ出すことが、自分の道を切り拓くためのヒントとなるでしょう。\nサビアン・ワードの巨匠が三人であるのは、異なる複数の体験が必要であるため。そしてそれらのヒントを得ることで、自分にとっての別の可能性を創り出そうとするためでしょう。"}, "天秤座_10": {"sign": "天秤座", "degree": 10, "symbol_ja": "狭い急流を通り抜けて", "symbol_en": "静かな水域に達したカヌー", "key_phrase": "狭い急流を通り抜けて静かな水域に達したカヌー", "explanation": "対人関係に揉まれることでうまくなっていく人\n川の流れに翻弄されて、アップダウンを繰り返すカヌーは、他者との感情的なやりとりや、人生のなかで起こる悲喜こもごもともいえるかもしれません。天秤座は自分と外の世界との関わりや、他者との関わりのなかで、バランスのいい着地点を見つけ出すサイン。狭く激しい急流を通り抜けるあいだはいろいろあったけれど、それが静かで落ち着いた水域に達したことで、その経験を冷静に見ることができるようになったのでしょう。\n人生における経験が少ないうちは、わたしたちはさまざまなことに一喜一憂して、相手の反応に引きずられることがあります。しかし、それらの経験を積み重ねていくと、なにが起こってもそれを一歩引いたところから落ち着いてみることができるようになり、容易にその感情に巻き込まれなくなるでしょう。\nこの度数を持っている人は、経験の少ない若いころに、他者に振り回されたり、人生で起こり得るさまざまなトラブルや困難にあって、落ち込んだりしたことがあるかもしれません。しかし、経験を重ねるうちに、次第にあらゆることを、距離をとってみることができるようになるでしょう。他者のどんな話にも自己投影せずに、落ち着いて受け止めることができるようになるかもしれません。\n誰かに肩入れしたり、批判したりすることもなく、いつでも心を安定させて、みんなと付き合うようになるでしょう。自分自身に起こるトラブルや悩みに対しても、感情的にならず、どこか客観的にとらえることができるようです。"}, "天秤座_11": {"sign": "天秤座", "degree": 11, "symbol_ja": "生徒たちを眼鏡ごしに見つめている教授", "symbol_en": "A Professor Peering Over His Glasses At His Students.", "key_phrase": "自分の知ったことを教え広めて世の中をよくしていきたい人", "explanation": "サビアン・ワードに教授とある通り、物事を人に教えることに適している度数です。これまで広げてきたさまざまな見聞を人に教えたい、伝えたいという気持ちが高まるでしょう。その背後には「これを知っていれば、みんな、もっと良くなることができるのに」という思いが隠されているのかもしれません。さらにその奥には、みんながそれを知ることで今の世の中を変えていきたいという、信念が含まれているのでしょう。\nこの度数の人が、なにかを教えるという行為には、そのような個人的な思いを超えて、世界を動かしていきたいという欲求が含まれていそうです。眼鏡越しに見つめているということは、生徒のひとりひとりをよく観察しているということを示しています。そのひとりひとりの理解力や知性のレベルに合わせて相手に寄り添った教え方ができる人ともいえるでしょう。\nこの度数を持っている人は、教育者や先生、インストラクターなど、人に教え導く素質がありそうです。「もっとこうすればいいのに」ということを教えたい気持ちが高まって、相手の興味や進度に合わせて伝えることもできるでしょう。先生などの直接教えるという職につかない場合でも、家族や友人たちに知ったことを教えたいという気持ちが高まりそうです。\nその時、自分の発したことによって相手がどのように反応するのかを見て、自分自身の表現力が磨かれていきそうです。伝えることを通して、存在意義を高めていくことのできる人だといえるかもしれません。"}, "天秤座_12": {"sign": "天秤座", "degree": 12, "symbol_ja": "山から出てくる炭坑夫", "symbol_en": "Miners Are Surfacing From A Deep Coal Mine.", "key_phrase": "集中力を発揮して、未知の分野の解明に挑む人", "explanation": "炭鉱夫が危険を冒してでも山に入るのは、そこに貴重な資源が眠っていると信じているからでしょう。鉱山にあるであろう、未知の宝物を掘り出しに行くのが炭鉱夫です。\nこの鉱山を人間に置き換えてみると、この度数の特徴が見えてくるかもしれません。\n未知のものに挑んで、それを解明しようとする人。注意深く炭坑を掘り進めるように、息をつめるような集中力を発揮することができるでしょう。\n未知の領域に眠っている知恵と向き合って、徹底的に掘り下げていくかもしれません。多くの学説や可能性の中で、真実がどこにあるのか、天秤座は天秤のバランスを取る調和点としての真実をあらゆるものの中に求めていきます。外にある未開の地を掘り進めることで、自分自身の中にある可能性をも同時に掘り下げることになるのでしょう。\nこの度数を持っている人は、研究者気質であり、どんな物事でも徹底的に解明したくなるかもしれません。自分なりに納得のいく真実をつかむまで、あらゆる角度から可能性を検証していくようなところがあるでしょう。\nサビアン・ワードにある山から掘り出されるものは原石ですから、それはそのままでは使うことができず、磨きをかけていく必要があります。高い精神力と抜群の集中力でそれを磨いていきますが、やり過ぎて体調を崩さないように健康管理に気を配る必要があるでしょう。\n時間はかかりますが、みずからの手で解き明かしたことに関しては大きな成果が得られるはずです。自分自身で見出した価値に徹底して磨きをかけていきましょう。"}, "天秤座_13": {"sign": "天秤座", "degree": 13, "symbol_ja": "しゃぼん玉をふくらませている子どもたち", "symbol_en": "Children blowing soap bubbles.", "key_phrase": "多彩なアイデアが次々と思い浮かぶ人", "explanation": "子どもたちが膨らませて遊んでいるシャボン玉は、角度によってさまざまな色に輝き、大きさもまちまちです。大きくて立派なシャボン玉ができたと思っても、それは瞬く間に消えてしまうでしょう。現れては消え、消えてまたすぐ現れるシャボン玉は、わたしたちの思いつきやアイデアを示しているのかもしれません。\nわたしたちの中にはひとつの物事をじっくりと集中して深く突き詰めていくような思考もあれば、おしゃべりをしながら次々と軽口をまくしたてるようにポンポンとノリツッコミをしていくような思考もあります。ここでは深刻にひとつのことを考えるのではなく、あえて軽やかに思いついたことをどんどんと口にすることで、ひとつの物事に対する多彩な見解やアイデアを広げていくことができるでしょう\n。\n天秤座にはひとつの真実を探求する側面もあれば、それをより深く理解するためにその持っている可能性のすべてを広げておこうとする面もあります。ここではできる限りの可能性を広く浅く思いつく限り、挙げていこうとするのかもしれません。\nこの度数を持っている人は、発想力が豊かで、さまざまなアイデアを次々と生み出すことができそうです。そのひとつひとつはたわいのないものかもしれませんが、思いついたことをどんどん口に出してみることは大切です。あなたの発想が伝播して、他の誰かのアイデアにつながるかもしれません。\nまた空想力が豊かで、いろいろと想像を張りめぐらせることも得意でしょう。思いついたそれらのものを、アートや文章で表現することもできるかもしれません。パパッと思いついたことを軽やかにまとめて発信することに適性があるでしょう。"}, "天秤座_14": {"sign": "天秤座", "degree": 14, "symbol_ja": "暑い正午の時間に昼寝する男", "symbol_en": "In The Heat Of The Noon Hour A Man Takes A Siesta.", "key_phrase": "自分でも気づかない無意識の領域から大きなヒントを得る人", "explanation": "正午というのは通常、人間の活動がもっとも活発になる時間帯です。ホロスコープ・チャートでいうなら\n天頂であるMCに該当する時間であり、社会的な活動に精を出すタイミングだといえるでしょう。\nしかしこのサビアン・ワードの男は、あえてその時間に昼寝をしています。これは頭を休めることによってアイデアを整理したり、問題を解決したりすることに通じるものがあるかもしれません。ひとつのことをずっと考え続けるよりも、そうすることをあえてやめて気を逸らしたり、別のことをしたりする方が、かえってそれをどうすれば良いかというヒントが湧き上がることがあるでしょう。\nそれは人の無意識の部分を積極的に活かす方法ともいえそうです。わたしたちの無意識の領域は、自分自身で気づいている以上の多くの情報を持っています。あえて知性の力を使うことを休ませて、それらの無意識の領域に働きかけると、思いもつかなかったやり方を得ることができる可能性をもしれません。\nこの度数を持っている人は、直感の力が鋭く、未知の物事に対して、無意識の領域から理解を深めることができそうです。そのためにはあえて集中して考えることよりも、別のことに気を向けたり、眠ったりすることが有効といえるでしょう。\n気になることがあるときほど、一旦そこから外れるということがポイント。考えを手放すと、夢でメッセージを受け取ったり、カードからヒントをもらったりすることもできるでしょう。\n顕在意識と潜在意識のあいだを行ったり来たりしながら、知性をグッと深めていくことができる資質の持ち主です。"}, "天秤座_15": {"sign": "天秤座", "degree": 15, "symbol_ja": "環状の道", "symbol_en": "Circular Paths.", "key_phrase": "繰り返しコツコツと反復しながら理解を深めていく人", "explanation": "環状の道というのは、らせん構造になっていて、規則正しい円形の道を繰り返しまわりながら、少しずつ上昇していくように作られたもの。同じようなリズムを刻み続けること、同じ作業を何度も反復することで、少しずつ全体のレベルが引き上げられていくということと関係するでしょう。\n道を歩くとき、わたしたちは右足と左足とを交互に出していく必要があります。片方の足を前に出したとき、もう片方の足を後ろに引くことで歩みは進むでしょう。\n異なる二つの部分を交互に使うこと......男性性と女性性、与えることと受け取ること、顕在意識と潜在意識、その対比の繰り返しがわたしたちを成長へと導きます。ひとつの学問についてインプットとアウトプットを繰り返すことで、それはやがて自分だけの深い理解として身につくでしょう。\nもっと自在に知識を扱い、ひとつの物事に対する見解を深めるために、同じことをコツコツと繰り返すことが役に立つはずです。\nこの度数を持っている人は、とても努力家であり、ひとつの知的体系を扱うために時間をかけて繰り返し、学び続けることができるでしょう。自分の内側から生じた理解と外側から与えられたものを対比して学んだり、ひとつのことを深く考えて、またそれらを潜在意識の領域で練り上げたりすることで、その分野の知識を自在に扱えるようにもなりそうです。\n時間はかかりますが、自分だけの道を作っていくことができる人です。時間をかけて大きな仕事を成し遂げることができるでしょう。"}, "天秤座_16": {"sign": "天秤座", "degree": 16, "symbol_ja": "嵐のあとで改造が必要となり", "symbol_en": "立てかけられているボート", "key_phrase": "嵐のあとで改造が必要となり立てかけられているボート", "explanation": "対人関係において悩まされた経験が糧となる人\n自分の内側にあるものを外の世界に対してオープンに開き、さまざまな人の意見や反響で生き方を変えていくのが天秤座の世界観です。しかしその時に、強烈に自己主張を押し付けてきて「絶対にそうするように」と強い意志を持って、迫ってくる人がいたとしたらどうでしょうか。あるいは言うことが定まらず、こちらに求めてくることが二転三転して、仮に何かを提案したとしても、また別のものが返ってくる人が相手だとしたらどうでしょう。\n他者との関係においてコミュニケーションをとりながら押したり引いたりするのが天秤座です。しかし、押されっぱなし、引かれっぱなしの相手につかまるとどうしていいのか、身動きがとれなくなるかもしれません。\nサビアン・ワードに描かれている嵐とは、関係性において何が起こるのかわからないままに巻き込まれていくような嵐。前にも後ろにも進めなくなって、改造する必要があることが、立てかけられているボートに示されているでしょう。\nこの度数を持っている人は、対人関係において振り回されたり、どうしていいのかわからなくなったりした経験が何度かあるかもしれません。そのたびにどんな距離感で、どのように接したらいいのか、わからなくなったことがあるでしょう。風のエレメントに属する天秤座は公平であることを大切にしますが、他者との関係でどういう風にそのバランスをとれば良いのか、悩むことにもなりそうです。\nしかし、この経験こそが、この人のカウンセラーとしての質を磨かせることになるでしょう。思い悩み、みずから改善してきたからこそ、対人関係の中で起こる問題にどう対応すれば良いのかが鍛えられたのかもしれません。\nまた、どのように自分を着地させれば良いのか、道を見失っている人に寄り添って、対話を重ねながら、ある方向を示すこともできるようにもなるでしょう。"}, "天秤座_17": {"sign": "天秤座", "degree": 17, "symbol_ja": "湾で出入りしている船を眺める引退した船長", "symbol_en": "A Retired Sea Captain Watches Ships Entering And Leaving The Harbor.", "key_phrase": "対人関係で傷つき、悩み、新しいやり方を見つける人", "explanation": "船旅には危険がつきもので、いつも思うようにうまくいくばかりではありません。天気が急に変わるかもしれないし、潮の流れも変わるかもしれません。船体のコンディションも何かの拍子におかしくなる可能性があります。そしてもし何かトラブルが起こったら、それは命の危機につながりかねないでしょう。\nもしトラブルが起こって、あまりの危機的状況にパニックに陥ったときは、一旦陸に引き上げて体制を整え直すことも必要です。ここでいう船旅とは、わたしたちが外の世界の大勢の人たちと関わっていく航海だということ。いろいろなタイプの大勢の人たちと共に何かを作り出し、何かをめざしていくのは、いつもうまくいくばかりではありません。時に意見の食い違いから、激しく傷ついたり、傷つけたりといったことが起こるでしょう。\nそんな時はその場から一度離れることで冷静な自分を取り戻し、何が起こっているのか、どうすれば良いのか、客観的に見てみることも必要かもしれません。\nこの度数を持っている人は、対人関係において、いつもどこか静かで客観的に相手のことや全体の様子を窺っていることがありそうです。その場を明確に分析して、何が起こっているのか、どうすればうまくいくのかということに常に気を配っているようなところがあるでしょう。\nそれゆえに自分自身が対人関係のいざこざに巻き込まれそうになったり、緊密な関係において身動きが取れなくなったりしたときは、さっと一歩退いて、そこから離れるようなところもありそうです。そして直接的に対話を重ねるのではなく、客観的に相手を理解したり、解決法を調べたりすることで、別のベストな道を探すことになるでしょう。\n人の心の動きや傷がどのようにできて、どのように癒されるのかということについて詳しくなるかもしれません。"}, "天秤座_18": {"sign": "天秤座", "degree": 18, "symbol_ja": "逮捕されたふたりの男", "symbol_en": "Two Men Placed Under Arrest.", "key_phrase": "世の中のマイノリティの人たちに注目する人", "explanation": "風のエレメントに属する天秤座は、公平性の質を持ち、あらゆる人たちのあらゆる考えを尊重しようとします。時にそれによって、振り回されることも生じますがと、ひとたびそれを許容することができたら、それよりも内側にあるものはすべて受け入れることができるようになるでしょう。\n世の中には「こうあるべき」「こうあるのが正しい」とされるものがたくさんありますが、その主流からはみ出した境界線の端っこにいる人たちに対しても理解を向けていくのが、このサビアン・ワードの特徴かもしれません。声の大きな人が場を制するのではなく、その場にいる全員の意見を尊重するのが天秤座にとっての正義。その内の誰かの意見が現状の社会の主流から外れている場合、大多数の人は眉をひそめるかもしれません。その少数派の意見を尊重しようとする人は、彼らと同じ仲間だと周りから見なされる可能性もあります。\nしかし、そういった人が増えることが、世の中から偏見を減らし、多様な生き方を広げるための一歩となるのでしょう。\nこの度数を持っている人は、さまざまな人の多様な価値を見出し、それらすべてを尊重しようとするようです。その中には社会的マイノリティと呼ばれるような人の意見であったり、新しい時代の最先端をいくような新しい考えを持っていたりする人も含まれるでしょう。\n社会の影にいる人たち、主流派の背後で声を潜めている人たちに気づいて、意見を交換し、より多彩な価値を見ようとするかもしれません。一風変わった人たちの話を聞くことで、人間の可能性をより大きく開いていこうとする気概に満ちているでしょう。"}, "天秤座_19": {"sign": "天秤座", "degree": 19, "symbol_ja": "隠れている泥棒集団", "symbol_en": "A gang of robbers in hiding.", "key_phrase": "現在では主流ではないアンダーグラウンドとつながる人", "explanation": "まだ日の目の当たっていない、だけれども価値あることを志している人たちを応援したり、みずからその一員となったりするサビアン・ワードです。泥棒集団というのは社会から見たら影の存在ですが、そこには社会に対する反骨精神や反発力があるでしょう。\n天秤座という星座は、世の中のあらゆる価値を等しく認めて、そこにあるものが何であれ、同じテーブルにつかせていきます。マイノリティであったものも、価値を認められるという扱いを受けることで、いまだ隠されている他の似たような境遇の人をあぶり出すことにつながり、それはいずれ、誰からも認められるものへと成長することができるかもしれません。\nまだ世の中には出ていないけれど、価値がありそうにものをいち早く見つけたり、あるいはマイノリティな存在で自分をどのように打ち出せば良いのかわからない人たちとつながったりするかもしれません。\nこの度数を持っている人は、すでに市民権を得て人気を博しているものよりも、マニアックなものやマイノリティなものに興味を持つことがありそうです。華々しく活動するよりも、小さなグループで世の中の主流とは異なる流れを作り出そうとするかもしれません。\n同じような価値観の仲間を見つけ出すこともうまく、横のつながりをじわじわと広げて、その活動領域を増やしていくでしょう。現代の華やかな光の背後に隠された社会の裏の顔や、そこで息を潜めて活動している人たちの心の機微に関心を寄せることになりそうです。"}, "天秤座_20": {"sign": "天秤座", "degree": 20, "symbol_ja": "任務を遂行しているラビ", "symbol_en": "A Rabbi Performing His Duties.", "key_phrase": "いかなるときも淡々と自分自身の信念を貫く人", "explanation": "ラビとはユダヤ教の聖職者。厳しい戒律を守りながら人々に神の教えを広め、導く存在です。\nユダヤ人はその歴史の中で迫害をくり返された民族。土地を追われ、人から差別されることがあったとしても、ラビたちはみずからの神の教えをいついかなるときも守り続けてきました。土地をなくしたユダヤ人たちは、頼りになるのは自分自身の能力だけだと言わんばかりに、各分野において、とても有能なスペシャリストとして活躍しています。\nまわりからどのように扱われ、どんな状況にあったとしても、自分の信念を貫き、その最善の能力を発揮すること。天秤座はまわりと調和することを示すサインですが、それは決して迎合することを表しているわけではありません。むしろ、みずからを信頼して、しっかりと意志を主張するからこそ、相手のことも尊重できるのでしょう。\nこの度数を持っている人は、自分の信念を大切にし、どんな状況であったとしても。それを貫いていく力を秘めているようです。自分の信じた道をまっすぐに突き進んでいく純粋さがあり、それが自分自身の意志と力とになるでしょう。\n最初は認められなかったものであっても、くり返していく間にプロフェッショナルとして通用するような才能と育っていき、やがてはそれが自分自身を支えてくれるかもしれません。そして自分が手応えを得るほどに、まわりもあなたを認めてくれるようになるでしょう。\n時間をかけて、自分だけの才能を開花させることができる人です。"}, "天秤座_21": {"sign": "天秤座", "degree": 21, "symbol_ja": "日曜日のビーチを楽しむ群集", "symbol_en": "A Sunday Crowd Enjoying The Beach.", "key_phrase": "どんな人とも偏見を持たずに付き合うことのできる人", "explanation": "日曜日のビーチには、大勢の人たちがさまざまな目的を持って遊びにやってきます。デートにくるカップルも、子どもを遊ばせる両親も、ナンパ目的の若者も、泳ぎの練習をしにくる人もいるでしょう。\nこのサビアン・ワードが象徴しているのは、そのような多彩な人々をドーンと受け入れるビーチ。大きな包容力があり、どんな人がやってきたとしても、受け入れるだけの器の底知れぬ広さがあるでしょう。\n天秤座は自己存在が外の世界に向かって開かれていて、まわりからやってくるものに応じながら自分の立ち位置を変えていく星座です。天秤座の半ばで影の存在やマイノリティなものともつながりができたため、ここではどんな立場や個性の人であっても公平に扱い、受け入れることができるようになったのでしょう。\nこの度数を持っている人は、広い視野とバランス感覚を持っていて、出会う人が誰であれ、にこやかに受け入れて、仲良く付き合うことができそうです。非常に高い対応力と社交性の持ち主で、どんな人にも振り回されずに、バランスをとりながら関係を築けるでしょう。多少変わった人や、大人数が相手の場合でも、うまく対応できそうです。\nむしろいつも同じ仲間とだけ過ごすよりも、さまざまなタイプの人たちと共に過ごすほうが、結果として充実するようです。海は集合無意識の象徴でもあるので、心理学に興味を持つこともあるでしょう。\nどんな人とも付き合うため、コミュニケーション・スキル全般にも長けてくるはずです。"}, "天秤座_22": {"sign": "天秤座", "degree": 22, "symbol_ja": "噴水で鳥に水をやっている子ども", "symbol_en": "A child giving birds a drink at a fountain.", "key_phrase": "まわりの人たちに癒しとくつろぎを与える人", "explanation": "噴水は都会の中で人工的に作られた公園などにある癒しの場。コンクリートばかりの街の中で噴水の存在は、ホッとしたくつろぎを人々の心にもたらすでしょう。\nその噴水で子どもが鳥に水をやっています。鳥は風のエレメントの象徴で、自由にあちこちを飛びまわり、みずからの見聞を広げて、人や物事とのつながりを作り出すでしょう。鳥が水を求めて噴水にやってきたということは、そんなに日常に少し疲れているのかもしれません。\n子どもは純粋な優しさや思いやりを持って鳥に寄り添って、必要なだけの水を与えているのでしょう。これは心の潤いや癒しと関係しています。しかもそこに特別な意味や欲はなく、純粋なやさしさからそれを必要としている人に寄り添い、与えることができるのでしょう。\nこの度数を持っている人は、どこか人をホッとさせるような、癒しの雰囲気があるようです。天秤座は自分ひとりでは人生が立ち行かないことを知っています。お互いに支え合い、求め合うことで世界が成り立っているため、みんなの幸せやくつろぎが自分の喜びとなり得るでしょう。\nですから、なんとなく疲れている人や他者の助けが必要な人がいると、おのずとそこに気づくかもしれません。そしてごく自然に寄り添って、相手に必要なものを自分ができる限りの方法で差し出すことができるでしょう。\nなにか癒しのスキルを身につけている人もいるかもしれません。とても感受性が豊かなので、アーティストとしての才能もあるでしょう。"}, "天秤座_23": {"sign": "天秤座", "degree": 23, "symbol_ja": "夜明けを告げるおんどりの声", "symbol_en": "Chanticleer\\'s Voice Heralds Sunrise.", "key_phrase": "世の中の変化の流れをいち早く察して伝える人", "explanation": "夜明けの到来と共に鳴き声を響かせるおんどりに、私たちは起こされます。まだ人々が眠っている払暁の時間を、おんどりはいち早く察して、みんなに知らせるでしょう。\n鳥は風のエレメントの象徴であり、自由に飛び回ることで情報を集めて、またそれを知らせてまわります。\n天秤座は個人を社会全体に明け渡すことで人格に磨きをかけていくサインですが、大勢の人たちと付き合っていくうちに、世の中の流れや気運のようなものを、つかめるようになったのでしょう。世の中で何かが始まろうとするとき、あるいは何かが変わっていこうとするときに、その予兆のようなものを誰よりも早く察して、伝えていく役割があるかもしれません。そのため、いつも情報の最先端にいて、みんなを導くような立場にもなりやすいでしょう。\nこの度数を持っている人は、時代の波や流れをいち早く読み解く能力を持っているようです。そして世の中の変化を感じたときに、それをみんなに伝えて、先導していくような役割につくこともあるでしょう。\n一から自分で何かを立ち上げるわけではありませんが、何かが起こりそうな流れを察して、盛り上げていくため、結果的にまわりからはリーダーシップをとっているように見られることが多くなりそうです。実際にその先見の明を活かして、みんなに何かを伝えたり、方向性を示したりといったことができる人です。\n何かと重要な転機のときに立ち会うことが多くなり、おのずとまわりから注目されることも増えるでしょう。"}, "天秤座_24": {"sign": "天秤座", "degree": 24, "symbol_ja": "左側に三枚目の羽を持つ蝶", "symbol_en": "A Butterfly With A Third Wing On Its Left Side.", "key_phrase": "蝶が持っている羽は通常、左右対称の二枚ですが、このサビアン・ワードの蝶は、さらに三枚目の羽が体の左側についています。この羽は人間の身体でいうならばオーラのようなもので、はっきりと目に見えるわけではありませんが、強い光に当ててみると、ぼんやりとその輪郭にそって光って見えるものが感じられるでしょう。それは生きているすべてものが発しているエネルギーともいえるかもしれません。", "explanation": "そして体の左側というのは通常、女性性が象徴する場所であり、受容する質。ここにもう一枚羽があるということは、目には見えないエネルギーや雰囲気を察して受け取る能力が際立っているといえるかもしれません。\nわたしたちが表面上、見せているものと、その本質で感じていることがズレるということはしばしば起こります。わたしたちは社会通念上、自分で感じていることよりも、その場にふさわしいことを優先してしまうことがあるでしょう。しかしこの三枚の羽を持っている蝶は、そのズレをすばやく察するかもしれません。\nこの度数を持っている人は、非常に感受性が鋭く、目には見えない雰囲気や本質を感じとることができるでしょう。しばしば表面で起こっていることとは別の、もっと深いところの本音にも気づくかもしれません。そしてひとたび、それに気づいてしまったら、もうそれに気づかないフリをすることはできなくなるでしょう。\nそのためにまわりの人たちとズレを感じたり、自分だけがまわりの流れに合わせられないと感じたりすることも起こるかもしれません。\nしかし天秤座にとって大切なことは、自分のハートに正直に生きること。たとえまわりと違っていたとしても、自分を貫くことが結果的に良かったと思うことになるでしょう。\nまたアーティスティックな感性にも、恵まれるので芸術の分野に適性がありそうです。"}, "天秤座_25": {"sign": "天秤座", "degree": 25, "symbol_ja": "巡礼者に生と死の謎を", "symbol_en": "唐突に啓示する秋の葉の光景", "key_phrase": "The Mystery Of Life And Death.", "explanation": "巡礼者に生と死の謎を唐突に啓示する秋の葉の光景\n宇宙の流れやサイクルを自然とキャッチできる人\n秋になると樹々の葉が次第に色づきはじめます。それは自然の原理ですが、そこに特別な意識を向けない限り、なんとなく「ああ、もう秋だなあ」と思うぐらいで、気を留めることがないでしょう。\nしかし、そこにしっかりと焦点を合わせて眺めてみると、樹や枝葉に流れている生きたエネルギーや、その流れが形状化されたデザインや、気温の変化によって生じる葉の移り変わる姿に、この宇宙の法則や一定の生命体の流れを読み解くことができます。\n毎日の暮らしのなかにある、ひとつひとつの物が、すべてその原理に貫かれているのだとしたら、目に見える現象と、その背後にある目には見えない命の流れとを同時にとらえることができるでしょう。\n目に見えるものの、背後にあるもの。それに気づき、読み解くことで、宇宙エネルギーのサイクルが理解できるようになるかもしれません。\nこの度数を持っている人は、非常に観察眼が鋭く、そこで表現されているものの背後にある意図を解き明かそうと試みるでしょう。見たまま、聞いたままの一辺倒のとらえ方はせずに、何事に対しても裏から見たり、斜めから見たりして、その全体を広く観じようとしそうです。\n世の中に流れている自然のサイクルやその法則を理解して、感じ、人間の考え出した秩序の背後にある、それらを同時に見ているようなところがあるでしょう。意識は自然と共にあって、ナチュラルでロマンティックな一面もありそうです。\n感性と知性とがバランスよく働く観察者といえるでしょう。"}, "天秤座_26": {"sign": "天秤座", "degree": 26, "symbol_ja": "お互いに入れ替わる鷹と大きな白い鳩", "symbol_en": "An Eagle And A Large White Dove Change Into Each Other.", "key_phrase": "内なる硬軟を自在に使い分けることのできる人", "explanation": "タカ派・ハト派という呼称があるぐらい、鳥のなかでも鷹と鳩は真逆の質を持っているシンボルとして認識されています。鳥は風のエレメントの象徴で、悠々と自由に空を駆けめぐり、多彩に見識を広げ、見知ったことをまわりに伝えていくでしょう。\nしかし鳩が愛や平和や知性を象徴して、ゆるやかにつながりを広げ、愛を拡散していく質があるのだとしたら、鷹は一点集中してターゲットをとらえ、深く核心をつかんで離さないような質があります。柔らかさと硬質さ、受容性と能動性、拡散と集中という対比が浮かび上がってくるかもしれません。\nその鷹と鳩がお互いに入れ替わるということは、このふたつの質を交互に使いこなすことができるかもしれない......ということ。自在に緩急を使いこなすことで、さまざまなことを成し遂げられるかもしれません。\nこの度数を持っている人は、状況に応じて自分自身を変えることができるでしょう。強い意志の力を発揮してより深く極めたり、行動したりすることもできそうですし、柔らかくまわりの人たちとつながって、相手を受け入れることもできそうです。\nそのどちらか一方に偏るのではなく、集中したり気を緩めたりといったことを交互に繰り返すのがベター。リーダーシップもとれるし、他者のフォロー役にもなれるあなたは、どこへ行っても重宝される存在となるでしょう。\nみんなから離れてひとりになる時間と、みんなと交わって賑やかに過ごす時間との両方が必要かもしれません。"}, "天秤座_27": {"sign": "天秤座", "degree": 27, "symbol_ja": "澄んだ空の中を高く舞う飛行機", "symbol_en": "An Airplane Sails, High In The Clear Sky.", "key_phrase": "何事も客観的に俯瞰して、全貌を把握する人", "explanation": "天秤座は世界の中に自分自身を明け渡して、それがさまざまな人に投影される姿から、自分を知り、自分を磨いていく星座。また同時に多くの人たちとつながり、その多彩な価値観に触れることで、どのような考えに対しても公平な見方をすることを学んでいきます。\nそして多くの見解の中に共通する調和点を見つけ出すことも天秤座の働きです。ひとつの素材を使ったレシピは多くあれど、どのレシピにも共通していえることは「美味しく食べたい」かもしれません。社会に対するさまざまな意見があったとしても、その共通点は「もっと良い社会にしたい」かもしれません。そのような、ある物事に関する共通の調和点を見つけるためには、細部に入っていくよりも、引いていって、全体を観察する必要があるでしょう。\n高く舞う飛行機は地上から距離を取ることで全体を観察することができます。よく晴れている澄んだ空からは、日常の様子を客観的に俯瞰することができるでしょう。\nこの度数を持っている人は、何事に対しても、それがどのようになっているのか、その全貌をとらえようとするかもしれません。そのためには自分が関わっていることに対しても、どこか客観的でいるようなところが必要です。\n話の細部に没入せず、特定のものに共感しないため、まわりの人たちからはクールに見られることもあるかもしれません。日常的なことよりも、物事の全体を動かしているものがなんであるのかということに興味を抱きやすいでしょう。\n全体の流れや雰囲気を把握し、理解することのできる才能を持っています。"}, "天秤座_28": {"sign": "天秤座", "degree": 28, "symbol_ja": "周囲を取り囲み、", "symbol_en": "助けてくれている霊的な力に", "key_phrase": "A Man Becoming Aware Of Spiritual Forces Surrounding And Assisting Him.", "explanation": "周囲を取り囲み、助けてくれている霊的な力に気づいている男\n人間の環境を取り巻いている大きな力に関心を向ける人\n天秤座は自分の存在を、その個性を通して大勢の人たちにさらすことで、多くの人の価値観による反響をその鏡として受け取り、またそこに共通する普遍的な調和点を見つけてきました。ここでは、その調和点に対する逆の視点が開かれていきます。\nさまざまなことを多くの人たちから学んできた天秤座ですが、それらの価値は結局、いまの時代を生きている人間が作り出したものに過ぎないということに気づいたのでしょう。\nでは、それらの人間の価値をなにが作り出しているのかというと、その環境や、季節の移り変わりや、大きなエネルギーのめぐりなど。そういったものに気づき始めると、結局、人間に共通している意識は、全体のなかの部分に過ぎないということが、見えてくるかもしれません。すると興味の対象が変わっていき、人間の心のなかに真理を求めることをやめて、もっと大きな世界を動かしている力や宇宙の原理のようなところへ関心が向けられるようになるでしょう。\nこの度数を持っている人は、目には見えない大きな力に気づいていて、わたしたちを創造している原理に興味が向くかもしれません。個人の小さな話よりも、もっと大きな視野での心理や普遍性に関心が寄せられるでしょう。\n大きな視野でとらえた時に、自分自身も含めて、個人の体験や感情には、たいして重要な意味など、まるでないように感じることがあるかもしれません。そのような個々の違いを超えていったところにある、大きな共通項に意識が向けられるでしょう。"}, "天秤座_29": {"sign": "天秤座", "degree": 29, "symbol_ja": "世代間の知識の橋渡しをする人類", "symbol_en": "Mankind\\'s Vast And Enduring Effort To Reach For Knowledge Transferable", "key_phrase": "世代間の知識の橋渡しをする人類", "explanation": "世代を超えた人類の歴史のなかに普遍的な価値を見出す人\nひとつの文化はその時代をその場所で生きている人たちが作り出しています。それが社会によって支えられるようになると、ひとつの文明として華やかにひらかれていきますが、それは永遠に続くことはなく、時代の移り変わりと共に終焉を迎えることになるでしょう。そしてまた別の時代、別の都市において新たな文明が起こり、また滅んでいく......ということが、世界中のそこかしこでくり返されています。\n遠い過去にあった文明が滅んでなくなったとしても、その記憶は残り、わたしたちのあいだで世代を超えて、その歴史に刻まれていきます。残された記憶を手がかりに、わたしたちは過去の人々がどのような意識と価値観を持って暮らしていたのかを知ることができるでしょう。\n天秤座は大勢の多彩な人々の価値に触れることで、その普遍的な真実を探っていく星座です。ここでは時間と空間の枠が外れて、その普遍的な価値をより大きな人類の軌跡に見出していくことになるでしょう。\nこの度数を持っている人は、歴史や文化に興味を抱き、これまで人類がどのような意識で生きてきたのか、時代と空間を超えて知りたいと思うことがありそうです。個人のひとりひとりの思考よりも、そこにどんな思想が働いていたのかということに関心を持つかもしれません。\nそしてそこに現代人と共通しているものを見つけ出すことで、人間の普遍性についての理解を深めることができるでしょう。\n多くの知識を学び、またそれを伝承する立場にもなりやすいようです。"}, "天秤座_30": {"sign": "天秤座", "degree": 30, "symbol_ja": "哲学者の頭にある三つの知識のこぶ", "symbol_en": "Three mounds of knowledge on a philosopher\\'s head.", "key_phrase": "内なる調和がとれて、あらゆる物事を識別する人", "explanation": "天秤座は誰にも、何にも肩入れすることのない識別能力を手に入れることと関係しています。世の中にはさまざまな価値観が行き交い、ひとつの問題に対して複数の意見や見方がありますが、決してその内のいずれかが正しいわけでも、間違っているわけでもなく、ただそういった多様な価値が同時に存在している、ということを天秤座で学んでいきます。その背後には一貫した自然界の法則やエネルギーが流れていて、ひとつの現象はそのなかで起こる無数のバリエーションのひとつに過ぎないのだということを理解するのでしょう。\nサビアン・ワードにある「三つのこぶ」というのは、わたしたちの内にある「感覚・感情・知性」といえるかもしれません。身体・心・思考ともいえるでしょう。\nそのいずれにも肩入れせず......つまりは同化せずに、バランスよく、この三つを使いながら統合していくということが、わたしたちが調和的な人間としてめざしていくことかもしれません。\nこの度数を持っている人は、あらゆることに対してバランスが良く、調和的であるでしょう。自分のなかの体感覚と感情、それから思考の動きをいつもどこか客観的に見ているようなところがあり、そうであるがゆえに、そのいずれとも同化することがありません。\n武道の世界などでも心・技・体を極めることが理想とされますが、身体と心と思考のバランスをとることは、人間としてめざしていくひとつの理想の姿といえるでしょう。\n識別能力が非常にすぐれて、なにを見てもそのまま「単なる事実」として認識する能力が際立つようです。"}, "蠍座_1": {"sign": "蠍座", "degree": 1, "symbol_ja": "街の道を行く混んだ観光バス", "symbol_en": "A Crowded Sightseeing Bus On A City Street.", "key_phrase": "他者と一体化して成し遂げることの喜びを知る人", "explanation": "ある観光ツアーの内容に惹かれて各地から集まってきた人たちが、ひとつの大型バスに乗り込んで、さまざまな体験を共有しているうちに、次第に打ち解けあっていきます。最初はどこかよそよそしくても、同じ体験をして、似たような感情を味わっているうちに、そこに共感が生まれて、ついには「あの体験を共にした仲間」というような気分になるかもしれません。深い旅を共に味わい、否応なく、その本音を語り合うことになった仲間とは強い絆で結ばれて、その後も関係が続いたり、思い出すたびにおもしろおかしく感じたりすることがあるでしょう。\n蠍座は他者と深く関わることを通して自分にないものに気づき、またそれを補完しあうことを目的としたサイン。自分の一部を満たしてくれる相手とひとたび巡り合ってしまうと、わたしたちは彼らから離れることができなくなるでしょう。\nそれに気づくためには、何か特別な体験を共に過ごすという時間が必要となるのかもしれません。\nこの度数を持っている人は、他者と共に何かをするということの喜びを知っているでしょう。どこかのタイミングで誰かと強制的に関わって、一緒の時間を過ごすことになったとき、そこにある苦労も、それを乗り越える達成感も、共に味わうことになります。\nそこで得られる深い結びつきや信頼、愛情......決してひとりではできなかった事を成し遂げるという喜びをひとたび知ってしまうと、もう何をするにしても、ひとりでするのは物足りなくなってしまうかもしれません。\n他者とのあいだに深い結びつきを作り出すのが、蠍座という星座です。"}, "蠍座_2": {"sign": "蠍座", "degree": 2, "symbol_ja": "倒れて割れた香りの漂っている繊細な香水ビン", "symbol_en": "A Delicate Bottle Of Perfume Lies Broken, Releasing Its Fragrance.", "key_phrase": "他者と本音でぶつかることを繰り返す人", "explanation": "自立している香水瓶が、わたしたち、ひとりひとりの心だとすると、それがここでは倒れて割れてしまい、しかしそのために、その中に詰められた香りが漏れ出てまわりに漂っています。これは香水瓶を、心から本音が漏れてしまった状態に喩えているのかもしれません。\n天秤座で知り合った多種多様な価値を持った人々や、世界に存在するさまざまな価値と、心から深く結びついていくのが蠍座の世界です。わたしたちは、ひとりひとりが異なる個性を持っていて、天秤座ではお互いにそれを尊重し合ってきました。\n蠍座の段階になると、自分の持っていないもの外側の多様な価値の中に見出し、それを取り込むことで、自分の一部にしようとする動きが起こります。そうすることで自分ひとりでは成し得ない大きな物事を実現させることができるようになるでしょう。お互いの存在の一部が相手にとっての自分自身の一部となるために、天秤座では尊重されていた心の境界を壊すことがここでは起こるかもしれません。\nこの度数を持っている人は、他者との間で本当に深い交流を求めて行動することになるでしょう。表面的な思いを語るのではなく、そこにある本当の本音を話したいと望み、また相手にもそれを見せて欲しいと願うかもしれません。\nわたしたちが本当の本音を明かすためには、ある程度の追い詰められるような状況が必要です。環境の中で本心を言わざるを得ないような苦しさがやってきたときに、わたしたちは本音を漏らすことになるでしょう。\nセラピーや心理学と関わることもありそうです。"}, "蠍座_3": {"sign": "蠍座", "degree": 3, "symbol_ja": "隣人たちが協力する小さな村の棟上げ式", "symbol_en": "A house-raising party in a small village enlists the neighbors\\'", "key_phrase": "隣人たちが協力する小さな村の棟上げ式", "explanation": "仲間と協力し合って大きく成長していく人\n蠍座は自分と他者との人格の境目がなくなるような体験をすることで、自分ひとりでは持てなかった大きな力を手に入れて、達成の喜びを味わうサイン。他者と一体化して協力することで、ひとりの人間の限界を超えることができるでしょう。\n家を建てるという作業は、決してひとりでできることではありません。ましてや小さな村であれば、おたがいにおたがいの家づくりを手伝うことで、村全体の安全な暮らしが保証されるでしょう。\nそういう村にあっては、住人のすべてが運命共同体。苦労を分かち合うことで、それを乗り越えたときの喜びや達成感も大きくふくらむでしょう。\nこの度数を持っている人は、仲間と一緒になにかを達成することで大きく成長するようです。チームプレイのなかで自分の役割を見出し、それをしっかりとこなすことで仲間から認められて、それが自信にもつながっていくでしょう。\n共同作業することで、自分ひとりではやらなかったようなことにチャレンジする機会にも恵まれて、そのなかで未開の能力が磨かれていくかもしれません。多少の困難があったとしても、仲間と一緒であれば、乗り越えようとする力が強くなり、その先のゴールに行き着いたときに、ひとりでは得られない喜びに満たされそうです。人と協力し合うプロジェクトや、なにかを創り上げることに適性があるでしょう。\n構造を理解することとも関係しているため、さまざまな思想体系や精神世界のしくみにも興味を持つかもしれません。"}, "蠍座_4": {"sign": "蠍座", "degree": 4, "symbol_ja": "祈祷の儀式のために", "symbol_en": "火のついたキャンドルを運ぶ若者", "key_phrase": "祈祷の儀式のために火のついたキャンドルを運ぶ若者", "explanation": "秘密の深い関係を持つことに充実を感じる人\nある宗教的な儀式のために若者がキャンドルを運んでいる、サビアン・ワードです。おそらくその儀式は、同じ意思を持った仲間だけが参加を許された特別なものでしょう。ひとたび、そのような秘密の儀式に参加すると、仲間の結束が強固に結ばれていき、その共通項となっている教義や価値観が自分の隅々にまで入り込むことになるかもしれません。何かに入信する、特定の誰かと深く関わるということは、このような通過儀礼を通り抜けることであるのでしょう。\n蠍座は自分と他者の間に深い結びつきを作り出していく星座。宗教儀式に限らず、ある人や仲間たち、あるいは物事に対して深く関わっていき、そのすべてと自分自身とを同化させていくようなことが起こるでしょう。表からは計り知れない秘密と特別な時間を分かち合った相手とは、心の深いところで結ばれることになるかもしれません。特定の深い結びつきを持った恋人同士にも、こういう側面があるでしょう。\nこの度数を持っている人は、何かの対象に深く入り込み、それとどっぷりと関わることで、大きな充実感を得ることになりそうです。その対象は恋人であったり、何かのチームやグループであったり、研究であったりするかもしれません。\nそれが何であれ、一途に没頭するような真摯さがあり、それが強く発揮できるほど、気持ちが満たされるでしょう。\n若者が持っているキャンドルの炎は、心の中に宿る意志の強さ。情熱をひたむきに傾けることができる人です。"}, "蠍座_5": {"sign": "蠍座", "degree": 5, "symbol_ja": "巨大な岩場の海岸", "symbol_en": "A Massive Rocky Shore Resist The Pounding Of The Sea.", "key_phrase": "人への深い失望から心の仕組みを理解する人", "explanation": "感情のかたまりの象徴である大きな波は、海岸の岩場にぶち当たると砕け散ります。蠍座に入って、お互いに心を許し、深い共感を得た仲間たちと出会いましたが、その心の奥には、決して簡単に分かり合うことのできない何か意志のようなものがあることに気づかされるかもしれません。\nさまざまな体験を通して、深いものを分かち合うことができたと思ったのに、さらに分け入ろうとしたとき、人の個性を作り出している人格には、経験と環境からの影響によって積み重ねてきた、決して容易には変えることのできない意志のようなものが、その心の奥に備わっていることに気づくでしょう。あんなに深く共感したと思えた相手の中に、容易に溶けることのない自我の部分を認めると、なんだか急に相容れないものと出会ったようなショックを覚えるかもしれません。人と人とが本当の意味ですべてを共感し合うことはできないかもしれないと、打ちひしがれるような気持ちにもなり得るでしょう。\nこの度数を持っている人は、どんなに頑張って心を寄せたところで、思いが通じない、気持ちを浸透させることができないという体験をすることがあるかもしれません。どこか裏切られたかのような、人の心は信用できないといったような気持ちになることさえあるでしょう。\nだけれども一時的に打ちひしがれて、人に対して不信を抱いたとしても、決してそこに諦めを持つわけではありません。むしろ、その経験は人間の心や個性がどのように成り立っているのかということへの理解に向かわせることになるでしょう。\nそして人の心の複雑な成り立ちを知ることで、改めて別の角度から他者との共感を得るのかもしれません。"}, "蠍座_6": {"sign": "蠍座", "degree": 6, "symbol_ja": "男たちを生まれた土地から引き離す", "symbol_en": "ゴールドラッシュ", "key_phrase": "男たちを生まれた土地から引き離すゴールドラッシュ", "explanation": "深い自己変容を体験する人\n一攫千金を夢見て、何もかも放り出し、故郷を飛び出して夢に身を投じるのがゴールドラッシュです。\n蠍座は心の深いレベルから共感することを求める星座ですが、出自がそれぞれ異なれば、どこか共感しきることのできない壁があることを痛感しました。それならば未来に対する夢を分かち合い、過去からの流れをすべて断ち切ることで、新しい深い共感状態を作り出そうとするのがこの度数の特徴といえるかもしれません。\nそのためには過去や現状がどうであれ、未来に対する夢や野心の中に全身全霊をかけて突っ込んでいくような覚悟が必要となるでしょう。何かを残し、守ったままでは新しい可能性のすべてを切り拓くことはできません。自分にとって価値のある未開拓のゴールドを掘り出すためには、見果ての領域の新しい可能性の中に身を投じることが欠かせないのでしょう。\nこの度数を持っている人は、自分の欲望に忠実で、ひとたび何かを信じるものか出てくるとその道をひたすら突き進んでいくような猪突猛進なところがありそうです。そして「これをつかむ」と決めたことを、何があっても、やり抜いて成果を必ずあげるだけの根性も備わっているでしょう。\n夢に突き動かされるような激しい情熱の持ち主です。なりふり構わなくなるような面もありますが、人生の新しい局面を自らの手で切り拓くことができるでしょう。未知の可能性に賭けることで、自分のなかでも未開拓の能力を開発していくことこそ、蠍座の持っている変容の道。\n常に新しい道を開拓し続ける人だといえるかもしれません。"}, "蠍座_7": {"sign": "蠍座", "degree": 7, "symbol_ja": "深海潜水夫", "symbol_en": "Deep-sea divers.", "key_phrase": "濃厚な人間関係のなかで真理をつかむ人", "explanation": "人間は海の中では動きが遅くなり、息をすることもできません。酸素ボンベを背負って潜ることができても、やれることは果てしなく制限されるでしょう。ましてや深海であれば、ものすごい圧力が体にかかって、動きがますます限定されていきます。だけれども、そこにいることに慣れてくると、次第に体を動かせるようになるでしょう。\nものすごく強いプレッシャーの中で、真実をつかみ取ること。あるいは強い圧力の中に適応していくこと。海がわたしたちの心を象徴しているのだとしたら、深海は深層心理や集合無意識といえるかもしれません。その圧力の中で動きまわり、何かを見つけ出したりすることができる能力と関係しているサビアン・ワードでしょう。\nこの度数を持っている人は、心の非常に深いレベルにまで入り込むことができるかもしれません。夢診断や催眠療法、深層心理カウンセラーとしての適性がありそうです。人の感情の深いところに潜り込むことが得意といえるでしょう。\nこれは自分自身の心の深い領域や、未開拓の領域に入り込むことができる資質を示しています。なぜ、そうなっているのか、という、表に見える行動の背後にあるものをつかみ取ることができるでしょう。\nまた、この度数を持っている人の中には人生のある時期、濃厚な人間関係の中に置かれて、自由がなくなるような、誰かの心に拘束されているような体験をする人もいるかもしれません。その期間、自分が自分であって、自分ではないような不思議な感覚に陥ることがあったでしょう。そのような経験が後になって、どんなプレッシャーにも耐え得るような強さと才能をその人に与えることになりそうです。"}, "蠍座_8": {"sign": "蠍座", "degree": 8, "symbol_ja": "静かな湖面に映る月明かり", "symbol_en": "A Calm Lake Bathed In Moonlight.", "key_phrase": "心の内側から浮かび上がってくる真実を見つめる人", "explanation": "静かな湖に月が映っています。ここでは直接、月を眺めずに湖に映された光のほうがクローズアップされています。静かな湖というのは、心の中にある静けさの象徴であり、月はわたしたちの無意識の中にある感情の象徴です。\n蠍座は心の中にある言葉にならないもの......つまりまだ本人が意識してないものを潜在意識下に見つけ出し、統合していくことを目的とする星座。わたしたちの中にまだ気づいていない無意識の部分が多くあると、それは外側の人物や出来事に投影されて、強制的に体験させられることになります。それでも気づかずにいると、何度も形を変えて、似たようなパターンが繰り返されることになるでしょう。\n自分の中に気づかずに押しこめている部分があると、わたしたちは無自覚のうちに自分を分けて生きていることになり、生命力が分断されていきます。そうすると元気が足りない、力が足りないということが起こる可能性があり、しかし、潜在意識下では怒りや思いをせき止めている、ということにつながりかねません。そこで深いところにいる自分、いまだ気づかずにいる自分にもっと気づいていくために、静かに心を観察して、起こることを眺める時間が必要となるでしょう。\nこの度数を持っている人は、観察者としての質を持っています。容易に判断したり、考えたりせず、起こることをただ待って、流れにまかせ、それがどうなっていくかをひたすら受容することで、そこからおのずと浮かび上がってくる真実をつかむでしょう。理解は、急いで判断をしなくても、一連の流れを体験することによって、内側からおのずと起こるのかもしれません。\n人の心や時流をつかむことが得意で、静かに鋭く真実を見極める人だといえそうです。"}, "蠍座_9": {"sign": "蠍座", "degree": 9, "symbol_ja": "仕事中の歯医者", "symbol_en": "A Dentist At Work.", "key_phrase": "究極のところまでやり抜くことで限界を突破する人", "explanation": "自分自身の力によって、物事を抜本から変えることのできる人です。\n歯医者の仕事は虫歯を治すことですが、これは自然に生じた病症を、人為的な力と技術と道具を使って変えてしまうこと。歯や骨は死んだあとにも残る、わたしたちの肉体を構成する基盤ですが、骨が折れると時間の経過と共に復元していこうとするのに対して、虫歯が自己治癒力で治ることはありません。不可逆のどうしようもないものであっても、どうにかして乗り越えようとすること。本気で立ち向かっていけば、どんな物事であっても改善できると信じているのでしょう。\nどんなに動かしがたい現実も、これまでの常識では変わらないように思えることでも、変えていくのが蠍座の力といえるかもしれません。あらゆる物事に対して、極限まで挑戦することによって、突破口が見つかるでしょう。\nこの度数を持っている人は、非常に強い集中力と意志とがありそうです。ひとたび何かを志したら、あらん限りの根性を発揮して、絶対に成し遂げようとするかもしれません。何事に対しても中途半端に関わることを好まず、やるとなったら徹底的にやり抜くところがありそうです。\n何かを創り出すこと、いまある常識を超えていくこと、どんな物事であっても極めることに適性があり、特定の分野の専門家になる人もいるでしょう。高い技術と知識を身につけて、何かを極めることに邁進するかもしれません。チャレンジ精神が旺盛で、限界を越えようとする欲求があるでしょう。"}, "蠍座_10": {"sign": "蠍座", "degree": 10, "symbol_ja": "古い仲間を再び結びつける親睦夕食会", "symbol_en": "A fellowship supper reunites old comrades.", "key_phrase": "心の深みに触れることを仲間と分かち合う人", "explanation": "夕食は一日のうち、最も豪勢なものを家族みんなで集まって、ゆっくりと語り合いながら、共にいただきます。誰かを夕食に招いて、共に過ごすことで、おのずとその人との距離は縮まり、親密な関係を作り出すことができるでしょう。ひとつの食べ物を分け合う行為は、愛や滋養を分け合う行為であるともいえるかもしれません。\nここで結びついている古い仲間とは、単なる昔馴染みというだけではなく、もっと心の深いところで何かを約束していたかのような仲間といえそうです。同じものを志し、深いところから共感し合えるような仲間......深いところから心を分かち合うためには、各々が自分の心と深く向き合い、内側で起こっていることをよく見て、受け入れている必要があります。自分自身の深みを知らず、つまりまだ心の中に見ていないもの、気づいていないことがたくさんある内は、真の意味で他者と共感することができないでしょう。わたしたちは自分自身の内側の深みに触れることで、他者のそれを理解することができます。\nこの夕食会は、それぞれが自分の深みに触れた人同士の、真の共感の場といえるのかもしれません。\nこの度数を持っている人は、自分の深みに触れ、またそこから他者と多くを分かち合うことができるでしょう。お互いの深い領域に踏み込み、そこにある真実をつかんで、共感し合うことができます。\nまたそのように関わらないのであれば、それは表面的な関係に過ぎず、相手を信頼しきれないかもしれません。そこにあるものが何であれ、心の内にあるものをさらけ出しあった相手とは、真の友情を感じて、どんなことでも語り合い、何があっても正直に話し合いながら、乗り越えていくことができるでしょう。\nそれこそが古い仲間。深く結びついた人たちと共に働くことに喜びと充実を得られる人です。"}, "蠍座_11": {"sign": "蠍座", "degree": 11, "symbol_ja": "救助されている溺れた男性", "symbol_en": "A Drowning Man is Being Rescued.", "key_phrase": "全身全霊をかけて相手に飛びこんでいく人", "explanation": "溺れている男性が救助されているというサビアン・ワードですが、蠍座のシンボルですから、ここで溺れている対象は人の情や心といったものになるでしょう。\n蠍座は対象と深いレベルで共感し、一体化することを通して、究極の状態を体験したり、自分にはなかったものを相手から受け取ったりするサイン。真に価値のあるものを手に入れるためには。自分の持っているものをすべて、一度手放す必要があるでしょう。何もかも開いて明け渡したときに、そこに新しいものが入ってくる可能性があります。\n安全な状況や守られているという立場を諦めて、すべてを手放すことで見えてくる活路が「救助されている」ということかもしれません。そこでは相手に自分のすべてを明らかにして委ねることが手放しに通じるでしょう。\nしかし、そのようにしてすべてを手放して相手に飛び込んだ結果がどうなるのか、本当に受け入れてもらえるのかどうかは、未知の領域です。そういった意味において、自分のすべてをかなぐり捨てて、相手のもとへと飛び込んでみるということは、その結果がどこへ行き着くのかわからない、非常にリスキーなやり方だともいえるでしょう。\nこの度数を持っている人は、他者と心の深いところで絆を作ることに、深い充実を感じるかもしれません。好きな人や尊敬する人のために、自分のすべてを捧げて夢中になることもあるでしょう。対象が何であれ、ひとたび結びついたものに全身で飛び込んでいき、その相手の持っているすべてで、自分の価値観や考えを染め直そうとするかもしれません。\nしかしその結果がどのようになるのかは、誰にもわからないでしょう。あなたのすべてを受け止めてくれるだけの度量のある人やものが対象であれば、深い結びつきの新しい関係が始まるかもしれません。"}, "蠍座_12": {"sign": "蠍座", "degree": 12, "symbol_ja": "大使館の公式舞踏会", "symbol_en": "An Official Embassy Ball.", "key_phrase": "静かに相手を見定めてつながりを築く人", "explanation": "蠍座は自分の心の深いところで感じていることを通して、他者と共感することを求めるサイン。しかし、水のエレメントであるがゆえに非常に傷つきやすく、もし自分のすべてをさらけ出したにも関わらず、相手がそれを受け取ってくれなかったり、相手がそれを見せてくれなかったり、ということが起こると、深く落胆して、もう本心をさらけ出すことをやめようとも思うでしょう。\nまた、社会の中でうまくやっていくためには、全員に自分の本心をさらけ出すことはむしろ危険だということも蠍座は知っています。\nそれゆえに、自分の本心に自分で気付いていながらも、それを巧みに隠して人と付き合うことをするのも蠍座の質だといえるでしょう。\n大使館の舞踏会では、さまざま立場の人がそれぞれの思惑を持って集まってきます。そこでうまく立ち振る舞うためには、容易に誰彼に本心を見せずに、外向きのみんなが惹きつけられるような自分を作った方が有利であることも多いでしょう。舞踏会とはある意味、華麗な社交の場であり、誰もが本心に仮面をつけながら、お互いに相手を見定め、値踏み、噂し、コネクションを作る場ともいえるかもしれません。\nこの度数を持っている人は、気になる人や力のある人とうまく関係を築いていく才能があるでしょう。誰もが羨み、憧れられるように自分を装い、人を惹きつける魅力を磨きます。社交力を駆使して、誰とでもうまくやっているように立ち振舞いますが、その反面、誰にも心を許さないようなところがあるでしょう。\n自分の本心を見せずに相手の心をはかる力があるので、ビジネスや交渉の場などでは有利に働く才能となりそうです。"}, "蠍座_13": {"sign": "蠍座", "degree": 13, "symbol_ja": "実験室で実験をする発明家", "symbol_en": "An Inventor Performs A Laboratory Experiment.", "key_phrase": "人と人を仲介して新しいものを創る人", "explanation": "発明家が実験をするサビアン・ワードです。いろいろな薬品や部品や知識や技法を混ぜ合わせて、新たなものを作り出すのが実験ですが、これは蠍座の実験。蠍座は対人関係を通して自分の足りないものを引き出したり、目覚めさせたりしていきますから、ここでは対人関係を使って実験するということになるでしょう。\nわたしたちは自分の持っていないものが必要なとき、それを持っている人のところへいって、足りないところを埋め合わせてもらいます。わたしたちはお互いに、何かを持っていて、何かを持っていないのですから、その欠落を埋め合うパズルのピースのような相手を探すと、ピッタリとはまるでしょう。その働きを積極的に実験していくのがこの度数です。\n恋人が欲しい男女をそれぞれが求めているものを吟味した上で引き合わせたり、雇用者と労働者を紹介したり、学びたいものと教えたいものを結び付けたり、売りたいものと買いたいものを仲介したり......。その人の持っている潜在的な能力と可能性を、もっと引き出すことができる相手が誰なのかを見極めて、結びつけていく実験です。\nこの度数を持っている人は、人の縁を結びつけて、必要な人につなげていこうとするかもしれません。単独で成し遂げることが難しくても、ある素晴らしいを能力を持っている人と、それをサポートできる人、また別の力を持っている人とを結びつけることで、実現できることがあるでしょう。自分の能力も含めて、誰が誰とどのように絡むと、どんな結果が生じて、そこにどのようなメリットがあるのか......。そのフュージョンを面白がって、いろいろな人とのコラボレーションを楽しもうとするかもしれません。\n人と人とをつなげて、繁栄させる能力です。"}, "蠍座_14": {"sign": "蠍座", "degree": 14, "symbol_ja": "新しい回線をつなげている電話接続士", "symbol_en": "Telephone lineman at work installing new connections.", "key_phrase": "対人関係を通して最高の人脈を引き出す人", "explanation": "後半星座の天秤座と蠍座は、他者との関係の中で自分の活かし方を模索していく星座です。自分のどんな才能を、どのように使うのかは、どこに誰といて、相手から何を求められるのかによって変わってくるでしょう。\n天秤座がさまざまな人と出会って、マルチに自分自身の可能性を開いていくことに対し、蠍座はより深く自分自身を掘り下げていくために、時に他者とのつながりをあまり広げ過ぎずに制限することで、グッと深くに入り込んでいきます。\n回線をつなげる電話接続士には、適切に求めている人を必要な相手へとつなげる役割があるでしょう。その人にとって、最も必要な人は誰なのか......それはその人の足りなくて求めている部分を埋め合わせてくれる人であると同時に、本来の持っているものを充分に引き出してもくれる人。人と人とをつなげていき、また自分もその時々で最も必要な人とつながっていくこと。そのようにして、人とのコネクションを意識的に相互に活用するのもまた、蠍座の特質といえるでしょう。\nこの度数を持っている人は、その時々のタイミングによって、いまの自分が求めているものを最大に引き出してくれる人とつながることができそうです。そして必要な相手とつながったら、そこに集中して自分の可能性を掘り下げるために、あえて他のつながりを一時的に閉じることもするかもしれません。\nより効率的にいま求めているものを得るためには、混線を起こす可能性があるものを遮断した方がうまくいくでしょう。\nまた、もっと面白いことができるのではないかと期待して、何かを求めている人と別の人とを、意識的につなげていける才能もあります。"}, "蠍座_15": {"sign": "蠍座", "degree": 15, "symbol_ja": "五つの砂山のまわりで遊んでいる子供たち", "symbol_en": "Children playing around five mounds of sand.", "key_phrase": "集団で大きな物事を創り出す人", "explanation": "5という数は、五体や五感を持つ人間そのものを示す数であり、それらをすべて兼ね備えたわたしたちは、とても力強くパワフルな存在です。5つの砂山が描かれたシンボルですが、この砂山たちは人間の集まりともいえるでしょう。\n蠍座は自分ひとりでは足りないものを、他者の力で埋め合わせることをお互いにしていこうと働きかける星座。自分ひとりでは足りない能力も、みんなで補完しあうことによって、より万能で大きな力となりえます。そして、ある目的のために必要な人同士が集まると、そのメンバー次第によって、新しい面白いことができることも見出しました。\nそこであえてさまざまな力を持っている人たちを集めて、みんなで面白いことをしよう、何か新しいものを創り出そうと働きかけるのがこのシンボルです。大勢を集めて、みんなで遊ぶ=楽しみながら創造を広げようとするのかもしれません。そしてまた自身がそれらの人々を吸引することによって、人を動かす力をも手にするのでしょう。\nこの度数を持っている人は、何かを組織したり、人を集めて新しいグループを作ったりすることを楽しみそうです。人と人を集めて、くっつけて、みんなで何か面白いことをしようと企画したり、集団を盛り上げたりするでしょう。ひとつの目的のために、人々を集めて、その集団を動かしいくことも得意かもしれません。\n自分たちのしていることを支持してくれる人が多くなれば、なるほど、その集団はより大きな力を発揮することになるでしょう。そしてまたその集団を育てていき、みんなでさらに大きな面白い試みをしていくことになるかもしれません。\n会社や組織なども、基本はこの原理で動いているといえそうです。"}, "蠍座_16": {"sign": "蠍座", "degree": 16, "symbol_ja": "突然笑い出した少女の顔", "symbol_en": "A Girl\\'s Face Breaking Into A Smile.", "key_phrase": "自分自身にくつろぐことで、他者を惹きつける人", "explanation": "他者との結びつきを大切にする蠍座は、対人関係にみずから働きかけてきました。\nしかし、ここで描かれているのは純真無垢な少女が笑顔でいるところです。人懐っこい女の子は、特に無理をしなくても自然と人を惹きつける魅力を持っているでしょう。\nどの星座も、ちょうど半分の折り返し地点の15度を過ぎると、対面の星座の能力を受け入れながら、その星座に統合していく性質があります。ここで蠍座は、向かいの牡牛座の質を取り込んでいくことになるでしょう。それは自分自身の持っている素の質に目覚めて、みずから受け入れていくことです。\nこれまで足りないものを埋め合わせるために外の世界へと目を向けていた蠍座が、すでに持っている自分自身に目を向けて、掘り下げ、満足してくつろいでいくようになるのです。そうすると一生懸命に外に向かってアピールをしたり、働きかけたりしなくても、向こうから大勢の人たちが惹かれて集まってくるということが起こるでしょう。\nこの度数を持っている人は、とても自然体で、ありのままの自分を受け入れて、くつろぐことが得意なようです。自分を自分のままでいさせることができるため、おのずと他者のこともそのままに認めて、おいておくことができるでしょう。\nその着飾らない受容の質が人を惹きつけることになり、無理をしなくても縁が広がったり、チャンスがやってきたりすることにつながりそうです。人懐っこく、特別になにかをしなくても、ナチュラルに振る舞うことで、人を魅了できるでしょう。"}, "蠍座_17": {"sign": "蠍座", "degree": 17, "symbol_ja": "彼女自身のスピリットによって", "symbol_en": "偉大な子どもを多く産み出した女性", "key_phrase": "彼女自身のスピリットによって偉大な子どもを多く産み出した女性", "explanation": "自分の内側から未知の可能性を呼び覚ますことのできる人\n蠍座は他者との結びつきを強化することで、自分に足りないものを外部から埋め合わせてきました。\nしかし、それが度数半ばの折り返し点で、牡牛座の侵入を受け入れると、外からの刺激で自分を成長させるのではなく、自分でも気づいていなかった自分自身の未知の領域を発掘することで、新たな自分を見つけ出すことに成功します。これまでは、他者の投影という形を借りてのみ自分に気付いていたものが、みずからの内側にグッとフォーカスすることで、自分自身の可能性に気づけるようになったともいえるでしょう。\nこれはいわば自己生殖ともいえる行為で、外に求めなくても、自分の内側からまだ表出していない未知の部分を見つけ出せるようになったともいえます。蠍座は変容のシンボルですが、これまで外側に探していた足りないものを、自分の内に潜り込むことによって探し出し、みずから自己変容を起こせるようになったのでしょう。\nこの度数を持っている人は、自分の内側から多くのものを掘り起こし、創り出すことのできる資質の持ち主です。心の内側に深く投げかけて、じっくりと向き合い、対話することで、内側からあらゆる答えを見つけ出せるでしょう。\n解放の鍵は自分自身の影の部分、見たくなくて閉じている場所や、気づかないふりをしているところにあるかもしれません。そこに意識の光はあてることによって、これまで気づかなかったことに気づき、知らなかった自身の一面と出会うことになるでしょう。\n自分自身の内側から、新たな気づきを起こしていくことのできる人です。"}, "蠍座_18": {"sign": "蠍座", "degree": 18, "symbol_ja": "多彩に素晴らしく輝く森の中の道", "symbol_en": "A Path Through Woods Brilliant With Multicolored Splendor.", "key_phrase": "高い目標を達成させながら成長できる人", "explanation": "多彩に素晴らしく森が輝くのは、紅葉の季節。\nちょうど蠍座のシーズンである10月末から11月にかけてが紅葉の盛りですが、それは自然の樹々にとっての変容の季節であるといえるでしょう。樹々は春になると若芽出して、葉を生い茂らせて、夏から初秋にかけて豊かな緑を存分に伸びやかに成長させます。そして秋になると紅葉し、やがてそれらはバラバラと一斉に舞い落ちて、冬には枝のみが残されるでしょう。\nその自然のサイクルは、わたしたちの内側にある生命体のリズムとも共鳴しています。わたしたちは自分の内側にある未分化の可能性を外側の世界のさまざまな体験を通して引き出し、開花させていきます。何か新しいことや、これまでよりひとつ上のステップにチャレンジするということは、自分の中のまだ使われていない部分に働きかけて、そこを開花させようとさせる行為といえるでしょう。\nひとつの目標を持つことで、グッと内側に潜り込んで自分の中の可能性を掘り起こし、そして外に向けて、その輝きを発露させていくこと。それをくり返していくことで、わたしたちはみずからを成長させることができるのかもしれません。\nこの度数を持っている人は、非常に高い集中力を持っていて、自分で定めた目標に、自分自身の能力をグッと照準を合わせることで、達成させていくようです。そして何かしらの輝かしい成果を生み出すと、また別の何かを求めて、一途に取り組むことになるでしょう。\nその季節をめぐる自然の樹々のようなサイクルが、この人自身の持っている能力をおのずと掘り起こして、成長させることにつながっています。自分自身の意欲で成果を上げて、また素晴らしい輝きを人々に分かち合うことのできる人です。"}, "蠍座_19": {"sign": "蠍座", "degree": 19, "symbol_ja": "耳にした会話をくり返すオウム", "symbol_en": "A Parrot Repeats The Conversation He Has Overheard.", "key_phrase": "内側からキャッチしたメッセージに従う人", "explanation": "オウムはどこかで聴いた人の言葉をくり返し、話すことができます。それは単に聴こえた音をそのままくり返しているだけでは、意味を咀嚼して理解しているわけではないでしょう。それでもオウムがくり返している言葉を聴いた人はインパクトを受けて、それがまた人口に膾炙されていくかもしれません。オウムは次々と人の言葉をコピーして、それを広めることができるでしょう。\n蠍座は物事の表面には興味がなく、何事に関しても、より深い真実に近づこうとしていきます。自分自身の心の深い領域へと渡りをつけて、そこで感じているものをダイレクトにつかみ取ることができるでしょう。それはある種、自分の内側から浮かび上がってくるように感じられる言葉やビジョンかもしれません。それらは知的に考えて出てきたものではないため、それが何を意味しているのか、思い浮かべた本人にもわからないことが多々あるでしょう。\nしかし出てきたものが何であれ、コピーするオウムのように、そのメッセージに従って行動し、それをそのままに人に伝えることができるかもしれません。これはそのような可能性を秘めているシンボルです。\nこの度数を持っている人は、とても深い感受性があり、自分の知性を超えたところから、ひらめきやビジョンやメッセージを受け取ることがありそうです。そしてまた、それが何であれ、自分の内から出てきたものを素直に受け取って、それが示している通りに行動することができるでしょう。\nそこで受け取ったものに対して、意味や理由がわからなくても、その言葉を額面通りに扱い、行動を広めることができます。\nなぜだかわからないことをそのままに受け容れる、ある種の受容性が強く働く人ともいえるでしょう。"}, "蠍座_20": {"sign": "蠍座", "degree": 20, "symbol_ja": "神聖な道の入り口を閉じている", "symbol_en": "二枚の暗いカーテンを引っ張る女性", "key_phrase": "Pathway.", "explanation": "神聖な道の入り口を閉じている二枚の暗いカーテンを引っ張る女性\n目に見える世界と見えない世界とをつなぐ人\n入り口を閉ざしているカーテンがシンボルとなっていますが、その背後にある神聖な道を進んでいくと、それはその人の心の深い部分あるいは現実の物事の背後に隠された真実の核のようなところに行き着くのかもしれません。そこへの入り口がカーテンで閉じられていますが、そのカーテンを引っ張っている女性は、神聖な道の中へも、また逆側の通常の世界へも自在に行き来できるのでしょう。\n蠍座は表面的な出来事の背後にある真実や隠された本質に触れることの求めるサイン。度数の前半で対人関係の中にそれを求めていたものが、中盤から自分自身の内側に潜伏して、自身の深みに触れることに成功しました。\nここではそこへ潜ったり、いつもの生活に戻ったりすることが自在にできるようになったともいえるかもしれません。潜りっぱなしのときは、真実に触れ、感じることもできても、それが何であるのか理解することができないでしょう。\nしかし通常の世界に戻ることで、客観的にそれを見て、考え、理解することが初めてできるようになるのかもしれません。深みと表面を行き来することで、直感で得たものの答えを知的に理解できるのでしょう。\nこの度数を持っている人は、スピリチュアルな世界に興味を抱き、目に見えない事柄に触れると同時に、目に見える世界でもしっかりと立って生きることができるようです。ある種の霊感、目に見えないものを感じ取る第六感が働きますが、常時働きっぱなしではなく、必要なタイミングでオン・オフの切り替えができるでしょう。\n不思議な直感が働きながらも、それにすべてが引っ張られることはなく、強い意志の力で必要なものだけにつながることのできる人といえそうです。"}, "蠍座_21": {"sign": "蠍座", "degree": 21, "symbol_ja": "良心に従って命令に抵抗する軍人", "symbol_en": "Obeying His Conscience, A Soldier Resists Orders.", "key_phrase": "相手が誰であったとしても自分の信念を貫く人", "explanation": "軍人はプロフェッショナルとしての技術や知識、精神力を身につけて正義のために戦う存在です。通常の軍人は縦型組織に属し、からの命令が絶対であり、それに逆らうことはないでしょう。しかしここでは揺らがない自分なりの信念がしっかりと根付いたがゆえに、相手が誰であれ、おかしいものに対してはおかしいとはっきりと口に出していく姿が描かれています。\n蠍座は自分にないものを外の世界に求めて、他者との関係を強固に結びつけていく星座です。しかし次第にそれは個人を超えたところへ向かっていき、もっと大きな人間の普遍的な意志や真実のようなものと結びついていくことになるでしょう。そしてひとたびそれらのものと出会って、取り込むことに成功すると、それは頑なな自分自身の信念となって、相手が誰であっても、その意志を貫き通すようになります。蠍座は戦う星座でもあるので、徹底的に相手と関わりながら、それを主張しようともするでしょう。\nこの度数を持っている人は、自分の中に強いこだわりや信念がありそうです。それは自身の経験と努力の積み重ねによって身につけたもので、自分なりの行動哲学や生きていく上での信条のようなものにもなっているでしょう。それがあるがゆえに中途半端な妥協や迎合をすることができません。少しでもおかしいと思ったら、納得いくまで、とことん話し合おうとするでしょう。\n容易に意見を変えることがないので、頑固な印象をまわりに与えるかもしれません。何があっても、自分自身を貫く強さを持っているでしょう。"}, "蠍座_22": {"sign": "蠍座", "degree": 22, "symbol_ja": "野生の鴨を撃っているハンター", "symbol_en": "Hunters Shooting Wild Ducks.", "key_phrase": "自分の属している場所を変えようと努力する人", "explanation": "蠍座は物事の表面的なことにはあまり興味がなく、真実を深く探求していくサイン。しかし、ひとたび核心に触れることで、これまで見えなかった、さまざまなことを思い知らされることにもなるでしょう。裏に隠された事情や、真の理由が見えてくると、ただ一方的に与えられていたことに対して、額面通りのままに、素直に受け取ることができなくなるかもしれません。\nこれが水瓶座であれば「おかしい」と感じたときに、その集団から離れて、独立し、自分の信念を共有できる仲間を集めて、新しいやり方を始めるでしょう。しかし蠍座は自分の属している集団の方を変えようと説得を試みます。\nだけれども強固に完成された社会の秩序や集団の意志は、そう簡単には変わりません。社会の中にいる人全員が蠍座のように物事を深いレベルで理解しようとすることはなく、何も考えずに仕組みに従い、まわりに合わせている人も多いでしょう。そこに苛立ちを覚えて、時に人々に強く訴えかけようとするかもしれません。\nまた、ままならない現実に対する衝動的な怒りが湧き上がってきて、フラストレーションが募ることもたびたびありそうです。\nこの度数を持っている人は、まわりの人たちに真実を訴えようと、どうにかして、強い力を浸透させようとすることがあるでしょう。みんなに強いインパクトを与えようとするため、その試みはうまくいくこともありますが、大きな物事に対しては、なかなか思いが伝わりきらずに、苛立ちを覚えることもありそうです。\nそのような時に、自身の怒りを上手に発散する術を持つことが大切です。それがなければ、衝動的に高まるフラストレーションを相手にぶつけてコントロールしたくなったり、相手を恨んだりしたくなるかもしれません。自分自身のエネルギーや衝動を吸収してくれる対象があると、冷静に世界と向き合うことができそうです。"}, "蠍座_23": {"sign": "蠍座", "degree": 23, "symbol_ja": "自然界の精霊に変容するウサギ", "symbol_en": "A rabbit metamorphoses into a nature sprit.", "key_phrase": "荒々しい衝動をアートな形に変容させる人", "explanation": "蠍座が真実を求めて世界の裏側や心の深いところまで潜り込むと、まだ誰も気づいていない未知の可能性や領域に気づかされることになります。\nしかし、そこをどうにかして活かそう、広げようと働きかけたとしても、他の誰もが気づいていない限り、その試みはなかなかうまくいかず、結果として他者や社会への不満や軋轢が生じて、怒りやフラストレーションが溜めこまれることになるでしょう。その溜まったものたちを、安全な形で精神的に解放しようとするのが、このシンボルが象徴している「精霊に変容するウサギ」です。\n蠍座のサブルーラーである火星の生々しい衝動や怒りが野生の動物の象徴としてウサギで描かれているとしたら、その感情の塊を変容させることがポイント。わたしたちの心の奥深いところには、これまで体験して、試みたものの、うまく果たすことのできなかったものたちへの、さまざまな感情や思念が横たわっています。歌や踊りやアートや演劇、文を書く、何かを創るといった行為は、それらを安全に取り出して、発散させることにつながるでしょう。\nまた、さまざまな不満や怒りをアートや文学や作品といった形で表現することで、初めて、それが世の中を変える力として、みんなに受け入れられることもありそうです。\nこの度数を持っている人は、自分の中にある強い感受性を生々しく表現するのではなく、何かしらの表現手段を持つことによって、うまく扱えるようになるでしょう。怒りをそのまま相手や対象にぶつけるのではなく、適切なコミュニュケーションを学ぶことも役立つかもしれません。その感情を心のままに表現するやり方を持つことで、リアルな思いがやっと人の心に届くようになるでしょう。\nまた、自分なりの表現手法を身に着けることで、より自分や他者の繊細さにも気づけるはずです。"}, "蠍座_24": {"sign": "蠍座", "degree": 24, "symbol_ja": "直観的な男性の「山の講話」を聴いたあとで", "symbol_en": "帰路につく群衆", "key_phrase": "Mount,\\\" Crowds Are Returning Home.", "explanation": "直観的な男性の「山の講話」を聴いたあとで帰路につく群衆\n自分の影を受け容れて、またそれを他者に伝える人\n山の上に住んでいる男は仙人のように暮らしながら、自然と一体化して、人間の心の極限を体験しているのかもしれません。人間が心の奥底に持っている、ざらっとした本能的な荒々しさを、精神の力で昇華させて、自分の意識の力で、自分自身を受け容れる術も、どんなときでも穏やかに落ち着かせる方法もマスターしているでしょう。\nそんな男性の話を聞きに、大勢の人たちが山へ登ってきた、というサビアン・シンボルです。彼らもまた、自分自身の奥深いところにある影を持て余し、あるいはもっと良い形で、どうにかして統合させたり、開花させたりすることを望んでいるのかもしれません。そのために、それに成功した男性の話を聞きにやってきたのでしょう。\nわたしたちは自分自身に目覚めると、統合への道をおのずと歩み始めます。男性の話す内容は、誰もが体験することであり、またそれを日常において実践する方法。わたしたち誰もが自分の未知なる領域や影を認知して、自分の一部として組み込むことができるでしょう。男性の話を聞いたあとに山を降りると、もう山に登る前とは同じ暮らしができなくなるかしれません。\nこの度数を持っている人は、自分が体験した精神的な変遷を紐解いて、理解し、他者に伝えることができそうです。みずからの内側にある荒々しい本能をどうにかしようと、それをいさめる方法を知っている人に師事することもあるでしょう。そして、自身の未熟さを建設的な力に変えたり、過去の傷を昇華させたりして、いまを生きるための大きな力に変えた経験があるかもしれません。\nそのような目には見えないスピリチュアルな働きを日常のなかに落とし込んで、日々の中で実践しようと試みるでしょう。どんな物事にもエネルギーを与えて、新しいやり方に変えることができたら、そこに充実を感じそうです。\nまた、みずからのそのような体験を人に話して、影響を与えることもあるでしょう。"}, "蠍座_25": {"sign": "蠍座", "degree": 25, "symbol_ja": "Ｘ線写真", "symbol_en": "An X-Ray Photograph.", "key_phrase": "どんな物事であってもその裏側を知らずにいられない人", "explanation": "Ｘ線を使って撮影されたレントゲン写真は、表面からは見ることのできない、その人の内側の実態を明らかに浮かび上がらせます。蠍座の持っている能力のひとつに、真実を鋭く暴いていく洞察力というものがありますが、ここではその力が最大限にまで高まって、表からはパッと見ただけではわからない物事の裏側やその真実の仕組みを明らかにすることに意識が向かっていくでしょう。\n本当は何が起こっているのか、何を思い、感じていたから、そのようなことをしていたのか。その内側にある真実の全体像をつかんでいくことに喜びを感じるかもしれません。そのため、時に何事に対しても内部深くまで身を投じて関わっていくようなことも起こるでしょう。\nこの度数を持っている人は、洞察力が非常に鋭く冴えて、どんなことであっても「本当はどうなのか」ということが気になるかもしれません。探求心も強く働くので、ひとたび知りたいと思ったら、それに対してとことんくらいついていくような集中力もあるでしょう。\n分析力が高く、徹底的に追求しようとするため、研究職や医療関係、心理関係や緻密な調査などに向いています。なにか専門的な分野を定めると、能力をしっかりと使いこなすことができそうです。人の心を知ることにも興味が向けられるので、心理分析を学ぶ機会があるかもしれません。\n自分自身のことに関しても、深いところから本心を語り合えるような仲間が見つかると、ホッとすると同時に充実するでしょう。"}, "蠍座_26": {"sign": "蠍座", "degree": 26, "symbol_ja": "新しい領土に移動してテントを作っている", "symbol_en": "アメリカン・インディアンたち", "key_phrase": "新しい領土に移動してテントを作っているアメリカン・インディアンたち", "explanation": "どこへ行っても柔軟に適応しつつ、自分のやり方を貫く人\nネイティブ・アメリカンが新しい場所へ引っ越して、居住区となるテントを張り直しているサビアン・ワードです。彼らは生きるための知恵を身につけており、そのために必要な道具をコンパクトに収めて、どこの土地へ行ったとしても、容易に順応していきます。それはある意味、自然と調和して生きる術を持っているがゆえに、どこへ行っても、自分たちのやり方で生き抜くことができるともいえるでしょう。\n蠍座は自分の足りていないものを、外側の世界と同化することで、取り込むことをしていく星座です。この自然あふれる世界で生きることの術を身につけたのであれば、あとはその時々で、その土地の特徴や風習を学びつつ、上手に取り込むことで、どこでもやっていくことができるでしょう。\n自分の大事な信念やこだわりを保持しながらも、環境に合わせて、それを受け入れる柔軟さも持っています。どこでも、どんなことでも、やっていくことのできる資質があるでしょう。\nこの度数を持っている人は、さまざまなことに対してチャレンジしようとする意欲が高く、時に未知の世界にも飛び込んでみようとするかもしれません。自分の力を試すために、見知らぬ場所でどれだけやっていくことができるのか、積極的に関わろうとするでしょう。身につけた知恵と、その土地の持っている力を活かしながら、自分なりに適用することに喜びを感じるかもしれません。\nそのため、ずっと同じ環境にいるよりも、引っ越したり、転職したりして、時々新しいものにチャレンジすることで、自分をリフレッシュしようとするところがありそうです。\nシンプルで飾らず、自分の信念を大切にしながらも、力強く生き抜く力がある人です。"}, "蠍座_27": {"sign": "蠍座", "degree": 27, "symbol_ja": "行進している軍楽隊", "symbol_en": "A military band on the marche.", "key_phrase": "自分の得た確信をまわりに広めていく人", "explanation": "街を行進している軍楽隊の奏でる楽曲は非常に大きく響き渡ります。ある人は足を止めてその曲を聴き入り、ある人には聴くつもりがなくても、家の中にまでその音が響いてくるかもしれません。\n蠍座は不完全な自分を埋めるために、大勢の人たちと関わり、自分に欠けているものを相手の持っているものから学び、取りこむことをする星座。その対象は人間に限らず、もっと大きな真実や自然に対する理解にまで広がっていきます。\n多くのことを学んだ末に、自分を満足させて、欠落しているものを埋める生き方ややり方を身につけて実証すると、今度はそれをすることを他者に勧めていきます。自分だけではなく、周りの人たちの欠落まで埋めることで、ようやく自分自身の世界がすべて統合されたように感じるでしょう。そうであるがゆえに、自分の信条を周り押し付けずにいられないのかもしれません。\nこの度数を持っている人は、さまざまな経験から身につけた自分なりの確信や信念があり、それを周りの人たちに向けて伝えずにいられないでしょう。強い影響力と説得力があり、ある意味、押し付けがましく自分の思いを広めていきます。そこには自分を取り巻いている外の世界も含めて、みんなで同じ思いを共有したいという、補完の欲求があるかもしれません。\nそのため、みんなが自分の話に巻き込まれている時に、もっともワクワクした喜びを味わうことになるでしょう。他者と一緒に自分の確信を共有することに充実する人です。自分の思いで周りを染めたいと思うかもしれません。"}, "蠍座_28": {"sign": "蠍座", "degree": 28, "symbol_ja": "領土に近づいている妖精たちの王", "symbol_en": "The king of the fairies approaching his domain.", "key_phrase": "自分の心の内側に安住の地を見出す人", "explanation": "蠍座は自分に足りないものを外の世界に求めて、お互いに補完しあう関係によって、自分を満たしてきました。それが星座の度数の中盤から、自分の足りないものを自分の内側に見出すという、自己生殖のプロセスに突入します。\n蠍座が長いあいだ、求めていたものは、精神的な絶対の確信や、どっしりとした心の安定感といったもの。それを他者とのあいだに、あるいは自分自身の内側に探し出して、ようやくそこに行き着こうとしている姿が、この妖精たちの王の姿として描かれているのかもしれません。\nみずからの領土は、絶対的な支配の及ぶ安住の地です。しかし、妖精は目で見ることはできませんから、その領土はどこか現実の場所にあるのではなく、自分自身の精神の内側にあるのでしょう。\n激しく求めてやまなかったそれは、みずからの心の奥底に、自分自身がさまざまな部分を統合していった時に見つかるのかもしれません。\nこの度数を持っている人は、自分の内側に強力に働く精神的な充足の場を持つことができるでしょう。他の誰かに頼ったり、求めたりしなくても、自分ひとりで充足できるような生き方を見出すことができそうです。それを確かめるために、あえて他者から距離を取り、ひとりで過ごす時間を確保することもあるでしょう。\n精神的な物事に対する独特の理解があり、どのようにすればみずから安定するのか、その術をつかむ可能性があります。\nアートやファンタジーの世界にも造詣が深いでしょう。"}, "蠍座_29": {"sign": "蠍座", "degree": 29, "symbol_ja": "酋長に子どもたちの命ごいをしている", "symbol_en": "インディアンの女性", "key_phrase": "酋長に子どもたちの命ごいをしているインディアンの女性", "explanation": "他者とのあいだで葛藤をたびたび感じる人\nある部族からの独立を試みて、ここを出ようとしている女性が、仲間たちから「子どもを置いていけ」「子どもがどうなっても知らないぞ」と脅されているサビアン・シンボルです。どうにか子どもたちを助けてほしいと酋長に懇願していますが、仲間たちの強固な反対にあって、独立することをなかば諦めるような気分にもなっているでしょう。\n固定宮の最終度数は「涙の度数」と呼ばれますが、蠍座の場合は一度前のこの度数が最も激しい葛藤を感じる別れの度数といえそうです。これは、あまりにも深く関わりすぎたパートナーやグループから抜け出すことの困難さを示してもいるでしょう。\n蠍座はお互いに足りないところを埋め合わせることで、強い結びつきを創り出します。また、ひとつの目的や物事を、相互依存をして成し遂げるために、別れる時にそう簡単にすんなりといかないことも多いでしょう。\nこの度数を持っている人は、人生の中でたびたびダブルバインドに陥る可能性があります。別れたいのに一筋縄ではいかず、そこに執着があったり、相互依存があったり、共有している分けられないものがあったりするでしょう。相手から強く求められて「ノー」と言えないこともあるかもしれません。\nしかし、次のステージへ進むべき時に、古い殻をなかなか脱ぎ捨てずにいると、それは脱皮し損なった状態がズルズルと続くことにもなりかねないでしょう。それでは葛藤や苦しみが長く続くばかりであり、関係は泥沼化していきます。苦しくても、スパッと手放す決断がたびたび求められるかもしれません。"}, "蠍座_30": {"sign": "蠍座", "degree": 30, "symbol_ja": "いろいろないたずらにふける", "symbol_en": "ハロウィン衣装の子どもたち", "key_phrase": "いろいろないたずらにふけるハロウィン衣装の子どもたち", "explanation": "深刻な影に軽やかな光と笑いを与える人\nハロウィンに子どもたちが仮装するのは、お化けや魔女やパンプキン・ヘッドやゾンビなど、普段はわたしたちの心の奥深いところに巣くっている恐怖の対象です。日本でいうならば、怪談に登場する幽霊といったところでしょうか。\nわたしたちは通常、恐ろしい怪談を聞くとおびえて、恐怖を感じます。しかし、幽霊に扮して、人を驚かせる側になると、今度はその役割が楽しくなってきて、もっと人にいたずらしたい気持ちが湧いてくるかもしれません。\n蠍座は対人関係を通して、お互いに足りないものを見出し、そこを埋め合わせます。その補完の関係に「運命的」なものを感じたり、容易には逃れられないような圧力や強制性を感じたりすることがあるでしょう。対人関係の中で生じる愛情も、時には圧力となって人の心を支配することがあります。\nその圧力やプレッシャーへの恐怖を克服する術が「笑い飛ばすこと」なのかもしれません。\nこの度数を持っている人は、膠着し、深刻になり過ぎた人間関係や自分の感情を、時にラフに笑い飛ばすことがあるでしょう。対人関係のなかで、ひとつの感情にとらわれると、わたしたちはどんどんシリアスで重苦しくなってしまいます。\nそこから逃れる術は、そのようになっている自分自身や関係性を笑い飛ばすこと。自分も含めて、あらゆる物事の深刻さや影に強い力を与えるのではなく、軽やかな光を与えることで、そこにとらわれることがなくなるでしょう。\nそのようにして、あらゆる影を解放し、次の射手座世界へと進む、蠍座の最終度数です。"}, "射手座_1": {"sign": "射手座", "degree": 1, "symbol_ja": "古い記憶を再び呼び起こすために集まった", "symbol_en": "退役軍人たち", "key_phrase": "古い記憶を再び呼び起こすために集まった退役軍人たち", "explanation": "自身の可能性をひらくためにいろいろなことにチャレンジする人\nすでに退役した軍人たちが再び集まってきているサビアン・ワードです。軍人たちは、かつて現役時代に自分を徹底的に鍛えて、肉体的にも精神的にも強靭で、何事に対しても自分で考えて、最善を尽くせるだけの知性と行動力を手に入れたでしょう。ひとりで何でもできる軍人ですが、ここではそれぞれの自由意志によって再び集まることで、みんなで大きな理想を成し遂げようとしているのかもしれません。\nまた、ここでいう軍人たちは仲間であると同時に、かつては技や力を競い合ったライバルでもあるでしょう。射手座にとってライバルの存在は、お互いに切磋琢磨しながら、それぞれの実力を引き出し合うために欠かせないもの。強いライバルの技も力も勇気も、それは自分自身の目指すべき目標となり、相手の存在にやる気を刺激されるでしょう。\nこの度数を持っている人は、自由にのびのびとした気持ちで、さまざまなことに挑戦しようとする意欲に満ちていそうです。持っている力を存分に伸ばすために、進んで出かけていき、同じように意欲的な仲間とつながって、お互いの存在から刺激を受けることもあるでしょう。\n大きな夢や理想を思い描いては、大胆に行動を起こしていくかもしれません。何のためにということではなく、自分の可能性を試し、ひらいていくために、いろいろなことをしてみたいと望むでしょう。\nいつでも外の世界に対して大きな一歩を飛び出そうとする準備のできた人といえるかもしれません。"}, "射手座_2": {"sign": "射手座", "degree": 2, "symbol_ja": "海の上に風の力を見せる白い帽子に覆われた波", "symbol_en": "White-capped Waves Display The Power Of Wind Over Sea.", "key_phrase": "大きな熱気のうねりの中で興奮する人", "explanation": "白い帽子に覆われた波というのは、大きな波が崩れる時に見える白く泡立ったしぶきを指しています。大きく風が揺れれば揺れるほど、大きな波がやってきて、たくさんのしぶきをあげるでしょう。\nこれは波動のような自然のリズムを示していますが、わたしたち人間は、ひとりひとりが波動を発している存在です。それが複数の人と共鳴しあうことで、より大きな波動となっていき、その興奮状態がますます高まっていくでしょう。\nライブ会場やスポーツ観戦などで人々が興奮すると、みんなでウェーブを作ることがあります。あのような熱気と興奮は一人ではもちろんのこと、少人数でも作ることができません。しかし大勢の人たちが集まって、ひとつの目的に向かっていけば、自然と大きな熱が発生することに気づかされるでしょう。\n射手座は火のエレメントに属していて、みんなで大きな目的のために力を合わせることに楽しみを見出す星座です。\nこの度数を持っている人は、お祭り騒ぎのような興奮状態を楽しみ、その中で自分の内側から生じるパワーを心地よく感じることがありそうです。それは決して表面的なものではなく、ひとりで起こすこともできません。集団の持っているパワーや熱意に反応し、そこに身を投じることで、大きな力と一体化した感覚を味わえるでしょう。\nその場のムードや空気感にも敏感で、相手の動きにも素早く反応しそうです。ダイナミックな環境の中にいると、イキイキしてくることを感じるでしょう。"}, "射手座_3": {"sign": "射手座", "degree": 3, "symbol_ja": "チェスをしているふたりの男", "symbol_en": "Two Men Playing Chess.", "key_phrase": "知略を尽くして難問を超えることに喜びを得る人", "explanation": "わたしたちの内側にある闘争心と戦略性を高めていくサビアン・ワードです。\nチェスは盤上で行われるゲームですが、ルールがあり、その中で知略を駆使して兵士たちを自在に動かし、相手側の王に攻め込んでいきます。ゲームであるにもかかわらず、多くの人がシミュレーションとしての場のチェスにのめり込むのは、心理的にわたしたちの本能がその疑似戦に闘争心を煽られて、知略を尽くして戦うことに達成感を味わうためでしょう。平等なルールのもとで相手の手を読み、その裏をかくような戦略を立てて、勝利を目指していくのがチェスです。\nその勝利への道筋は数え切れないほどあり、瞬時にそれをとらえる全体視野と、相手に合わせて、その場その場で手を変えていく瞬発力と柔軟性の両方が求められるでしょう。\nこの度数を持っている人は、何事に関しても、全体を見越して計画を立てて進めることが得意であるようです。パッと全体を把握する能力があり、成し遂げる目標が明確であるほど、瞬時にそれに備えて計画を立てて実行する機動性も持ち合わせています。頭を使って戦略を練ることが得意であり、その対象が大きな仕事であるほど、闘争心が刺激されて、やりがいが湧いてくるかもしれません。\n柔軟性があり、一度や二度失敗したぐらいではくよくよしないで「次はこうしよう」とさっさと切り替えることができそうです。切磋琢磨して技と知力を磨くことが喜びとなるので、ゲームなどで競い合うと充実するでしょう。"}, "射手座_4": {"sign": "射手座", "degree": 4, "symbol_ja": "両親から励まされて", "symbol_en": "歩くことを学んでいる小さな子ども", "key_phrase": "両親から励まされて歩くことを学んでいる小さな子ども", "explanation": "理想をかなえるための実際的な行動をはじめる人\n理想主義に傾きがちな射手座が、実際的な実践をはじめるのが、このサビアン・シンボルです。これまではやる気があったとしても、それは議論やシミュレーションに向けられていたものでした。ここではじめて、実際に使える具体的な手法として現実味を帯びてくるでしょう。\nはじめは誰かから、その方法を学んで、ついで自身が誰かを教えることになるかもしれません。実際にやってみることで理論とズレていることが見つかる、ということも起こってくるでしょう。また、他者を励まし、自立するようにうながすことで、自身の自立心も同時に強化されることになりそうです。\nここで実践することは、もともと持っていた理想のための第一歩。ある種の信念をまわりに熱く語るような一面もクローズアップされるかもしれません。\nこの度数を持っている人は、自分の信じていることや思い描いた理想をどうにかして形にしようと奮闘するでしょう。すでに実践している人に師事して、そのやり方を見つけようとするかもしれません。\n自分の熱い思いをみんなに語って、まわりの人たちも自身の意志と力で立ち上がることをうながすでしょう。そして人を励ますことが自分の確信と力にもなり、さらなる向上心がかきたてられそうです。\n射手座には元来、守護惑星の木星の影響を受けて、いつまでも成長し続けたいという欲求が備わっています。そしてそれはまた、まわりの人たちも含めて、みんなでより良くなっていきたいという理想にもつながっているでしょう。"}, "射手座_5": {"sign": "射手座", "degree": 5, "symbol_ja": "大木の枝に独りで座る老いたフクロウ", "symbol_en": "An Old Owl Sits Alone On The Branch Of A Large Tree.", "key_phrase": "物事の裏の事情まで全体を把握している人", "explanation": "夜行性のフクロウが一羽で、大きな木の高いところに止まっています。フクロウは知恵の象徴ですが、老いたものはより多くの知恵を持っているでしょう。そして高い場所から俯瞰して、昼間に人々が活躍する姿ではなく、本音が自然と漏れ出てくる夜の姿を観察しています。スパイや忍者のようなものを連想させるサビアン・ワードといえるかもしれません。\n全体の大義名分のために身を隠して暗躍するのは、どちらかというと魚座の象徴です。射手座の目的は、人々の心に火をつけて盛り上げること。同じ影の活躍でも、裏工作をして人の気持ちを煽ったり、盛り上げたりすることが得意というそうです。\n仕掛人として、どこに火を投下したら起爆するのかを見極めるには、裏の事情に通じていなくてはいけません。誰が力を握っていて、どのように働き、人々がどうしたら動くのか。それら全体の流れを把握することで、大きな物事を動かす力を手に入れるでしょう。\nこの度数を持っている人は、表向きは淡々としていながらも、ものすごい情報通で、その場の人の動きやその裏の事情にまで通じている、ということがありそうです。個人的なゴシップにはさほど興味はありませんが、それが全体にとって何が重要なことを示しているのであれば見逃すことはありません。\nあまり多くを語りませんが、いつもどこかでジッとみんなの動向や性格を眺めて、把握しているようなところがあるでしょう。必要に応じて裏から手をまわし、場を刺激して、みんながある方向へと向くように仕向けることもできそうです。"}, "射手座_6": {"sign": "射手座", "degree": 6, "symbol_ja": "クリケットの試合", "symbol_en": "A Game Of Cricket.", "key_phrase": "正々堂々と勝負することに心を熱く躍らせる人", "explanation": "スポーツを通してお互いの力を磨き合い、その能力を発揮する......というのは射手座にとっても最も適切な方法ともいえそうです。射手座の火は「摩擦の炎」であり、お互いに切磋琢磨しながら、その時々のベストを尽くして、さらにそれぞれが成長することを望むでしょう。お互いの持っている力の限りを尽くして、ぶつかり合うことになりますが、そこには守るべき一定のルールがあり、同じ条件の中だからこそ、勝負の面白さがあるかもしれません。\nクリケットの試合では身体的なテクニックはもちろんのこと、相手側の弱みをついて、出し抜くような頭脳戦も要求されます。また自分だけではなく、全体の試合運びがどのようになっているのかを把握する俯瞰的な全体視野も求められるでしょう。射手座の最も得意とする全体を俯瞰する力と、頭と身体を同時に使いながら目的を達成する能力とが、いかんなく発揮されます。スポーツの競技を通してライバルと戦うことで、持ち前の才能が存分に引き出されることになるでしょう。\nこの度数を持っている人は、熱い正義感の持ち主で、どんなことでも正々堂々と行おうとするでしょう。心身を鍛えるために他者と競合することも好むかもしれません。スポーツのみならず、ゲームや弁論といった頭脳戦を楽しむ人も多いでしょう。\n実践を通して改良を重ねていき、さらに上を目指していくような向上心もあります。試合の結果がどうであれ、力の限りを発揮して戦うことに充実を覚えるでしょう。"}, "射手座_7": {"sign": "射手座", "degree": 7, "symbol_ja": "人間のハートの扉をノックするキューピッド", "symbol_en": "Cupid Knocks At The Door Of A Human Heart.", "key_phrase": "予定不調和の行動のなかに喜びを見出す人", "explanation": "キューピッドは、その手に持っている弓矢を射ることで人のハートに火をつけることができます。新しい恋の経験は、個人を刺激して、未知のものへの期待と可能性とを大きくひらくでしょう。そしてそれは秘密であったり、なにかが隠されたりしているものであればなお、その人をより自由な世界へと精神を解放します。\nわたしたちの日常生活は安定していますが、同じ行為を繰り返しているうちに、生き方があるひとつの雛型のなかに閉じられていくでしょう。射手座はどこまでもわたしたちの精神を解放して、その自由な可能性を広げてくことが目的です。なので、ただひたすら平凡な毎日が繰り返されているなら、そこに穴を開ける必要があるでしょう。\nそれはどこか抜け駆けするような、安定した規律から背く必要があります。みんなが知っていることであれば、それは日常の延長でしかないため、その裏をかくことがポイントといえるでしょう。\nこの度数を持っている人は、どこか安定した日常とは一線を引いたところに魅力を感じ、惹かれることがありそうです。予定調和のなかに落ち着いて暮らすよりも、急にそこから離れたくなったり、みんなには内緒でまったく異なる喜びを求め始めたりすることがあるかもしれません。ちょっと背徳的なことや、人にはいえないことにも惹かれるところがあって「誰も知らないけれど、自分だけが知っている喜び」を得ることが、心地よくもあるでしょう。\nどことなく、うしろめたさを感じながらも、未知の体験に身をゆだねようとする衝動があるかもしれません。"}, "射手座_8": {"sign": "射手座", "degree": 8, "symbol_ja": "新しい元素が形成されている地球の深部", "symbol_en": "Within The Depths Of The Earth New Elements Are Being Formed.", "key_phrase": "いつも違う自分になりたい気持ちが渦巻いている人", "explanation": "常にいまここで起こっているものではない何かを求めているような焦燥感が身の内側にあるかもしれません。\n射手座は木星を守護惑星に持っていて、常に自分が成長していくことと、可能性を切り拓くことを求めています。そのためには慣れた場所に留まったり、同じ行為を繰り返したりするよりも、思いきってそこを飛び出し、新しい環境に身を投じたほうが良い時もあるでしょう。\n射手座は12星座が司る12の感覚では「運動感覚」を司るサインです。わたしたちが自分の身体を使っておこなう行為は、すべてこの運動感覚に紐づけられます。そして、わたしたちが何かをするときは、必ず先に「何をするのか」が決まっているでしょう。\nわたしたちは目的があって、その行為をするのです。しかし、この感覚がすぐれてくると、思考よりも先に「何をするのか」という目的やゴールや結果だけが見えてくるという逆転現象が起こります。これはいわゆる未来予知と関係するのですが、なぜそれが「そう」であるのかは、本人にもわからないでしょう。\nこの度数を持っている人は、まだ起こっていない何かや、始まっていない何かの予感だけをひしひしと感じて、どこか落ち着かない気持ちでいろいろなことに手をつけることがありそうです。時々、何をしていてもピンとこなくて、迷うことがあるかもしれませんが、内部では確実に何かが始まりつつあるのかもしれません。自分でもよくわからない衝動にかられて、これまでの予定調和から外れる行動をとることもあるでしょう。\n常に何かが新しい境地を開くようにとうながしていて、そして結果として、いつも新しい自分であり続けることになるかもしれません。"}, "射手座_9": {"sign": "射手座", "degree": 9, "symbol_ja": "階段で一段ずつ幼い子どもを導く母親", "symbol_en": "A Mother Leads Her Small Child Step By Step Up A Steep Stairway.", "key_phrase": "高い意識へ急激に上る可能性のある人", "explanation": "小さな子どもが母親に導かれるままに階段を一歩ずつ上っているサビアン・シンボルです。励まされて、難しいステップに挑戦し、また同時にそれを達成したことに子どもは大きな喜びを感じるでしょう。しかし、何のために階段を上っているのか、その上に何があるのかは、本人にはよくわかっていないかもしれません。\n射手座は守護惑星の木星に励まされて、とにかく可能な限り、めいっぱいまで自分を成長させることに喜びを感じます。火のサインですから、それは精神的な成長......意識の拡大や「悟り」に近づくような面にも示されるでしょう。なぜだかわからないけれど、形而上学的な学びに惹かれて、それをマスターしたい、そのすべてを知りたいと考える人もいるかもしれません。\nそしてこれはまた、そう望んだところに、ちょうどよく手が差し伸べられて、自分でもよくわからないうちに高いレベルへと達成する可能性のあるシンボルでもあります。\nこの度数を持っている人は、みずからの意識を成長させることに強い意欲があるでしょう。そのポテンシャルの高さゆえに、何か特別なことを知っていそうな師匠と巡り合うと、その人の導きによって思いがけなくも、むずかしいレベルと行き着くことがあるかもしれません。\n自身が知覚するよりも早くそれが起こるため「あれよ、あれよと言う間に」何かを成しえてしまうこともあるでしょう。強力な師匠を持つことによって急激な発展が見込めます。\nやがて自分の自覚がそこに追いついた後で、今度は誰かを導く側になることもあるでしょう。"}, "射手座_10": {"sign": "射手座", "degree": 10, "symbol_ja": "金髪の女神の演技が表現されるタイミング", "symbol_en": "A Theatrical Representation Of A Golden-Haired Goddess Of Opportuinity.", "key_phrase": "華やかな雰囲気で人目をパッと惹きつける人", "explanation": "このサビアン・ワードに描かれる金髪の女神というのは、幸運の象徴のようなもの。その女神が表現されるタイミングというのは、その人に対して『幸運の女神が微笑んだ瞬間』といえるかもしれません。\nそれは、誰もがそうだと見てとれるような、わかりやすい成功が成し遂げられたときともいえるでしょう。ビジネスで成功する、頑張って入賞した、宝くじで大当たりした、スポーツで有名になる、女優やモデルとして表に出た、戸建ての家を手に入れた、イケメンでやさしい恋人ができた......など、ある種のステレオタイプのように思い描かれる成功の形というものがあります。\n本来個々の求める幸せというのは千差万別であるはずですが、人はまず目の前にあるこうしたわかりやすい幸せに憧れるようなところがあるかもしれません。\nこの度数を持っている人は、華やかで、人目を惹くようなカリスマ的な雰囲気を持っているでしょう。いつもゴージャスで楽しそうであったり、わかりやすく何かが満たされていたりすることを望み、そのためにどうすればいいか、考えるかもしれません。その欲求が精神的な方向へと向けられると、真実を探求することや、真理に近づくことをめざそうとすることもあるでしょう。\nいずれにしても、人を惹きつけるような魅力や話術にすぐれていて、そうとは望んでいなくても、グループのリーダーとなることもありそうです。独自のセンスが冴えていて、パッと人の心を魅了するでしょう。"}, "射手座_11": {"sign": "射手座", "degree": 11, "symbol_ja": "古い寺院の左側にある", "symbol_en": "人間の身体のような形状の燃えているランプ", "key_phrase": "Shaped Like A Human Body.", "explanation": "古い寺院の左側にある人間の身体のような形状の燃えているランプ\n精神的な修行や学びに興味を抱いて実践する人\n古い寺院には長い時を超えて受け継がれている数々の教えがあります。かつてそこで学び、修行した人たちがいなくなったとしても、そこで彼らが得た精神的な成果はそこにずっと残り、現在を生きている今世の人たちにつながっているでしょう。\n人間の身体のような形のランプが燃えているのは、精神の力によって肉体までが目覚めた状態であるのかもしれません。肉体を持った存在でありながら、光明を得るというのが、すべての修行者の志す道といえるでしょう。\nわたしたちは修行を始めると、まず感情を扱う術を覚え、次いで思考を扱う術を覚え、最後に身体を扱う術をマスターするといわれています。身体を意識で扱えるようになると、呼吸や心臓の速さまで変えられるともいいます。食べず、眠らずに経文を唱えることで究極の境地を求めることも、まさにそこに通じるものがあるかもしれません。\nこの度数を持っている人は、高い精神性を獲得することに強く惹かれて、身体ごと丸ごとその世界を思いきって飛び込むことがあるでしょう。古代から受け継がれている数々の教えに惹かれて、いろいろな研究をしてみたり、実践してみたりすることもありそうです。ありきたりの平凡な生活にはさほど興味がなく、自分自身の意識をどこまで広げられるのか、ということの方がそそられるでしょう。\n人間の意識と心、それから身体の持っている可能性を最大まで引き出してみたいという欲求を抱くかもしれません。\nわたしたちの身体は、たましいが宿る寺院。それを美しく磨きあげることで、わたしたちは「永遠の命」を得ることができるのでしょう。"}, "射手座_12": {"sign": "射手座", "degree": 12, "symbol_ja": "鷲に変化する旗、", "symbol_en": "そして夜明けに敬意を表する", "key_phrase": "A Flag Turns Into An Eagle; The Eagle Into A Chanticleer Saluting The", "explanation": "Dawn.\n鷲に変化する旗、そして夜明けに敬意を表するおんどりに変化する鷲\n思い立ったら、なにがなんでもそれを実現させる人\n旗というものは、ある種の思想や考えや目的をシンボル化したもの。その旗が鷲に変化するということは、その思想や考えを実際の行動で示そうということかもしれません。のみならず、それが更に夜明けがきたことを告げるおんどりに変わるということは、自分の思いや理想をまわりに広めていく力も持っている、ということでしょう。\n火のエレメントに属する射手座は、人間の内なる感覚のなかでも、運動感覚と関わっています。これはあらゆることを動きながら考えることであり、また動くことによってひらめきのほうが先にやってくる、といったことが起こります。実際に動き始めることでエネルギーが高まって、さらなるやる気が引き出されることも起こるでしょう。\n非常に高いポテンシャルと、エネルギッシュな情熱とがあふれていそうです。\nこの度数を持っている人は、なにかひとたび志したなら、無我夢中になって取り組むことになるでしょう。やればやるほど、どんどんハマっていき、パワーが内側からあふれてくるようなところがありそうです。高い理想や憧れを抱いては、それを実現させようと奮闘するでしょう。\nまた、自分のなかで「良い」と感じたものを広めてまわるパワフルさも兼ね備えています。先見の明が際立ち、これから来る時代の流れや、それに対して必要なことを読み解く能力もありそうです。\n新しい思想や価値観をみずから実践して広めていくような立場になるかもしれません。新しいことをするときは失敗することもあるかもしれませんが、それでもめげずに何度でも飛び立つことができるでしょう。"}, "射手座_13": {"sign": "射手座", "degree": 13, "symbol_ja": "明るみに出る未亡人の過去", "symbol_en": "A Widow\\'s Past Is Brought To Light.", "key_phrase": "直観が高まってさまざまな事柄を認知できる人", "explanation": "占星術では一般的に夫が太陽で、妻が月として象徴されますが、それはわたしたちの顕在意識と無意識とも言い換えることができるかもしれません。その無意識の月の中のさらに奥に隠された秘密が明らかになる......というサビアン・シンボルです。\n月は通常わたしたちの意識では知覚できない領域の情報を拾い集めることができます。「なんとなく嫌な予感がする」「これは良い感じのものだ」といった情報を、直感の力で読み解くことができるでしょう。\n射手座が知覚領域を広げて、心と身体の領域まで自在に扱えるようにその可能性を解放したことで、わたしたちは本格的に、日頃の身体感覚でキャッチしている情報まで詳細に読み解けるようになったのかもしれません。通常そういった領域の情報は、思考の検閲機能によって意識上にのぼることが牽制される代わりに、夢の中でさまざまなものに形を変えて、ある種のビジョンとしてメッセージを伝えてきます。ここではあたかも起きているときでも、それらの微細な情報をキャッチして、読めるようになってきたという事かもしれません。\nこの度数を持っている人は、鋭い直観力を持っていて、どこにも書いていないことや、誰も話していないことであっても、なぜか理解できるということが起こるでしょう。火のエレメントは「理解する能力」を表しますが、それは思考を超えたところで直接的に対象物とつながり「これはこういうものだ」と認知する力です。\nそれが高まると、ある場所へ出かけた時や、あるいはある物を見たときに、そこには記されていない事柄まで認識するということが起こるでしょう。夢や第六感を通して、メッセージを受け取ることもあるかもしれません。"}, "射手座_14": {"sign": "射手座", "degree": 14, "symbol_ja": "偉大なピラミッドとスフィンクス", "symbol_en": "The Great Pyramid And The Sphinx.", "key_phrase": "地球と宇宙の持っている謎の解明に興味を抱く人", "explanation": "ギザのピラミッドとスフィンクスは古代に高度な文明を人間が持っていたことを示す重要なモニュメントです。いまもなお、謎が多く秘められていて、どのように作られたのかもわかっていません。古代の人々が持っていた叡智が集結し、悠久の時を超えて、霊的な存在と一体化するための仕掛けがふんだんに施されているでしょう。\n射手座は限りなく精神を解放して、自分の可能性のすべてをひらいていくことを望むサイン。そのために興味が限定された今に留まることはなく、より広く、深く、地球全体あるいは宇宙へと向けられていきます。\n古代の人々がどのように人間の霊性をとらえていて、また精神の解放を試みていたのか。それらを知ることはまた、人間がいつの時代でも変わらずに持っている普遍性を理解することに通じるでしょう。\nこの度数を持っている人は、古代の知識や人々の残した大いなる功績や歴史、そこに生きていた人たちがどのように自身の霊性を扱っていたのかということに興味を抱きそうです。古い文献を紐解き、時に実際に出かけてみて、体験し、みずからの直感で「それが何であるのか」を解明します。その歴史や文化の中に宿っている人間の精神性に特に興味を抱いて、どのように高次の存在とつながろうとしていたのかということを自分なりに理解しようとするでしょう。\n時には文献やすでにわかっている事実を超えたところで、それをとらえようとするかもしれません。意識が壮大に広がって、概念的な事柄を考える能力が高まりますが、その分限定されたローカルな現実感覚は希薄になるでしょう。"}, "射手座_15": {"sign": "射手座", "degree": 15, "symbol_ja": "自分の影を探しているグラウンド・ホッグ", "symbol_en": "The Ground Hog Looking For Its Shadow On Ground Hog Day.", "key_phrase": "高い理想や学んできたものを地上で実践する人", "explanation": "アメリカとカナダで毎年2月2日にグラウンド・ホッグデーという行事が行われます。これは冬眠から目が醒めたばかりのリスの一種であるグラウンド・ホッグを使った占いのようなもの。巣から出てきたグラウンド・ホッグが、外で自分の影を見つけると驚いて巣に戻ってしまい、そうすると冬があと6週間は続くと予想され、もし影を見ずにいるなら、春の訪れが近いとされます。\nこのグラウンド・ホッグはとても慎重な性格で、地上に出ると自分の影を一生懸命に探すそうです。この姿は、わたしたちがこれまで学んできたこと、蓄えてきた知識や過去の叡智、追求してきた高い理想といったものたちを、具体的にどのように地上での生活で活かしていくのかを見出すことに通じるでしょう。\nわたしたちはそれを地上に映し出される影になぞらえて、具体的な方法を探していきます。それが見つかるまでは、なんとも落ち着かない気分になることもあるでしょう。しかし、ひとたびそれを見出すことができたなら、自分の得意とする世界において、高い信念や理想や学びを存分に反映させて、活躍することができそうです。\nこの度数を持っている人は、いつも学び続け、より高いレベルの理想を抱き続けることが多いでしょう。射手座は常に理想主義で、まだここにはない、高いレベルのものを追い求めていきます。それを単なる理想では終わらせず、実際に得た多くの学びや知識を背景に、具体的にそれを実践するための手法を模索することになるでしょう。\nそれが見つかるまでのあいだはとても慎重に時間をかけて試行錯誤しながら、いろいろなやり方を試していくかもしれません。その過程で時には弱気になることもあるでしょう。\nしかし、自分なりの活かし方や落としこみ方が見つかると一転して、のびのびと才能を大きく発揮することができそうです。"}, "射手座_16": {"sign": "射手座", "degree": 16, "symbol_ja": "食べ物を期待して船のまわりを飛ぶカモメ", "symbol_en": "Sea Gulls Fly Around A Ship In Expectation Of Food.", "key_phrase": "地に足をつけて生きる訓練をする人", "explanation": "いずれの星座もその半分の折り返し地点を過ぎる頃から、自分の足りないところを埋めるために、向かいの星座の質を学び始めます。射手座は前半の15度までのあいだに、視野をめいっぱい広げて、可能な限り、精神を自由に羽ばたかせてきました。その成果が実って、深く広い見解と高い意識が身についたのですが、しかし実際の現実世界では多くの人たちがそのことに関心を寄せず、気づきもせずに、目の前の忙しい日常に追われて暮らしています。\nここで射手座は向かいの双子座の力を取り入れます。すなわち、獲得した高度な意識や叡智を日常の中でどうやって生かすか......というテーマです。空を飛んでいるカモメが高い意識を得た射手座の感覚だとすると、海を進む船は現実という大海原を進む、地に足のついた日常感覚といえるかもしれません。\nこの度数を持っている人は、しっかりと地に足のついた感覚を得るために、あえて自分の興味とはまったく関係のない実務的な仕事をしたり、どこかの団体に所属したりすることがあるでしょう。それが大して面白くなかったとしても、日常を生きるためにはそれらが必要であり、そこから多くの「普通」の生き方を学ぶかもしれません。\n精神的な学びに興味をもって、いろいろなことを勉強する可能性がありますが、あくまでそれでは趣味の教養の範疇としておいて、現実の中では実際的な環境からなかなか離れないでしょう。\n柔軟性と共に依存性が高まりますが、まわりからの求めに応じる生き方を選ぶことで、さまざまな現実的なやり方を学ぶ人です。"}, "射手座_17": {"sign": "射手座", "degree": 17, "symbol_ja": "復活祭の日の出の礼拝", "symbol_en": "An Easter Sunrise Service Draws A Large Crowd.", "key_phrase": "みんなと一緒に大きな希望に向かう人", "explanation": "復活祭はキリストの復活を祝うお祭りですが、ここで火のエレメントの持ち前の霊性が取り戻されることになります。日の出と共にイキイキとよみがえるのは、人の持っている、たましいの情熱や明るさ、向上心といったものかもしれません。\n射手座の前半でどんどん成長させていた精神性を実際的な生活の中で使いこなすことが、このサビアン・シンボルが持っているテーマです。射手座は本来、自分だけがしあわせになることにさほど興味がなく、自身も含めて、まわりのみんなと世界とがより良くなることを願っています。自分が学んで得た「人類の持っている無限に近いほどの可能性」を熱くみんなに訴えかけていき、気持ちを一丸にして、より大きな成長へと導くことができるでしょう。\nこの度数を持っている人は、人間が本来持っている、たましいに火をつけて、やる気や向上心や情熱を呼び覚ますことになりそうです。熱く信念を語り、人が自由に、しかし自立心を持って生きることがどんなに素晴らしいのかということを実践し、その気にさせる才能があります。カリスマ的な魅力があり、多くの人たちがあなたの姿を見て「自分もそのように生きよう」と決意を新たにするかもしれません。そしてそのことがまた、あなた自身の情熱を再燃させることにつながるでしょう。\nひとりでいるよりも、多くの人たちと共に理想を語り、盛り上がっていくことに情熱を見出します。人を引っ張っていくような、強いリーダーシップがあるでしょう。"}, "射手座_18": {"sign": "射手座", "degree": 18, "symbol_ja": "日除け帽で頭を守りながら", "symbol_en": "ビーチで遊んでいる子どもたち", "key_phrase": "日除け帽で頭を守りながらビーチで遊んでいる子どもたち", "explanation": "火の情熱の力を適度に扱うことのできる人\nギラギラと輝く太陽の日差しを、帽子をかぶることで緩和させて、ビーチで子どもたちが遊んでいます。太陽は、太陽系の惑星の中心となる星であり、占星術のホロスコープ・チャートの中においてももっとも重要な天体です。わたしたちの人生そのものに活力をもたらし、楽しく盛り上げていこうとするパワーの源。射手座は火のエレメントの属するサインですが、火のエレメントの星座は、いずれも、この太陽の光の活動を活発にさせることを目的としています。\n日々の暮らしに埋没していると、つい忘れてしまいそうになりますが、わたしたちの魂は人間にしかできない何かを体験しにやってきています。その目的を思い出させるのが火のエレメント。\nしかし、火の勢いが強くなりすぎると、今度はわたしたちの生活のリズムそのものがめちゃくちゃになっていきます。特に子どもたちにとって火が強くなりすぎると「徹夜でゲームに熱中する」「人よりも多くいいね!!を集めるために虚栄を張り続ける」といった興奮状態を止められなくもなるでしょう。\nこの度数を持っている人は、火の持っている情熱を適度に抑えつつ、上手に扱うことができそうです。まわりを巻き込みながら盛り上げる術を持っていると同時に、どこかでやりすぎないように調整することができるでしょう。\nもっとも適切なタイミングで楽しむこともうまいかもしれません。朝から晩までビーチで遊ぶとクタクタに疲れて、肌も赤くヒリヒリして、かえって支障をきたすことになりますが、ちゃんと日除けをしながら時間を見計らって遊ぶことで、疲れを大きく残さずに、一番充実した思い出を作ることができるでしょう。\n自分自身を調整することがうまいだけではなく、人を守ったり導いたりする立場にも向いているようです。"}, "射手座_19": {"sign": "射手座", "degree": 19, "symbol_ja": "人間の脅威のない安全な土地へ", "symbol_en": "子どもたちを連れて引っ越すペリカン", "key_phrase": "Bringing Up Their Young.", "explanation": "人間の脅威のない安全な土地へ子どもたちを連れて引っ越すペリカン\n理想の環境に身を置くことで自分を成長させる人\nペリカンはみずからの胸に穴をあけて、その血を子どもたちに与えて育てるという伝説があります。この逸話からペリカンは最も強い子孫への愛を持っている動物とされて、自分の愛を捧げたキリストの象徴であるともされているそうです。\nそんな深い愛情を持っているペリカンが子どもたちのために良い場所に引っ越そうとしているサビアン・ワードです。これは射手座が自分の可能性を最大にまで引き出せる理想の土地を求めて引っ越すということに通じるでしょう。\n射手座は前半の度数のうちに自身の精神性を最高にまで高めて、解放することを経験します。その意識を持ったまま、現実の世界の中での理想の実践がいよいよ始まるのでしょう。\nそのためのふさわしい場所を見つけ出すことがここでは描かれています。\nこの度数を持っている人は、自分が理想の状態で生きるためには、どこで暮らすのがふさわしいのかということを考えて、実際に引っ越す可能性があります。ずっと同じ場所に暮らして、その地域の生き方に馴染むということは、時に人間の持っている可能性を制限することにもなるでしょう。もっとも自分の可能性を引き出し、純粋に成長させることのできる環境はどこなのか......自分にとっての理想の場所を探し出して、引っ越すことが何度かあるかもしれません。\nまた、子育てを通して、子どもの才能を引き出すために最もふさわしい場所を見つけようとすることもあるでしょう。さまざまな汚染や誘惑を断ち切って、最も良く成長できる場所を探し出し、実践する人といえそうです。"}, "射手座_20": {"sign": "射手座", "degree": 20, "symbol_ja": "昔ながらの北部の村で", "symbol_en": "夏のあいだに使う氷を", "key_phrase": "In An Old-Fashioned Northern Village Men Cut The Ice Of A Frozen Pond", "explanation": "For Use During The Summer.\n昔ながらの北部の村で夏のあいだに使う氷を凍った池から切り出している男たち\nどこでも柔軟に働くことのできる人\nサビアン・シンボルになっている古くから続いている北部の村では、夏のあいだでも凍り続けている池があり、村人たちはその氷を切り出す伝統的な方法を知っているのでしょう。氷のない土地の人々に求められるものに応じて、男たちが協力し合って、村の氷を切り出しているのかもしれません。伝統的な技術や知識を身につけた射手座が、必要とされる人たちのためにそれを具体的に生かす方法を見つけ出したともいえるでしょう。\n度数の前半で射手座はどんどん自身の視野と可能性を広げていき、精神的な自由を獲得しました。後半ではその広範な知識や視野の広さを生かして、いまいる場所でそれを発揮する方法を模索していきます。\nそしてここではついに、どこの誰に求められたとしても、その時々の状況に応じるだけの能力を発揮できるようにもなったのでしょう。\nこの度数を持っている人は、非常に高い適応能力の持ち主で、どこへ行っても、誰といても、その場に合わせて持ち前の知恵をフルに生かし、必要なことを実践できそうです。その場で求められていることに対して、現場のみんなと力を合わせて成し遂げることに大きな喜びを感じるでしょう。多少の障害があってもものともせず、むしろ難しいテーマの方がやりがいを感じるかもしれません。\n学んできた知識や技術をあらゆることに対して適用できるため、どのような状況や作業であっても楽しんで取り組むことができそうです。自身の経験を生きた知恵に変えて、みんなと分かち合っていく人です。"}, "射手座_21": {"sign": "射手座", "degree": 21, "symbol_ja": "借りたメガネをかけている子どもと犬", "symbol_en": "A Child And A Dog Wearing Borrowed Eyeglasses.", "key_phrase": "身の丈を超えた難しい課題に挑む人", "explanation": "本来、子どもや犬にメガネは必要ありません。子どもと犬は自然体のままに、のびのびと過ごすことのできる存在といえるでしょう。\nしかし、彼らはいま、あえて必要のないメガネをかけて世界と対峙しています。メガネはピントの合わないところで視力を調整するもの。この子どもと犬は自然のままの姿でいることよりも、もっと別の新たな可能性に自身のピントを合わせることを求めているのかもしれません。\n木星に守護されている射手座は、いつも同じ状況でいることを好まず、常に学び続け、挑戦し続けます。なんなく自然体でこなせることには面白みを見出せず、あえてもっと難しい課題や高い目標をめざすことに意欲を示すでしょう。\n火のエレメントは内なるやる気を活性させることを好み、そして実際に着手します。そのため多少の無理をすることは厭いません。これはそのような意欲あふれる姿が描かれているのでしょう。\nこの度数を持っている人はチャレンジャーで、自分の身の丈より高い課題を目標としたり、まったくこれまでとは違うやり方に飛び込んだりすることがありそうです。まわりの人たちが「無理なのではないか」と心配するようなことにも果敢に飛び込んでいき、そのために多少の負担があったとしても構いません。むしろ多少の無茶があった方がやる気が高まるため、ハードな作業や現場が性に合っているでしょう。\n適応能力が非常に高く、その場に合わせて自分を矯正し、与えられた任務を素早く遂行しようとします。せっかくやるなら徹底的に成し遂げようとする思いが非常に高い人といえるでしょう。"}, "射手座_22": {"sign": "射手座", "degree": 22, "symbol_ja": "中国人の洗濯物", "symbol_en": "A Chinese laundry.", "key_phrase": "どこへいてものびのびと自分らしくいる人", "explanation": "中国人は世界のあちこちに移民して、彼らのコミュニティを作り出します。最初は新しい環境に馴染もうと言語を学び、文化を学ぼうとしたかもしれません。しかし、結局は慣れた言語や文化の方が安心できるし、自分らしくいられることがわかると華僑を作り、どこであろうとも、自分たちのペースで暮らすことになるでしょう。\n木星の守護を受けている射手座は、いつも新しい環境やチャレンジを求めています。だけれども、どこへ行き、何をしたとしても、本来の自分のやり方やペースを見失うと何事もうまくいかないでしょう。逆にいうならば、いつもの自分らしさやペースや意識がそこにのっているからこそ、わたしたちはのびのびとチャレンジし、成果を出すことができるのです。\nどこへ行き、何をしようとも自分は自分。その感覚がしっかりと馴染んでいるからこそ、思い切った挑戦ができるのかもしれません。\nこの度数を持っている人は、いつも、どこにいても自分らしく、のびのびと過ごすことができるでしょう。新しい学びやチャレンジを楽しみますが、決して無理しすぎることはなく、自然体の自分のペースとやり方で取り組むかもしれません。その結果として、いつも元気で明るく過ごし、まわりにパワーを与えることができるでしょう。\nどこにいてもブレることがなく、変わらない人ともいえそうです。特別などこかだから自分らしくいられるのではなく、どこにいてもそこを理想の場所に変えて、自分らしくいられるのでしょう。\n異文化に触れることを好み、海外へ出かけてその文化と関わったり、逆に自国のものを紹介したりすることがありそうです。そんな交流ものびのびと楽しむでしょう。"}, "射手座_23": {"sign": "射手座", "degree": 23, "symbol_ja": "移民グループの求めに応じる新しい国の入り口", "symbol_en": "A group of immigrants as they fulfill the requirements of entrance into", "key_phrase": "移民グループの求めに応じる新しい国の入り口", "explanation": "ありのままの自分自身で世界を渡り歩く人\nもし、新しい国に移民するのであれば、その国にわたしたちは深く馴染んでいく必要があります。しかし、どう転んだところで、その国で生まれ育った人とまったく同じになることが不可能でしょう。\nそこでわたしたちは自分らしさ忘れずに携えたまま、新しい文化へと飛びこんでいきます。そうすることで自分らしく、だけれども同時に安心してあらゆる環境に慣れることができるでしょう。\nこれは非常に高い適応能力を示すサビアン・シンボルです。どこへ行っても自分らしさを忘れないまま、つまり自分のすべてを肯定した状態で、そこにいることができるのです。\nどこへ行こうとも人間の暮らしの基本的な構造はそう大きくは変わりません。その意識も、思考も、感情も、わたしたちは誰もが似たような構造を持っているのです。そのことに気づいていればこそ、どこへ行ったとしてもすんなりと馴染むことができ、同時に自分らしさを忘れずにもいられるのでしょう。\nこの度数を持っている人は、非常に高い柔軟性と適応能力がありそうです。射手座の持っている数々の能力が開花して、視野広く、どこへ行ったとしても、その構造を理解して、馴染むことができるでしょう。その場で起こっていること、求められていることに自分の意志を沿わせていき、成し遂げることに純粋な喜びを感じます。\nフランクでオープンな人柄であり、裏表がなく、正直なため、まわりにいる人たちのことも寛がせることができるでしょう。多くの人たちとの関係をのびのびと楽しめる人です。"}, "射手座_24": {"sign": "射手座", "degree": 24, "symbol_ja": "コテージの入り口に止まっている青い鳥", "symbol_en": "A Bluebird Perched On The Gate Of A Cottage.", "key_phrase": "しっかりと知識体系を持ちながら更に進化を望む人", "explanation": "青い鳥は幸せの象徴。それが自分の住むコテージの門の上に止まっています。鳥は新しい刺激や情報を運んできますが、もっと幸せになるための道しるべを持ってきてくれるのかもしれません。\nコテージはある場所にどっしりと居を構えているため、自分自身の中で安定感があることを示しています。射手座の安定ですから、これまで学び、身につけてきた思想体系が、しっかりと自分の中で根付いているということかもしれません。\nしかし、それがあるからといって、そこで閉じることはなく、さらにより良くなるための知識を求め続け、みずからを変えていく用意があることが、門の上の鳥の存在が示しています。射手座は柔軟宮の星座ですが、思想体系・知識体系というものは、インターネット上のオープンリソースのように常に誰かの新しい見方や学説が付随されていき、進化していくのでしょう。\nこの度数を持っている人は、学んできたことを自分なりにひとつの体系として、しっかりと身につけ、実践しているようです。あらゆる物事に対して、自分なりの意見や見解を述べることもできるでしょう。それは自分の中で筋道の立ったひとつの考えがしっかりと息づいているため。\nしかし、そうであると同時に、自分とは異なる意見や新しい見方に対しても常に意識を開いて、受け入れる準備ができているでしょう。そうすることによって、自分がより柔軟に、さらにもっと成長することができます。\nのびやかな感受性とオープンな成長意欲を持っている人だといえるでしょう。"}, "射手座_25": {"sign": "射手座", "degree": 25, "symbol_ja": "玩具の馬上にいる小太りの少年", "symbol_en": "A chubby boy on a hobby-horse.", "key_phrase": "たくさんの教養と共に可能なプランを練り上げる人", "explanation": "玩具の馬にまたがった小太りの少年がいるのは、おそらく家の中でしょう。少年が裕福であることは、小太りであることや玩具の馬が与えられていることから想像できます。\n少年が持っている多くのものは、射手座が象徴する知識や教養、広いものが見方といえるかもしれません。馬は太陽の化身とされる動物ですから、これにまたがっている少年は、真に喜びから生きるための、さまざまな手段を知っている可能性があります。\nしかし、それでもまたがっているのは玩具の馬であり、それは実践の前のシミュレーションの段階であるともいえるでしょう。少年は家の中でたくさんの教養と共に、みずからの夢や理想を叶えるためのプランを練り上げています。多彩な展開を容易に思い描くことができるときであり、机上で想像をめぐらせることが得意であるともいえるかもしれません。\nこの度数を持っている人は、たくさんの知識を身につけていて、頭を使っていろいろなことを考えることを好む傾向があるでしょう。限られた条件の中で一体なにができるのか、多角的に可能性を広げて、もっと良くなること、成果が上がることを生み出せる資質があります。\nいろいろとイメージを膨らませて、物事を論じ、大胆な仮説を立てることも得意かもしれません。どんなものでも、その物事の可能性をできる限り最大まで引き出そうとするでしょう。\nどちらかというと実際に行動するよりも、考えることが得意な策士のタイプです。教養をより豊かにすることを楽しみます。"}, "射手座_26": {"sign": "射手座", "degree": 26, "symbol_ja": "戦いにおける旗手", "symbol_en": "A Flag Bearer In A Battle.", "key_phrase": "熱い信念を掲げて最前線で語る人", "explanation": "戦いにおける旗手の役割は大きく、味方を鼓舞するために欠かせない存在です。旗が上がっていることで、味方が善戦していることを兵たちは確信し、旗が前線へ上がっていくのを見て、兵たちは戦意を高めるでしょう。大舞台の上で仲間たちを鼓舞して、時に采配を振るうことにもなるかもしれません。\nこれまで学び、身につけてきたものを、すべて活かすときがやってきました。机上で論じ、シミュレーションし、練り上げてきたものを、大勢の前で披露して実際に仲間たちを盛り上げていくことをする時です。\n射手座にとって戦いの場というのは、スポーツだったらライバルのチームたち、論争だったら自分とは異なる説を提唱する人たちのいる場でしょう。そこで策略と知略とを大いに発揮して、自分なりの思想を啓蒙していくことになります。反対する人や異論を唱える人がいたとしても、前線で主張し続けるのが旗手の役割といえるでしょう。\nこの度数を持っている人は、自分の理想を情熱的に世界に打ち出す力を持っています。「もっと世界がこのようになればいいのに」という熱い信念があり、さまざまな教養を身につけた上で、今がどのようになっていて、なぜそうするのか良いのかという論拠を打ち立てるでしょう。\nそれを周りに知らしめる広告塔のような役割があり、誰からなんと言われようとも、意志を表明し続ける必要があります。反論を受けることもありますが、それは切磋琢磨の機会となるでしょう。むしろライバルたちの存在が、気力を増幅させてくれるかもしれません。"}, "射手座_27": {"sign": "射手座", "degree": 27, "symbol_ja": "仕事している彫刻家", "symbol_en": "A sculptor at his work.", "key_phrase": "本当に良い教えを世の中に普及させる人", "explanation": "彫刻家が何かを創り始めるときは、頭の中に何を作るのかというイメージがあるでしょう。その頭の中にある理想の形を、実際に現実の中で形に落とし込んでいくことがテーマといえるサビアン・シンボルです。\nわたしたちが成長することに必要で欠かせないと感じられた確信や手応え、信念といったものを、もっとわかりやすい形で人に示したいと考えるかもしれません。良い知識やツールを普及させて、みんなで共有することで、世界がもっと良くなっていくのだという確信がそこにはあるのでしょう。そして、それが実際に誰かにとって良い成果がもたらされたときに「やっぱり間違っていないのだ」という思いに変わるのかもしれません。\n射手座は火のエレメントに属し、それはわたしたちの精神的なところと関わっています。もっと自身が自由に解放されてゆき、成長していくということに対する切望があり、まわりの人々の情熱にも火をつけていくことになるでしょう。ここではそれがしっかりと形を伴って、人の生き方まで変えるような働きかけが起こるのかもしれません。\nこの度数を持っている人は、自分の得た手応えや信念を何かしらの形として具体的に示したいという思いがありそうです。他者に対して熱い思いを語るのみならず、もっと深いところへと働きかけることになるでしょう。\nそれは個人的な要望というよりは、本当にそれがみんなのために良いのだという信念から起こる欲求です。みんながそれを知り、理解して、人生に取り込むことで確実に人生が良くなるだろうという予想を、確信したいのでしょう。\nそして実際にあなたの話を聞いた人の多くが影響を受けて、その生き方を変えるかもしれません。"}, "射手座_28": {"sign": "射手座", "degree": 28, "symbol_ja": "いまだに使われている", "symbol_en": "美しい流れの上にかけられた古い橋", "key_phrase": "いまだに使われている美しい流れの上にかけられた古い橋", "explanation": "ありきたりの形のなかに自身の理想をのせる人\nさまざまな経験をした射手座がようやく見つけ出した素晴らしい思想や技術を、みんなも体得して実践すれば世界がもっと良くなるのにと思って、一生懸命に普及に努めます。強く熱く訴えることで、それは多くの人たちの心に響きますが、しかし同時になかなか思ったようには根付いていかないということも起こるでしょう。\nなんだかんだとみんな日常が忙しく、一時的な影響は受けたとしても、いつものルーチンと慣れたやり方から逸脱することができません。そこで逆に、みんながすでに馴染んで使いこなしているものを利用して、そこに理想的な思想を盛りこもうと考えるのがこのサビアン・シンボルです。\n橋は陸と陸のあいだに渡りをつけるもの。そのあいだを流れているものが射手座の志している美しい理想だとすると、古くから馴染んでいて、誰もが安心する橋を使うことで、もっとすんなりと思いが行き渡るようにと試みるのでしょう。\nこの度数を持っている人は、多くの人たちにアプローチをするために、あえて普通のやり方を選ぶことがありそうです。変わったことをするよりも、みんながやっていることがどんなことなのかを観察して、見つけ出し、その中に自身の理想や思想をうまくのせていくでしょう。\n日常の中に根付いている伝統的な教えや、古くから伝わる伝承や習慣に興味を持つこともありそうです。みんながわかりやすく理解できる教えや形を使うこともあるかもしれません。射手座が最大限までに壮大に広げた理想を着地させる準備が始まったのでしょう。"}, "射手座_29": {"sign": "射手座", "degree": 29, "symbol_ja": "エレガントな郊外の家の芝を刈る太った少年", "symbol_en": "A Fat Boy Mowing The Lawn Of His House On An Elegant Suburban Street.", "key_phrase": "学んできたことをシンプルな形で表現しようとする人", "explanation": "太った少年が自宅で芝刈りをしています。少年が太っているのは、射手座で充分にいろいろなことを学び、多様な価値を身につけたからといえるでしょう。\nしかし今では、その太った身体が彼の身動きを重くさせているかもしれません。すっきりと芝を刈り込んで理想の庭になるように整える作業は、これまで射手座で学んだ多くのことを、いよいよ現実社会の中で活かす山羊座の時が近いことを示しています。\n山羊座の段階になると、わたしたちは自分の属する社会的コミュニティの中で、現実的な成果をあげていかなくてはなりません。そこではローカルの特徴を活かした具体的な手法が求められ、射手座が身につけた広範な視野や形而学的な理解は役に立たなくなるでしょう。そこでそれらを刈り込む作業がここでは求められています。\nこの度数を持っている人は、地に足のついた知性を身につけようとするでしょう。いろいろと学ぶことを好みますが、そこから実際に活かせるようにシンプルにアレンジしていき、その実践的な知恵を役立てようとしていきます。多くのことができる可能性があったとしても、あえて手を広げすぎず、目の前の求められているものだけに集中しようとするところがあるでしょう。\nしかし、実際に使わないことでも学びたくなるため、本人の中では葛藤を感じることがあるかもしれません。現実的にやっていきたいという思いと、しかしさまざまな学びに惹かれる自分とがいて、いろいろな教養を身につけては、それをシンプルにそぎ落とすことを繰り返す人もいそうです。"}, "射手座_30": {"sign": "射手座", "degree": 30, "symbol_ja": "支持者を祝福する法王", "symbol_en": "The Pope Blessing The Faithful.", "key_phrase": "ひとつの思想体系をまとめ上げて普及させる人", "explanation": "射手座がこれまで学び続けてきたことをひとつの体系としてまとめ上げ、それをまわりに広めていくのが法王の役割です。木星に守護される射手座は、自分には無限の可能性があり、いつまでもずっと探求し続けることができる、より新しいものを獲得し続けることができると思いこんで、自身をより広い世界へと解き放ってきました。\nしかし、あらゆるものの成長は、そのものが持っている潜在的資質をすべて使いきった時に訪れる終わりがあります。射手座の最後でその事実と出会った時に、これまで学んで身につけたことを固定化することで広めていくというやり方にシフトチェンジするでしょう。\nここからマニュアル化することで再現性を持たせて、広く普及するという地のエレメントの象徴する山羊座の世界へと入っていきます。ここではまだ普及するものは思想体系ですが、これが実際に山羊座に持ち込まれた時には、現実に即していないものは改変されるのかもしれません。\nこの度数を持っている人は、これまで学んできたことをひとつの体系としてまとめ上げて、それを世に広めていくことに尽力するでしょう。しかし一度それを始めてしまうと、自分の言ったことを安易に変えることができなくなります。けれどもまた、それを繰り返すことによって、自分の立場や役割が明確に他者へと知られていくことにもなるでしょう。\n自分の信念をまわりから支持されることを通して、横への広がりを持ち続けることができます。射手座の終わりに来て、成長する方向が縦型から横型へと変化したともいえそうです。"}, "山羊座_1": {"sign": "山羊座", "degree": 1, "symbol_ja": "集まった部族たちに", "symbol_en": "力を認識させるインディアンの酋長", "key_phrase": "集まった部族たちに力を認識させるインディアンの酋長", "explanation": "社会の中で活躍する意欲がおおいに満ちている人\nインディアン......ネイティブ・アメリカンは部族ごとにそれぞれの伝統や文化を持ち、ある土地に根付いて、コミュニティを作って暮らしています。その複数の部族たちが集まる場において、ある部族の酋長がおのれの部族の立場と権利を主張し、まわりの部族たちを納得させようとしているサビアン・シンボルです。\n近隣の町長たちが集まって今後の重要なことを決めていく会議を想像すると、連想しやすいかもしれません。あるひとりの長の主張に対して全員が賛成することはなく、ある意見に対して中には激しく対立する人もいるでしょう。\nしかし、そういった緊張関係の中でも、この酋長はあえて強く自分の主張を続けます。それが自分の部族を守るためであり、安定した社会の基盤をもたらすことに通じると信じているからでしょう。\n山羊座は強固な社会的集団を形成することをひとつの目的としたサイン。限定された場において、全員が安心して暮らしていけるような、価値ある安定した基盤を作るために力を注ぎます。\nこの度数を持っている人は、社会の中で活躍しようとする意欲がおおいに満ちているでしょう。積極的に社会と関わっていき、その中で自分が役立ち、力を発揮できるポジションを求めて、そのための主張もするかもしれません。パワフルで仲間思いであり、物怖じしないので、リーダーとしての資質が十分にあるでしょう。\n強く対立している人たちが同時にいるグループであっても、半ば強引にまとめ上げようとする手腕もありそうです。その指導力と積極的な姿勢を生かして、社会でおおいに活躍できるでしょう。"}, "山羊座_2": {"sign": "山羊座", "degree": 2, "symbol_ja": "ひとつが戦争で損傷している", "symbol_en": "ゴシック教会の三つのバラの窓", "key_phrase": "ひとつが戦争で損傷しているゴシック教会の三つのバラの窓", "explanation": "傷ついた経験を乗り越えて理想を実現させる人\nバラ窓はゴシック建築の教会に飾られた、ステンドグラスで作られる円形の窓。『奇(くす)しきバラの花』と言われた聖母マリアを暗示したものであり、わたしたちの内側にある神聖な愛や共感や受容力といったものの象徴でもあるでしょう。\nそのバラ窓のひとつが、戦争によって壊されてしまっています。それはわたしたちの内側にある愛や思いやりの気持ちが壊されて、傷つけられた状態であるともいえるでしょう。\n山羊座のひとつ前のサインである射手座で、わたしたちは世界に対する高い理想を掲げました。山羊座ではそれを地上で実際に実現させようと試みますが、理想をすべてそのまま降ろすことはむずかしいかもしれません。実現しようとする過程において、現実世界からのさまざまな制約があったり、理想を否定する反対勢力があったりして、信念の一部が壊されてしまい、それに傷けられたともいえるでしょう。\nこの度数を持っている人は、高い理想を内側に秘めていて、それを実現しようと奮闘するでしょう。しかし行動するにあたって、その高い理想を打ち砕かれるようなことが社会的な事情から生じて、実際に損害を被ったり、精神的に傷つけられたりすることが起こるかもしれません。実際になにかしらの目に見える形として、被害を受けることもあり得るでしょう。\nその経験が、この度数の持ち主にとても現実的な力と考え方を持たせることになります。そして痛みを乗り越えて、実践的な力の使い方を学ぶことで、最終的には理想を実現することができるでしょう。"}, "山羊座_3": {"sign": "山羊座", "degree": 3, "symbol_ja": "熱く新しい経験を求めて", "symbol_en": "現実を創り出していく人間の魂", "key_phrase": "熱く新しい経験を求めて現実を創り出していく人間の魂", "explanation": "可能性をひらくために新しい経験を求め続ける人\n自分の内側にある理想や願望を、何かしらの目に見える明確な形として示したい、確認したい、というサビアン・ワードです。ひとつの前の星座である射手座は火のエレメントに属するため、その理想は自分に内にある概念のまま、具体的な形がなくても扱うことができました。しかし山羊座は地のエレメントに属するため、目で見て、触れて、誰から見ても「そうである」と再現できる形にしてはじめて、それを扱うことができるようになります。ですから、ここでは自分の内にある思いや理想を、何かしらの形に変えて示すことをめざすでしょう。\nだけれども、それがどんな形のものであるのかということは、実際に取り出してみなければわからないかもしれません。内側にあるものを感じていても、それは開けてみてはじめて、形が明らかとなるのでしょう。\nこの度数を持っている人は、とてもアクティブな面があり、みずから新しい経験を求めて、さまざまな環境のなかへ飛び込んでいくところがありそうです。そのなかで手探りながら、自分の中で感じているものを、なにかの形としていこうとすることを試みるでしょう。\nしかし、常に新しい経験や可能性を求め続けているために、取り出して、創った形に執着することはありません。創り出したものをずっと留めておくよりも、それを壊してまた別の角度の思いを形にしようとするところがあるでしょう。\nスクラップ&ビルドのように、作っては壊しながら、自分の内にあるものをその都度、確認しながら、すこしずつ可能性を引き出していくのかもしれません。いつでもなにか新しい形を創り出そうと、模索し続けているのでしょう。"}, "山羊座_4": {"sign": "山羊座", "degree": 4, "symbol_ja": "水上旅行のはじまりに", "symbol_en": "大きなカヌーを整える一行", "key_phrase": "Water.", "explanation": "水上旅行のはじまりに大きなカヌーを整える一行\n現場で仲間と協力しながら目的を遂行する人\n水上旅行という、それに参加する人全員で共有するひとつの目的のために、力を合わせて協力していこう、というサビアン・ワードです。いま目の前の限られた環境のなかにある資材を有効に使って、目的を達成しようとするでしょう。\n山羊座の世界では集団が成長するために、ひとりひとりが自分の持っている能力を差し出していくことが求められます。ここで旅する一行というのは、一蓮托生の間柄。カヌー旅行の計画が成功するように、念を入れてプランニングをして、アイデアを出し合い、お互いに協力し合って準備するでしょう。\n船の旅というのは陸上の旅以上に乗組員の心が団結することが求められます。ひとりひとりの担うべき役割をしっかりと意識することが成功ヘの道といえるでしょう。\nこの度数を持っている人は、みんなでなにかをおこなう際に、アイデアをまとめて計画を練り上げていくことがうまい資質がありそうです。みんなを引っ張っていくリーダーシップというには弱いかもしれませんが、みんなの気持ちを奮い立たせて、それぞれにぴったりの役どころを見つけ出すことがうまいでしょう。\n頭のなかで考えるだけの理想主義ではなく、実際の体験を重視する現場主義で、動きながら物事を見て、考えて、組み立てていくことができます。肩書よりも実際の行動のなかで、誰がなにをどれくらいできるのかということを重視して、それぞれの本当の意味での立ち位置を見定めることができるでしょう。同じ目的を持つ仲間のために働くと充実しそうです。"}, "山羊座_5": {"sign": "山羊座", "degree": 5, "symbol_ja": "何人かの男たちはカヌーを漕ぎ、", "symbol_en": "他の者たちは出陣のダンスを踊る、", "key_phrase": "Indians On The Warpath. While Some Men Row A Well-Filled Canoe, Others", "explanation": "In It Perform A War Dance.\n何人かの男たちはカヌーを漕ぎ、他の者たちは出陣のダンスを踊る、インディアンの出征の道\n仲間と共に大きな目標に立ち向かう人\nインディアンの戦いとは部族間の領土争いです。山羊座は土地と関係しますから、部族同士で戦うことによって、どれくらいそれぞれが占有地を広げることができるのかが、ハッキリするでしょう。\nこれは現在でいうなら、さしずめビジネスのシェア争いといえそうです。どの分野の業界においても、圧倒的な力を持った大きなグループがその領土を占領します。大抵の場合は4～5社で、その業界の90パーセントほどの売り上げを占めていることが多いでしょう。\n成功するためには、ある者は戦略を立てて、ある者は前線へ出て、ある者は背後で細やかに処理をする......といった分業が必要にもなります。その上で全員が一団となって「必ず成し遂げる」という高い意欲を持つことで、力が何倍にも膨れ上がるかもしれません。\nこの度数を持っている人は、仲間たちと協力しあって、大きな目標に向かっていくことを進んで好むでしょう。あまりこぢんまりとまとまるよりも、夢のように大きな目標の方がやる気が高まります。\nとはいえ、山羊座は地のエレメントの星座ですから、それは夢物語ではなく、求めているのはあくまで具体的な成果。ビジネスのシェアであったり、売上金額であったり、研究分野における新たな発見や成功だったりするでしょう。\nより大きな集団の中でこそ、その大きな力と一体となったかのような高揚感が得られるかもしれません。所属するのであれば、士気の高い集団が性に合うでしょう。そこで与えられた役割に没頭しながら、みんなで大きな目標の達成をめざします。"}, "山羊座_6": {"sign": "山羊座", "degree": 6, "symbol_ja": "暗い森に通じる", "symbol_en": "アーチの下に敷かれた10本の丸太", "key_phrase": "暗い森に通じるアーチの下に敷かれた10本の丸太", "explanation": "集団を強固にまとめ上げることに尽力する人\n集落を取り囲む暗い森は、人々にとって恐れの対象です。しかし共通する脅威の存在が出現すると、人々の結束は高まることになるでしょう。\n人々に共通するひとつの認識を抱かせることで、集団の結束を強めること。森へ通じるアーチは脅威への道標であり、その下に敷かれた丸太はそこを支える土台です。\n社会の持っている闇を受け容れ、またその社会的集団を支えるために尽力する人を示しているサビアン・ワードといえるでしょう。その集団の持っている問題や課題を浮き彫りにして、みずからそこに着手する意欲を見せるかもしれません。\nそして実際に必要な行動を、実践しても見せるでしょう。全体のために力を尽くすため、まわりからは頼られ、それなりの責任ある立場になるかもしれません。\nこの度数を持っている人は責任感が強く、実行力もあり、集団を動かしていく役割を担うことになりそうです。みんなをまとめるために進んで動き、問題を見つけ出し、その解決のために力を注ぎます。そうであるために、みんなから頼られ、人望も自然と厚くなるでしょう。\nあなたを中心に集団がまとまるため、あなたが所属している場所は、良いチームワークを発揮することになりそうです。成果が認められて、それなりの役職や地位を得ることも多いでしょう。\n自分が本気になれる場所を見つけて、積極的に関わることが充実するための鍵。あなたのやる気次第でチームのモチベーションが変動するでしょう。集団を強化して、守ることのできる資質の持ち主です。"}, "山羊座_7": {"sign": "山羊座", "degree": 7, "symbol_ja": "神の力を宿して語るヴェールをかぶった予言者", "symbol_en": "A Veiled Prophet Speaks, Seized By The Power Of A God.", "key_phrase": "土地の声を聴いて、応えることのできる人", "explanation": "これまでヴェールに覆われて隠されていたことが明らかになる予感です。\nこのサビアン・ワードで登場する神さまは、山羊座の神さまですから、その土地に坐す土地神さまや国津神さまといえるでしょう。土地には地霊(ゲニウス・ロキ)が宿っているといいます。それはその土地の地形や風土から生じたものであると同時に、そこに住んでいる人たちの思想や文化や風習を色濃く反映しているでしょう。\nこのサビアン・ワードに出てくる予言者は、そういった土地の特徴が人格化したものを神さまからのお告げとして語る、巫女のような存在かもしれません。それはその土地に住む人たちの集合体としての意志や感情とつながっているため、それを掌握することは、人々の心を動かしていく力を手にしたともいえるでしょう。\nこの度数を持っている人は、土地とのつながりが深くなりやすく、つながればつながるほど、その土地の人たちの声を代弁することができるようになるかもしれません。起こっていることの全体を直観的に理解する能力があり、その集団の求めていることがパッと手に取るようにわかることもありそうです。土地に根付いて深く感応するほど、霊感のような呼応する力が高まって、全体が求めているものに対して、ぴったりの答えを急にひらめくように得ることもあるでしょう。\n表から見えているところだけでなく、集団や土地の持っている闇や、裏のしくみなどにも精通しそうです。なかにはすこし怪しい雰囲気のオカルトなものに惹かれる人もいるでしょう。"}, "山羊座_8": {"sign": "山羊座", "degree": 8, "symbol_ja": "陽のあたる家で飼われている喜びを歌う鳥たち", "symbol_en": "In A Sunlit Home Domesticated Birds Sing Joyously.", "key_phrase": "その場の環境に適応してしあわせを見出す人", "explanation": "本来、鳥は自由に空を飛びまわることで生きるものです。しかし、このサビアン・ワードの鳥は、家の狭いカゴの中で飼われています。生来、嫌がるかもしれないカゴの中の暮らしを、この鳥たちはよほど居心地が良いのか、嬉しそうに歌っています。\nないものを求めると不満があふれますが、いますでにあるものに自身を順応させることで、そこは居心地良い場所となるでしょう。自分の内にある理想を外の世界に投影して求めるのではなく、外側の世界にあるものを内側に取り込んで、それに適応する部分をうまく出していくようなやり方です。そうすることでどこへ行っても馴染み、自分なりの心地よさを作り出すことができるし、不満を持つこともありません。\nしかし自分の中にある質のすべてを出さずに、適応する部分のみを活かしていくため、その環境が求めているものが、その人が発揮できる限界値となるでしょう。多くを求めない代わりに、そこそこに生きることを選ぶのかもしれません。\nこの度数を持っている人は、環境に対する適応能力が非常に高く、どこへ行ってもうまく馴染み、心地よく生きていくことができるでしょう。ゆったりとした平和な性格であり、争いを好みません。多くを望まずに、その環境をのびのびと楽しみます。あまり冒険するよりも、慣れ親しんだ環境にいることを好むでしょう。あるいは何かしらの教義に従った生き方をする人もいるかもしれません。\n土地とのつながりが深くなるため、その土地の文化や伝統芸能、古典と縁ができる人もいます。その土地の持っている力に馴染み、自然と共鳴することができるでしょう。"}, "山羊座_9": {"sign": "山羊座", "degree": 9, "symbol_ja": "ハープを運んでいる天使", "symbol_en": "An angel carrying a harp.", "key_phrase": "自然との営みと心身とが調和する人", "explanation": "天使というのは、気づかないところでわたしたちのそばにいて天上界と地上界とをつなぐ存在です。天使の奏でるハープの音色は、地上に天界の波動をもたらすような働きがあるでしょう。\n目の前のことに力をそそいでいると忘れてしまいやすいものですが、わたしたちの地上の営みは大地に支えられていて、この大地でもある地球の営みは太陽活動によって支えられています。その太陽活動は、大きな宇宙の中での活動のひとつで、それらは誰かが指令をくだしてコントロールせずとも、おのずとめぐり、必要なことが必要なタイミングで起こるようになっているでしょう。わたしたちがそのことに気づいていても、いなくても、宇宙はめぐっています。\nそして個人という小さなエゴを持ったわたしたちの意識を大きな次元へと解放するために天使は働いているのかもしれません。\nこの度数を持っている人は、何事に対しても無理することはなく、とてもマイペースで、のびのびと自分の資質を使っていこうとするでしょう。自然と調和するような生き方を愛し、何事もどうにかしようとするよりも、心と身体とが望むように任せていきたいという気持ちがあるかもしれません。\n目には見えない自然の流れや雰囲気と調和できるので、音楽やダンス、スポーツなど、身体を使って表現することに適性があるでしょう。また住んでいる土地とのつながりが深くなりやすいので、地域の神社やお祭りなどに関わると、より大地との関係が強化されそうです。"}, "山羊座_10": {"sign": "山羊座", "degree": 10, "symbol_ja": "手から餌をもらっているアホウドリ", "symbol_en": "An albatross feeding from the hand.", "key_phrase": "いまここにはないものを求めて冒険する人", "explanation": "アホウドリは警戒心が低く、乱獲が容易だったことからその和名がつけられたといいます。アホウドリにとって人間は未知の存在で、近づいていったら、何をしてく
