のなかに組み込まれること、という読み方が可能だ。"}, "蠍座_13": {"sign": "蠍座", "degree": 13, "symbol_ja": "発明家が研究室で実験をしている", "explanation": "一見、つながりがわからないような異質なものを結びつける、応用的な能力。また、小さなものと、大きなものを結びつけたりする推理力。すべてのものが、他とどのように関連しているか、理解する。１１度では、最低の、１２度では最高の、という対比が語られたように、これら低いものから高いものまでの、ものごとや人の意識の相互関連について通じてくる度数だ。対人関係にしても、また文化的な問題にしても、つながりとか、関連とかに関して、いろいろと詳しくなり、応用的な才能が発揮できる。クロスオーバーの才覚は、目覚ましいものがある。だが、象徴に描かれているように、彼がいる場所は、研究室なので、実践的な段階ではなく、いろいろと推理し考えている段階だといえる。この度数を持つ人は、発明や発見の才能がある。"}, "蠍座_14": {"sign": "蠍座", "degree": 14, "symbol_ja": "電話工夫が新しい配線工事をする", "explanation": "人間関係のつながりというものは、深層心理のレベルで考えてみると、意味と意味の結びつきだ。常識では結びつきようのないものが、意識の実験（１３度）で結びついてしまうと、この心のなかでの新しい変化にもとづき、新しい生活や新しい対人関係が発生する。意識の水面下に、新しいケーブルを架設している工事人のような度数だ。この度数を持つ人は、根まわしとか、新しい対人関係を確立するのがうまいし、関係の拡大ということに、使命をもっている。新しく築かれる関係は、予想外の、いままでだとつながるはずのなかったもの。希望のもてるはずのない場所にわたりをつける、とか、ものごとや人の新しい接点を創造する。したがって大変な発展家であるといえばよいが、八方美人的な意味ではなく、関係の創造ということに力点がおかれている。"}, "蠍座_15": {"sign": "蠍座", "degree": 15, "symbol_ja": "５つの砂山の周りで遊ぶ子供たち", "explanation": "５の数字は神秘学的な意味では、人間をあらわしている。いっぽう環境に束縛された、世界の歯車として生きる原理は、４の数字で象徴される。５、そして人間性のもっとも単純なあらわれである子供というシンボルが登場するこの度数では、高次な創造的な心が芽生える。たとえば、いままでの科学をすべて統合して、科学を超える。いままでのすべての文化の業績を統合すると、さらに新しい座標が開く、ということなのだ。知性的な面で地球人類のピラミッドの頂点に属する能力をもっているが、まだ子供の段階で、知的な遊びに終始する傾向が強い。高次の心の発達の幼稚園の段階。知的総合性。人間にまつわるさまざまな学問を、高度な精神でもてあそぶ、といえる。学者として生きた場合、ひとつの分野に縛られない柔軟な頭脳をもっていて、この人の才能は果てしない応用性の高さをもっていると思われるが、実例を多く見る限りでは、実際性に欠如する。\nNo. 46／72区分（蠍座１６度～２０度）「受容」 受容性を発達させる\nすべてを受け入れようとする姿勢が、その人を大きく変えていく。自分から変化を作り出すことはないが、受け入れるものによって、自分の未来が変化する。"}, "蠍座_16": {"sign": "蠍座", "degree": 16, "symbol_ja": "破顔一笑する少女", "explanation": "外界のさまざまな対象に心を開き、微笑みかけると、人はいろんな可能性を開くことができる。なかなか人の運命が切り開かれない原因のなかには、心が対象に対して閉じていて、拒否的な姿勢になっていることに気がつかない、という事実は多々ある。たとえばお金に対して偏見のある人は、いくら努力しても、お金は入らない。この度数は、やさしい受容的な少女のような姿勢でものごとに取り組むので、人生のなかで、さまざまな可能性が予想外に活発に展開される。とくに、人から可能性がもたらされるといえる。自分になじめない問題に対しても、基本的にオープンマインドの姿勢を崩さないので、とてもバランスのよい人だといえるだろう。蠍座１５度で、知的な偏見があらかた解決された結果、十分に受容的な姿勢を確立できるようになった、という前提がある。"}, "蠍座_17": {"sign": "蠍座", "degree": 17, "symbol_ja": "自分自身の霊によって受胎する、「神の子供を宿す偉大な」女性", "explanation": "自分の内面に対する受容性。自分自身に対する受容性。人の内心には、いろんな醜いものも優れたものもたくさんあるかもしれない。この自分自身のあり方を許すことで、心は解放され、種々の可能性が開く。自分のすべてに対して開くと、やがて、内心の一番奥にある、もっとも超越的で高次な意識が動きはじめる。内的な通路を通じての超越的な力への自我の明け渡しによって、ある神秘的な原理が動くようになるのだ。われわれは「内的なグル」というものを胸の中心にもっている。その意志を聞くのに、特別な努力は必要がない。心の自然な解放、自分を信頼すること、心を遊ばせる状態のなかで、深い意志がはたらき、われわれを内側から変革する力が解放されるのだ。知恵も、すべてこの内側の中心をとおしてやってくる。この度数を持つ人は、迷う時、判断するときに、自分の内面に聞くという姿勢をはっきりと確立しておくべきだろう。それが豊かな成果をもたらす。"}, "蠍座_18": {"sign": "蠍座", "degree": 18, "symbol_ja": "多彩な色で輝く森の小道", "explanation": "人生のなかで、霊的な光が輝いている生活をしている人は、平坦な道を歩く。いかなる自然周期に対しても、優位に立つ状況。周期的な死を乗り越える力。この度数の持ち主は、とくに激しい仕事や、強度に集中的な努力を発揮した後で、急速に開かれていくオープンな心というものが、人生のなかで非常に重要な体験項目となるだろう。集中と弛緩の繰り返しが、大きな可能性を開く傾向がある。１６度から、受容性の流れのなかにあり、外面（１６度）に対しても、内面（１７度）に対しても受容性を発揮すると、あらゆるもののなかに、超越的な意識が平均的に浸透してくるようになる。そこに関心が集中するので、宗教や瞑想家が「悟り」と呼ぶ境地に対して、強い関心をいだく傾向が強い。実際多くの実例から見れば、蠍座１６度から、２０度までの帯域は、精神世界とか修行とかに関連した人が圧倒的に多いのも事実だ。"}, "蠍座_19": {"sign": "蠍座", "degree": 19, "symbol_ja": "オウムが、横で聞いていた会話を繰り返す", "explanation": "チャネルシップというのがこの度数のキーワード、簡単にいうとチャネリングの能力だ。オウムは人の言葉を理解しないが、わからないながらも、完全な模写をすることができる。この度数を持つ人物は、まるで透明なガラスのように純粋な精神をもっているが、オウムのように、十分に考え抜かないで、受け取った情報や印象をそのまま、人に伝達しようとする傾向がある。中途半端な場合には、これはものごとを深く考えないタイプの人になるだろう。媒体になりやすい傾向から、人の影響を受けすぎるとか、気がつかないでなにかを模倣しているとかの癖もあらわれる場合がある。うまく能力を磨けば、日常生活ではうかがい知れない超越的な意識や知性体の媒体として活躍することが可能だ。"}, "蠍座_20": {"sign": "蠍座", "degree": 20, "symbol_ja": "１人の女性が、聖なる道への入り口を閉ざしていた、２つの黒っぽいカーテンをひいて開ける", "explanation": "なじみのある感覚ではまったく通用しない未知の世界へ飛び込む勇気。この度数を持つ人が覗こうとする世界は、恐怖に満ちたものに一見、映るかもしれない。あれかこれか、とか選択とか、そういう知性ではまったく理解することのできない、ひとつの統合的な世界。それはとても神秘的な世界なのだが、善悪とか、そういう見方では理解のできない世界なのである。受容性を主題にしたこの５角は、２０度で完成する。受容性が豊かに発達した結果、いままでと違う神秘な世界、未知な世界へ自分が開かれていくのだ。これはいままで常識では知ることのできなかった世界を認知する、秘教などを知る、という度数。この度数を持つ人は、しばしば秘密主義になりやすい。\nNo. 47／72区分（蠍座２１度～２５度）「反逆」荒々しい衝動をどう処理するか\n心のなかに渦巻く、荒々しいエネルギーを実生活のなかでどうやって生かすか。異質なものを、これまでの生活のなかに取り入れる工夫"}, "蠍座_21": {"sign": "蠍座", "degree": 21, "symbol_ja": "自らの良心に従い、兵士が規律に抵抗する", "explanation": "蠍座の受容性が発達した周期が終わると、いまさらながらのように、こんどは反対の資質が目覚める。これは反抗心とか、社会的な暮らしのなかでは満足できない荒々しい感情や衝動が吹き出してくる度数だ。規律に従わなくなるのは、規律のなかでは満足できない衝動が自らのなかにあることをはっきり認めてしまうためだ。社会や環境は、個人に対して強い支配力をもっているので、個人が自分の意志を主張することで、社会が折れることはありえない。困った事態になるかもしれない。だが、それを受けとめる決意がすでに存在する。たとえ不利になっても、自分の意志と主張を明確に表明する。環境にそまらないこと。集団生活には不向きな面があるのはいうまでもない。"}, "蠍座_22": {"sign": "蠍座", "degree": 22, "symbol_ja": "鴨を打つハンター", "explanation": "人のなかに残る本能的な攻撃性を、社会があるシステムを設けて、そのエネルギーを吸収してしまう。ハンターというシンボルは、社会のなかでゲーム的にこうした本能のはけ口が用意されている図だ。その意味では、風俗営業なども、この度数の分類に入るだろうと思う。２１度で社会は、個人の欲求を許容しなかったが、ここでは逆転して、それを歓迎する。すべての人が離反してしまわないように、個人の衝動を吸収する方法を考案してしまうのだ。攻撃性を儀式化することで、それを洗練させる。個人的な趣味を主張することを社会がニーズとして受けつける。わがままが通る。そして社会はむしろそれを流行化してしまう。この度数を持つ人は、たとえば代替行為として、暴力小説を書くことで、その衝動を商品化してしまうように、ゲーム的な面で欲求を満足させる生き方を見つけ出すべきだ。"}, "蠍座_23": {"sign": "蠍座", "degree": 23, "symbol_ja": "ウサギが自然霊に変態する", "explanation": "攻撃的でワイルドな、生命の衝動は、その表現のはけ口を見い出すと、何度も何度もその機会を利用し解放されていく。同時に、この行為の反復のなかで、個人の荒々しい衝動は、しだいに高度なレベルに昇華しようとしている。動物的な本能が昇華するには、抑圧せず、２１度からの流れのように、はっきりと認知することが前提だ。抑圧し、自分でもその存在を忘れてしまうと、ここに解決の手段はない。ウサギは多産の印、その意味で性的生殖衝動を暗示していて、これが自然霊という、不可視の原理に姿を変えていく。荒々しいエネルギーが変容してより建設的な繊細なものに変わる。この度数を持つ人は、エネルギーがありあまっている人で、力を、たんなる発散としてではなく、昇華させなくてはならない。粗雑なものを繊細な高度なエネルギーに変えるための自己訓練が必要だ。"}, "蠍座_24": {"sign": "蠍座", "degree": 24, "symbol_ja": "霊感を受けた人の「山上の垂訓」を聞いたあと、人々は家路につく", "explanation": "本能的なエネルギーをより高度なものに昇華、変成すると、その人に超越的な意識がもたらされるが、やはりそれでも、人は家路という日常の暮らしにもどり、その高度で超越的なエネルギーを日常の生活でどう生かすか苦心しなくてはならない。宗教的に優れた教えや、霊感も、具体的なわれわれの暮らしに活用できなければ、精神的な混乱や逃避癖をつくり出すだけだ。この度数では手に入れた霊感やすばらしい直感をもって、実生活を意志的に変えていくこと。生かすことを志す。この度数を持つ人は非常にすばらしい体験をしても、すばらしい体験に主題があるのではなく、その後の処理の方法に重点がおかれているということだ。また理想を夢見ても、再び日常の暮らしによって、その記憶を摩耗させ記憶を失うという警告も含まれている。"}, "蠍座_25": {"sign": "蠍座", "degree": 25, "symbol_ja": "X線写真", "explanation": "X線写真で、人は人体の皮膚の下に隠れた骨組み、内臓の組織構造などを知ることができる。２１度で社会に抵抗し、個を主張した人は、なぜ反抗したのか、ずっと後になってその理由をしっかりと自分で理解するようになる。冷静な科学者のように、こうした心の構造などについて考え知ることができる。これは人間に対する知識だ。また社会システムに対する知識にもなる。全体を分析し、理解するような能力。人が病気になる原因は種々の心的エネルギーの抑圧や解放の手段のゆがみなどだが、こうした人の構造について研究しようとするのがこの度数の特徴だ。やはりこのシンボルイメージのとおりに科学的な分析に関心をもつことも多いと思われる。人の直面している問題など、なにが原因なのか、分析し観察すること。全体的な構造図を解明することが大切である。\nNo. 48／72区分（蠍座２６度～３０度）「王国」束縛と支配から逃れる手段\nこれまで自分を支配していた過去の心を、過去の人間関係を捨てることを通じて、切り離す。やがて到来する自由な個人の人生を創造するために、自分を支配している要素を清算する困難な段階。"}, "蠍座_26": {"sign": "蠍座", "degree": 26, "symbol_ja": "新しい居住地に引っ越すインディアン", "explanation": "自然や生命に対する平和的な信頼がある。だから、インディアンはどこに行っても、すぐにその場所に適応することができる。どこでも生きることができるという自信があるのだ。この度数は効率性、無駄のなさを意味する度数であるが、これは機械的な意味での効率ではなく、直観と必要にしたがって素朴に生きる人は、もっとも効率的な生活を、なんの飾りもなく実践できる、という意味だ。自然や生命の大きな流れに対して同調的で、自然界のリズムに一体化する。変化に対して、即座に対応できる柔軟さ、素直さ。さりげなく理想的な暮らし方を身につけること。この度数の持ち主を観察すると、生活に必要なこまごまとした知識が豊富で、実際にどこでも生きて行けるのではないかというくらい、実用的な知識にたけている。"}, "蠍座_27": {"sign": "蠍座", "degree": 27, "symbol_ja": "軍楽隊が騒がしく街を行進する", "explanation": "社会がつくり出した文化を自慢し、通りすがりの人間にさえ押しつけるかのように、騒がしく行進するのがこのシンボルだ。たとえば、科学的な知識や概念、発想法が一般化した今日、科学的かどうかという判断法を、筋ちがいの問題にさえ押しつけていくような姿勢である。こうした集合的な誇りの感情が、われわれの社会を強くとりまとめている。蠍座はつねに情感的な一体感をあらわす星座なので、情感的に同一化した社会の規律を、いやおうなしに他者に押しつける傾向が強い。２６度と対立した傾向があるといわれる理由は、２６度がインディアンのシンボルをもち、自然界と調和的な生活方針をあらわすのに比較して、ここでは、西欧的な一神教的な押しつけがまかり通るからだ。"}, "蠍座_28": {"sign": "蠍座", "degree": 28, "symbol_ja": "自分の領土に近づく妖精の王", "explanation": "それぞれの星座のなかにあるサビアンシンボルは、鏡像構造になっていて、星座の入り口は、その出口と奇妙に対応している。つまり、蠍座２８度は、蠍座３度の裏側なのだ。かつて、人と共感しながら、共につくり上げていった情感的な喜びが、個人の人格を形成していて、人はその体験そのものを具体的な面で忘れ去っても、心のあり方として残っている。だが、いつか自分に回帰したときに、この自分の人格は、かつて自分が育成し、創造したものだったことに気がつくのだ。作ったもののなかに、人は回帰する。自分が作ったとおりの家に住むのだ。妖精の王がもどるのは、かつて自分が作った家。自分の分というものを自覚し、それに満足する。蠍座で体験した情感的な人格を土台にして、人は射手座にむかうが、しかし、蠍座の時代の記憶は深層に蓄積され、それは忘れられることがない。この度数を持つ人は、神話などにも縁が深い。"}, "蠍座_29": {"sign": "蠍座", "degree": 29, "symbol_ja": "インディアンの女が、酋長に自分の子供の命乞いをしている", "explanation": "酋長は共同体の統合原理。インディアンの息子は、自由な自己表現を求めて、部族から去っていこうとする個人の自発的な意志。この２つのあいだに走る亀裂は、個人がなんらかの社会に属し、そのおきてに最後まで完全にしたがうということは現実には不可能だということを述べている。蠍座は、深い共同体との一体化願望であり、その拘束は厳しく、個人の積極的な新しい意志（子供）は、その拘束のなかでは殺されるのだ。この２つのあいだの亀裂を、祈りとか懇願とかで中和しようとする女性の力が強調される。蠍座の影響から脱出するのはもっとも困難な課題だといえる。したがって、この度数を持つ人は、自由を求めて、家族や社会から脱出しようとしても、大きな抵抗や、悲しい出来事に出会いやすい傾向がある。鏡像の裏側にあるのは、蠍座２度の、過去に対する激しい郷愁だ。"}, "蠍座_30": {"sign": "蠍座", "degree": 30, "symbol_ja": "ハロウィンの衣装をきた子供たちが悪ふざけを楽しむ", "explanation": "蠍座全体をとおして、ひとつの統合原理に吸収された個人が、もう一度自由を取りもどすには、蠍座の性質にともなう権威性や支配力から自由になるために、ゲーム的な形で、これまで心を支配していた共同体の価値のおおげさな転倒をする方法が残されている。２９度の息づまるような緊張を緩和するのに、悪ふざけが好適だ。いついかなるときにも、遊び的な方法で、心理的なエネルギーの再度の活性化が必要なのだ。蠍座の影響は組織や権力の具体的な支配力だけでなく、それ以前に呪術的な心の支配からなりたつので、これらの呪力を追い払うのに、醜い姿、極端にデフォルメされた、ふざけた笑える仮面なども使われる。蠍座の最後の５度は、どこかに退廃的な匂いが残るのを消しされないが、とくにこの度数は屈折している。いままで従っていた影響力に対して、こんどはまさに反対のげっそりするような価値の下落をはかることを意味している。\nNo. 49／72区分（射手座１度～５度）「戦闘」 自由な魂の戦う力を思い出す\n個人が持つ能力を人とぶつけあうことでもたらされる新しい進化。依存したりされたりする関係のなかでは決して生まれることのない、自発的な社会参加への意欲。"}, "射手座_1": {"sign": "射手座", "degree": 1, "symbol_ja": "退役軍人が古い記憶を呼び覚ますために集まる", "explanation": "射手座は火の星座。精神性とか、高貴な目的とか、自主的な生き方などを象徴する火が、この射手座のはじめの度数で燃え上がる。退役軍人は、義務から免れた立場で、純粋に自由で自発的な動機で、もう一度戦いをはじめようとする象徴だ。蠍座の拘束から逃れたばかりの度数なので、まるで長い監禁が解かれたかのような新鮮な活力が満ちていて、純粋な誇り高い精神性や、求道性を讃美する。活発な気質をあらわしていることが多く、生き生きと友人や同僚との交流をする。精神的に恒久的な価値があるものを探求するため、休むことなき戦いに参加する。武道など、なんらかの形で戦う能力に関係する事柄に縁が深い。競ったり、勝負したり、の心理的なあつれきにはなんら動じる気配はない。というのも、射手座は「摩擦の火」をあらわしているからだ。"}, "射手座_2": {"sign": "射手座", "degree": 2, "symbol_ja": "海に対する風の力を示す白波", "explanation": "風は霊ということを暗示するギリシャ語ネウマに関係し、海は無意識の力。人間の意識を真ん中に挟んだ超意識と、下意識の関係だ。この２つがきわめてダイナミックに交流する姿が描かれている。にもかかわらず、このシンボルには人が登場してこない。ひとつの宇宙的なリズム、何者も抵抗できない力が活発化している状況で、この度数を持つ人は、無意識や超意識などからのあおりが、非常に強くなる傾向にある。心が揺れる。日常生活を維持するのに、どこからとも知れない変動的な影響や不穏な動揺をうまく回避しなくてはならない。しかし別の意味でいうと、自然界の豊かなパワーを受け取ることができるので、うまくそれらを取り込んだ暮らしをしたほうがよい。たとえば、舞踏家に何人か、この度数の人を見かけたが、なかなかむいている職種だ。しかしストレスを避けることは不可能に近いはずだ。"}, "射手座_3": {"sign": "射手座", "degree": 3, "symbol_ja": "チェスをする２人の男", "explanation": "チェスは、了解の上で２人の人物が戦いのゲームをすること、あくまでゲームなので深刻さは感じられない。実人生でなく、盤上で、状況を推理し、深く考え、戦略を考案する、という行為のなかで、自分のことも含めて状況を客観的に観察できるような、冷静な能力が発達してくる。個人的な感情にふりまわされず、ものごとを明確に掌握できる才能。状況を全体的に把握し、対策を考えるという姿勢は、ある程度このチェスのように、戦い相手がいて、互いにしのぎを削るような場面でないと、なかなか育成されない傾向があって、たとえばウォーゲーム的なテーマで、コンピューターのCRT上で、シミュレーションゲームをしてゆき、そのなかで実人生に参考になりそうな知識を得る、という生き方の傾向も指摘できる。象徴どおりに、ゲーム機械に関連した仕事がよいともいえる。"}, "射手座_4": {"sign": "射手座", "degree": 4, "symbol_ja": "両親に勇気づけられて歩くことを学んでいる、小さな子供", "explanation": "射手座は、自由な独立独歩の立場の人々のあいだで活発な交流をする、という姿勢が基本にあり、個人個人の自主的な生き方が確立されているかどうかが、人と本当に協力できるかどうかの前提条件になる。この度数では、個人が自発的な、自分で歩く姿勢が必要であることを自覚し、自分の心のなかにある依存性を解決するため、自主的な人生に積極的に挑戦する度数だ。自分で自主的に生きようと努力している場合にかぎり、さまざまな場面で、自分よりも有利な立場にある人や、目に見えないところから援助の手が差しのべられる。また、精神的に十分に成長した人の場合、この度数は、自分で歩こうと頑張っている人を温かい目で見守り、どうしても必要なときには彼らを援助する、という教育的な立場に立つ人も多いようだ。象徴どおりに、幼児教育の研究に携わる人もいる。"}, "射手座_5": {"sign": "射手座", "degree": 5, "symbol_ja": "１匹の年老いたフクロウが、大樹の枝に単独でとまっている", "explanation": "昔から知恵や狡知の象徴だといわれているフクロウは、人が眠っている夜にひとり目覚めている生き物だと思われている。ここから、人の無意識的な面、なかなか気がつかない隠れた面、またときには魔術的な世界に通じてくる度数だと解釈できる。また、人が眠っている時間や、人のいない隠れたひそかな世界での、特殊な驚くべき体験を暗示することも多い。一般に潜在意識は、心の裏側の世界だといわれていて、フクロウの度数を持つ人は、この裏側の意識をうまくコントロールする技巧が発達するケースが多く、しかし表向きはポーカーフェース、なにも知らぬ顔の人もいるので、あなどりがたい個性だといえよう。射手座の１度から５度のグループは戦争にまつわるシンボルではじまったので、この度数も巧妙な作戦能力、人の裏をかく狡知や、裏工作能力が発達する、と解釈ができる。\nNo. 50／72区分（射手座６度～１０度）「公正」 フェアプレイ精神\n社会のなかで、個人が戦いながら勝ち取る成功への夢。人生や個人の自由を理想化する性質。"}, "射手座_6": {"sign": "射手座", "degree": 6, "symbol_ja": "クリケット競技", "explanation": "集団の団結で、ひとつの目的にむかって協力しあうこと。射手座では、ゲーム性がつねに重視されているが、ここでもスポーツ競技がシンボル化されている。フェアプレーが賛美されるスポーツは、人の意志や能力、感情をより公共的な方向へ訓練づけることができる。個人的な思惑とか個人的な事柄は、プレイでの人との協力でうまく制御できるようにしつけられる。自我の意志を、集合的な類型に従属させる。参加するために、自分のエゴを調整するという意味。責任感覚を発育する。この度数を持つ人は、集団で行動するさいのルールを重視し、共同で同じ目的を追求するという能力が発達する。もちろんこうした集団でのスポーツ競技に縁の深い度数であることはいうまでもない。"}, "射手座_7": {"sign": "射手座", "degree": 7, "symbol_ja": "人間の心のドアをノックするキューピッド", "explanation": "集団の規律にしたがう訓練を受けなくてはならないテーマのなかにいる個人は、反動で、個人的な感情が生き生きと活発化するような体験に興味がむかう。一番の関心事は、心がわくわくする期待で満たされる恋愛だ。それ以外にも、楽しいもの、刺激があるものに対する期待感が強くなる度数だ。恋愛関係がここで成立すると、男性と女性のペアのあいだで、閉鎖された空間ができてしまい、集団の規律に対して裏切るような行動が出やすい。この度数の持ち主は、わくわくすることに対して夢中になる気質があるようだし、またこの射手座の流れは、ある程度劇化された世界像を暗示するので、小説や漫画に表現されているような恋愛ムード、夢のような世界にあこがれやすいといえる。"}, "射手座_8": {"sign": "射手座", "degree": 8, "symbol_ja": "大地の奥深くで、新しい元素が形成されつつある", "explanation": "無意識の部分で、いままでの自分から見たら異物としか思えないような影響が混入し、これが知らないうちに、少しずつ自分を変えていくという度数だ。６度が集団の規律を学習する、７度がその集団から離反する個人的な期待を追い求めるという流れで推理すれば、７度でなにかわくわくすること、面白いことはないかとの期待感から、なにかしら異物的な要素を自分に取り入れ、それが少しずつ自分を変えていき、もうもとにはもどれない変化を引き起こすと考えられる。この度数での人格の変化は、気がつかないうちに、意識下で起こる変化なので、自分ではなかなかわからない。期待感にもとづく行動によって、新しい本能とか、新しい無意識の力が育まれていて、人生への姿勢が変わっていくことだ。"}, "射手座_9": {"sign": "射手座", "degree": 9, "symbol_ja": "母親が小さな自分の子を導き、急な階段を一段一段ゆっくりと昇らせる", "explanation": "社会を構成している自分よりも進歩していない人たちに対する手助け。階段は、自然にできたものではなく、社会的な産物であり、それを子供が使えるようになるまでは、親は使い方を教える義務がある。新しい世代に、いままでの生産物、技術、知識などを教えること。この度数を持つ人は、教える側になるか、教えられる側になるかわからないが、より進歩した人から指導を受けながら発展する、という意味になる。そして成長すれば、こんどは人に指導する側にまわる。だれもがされたことを、し返すからだ。社会的な事柄について教えるという事実から、教育者の度数だといえる。"}, "射手座_10": {"sign": "射手座", "degree": 10, "symbol_ja": "黄金の髪の「幸福の女神」の演劇的な表現", "explanation": "成長とか、進歩とか、また進化のイメージが劇化され、人は成長しなくてはならない、と社会的に思わされること。強迫的に、人を追い立てる。作為的につくられたチャンスなどを意味するので、たとえばよくいうアメリカン・ドリームなどという言葉も、このシンボルの意味に該当する項目に入る。人はそうしたつくられたイメージに駆り立てられ、本当は本質的にはなにも変わっていないのに、人生で成功したり、成長したりしていると確信する。この度数を持つ人は、成長に関して、あまりにもよく使われる概念でものごとをきまじめに判断するようである。人生をひとつの劇のように見ている。たとえば、仏教でいう「悟り概念」なども、こうしたつくられた成長概念のひとつかもしれない。\nNo.\n51／72区分（射手座１１度～１５度）「神殿」人の基準を古代の知恵に求め、偉大な進化を夢見る\n人間の精神の偉大な可能性についての尊敬と探求心。古代から続く精神世界としての価値に対する再評価。"}, "射手座_11": {"sign": "射手座", "degree": 11, "symbol_ja": "古代の神殿の左側の部分で、ランプが、人間の形の容器のなかで燃える", "explanation": "教育によって誤った認識を植えつけられたわれわれが、もう一度本来の深い知恵にもどろうとするときに、参照すべき基準は、古代の神殿だ。生命の原初的な健康さとしての肉体性、ひとつの懐かしい形を求める。われわれの身体には、古代からつづく偉大な伝統が根付いていて、これらの知恵を回復させたいと願う。シンボルで使われている左側という言葉は、無意識のはたらきだ。無意識の情報源をフルに活用して、恒久的な真実を求めようとしているのだ。この１１度から、１５度までは、非常に勉強熱心になり、探求心が強く発達する。傾向としては、精神世界と、いままでの一般的な知識をすべて総合する「総合科学」のようなものに対する強い関心だ。考古学に対するセンス。いわゆる古代の英知というものにあこがれている。"}, "射手座_12": {"sign": "射手座", "degree": 12, "symbol_ja": "旗が鷲に変わる。鷲は夜明けを告げる雄鳥になる", "explanation": "ニューエイジのムーブメンツのプロモーションをする度数だといわれている。旗は国家の印。つまりわれわれの日常的な生き方。これが超越的な意志である鷲に変わる。鷲は、きわめて高度な世界をかいま見て、こんどは雄鳥のように、人々に体験を知らせ、啓示する意欲をもつようになる。１１度が古代の知恵を追求するということと関連し、手に入れたすばらしい知恵を、このわれわれの文明の未来の発展のために、紹介しようとする。いわゆるニューエイジサイエンスとか、精神世界のニューエイジムーブメントは、この度数そのものの印だ。これらが古い知識に根拠をおいた新しい活動だということは、多く知られている。この度数を持つ人は、新しい価値観を世界にもたらす使者的な立場になりやすい。非常に理想主義的な宣伝、啓蒙活動にむいた人。"}, "射手座_13": {"sign": "射手座", "degree": 13, "symbol_ja": "未亡人の過去が明るみに出される", "explanation": "ある周期とか、ある生活のサイクルが終了して、次の新しい生活がはじまったときに、かつて古いときに未解決だった問題があらためて復活してくる。それは以前は、まったく意識できず、漠然としたものだったかもしれないが、新しいサイクルに入ったときにはじめてそれが問題であることに気がつく。新しい出発に際して片づけねばならない、というよりも、新しいサイクルに入ってから、新しい見方のなかで、はじめて難問にかわる問題を片づけねばならない度数だ。だが、この未解決の素材に真剣に取り組むことで、初めて、新しい生き方が実質的にはじまる。１１度が古代の神殿の知恵、１２度がそれを啓蒙活動に使うという流れで見ると、１３度は、古代の知識を現代にもち込んだときに発生する諸問題を、現実の生き方にあわせて、いろいろと調整しようとする意志をあらわしている。"}, "射手座_14": {"sign": "射手座", "degree": 14, "symbol_ja": "大ピラミッドとスフィンクス", "explanation": "古代においてシードマンといわれた種族が、かつての偉大な精神体系を、これからの時代の危機にいかすために、永続的に管理している姿で、人の生命の基本的な原理と、それにもとづく完全な知識を目指す。この度数を持つ人は、非常に強力な学習能力をもっているが、おもに古代の叡知とでもいうべき記憶を、（かつて神殿と呼ばれたところで扱われていた種類のもの）現代に復活させ、新しい世界に生かすために用意された人々の印である、と考える。いわゆる古代のアトランティス文明から、文明の崩壊期に、エジプトや世界の各地にのがれ、知識を保存した人々に関係する流れであり、古代からの精神体系を引き継ぐ度数だ。教えたり教えられたりする行為について非常に熟達している人々が多い。"}, "射手座_15": {"sign": "射手座", "degree": 15, "symbol_ja": "２月２日のグランドホックデイ（聖燭節）に、自分の影を見ているグランドホック（地リス）", "explanation": "精神的な知識や理想、古代の叡知は、実際の生活にあてはめて、具体的な展開を考えなくてはならない。もともと射手座は１５度までの前半は、机上の理論的な性質があって、抽象的すぎる思想が、実社会にはなにひとつ役立たないという欠陥をもっている。この度数では、いままで手に入れた理念的な知識を、いかに実社会や実生活のなかで、応用できるかに苦心する主題だ。地上に映る自分の影をリスが探しているのだ。もしこの度数を持つ人がいたら、自分が手に入れた知識なり、考えなりを実践し、それによってお金ももうかり、社会的にも実際に貢献できる、という生き方を探さなくてはならない。象徴に書かれた２月とは、節分に近い時期だ。これは隠れたものを形にする入り口の時期。\nNo. 52／72区分（射手座１６度～２０度）「生存」 未来に生き延びる知恵\n社会的な集合性のなかで、価値を失ったり、また価値を取り戻したりという個人の能力と主体性を、強力に再生する。"}, "射手座_16": {"sign": "射手座", "degree": 16, "symbol_ja": "カモメが食べ物を期待して、船のまわりを飛ぶ", "explanation": "依存性の度数。カモメは野生の動物だが、人間が用意した餌をもらうほうが、はるかに苦労が少なく、危険もないことを覚え込んでしまった。多くの人が、大きな組織や大企業に入ろうとするのは、それだけ苦労する必要がないからだ。これは物質的な意味でか、また精神的な意味でか、いずれにしても、自分よりもしっかりした安定した秩序、集団、世界観に依存性を発揮する度数だ。自分の姿を地上に投影され、影を求めた地リス（１５度）は、こんどは影に取り込まれてしまう。この度数を持つ人は、自分で勝ち取る苦労を捨てて、なにかに依存し、そのあいだに、肝心の自己の主体的な能力を失ってしまうケースがある。悪用されたり、利用されたりすることに気がつきにくいので、注意が必要だ。"}, "射手座_17": {"sign": "射手座", "degree": 17, "symbol_ja": "復活祭の日の出の礼拝が多くの人々を集める", "explanation": "人が自分よりも強いものに依存することで失ってしまった能動性や主体性、すなわち火の能力を、もう一度復活するように刺激することのできる能力をもった度数だ。魂の復活を暗示する日の出を礼拝する。人間の創造力を、再生させる能力があるので、この人は、多くの人を鼓舞する資質をもっていて、多くの例を観察している限りでは、カリスマ的な磁力や、人気運をあらわしているようだ。もちろん復活の日の出礼拝という意味からすると、治療師的な能力だともいえるし、カウンセラーとして理想の度数だ。多くの人を巻き込む特技があって、この人のまわりには、つねにたくさんの人が集まる。かかわる相手の深層の願望や、熱意、積極性をうまく誘導する能力は、人扱いのうまさとしてもあらわれる。組織を主催している人にこの度数の持ち主が非常に多いのもうなずける。"}, "射手座_18": {"sign": "射手座", "degree": 18, "symbol_ja": "海岸で遊ぶ子供たちの頭が、日除け帽で保護されている", "explanation": "未成熟な個人が、無意識や霊的なエネルギーを扱うときに生じる危険を避けるために、保護者が登場する。縄文時代の古い時期から社会とか文化の成立条件には、自然界の力に対して、人間とくに子供たちを守るための集団化した防衛的な目的というものがあった。こうした強烈すぎる自然界の力から人を保護する、というのがこの度数の主題だ。だが保護の名のもとで人間の可能性を阻害してしまう可能性もある。多くの人は、自分がおかれた現実を直視せず、危機感を感じないままで生きることができるが、この度数の持ち主はこうした平和な状況のなかでも、本当は危機が迫っていることに敏感に気がつく人が多い。シンボルで語られているように、子供たちは、日射病がどのようなものか、まったく知らないで楽しそうに遊んでいる。この度数の人は、危機管理的な立場にむかう傾向が強い。"}, "射手座_19": {"sign": "射手座", "degree": 19, "symbol_ja": "人々に脅かされたペリカンが、自分の子供たちを育てるために、より安全な場所を探す", "explanation": "これは危険な意味を暗示している。１８度で、危険に無自覚な子供たちの危機を保護できたが、いまや生き残るためには、違う場所を探さなくてはならない、という緊急状態を暗示している。ペリカンは、珍しいくらいに子供を大切にする鳥であり、この度数を持つ人は、絶滅に瀕している環境のなかで、生き残るための新しい解決策を考えなくてはならない。という立場に遭遇しやすいだろう。それが小さなことであるのか、大きなことであらわれるのかは惑星の種類などで類別すべきだ。１８度が危機に対する正しい判断力を意味しているのに対し、１９度はサバイバルに関しての対策を考える度数だ。動物保護などもこの度数に関連すると思うが、人間の可能性が小さな芽の段階でつぶされそうだというときに、その可能性を育てるため、ひとりでいろいろと対策を考えるという性質が見てとれる。自分の子供が難病に冒され、それを解決するために苦労するなどの例。"}, "射手座_20": {"sign": "射手座", "degree": 20, "symbol_ja": "古風な東北の村人たちが、夏のあいだ、凍結した池から氷を切り出して使う", "explanation": "季節の変化について知識があれば、いつ食料や必需品が失われるか、近い未来になにが必要か正確に予測できるし、将来のために、万全な準備ができる。未来の計画は、過去に対する知識によってのみ矛盾のない予測となる。この度数を持つ人は、先見的な視野をもって、自分や人々の暮らしのために、準備をすることができる人。また蟹座の１４度と同じくシンボルに東北という方位が使われているが、これは「永遠の北」を暗示する、究極的な知恵の印だ。そこで、この度数の人の未来予測は、単に具体的な面で発揮されるだけでなく、深い意味での人間の存在性の維持にはなにが必要かを厳しく見つめていることになる。魂や、精神面でのサバイバルにも関連している度数だ。\nNo. 53／72区分（射手座２１度～２５度）「飛躍」未来的な新しい世界への移動\n知性と精神性を、限界を越えて果てしなく発展させようという意欲。異質な環境のなかで損なわれた個性をもう一度取り戻す技術。"}, "射手座_21": {"sign": "射手座", "degree": 21, "symbol_ja": "借りてきた眼鏡をかけている子供と犬", "explanation": "人類の現在の水準ではまだ到達できない進化レベルに参入するために、成長が加速されている段階で、模倣を通じて学習する。子供やイヌには、眼鏡という知性の道具は、ふさわしくない品物だ。一見、滑稽に見えるくらい、無理をしながらも、いまの自分からは、はるかに遠い高度な知性を獲得しようとしている。現実にこの世にいる先生や先達を模倣することはめったにない。対象となるのは、宇宙的な知性とか、神々の世界などがほとんどだといえる。この度数を持っている人を観察したかぎりでは、指導的な立場に立っている人が多い。というのも、どこまでも果てしなく遠い高い知性を追求するというこの度数の人の執念にも似た追求心が、新しい哲学的な成果をもたらすからで、より高度な世界との接触者として最前衛に生きているから。"}, "射手座_22": {"sign": "射手座", "degree": 22, "symbol_ja": "中国人の洗濯屋", "explanation": "人にはそれぞれ育った環境とか、遺伝的な面で受け継いだ個性がある。新しい異質に思える環境のなかで、ときには不安になったり、自己喪失を起こしそうになったときに、自分のもともとの血筋や、個性などを思い出して、自分を取りもどす必要がある。優れた知性を追求する２１度のテーマは、しばしば自己喪失を起こしがちだ。新しい知性が本当に生かされるには、もともともっていた自分の土着的な個性と、新しいものがうまく結びつかなくてはならない。生まれもった肉体がもっている個性は、祖霊的なものだといわれている。新しく追求された知性が、この祖霊的な資質と調和しなかった場合、その人の試みは最終的にすべて失敗するといわれている。海外からきた人、あるいは海外へ行った人が失敗する原因はほとんど、この祖霊的な資質の反発だと考えられている。この度数を持った人は、きわめて現実的な面で、自分にふさわしい生き方はなにかをもう一度、足元から考え直す人だ。"}, "射手座_23": {"sign": "射手座", "degree": 23, "symbol_ja": "新しい国への入国に必要な条件を満たす、移民の集団", "explanation": "優れた高度な知性を追求し、またそれを２２度で、自分の土着的な資質とうまく調和させた人は、本当の意味で新しい世界に入国できる。精神面と物質面ともに、新しい生き方のなかに入るのだ。新しい環境に入ることで、まずその新しい環境に備わっている規律や習慣なりに順応しなくてはならない状況にきていることを暗示する。新規な条件を受け入れること。その環境に積極的に自分をあわせること。未知の環境、未知の体験。この度数を持つ人で現実に海外移住した人々を複数確認したが、実際的な事柄だけでなく、この度数をひとつの新しい生き方への参入と解釈したほうがよさそうだ。この度数を持った人は、人生のなかで、自分が夢見、求めた新しい生き方を、具体的に体現できる。またどんな異質な環境でも高い順応性を発揮する。自分のやり方を通さず、いったん環境にすべてあわせきってから後の自己実現。"}, "射手座_24": {"sign": "射手座", "degree": 24, "symbol_ja": "コテージの門にとまっている青い鳥", "explanation": "青い鳥は幸福を意味。この度数を持つ人は、幸運である、といわれている。自分の属する社会とか集団、コミュニティに順応し、幸福で静かな、満ちたりた生活をすることのできる能力。これは２３度で、それがいかなるものであれ、そこに住む以上は、そこの環境の規律にしたがうという順応性を態度で示した後、与えられた新しい環境に平和的に溶けこむことができた、ということだ。一説では不動産に関する幸運といわれている。シンボルにコテージが描かれているので、家に関係した関心を示す人が多く、たとえば自分の家をもちたいと夢見ている人も。幸福な家庭生活や、幸福な愛情関係。陽気で素直な性格が、人から好まれる。"}, "射手座_25": {"sign": "射手座", "degree": 25, "symbol_ja": "小肥りの子供が玩具の馬に乗っている", "explanation": "２１度ではじまった子供的な模倣は、この５つの度数のグループの最後でもまた子供の真似事で終わる。ここでは、知的な模倣性を発揮するのではなく、肉体的な運動、あるいは情感的な面での模倣だ。馬は性的なエネルギーとかを暗示する場合もあるらしく、身体を前後に揺らせる動作が、セックスを暗示するともいわれている。しかし、この度数を持った人の多くは、性に対する関心をナマな形で発揮するのを好まない。たとえば、創作とか、真似事で表現しようとする。子供は新しい家の庭にいて、この庭のなかで、人生のさまざまな状況を元気いっぱい演じて遊ぶ、という意味から、将来に対する予行演習とも考えられるし、また虚構の創作活動のなかで、ダイナミックな創造活動をするような姿勢ともとれる。実際小説家などにも頻出する度数だ。\nNo. 54／72区分（射手座２６度～３０度）「代表」社会の中での代表的な活動\n社会的な精神水準を高度に発達させるのは、個人個人の勇気ある努力。真に社会に貢献する能力を開発することに主眼が置かれる。"}, "射手座_26": {"sign": "射手座", "degree": 26, "symbol_ja": "戦場の旗手", "explanation": "戦場で旗をもつ者は、武器をもつこともできず、危険な位置にいる。にもかかわらず、身をもって旗手とならないと、兵士たちは迷う。社会のなかでこの度数を持つ人は、自分の利益をまったく考えずに、人々の指標として生きなくてはならない。彼は、自分が追い求めている理想や目的をはっきり掲げて歩く代表者だ。旗手となるこの度数の持ち主が、旗を上げることを止めてしまうと、他の多くの人も、その方向に関心をもったり、その方向に進むことをやめてしまうし、旗手が持っていた目的も、埋もれて見えなくなる。戦いと混乱は多いが、このなかで、自分の目的や主張をはっきりと維持しつづけることが必要だ。圧力の多いなかで、自分の主張を掲げつづけるのは苦痛だが、この度数を持っている人は、それをつづけねばならない。そのなかにこの人のよりよい生き方があるからだ。"}, "射手座_27": {"sign": "射手座", "degree": 27, "symbol_ja": "仕事中の彫刻家", "explanation": "仕事への自己投影の度数。自己を殺して奉仕する２６度とは反対に、自分のイメージを社会とか外界の種々な分野に投影するタイプの人だ。自己が思い描くものを形にして人に見せる。社会に対して自分の印を刻印する。ナマの素材を変容する人間の能力。彫刻家は作品ができるまでは、自分の願望をはっきりと意識できないかもしれない。それらを映し出してくれる鏡としての素材に手をかけることで、初めて自分が望んでいたイメージに気がつく。彼はとても創造的で、環境にあるものはみな、彼の表現意欲を受胎してくれる素材だ。現実に彫刻的な仕事をする人と、もうひとつはプロデューサー的な立場などが考えられる。形成外科の医者も、この度数を持っていた。"}, "射手座_28": {"sign": "射手座", "degree": 28, "symbol_ja": "美しい川にかけられた古い橋が、いまだに頻繁に使われている", "explanation": "古い橋は人々の生活の必要でつくられたが、とても長持ちしている。この度数は、生活に必要な最低限のものを創造。それが自然環境にとけ込んで、調和的にはたらくことを意味している。無駄なものを好まないし、簡素な美を追求する人だ。自然と調和し、なお実用的でもある文化や芸術は「用の美」といわれる。古くて優れたものに対する愛着と尊敬。この度数の人の生き方は、必要なものは満たされるが、決してそれ以上のものは手に入らないという特徴がある。背後には、双子座の２８度の影響があって、社会的な生き方を無にもどすというところから、この射手座の度数もぎりぎり最低限の命綱的なものだけを残すということだ。生活のなかにさりげなく保存されたものは、表向き目立たない。でもそれがなくなると大変に困る。そうしたところから、この度数の持ち主に皇室関係者や、また公務員で役所勤めの人もいた。みんな忘れているが、ないと困るものに関係する仕事を意味している。"}, "射手座_29": {"sign": "射手座", "degree": 29, "symbol_ja": "太った少年が、優雅な郊外の通りに面した自分の家の芝生を刈っている", "explanation": "太った少年は、社会生活の上での贅沢さ、放縦を暗示していて、彼は家の芝生を刈るという作業を通じて、芝生という自然を美しく保ち、また家というステイタスを保持する作業についている。自分の属する社会に対して利益をもたらす建設的な仕事をつづけることで、社会的な尊敬を獲得し、また自分の健康をバランスよく保つことを意味している。これは比較的平凡な能力に見えるかもしれない。日々必要とされる平凡な仕事をつづけることで、少年は危機状態も感じないし、太っている。ひとつの小市民的な生き方も、ここにある。２８度の必要性という素朴な観点にもどると、自分にできることは、こうした身近な、自分の属する社会に対する直接的なはたらきと貢献だけかもしれない、と自覚する度数だ。"}, "射手座_30": {"sign": "射手座", "degree": 30, "symbol_ja": "信者を祝福する法王", "explanation": "射手座は「永遠の哲学」を追求する星座であり、個人を超えた価値を求める。現実的な社会で、この永遠の哲学の表象として生きるとすれば、どこか宗教的になったり、教祖的な生き方になる傾向は否定できない。目に見える世界で、目に見えないものの価値の維持者として生きる。人間の集合的な願望を、ひとりの個人が通路となることを引き受けたときに、彼は偶像的な存在となる。ある文化や霊的な潮流の代表として、顕教的存在者となる。背後にあるのは双子座の３０度だ。これはそのとき、そのときの人々の主観的な好みや流行を追いかけ、その願望の具体的な達成イメージとして、水着の美女というシンボルが与えられているのだが、対向の射手座は、もっと深い集合的な関心の焦点的な存在として、やはり目立つ位置に立つことを示している。\nNo. 55／72区分（山羊座１度～５度）「統率」 権力と実行力の直接的な表現\n権力の獲得。リーダーの資質。営業的な能力の発達。仕事上の効率性をあまりにも重視しすぎたあげく、心が傷つくこともあるが、それでも先に進まねばならない。"}, "山羊座_1": {"sign": "山羊座", "degree": 1, "symbol_ja": "インディアンの酋長が、集まった部族から自らの力の承認を求める", "explanation": "天秤座で人の交流がはじまり、蠍座、射手座の経験をすべて完了した魂は、これらの人々をすべて取りまとめることのできる見晴らしのよい場所、山羊座の１度に立つ。集団に対して頭目的な能力をもつ人が生まれてくる。射手座の３０度の法王は、権威と支配力を保ったままで、この度数に移動してくる。仲間に対する強い影響力によって、組織や団体やグループの頭領として生きることができる。また山羊座のはじまりなので、新しい組織を作ったり、企業やグループを創始する力がある。背後にある蟹座の１度の水夫は、旗をあげて、後もどりのきかない決断をした。具体的な組織を創造できる、新鮮な力に満ち満ちた、活力のある人だ。"}, "山羊座_2": {"sign": "山羊座", "degree": 2, "symbol_ja": "ゴシック式の教会の３つの円花窓。そのうちひとつは戦争で破損している", "explanation": "建設に対立した意味のある破壊。教会という象徴は、われわれの内面的な、あるいはとても精神的な、身体の奥に隠されたもうひとつの目に見えない身体をあらわしている。１度の酋長は、自分の権威と力を主張するために、暴力という手段に出て、結果的にこの窓を破壊した。なんらかの野心的な試みとか、実際性を強調しすぎた揚げ句、共感とか愛情とか人の内面を育む部分がないがしろにされ、心身に破損が起こった。この度数を持つ人は、なんらかの形で、心身に傷をもっていることが多い。ある人は病弱な時期としてあらわれ、ある人は心の傷としてあらわれた。基本的に、社会的な現実的な事情により、障害をこうむるという意味があるので、戦争による被害という具体的な形であらわれることもある。"}, "山羊座_3": {"sign": "山羊座", "degree": 3, "symbol_ja": "人間の魂が、新しい体験を切望するあまり、肉化を求める", "explanation": "アイデンティティを明確にしたいという基本的な人間の願望のために、なにかを建設したり、また破壊したりしながら、人は進んでいく。ここでは、精神的な意味で自分を確認することではものたりない。このため、はっきりした具体的な表現や社会的行動を通じて、自分を確認する。２度で心理的に傷ついた人は、もう一度実際的な事柄を確認しながら、生きてゆかねばならない。心のなかにだけあるものとか、目に見えないものとかに対する懐疑的な姿勢が出てくるのはしかたがない。しかし、すべてが実証できるものでなくてはなにも信じられないのだ。われわれは自分の意志を明確にするために、経験の幅と深みをますます増大させる方向にむかう。この度数を持っている人は、積極的な人だとはいえるが、自分を確認するために行動しているので、作ったり壊したり、目的が達成されると、すぐさまそれを放棄するという姿勢も出てくる可能性が高い。"}, "山羊座_4": {"sign": "山羊座", "degree": 4, "symbol_ja": "航海にあたって、大きなカヌーの支度をする人々", "explanation": "自然の資源を利用して、集団的な目的を達成しようとする技術をあらわす度数。なじみの場所にすんでいた人々が移動の必要に迫られたときに、それぞれ共通した意志をあらわし、そのことを決め手に協力していこうとしている。変化への連帯的な行動といえばいいのだろうか。集団で行動するには、やはり共通の目的が必要だ。これらをはっきりさせようとする態度。この度数を持つ人は、集団をまとめるアイデアなり、方法を考案したりまとめたりするのにたけている。周到で綿密な計画性がある。しかし背後には蟹座の４度、ネコとネズミの議論という意味が隠れているように、統率力というには気弱な面が多すぎて、むしろ計画を練ったり、議論したりすることで、協力しあう姿をあらわしている。"}, "山羊座_5": {"sign": "山羊座", "degree": 5, "symbol_ja": "戦意をむき出しにしたインディアンたち。ある者たちはカヌーを漕ぎ、残りの者たちは出陣の踊りを踊っている", "explanation": "攻撃性をうまく利用すると、社会集団の活力と目的を明確にすることができる。１度の酋長は、統率のために、戦いのテーマをもち出した。戦争や競争、攻撃は、集団の意志をひとつにする非常に簡単な技術だ。きびきびした役割分担が行われる。集団はつねにその活力を躍動させるための新陳代謝を必要としている。この度数を持つ人は、集団に対して意欲を燃え立たせる技巧に優れている。たとえば具体的なスローガンとか営業目標を掲げて社員を戦闘的にさせる営業的なしかけのセンスは抜群だといえる。実際に企業で有能だといわれている人々に、この度数か、あるいは山羊座１度を多く見うける。ただし、この背後には蟹座の５度が隠れているので、いろいろとぶつかったり挫折したりする経験も多い。\nNo. 56／72区分（山羊座６度～１０度）「土台」\n社会の根底にあるものに関心を向ける\n地域精神に根ざした伝統的な元型（神）を用いた、社会的な指導力。人々を心理的にまとめていく才能。"}, "山羊座_6": {"sign": "山羊座", "degree": 6, "symbol_ja": "暗い森へと続くアーチ道の下に横たわっている１０本の丸太", "explanation": "暗い森は、未知の体験への旅だ。その森につづく道の下に丸太がころがっているのは、旅の前に片づける問題があることを暗示。新しく出発するために必要な基礎的な準備を固めておこうとする姿勢だ。山羊座は６度から、１０度まで、社会を統率している情感的な深層心理的な側面に関心をもつ。とすれば、丸太というのは、われわれの社会の根底にある土台であり、民族的な神とか、土地の神様とか、地域の精神を象徴とするような力に関係しているものだ。対向にあるのは蟹座の６度、無意識の本能的な要素が、人間のために奉仕する意味があるので、この山羊座６度もまた、無意識的に社会を支える、集団の本能的な土台を暗示している。新しい未知の体験にむかうさいの、自分自身の姿勢を、根底からもう一度考え直し、点検すること。深い資質に気がつくこと。社会的な活動をする場合にも、現象面だけにとらわれず、古い歴史を踏まえて、根底から考えようとする姿勢をあらわしている。"}, "山羊座_7": {"sign": "山羊座", "degree": 7, "symbol_ja": "ヴェールに包まれた預言者が、神の力にとりつかれて語る", "explanation": "社会集団や、地域社会を支えている、集合無意識的な土台に気がつくと、地域や社会はそれぞれ、あるシンボライズされた人格神のような象徴で把握することができる。もちろんこれは目に見えない、人々の意識の深い部分にあるエネルギー状態のようなものなのだが、この度数の持ち主は、こうした集団を支える集合的な魂と同化し、その意志の媒体となることができる。２０世紀最大の預言者といわれたエドガー・ケイシーが、この度数にプルートーをもっていたように、地域性に根づいた集団魂とのチャネリング能力によって、多数の人に指導的な助言を与えることのできる人だ。過去の拘束を突破して、人を未来に勇気をもって進ませるきっかけとなることも多く、ときには、超常的な透視能力や透聴能力として発現する可能性もある。地域性ということがひとつの鍵になっている。"}, "山羊座_8": {"sign": "山羊座", "degree": 8, "symbol_ja": "太陽に照らされた家で、飼い慣らされた鳥たちが楽しそうにさえずる", "explanation": "もともと山羊座は土星を守護星とする。土星は、現実社会の厳しい規律、法律や道徳、常識をあらわしているが、こうした制限のなかで、なんの反発もなく、満足し、環境に安住することのできる素直な人だ。のどかで幸福な存在。ここでは鳥かごのドアが開いていても、そこからでないという順応性を意味している。背後にあるのは、蟹座８度、ウサギの群。模倣性に関係した度数だが、この山羊座では、社会通念をそのまま本能的に模倣実践して、絵にかいたような健全な暮らしをする人々のことだ。いかにも害のない、常識的な人なので、人から悪意をもたれることはけっしてないといえる。この人が参加して行われることには、誰もが安心して警戒心をもたなくなる、という不思議な魔力があって、つねに本能的に土星によって守られているという性質が強いようだ。"}, "山羊座_9": {"sign": "山羊座", "degree": 9, "symbol_ja": "ハープを運ぶ天使", "explanation": "国家は地球が支えている。地球は、太陽系が支えている。太陽系は銀河系が支えている。これら複数の層でなりたっている自然界や宇宙のリズミカルな波動や磁力に対して、この度数を持つ人は、うまく同調することができる。蟹座９度は、生命に対する少女らしい素朴な理解と同化だった。ここでは、宇宙的なリズムに対する理解と同化だ。中世では、天体や宇宙を支えているのは、無数の天使だと思われていた時代があったが、美しいハーブの音を奏でながら空中を飛ぶ天使のシンボルから想像される。優雅で素直な資質は、この度数の持ち主に共通してあらわれる雰囲気だともいえる。ものごとを頭で決めない。予定を考えない。すべては、宇宙的な力の潮流に運ばれるまま、独特ののんびりした人格をもっている。"}, "山羊座_10": {"sign": "山羊座", "degree": 10, "symbol_ja": "アホウドリが船員の手から餌をもらっている", "explanation": "攻撃的な気質をもたない人は、野生の動物と仲良くすることができる。平和で温和な気質のおかげで、違う種類の生物や人と、協力しあうことができる。あらゆる生命や人は、それにふさわしい生存位置で自分の役割を果たしているが、これら全体をもう一度結びつけ理解しあう可能性を開くには、まず、自分自身のなかにある、ほかの存在への恐怖感や警戒心を取り除くことだ。恐怖を克服すると、非常に拡大された世界が待っている。自分の人生の可能性を伸ばす機会をのがすことがなくなる。害がないこと、信頼しあうこと。また依存に対して偏見がなく、ときには依存性も必要だと認識すること。\nNo. 57／72区分（山羊座１１度～１５度）「選別」選ばれた人の貴族的な活動\n選ばれた優れた人々を集めた組織への関与を暗示。不特定多数の人々の共同では決してなし得ないことを達成しようとする選民思想。"}, "山羊座_11": {"sign": "山羊座", "degree": 11, "symbol_ja": "私有地にいる、高麗キジの大群", "explanation": "特別な資質を隠しもった野生状態にある種を、特別な関心をもって育て洗練化させる。生命の進化の方向性はつねに洗練の方向にむかっているが、ここでは特殊な可能性を、さほど人目に触れない限られた場で、追求していくことをあらわしている。貴族的な資質も暗示。この度数を持つ人を見ると、ある団体なり、組織に参加して、そのなかで、集中的に自分の能力を発達させる傾向がある。あまりにも一般的な環境では、知性の進化は遅くなる。それよりも、閉じた空間で、テーマを先鋭的に追求したほうがよい成果が得られるという考え方だ。余分なものを捨てて、素材のエッセンスだけを取り上げ、よりよい成果を期待するので、たとえば、よい血統だけを育てるという教育などにかかわるケースもある。"}, "山羊座_12": {"sign": "山羊座", "degree": 12, "symbol_ja": "自然科学についての図解された講義が、ほとんど知られていない生命の側面を明らかにする", "explanation": "一般に知られていない特殊な科学的な知識、あるいは秘教的な知恵を追求する行為は、知性における貴族的なあり方だ。一般にはなじみのない専門的な知識を追求したり、自然界に対する深遠な知識を獲得すること。もちろん１１度の影響の後なので、その研究などに専念できそうな環境に恵まれ、ある保護された状況のなかで研究をつづけることができる。基本的にこの度数の持ち主は、科学的な研究にむいている。対向にあるのは蟹座の１２度で、これは権威や、使い古された常識的な価値づけに依存せず、普通の人がなかなか気がつかない日常のなかに隠れた真実の価値を追求する意味。この関連で、山羊座１２度は、普通だと軽視し、見過ごしがちな事柄のなかに、生命の偉大な神秘があることを発見する、という、鋭い注意力をも象徴しているのだ。「ほとんど知られていない」という象徴の意味は、ここにある。"}, "山羊座_13": {"sign": "山羊座", "degree": 13, "symbol_ja": "火の崇拝者が、存在の究極のリアリティを瞑想する", "explanation": "神秘主義者、霊学研究者、瞑想者などが終生追求する意識の冒険とは、死を超えて生きつづける、生命の根源的な創造力に到達することだ。ぬきん出たテーマを扱う１１度以後の流れのなかで、人は１２度で、生命の法則を研究し、真実を知ることに熱中する。しかし観察したり、見たりする姿勢では決して到達できないものがここにある。生命それ自体を超えたものは、なにか。主観的な意識の探索が極限までいくと、主観意識の根幹に到達する。象徴的に火とよばれるものの研究だ。対向にある蟹座は、研究のために差し出された親指、強い意志を発揮すること。じっとしていてはわからない、強い意志を発揮したときのみ、内的に理解できる原理を実感的につかむ。この度数の持ち主は、極限体験とか、生存のぎりぎりの条件とかに身をおくことに対する強い執着がある。"}, "山羊座_14": {"sign": "山羊座", "degree": 14, "symbol_ja": "長い間忘れられていた文化の目撃者として現存する、みかげ石に彫られた、古代のレリーフ", "explanation": "文化や文明の歴史を考えるさいに、あまり本質的でないと思われるものを排除していき、その根幹にある真実に肉薄しようとする。人間は自分のなかにあるものしか認識できない。だから、１３度で強い意志を発揮して、人間の底力的な創造力を追体験した人は、こうした根源的な創造性を、人類の気の遠くなるような歴史のなかにも、共感的に感じとることができる。古代からつづく人類の意志というものが見えてくる。常識的に知られている歴史は、常識的な世界観にもとづいて組み立てた記録だ。この度数の持ち主は、こうした表の歴史の裏に隠れた真実を知ることに、多大な労力を払う。たとえば銅鐸を見て、学者は現代人の知的水準でそれを推理する。だが、銅鐸の意味を知るには、それをつくり出した古代の人の魂に同化して考えなくては、まったくなにも理解できない。この度数の持ち主は、ものごとを内側から共感的に理解できる優れた才能があるのだ。"}, "山羊座_15": {"sign": "山羊座", "degree": 15, "symbol_ja": "病院の子供病棟が、おもちゃでいっぱいになっている", "explanation": "広大な歴史観、拡大された視野をもった人は、ここから未来についていろいろと予測し、子供たちの将来や、後続する世代の環境をもう一度検討し直すようになる。子供の創造的な資質を育成するには、いままでの教育方法では、あまりにも不完全であることに気がつき、あたかも自分のことであるかのように、福祉、教育的な事業に労力を傾けることになる。病んだものを、再教育によって軌道修正しようとすること。個人的には、ドイツの神秘主義者シュタイナーの業績は、この度数の流れにあるのではないかと思う。人の根源的な創造力を探究し（１３度）、ここから、霊学的な歴史観へ（１４度）、そして、シュタイナー教育という優れた教育法に到達した。われわれが育て、その将来について責任をもたねばならないような人々に対して、新しいより優れた方法を用意することが、この度数の意味だ。\nNo. 58／72区分（山羊座１６度～２０度）「実際」 健康的な実在性\n健康的な肉体と、健全な行為によって、健康的な精神と文化を創り出すことを求める。公平さと自由のなかで、積極的に社会参加する。"}, "山羊座_16": {"sign": "山羊座", "degree": 16, "symbol_ja": "体操着に身を包んだ少年少女たちが集まっている、学校のグラウンド", "explanation": "子供は身体を動かすことに純粋な楽しみを感じている。心と身体のバランスのよい発育が、正常な判断力や健康な人生を創造する鍵である、ということをあらわすこの度数は、肉体的な、フィジカルな生活を純粋な形で讃美できる度数だ。スポーツや肉体を使ったあらゆる運動に関連している。実際体操の先生などに、この度数と、次の１７度は頻繁にあらわれる。あまり精神的にどうこう、知的にどうこうと、考えごとをせずに、人間の実際的な可能性を、楽観的に拡大できる。いろいろな仕事をしてみたり、いろいろな可能性をためしてみたり、と人生を楽しむことができる。とくに身体を動かすことに対しては、なんでもやってみたくなる。健康な正常さの象徴の度数。"}, "山羊座_17": {"sign": "山羊座", "degree": 17, "symbol_ja": "抑圧された女性が、ヌーディズムに心理的な解放を見い出す", "explanation": "心と身体の完全なバランスという観点で、現代人の生き方は、かつての、肉体と精神の分離を教えた宗教の悪意ある抑圧によって、ゆがめられてしまったということに気がつく。そこから多数の神経症が生まれたが、この度数では、もう一度それを本来の正しい健康な水準にもどすために、心身のすべての抑圧をとっぱらってしまおうと考えるのだ。ものごとを判断するさいに、身体で確かめるという姿勢。つまりいかなるものも、自分で見て、自分で確かめないことには信じないというタイプの人だ。１６度が、子供の素朴な健康さをあらわすとしたら、１７度は、大人が、もう一度子供のような単純な裸の生き方にもどろうとする衝動を暗示している。どんな制約からものがれたいとする願望。自由への希求。"}, "山羊座_18": {"sign": "山羊座", "degree": 18, "symbol_ja": "イギリスの軍艦からはためく星条旗", "explanation": "かつてイギリス艦隊は、海を守る役割を担っていた。海は、人間の無意識の力をあらわしていて、ここには未知な危険が潜んでいる。この度数は、政治的な力とか、秩序が個人や集団の生活を守り、こうした無意識の世界を統御することに言及しているが、ちょうどこの前の度数、１７度で、抑圧を解放し、自由を謳歌しようとした人が、心理的な解放がゆきすぎた結果もたらされる危険を感知して、もう一度自主的に心身を管理したいという姿勢に変化したことを暗示。政治的な力の価値、政治的な力がもたらす危険にも関係する度数。政治的な力も、人が行使しているので、いろいろと誤りや暴走もある。この度数の人は、政治や権力、管理の問題に関して研究する能力がある。"}, "山羊座_19": {"sign": "山羊座", "degree": 19, "symbol_ja": "食料品の詰まった袋を運ぶ、５歳の子供", "explanation": "自然な発達を待たずに、進歩を加速する。子供には重すぎる荷物を運ぶ姿は、社会的な仕事や、責任などを、早くから身につけることを暗示する。早熟な発達。だが、環境がそれを強制している現実がある。また、周囲から個人の能力を超えた機会を与えられ、そのことで苦しんだり、葛藤したりするケースもある。無理してでも、働こうとする姿勢が、この度数だ。５という数字がシンボルにあらわれている場合、自由や自発性、創造性を暗示するが、こうしたメンタルな能力を、なんらかの義務に犠牲にする、あるいはもっと水準以上の成果を上げるために、激しい努力をする人を示している。この度数をもっている人を見ると、現実に、親や家庭の事情で、早くから働いたり、家事を任されたりする傾向がとても強いようだ。"}, "山羊座_20": {"sign": "山羊座", "degree": 20, "symbol_ja": "宗教的な礼拝で、隠された場所で歌う聖歌隊", "explanation": "社会参加のもっとも基本的な姿勢は、スタンドプレーをしないで、仲間と協力的に行動することだ。この度数でこの基本的な社会参加の姿勢が、完成する。聖歌隊は普通は隠されている場所にあり、だが全体の神聖な場の臨場感をもたらすのに必要不可欠なものである。ここでは仲間との疎外感がまったくない状態で、全体に溶け合うようにして個人の能力が発揮されている。ポリフォニックな統合といわれているが、ひとりひとりが浮いていない状況で、教会という完全なシステムが機能している。この１６度からはじまる５つの度数の流れは、肉体的な生存、実際的な生き方を、心いくまで発揮することが主題になっているが、この２０度で、目的が完全に実現され、現実の社会参加や、仕事に対して、本当の意味で、楽しみを見い出すことができる幸運を暗示。\nNo. 59／72区分（山羊座２１度～２５度）「勝敗」 競争原理\n社会的な競争原理に関わる。その競争に勝っても負けても、得るものは大きい。常にいかなるものも、他者と競合することで磨かれるものだと知る。"}, "山羊座_21": {"sign": "山羊座", "degree": 21, "symbol_ja": "リレー競争", "explanation": "山羊座の５度でも、戦闘的な仕事に対する野心があった。だがとても個人的に発揮された。この２１度では、同じ競争が、より大きな範囲で、文化的に成熟した競争原理に変わっている。バトンタッチしながら、仲間が協力しあい、他のチームと競争する。個人はきちんと出番を待ちながら競争していくのである。企業間、国家間での競争。ダイナミックな刺激の強い世界だが、もちろん人間の知能や、あらゆる能力は、こうした競争を通じて磨かれていくのだ。ライバルは多いが、個人的なライバルではない。対向にあるのは、蟹座の２１度。情感的に、環境にのみ込まれていくことをあらわしていて、この山羊座２１度も仕事のなかに骨までどっぷりと浸って、激しい活動をつづける人が多いといえる。"}, "山羊座_22": {"sign": "山羊座", "degree": 22, "symbol_ja": "敗北を清く受け入れることで、将軍は、高貴な性格を明らかにする", "explanation": "競争をすると、必然的に敗北するものがあらわれる。いかにしてほかの人に勝つかが問題ではない。ひとつの刺激しあう関係として競争原理がもち込まれたので、負けた場合に、自分のおかれた立場をどう処理するかが問題となる。敗北を清く受け入れることで、個人は、立派な性格を発揮する。負けたほうが精神的にはより大きく勝つ場合が多いからだ。この度数の人は、競争に負ける、という幾度かの体験をとおして、人に譲り、人を評価する包容力を身につけることが多い。社会生活や仕事のなかでの人格の成長の可能性がここにあるのだ。ただし進行法などでこの度数に惑星がきた場合、いずれにしても競争に負ける、という出来事がはっきりとあらわれやすい。新しいプロジェクトや計画があって、この度数が近いときには、警戒したほうがよい。"}, "山羊座_23": {"sign": "山羊座", "degree": 23, "symbol_ja": "戦闘での勇敢な行為によって、２つの賞を与えられる戦士", "explanation": "社会的に奉仕し、働いたことに対する報酬。２つの賞は２１度、２２度双方に対する報酬。すなわち現実的に働いたことに対する報酬と、もうひとつは、いさぎよい態度に対する尊敬と評価だ。この度数の持ち主に対して、まわりの人々や目に見えない運命が、善意の報酬を与える。だからこの人は、さまざまな贈り物を獲得する。満足できる豊かな暮らしが手に入るだろう。努力すればしただけの暮らしができること。行動の着実な成果がここで得られる。また競争に勝つこと、競争に敗北した体験、ともに理解できるので、こうした社会生活に必然的にやってくる体験全体を、公平に評価できる人だ。ゆきすぎた行動とか、ゆきすぎた野心もない。バランスの取れた人だといえる。"}, "山羊座_24": {"sign": "山羊座", "degree": 24, "symbol_ja": "女子修道院に入る女性", "explanation": "あまり世俗的でない目的のために、社会や世俗を捨て、目的に一心に集中する。しかし現代では、修道院はあまり一般的なものではない。だからなにかの目的のために、陰遁者のような暮らしをしたり、社会から逃避する姿勢をあらわしていることが多い。対向にある蟹座の２４度は、理想の生き方を求めて、南の島に逃走する、というシンボルがあらわれていたので、ここではある特別な目的のために、社会の価値を否定する、という事態になりやすいのだ。また現実にこの度数の持ち主をみていると、ある一定期間、特殊な環境に閉じこめられたり、自由のきかない人生を強制されるケースがある。簡単には抜けられないような組織や団体に所属したり、宗教的な活動をする場合もある。また自宅から一歩もでない生活をする人も。"}, "山羊座_25": {"sign": "山羊座", "degree": 25, "symbol_ja": "高価な東洋の絨毯がたくさん置いてある店", "explanation": "世俗を超えた優れた価値を追求した人は、しだいに活力の源流を見失い、やがて社会の伝統的な価値に、目をむけはじめる。いったんそうなってみると、この世俗的な社会や伝統、風習の中に、すばらしい価値が眠っていることに気がつく。いかなる高度な霊的なものも、この世界の中にすべて備わっている。絨毯は、人の手で長い時間かけて織られ、出来上がったあとは、多くの人がその上を歩く。日常的な生活の地盤のなかに、いつもは気がつかなかった優れた、人類の努力の跡が見える。ごく平凡な暮らしのなかに、修道院以上の価値が存在するかもしれない。超越的な意識さえ、世間のなかで求めることは、可能なのだ。対向にある蟹座２５度は、超越的な力の降下だった。ここでは東洋的な思想ということが強調されていて、たとえば日本の古神道の「名もなき平凡なおじさん、おばさんの知恵のなかに、もっとも優れたものがある」という考え方に非常に近いものがある。\nNo. 60／72区分（山羊座２６度～３０度）「制御」五感を支配する\n明確な業績を達成するに足る、人間の基本的な能力の発達と、制御。いかなるものも、意識的に制御できることを知る。"}, "山羊座_26": {"sign": "山羊座", "degree": 26, "symbol_ja": "滝の虹色に輝く霧の中で踊る自然霊", "explanation": "水の霊が象徴的に登場するこの度数は、生命を生き生きとさせ、意識の流動性を刺激し、人を回復させる、不思議な原理について語っている。この度数を持つ人の全体の傾向としては、非常に繊細な、芸術的な感性があることで、おもに詩的な才能として開花する資質だ。微妙な色彩感覚とか、情感のこまやかな変化などをうまく表現できる。水は降下していく原理。すなわちこの人の、あらゆる多様な方向への豊かな感受性の浸透を示しているが、どちらかというとあまり行動的ではない資質といえる。贅沢な感覚、あまり簡素な方向にはむかわない性質も特徴といえる。この度数をもっている人は、芸術的な分野で成功しやすいといえるので、自分の才能についてもう少し真剣に考えてみよう。"}, "山羊座_27": {"sign": "山羊座", "degree": 27, "symbol_ja": "山の聖堂へとつらなる急な階段を上る巡礼者", "explanation": "上昇していく火の原理について語っている度数。長い険しい階段を上りつづけることに似た厳しい努力によって、自分の意識の可能性の頂点的な領域に到達する。水はつねに降下するが、火はつねに上昇する。精神的な意味で、上昇意欲がきわめて強い人だといえる。聖堂は、何世代もにわたって使われてきた。こうした長いあいだの先人の努力を尊重し、伝統的に確立された精神的な達成の道を信じること。精神の極みに達すること。またこれは山の頂上においての風当たりの強さも連想させる。密度の高い、緊迫した状況。頂点的な知識や情報を手に入れるが、それらは大きな責任感をもっていなくては維持できないような重大なものかもしれない。この度数は優れた能力を暗示していることが多い。"}, "山羊座_28": {"sign": "山羊座", "degree": 28, "symbol_ja": "大規模な鳥類飼育場", "explanation": "鳥はサビアンシンボルのなかでは、霊性の象徴。大規模な飼育場というのも、霊的な世界の種々の情報や刺激が、やや過剰ぎみにこの人にもたらされることの意。イメージとして動物園の騒がしさを想像してほしい。鳥は何種類もいて、しだいになにが正しいのかわからなくなる混乱もありうる。しばしば透聴的な能力を暗示するといわれているこの度数も、別の見方をすると、宗教的な団体や多数の霊能力者のもとを訪れ、無数の情報を手に入れ、それに食傷するという出方をするほうが実際には多い。霊世界は、ひとつではなく、霊統という系統づけをすれば、さほど混乱せずに考えることができるが、雑多なアプローチをすれば、かならず矛盾する内容に苦しめられることになるだろう。とりわけ霊的な色あいを帯びた情報をたくさん集めようとする趣味がこの人にある。"}, "山羊座_29": {"sign": "山羊座", "degree": 29, "symbol_ja": "紅茶占いをする女性", "explanation": "紅茶占いというのは、ティーカップに落とした紅茶の雫の形を見て、将来などを占う方法だ。おなじように、壁の滲み、雲の形などからも、なんらかの兆候を読み取ることはできる。２８度が透聴的な能力とすれば、この２９度は透視能力に関連しているといわれている。日常的な出来事のなかにあらわれた霊的な暗示を読み取る能力だが、対向にあるのが蟹座２９度、ミューズの女神だとすれば、この山羊座２９度の人には大きな直観力や、ものごとを予知的に観察する優れた才能があることになる。２８度が、純粋に霊的な言葉のみに耳を傾けるのに比較して、ここでは実用的な方法で、この透視的な才能や、直観的に兆候を読む才能を生かすのが特性だといえる。ただし、シンボルどおりに、占い師的な才能があるかどうかは、やや疑問が残る。むしろ透視的なイメージから知識を獲得する傾向が強いと思われる。"}, "山羊座_30": {"sign": "山羊座", "degree": 30, "symbol_ja": "世界的な事件に関する、決定と責任を持つ男たちの秘密会議", "explanation": "２６度からはじまる５つの度数の流れは、地球環境を支配している５つの元素の征服。その意味で、まるでインドのヨガ行者のような進化のコースが描かれているのだが、３０度は、五元素を征服しえた存在が、その頂点的な能力を獲得したことを明示する。象徴的に水、火、風、土と進み、ここで空を象徴する原理に到達する。これは５つの元素の中心に存在し、社会的な立場においても、この人は、組織や集団の頂点に位置しうる。その意味でエグゼクティブのシンボルだといわれているのだ。ちょっとした思いつきや行動が、具体的な強い影響力を発揮するので、ここでは大きな社会的な責任が生じる。ドアを開くのに、力任せに押す必要はない。ノブをちょっとひねればよいだけだ。この人は、大した力を使わずに、こうしたいろんな力を動かせる立場に立つことになるだろう。\nNo. 61／72区分（水瓶座１度～５度）「理想」 理想の具現化\n未来の理想に向けて、自己をすべて投げ出す。生活の守りに入るのではなく、理想像に向けて、自己の社会的な立場を犠牲にする。"}, "水瓶座_1": {"sign": "水瓶座", "degree": 1, "symbol_ja": "カリフォルニアの古いレンガ造りの伝道所", "explanation": "人の一生を超えた長い期間継続するような精神的な理想を具体化すること。もちろん、こうした大きな目的や理想を具体化するには、ひとりの力ではなにもできない。シンボルに描かれた古い伝道所は、遠い国に遺跡として残った人類の業績を暗示している。自分の信仰する理想郷を建築するために、故郷から遠く離れる。一時的な成功を夢見ることなく、永続するべき本当の意味での理想を目指す。つねに星座のはじまりの度数は、その星座の追求する主題のもっとも幼児的な、純粋すぎるほど純粋なあらわれだ。水瓶座の願望は、いつの時代にも変わることなくつづく理想郷の建築だといえるが、対向にあるのは獅子座の１度。理想の追求のために、あまりにも衝動的に、後先考えずに、力任せに行動する性質があるといえるだろう。"}, "水瓶座_2": {"sign": "水瓶座", "degree": 2, "symbol_ja": "予期していなかった雷雨", "explanation": "努力して築いたすばらしい理想の建物も、自然の雷雨や嵐で、はかなくも崩れてしまうかもしれない。ルディアは「塵であったおまえ、塵になるおまえ」という言い方を引用しているが、人間の業績に対する自然の破壊力を暗示する度数。だが、雷雨は、乾いた土地にはなくてはならない自然の恩恵でもある。問題は「予期していなかった」ということで、人の思いや理想と、自然の力がうまくかみあわないことだ。この度数を持つ人は、自分の計画や理想が、外部からの影響でゆすぶられ、ときには壊れたりする。そのときに、自分の理想が本当に永続的なものだったか考えてみる必要がある。いかなるときでも、突然の出来事に準備をする心構えが必要だということ、塵になっても生き残るような本当の理想を考える必要がある。形にしたものは、いつかは壊れるものなのだ。実際にこの度数を持っている人を多く見かけたが、無気力な人もかなりいた。"}, "水瓶座_3": {"sign": "水瓶座", "degree": 3, "symbol_ja": "海軍からの脱走兵", "explanation": "社会的なステイタスや地位を捨てる。この場合、現実にキャリアを捨てるという意味だけでなく、われわれの社会がもっているものの見方、慣習、考え方など根本的な要素まで投げ出して、自分をわざわざ見捨てられた人間の位置において、恒久的な価値を目指す、という意味がある。水瓶座のこの度数では、山羊座の影響を根本から壊すことで、自分を自由な空間に解き放つ勇気があらわれていることになる。この度数の持ち主は、基本的にはサラリーマンなどにはむかないだろう。自分で生活する技術を身につけ、つねにどこでもひとりで生きてゆけるようにするのが理想だ。職場で、自己の願望と実生活との矛盾で苦しむことになるからだ。人間の生活は本来だれからも管理されないはずだと信じているし、そのためには、手に入れた地位も平気で捨てる。"}, "水瓶座_4": {"sign": "水瓶座", "degree": 4, "symbol_ja": "インドのヨギが自らの治癒力を示す", "explanation": "社会機構にがんじがらめに組み込まれて、歯車のように生きている人には、特有の病気や特有のストレスがある。しかし同じような立場の人には、そうした自己診断はできない。３度で社会から与えられた価値観を完璧にかなぐり捨てた自由な人は、こうした人々のどこが問題か自分の視点から指摘することができる。理想の人間像から照らしあわせて、多くの人がおちいっている病いやいろいろな問題を治療することに関心をむける。それに、水瓶座３度は、社会的なステイタスを捨てる度数なので、その後では、人は単独で自活できる技術を身につけなくてはならない。もっとも好適なのは、やはり治療師として生きることだ。実際に、この度数の持ち主はそのような特技をもっている人が多い。セラピスト、整体治療師なども多い。対向にあるのは獅子座の４度。自分の能力をひけらかす性格と、人から自分の技術を賞賛されたい願望が隠れているといえる。"}, "水瓶座_5": {"sign": "水瓶座", "degree": 5, "symbol_ja": "若いリーダーの努力を成就させようとする先祖の委員会", "explanation": "人類の過去の業績は、その土台の上に立って生きている個人を、目に見えないところから助けている。個人が、危機に遭遇したり、重大なことで選択に迷うとき、この過去からの力がその人の決断の瞬間に、力を与える。先祖の助けのある人だと考えてもいい。先駆者に対する信頼。この度数を持っている人に体験を確認した限りでは、やはり目に見えない助けのようなものがなんらかの形ではたらいているとしか思えないような事例に遭遇するようだ。水瓶座３度以後は、社会的な価値の拒絶を意味するから、援助は社会的な形ではなく、直接自分の目的に共鳴する過去の偉人や、先祖などからもたらされる。そのことで、長い歴史のなかで、自己の目的と直接因縁を感じるような歴史上の偉人などに対する理解と尊敬の念が生じることになる。ときには誇大なイメージにとらわれることもあり、たとえば、自分は、武田信玄の霊に守られているというような話を口走る人もいる。\nNo. 62／72区分（水瓶座６度～１０度）「仮面」 仮面を演じる\n求められる人間像を、いかに自分の資質とは相反するものであれ、演じきることで、その役割を果たすことができることを実践する。すべての人間の地位や名誉は、本質的なものとは関係がないことを理解する。"}, "水瓶座_6": {"sign": "水瓶座", "degree": 6, "symbol_ja": "神秘劇で儀式を演じる仮面をかぶった人物", "explanation": "個人の素顔ではなく、わざわざ仮面をかぶって神秘劇に参加する人とは、個人のもって生まれた資質とは違う人格を、集団的な活動のなかで演じつづけることで、社会的な役割を全うする人のことだ。この場合、演じた役割とは、企業のなかでは、役職だし、その役割を果たす人につきつけられる要素を最後まで押し通すことのできる能力をあらわしている。その役割や仮面によって否定的な結果が引き起こされたときにも、それを引き受ける責任能力と自覚がある。男女関係の面では、男性が要求する女性イメージを、相手の前にいるあいだは、完璧なまでに演じつづける女性、という例もこの度数の持ち主に見かけたことがある。人生のなかでの演技者、この実際の人生をひとつの舞台だと考えている人々。ただし無意識に演じることはめったにない。"}, "水瓶座_7": {"sign": "水瓶座", "degree": 7, "symbol_ja": "卵から生まれつつある子供", "explanation": "どのような地域的な条件からも自由な、宇宙的な空間から純粋培養的に生まれ出る子供。これはいかなる伝統にも慣習にも従っていない。母親とへその緒でつながっているわけでなし、卵から生まれる子供というのは、象徴的に新人類だ。それは環境に対して、ツルンと閉じていて、だれからも影響を受けることはないし、手ごたえのはっきりしない人だといわれることも多い。伝統や従来の社会でのあり方に従属し、その責任まで引き受ける６度とはまさに対照的な性質の度数で、既存の人の生き方から独立しようとする願望に貫かれている。この度数を持つ人は、感受性が特殊で、常識では理解しづらい。純粋性への願望。対向にあるのは獅子座の７度、星空。いつどの時代でも、どこでも通用するような人格像にあこがれている。"}, "水瓶座_8": {"sign": "水瓶座", "degree": 8, "symbol_ja": "美しいガウンをまとった蝋人形が展示されている", "explanation": "蝋人形はひとつの見本で、実体ある生命とは違う。この度数を持つ人は、現実の生活に踏み込む前に、擬似的な現実のなかで、シミュレーションとしてさまざまな可能性を考察し、そこから現実に適用させるアイデアを考えようとする傾向がある。もちろんこの前の７度で、永遠に通用するもっとも普遍的な生き方へのあこがれが強くはたらいたために、ものごとを考えるにも、世俗離れした、抽象的な理論的なところから考えていくという傾向を示すことになるのだ。現実離れした美や、理想的なアイデアを考え出し、それが社会に実際的に適用できるものかどうか、あまり構っていない。人形は偽物だが、いかにも美しい姿をしている。想像のゲームのなかで、理想的な人のあり方を探す。またシンボルにあらわれたイメージどおりに、人形（マネキン）に関係したもの、美容とか、服飾などに関係する人も多い。"}, "水瓶座_9": {"sign": "水瓶座", "degree": 9, "symbol_ja": "鷲へと変身する旗", "explanation": "射手座の１２度と似たシンボルだが、意味は違う。机上の理論的な、抽象的なアイデアを、現実社会にもち込もうとする衝動。旗はたんなる印だった。だが、それに意志をもたせ（鷲に変わり）実際面で実現しようとする。背後にあるのは、獅子座の９度、ガラス吹きだ。すなわち、この度数の持ち主は、自分の理想を具体的な形にしようと創造行為に走るが、それは獅子座のだが、それは人格の本能的な側面、すなわち、左の羽根を犠牲にしたところでなりたっているために、人は、理想主義的な要素と、ときには極端な現実嫌いがあるが、この度数では、それが強くあらわれていることになる。６度からは、ものごとをすべてイメージ見るという傾向が強いために、対人的な共感のなかで進んでいく行動ではない。この生き方もまた新人類的な生き方のひとつだといえる。"}, "水瓶座_10": {"sign": "水瓶座", "degree": 10, "symbol_ja": "ある時期人気を博する理想を具現した男が、人間として自分はこの理想ではないということを、自覚するようになる", "explanation": "映画のスターは、多くの人の心の底にあるシンボルや理想の投影された人格像を演じて見せる人だ。だが、スターは演じる役柄と別個に、人として生きている。名前もない、人としてのあり方と、映画のフィルムのなかで演じられているような象徴としての人格像が、ここではっきりと分裂する。われわれは時のなかに生きていて、老いる運命をもった肉体をもち、仮面劇を演じつづけようにも、いつかは肉体条件がついてこなくなるのだ。仮面は本来時のない世界にある。だから、ある日仮面は他の、より若い人にわたる。そして残った老いた俳優は、裸の個人として、人の本質とはなにかを真剣に考えるようになる。幻想や、夢からさめて、純粋になった人をあらわしている。シンボルだけを読むと、しばしば否定的な意味にもとられかねないが、これは開悟と、自覚の度数だ。背後にあるのは獅子座の１０度、夜明けを通り過ぎてやっと解放される朝。夢からさめた朝、という爽快さを示す。\nNo.\n63／72区分（水瓶座１１度～１５度）「透明」純粋に自由を獲得した人の本当の公平さ\n人格的な個性の癖を脱却して、どんな異質な種類の人々とも意志疎通ができることを実践する。そして普遍的な人間愛に目覚める。"}, "水瓶座_11": {"sign": "水瓶座", "degree": 11, "symbol_ja": "沈黙の時間に、自分の人生を変える新しい霊感を受け取る男", "explanation": "個人へ霊的な力がはたらきかける瞬間を暗示しているが、これは前の５度グループのときのような、なんらかの原型的なイメージと同化することで、霊的な力を通路づける方法とははっきりと違っている。裸で単純な\\\"わたし\\\"に、沈黙のなかで、まったく新しい力が開かれてくることを喜びをもって自覚する。外的なさまざまな影響に対して独立した、ひとりの静かな時間をもつこと。このなかで、はっとするオリジナルな正しい直観なり理解なりがわき起こる。この度数を持つ人は、１０度で「力から脱落」したように思うかもしれない。だが、これはいままでの流れとは違う、より純粋な生き方を発見するために、新しい力の源流が、ひたひたと押し寄せてくる時間を体験しているのだ。どんなものにも支配されず、どんなものにもふりまわされず純粋に頭脳を使うこと。"}, "水瓶座_12": {"sign": "水瓶座", "degree": 12, "symbol_ja": "広大な階段に、異なったタイプの人々が順々に立っている", "explanation": "人間が進化し、より高度な世界へと上昇するときに、まったく異なるレベルの進化パターンとか、異なったたくさんの意識進化レベルがあることに気がつくこと。自由な個人にもどった人は、いかなるイメージにもふりまわされないので、沈黙の霊感を通じて、どんな異質なタイプの進化方法も理解可能な、公平な視点を獲得できる。常識的には通じあうことがありえないような種々の人々と、共感することができる能力だ。一見、これは平等主義のシンボルのように見えるが、反対の面もある。人にはさまざまな段階があるという理解によって、平等主義の暴力からまぬがれるのだ。平等であるからこそ、人によって対応は変えねばならない、という理解に到達する。人に対して客観的な理解に到達すること。"}, "水瓶座_13": {"sign": "水瓶座", "degree": 13, "symbol_ja": "バロメーター", "explanation": "自然界の基本的なリズムを把握することで、行動を前もって予測できる能力を身につける。原因がどのようにして次の過程を生み出すか。気圧の変化で、あすの天気がどうなるか予測する、など科学的予測を暗示している。さらにきざしで予知する方法。１２度で、人は宇宙の異なる複数の原理を知ることができた。こうした知識を利用すれば、より正確に未来を予測できる、ということなのだ。占星術なども関連した、宇宙や人心の周期的な動きに対する推理力。予測する能力はきわめて優れている。また、世相調査とか、市場の動向を巧妙に把握して、時流に乗った仕事をする手腕もある。社会のなかで、ひとつのバロメーターとしての立場に立つことも、この人にはむいている。世の中の動きの全貌を知りたいときには、この度数をもった友人をもつべきである。"}, "水瓶座_14": {"sign": "水瓶座", "degree": 14, "symbol_ja": "トンネルに入る列車", "explanation": "知恵、理解、予測という１１、１２、１３度の組み合わせの能力によって、特定の目的を果たすのに必要な時間の短縮、効率化をなすことができる。ものごとの進め方に加速度をつける、ということ。ぐるぐると無駄なところを走らねばならないときに、通常の定められたコースを横断して、近道を見つけ出す能力。工夫しながら、自分の人生の進路や、人の方向をうまく判断できる才能だ。対向にある獅子座の１４度は、内奥の魂の叫びを表現するために、目立つ舞台に立つことを示すが、ここでは、自己の目的を完全に実行するために、さりげなく抜け穴を利用して、ずるく立ち回り、いかなる障害があっても、それを巧妙に突破し、結局は目的を果たすのだ。大変に頭のよい人だといえるし、無駄なことは嫌いかもしれない。目的を実行するためには、非常識なことも、あえて実行する判断の鋭さなど。"}, "水瓶座_15": {"sign": "水瓶座", "degree": 15, "symbol_ja": "２羽のラブバードがフェンスにとまり、幸せそうに歌う", "explanation": "フェンスで仕切られた２つの世界とはなんだろうか。この世と、また彼岸の世界をあらわすこともあるだろう。この２つにまたがった位置に、２羽の鳥がとまっている。新しい世界がこの度数で開かれ、大きな幸福感を感じることができる。プラトンの主張するように、われわれには失われた半身（＝理想の異性）というものがあり、もしこの半身と合体することができれば、究極の自己にいたるしあわせな状態を実現することができる、といわれている。この両性合体的な生き方のなかでは、人はこの世でも、あの世でもない、独特の、あたかもフェンスの上にいるかのように、日常に毒されないような生き方を実現できる。この度数の持ち主は、男性であれ、女性であれ、気質的に両性具有的存在だといえるし、独特の、誰にも親しみやすい気やすさがあるようだ。平和的で、俗抜けした性格をもっている。人気運をあらわすことも多い。\nNo. 64／72区分（水瓶座１６度～２０度）「組織」\n壮大な世界地図のなかに生きる\nマクロな視野のなかで生きる。しかしまた超国家的な世界観のなかでは、個人の権利は常に危機に脅かされる。全体と個のせめぎあいに生きる。"}, "水瓶座_16": {"sign": "水瓶座", "degree": 16, "symbol_ja": "机にむかう偉大なビジネスマン", "explanation": "水瓶座も、１６度以後は急激にビッグな視点で生きるようになる。人の意識を狭い空間に縛りつけるもととなった異性への執着に満ちた感情が、１５度で超えられたあとは、人間の生活意識は、よりマクロな方向へと発展していく自由を獲得する。ものごとを人類全体の進化という観点で考えてみたり、つねに視野は大きなほうへとむかう。国際問題や、地球環境全体の問題、あるいは宇宙問題など、いまの人類に必要な事業方向は無数にある。だがヒットラーが実行に移そうとした民族選別計画なども、この度数に関係した事柄だといえるので、個人個人の私生活の満足や権利などについて十分に考え、バランスをとった姿勢を心がけなくてはならない。個人的な思惑を超えて、グローバルな計画を実行することのできる冷静な意志が、この度数の持ち主の個性だといえるのだが、つい個人的な小さな問題を考えることを見落とす傾向があるからだ。"}, "水瓶座_17": {"sign": "水瓶座", "degree": 17, "symbol_ja": "番犬が自分の主人とその持ち物を守り、見張っている", "explanation": "複雑で大きな組織でなりたつ世界になるほど、個人の生活は脅かされる。１６度は全体主義の傾向をもっていて、それはしばしば個人の個人的な欲望や生活方針を抑圧する。だから１７度では、個人の生活を守るための手段を、工夫しなくてはならない度数だ。またこれは心霊的な力や、魔術的な力から自分を防衛することにも関係する。犬は、人間の心霊的な守護を象徴する動物。全体に、防衛的な問題を扱うことになる度数だ。したがって、この度数は警察とか、防衛的な仕事に関係する傾向がある。組織の暴力に対して自分を守ること。精神的に進化した世界では、単純な警察機構ではほとんどなんの役にも立たない目に見えないサイキックな危機も存在するはずだ。物心両面での防衛が必要だ。"}, "水瓶座_18": {"sign": "水瓶座", "degree": 18, "symbol_ja": "人間の秘密の動機が、公的に仮面をはがされつつある", "explanation": "管理社会のなかで、個人の権利を守ろうとしても、力のない個人はたいてい敗北し、結果的に公的な機関は人の個人的な秘密をあばいたり管理したりする傾向が強まっている。現代では、マスコミは、人の私生活まで嗅ぎまわる。政治的かあるいは企業の、スパイ活動や、探偵能力はますます発達してくる。この度数は、自白させるとか、科学的な手法も使いながら、秘密を探るということに関係していて、高度な発達を遂げた魂においては、宇宙の秘密を探るという能力にもなる。またこの度数を持つ人は、個人的な範囲では、自分の身のまわりの人の秘密を他者に暴露するという気質をもっているようである。個人を公的な基準に磔にするという意味があるので、ときには精神的な暴力も意味するが、職業としては、やはり調査、探偵的なことに卓越する度数。"}, "水瓶座_19": {"sign": "水瓶座", "degree": 19, "symbol_ja": "山火事が、水、化学薬品、また体力の限りをつくして鎮圧される", "explanation": "ささいなことが原因で、パニック的な状況が引き起こされる。ときには不注意で、あるいはときには隠していたことが暴かれて、ものごとが予測もつかないハデな状況に発展していく。これらの事態に対して、この度数の持ち主は、全力で取り組まねばならなくなる。不屈の精神力で、対処する。山火事は不注意でおこることもあれば、また天災にもよる。このような不確定な原因で起こる予測しづらい危険な事態に対して、早急な対策をとれる能力が発達する。この度数を持つ人は、状況解決に小手先でなく、全身で取り組むという姿勢と、もうひとつはいかなる状況でも即座に理想的な決断ができる冷静さを必要としている。したがって、危機管理なども関係するし、人生のなかで、一度はパニック的な状況に遭遇することになるかもしれない。"}, "水瓶座_20": {"sign": "水瓶座", "degree": 20, "symbol_ja": "伝言を運ぶ大きな白い犬", "explanation": "勇敢で不屈の精神をもつ人は、困難な状況のなかでもしっかりと信念にもとづいて強く生きることで、結果的に自己のもっとも奥深いところからやってくる、霊的な言葉やメッセージを受け取ることになる。絶望的な事態のなかでは、個人の深層の目的や、意志が明確になりやすいのは当然だが、とくにこの度数の持ち主は、はっきりとした自覚を獲得することができる。惰性や破壊力に対して抵抗し、戦うことで、霊的な意識が発達する。この度数を持つ人を見ているとなかには夢で霊的暗示を受ける人もいる。個人に役立つメッセージにとどまらず、集合的に役立つ啓示を受け取る。自然界からもたらされる直観ではなく、むしろ\\\"見えない政府\\\"といわれる、神秘的な世界から、メッセージを受け取る特殊な能力だ。水瓶の１６度以後は、個人にだけ役立つ情報には関心がない。きわめてマクロな視野で、集合社会的な状況に対する解答を得るということが多いのだ。\nNo. 65／72区分（水瓶座２１度～２５度）「理性」\n個人的な感情を淘汰し、自分を公的な存在に改造する\n個人としての感情や、自然な感性を、必要とされる社会的な任務や仕事によって作り替えていく。環境のためには、自分もまた根底から変化しなくてはならない。"}, "水瓶座_21": {"sign": "水瓶座", "degree": 21, "symbol_ja": "一見空しいと思われる人生に果敢に立ちむかう、傷つき失望した女性", "explanation": "水瓶座後半の流れはすべて組織的で近未来的な社会構造を強調しており、この社会のなかで生き抜こうとすれば、ごく身近な人々との心の交流や、個人的な感情の満足を追求する。誰のなかにも内在する「女性的な心」は、傷つき、阻害されてしまう。複雑な社会生活のなかでは、どうしても情緒不安定になり、心がすさんでしまうのはしかたがない。この度数を持つ人は、このように個人的な欲求を殺されてしまう立場に立たされやすいことを警告している。組織のために、自分を犠牲にせざるをえなかった体験など。逆境での回復力や、強く生きることを早急に学ばねばならない。孤独のなかで自己の内面に直面し、環境の過酷さに耐える必要がある。また目に見えない漫然とした、都市全体の大気からやってくる攻撃感情に傷つくケースもある。背後には獅子座の２１度が隠れているのだ。"}, "水瓶座_22": {"sign": "水瓶座", "degree": 22, "symbol_ja": "子供たちが快適かつ暖かく遊べるように敷き詰められた、保育園のカーペット", "explanation": "幼児のような心で誠実に生きようとしている、成長力のある人には、つねに保護が存在している。さまざまな心理ショックをやわらげる、暖かく柔らかい敷物のような、やさしい保護が、たとえ目に見えなくても、その人のまわりを取り囲んでいる。２１度の失望と自己阻害は、もう一度幼児のような心にもどることで、いやされ、再教育を受ける。この度数は、２１度の修正であるが、人間の素朴な原点にもどること。保護を受けることを意味する。この度数を持っている人は、保護されるか、それとも保護する立場に立つか、である。かつて傷ついた体験が、個人を思いやりの深い人間にしていくし、保育するような仕事にむいているといえる。"}, "水瓶座_23": {"sign": "水瓶座", "degree": 23, "symbol_ja": "大きなクマが座って、四つ足を振っている", "explanation": "子供か動物のように、ナマのままで生きている感情や、情念、あるいは生命エネルギーを、意識的に訓練することで、規律ある生き方に変えていく技術。目的に奉仕する心身を自分自身でしつける能力だ。たとえば公的な仕事のなかでは、あくまで組織の目的にしたがい、決して個人的な感情は出さないように自己訓練するとか。生命エネルギーの意識的な方向づけというテーマが、より拡大されてくると、たとえば、\\\"気\\\"や心の力を思いのままにあやつる目的をもった、ヨガや武道などの修行で伸びてくる人をあらわす。同時にこれはパニック状況に対する強さ、最後まであわてずしっかり義務を果たす能力も発達するので、人から信頼される人となるはずだ。自己に対する厳しさ。大きな管理能力。この度数はヨガなど厳しい自己訓練に関連した職種の人に著しく多く見受けられる。"}, "水瓶座_24": {"sign": "水瓶座", "degree": 24, "symbol_ja": "自分の感情の克服に成功した男が、自分の体験という観点から深い知恵を教える", "explanation": "自分の感情を制御し、自分自身をしつけることに成功した人は、かつての自分と似たような境遇で苦しんだり、また必死で努力している人に対して、自分の体験にもとづいた、実のある指導や手助けをすることができる。自分の体験的な知識を人に伝達することは、多くの人に役立つことになる。人格教育などに有利な度数だ。人を救けることで、自分もさらに助けられて、その先に進むことができる、という生き方をするので、盛んに人に手助けしたり指導したりできる仕事につけるなら、理想的だ。教師にむいているタイプであることはいうまでもない。背後には獅子座２４度があり、なりふり構わず一心に瞑想する男。ひとつの目的に集中して、必ずそれを達成できる能力だ。"}, "水瓶座_25": {"sign": "水瓶座", "degree": 25, "symbol_ja": "より完全な形をしている蝶の右側の羽", "explanation": "蝶は魂の象徴。右側とは、おもに理性的で、頭脳的な面をあらわしている。すなわち魂とか心とか、とらえどころのない領分を、はっきりと理知的に構造化して、意識的に取り扱うことのできる度数だ。個人的に満たされない寂しい感情からはじまり、その気持ちを克服することを主題とした２１度からの５つの度数は、ここでその目的をはたし、心や感情は、完全に新しい組織化を達成したことになる。この度数の所有者は、意思の願うまま、自分の感情を制御することができるのだが、それは人格の本能的な側面、すなわち、左の羽根を犠牲にしたところでなりたっているために、人から人格者だといわれる可能性はとても高いが、豊かな感情をもっているとは言いにくくなる。やはり教育者や、指導的な仕事の人に多い度数だ。\nNo.\n66／72区分（水瓶座２６度～３０度）「技術」あらゆる問題は技術で解決できる\nどんな人間的な問題も、技術の対象である。あたかも機械類を扱うかのように、テクノロジーで障害を突破する。"}, "水瓶座_26": {"sign": "水瓶座", "degree": 26, "symbol_ja": "測定機で車のバッテリーをテストしている修理工", "explanation": "一見、小さなことでも、細心のチェックと万全の管理を要求されることは多数ある。車の点検は、つい忘れがちだが、怠って高速走行したときのことを考えるととても危険だ。豊かな知識による効率性、知的な分析力を、技術的な事柄にかぎらず、人生のすべてに対してこれを発揮することで、すべてが安全に管理されていく度数だ。心や感情の問題も、マインドコントロールの観点からやはり技術的な問題だととらえることができる。正しい知識と良心さえあれば、いかなるものも技術者のように扱うことができるのだ、と考えている人が、この度数の持ち主の特徴だ。注意深く、慎重な人。激情に動かされたり、すべては意志や根性で解決できる、とは夢にも考えないタイプだ。２６度以後の流れは、水瓶座のもっともよい資質を、実社会に生かすことのできる流れ。"}, "水瓶座_27": {"sign": "水瓶座", "degree": 27, "symbol_ja": "新鮮なスミレで満たされた、古代の陶器の椀", "explanation": "自然な、古い時代からつづく人間の基本的な情緒のうち、とくに微妙さ、繊細さが強くあらわれてくる。スミレは謙遜の美徳をあらわしていて、女性的、デリカシー、奥ゆかしさ、シャイな性質を意味している。微妙な情感をたたえた芸術に対する理解、芸術表現能力を示す。モーツァルトの音楽のように、やさしい軽やかな特質は、この度数の個性に近いし、実際モーツァルトは、この度数を持っている。ことさら伝統を強調するわけではないが、伝統のなかで育ってきた人間性の、情感の豊かさと美をあらわしているのだ。生き方そのものに自然と身についた倫理性。文化的な産物全体に対する優れたセンスがあるので、水瓶座的な新しい生き方で、古い伝統を扱うとよいだろう。"}, "水瓶座_28": {"sign": "水瓶座", "degree": 28, "symbol_ja": "切り倒され、のこぎりでひかれた樹木は、冬の薪の供給を確実なものとする", "explanation": "２６度の非常に具体的な科学技術知識、管理能力と、２７度の成熟した文化性を巧妙に組み合わせ、２８度では、人の文化のよりよいものを保存し、これらが明日の生活を豊かにするために利用されるように、体系化される。樹木は、大地から切り離されている。すでにわれわれに自然への依存性は存在していないが、しかし人間という有機体のなかに、自然から学習し精密に組み立てられたテクノロジーがすべて保存されている。人間性は、完結した完成度を示すようになり、どこに行っても優れた適応性を発揮する。いままで従属していた文化的な環境から離脱し、独自の文化を形成する力がある。雑学的なものも含めて、知識の総合化というものがここで達成されている。身につけた能力によって、いかなるところでも適応できる才能がある。"}, "水瓶座_29": {"sign": "水瓶座", "degree": 29, "symbol_ja": "さなぎから出てくる蝶", "explanation": "自分が生きている日常生活のひとつのパターンに対して、関係のしかたを急速に変えることにより、自己を根底から変革することのできる能力といわれている。２８度で人間性の完成がもたらされ、ここで自己のもっとも望んでいた生き方に、実際の人生を具体的に変革していこうとする。ここで新しい生き方が生まれる。いままで潜在的な可能性にすぎなかった願望が、はっきりと姿をあらわし、それにつれて、自分自身が変化していく。この度数を持っている人は、親から受け継いだ資質や、いままで従っていた環境とはまったく違う独立したタイプの人間へと成長していくことのできる人だ。背後には、獅子座の２９度、海から上がった人魚の度数があり、無意識的な願望が、はっきりと姿をあらわして、それが新しい生き方へと実を結ぶ度数。"}, "水瓶座_30": {"sign": "水瓶座", "degree": 30, "symbol_ja": "変態を成し遂げた人に明らかにされる、多くの個人の心が、ひとつになった意識の光の中に溶け込んでいく、超古代文化に根を持つ霊的な同胞団", "explanation": "この地球環境のなかで、幾度か文明が起こり、また衰退した。しかしこうした地上の時間とは異なるレベルに、霊的な同胞団としての息の長い組織があるといわれている。人間のあらゆる表現体系をのみ込んだ、多様性のなかに存在する単一性、生命の共通した認識のもとに打ち立てられた偉大な霊的な組織だと考えられている。この度数は、そうしたエソテリックな組織との共鳴を物語る度数で、ある人はこの度数を「禅」の道の完成形態だと述べている。水瓶座の２６度以後は、人間のあらゆる潜在的な要素さえも組み込んだ総合科学に関心をむけてきた。そしてしだいに、生まれ育った環境の影響力を中和していき、純粋な人間の理想像を確立してきた。この度数は、その目的の完成を示す。個や多様性を完全に内包しつつ、単一な統合性をもつ人間性の確立。多様でありながら、ひとつのいつの時代にも変わらない単一の共通性をもつ人間性の確立。\nNo. 67／72区分（魚座１度～５度）「流通」 商業的な流通、活発な交渉\nこれまでの社会的な偏見や価値付けを捨て、あらゆる価値観を公平に扱う。それは他者から見ると、あたかも混沌の市場のような状況を呈する。価値の交換や流通にかける。"}, "魚座_1": {"sign": "魚座", "degree": 1, "symbol_ja": "混雑した市場で、農夫と仲買人が非常に多彩な作物を陳列している", "explanation": "魚座は、最後の星座、人間の行為の総決算をするので、これまでに体験されたことがすべて一堂に会する。ここでは、精神的、物質的なもの、あらゆるものが渾然一体と交流し、交換される。つまりこの人には精神性とか、物質性、高貴、卑賎の区別はなく、すべてを交換したり、運営したり、また商業化できるという能力があって、とくに売買契約とか、経済流通の仕事にむいているといえよう。取り引きとか駆け引きなどに関係する度数である。この魚座の雑然とした市場のような環境に平気でいられる気質は、なかなか特徴的だ。この度数をもった人は、このシンポルのとおりに、流通性の激しい商業地域や商業的な活動にむいている。香港のような都市や、あらゆるものが交じりあった世界で生き生きとできる。"}, "魚座_2": {"sign": "魚座", "degree": 2, "symbol_ja": "ハンターから隠れるリス", "explanation": "盛んな商取引や交際のなかでは、他人の悪意や欲に身をさらす可能性が多く、これらから自分を守る技術が必要だということだ。リスは餌を集めるときに、自分が危険にならないように注意深く行動する生き物。ここでは大切な仲間でさえ、信頼できるものではないという自覚のもとに、自己保存能力を慎重に注意深く発揮する。社会的な競争原理のなかであらわれるさまざまな否定的な側面、忘れられた問題などについて、気がつくこと。ハンターはリスの行動特性を観察し、その進路で待ち伏せするが、リスはさらに巧妙にその裏をかきながら、慎重に行動する。防衛的で、なかなか自分の手のうちや、心の底を人に見せない、一見、臆病な人もこの度数のなかに多い。"}, "魚座_3": {"sign": "魚座", "degree": 3, "symbol_ja": "石化した樹木の幹が、砂漠の砂に埋もれて横たわっている", "explanation": "破壊不能なものを暗示する度数。１度では文化のあらゆる要素を一度ぶちまけた。これらをリスは自己保存の能力で守る。３度では、どんなに時代が経過しても、完全な形で作られた生産物は、失われることはない、ということを示している。それはいつか再現が可能なように、パッキングされて保存される。現在の科学理論では、断片の一部から全体を再現できる、という可能性を述べているが、この度数に縁が深い思想だ。ただし、これは完全性をもったものだけが保存されるのであって、もしそれがもともと不完全なものであれば風化する、ということもこの度数で暗示している。この度数を持つ人は、永続性のあるものを保存しようとする性質をもっている。卑近な例では、なんでもリスのようにためこむ人。保守、保管に縁のある仕事。また失われた古いものをもう一度復元し、それらを保存しようとする気持ち。記念品に関したこと。"}, "魚座_4": {"sign": "魚座", "degree": 4, "symbol_ja": "２つの海岸保養地をつなぐ細い地峡での交通渋滞", "explanation": "社会的な流通は、時代の流れとともにますます複雑になる。商業が発展し、交通が発達すると、しばしば混乱とか、渋滞を引き起こしてしまうが、これらは限界なく複雑化していく。海について言及しているのは、これらは物理的なものだけでなく、われわれの無意識の心のはたらきもまた複雑化して、巧妙な心理的サーキットを形成することを述べている。この度数は、交通ということに関係した度数。ますます能力が拡大し、複雑になる流通システムのなかで、複雑な事柄を処理できる能力があり、巧妙に生き抜いていける人だ。この度数を持っている人は実際に交通関係に勤めることが多い。"}, "魚座_5": {"sign": "魚座", "degree": 5, "symbol_ja": "教会のバザー", "explanation": "商業的、物質的な流通に対して、特別な霊的な価値などをあたえることで、その行為を正当化し、なおかつ活力を増加させようとすること。聖なる作業も、また商売も、価値としては同じである、と考えるのは魚座の傾向のひとつだが、この度数はやはりボランティア的な性格も強く出てくるようだ。宗教的な価値の庇護のもとで商売をする。というと、霊感商法なども、この度数に関連することになる。背後にあるのは乙女座の５度。通常は見えない霊に気がつく人をあらわし、神秘的なあるいは宗教的な問題にかかわる傾向はかなり強いといえる。\nNo. 68／72区分（魚座６度～１０度）「奉仕」 犠牲と奉仕\nなんらかの対象に自己を全面的に投げ出すことで、超越的な目的の実践に成功する。大きな犠牲は、別の価値の大きな獲得に入れ替わることを知る。"}, "魚座_6": {"sign": "魚座", "degree": 6, "symbol_ja": "正装した軍隊の将校たちの行進", "explanation": "人が国家とか社会に奉仕し、献身する理由は、それによって国家や社会から、支持されることを期待しているからだ。自己を全面的に仕事や使命に投げ出すことで、相手から賞賛を得たいという気持ちがはたらいている。正装する、というのは厳しい規律にしたがうということで、この度数は軍隊とか警察とか、制服に身を包み、なおかつ聖職的な奉仕的な要素をもった職業に関係している。この人は非常に献身的な、ときには無謀なほどに奉仕する人だ。だが、それはその人が生きている国家や自治体に依存したところでなりたつ奉仕であって、無視されると非常に気落ちする。背後にある乙女座の６度は、ダイナミックな情感の遊びを意味するので、この度数の人も、いろいろと人生に多くの期待をする。"}, "魚座_7": {"sign": "魚座", "degree": 7, "symbol_ja": "海の霧に包まれた岩場に横たわる大きな十字架が、一条の光によって輝く", "explanation": "集団や社会からの賛同や同意をまったく期待することなく、いかなる犠牲を払っても、個人の信じる生き方に忠実になろうとした人。共同体とか国家、組織から、必然的に村八分にあう可能性は大きい。これはそこに迎合しないからだ。だが、こうした孤立のなかで、この個人の力をバックアップし、肯定してくれる霊的な力強い援助がある。自己主張の高度なあらわれといわれているが、自己の内側にあるものに対して、すべてを犠牲にしてしたがい、超越的な感覚に浸される傾向。ただし、このいたずらに劇化されたかのように思えるシンボルのイメージどおりに、奉仕、犠牲という宗教的な感情に耽溺する傾向もあるようだ。宗教研究者などにこの度数をときおり見かける。"}, "魚座_8": {"sign": "魚座", "degree": 8, "symbol_ja": "らっぱを吹く女性", "explanation": "自己に忠実であった人が、そのしっかりした芯の強さのおかげで、やがて人類に対して貢献する立場に立つ、ということ。他者に奉仕することも（６度）、自己の信念に献身することも（７度）身につけていて、先導者として行動すれば、種々の運動がわきおこる。だが、シンボルが女性だということは、思想的なものとか知的な改革などに意志がふりむけられるわけではなく、人々を情感的に盛り上げて動かしていくことだ。シンボルに女性が表現されていることから、女性的な感情の解放や、ウーマンリブ的な活動を推理する人もいる。女性の管理職とか、また組織や団体の指導者としての女性にこの度数があると、なかなか期待がもてる。ただし、６度以後は、あらゆる面で限度を超える傾向があるので、この度数でも冷静でない資質を指摘できるだろう。"}, "魚座_9": {"sign": "魚座", "degree": 9, "symbol_ja": "ライバルを意識して馬を駆り立てる騎手", "explanation": "現代社会では、競争原理は物心の両面でどこにも支配力をはたらかせていていかなる目的であれ、ひとたび真剣にものごとに取り組みはじめると、あたかも競争するかのように、活力をある一点に集中することになる。８度で女性原理がらっぱを吹き、心理的な高ぶりが増してきた。このなかで、この度数を持つ人はなにがなんでも目標に到達しようとする能力を磨くし、ライバルがいればますます活気づく。一点集中の能力。ぬきん出たいという衝動。馬はリピドーや情念的活力なので、感情的に興奮して、問題に取り組む人。なにかに集中するときに、感情をあおって、その勢いでつき進もうとする人。背後には乙女座の９度、表現主義の画家が隠れている。競争は、自分の心を表現するためのはけ口だと思うと、ますますやる気が出てくるというものだ。"}, "魚座_10": {"sign": "魚座", "degree": 10, "symbol_ja": "飛行機が、大地を隠している雲の中を飛び続ける", "explanation": "自己を目的に投げ出す能力は十分に発達し、なおかつ９度では野心も加わり、自らの限界を超えて、いままでの狭い生活範囲から飛び抜ける能力へと発展する。強力なエネルギーがあり、このエネルギーによって、つねに日常に対して、超越的な位置を保つことができる。はたしてこの度数が霊的な方向か、それとも実業的な面で発揮されるかわからない。この度数は熟練によって、限界を突破する能力に関係する。ただしシンボルからわかるように、大地を隠す雲のなかに飛行機は隠れていて、自分のもち駒をなかなか人に見せないで行動する人だ。エリート的な能力がある。背後の乙女座１０度は、いままでの自分の限界のむこうになにがあるかを見ようとする姿勢なので、超越、突破ということが人生のテーマになりやすい。\nNo. 69／72区分（魚座１１度～１５度）「試験」訓練された組織の一員として\nシークレットな価値を持つ組織や団体に奉仕し、このなかで自分を作り替えていく。特定のものに対して奉仕することで、生まれ変わる。"}, "魚座_11": {"sign": "魚座", "degree": 11, "symbol_ja": "啓示を求めて、細い道を旅する人々", "explanation": "いままでの自分よりも優れた水準をもった領域に、自分をどんな犠牲を払っても進めようとする能力がある。意識と生活の新しいレベルに入るにあたって、必要なすべてを兼ね備えている状況。あとはただ歩くだけ。この度数は、より高度に進化した人に助けられながら、先に進む人をあらわしていて、助けはあるが、しかし歩くのは自分、という状況に立たされている。細い道といわれる以上は、これは困難が想定される。この度数を持つ人は、目的にむかって、努力を傾けつづける傾向が特徴。針の穴を通すような困難な課題にチャレンジしている。目的はかなり困難なものかもしれないが、息をつめたような集中はいくらでもできる人だ。"}, "魚座_12": {"sign": "魚座", "degree": 12, "symbol_ja": "オカルト同胞団の神殿で、新しくイニシエートをした団員たちが調べられ、テストをされている", "explanation": "自分がはっきりと打ち出した目的に対して、曖昧さのない首尾一貫性を求められ、途中で逃げられない、責任を要求される。１１度のように自己探索をしているという状態ではなく、すでに自分がしたいことも、自分がなにをするべきかも、はっきりと自覚している。あとは、それをどのくらい確実に成し遂げるかの問題。個人としてはすでに自由を失い、組織や企業などの一員として、そのポストにおける役割を確実に果たさねばならない状況にある人が多い。この度数は資格に関係があるといわれているが、その意味であらゆる試験、資格などに関係した度数。対向にあるのは乙女座１２度で、新婦はヴェールをはがされるが、ここではその新婦の側、つまり、すみずみまで調べられる側にこの人が立たされている。"}, "魚座_13": {"sign": "魚座", "degree": 13, "symbol_ja": "博物館に展示されている、数々の戦いで使われた古代の剣", "explanation": "個人が所属する組織、企業、またある伝統のなかで、この度数の人は、そうした組織のために献身的にはたらき、その組織全体の意志を代表するような立場に立つ。集団の力が、個人の意志を通じて力を発揮する。剣は意志の印。彼はより大きな、個人としては身に余るような強力な力の通路として生きることになる。たとえばアーサー王が剣をもったとき、人類の集合無意識の力の中心的な通路となった。こうしたなにか大きなものの代表あるいは窓口としてはたらく個人を暗示している。背後に隠れているのは、乙女座の１３度、集団ヒステリーを鎮圧する政治家。意志を通じて混乱する世界を秩序化するカリスマだ。この度数を持つ人は、自分がなにの意志を引き受けているのか、慎重に考えなくてはならない。"}, "魚座_14": {"sign": "魚座", "degree": 14, "symbol_ja": "大きなキツネの毛皮のストールに身を包んだ婦人", "explanation": "巧妙さ、頭のよさ、要領のよさというキツネのずる賢さを発揮することが大切であることを暗示。これは１３度でむき出しにされた剣すなわち意志の覆いである、と指摘されていて、敵意や戦意をむき出しにしないように、適切なやわらかさ、女性的な資質、あるいはまた動物的な本能的な機敏さを発揮して、生き抜いていくことを示す。非常に巧妙で、魅力的な人柄であることも多い。童話ではキツネは、ずるさの印だが、１３度の後の度数なので、自己防衛的なずるさではなく、爪を隠すためのやわらかさの発揮ということが特徴だ。進行法でこの度数を通過するときには、さらなる世渡りのうまさや、人に対する洗練された優しさを練習したほうがいいという時期になる。"}, "魚座_15": {"sign": "魚座", "degree": 15, "symbol_ja": "本物の砲弾を使った砲火射撃での仮想攻撃の前に、将校が部下を指導している", "explanation": "魚座は、軍人に関係する度数だといわれている。乙女座は、個人性を示す星座群の最後にあって、個人の浄化を目的とし、集団性の星座の最後にある魚座は、われわれの住む地球環境や地域環境全体の浄化に関連している。個人を超えた、われわれの環境をとりまく大気のなかに隠れた霊的な世界での闘争や混乱に立ちむかわねばならない立場を暗示。超個的な危機、オカルト的な影響に対する危機管理者としての軍人を象徴としている。なにか大きな範囲で危険がさし迫っていることを漫然と理解する。こうしたなかで、慎重に、つねに危険を意識して、生きようとすること。またなんらかの重要な技術を受けつぐという意味もある。\nNo. 70／72区分（魚座１６度～２０度）「潮流」\n社会を全体的に動かしている潮流に関与\n目に見えないが、社会は海の潮流のように、まとまって変化し、まとまって移動する。これらの流れをつかみ、自己のもくろみをこの流れのなかで生かす。"}, "魚座_16": {"sign": "魚座", "degree": 16, "symbol_ja": "自分の書斎の静けさのなかで、創造的な個人が霊感に満ちた流れを体験する", "explanation": "全星座が終わりつつある魚座では、人間の根本的な創造意志についてもう一度確認を急ぐ体験が増加する。書斎という条件づけのなかでは、創造力は、芸術とか、技術、創作などで表現されてくる。また対人的な能力からあらわれるかもしれない。いずれにしても、われわれはもう一度自分のなかの主観的な創造力に対して深い信頼をもち、それにしたがって、自分の人生とはなにかを考え直さねばならない。インスピレーションがわき、これらが生命を満たす。この度数を持つ人は、なんらかの素材をもって、そこに創造的なエネルギーを満たすことが大切だ。創造的な才能が豊かな人だ。"}, "魚座_17": {"sign": "魚座", "degree": 17, "symbol_ja": "復活祭のパレード", "explanation": "集団とのかかわりのなかで、人々の創造的な活力を刺激する仕事に従事する。集団を結びつける独特の儀式が存在し、そのなかに参加することで、エネルギーを満たすこと。情念的に高められた活動のなかに身を投じることを意味、社会的な世界でのかなりレベルの高い活動をする。本当の意味でクリエイティブな産業に関与する。現実には、この度数の持ち主の多くが、世間の流行を操作する広告とか、宣伝企画関係の仕事に見受けられた。１６度は個人作業のなかで創造性を発揮する。だが、１７度を持つ人は、なにか新しいものをつくり出す目的で、仲間とプロダクション的な共同関係を形成するとよい。時代の動きを読んでそのなかで最も新しい仕事をするのがよい。"}, "魚座_18": {"sign": "魚座", "degree": 18, "symbol_ja": "巨大なテントで、村人たちが壮大な演技を見る", "explanation": "公的な自己劇化といわれているこの度数では、人々の毎日の退屈な人生を忘れさせてしまうような、ハデな演出によって、多人数に興奮をもたらしたい欲望を暗示。個人と集団の結びつきを深くする演出能力。自分の仕事ぶりを、集団に認めさせるためにひとつのデモンストレーションが必要とされている。あるいは仲間をひきよせるための行為。成功するための、演出方法にたけ、なかなか説得力のある人だ。この度数を持つ人は、自分を人に見せるということに執着していて、興奮を巻き起こすことに習熟してくるので、目立つ仕事や、ハデな行動をするのが特徴だ。あっと驚かせたいという気持ちが、安易に走ると、詐欺的な要素も含まれてくるようになる。"}, "魚座_19": {"sign": "魚座", "degree": 19, "symbol_ja": "自分の弟子に教授するマスター", "explanation": "本当の意味で教育や学習をしたいと思うのなら、誰か先生に直接習わなくてはならない。これは口伝などによる教育に関係した度数だ。結果的に、この度数の持ち主は、公開できないような特殊な秘密情報などにも通じてきやすいようだ。また、シンボルの師と弟子という関係は、昇進や地位の獲得も、ツテを通じて実現されるという条件を暗示している。勉強する場合、誰にも手に入るメディアを使った一般的な学校などよりも、直接個人的に教授される弟子入り制度などに縁が深い。もしなにかを学びたいときには、この度数の持ち主はよい先生を探す必要があるが、因縁的な対人関係の傾向があるので、自然に結びつく関係が大切になる。また小さな個人的な範囲にとどまるところで、教えたり教えられたりする関係の仕事として塾の先生などもある。"}, "魚座_20": {"sign": "魚座", "degree": 20, "symbol_ja": "夕食のために準備されたテーブル", "explanation": "このシンボルの夕食は、魂の世界においての夕食という傾向が強い。１９度では、師と弟子の霊的進化の１本のチェーンが暗示されたが、このチェーンにからんでいる人々の空間を超越して共有されている「食卓」に関係している。この共有された体験の場からもたらされた結果や、影響、エネルギーは、関係者すべてに受け取られる。シンクロニシティのようなはたらき。面識もなく、場所も離れているのに、同じ時期に同じ体験をしたというケースが多い。因縁のある人は目に見えない同じ食卓についている。そして、似たような進化コースを歩く。創造力の流れではじまったこの５角グループは、ここで人間の創造的な霊の力は、個人で所有できるものではなく、共通した人々に等しく受け取られるものなのだという結論をむかえる。魂のネットワーク。あまり勉強しなくても、恩恵を受ける、という意味もある。\nNo. 71／72区分（魚座２１度～２５度）「悟り」 超越体験\n個を越えた神聖な宇宙原理に対して、自己を投棄し、宇宙原理で生きようとする衝動。しかしこうした人離れした原理のもので発露を始めた人間の異常性にも対処しなくてはならない。"}, "魚座_21": {"sign": "魚座", "degree": 21, "symbol_ja": "中国人の召使いの注意深く優しいまなざしのもとで、少女が小さな白いヒツジを可愛がる", "explanation": "このサビアンをチャネリングしたエリス・フィーラーは中国人というと、チベット人のイメージをもっていて、長い伝統のなかで偉大な精神世界を確立した人々、という意味にとれることが多い象徴だ。白いヒツジは新しい牡羊座のはじまり。魚座は古いサイクルの一番最後の星座だ。この新旧のサイクルの切り替えのときに、少女は小さなヒツジの毛のふさふさした感触を楽しむとルディアは述べている。母親的な感覚に近い、ある官能的で情感的な新しい知覚意識の予感めいた発見があるという。純粋な宇宙原理としての、母性的な法則に気がつくこと。西欧的な文明は男性的な意識を中心にしているので、この度数はより東洋的な、大地母神的古代宗教の精神に関連し、西欧世界では、ある特別なあこがれを引き起こす度数だ。きわめて純粋な宇宙意識に到達するのだという。この度数の持ち主は、神道とかシャーマニズムに関係する人が多い。極度に広い包容力や、繊細な優しさが特徴。"}, "魚座_22": {"sign": "魚座", "degree": 22, "symbol_ja": "シナイ山の斜面を歩いて降りる、新しい法の石版をたずさえた預言者", "explanation": "２１度で宇宙的な原理を肌で感じる頂点体験をへたものが、その体験を日常的な生活のなかにどう生かすか。法は、形成力のある宇宙的な構造的な力で、実際にこの度数の持ち主は、表現の困難な宇宙原理を理論化して述べることができる。しかし強度に形而上的な抽象化された知識や体験あるいは教えを、この社会のなかでどうかみ砕いて表現するか、つねに難しさを感じている。預言者は、山から下界に降りる途中にある。上昇することでなく、下降することに、つねにこの度数の人のテーマがある。抽象的な理論が、具体化され、十分に下界に下りきったときに、それは「新しい法」になる。かつて表現されていなかったものが表現されれば、その時代にもっとも適合した新しい教えが生まれるのだ。預言者というシンボルは他に山羊座７度にもあらわれる。山羊座のそれは地域的な根から力を引き出し、魚座のこの度数は、もっと広範な宇宙原理そのものから力を引き出す違いがある。"}, "魚座_23": {"sign": "魚座", "degree": 23, "symbol_ja": "降霊会を催す霊を物質化する霊媒", "explanation": "目に見えない世界のものを、この世に具体化する処理は、２２度では、教養や理論として展開され、２３度では物質化する霊として描かれる。物質化することで、ある目に見えない特別なエネルギーは、持ち主の手もとから失われる。エネルギーを変換すること、別の姿に変えることに関係した度数。霊的な現実を実体化すること。また否定的な面は詐欺、ごまかし。自分のものになっている深い、秘密にしたいものを、ほかの人のために公開したり、使ったりすること。もちろん霊的な事柄に縁の深い人だ。背後には乙女座２３度が隠れていて、ライオン使いが、ここでは、霊媒使いに変わった。さまざまな心霊的なあるいは霊的なエネルギーや衝撃に対するコントロール力を身につける。それらを思いのままに扱うことができなくてはならない。"}, "魚座_24": {"sign": "魚座", "degree": 24, "symbol_ja": "広大な海に取り囲まれた小さな島で、人々が密接なつながりを保ちながら生きている", "explanation": "超常的な、あるいは霊的な力の扱いに熟練した人（２３度）は、もう一度具体的な、日常的な暮らしに取り組む。もともと２１度からの流れは、霊的な世界から、肉体的な世界への降下のプロセスをたどっているので、最後にこの度数で、自分の肉体的な条件をあらためて受け入れる時期にきている。とはいえ、一度高度な霊的な世界にまでいった人は、人間の生存条件や、その制限について、あらためて純粋な個人の立場で評価し直すことが多い。自分が何者なのかを、強く自覚する。そしてこういう人々が、他者と交流をする。海に取り囲まれたというシンボルは、すでにこの人々が、他者や社会に依存しておらず、表現しがたい永遠の宇宙のなかで、人はごく小さな島でしかないと自覚している姿をあらわしている。あらゆる集中力を、自己の肉体的な生存にかけて、もう一度生き直すことをあらわしている。"}, "魚座_25": {"sign": "魚座", "degree": 25, "symbol_ja": "宗教的な組織が、ゆがんだ実践と物質的すぎる理想による崩壊的な影響を克服することに成功する", "explanation": "いかに優れた霊的資質をもった人でも、肉体的な生活のなかでは、エゴ、住民の欲、排他主義、自尊心の増大などを避けて通ることができない。なにかをつかんでも、つねに衰退の可能性が潜んでいる。そこで、具体的な生活の上での、個人のエゴの浄化の技術を要求されるようになり、何度も何度も生き方を修正することを考えるようになる。たとえば宗教や、理想的な思想も、いかに優れたものであれ、結果的に有害な、過った方向性をもつようになる。この度数の人は、つねに反省することを心がけ、真の良心にしたがった暮らしをすることに真面目に取り組むようになる。良心、純粋さ、についてきわめてシビアな視点をもつようになる。\nNo.\n72／72区分（魚座２６度～３０度）「帰還」魂のひとつのサイクルが、幕を閉じる\n自分が生まれ育った固有の環境的な影響、対人的な影響をすべて脱色し、純粋な孤独のなかに、自分を吸収させる。新しい再生のために、準備として、地上的な清算をする。"}, "魚座_26": {"sign": "魚座", "degree": 26, "symbol_ja": "非常に細い三日月が、日没時に現れるのを見て、人々がそれぞれ異なった計画とともに前に進む時期が来たことを知る", "explanation": "非常に細い三日月というのは、新月に近い意味だろうと思う。新月は、月の力がもっとも弱まり、太陽に支配権を委ねた時期だ。このときに、個人の意志は非常に明確になる。意志を明確にした人々は、それぞれ自分の信じる方向にむかわねばならない。いよいよ全星座の最後になったこのグループでは、魂は生まれ育った土地や、家族、友人、あるいはその人を背後で支えてきた目に見えない守護者から離れて、本当の自分の生き方に進むようになる。人にはそれぞれのやり方があり、それぞれの目的がある。これらを阻害するあらゆる条件は、この度数で超えられる。すでに社会参加は問題とはなっていない。この度数を持っている人は、自分の本当の進路というものを、他のどんな条件も考慮せずに、はっきりと認識しなくてはならない。"}, "魚座_27": {"sign": "魚座", "degree": 27, "symbol_ja": "仲秋の名月が、澄み切った秋の空を照らす", "explanation": "新月はその人の精神的な面での意志を決定し、満月が訪れると、それが具体的に実を結ぶ時期が来たことを知らせる。とくに仲秋の名月は、天文学的にもっとも大きな満月を見せるそうで、すなわち満月のなかの満月。完全な成就を意味するサインだ。この度数の持ち主は、本当の意味での深い目的を、人生のなかで成就できる。成果を刈り取る。ただし、これはすべての総合を意味する魚座での出来事や、その人が意識するとしないとに限らず、その人自身のもっとも深い資質が、この世界のなかで、実を結ぶのだ。これらを修正したり、方向を変えた function syncDegree(val) {
  document.getElementById('degreeLabel').textContent = val + ' 度';
  document.getElementById('degreeRange').value = val;
  document.querySelectorAll('.degree-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.deg === String(val));
  });
  updateResult();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateResult() {
  const sign = document.getElementById('signSelect').value;
  const deg  = document.getElementById('degreeRange').value;
  const key  = sign + '_' + deg;

  const goisu   = DATA.goisu[key];
  const ichiran = DATA.ichiran[key];
  const kani    = DATA.kani[key];
  const suta    = DATA.sutakuro[key];

  const header  = document.getElementById('resultHeader');
  const list    = document.getElementById('cardsList');
  const empty   = document.getElementById('emptyState');

  if (!goisu && !ichiran) {
    header.style.display = 'none';
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  header.style.display = 'block';

  // ── ヘッダー ──
  const symbolJa  = goisu ? goisu.symbol_ja  : (ichiran ? ichiran.symbol_ja : '');
  const symbolEn  = goisu ? goisu.symbol_en  : '';
  const keyPhrase = goisu ? goisu.key_phrase : '';
  header.innerHTML = `
    <div class="sign-degree-label">${sign} ${deg}度</div>
    <div class="symbol-name">${esc(symbolJa)}</div>
    ${symbolEn  ? `<div class="symbol-en">${esc(symbolEn)}</div>` : ''}
    ${keyPhrase ? `<div class="key-phrase">${esc(keyPhrase)}</div>` : ''}
  `;

  // ── カード一覧 ──
  const cards = [];

  // ① goisu
  cards.push(`
    <div class="source-card">
      <div class="source-title">① goisu版 — 詳細解説</div>
      ${goisu ? `
        <div class="source-symbol">${esc(goisu.symbol_ja)}</div>
        <div class="explanation">${esc(goisu.explanation)}</div>
      ` : '<div style="color:#7868a8">データなし</div>'}
    </div>
  `);

  // ② 一覧
  cards.push(`
    <div class="source-card">
      <div class="source-title">② 一覧版 — 解説</div>
      ${ichiran ? `
        <div class="source-symbol">${esc(ichiran.symbol_ja)}</div>
        <div class="explanation">${esc(ichiran.explanation)}</div>
      ` : '<div style="color:#7868a8">データなし</div>'}
    </div>
  `);

  // ③ 簡易（72区分）
  cards.push(`
    <div class="source-card">
      <div class="source-title">③ 簡易版（一覧）— 72区分テーマ</div>
      ${kani ? `
        <div class="range-badge">📌 ${esc(kani.range_keyword)}</div>
        <div class="explanation">${esc(kani.range_description)}</div>
      ` : '<div style="color:#7868a8">データなし</div>'}
    </div>
  `);

  // ④ すたくろ
  cards.push(`
    <div class="source-card">
      <div class="source-title">④ すたくろさんver — キーワード</div>
      ${suta ? `
        <div class="keyword-big">${esc(suta.keyword)}</div>
      ` : '<div style="color:#7868a8">データなし</div>'}
    </div>
  `);

  list.innerHTML = cards.join('');
}

// 度数ボタン生成
const btns = document.getElementById('degreeBtns');
for (let i = 1; i <= 30; i++) {
  const b = document.createElement('button');
  b.className = 'degree-btn' + (i === 1 ? ' active' : '');
  b.textContent = i;
  b.dataset.deg = i;
  b.onclick = () => syncDegree(String(i));
  btns.appendChild(b);
}

updateResult();
</script>
