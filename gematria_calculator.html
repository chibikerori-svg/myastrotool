<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hebrew Gematria Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+Hebrew:wght@300;400;600&family=Inter:wght@300;400;500&display=swap');

    :root {
      --bg-deep: #0a0a0f;
      --bg-card: #111118;
      --bg-panel: #16161f;
      --gold: #c9a84c;
      --gold-light: #e8c96e;
      --gold-dim: #7a6030;
      --purple: #6b4fa0;
      --purple-light: #9b7fd4;
      --text: #e8e4d9;
      --text-dim: #8a8070;
      --border: #2a2535;
      --glow: rgba(201, 168, 76, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(107, 79, 160, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .star-of-david {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 12px var(--gold));
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 12px var(--gold)); }
      50% { opacity: 0.7; filter: drop-shadow(0 0 24px var(--gold-light)); }
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── Main Container ── */
    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .card-label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      color: var(--gold-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── Input Area ── */
    .input-wrapper {
      position: relative;
    }

    .hebrew-input {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Noto Serif Hebrew', serif;
      font-size: 2rem;
      padding: 16px 20px;
      text-align: right;
      direction: rtl;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      letter-spacing: 4px;
      resize: none;
      height: 80px;
    }

    .hebrew-input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .hebrew-input::placeholder {
      color: var(--text-dim);
      font-size: 1.2rem;
      letter-spacing: 1px;
    }

    .clear-btn {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s;
    }

    .clear-btn:hover { color: var(--gold); }

    /* ── Hebrew Keyboard ── */
    .keyboard-grid {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 6px;
      direction: rtl;
    }

    .key {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Serif Hebrew', serif;
    }

    .key:hover {
      border-color: var(--gold-dim);
      background: rgba(201, 168, 76, 0.08);
      transform: translateY(-1px);
    }

    .key:active {
      transform: translateY(0);
      background: rgba(201, 168, 76, 0.16);
    }

    .key-char {
      display: block;
      font-size: 1.2rem;
      color: var(--text);
      line-height: 1;
      margin-bottom: 3px;
    }

    .key-val {
      display: block;
      font-size: 0.62rem;
      color: var(--gold-dim);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    .key-name {
      display: block;
      font-size: 0.55rem;
      color: #4a4560;
      font-family: 'Inter', sans-serif;
      margin-top: 1px;
    }

    /* ── Breakdown ── */
    .breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      direction: rtl;
      min-height: 60px;
      align-items: flex-start;
    }

    .letter-chip {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .letter-chip .lc-char {
      display: block;
      font-family: 'Noto Serif Hebrew', serif;
      font-size: 1.4rem;
      color: var(--gold-light);
      line-height: 1;
      margin-bottom: 4px;
    }

    .letter-chip .lc-name {
      display: block;
      font-size: 0.6rem;
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .letter-chip .lc-val {
      display: block;
      font-size: 0.9rem;
      color: var(--gold);
      font-weight: 600;
    }

    .letter-chip .lc-meaning {
      display: block;
      font-size: 0.62rem;
      color: var(--purple-light);
      font-family: 'Inter', sans-serif;
      margin-top: 5px;
      line-height: 1.3;
      max-width: 80px;
    }

    .empty-msg {
      color: var(--text-dim);
      font-size: 0.85rem;
      font-style: italic;
      padding: 10px 0;
      width: 100%;
      text-align: center;
      direction: ltr;
    }

    /* ── Result ── */
    .result-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .result-main {
      flex: 1;
      min-width: 180px;
    }

    .result-number {
      font-family: 'Cinzel', serif;
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      text-shadow: none;
      filter: drop-shadow(0 0 20px var(--gold));
      transition: all 0.4s;
    }

    .result-zero {
      color: var(--text-dim);
      -webkit-text-fill-color: var(--text-dim);
      filter: none;
    }

    .result-label-sub {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      font-family: 'Cinzel', serif;
    }

    .result-reduced {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
      min-width: 140px;
    }

    .result-reduced-num {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--purple-light);
      display: block;
    }

    .result-reduced-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
      margin-top: 4px;
      display: block;
    }

    /* ── Reference Table ── */
    .ref-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .ref-toggle:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .ref-table {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
    }

    .ref-table.show { display: grid; }

    .ref-cell {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      direction: rtl;
    }

    .ref-cell-char {
      font-family: 'Noto Serif Hebrew', serif;
      font-size: 1.3rem;
      color: var(--gold-light);
      display: block;
    }

    .ref-cell-name {
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      display: block;
      margin: 2px 0;
    }

    .ref-cell-val {
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: 600;
      display: block;
    }

    .ref-cell-meaning {
      font-size: 0.58rem;
      color: var(--purple-light);
      font-family: 'Inter', sans-serif;
      display: block;
      margin-top: 3px;
      line-height: 1.3;
    }

    /* ── Mode Toggle ── */
    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .mode-btn {
      flex: 1;
      padding: 9px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .mode-btn.active {
      border-color: var(--gold-dim);
      background: rgba(201, 168, 76, 0.1);
      color: var(--gold);
    }

    .mode-btn:hover:not(.active) {
      border-color: var(--border);
      color: var(--text);
    }

    /* English input area */
    .english-input {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1.4rem;
      padding: 16px 20px;
      text-align: left;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      letter-spacing: 3px;
      resize: none;
      height: 80px;
      display: none;
    }

    .english-input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .english-input::placeholder {
      color: var(--text-dim);
      font-size: 1rem;
      letter-spacing: 1px;
    }

    /* Converted preview */
    .converted-preview {
      display: none;
      margin-top: 12px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .converted-preview-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--gold-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .converted-text {
      font-family: 'Noto Serif Hebrew', serif;
      font-size: 1.6rem;
      color: var(--gold-light);
      direction: rtl;
      text-align: right;
      letter-spacing: 4px;
      line-height: 1.4;
      min-height: 32px;
    }

    .mapping-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      direction: ltr;
    }

    .mapping-pair {
      background: rgba(201, 168, 76, 0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.75rem;
      text-align: center;
    }

    .mapping-pair .mp-en {
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
    }

    .mapping-pair .mp-arrow {
      color: var(--gold-dim);
      margin: 0 3px;
    }

    .mapping-pair .mp-he {
      font-family: 'Noto Serif Hebrew', serif;
      color: var(--gold-light);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.72rem;
      letter-spacing: 2px;
      font-family: 'Cinzel', serif;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 4px 0;
    }
  </style>
</head>
<body>

<header class="header">
  <span class="star-of-david">✡</span>
  <h1 class="title">GEMATRIA</h1>
  <p class="subtitle">Hebrew Numerology Calculator</p>
</header>

<div class="container">

  <!-- Input Card -->
  <div class="card">
    <div class="card-label">✦ Input — Text</div>

    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnHebrew" onclick="setMode('hebrew')">
        ✦ Hebrew — ヘブライ語入力
      </button>
      <button class="mode-btn" id="btnEnglish" onclick="setMode('english')">
        ✦ English — 英語から変換
      </button>
    </div>

    <!-- Hebrew input -->
    <div class="input-wrapper" id="hebrewInputWrap">
      <textarea
        id="inputText"
        class="hebrew-input"
        placeholder="ここにヘブライ語を入力、またはキーボードを使用"
        oninput="calculate()"
      ></textarea>
      <button class="clear-btn" onclick="clearInput()" title="クリア">✕</button>
    </div>

    <!-- English input -->
    <div class="input-wrapper" id="englishInputWrap" style="display:none">
      <textarea
        id="englishInput"
        class="english-input"
        style="display:block"
        placeholder="Enter English text here..."
        oninput="convertAndCalculate()"
      ></textarea>
      <button class="clear-btn" onclick="clearInput()" title="クリア">✕</button>
    </div>

    <!-- Converted preview (English mode only) -->
    <div class="converted-preview" id="convertedPreview">
      <span class="converted-preview-label">Converted → Hebrew</span>
      <div class="converted-text" id="convertedText"></div>
      <div class="mapping-row" id="mappingRow"></div>
    </div>
  </div>

  <!-- Keyboard Card -->
  <div class="card">
    <div class="card-label">✦ Keyboard — אלפבית</div>
    <div class="keyboard-grid" id="keyboard"></div>
  </div>

  <!-- Breakdown Card -->
  <div class="card">
    <div class="card-label">✦ Breakdown — 文字解析</div>
    <div class="breakdown" id="breakdown">
      <p class="empty-msg">文字を入力すると、各文字の数値が表示されます</p>
    </div>
  </div>

  <!-- Result Card -->
  <div class="card">
    <div class="card-label">✦ Result — 計算結果</div>
    <div class="result-section">
      <div class="result-main">
        <div class="result-number result-zero" id="resultNum">0</div>
        <div class="result-label-sub">Total Gematria Value</div>
      </div>
      <div class="result-reduced">
        <span class="result-reduced-num" id="reducedNum">0</span>
        <span class="result-reduced-label">Reduced (1桁)</span>
      </div>
    </div>
  </div>

  <!-- Reference Card -->
  <div class="card">
    <div class="card-label">✦ Reference — 対応表</div>
    <button class="ref-toggle" onclick="toggleRef(this)">対応表を表示 ▾</button>
    <div class="ref-table" id="refTable"></div>
  </div>

</div>

<footer class="footer">
  <div class="divider"></div>
  <p style="margin-top:12px">ゲマトリア · Gematria · גמטריא</p>
</footer>

<script>
// ── English → Hebrew phonetic mapping ──
const EN_TO_HE = {
  'a': { char: 'א', name: 'Alef'   },
  'b': { char: 'ב', name: 'Bet'    },
  'c': { char: 'כ', name: 'Kaf'    },
  'd': { char: 'ד', name: 'Dalet'  },
  'e': { char: 'ה', name: 'He'     },
  'f': { char: 'פ', name: 'Pe'     },
  'g': { char: 'ג', name: 'Gimel'  },
  'h': { char: 'ח', name: 'Chet'   },
  'i': { char: 'י', name: 'Yod'    },
  'j': { char: 'י', name: 'Yod'    },
  'k': { char: 'כ', name: 'Kaf'    },
  'l': { char: 'ל', name: 'Lamed'  },
  'm': { char: 'מ', name: 'Mem'    },
  'n': { char: 'נ', name: 'Nun'    },
  'o': { char: 'ע', name: 'Ayin'   },
  'p': { char: 'פ', name: 'Pe'     },
  'q': { char: 'ק', name: 'Qof'    },
  'r': { char: 'ר', name: 'Resh'   },
  's': { char: 'ס', name: 'Samekh' },
  't': { char: 'ת', name: 'Tav'    },
  'u': { char: 'ו', name: 'Vav'    },
  'v': { char: 'ו', name: 'Vav'    },
  'w': { char: 'ו', name: 'Vav'    },
  'x': { char: 'ס', name: 'Samekh' },
  'y': { char: 'י', name: 'Yod'    },
  'z': { char: 'ז', name: 'Zayin'  },
};

let currentMode = 'hebrew';

function setMode(mode) {
  currentMode = mode;
  const hebrewWrap  = document.getElementById('hebrewInputWrap');
  const englishWrap = document.getElementById('englishInputWrap');
  const preview     = document.getElementById('convertedPreview');
  const keyboard    = document.getElementById('keyboard');
  const btnHe       = document.getElementById('btnHebrew');
  const btnEn       = document.getElementById('btnEnglish');

  if (mode === 'hebrew') {
    hebrewWrap.style.display  = 'block';
    englishWrap.style.display = 'none';
    preview.style.display     = 'none';
    keyboard.style.display    = 'grid';
    btnHe.classList.add('active');
    btnEn.classList.remove('active');
    clearInput();
  } else {
    hebrewWrap.style.display  = 'none';
    englishWrap.style.display = 'block';
    preview.style.display     = 'block';
    keyboard.style.display    = 'none';
    btnEn.classList.add('active');
    btnHe.classList.remove('active');
    clearInput();
  }
}

function convertAndCalculate() {
  const raw = document.getElementById('englishInput').value;
  const convertedTextEl = document.getElementById('convertedText');
  const mappingRow = document.getElementById('mappingRow');

  let hebrewStr = '';
  const pairs = [];

  [...raw].forEach(ch => {
    const lower = ch.toLowerCase();
    if (EN_TO_HE[lower]) {
      const mapped = EN_TO_HE[lower];
      hebrewStr += mapped.char;
      pairs.push({ en: ch, he: mapped.char, name: mapped.name });
    } else if (ch === ' ') {
      hebrewStr += ' ';
    }
  });

  convertedTextEl.textContent = hebrewStr;

  // Show mapping pairs
  mappingRow.innerHTML = pairs.map(p =>
    `<span class="mapping-pair">
      <span class="mp-en">${p.en.toUpperCase()}</span>
      <span class="mp-arrow">→</span>
      <span class="mp-he">${p.he}</span>
    </span>`
  ).join('');

  // Temporarily set the hidden hebrew textarea and compute
  document.getElementById('inputText').value = hebrewStr;
  calculate();
}

const LETTERS = [
  { char: 'א', name: 'Alef',    val: 1,   meaning: '牛・力・神',       meaningEn: 'Ox / Strength / God'      },
  { char: 'ב', name: 'Bet',     val: 2,   meaning: '家・宿',           meaningEn: 'House / Dwelling'          },
  { char: 'ג', name: 'Gimel',   val: 3,   meaning: 'ラクダ・与える',   meaningEn: 'Camel / To give'           },
  { char: 'ד', name: 'Dalet',   val: 4,   meaning: 'ドア・道',         meaningEn: 'Door / Pathway'            },
  { char: 'ה', name: 'He',      val: 5,   meaning: '窓・息吹・神の名', meaningEn: 'Window / Breath / Divine'  },
  { char: 'ו', name: 'Vav',     val: 6,   meaning: '釘・鉤・結合',     meaningEn: 'Hook / Nail / Connection'  },
  { char: 'ז', name: 'Zayin',   val: 7,   meaning: '剣・武器',         meaningEn: 'Sword / Weapon'            },
  { char: 'ח', name: 'Chet',    val: 8,   meaning: '柵・囲い・生命',   meaningEn: 'Fence / Life'              },
  { char: 'ט', name: 'Tet',     val: 9,   meaning: '蛇・隠れた善',     meaningEn: 'Serpent / Hidden good'     },
  { char: 'י', name: 'Yod',     val: 10,  meaning: '手・神の手',       meaningEn: 'Hand / Divine hand'        },
  { char: 'כ', name: 'Kaf',     val: 20,  meaning: '手のひら・容器',   meaningEn: 'Palm / Container'          },
  { char: 'ל', name: 'Lamed',   val: 30,  meaning: '牛追い棒・学び',   meaningEn: 'Staff / Learning'          },
  { char: 'מ', name: 'Mem',     val: 40,  meaning: '水・流れ',         meaningEn: 'Water / Flow'              },
  { char: 'נ', name: 'Nun',     val: 50,  meaning: '魚・継続',         meaningEn: 'Fish / Continuity'         },
  { char: 'ס', name: 'Samekh',  val: 60,  meaning: '支柱・支え',       meaningEn: 'Pillar / Support'          },
  { char: 'ע', name: 'Ayin',    val: 70,  meaning: '目・洞察・泉',     meaningEn: 'Eye / Insight / Spring'    },
  { char: 'פ', name: 'Pe',      val: 80,  meaning: '口・言葉',         meaningEn: 'Mouth / Word / Speech'     },
  { char: 'צ', name: 'Tsadi',   val: 90,  meaning: '釣り針・正義',     meaningEn: 'Hook / Righteousness'      },
  { char: 'ק', name: 'Qof',     val: 100, meaning: '太陽・地平線',     meaningEn: 'Sun / Horizon / Holiness'  },
  { char: 'ר', name: 'Resh',    val: 200, meaning: '頭・始まり',       meaningEn: 'Head / Beginning'          },
  { char: 'ש', name: 'Shin',    val: 300, meaning: '歯・炎・聖なる火', meaningEn: 'Teeth / Flame / Holy fire' },
  { char: 'ת', name: 'Tav',     val: 400, meaning: '印・十字・真実',   meaningEn: 'Mark / Cross / Truth'      },
  // Final forms (sofit)
  { char: 'ך', name: 'Kaf-f',   val: 20,  meaning: '手のひら・容器',   meaningEn: 'Palm / Container'          },
  { char: 'ם', name: 'Mem-f',   val: 40,  meaning: '水・流れ',         meaningEn: 'Water / Flow'              },
  { char: 'ן', name: 'Nun-f',   val: 50,  meaning: '魚・継続',         meaningEn: 'Fish / Continuity'         },
  { char: 'ף', name: 'Pe-f',    val: 80,  meaning: '口・言葉',         meaningEn: 'Mouth / Word'              },
  { char: 'ץ', name: 'Tsadi-f', val: 90,  meaning: '釣り針・正義',     meaningEn: 'Hook / Righteousness'      },
];

// Map for quick lookup
const letterMap = {};
LETTERS.forEach(l => { letterMap[l.char] = l; });

// Build keyboard (standard 22 + 5 finals)
const keyboard = document.getElementById('keyboard');
LETTERS.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'key';
  btn.innerHTML = `<span class="key-char">${l.char}</span><span class="key-val">${l.val}</span><span class="key-name">${l.name}</span>`;
  btn.onclick = () => {
    const ta = document.getElementById('inputText');
    const pos = ta.selectionStart;
    const val = ta.value;
    ta.value = val.slice(0, pos) + l.char + val.slice(pos);
    ta.focus();
    ta.setSelectionRange(pos + 1, pos + 1);
    calculate();
  };
  keyboard.appendChild(btn);
});

// Build reference table (first 22 only)
const refTable = document.getElementById('refTable');
LETTERS.slice(0, 22).forEach(l => {
  const cell = document.createElement('div');
  cell.className = 'ref-cell';
  cell.innerHTML = `
    <span class="ref-cell-char">${l.char}</span>
    <span class="ref-cell-name">${l.name}</span>
    <span class="ref-cell-val">${l.val}</span>
    <span class="ref-cell-meaning">${l.meaning}</span>
  `;
  refTable.appendChild(cell);
});

function calculate() {
  const text = document.getElementById('inputText').value;
  const breakdown = document.getElementById('breakdown');
  const resultNum = document.getElementById('resultNum');
  const reducedNum = document.getElementById('reducedNum');

  let total = 0;
  const chips = [];

  [...text].forEach(ch => {
    const entry = letterMap[ch];
    if (entry) {
      total += entry.val;
      chips.push(`
        <div class="letter-chip">
          <span class="lc-char">${entry.char}</span>
          <span class="lc-name">${entry.name}</span>
          <span class="lc-val">${entry.val}</span>
          <span class="lc-meaning">${entry.meaning}</span>
        </div>
      `);
    }
  });

  if (chips.length === 0) {
    breakdown.innerHTML = '<p class="empty-msg">文字を入力すると、各文字の数値が表示されます</p>';
    resultNum.textContent = '0';
    resultNum.className = 'result-number result-zero';
    reducedNum.textContent = '0';
  } else {
    breakdown.innerHTML = chips.join('');
    resultNum.textContent = total;
    resultNum.className = 'result-number';
    reducedNum.textContent = digitalRoot(total);
  }
}

function digitalRoot(n) {
  if (n === 0) return 0;
  return (n % 9 === 0) ? 9 : n % 9;
}

function clearInput() {
  document.getElementById('inputText').value = '';
  if (currentMode === 'english') {
    document.getElementById('englishInput').value = '';
    document.getElementById('convertedText').textContent = '';
    document.getElementById('mappingRow').innerHTML = '';
  }
  calculate();
}

function toggleRef(btn) {
  const table = document.getElementById('refTable');
  table.classList.toggle('show');
  btn.textContent = table.classList.contains('show') ? '対応表を閉じる ▴' : '対応表を表示 ▾';
}
</script>
